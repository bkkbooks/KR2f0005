body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷三十三治河一康熙九年庚戌九月丙辰工部議覆河道總督羅多疏言修河工程額用協夫請於江南山東兩省僉派協濟查僉𤓰夫役恐道逺民艱不便准行上曰河工關係重大時近冬寒勢不容緩倘臨期應募無人復行僉派必致遲悞著該督先行竭力召募儘所得人夫供役如萬不能得就近量行僉派協濟仍一面作速題明該管官員務須加意撫恤不得借端科擾困累小民康熙十一年壬子九月辛丑上諭工部河道屢年衝决地方被災民生困苦深軫朕懐據遣往視決口侍衛吳丹學士郭廷祚回京繪圖進呈朕觀黄河自宿遷以至清口皆為𦂳要雖有遙隄一層恐未足捍蔽水勢應否於遥隄之外再築一隄爾部即行文總河總漕公同相視商酌築隄果否有益并所需錢糧逐一詳確議奏康熙十五年丙辰十月辛未上遣工部尚書冀如錫等閱視河工諭之曰河工經費浩繁迄無成效沿河百姓皆受其困今命爾等前往須實心相視將河上利害情形體勘詳明各處隄岸應如何修築務為一勞永逸之計勿得茍且塞責如勘視不審後復有事爾等亦難辭咎又近聞奉差至外省者地方官吏所在迎送甚為勞擾此皆有累民生之事爾等前往宜一概禁止康熙二十一年壬戌五月丁卯上命户部尚書伊桑阿等勘閲河工諭之曰黄河潰決關係運道民生深切朕懐厯觀書史所載及從前條議章奏治河不在空言而在實行未可輕言河工之易也若以為易則未可刻期奏功即收實效若以為難由楊家莊至清口一百二十餘里係漕船往來必由之要路修築隄堰豈容稍忽爾等前去務與靳輔公同商酌加意看騐勿各執己見凡有㑹議事宜必逐一陳奏庚午上諭户部尚書伊桑阿等曰淮安等處河道頻年衝潰靳輔作何修築工程堅否特遣爾等往勘若到彼處各宜秉公持正悉心詳畫庶稱任使如有通同徇私或行欺罔者必加重處是日上諭侍郎宋文運曰伊桑阿前曽閲過河道一次今爾係初往如有確見務必堅持詳議毋以伊桑阿為尚書已為侍郎阿意順從治河最為難事候補布政使崔維雅所奏款項爾等帶往㑹同靳輔詳加確議務期堅久以濟河工除河患勿視為尋常玩忽貽悞也康熙二十三年甲子十月辛亥上廵閱黄河視北岸諸險工諭河道總督靳輔曰朕向來留心河務每在宫中細覽河防諸書及爾屢年所進河圖與險工決口諸地名時加探討雖知險工修築之難未曽身厯河工其河勢之洶湧漶漫隄岸之逺近高下不能了然今詳勘地勢相度情形如蕭家渡九里岡崔家鎮徐家壩七里溝黄家嘴新莊一帶皆喫緊迎溜之處甚為危險所築長隄與逼水壩須時加防䕶大畧運道之患在黄河禦河全憑隄岸若南北兩隄修築堅固可免決齧則河水不致四潰水不四潰則濬滌淤墊沙去河深隄岸益可無虞今諸處隄防雖經整理還宜培薄増卑隨時修築以防未然不可忽也又如宿遷桃源清河上下舊設減水諸壩蓋欲分洩漲溢一使隄岸免於衝決可以束水歸漕一使下流疏洩可無淮弱黄强清河噴沙之慮近來凡有決工處所皆倣其意不過暫濟目前之急雖受其益亦有少損倘遇河水泛溢乘勢横流安保今日減水壩不為他年之決口乎且水流浸灌多壊民田朕心不忍爾當籌畫精詳措置得當使黄河之水順勢東下水行沙刷永無壅滯則減水諸壩皆可不用運道既免梗塞之患民生亦無墊溺之憂庶幾一勞永逸河工可告成也十一月辛未上諭河道總督靳輔曰朕觀高家堰地勢高於寶應高郵諸水數倍前人於此築石隄障水實為淮揚屏蔽且使洪澤湖與淮水并力敵黄衝刷淤沙關係最重今高家堰舊口及周橋翟壩修築雖久仍須歲歲防䕶不可輕視以隳前功康熙二十四年乙丑正月戊子上諭大學士等曰總河靳輔所奏黄河南岸毛城舖等處北岸大谷山等處宜建減水壩令水分流歸仁隄等處宜建石壩保䕶曽命九卿等㑹議朕南廵時靳輔亦稱自白洋河引黄水下流入洪澤湖駱馬湖以助淮水其下清河縣黄淮合流之處因有洄渦自能洗逐淤沙朕思導流之水總㑹於清河縣水勢既强流湍激湧必致踰越隄岸愈損民間田廬此減水壩雖有益於河工實無補於百姓不可不為熟計爾等以朕意傳示九卿務籌久遠其詳明議奏康熙二十五年丙寅七月丙戌上諭工部侍郎孫在豐曰朕前因廵幸江南見高郵寶應等七州縣積水汪洋民罹昏墊朕甚憫之應行開濬下河疏通海口俾水有所歸民間始得耕種特發帑金拯捄七邑災民屢集廷議兼詢輿情允協僉謀事當釐舉兹命爾前往淮揚所屬下河一帶車路等河并串場河白駒丁溪草堰場等口挑濬事務專屬於爾監修爾宜親身相度多方經畫講求源流脈絡次第興工督率帶去司官等務實心任事毋得怠忽擾害其司道府㕔州縣等官如有違玩貽悞及勢豪紳衿妄行干預包攬生事阻撓工程者指名叅奏爾受兹專委須竭忠盡力悉心區處速竣大工使海口疏通水消田墾蒸黎復業以副朕救民之至意如因循怠忽虛費財力責有攸歸爾其慎之又諭司官鄭都等曰爾等雖經部院辦事但治河非所熟練今將爾等差往必當同心協力務期有成毋得各執己見侍郎孫在豐將應修地方派與爾等須各遵所派料理不得圖易辭難互相推諉十二月丙寅監修下河侍郎孫在豐等疏言請敕河臣遇水勢稍減即將滚水壩盡行閉塞以便開濬下河上諭大學士等曰頃郎中鄭都至京奏稱伊回時即興工挑濬下河朕諭云此事恐未能即便興工今孫在豐等果如此具題其不能與靳輔抗明矣今若不閉塞滚水壩等口則下河一面挑濬上河一面放水何日方有成功若即閉塞日後運河潰決則靳輔借以為辭欲籌兩全之道實為甚難然靳輔前曽啟奏築隄以束下河之水使之歸海此疏内有無閉塞滚水壩等口之語爾等即㑹同九卿詳看如向欲閉塞今孫在豐修理下河又云不可閉塞可乎是日大學士等㑹同工部奏請令靳輔孫在豐來京其滚水壩等處應否閉塞二人各陳己見恭候皇上裁定上曰此下河決宜開濬斷不可止孫在豐不必令其來京堵塞隄閘之處孫在豐何敢輕言若日後上河潰決渠能任其咎乎孫在豐所請不過上河不放水耳假使靳輔治理下河不塞水口能於巨浸中從事乎令靳輔為之必欲閉塞諸口今孫在豐為之又云不可豈非有阻撓之意耶著靳輔來京朕面問之康熙二十七年戊辰三月壬午上諭九卿等曰朕於河務留心甚久崔維雅所呈治河書亦曽細閲其勢必不能行即彼所云自蕭家渡直開至清口日用夫七萬期於五旬告成朕思夫役安得如許之多即夫役可得而飲食柴薪之類從何運濟此說於理難通朕未之信也屯田害民朕已洞悉各省民田未有不溢於納糧之額數若以餘田作屯按畆定額豈不大擾民乎屯田不行無可復議至下河作何開濬重隄應否停築爾等公同詳酌確議具奏四月庚申上命兵部尚書張玉書等勘閱河工諭之曰前于成龍奏稱靳輔開中河無所裨益今凱音布等往勘中河奏稱中河内商賈船行不絶若塞支河之口則駱馬湖之水匯流中河水勢既大漕艘可通數年以來河道未嘗衝決漕艘亦未至有悞若謂靳輔治河全無裨益微獨靳輔不服朕亦不愜於心矣且黄河自宿遷以下衝決猶可修治若宿遷而上或致泛濫則為害甚大今據凱音布等奏稱中河所行漕艘慕天顔勒令退回支河之口不許閉塞如此阻撓深屬可惡著即行嚴訊問誰為唆使則實情畢露今遣爾等往閱河工務將毛城舖高家堰等地方徧閱就靳輔所修築之處其甚善而斷不可改者有幾不善而應更改者有幾詳悉商酌定議以聞至靳輔言黄河沙底漸高此斷不可信譬之盆内貯水遇風尚且溢出使黄河沙底果高一有風濤其有不漫溢横流決隄潰岸者乎五月癸酉上諭兵部尚書張玉書等曰往閱河工凡是非可否當秉公陳奏不可推諉朕聽政二十餘年閱厯世務已多甚慄慄危懼每遇事必慎重圖維詳細商確而後定厯年所奏河道變遷圖形朕俱留内時時看閱朕素知河道最難料理從古治河之法朕自十四歲即翻復詳考如宿遷以下高家堰等處運河朕所深知爾等皆國家大臣此係公務非一已之事若果有異災大水隄岸衝決亦非爾等所能保爾等但據現在從公詳閱將情形大畧先行陳奏看畢之後再行具疏奏聞康熙二十八年己巳正月辛卯上閱視中河至支河口下馬坐隄上出河圖指示扈從諸臣及江南江西總督傅拉塔河道總督王新命漕運總督馬世濟等諭之曰河道關係漕運民生若不深究地形水性隨時權變惟執紙上陳言或徇一時成說則河工必致潰壊且就目前觀之修治此處似乎有益將來且連彼處受害矣朕雖屢遣大臣來視而河工是非終無定論朕夙念河道頻壊羣黎屢罹災害因詳閱河圖不離左右故地方隄岸河形朕衷深晰今朕躬特來觀閱試以朕意言之朕觀此河陿隘逼近黄河之岸且自徐州北鎮口閘所出黄水及㣲山湖荆山口之水俱歸内運河必流入中河駱馬湖之水亦入此河若遇霪潦之年水勢愈漲萬一黄隄潰決失於防禦中河黄河必將混而為一此中河開濬後小民商賈無不稱便者蓋由免行黄河一百八十里之險耳然此論徒知目前小利又安識日後長久有利無利也又諭曰若重載與回空之船竝行則中河窄狹且逼近黄河朕意猶以為可慮鎮口閘微山湖等處水大可仍開支河口其黄河運道原自不廢仍竝存之康熙二十九年庚午三月丁巳上諭大學士等曰南旺湖之水自來流入運河朕去歲南廵回鑾時沿隄而行細閱河勢知南旺湖之水至分水龍王廟分流俱入南北運河當日始建隄岸之人經營甚善今若使南旺湖之水盡入北流則南運河將至水淺矣可傳從前勘河諸臣及靳輔問明回奏四月戊寅上諭倉場侍郎凱音布原任河道總督靳輔等曰山東河道自分水龍王廟以南流入運河之水不一而足舟行無阻分水龍王廟以北匯入運河者惟河南衞水而已並無别渠相濟南旺所蓄之水又不能多常致淤淺阻滯今將駱馬湖之水不令其自禹王臺流入沭河俾駱馬湖之水蓄貯無洩於運道有無禆益至駱馬湖與南旺等湖相距地勢高低如何山東東阿縣之鹽河及别河有可通入運河者否河南衞河之外有别河可以疏入運河者否爾等訪其地諳練之人委曲諮詢若有可措施之處親加詳閱繪圖來奏康熙三十一年壬申十一月戊辰工部等衙門議覆河道總督靳輔疏言於黄河兩岸栽柳種草設立涵洞應准行至挑濬河溝引水淤墊隄下積氷之處又引水淤墊邳州低窪之處應令該督詳議具奏上曰引黄河水内灌使淤平窪地雖云有益朕斷不肯輕信黄河水勢危險倐爾彼處深此處淺倐爾船被阻淤水勢變遷無定不獨黄河為然即如渾河之水數十年前其流尚在南苑中未幾漸徙而南在蠡縣村落間猶去南苑未遠今則分為二支一支出新安一支出霸州其流愈遠矣朕曽聞土人云元朝欲引渾河之水通京師而未果想亦有所難行耳黄河水勢湍迅欲引黄河内灌使淤平窪地事屬危險難保萬全不准行康熙三十三年甲戌正月己未上諭大學士等曰于成龍面奏雲梯關以下至海口因水勢散漫以致沙漸淤長朕思海口為黄河入海之路海口水勢迅急方能刷沙河水乃得順流此為緊要所當疏濬者也十月甲寅工部等衙門議覆河道總督于成龍疏言高家堰三官廟周橋大壩一帶隄工所關甚鉅土隄易為水勢衝壊請改建石隄以為永久之計并請於近隄開一小河運送工料應如所請上曰修此隄工所需之石從何處取辦應用此隄關係緊要必須修築堅固方可無虞朕聞洪澤湖昔日俱係民田因高家堰築隄淮水泛溢遂爾成湖彼時之民未必不怨今高家堰隄理應修固但需用石料浩繁若運辦不得法恐致累民雖動正項錢糧給價募僱然地遠工繁或仍派於民減給工價亦未可定朕前南廵觀覽此隄極為緊要惟恐擾民故爾躊躇必詳悉籌畫方可舉行至開運料小河九卿所議殊未明白河道關係甚大朕從十五歲即為河道憂慮今欲開小河必指高家堰相近之處往年靳輔亦欲於高家堰另築一隄於中浚小河令從兩隄間通流運送工料九卿以兩隄之間浚河則舊隄兩面受水衝盪議不准行今于成龍請開運料小河即靳輔欲開小河之處若將此開濬勢必引入洪澤湖之水浸潤衝刷兼之湖水泛溢河水盈漲高家堰斷不能保況修隄土石竝非高郵等處所出與其於小河以小船載運何如即由洪澤湖以商賈大船載運耶康熙三十五年丙子九月辛酉先是上以淮黄交漲遣户部員外郎綽竒往閱黄河水勢至是回奏中河北岸之隄未遭水患其水已減六尺上諭大學士等曰向朕逆料中河北岸之隄最為緊要定須堅固因命靳輔于成龍加意修治是以雖遇大水得無妨害若此隄一決不可言矣厯年之水無有大於今歲者此番無害則似可永固黄河之水從雲梯關入海雲梯關沙漲壅塞水每為其所阻以致退流河隄不能捍禦因而衝決今將淤泥挑濬河道加深所以水得通洩其利普矣康熙三十六年丁丑正月甲戌江南江西總督范承勲河道總督董安國等疏言臣等㑹勘河道自永安以至邳宿二州閻王廟一帶亟宜修築上諭大學士等曰河道事務關係甚大不可遲延俱著依該督等所奏速行修理雲梯關乃海口要地此處淤沙深濬則黄河入海不致阻滯著總河毎年遣才能河員專理毋致壅塞康熙三十七年戊寅七月乙未工部議覆漕運總督桑額等疏請開濬下河應准行上諭大學士等曰下河入海之處朕雖未及親覽嘗聞人云鹽城一帶地極窪下海水反高建閘無益倘河高海低水性趨下雖不疏濬勢必決開一道以歸於海明代於海口設閘遇河水高則啟閘以注諸海河水平則閉閘以禦海水前雖特令于成龍凱音布修治毫無裨益今桑額居官雖優但此事非親身閱厯加意推詳者難以懸擬必深悉水性洞徹地形之人方可定議爾等問九卿并淮揚等處人在朝者確議具奏己亥大學士等奏開濬下河九卿及在朝淮揚人等俱言開濬有益上諭直𨽻廵撫于成龍曰爾意若何于成龍奏姚二沿船厰蘆壩等河若行挑濬於民有益上曰朕幸五臺山回欲觀渾河清河因由霸州而來朕意渾河清河俱匯流霸州城南原欲沿河修築隄岸不意至霸州詢地方百姓據云渾河原經固安縣後因遷徙匯合清河流至霸州二河水勢浩大以致泛溢為災朕遂一從民言於固安縣開河事乃有成朕竝不固執己意爾等為總督廵撫者能如朕之不固執乎然此河道甚短易於修治南省地形窪下水勢浩瀚難於修築不比此河今若挑濬姚二沿等河爾果能保與民有益否著桑額與總督廵撫㑹同確勘定議具奏十一月乙酉上諭大學士等曰開濬下河民生攸繫朕為閭閻疾苦深切軫念曽命凱音布孫在豐于成龍王新命等專司開濬伊等俱奏工程告竣民生大䝉利益載在冊籍存部可考人亦俱在可以質詢也由今觀之止是虛糜國帑水勢竝未消減田畝竝非涸出所謂有益民生者果何在耶今桑額又奏當行開濬而九卿竝不詳詰從前開濬諸人亦不稽考冊籍遽議准行如果此次開濬巨浸全消疆理盡復民生得濟朕即如其所請疏鑿開濬而桑額等能保水即消田即出有裨於民乎御史吴甫生亦以此事條奏可并發九卿詳詢前此督濬者復稽考諸册籍確議以聞十二月辛丑朔上諭河道總督于成龍曰聞淮揚河水泛漲清江浦百姓所居之地皆已被水夫洪澤湖實黄河之障湖水强盛力可敵黄則黄水不得灌入運河今淮水勢弱不能制黄全注運河黄水又復灌入且兩河相距甚近清江浦地處其中其一帶地方受泛溢之水勢所必然惟淮水三分入運七分歸黄運道始安是日上諭大學士等曰朕昔年廵視河工曽至大墩隄歩行十五里詳加閱看今寰宇昇平海内寜謐惟河工關係運道民生朕數十年來夙夜縈懐留心研䆒故河道情形熟悉已久總之上流既理則下流自治矣桑額所奏開濬下河一事朕不即允行正是有益於彼桑額固居心平和為人誠實然遇事不免遲鈍易被人欺如此紛繁事務何以責其成功于成龍屢委以事尚克勉効河工事情緊急與于成龍敕書内須入各部不得掣肘之語使得相機料理庶不悞事河務浩繁于成龍年已漸老且一身難以兼顧奉天府尹徐廷璽曽任河工尚屬諳練著令前往協理河務康熙三十八年己卯三月庚午朔上廵視高家堰等隄諭大學士等曰朕留心河務體訪已久此來沿途坐於船外審視黄河之水見河身漸高登隄用水平測量見河較高於田行視清口高家堰則洪澤湖水低黄河水高以致河水逆流入湖湖水無從得出泛濫於興化鹽城等七州縣此災之所由生也治河上䇿惟以深濬河身為要諸臣竝無言及此者誠能深濬河底則洪澤湖水直逹黄河七州縣無泛濫之患民間田産自然涸出不治其源徒治下流終無益也今朕親閱下河通海之口及射陽湖一帶填淤之處于成龍所帶効力人員甚多可作速分委并力開濬蓄積之水倘能稍洩庶幾有益至於黄淮二河交㑹之口過於徑直所以黄水常逆流而入今宜將黄河南岸近淮之隄更迤東長二三里築令堅固淮水近河之隄亦迤東灣曲拓築使之斜行㑹流則黄河之水不至倒灌入淮矣再河流不迅急無以刷去河底之沙朕詳加諮訪河直則溜自急溜急則沙自刷而河自深宜於清口西數曲灣處試行濬直如直濬有益漸將上流曲處歲加直濬庶幾黄河之險自除而河底漸深洪澤湖之水漸出七州縣之水患可漸息矣清口應修之處著于成龍等繪圖呈覽是日上諭漕運總督桑額河道總督于成龍協理河務徐廷璽等曰朕念河道國計民生攸關親行廵幸由運河一帶以至徐州迤南細加看閱見黄河底高灣多以致各處受險至歸仁隄高家堰運口等處見各隄岸愈高而水愈大此非水大之故皆由黄河淤墊甚高以致節年漫溢若治河僅築隄防不將黄河刷深終属無益且運口太直黄河倒灌兼之湖口淤墊以致清水不能暢流各河與洪澤湖之水如何能敵黄水若將清河至惠濟祠埽灣由北岸挑引從惠濟祠後入河而運河再向東斜流入惠濟祠交滙黄水自然不倒灌矣朕欲將黄河各險工頂溜灣處開直使水直行刷沙若黄河刷深一尺則各河之水淺一尺深一丈則各河之水淺一丈如此刷去則水由地中而行各壩亦可不用不但運河無漫溢之虞而下河淹没之患似可永除矣且攔黄壩灣曲馬家港窄狹雖將時家馬頭之口堵築而淮水不能暢流山陽南岸韓家莊等處險工甚屬可虞今應將清口之西壩臺添挑水壩比東壩臺加長包裹清口在内擇洪澤湖水深之處開直成河使湖水流出黄河灣曲之處直挑引河使各險處不得受衝至於下河現有積水不得不引出歸海將串場河射陽湖蝦鬚沙溝一帶挑通引積水流出歸海攔黄壩應行拆毁時家馬頭決口俟黄水流定汰黄隄築成之日再行堵塞至歸仁隄之建專為毛城舖等處水漲衝決於此攔回仍歸黄河之意此隄亦應酌量修築爾等務必將各州縣水災盡除方不負朕南廵救民至意若挑挖引河原有工程仍照舊令各官修防不可怠忽俟引河工竣黄水歸入故道再將下河串場河射陽湖蝦鬚沙溝一帶挑通引積水流出歸海而河道永無衝決矣庚辰御舟泊新豐諭河道總督于成龍曰朕自淮南一路詳閱河道測算高郵以上河水比湖水高四尺八寸自高郵至邵伯河水湖水始見平等應將高郵以上當湖隄岸高郵以下河之東隄俱修築堅固有月隄處照舊存留有應修隄岸仍照舊隄堅築至於邵伯地方因無當湖隄岸河湖合而為一不必修築隄岸聽其流行高郵東岸之滚水壩涵洞俱不必用將湖水河水俱由芒稻河人字河引出歸江入江之河口如有淺處責令挑深如此修治則湖水河水俱歸大江各河之水既不歸下河下河自可不必挑濬矣甲申上諭大學士等曰朕廵閱河道將高郵州之湖與河水比量河水高四尺餘夫湖水既低四尺有餘縱水長一丈亦不至泛越且湖水亦斷不至高長丈許朕意欲暫留毛城舖高家堰等處減水壩將高郵州以北減水閘壩盡行堵塞高其東岸隄防修築堅固使在西之水不得泛越則下河之水歸海而河道湖身皆出其時作何導濬再行定奪至於邵伯以南河湖合流奔江歸海想不至於衝決其他處河道朕亦可保無虞獨黄河工程尚難決定相其形勢當緩圖之七月庚午上諭河道總督于成龍曰朕觀河圖緊要應修者兩處前在南方曽面諭爾將人字河芒稲河急行挑濬聞至今尚未動工甚屬遲悞又河圖内歸仁隄便民閘等口俱已堵塞毛城舖迤下各口尚未堵塞既將便民閘等口堵塞則毛城舖等口所出之水由何處洩出必致散漫各處民大受害此處關係緊要宜速議奏聞九月戊申上以于成龍所繪河圖示大學士等諭之曰今四海太平最重者治河一事朕前廵視知水之不治皆由洪澤湖水勢甚大既不能洩又加黄運兩河合并勢愈浩瀚以致泛溢昔時原有歸仁隄遥為捍禦此法最善今已淹没不可考靳輔則築減水壩名為減水而四處奔瀉漂決甚多彼但顧上河而不顧下河水何以治朕意惟有導河稍北使彼不得侵入清水而疏洩洪澤湖使之下流全用清水以刷沙淤如此則水自無不治矣今歲南廵見黄河逼近清口黄水倒灌以致淤墊洪澤湖水不出自高家堰減水壩流入高寶諸湖自高寶諸湖流入運河以致下河田地盡被淹没淮揚所屬錢糧雖頻年蠲免賑濟動帑修理隄岸羣黎尚在水中朕深為軫念遂諭于成龍將洪澤湖出水隄岸令速完工近差工部官員往看清口仍然淤墊洪澤湖水仍未出口隄岸尚未告竣清口甚為緊要如不將清口挑濬湖水不出高家堰并運河隄工雖加高厚均屬無益爾等㑹同九卿詹事科道詳閱河圖速議具奏癸未上諭大學士等曰原任河道總督董安國所濬引河及挑水壩著發正項錢糧修理給事中張睿條奏中河之水由仲莊閘口流出直射湖口故不但清河水難出即黄河之水反易流入所言甚是于成龍疏内竝未叙及朕觀于成龍但以修隄為要務若朕意則以決出清河之水為是爾等再議著于成龍親至仲莊閘詳視議奏甲申上諭大學士等曰朕撫御寰區愛養兆民務期人各得所比年淮揚所屬地方罹於水患百姓田廬俱被淹没生業蕩然深切軫念屢經蠲租賑濟乃黄河墊高清口低下淮水不能流出百姓仍被水災念此淮揚數州縣生靈豈可不急為拯救乎今或堅修高家堰隄岸以束淮水使之刷黄或移清口於清江浦之左右或另濬河道以通舟楫俱宜一一講求此事關係甚鉅爾等㑹同九卿詹事科道細閱河圖詳議具奏十一月乙巳上諭大學士等曰于成龍奏稱清江浦西界黄水高於淮水一尺淮水高於運河之水七尺運河之水高於平地七尺合而觀之淮水高於運河西隄外平地共一丈四尺今惟以清口自河之下流沿武家墩由清江浦之北另行改移中間河身量留八九十丈空地兩旁堅築石隄俾清水暢逹此所當急議者夫清水建瓴迅下則易出黄水不致倒灌其石隄之間已為河身不煩挑濬即水漲之時其高不過等於運河安能泛越高家堰哉但如是改移朕恐别有所礙不能永遠故少為躊躇耳爾等確議具奏是日工部等衙門議覆河道總督于成龍疏言挑挖爛泥淺等處及速完高家堰隄工應如所請上曰河工關係甚大高家堰隄岸縱多方堅築清水亦不能出今惟當議移清口於他處兩岸俱用石工堅砌使清水流通朕南廵時曽以另開清口面諭于成龍彼亦奏稱淮水可從武家墩向清江浦移改此事著河道總督于成龍及府尹徐廷璽㑹同河道各官親看清口當移於何處即行詳議於歲前具奏丁未上諭大學士等曰河圖繪於紙上平漫難辨高下朕欲改清口刻木製成一圖觀看易明著侍郎常綬前往河工㑹同于成龍清口應否改移詳加看閱歲内著速回具奏十二月辛巳奉差勘閱河工工部侍郎常綬等回奏上諭大學士等曰據于成龍等之意以為改移清口清水固易宣洩遇水泛時新修隄岸難保無虞必將高家堰減水壩盡行堵塞而加築之始有禆益洪澤湖原係陸地於此處築隄蓄水與山東嶧山湖南旺湖相同大水之年納之以蓄水大旱之歲出之以助運彼時河身窪下故洪澤湖水一則敵黄一則濟運今歲久沙壅黄河底墊不但黄水反高於清水清水勢不能出而黄水復致倒灌於是洪澤湖底亦漸淤墊高地丈餘水面上浮矣此清口所以淤塞也爾等㑹同九卿確議各陳己見直言勿隱壬午大學士等㑹議河工事務入奏將給事中陳詵以深濬河身為要繕摺呈覽上曰河身宜加深濬人所共知但難得其法耳朕亦留心於此今永定河雖小仿彿黄水欲以水力刷濬之法試之使河底得深十月間往視之時曽諭李光地等令將河身束之使狹堅築兩邊隄岸若永定河行之有效即將此法用之黄河否則另當設法安可輕舉九卿内如有淮安揚州人令各抒所見奏聞侍郎李柟奏曰高家堰之隄一決則淮安揚州一帶難保無虞請將高家堰隄工速加増修上曰洪澤湖之水長勢不得不將高家堰増築待加築高家堰後試觀清水由清口出否至於邵伯衝決之口若不預行修築則明春更可慮矣又諭曰若將高家堰減水壩堵閉建造滚水壩土隄加幫高厚則湖水必高黄水又大湖水不出之時高家堰隄工危險而泗州等處必至水淹爾等㑹同九卿詹事科道確議具奏康熙三十九年庚辰三月丁未上諭河道總督張鵬翮曰海口至清口相隔遼遠今所急者清黄相㑹之處最為緊要黄水高故清水不得通洩曩者高家堰去水尚遠今與培築隄岸相平但令清水何以得出河身何以得深此係爾當圖畫効力者更樓口亦屬緊要所宜速為修竣水老鸛等物靳輔當時亦曽用之毫無禆益此數事爾到任詳察宜作何舉行再為奏聞朕以爾清亷因特簡任所發錢糧仍於河工支用隄岸自然堅固事無不濟矣康熙四十年辛巳七月己丑上諭大學士等曰前河道總督于成龍具疏欲將高家堰六壩堵塞蓄湖水以敵黄水疏通清口因遣尚書范承勲等堵塞六壩頃因廵撫高承爵題報泗州盱眙水災朕敕張鵬翮㑹同江南總督阿山踏勘情形將泗州盱眙泛溢之水設法修治作何賑濟蠲租又以洪澤湖水泛漲高家堰隄工恐致危險作何保守堅固著張鵬翮陳奏乃張鵬翮疏稱泗州盱眙水災自古已然即六壩全開泗州等處亦被水災且六壩既閉高郵寶應等州縣田地涸出民得耕種皆河伯效靈所致朕著張鵬翮㑹同阿山將泗州盱眙泛溢之水作何設法築隄幫修或賑或蠲俱有益於災黎竝非欲開高家堰六壩救泗州盱眙之民而令淮揚百姓罹於水災也朕念黄河運河關係國計民生三次看閱河工屢次簡任河臣修築隄岸每歲不惜數百萬帑金夏月雨水時晝夜憂慮不時遣人看視凡被水之處截留漕米盡出倉糧賑濟總為拯救災黎豈止救泗州盱眙之災而淮安揚州等處百姓聽其罹災乎今現有居住賀蘭山後公雲木春來朝見朕問河西雨澤黄河水勢雲木春奏今歲自正月至六月滴雨未降黄河水消二丈有餘此實因黄河水小清口之水幸而得出竝非伊効力之所致也統一天下之主坐視災黎不為拯救有是理耶十二月庚午上諭大學士等曰高家堰等處隄工雖竣然未遇大水俟來年經過水汛之後方可騐其成功若爛泥淺一帶水出不暢則高家堰䆒屬可憂向意欲從武家墩出水此事尚須酌之前日問張玉書奏稱淮水尚大舊隄俱為湖水所侵此則泗州盱眙安得不被水災河身之淺深以洪澤湖水之高下為騐湖水低得一尺河身方深得一尺今洪澤湖之水比甲子年高有數尺可見河身未曽刷深高家堰之隄恐過此以往尚未可知也大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷三十三
