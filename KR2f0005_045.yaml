body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷四十五飭臣工三康熙三十二年癸酉十二月癸酉上諭翰林院掌院學士傅繼祖等曰翰林院衙門甚屬𦂳要凡翰林官每日作文寫字誦習講究是其分内之事各宜勤勉以盡職掌若有結交不肖牽引妄行遇學差缺出恣為奔競營求者不時訪察題叅康熙三十三年甲戌正月丙辰上諭大學士等曰凡為臣者湏行實事不當沽取虗名于成龍奏稱豁免民夫夫河道工程浩繁能不用民夫而可以集事乎且河道増設一官則民間多一事現在所設官員歴年料理工程並無違悞之處總之河工經理惟在得人不在増設官員也于成龍任直隸巡撫時居官好亦曽効力但為人膽大凡事必欲取勝其所奏之事止徇人情面欲令人感彼私恩夫擢用人才乃朝廷之大權非為臣者市恩沽名所可擅行之事也至於于成龍條奏内修理通州天津一帶河道及培修髙家堰堤亦有當酌議之處髙家堰保淮敵黃甚為𦂳要稍有疎虞則淮安一帶州縣居民田廬皆受水害矣二月壬申上諭大學士等曰設立科道官員特為條奏政事今觀都御史以至科道條奏者少間有條奏者每存私意或將不睦之人欲行傾陷則託辭叅奏此等情弊朕豈不知嗣後科道官員各宜端其心術以有益國家之事條奏爾等可將此㫖傳諭三月丁卯上諭大學士等曰山東巡撫桑額奏所屬積貯米榖並無虧空此前任撫臣佛倫奉行之善也朕巡幸霸州時聞大城縣知縣祖延泰㪚榖賑濟或有富戶冐稱飢民者查岀即將其家所積之榖㪚給貧民因此並無假冐貧民得沾實惠是則奉行之善存乎其人從前總督張長庚屈盡美巡撫白色純韓世琦等居官不善不數年間子孫窮困由此觀之徒貽惡名此輩所貪取者今安在哉且居官果善其光榮自不待言如江南將軍博濟調西安將軍起程之日兵民泣送屈盡美居官不善離任之時地方百姓皆為切齒居官善否舉朝之人及地方百姓自有公論豈能掩飾哉十二月庚戌上諭大學士等曰朕覽福建浙江總督朱𢎞祚大計疏内有閩省地瘠民佻之語豈福建全省之人盡皆佻薄乎原任四川巡撫張徳地署理延綏巡撫時曽奏延安邊地並無可舉博學宏詞之人原任少詹事邵逺平奏南方之人皆輕浮不可用朕思賢才不擇地而生雖深山僻地豈無人材至於南方之人豈盡皆輕浮不可用者二人所言甚不愜於朕心因皆罷斥今朱𢎞祚又以此等謬言陳奏殊屬不合著該部察議具奏康熙三十四年乙亥二月戊戌上諭大學士等曰近觀言官奏事或受人囑託或懐私賣本所奏之事俱非無故如原任侍郎鄭重門生曾任陜西縣令為總督佛倫題叅遂轉囑彭鵬將陜西全省官員俱行叅奏豈有因一人之仇遂叅全省官員之理凡任言官者但宜將關係國家得失民生休戚之事從直陳奏豈可受人囑託懐挾私仇賄賣本章而條奏乎如有此等之人必盡察出正法斷斷不恕康熙三十五年丙子八月辛亥上諭大學士阿蘭泰曰軍士所乘之馬朕早令行察至今尚未具奏部中各官凡事不行速結惟務偷閒入署未乆即㪚歸家偃息如此則政事有不壅積者乎朕聽政三十年夙興夜寐有奏即答或有𦂳要事輒秉燭裁決此爾等所共知也各官果能勤敏諸事何至遲悞可同戶兵二部大臣速行察奏康熙三十六年丁丑正月甲戌上諭大學士等曰觀九卿凡保舉人員非係師友即屬親戚是皆漢人相沿惡習天下官員朕一人何能周知惟左右大臣是賴誠善者善而惡者惡據實敷陳則善者勸而惡者懲矣國家事安有不理者乎况科道乃耳目之官如總兵卓策柯彩許盛居官最為貪鄙朕聞其軍民皆怨乃為懲治前此科道官曾有題叅者否爾等以朕㫖宣諭倘後仍蹈前轍必不寛貸二月甲申上召督運都察院左都御史于成龍等問曰爾等何日起程于成龍奏曰俟効力運米官齊集同行上曰爾此意即謬矣人臣宜以國事為重勤勉自効豈可援引朋𩔖當此軍務𦂳急爾等宜率先啓行餘令陸續隨往若必俟衆同行豈不悮事爾自任巡撫及為總河惟知援引私人其後運米亦仍如此爾在河工曾帶二百餘人前往迄今未用一人欲任意援引得乎爾又云寜殺于成龍至効力人等不可不用此語豈非沽名干譽之意乎朕已屢加嚴飭爾竟不悛何也朕於國家之事未嘗膠執已見惟虗己以視機宜即用兵之道亦復如是一日之中千變萬化朕統大兵至克魯倫時亦視賊之形勢隨機而應竝不豫立己見孔子云毋意毋必毋固毋我聖人之言至當不易爾惟執己見前此運米已因待衆悞事今又欲俟衆同行此意不過欲扶助黨𩔖令其感激耳用人之權豈人臣所得專擅朕今用人若有保舉官員亦必就中論俸陞補即素所深知者亦視其効力之處酌量用之否則俱使論俸朕乃天下之主用人之際尚不肯任意為人臣者乃妄意自擅可乎大抵欲援助人者後必自已獲罪爾其戒之閏三月辛卯上諭陜西督撫提鎮等官曰朕宵旰勤民慮周遐邇縁向來巡幸未經親莅邊境頃特濟河而西循秦省沿邊地方延覽風俗諮詢疾苦見所在兵民築土屋以為居耕砂磧以為業生聚之計甚屬艱難朕惻然於衷軫念弗釋因思兵民倚賴全在將吏而將吏之表率惟督撫提鎮是視誠使督撫提鎮實能正已澄源則所屬守職奉公禄足自贍必無朘削兵民之事若積習相沿濫受屬員私饋因而所屬官弁節次求索取償於下文則加徵無藝武則侵扣月餉勢不至於厲民剥兵不止如此而欲冀其疾苦日蘇生聚日盛烏可得乎夫秦地俗尚素稱簡樸邊方士卒尤屬精鋭總視撫馭得人斯於兵民胥益朕自駐蹕寜夏特召該省督撫提督總兵官以下官員凡在鎮城者俱賜宴行宫面加諄諭無非期望文武大吏董率屬員以仰副朝廷愛兵恤民至意自今以後爾等其益體朕懐交相砥礪文官皆習知民事豈身作官吏不恤百姓之依武職多出身行伍豈甫為將領遽忘軍士之苦上官克謹廉隅屬吏各遵法紀馴至比屋殷阜列戌飽騰則兵民皆得其所而爾等亦與有休寵以視厲民剥兵身名俱隕者孰得孰失爾等其敬念之康熙三十七年戊寅正月壬寅上諭湖廣總督李輝祖河南巡撫李國亮雲南巡撫石文晟浙江巡撫張勄山東布政使劉暟等曰凡居官以實心愛民為主民雖愚終不能欺也果能實心愛民民自知感否則竭力矯飾終難掩人耳目朕在宫中惟以百姓為念督撫身在地方與百姓最親豈可不一心愛民副朕委任之意一省之事全在督撫督撫潔已率屬則府州縣自然遵奉爾等係封疆大臣當自惜聲名自立品望朕巡幸浙江江南陜西山西等處百姓利病俱所深知山陜地瘠地方官略加脧削情即顯露然州縣之私派皆由督撫布按科𣲖所致若止在州縣官則所害者不過一州一縣巡撫與布政使通同妄行則合省俱受其害矣此等人朕㫁不姑容爾等識之康熙三十九年庚辰十月己巳上諭河南巡撫徐潮曰河南火耗甚重當嚴行禁止又聞彼處虧空甚多如何籌畫令無虧空河南連嵗有秋未知積貯何如今天下太平武備不可有懈巡撫有標下兵卒爾從翰林出身武事恐未必留心宜飭將弁不時操練爾撫標操練精强則兩總兵官有不凛然操練者乎康熙四十年辛巳九月庚子上諭大學士等曰朕觀居官之人或優於㣲職至大任則改常者有之今部院堂司官等但求偷安而已並不勤於理事即侍衛亦比前少怠人雖優於辦事若不勤慎亦何益哉壬子上諭大學士等曰朕凡用人皆諮詢諸大臣而後用於諸大臣不信將誰信耶朕聽政四十餘年觀爾諸臣保奏皆各為其黨爾等致位宰輔皆有可否人材之責朕凡諮訪人材當以實對若惟恐結怨不行陳奏何以責人耶康熙四十一年壬午正月癸夘上諭大學士等曰朕觀諸臣任科道時多有敢言沽取直聲以得陞遷者及為大僚輙不敢言問以小吏皆云不知前後何頓不相符耶七月丙辰上諭大學士等曰今之科道糾叅一官舉國皆聞方始入告或有先以疏稿示欲叅之人然後題㕘者或有先告以題叅之意其人不懼然後題叅者若果貪汚理宜叅處倘因私怨以些㣲細故即行題叅事必滋擾矣十月辛夘上諭山東省官員等曰爾等為官以清廉為第一為清官甚樂不但一時百姓感仰即離任之後百姓追思建祠以祀豈非盛事盖百姓雖愚而實難欺官員是非賢不肖人人有口不能強之使加毁譽爾等各宜自勉十一月丁巳上諭大學士等曰近見各部院衙門所辦事件有錯悮者惟恐事情覺露専務隐匿不行檢舉朕總理萬幾亦止詳識𦂳要事務安能逐事一一記之各部院檔案繁多勢不能無舛錯遺漏或有舛錯遺漏而即自行檢舉則其過猶為可恕若懼罪隐匿不行檢舉則事必終於舛錯貽悞甚大爾等將此㫖𫝊諭各部院滿漢大臣知之康熙四十二年癸未正月丙寅上諭大學士等曰齊世武自授甘肅巡撫所屬各官俱被叅劾署事竟至乏人其中有初任者亦有他省調補者果有不法自當叅處若止小過則懲戒可耳二月丁亥上諭大學士等𫝊諭偏沅巡撫趙申喬曰湖南地方介在邊遠之境聞向來官吏積習相仍無藝私徵種種不一計每嵗科𣲖有較正供額賦増重數倍者有司徴収錢糧加取火耗又視别省為獨重百姓窮蹙不支多致流離轉徙非将宿弊逐一剔除無以砥礪官方大甦民困從前已往諸事姑免察究外爾到地方嚴飭大小屬員痛改前非洗心奉職力減加耗盡革私徴務使流移者復返鄉閭守業者獲安隴畝庻副朕軫念遠省民生至意如仍有藐法不遵重為民害者即據實糾叅從重治罪決不輕宥乙未上諭大學士等曰趙申喬分文不取信然但朕臨幸杭州諮訪百姓言趙申喬好収詞訟民多受累大凡居官固貴清亷尤必和平始為盡善如果好受詞訟刁民興訟即使審理其被訟之人一家産業已蕩然矣如此民何以堪聞阿山亦喜受民詞訟總之為督撫者以安静不生事為貴耳九月丁巳上諭大學士九卿等曰朕因山左災荒勞心殫思屢行諮訪山左嵗歉非止今嵗為然地方官歴年隐匿不報今春朕因閲視河工親見災黎情形始行籌畫賑濟今嵗田禾雖云失望尚有薄収之處巡撫布政使為伊等素有欠缺欲巧圖完補故甚其詞以奏報又夤縁科道紛紛急奏言盗賊蠭起人民相食私冀或開事例或撥銀兩因於其中侵蝕託言賑濟而實欲完補虧空以施鬼蜮之謀也今京師遣往三路賑濟人員俱掣籖𣲖撥州縣並不分成災與否一概散賑遣去人員未奉有稽察諭㫖惟視巡撫布政使所指地方賑濟應将此事交與三路大臣加意稽察至御史李發甲條奏盗賊蠭起人民相食亦當明白詢問如盗賊蠭起必有殺人放火搶奪財物糧米之處與失事之人如人民相食亦必有被傷之人與食人之人如有不實即為巡撫布政使急請設法銀兩而言也大學士九卿諸臣㑹同議奏言官並不實心為民專為巡撫布政使起見不誠可愧乎康熙四十三年甲申正月辛酉上諭大學士等曰朕數巡幸諮訪民生利弊知之甚詳小民力作艱難每嵗耕三十畝者西成時除完租外約餘二十石其終嵗衣食丁徭所恃惟此為民牧者若能愛養而少取之則民亦漸臻豐裕今乃苛索無藝將終年之力作而竭取之彼小民何以為生耶如朕前遣侍衛至鐵索橋掛匾還京回奏彼處督撫餽六千餘兩夫一侍衛而費至此則凡部院司官筆帖式等差遣往來者又不知煩費幾何去嵗所遣祭告諸臣回都朕曽問一二人彼雖飾辭以對然地方所費亦不少矣目今巡撫皆有㢘聲而司道以下何嘗不受州縣餽遺總之此時清官或分内不取而巧取别項或本地不取而取償他省更有督撫所欲扶持之人每嵗暗中助銀教彼掠取清名不踰一二年隨行薦舉似此互相粉飾釣譽沽名尤屬不肖之極至於蠲兔錢糧原為加恩小民然田畝多歸縉紳豪富之家小民所有幾何從前屢頒蠲詔無田窮民未必均沾惠澤約計小民有恒業者十之三四耳餘皆賃地出租所餘之糧僅能度日加之貪吏苛索蓋藏何自而積耶朕比年巡幸七省惟秦晉兩地民稍充裕畿南四府及河南一路殊覺生計艱難山左初次巡幸民甚饒裕繼而少减今則大異往昔矣皆由在外大小官員不能實心體恤民隐為民除弊而復設立名色多方徴取以此民力不支日就貧困科道官職司風紀當一切不避見之敷陳今惟挾仇報復者掛之彈章否則㫁㫁不言或專倚一人藉聲勢而聽其指使然後敢言甚有大言不慚妄自矜誇者考其行事與言迥别子曰先行其言而後從之夫已之言已且不能行徒見之敷陳何益之有三月癸卯上諭大學士等曰部院情弊朕知之甚悉凡部院駮回事件有應駮回者亦有有故而駮回者倘欲實指其事朕並其始末皆能細言之朕日聽萬幾惟據其理而處之以公平㫁不瑣屑苛求但諸臣當自知足知足方不辱也五月壬寅上諭尚書侍郎等曰天下之民所倚以為生者守令也守令之賢否係於藩臬藩臬之賢否係於督撫督撫又視乎部院大臣而行部院大臣所行果正則外自督撫而下至於守令自為良吏矣今工部弊端發露爾等亦知愧否工部之弊朕屢降嚴㫖切責並不悛改以至於此郎中費揚嘏等俱九卿保舉之人仍爾作弊侵蝕河工帑金殊屬不堪堂司官上下扶同但利之所在罔顧身命此何謂也爾等身為大臣誠能彼此箴規有所見聞郎為剖示屬官有品行不端者即罷斥之庻幾無玷厥職今部院諸弊爾等豈果不知但恐結怨於人隐忍不言科道官員亦因彼此掣肘不肯條奏舉劾耳嗣後如有不謹識朕諭仍循故轍經朕察出必不姑宥十一月壬戍上諭大學士等曰徐潮為河南巡撫時居官實好平易得體民無不稱頌之者朕西巡時經河南見州縣司道官内有衰老者朕即酌量革退徐潮亦少過寛耳觀李光地近日聲名較前稍減彼每被人欺誑大凡為督撫者一被人欺誑則權必旁移張鵬翮向有清名在河工亦甚効力但被屬員王謙等欺誑耳身雖不要錢子姪親戚在外指名取錢可謂自己不取耶為大臣者約束不嚴自謂己不之知諉之他人可乎康熙四十四年乙酉四月壬辰上諭河道總督張鵬翮曰爾前因衝決時家馬頭叅佟世禄一案於阿山徐潮勘奏後具疏强辯爾又請開河工捐納抵補事例明係脱缷屬員王謙等凡人既讀書先要辨明公私二字凡事從公起見方可以服人爾之名節闗係固重佟世禄之身家闗係獨不重乎王謙為人刻薄人人怨恨爾却偏信任其恣意妄行以致人心不服爾常云非堯舜之道不敢陳於王前如此行事豈得謂堯舜之道朕非不知爾在河工能任勞苦但聽信屬員流於刻薄從來大儒持身接物當如光風霽月爾平時亦講理學乃一味苛刻嚴厲豈所謂光風霽月乎况大臣受朝廷委任必湏為國為民事事皆有實濟若徒飲食菲薄自表廉㓗於國事何益耶十二月庚戌上諭貴州巡撫陳詵曰貴州地小易治雖有苖人亦無他事但以文武和睦安静不生事為要清官多刻刻乃清官不足處屬吏貪汚固當叅劾其居官平常者則湏教誨之邊地原苦為大吏者不可見才若生事顯才便非正理爾切識之康熙四十五年丙戌三月丁亥上諭盛京戶部侍郎董國禮工部侍郎席爾圖曰前因盛京衙門事務每至遲悮是以朕自京選擇大臣補授今聞官員辦事不勤爾等可往嚴察使朝參習射諸凡公事及圍獵不得有悞倘或不嚴朕有所聞爾等亦不能免罪七月丁巳上諭大學士等曰朕自親政以來㫁不許人懐挾私讎互相䧟害是以三四十年間無大臣懐私互訐之事此一事朕心頗以為善凡誣䧟人及攻城屠戮人者縱使其身倖免於禍子孫㫁乎不昌近觀貪官受報亦復如是從前督撫如屈盡美韓世琦白如梅賈漢復張長庚等皆以貪故其子孫極貧困不能自存或有學道考試不公而所生之子凡書讀過即忘并有瘖啞者天道甚可畏也前次考試時有朕所素知之人與考朕恐使人知之則必取中故不以告人凡人功名所繫去取但欲其秉公耳朕尚以孤寒抱屈為念試官何不一計及於此乎己卯上諭大學士等曰侍郎穆和倫人不甚惡但性執拗耳朕聽政四十餘年何人不知何事不歴似此執拗之人倘有大事必至貽悞而伊身亦罹禍矣昔經略莫洛於事敏達而騎射亦優人材壮健但偏執己見莫洛欲率伊所招緑旗兵丁進𠞰其時王輔臣諌云召募之人不可信用莫洛言我所用之人有負我者乎朕所遣訥爾泰亦在彼力勸阻之莫洛謂訥爾泰童穉何知不聼與莫洛同行之員外郎薩哈連馳報至京朕謂之曰汝速往諭經略㫁不可輕率兵前進進必有變莫洛執意欲行至寧羌州地方王輔臣標下官兵鼓譟莫洛遂身被其害于成龍亦妄帶人至河上自謂所帶之人斷不負彼而信用之後皆貽悞朕往閲南河在御壩上朕親指示赫碩色令在此地下樁築堤乃過三季不築而河工皆不可問矣以此治赫碩色之罪後張鵬翮到任並無别項効力但遵朕所指急速築堤而河工告成既築此堤有利於民衆民咸喜名之曰御壩故凡執拗輕信之人未有不悞厥事者也乙酉上諭福建陸路提督藍理曰福建近海關係𦂳要曩時諳練海戰者猶有其人今則寥寥矣且天下承平日乆人皆貪於逸樂若不時加訓練萬一有事欲令其舍命冒險難矣爾當小心約束勤於操練務期兵民輯睦又諭天津總兵官師懿徳曰天津地方近在京師昔趙良棟為天津總兵官時甚善爾但以為法足矣爾年既壮人材亦健但當以驕傲為戒使無誤公事十月庚寅上諭武殿試讀卷官等曰凡人必耐得勞苦乃能有成不耐勞苦到處無用不但武臣為然即文臣若不勞苦學問如何成就今爾等二三老臣年雖高而勤勞實甚觀部院官止圗安逸凡事俱不經心至於㑹議時九卿内但一二人立議餘皆隨班畫題竟少諳練事務之人矣十一月壬午上諭江南江西總督邵穆布曰朕知爾平日敬慎敬慎則何事不可為凡事不可遲緩若事乆則弊生惟勤敏則事不壅積矣康熙四十六年丁亥三月戊寅上駐蹕松江府城内令地方各官俱近前諭曰江南錢糧既多火耗雖輕飬贍家口㫁無不足清乃居官之常清官每多殘酷清而能寛斯為盡善六月乙巳上諭大學士等曰今部院一切公事堂官司官筆帖式逓相推諉皆不㽞心部院官員當以敬愼廉潔矢之於心勉勵不怠朕尚不憚勤勞朝夕與諸臣商確政事伊等可圖安逸乎大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷四十五
