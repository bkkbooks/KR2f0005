body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷五十三𢎞制度康熙十六年丁巳三月甲午上諭禮部凡遇慶賀盛典朕率諸王大臣詣太皇太后皇太后宫行禮班行齊集不可無監察之人應設監察御史在慈寧門外及永康左門外侍儀康熙十八年己未十一月壬辰朔吏部以内閣學士員缺請補上曰著原任學士徐元文補授朕觀内閣學士與翰林學士行坐前後皆論衙門但翰林官亦有從内閣調用者嗣後行坐班次以進衙門先後為序康熙二十年辛酉十月丁未上諭兵部凡馳遞軍機轉輸兵餉所闗綦重刻不容緩今造修鐵索橋恐稽遲時日聞盤江可造浮橋貴州廵撫楊雍建速行監造浮橋其鐵索橋俟錢糧充足之日該督撫題明動支正項錢糧修造康熙二十三年甲子二月庚戌上命郎中博竒等赴烏喇設立驛站諭之曰此係創立驛站之地闗係𦂳要爾等會同彼處將軍副都統詢明熟識地方之人詳加確議安設凡在驛人役及馬匹牲畜需用之物并所食糧米今嵗耕種不及須計及明年加厚料理倘過於儉嗇食用諸物或至匱乏爾等宜從長計議使其久逺可行毋得狃於目前之見草率完事十一月辛卯上諭大學士九卿等曰凡齎詔官員及出使大臣御前侍衛等凡係經過地方各官接見應有定體至部院衙門差遣筆帖式等或有不肖之人要挾地方官以請安為名恣其需索外吏疲於供應致累小民奚以堪此且此等㣲員何由自逹於上而有請安之舉甚屬非體應行禁止康熙二十四年乙丑九月丁丑上諭大學士勒徳洪曰朕近觀正陽門牌樓原基甚深若將街衢掘至原基兩傍房屋皆在浮土之上難以久存而於觀瞻亦不相稱且所掘之土運於何處至濬治䕶城河若積土城下遇雨水流入河内旋至淤塞在鑿河掘基需用帑金尚屬小事但慮興作無益應何法挑掘何方貯土爾等會同八旗都統副都統及各部院大臣歩軍統領詳閲街衢議奏十一月甲戍上諭大學士等曰王等皆用紫韁乗騎或以紫韁濫給微賤之人乗用又其甚者遂至給與外省官員商賈等輩不待敝壊而更新騎用者頗多大悖儀典良由未經定例以至於是王等既束用金黄帶若騎用金黄韁則不得妄給微賤而等威辨矣其令宗人府禮部會同定例議奏康熙二十六年丁卯十月乙亥漕運總督慕天顔疏言江浙漕運過江間遇風濤應設法救䕶查民間有渡生船甚為有益請倣其式造船十隻分泊兩岸漕船遇風並出救䕶部議不准上曰朕南廵時親見京口與瓜洲對峙往來過渡人等所關甚重預備船隻拯救沉溺多有裨益此渡生船隻令如該督所題行康熙三十一年壬申九月乙丑九卿議覆陜西廵撫布喀疏奏湖廣運至陜西米石其斛與部頒鐵斛相較微少二合請定畫一查順治十二年鑄鐵斛二十頒給户部直𨽻各省及倉場漕運各一頒給年久應令工部照户部鐵斛造木斛發往陜西上諭大學士等曰湖廣之斛較西安之斛止少二合無甚差别此或小人量米時搖撼所致前將此事詳問馬齊熊賜履但以謹權量成語啟奏于成龍亦以斛之大小不同啟奏由此觀之九卿未諳原由可再問之又諭曰斛之大小不同皆由以尺寸較量故致舛錯須以斛内所容之物為準方能畫一然但視所容之米糓尚有虗浮亦不足為準若精而推之或水與水銀始能符合今所用之斛皆屬參差順治十二年已將鐵斛頒發各省今又另造木斛頒給所議含糊著再議以聞康熙三十三年甲戌十二月壬子上諭大學士等曰武官品級比文官品級甚大武官於行間効力果有功績品級自宜從優今武官品級太過宜作何裁定爾等查議具奏康熙三十六年丁丑六月己巳上諭兵部漢軍兵内懦劣甚多安肯勤養馬匹朕行軍以來知滿兵精銳臨陣驍勇較漢軍相去逺矣應將漢軍鳥鎗兵裁革滿洲鳥鎗兵増補其官馬俱撥給滿洲旗分十一月丙戍上諭大學士等曰嗣後凡遇行兵以武官委署户部兵部總尉之例著永行停止可將二部司官特行派遣戰勝敘功之時伊等不得與如此伊等即可作明證諸事自從公料理將此交與該部著為定例康熙四十一年壬午十月丁酉上諭直𨽻山東廵撫總兵官等曰凡御前奉差之人及皇子諸王公主經過之處地方官理宜迎接請安至於部院衙門差去審事司官及筆帖式回京之日豈盡人人面奏地方官於彼過時跪請朕安無謂甚矣此乃不知禮之人創為此例衆人請安則一人不敢獨異且逺省陛見之官經過而近省之官反行迎接請安尤為非禮督撫等欲請朕安具摺奏聞有何不可又或有假充御前之人在外生事許地方官即行拏解此後如有部院衙門差去審事司官及筆帖式或織造往來或文武官進京陛見者迎接請安之禮其永行禁止康熙四十三年甲申六月戊子上諭大學士九卿等曰直𨽻各省民間所用斗斛大小迥然各别此皆牙儈評價之人牟利所致又升斗面寛底窄若稍尖量即致浮多稍平量即致虧少弊端易生職此之故嗣後直𨽻各省斗斛大小應作何畫一其升斗式様可否底面一律平準至盛京金石金斗關東斗亦應否一併畫一爾等議奏十月癸未上諭大學士等曰天之一度即地之二百里但各省地里有以大尺量者有以八寸小尺量者畫地理圖稍有不合者職此故也户部呈様之斛與升斗朕俱注水詳加測量其様升上下四角寛窄不匀算積數見方得三萬一千三百八十二分有零其様斗上下四角寛窄亦不匀算積數見方得三十一萬六千七百六十四分有零其様鐵斛算積數見方得一百六十萬分其數不相符查性理大全嘉量篇第十二内每斛一百六十二萬分與今之鐵斛較多二萬分因鐵斛用之已久不可輕改是以依今之鐵斛五斗為準造新様斗一具方徑八寸深五寸積數見方得三十二萬分又造新升一具方徑四寸深二寸積數見方得三萬二千分若依此様十升一斗五斗一斛毫釐不差因出新様銅斗升給户部照式以鐵為之康熙四十九年庚寅正月辛卯上諭禮部今日祈穀壇見正卿噶世圖帽頂上嵌東珠二顆御史亦俱嵌東珠伊等有何功勞僭分至此御史有查叅他人之責何可自行僣越况今攜紅坐褥甚多凡加級自有定例豈可任意擅用禮儀係爾部專責應嚴加查禁又諭曰官員頂帶不許踰品惟一品官員帽頂應嵌東珠大學士尚書等俱係大臣職任亦大㡌頂亦應嵌東珠此外官員加級則帽頂嵌紅寶石可也康熙六十年辛丑十月壬戍上諭大學士等曰福建總督廵撫提督俱奏請臺灣添兵朕意添兵無用也臺灣地方水師營著副將一員兵二千名駐劄陸路營著副將一員兵二千名駐劄水師有事陸路可以照應陸路有事水師亦可照應其臺灣總兵官移於澎湖亦著兵二千名駐劄令其管轄均有禆益至駐劄之兵不可令臺灣人頂補俱將内地人頂補兵之妻子毋令帶往三年一換每年自京派出御史一員前往臺灣廵查此御史往來行走彼處一切信息可得速聞凡有應條奏事宜亦可條奏而彼處之人皆知畏懼至地方事務御史不必管理將此㫖傳示九卿康熙六十一年壬寅三月乙未上諭大學士都統副都統等曰前因兵丁蕃庶住房不敷朕特降諭㫖多發庫帑於八旗敎場盖設房屋令伊等居住近看八旗兵丁愈多住房更覺難容朕因思鄭家莊已盖設王府及兵丁住房欲令阿哥一人往住今著八旗每佐領下派出一人令往駐防此所派滿洲兵丁編為八佐領漢軍編為二佐領朕往來此處即著伊等看守當差著八旗都統會同佐領等派往大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷五十三
