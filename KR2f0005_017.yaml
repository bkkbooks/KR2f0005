body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷十七武功五康熙三十四年乙亥十月丙申上諭議政大臣等曰𫝊諭沙木巴戴青墨爾根濟農值雨雪時噶爾丹侵掠其疆界亦未可定宜簡發其兵并附近喀爾喀台吉之兵於諸處防守逺置塘哨探聽消息倘有噶爾丹之警敵勢寡弱量力可擊則以其兵擊之若敵勢衆多則設殿後之兵向歸化城內地移營雖退入內地亦不譴責也凡有動靜一面速報歸化城將軍一面奏聞十一月庚辰上諭內大臣等曰用兵之道以賞罰為要今日大閲朕將降敕以昭示勸懲敕曰本朝用兵以來所向無敵野戰則勝攻城則克惟有弓矢劍㦸為用自三逆叛後南方皆水田賊人雖用火器相持而凡遇之敵靡不摧敗朕以故洞悉特立火器製備鎗炮交發八旗由是我朝之神威益震於四域矣今噶爾丹遊魂假息於喀爾喀左近肆行竊掠朕欲一舉立殄是以整理諸路糧餉器械熟計而行是師之舉與昔不同兹爾將卒厮役各當勉力倘遇敵奏凱而還朕必大沛殊恩陳亡者除照常給賜身價外護軍則廕一子為七品官食俸驍騎則廕一子為八品官食俸如無子則照本身錢糧給其孀妻終老所借公庫官銀另加寬恤倘違軍令勿得仍望如前矜宥甲申上諭西路督運光祿寺卿辛寶內閣侍讀學士范承烈等曰挽輸朔漠車輛甚為緊要爾等其會同山西巡撫動支正項錢糧速行備造勿致纍民挽車兵卒給與行糧地方官有才具者任爾等選擇帶往其管兵官員與挽車人等亦必擇精壯者用之十二月甲辰上諭兵部師出以律可奏膚功自我太祖太宗世祖以至於今野戰必勝攻城必克所向無前雖士卒世受國恩捐軀報效實由我朝軍紀森嚴信賞必罰兼以兵馬精强器械整齊之所致也朕今次軍行特規酌舊制參以新謨爰著為令告我六師一大軍出征本都統護軍統領副都統參領等審視官兵甲胄弓矢暨一切軍中器用務期堅利兵之盔尾甲背及戰矢之幹各記名其上馬烙以印鬃尾處繫小牌書旗兮佐領姓氏以為記號馬不烙印追銀二兩箭不書名追銀十兩給舉首之人一啓行時凡兵衆必各率行裝按旗隊以次前進不得零星散亂後先越走自出國門以至旋師當各遵守違者鞭責示警一在道毋離纛毋酗酒毋喧譁毋呌呼不遵者該管官即行捕責一所過地方不得擾害居民及䝉古部落如侵犯子女掠奪馬畜蹂躪田禾及擅離營伍入村莊山谷強取一物者兵丁厮役俱從重治罪其該管官及厮役之主一併議罪一邉境以內凡兵役在逃立刻緝拏依定例治罪出邉而逃該管大臣即發官兵務窮追捕以正軍法設追緝不獲往追人從重治罪伊主并該管官一併嚴處一下營務按旗列幕不密不疏如越旗亂次前後攙雜者將該管大臣官員分别治罪其兵役內有愍不畏法盜馬上零星諸物者懲以鞭責盜馬匹及鞍轡者視盜贓多寡按律治罪一出哨毋携大纛各帶本旗顔色小旗逺距大營設哨勤加巡視比暮則還就近地勿舉火勿擕帳一人一騎其馬備鞍以待晝則近身牧放夜則刈芻拴喂設寇至探明即飛報大營若無寇妄報與寇近不知以致𫝊報稽遲者主將該汛坐哨官兵立刻正法軍前示衆一值夜巡徼官兵必張弓束服袴鞾并解甲囊以備不可怠忽無事人昏夜不得擅行行者必問如衣服器械有異即行擒拏茍貪睡偷安或人數缺少該管大臣察出嚴治其罪一與寇相近管兵將軍大臣酌派前鋒參領率兵往探務詳審賊情虛實地勢險易并嚴飭營中夜無燃火一對敵列陳時主將必度地據險寇或布野或結駱駝鹿角為營我軍分列行間指明某隊某旗當擊敵陳某處戰時鳴角進軍戰畢仍鳴角收兵官兵或棄其部伍混入他人部伍或軼出本陳往附他人尾後或逡巡觀望逗遛不進照所犯輕重正法籍沒鞭責革職至我軍分陳進擊某旗對陳敵堅不動即發所備援兵助擊之又對面臨陳時王貝勒貝子公大臣官員或不依次喧闐擁入或見敵寡不請擅進此一次功不議仍以罪論一敵陳動搖我軍攻入當嚴禁官兵不得掠人畜財物如不遵軍法貪行攫取者重懲不貸一敵敗北即選兵馬追之隨派隊伍接踵繼進倘追兵墮其伏中或遇寇遊兵我後兵與之接戰前隊兵仍行追進一師旋日當嚴行禁止凡軍器不得售賣存留與諸䝉古違者從重治罪該管官一併議處一駝馬為師行要需須擇水草善地牧放夜則加意巡防起營時留官兵於後收察遺失駝馬審其印烙牌記各交原主其疲乏者即於就近地方官或村莊居民或扎薩克䝉古處辨色登數交與飼養仍以其數報明兵部如有將遺失駝馬隱匿乘用或因其疲乏委棄宰殺者嚴治以罪令駝馬原主開明遺失疲乏駝馬顔色數目亦報兵部登記一軍糈關係綦重凡出征官兵須各計口按日支領擕帶倘不如額查出即從重治罪一有職掌大臣官員原各有親隨兵卒不得復於大兵內抽取以分兵勢如委署人員及官之原無親隨兵卒者許各抽一名一大兵存駐處毋令閒惰每日較射磨礪器械所頒軍令不時宣諭令其詳悉夫兵者所以討逆安民朕不得已而用統兵大臣能體朕意嚴束屬下官兵於所過邊境內外不輕取一物使人民安堵如故奏凱日自行升賞如縱官兵為非擾害生事者定加重處凡兹軍令應通行曉諭各路官兵如𫝊示不到即將傳示之人以軍法從事爾部其以朕諭與前南苑所降之㫖一併刋頒俾各凛遵毋忽是日上諭議政大臣等曰凡緑旗兵卒內有從本陳前進超入駱駝營鹿角營衆人接踵齊進殺敗敵寇者第一名優升千總其督戰之員優升二級擢用至緑旗將辨內有親身超入駱駝營鹿角營敗敵者優升三級擢用著以用印空劄頒發將軍提督總兵官凡緑旗官兵有顯著勞績者即照所定職銜填注給與康熙三十五年丙子正月甲戌上欲親統大軍往征噶爾丹漢大學士九卿科道等疏稱祈皇上遣將授兵指示方略停止親征上曰向年烏䦨布通之役朕以策誘噶爾丹入距京師僅七百里許大兵已經擊敗乃竟中賊計致噶爾丹遁走彼時因朕躬違和未得親至其地失此機會至今猶以為憾噶爾丹竄伏巴顔烏䦨地方相距未甚遼逺以是不憚勤勞親蒞邉外相機行事此賊既滅則中外寧謐可無他虞假使及今不除日後設防兵民益多擾纍所奏已知之乙亥振武將軍孫思克奏言臣同尚書圖納公議派陜西緑旗兵九千於二月初十日以內齊集甘州養馬一月一同出邊但甘肅地方苦寒請候青草發萌時出口再河西地方逼近䝉古應令提督李林隆酌量帶兵駐扎甘州防守上諭諸王大臣曰大將軍費揚古兵於二月二十日前後進發將軍孫思克兵亦應令於二月二十日前後自寧夏起程甘州肅州等處兵若調至寧夏路途遙逺其到必遲見今寧夏有滿洲兵一千漢軍火器營兵五百應再增以西安滿洲兵一千漢軍火器營兵五百以足三千之數再寧夏榆林二總兵官標下緑旗兵共選派六千即令該總兵官帶領同將軍博濟副都統阿南達等於二月二十日前後自寧夏起程令將軍孫思克將伊標兵酌量選帶速來寧夏如及期而至則一同進發倘或不及可隨後踵進其滿洲漢軍兵丁馬匹未及喂肥著該將軍總督等將存留滿洲漢軍并緑旗兵丁馬匹內酌選肥健者更換付之其添給緑旗兵丁馬匹并運米之駱駝馬騾俱令於各營及驛馬內選臕壯者給付一切事務令尚書圖納會同該總督巡撫提督等公商料理毋致有悮提督李林隆速往甘州駐扎酌量徵調官兵加意防守地方速檄知之二月甲午上諭領侍衛內大臣等曰前令黑龍江寧古塔盛京立刻備兵各居其地者恐噶爾丹知我三路大兵進𠞰惶迫東行是以使之預備今視口外來報情形亦有東行之狀著薩布素立刻整備屬下兵馬逺設偵探如有用盛京寧古塔兵之處許彼星速往召總轄調遣其左近䝉古亦當小心防備因薩布素所居懸隔恐報京聲息不得聞知可將凡屬噶爾丹之事口外報文一一查開月日發與薩布素知之以便准備行事盛京寧古塔將軍處亦著檄知甲辰上諭禮部兵部朕統御中外念切撫綏惟務休養民生未嘗逺事征討比年以來海宇升平閭閻樂業四方固已無事獨厄魯特噶爾丹荒裔狡寇肆逞凶頑自烏䦨布通敗遁之後不自悔禍仍行狂逞悖天虐衆違蔑誓言侵掠我臣服之喀爾喀潜入巴顔烏䦨之地心懷叵測逆狀已彰乘其竄伏近邉自應及時撲𠞰倘目今不行翦滅恐致異日沿邊防戍益纍兵民聲罪迅討事不容已用是遣發各路大兵分道竝進朕特躬蒞邉外相機行事以衆擊寡以正誅逆天意人謀無不允協此寇一殄則邉塵蕩滌疆圉輯寧內安外攘實在此舉告祭天地宗廟社稷並一切應行事宜著察例詳議具奏甲寅上諭議政大臣等曰朕親統六師前進法律須極嚴明師行之日軍士俱先於郊次排列俟朕啓行後仍復入城按日逐旗而出務必隊伍嚴整夸蘭大參領等各率本營行裝按隊伍前進不得分散錯亂倘馬驚人墮致失馬匹者令該夸蘭大章京及護軍校等親往尋獲中路軍雖行尚俟西路消息倘值天雨即令駐扎其後隊不必等候𫝊示亦行屯駐凡一應細事該營之皇子及諸王大臣夸蘭大等公同結案事關重大再行請㫖凡遇敵兵令我軍攻擊朕必詳審可攻之處始令前進必不以軍士軀命為嘗試如臨陳遇敵不能奮勇敗賊必治以罪前行之前鋒倘望見敵兵必視有水草處駐扎以俟後隊軍至可通行曉諭八旗四月己丑員外郎席保住奏報侍衛克什圖主事保住奉使至噶爾丹所噶爾丹授之奏章令步行而回上曰朕熟計噶爾丹情形久矣噶爾丹之心必以為今當春令馬匹羸瘦此路既無水草沙磧瀚海又甚難行大兵勢不能到至朕親來彼萬難料及故奪我使之馬駝令步行而回不過欲堅彼部下䝉古之心示以不懼耳非欲使我兵遲延彼得逺遁也朕先𫝊諭大將軍費揚古與約師期今費揚古奏本月二十四日可至土喇若依期而至兩路夾攻則噶爾丹在我掌握安能復脫若我兵先到彼必連夜逃遁費揚古兵縱少遲緩必至土喇地方噶爾丹以疲敝乍到之兵費揚古迎擊可盡行殱滅觀彼在我使者之前舉動噶爾丹早已入我計中矣戊戌上諭撫逺大將軍費揚古曰朕所統軍將至汛界時即差護軍參領車克楚前鋒侍衛祁薩木往克魯倫左側屣探聲息今車克楚等還奏云臣等初九日到伊扎爾地方見有寇踪於是轉回初十日遇沙津王所差鄂齊爾等言噶爾丹於本月初間自土喇向克魯倫移營第三日我等歸噶爾丹在達爾漢敖拉山以此揆之噶爾丹已近朕所統大軍矣此寇乃極狡猾之人如敗遁斷不趨土喇必渡克魯倫河或從俄儂巴爾濟赴塞稜格或繞巴顔烏䦨之後設伏爾等兩隊兵見彼下克魯倫若隨踪而往未必不入其伏兵之中朕甚慮之特遣藍翎侍衛殷濟納等諭爾可詳詢地里及彼脫逃之路小心堵禦不可以彼向下流行而輕之特諭己亥上諭議政大臣等曰噶爾丹由克魯倫河順流已至伊渣爾厄爾幾納克地方我西來兩路兵及中路兵俱近克魯倫河矣噶爾丹勢蹙或向東竄入亦未可知著盛京寧古塔兵前往索嶽爾濟山屯扎黑龍江兵亦赴彼會齊可速檄行五月己未上賜敕諭噶爾丹曰朕統御萬邦惟以民命為重不喜殺伐爾厄魯特喀爾喀向奉職貢爾等交惡搆兵以來朕未嘗偏徇而於爾有異視喀爾喀為爾所敗投朕乞命如朕不救之則皆饑斃矣朕之濟人非特於喀爾喀如此也凡諸國窘迫來歸者朕亦一體救之已明諭爾數次爾奏章來索喀爾喀澤卜尊丹巴胡土克圖土謝圖汗言之不已朕始終不以喀爾喀為直曽諭爾此事非懸議所能結當會盟以講之爾又以生計窘乏不能前來又以誓書所無之言屢向我使臣喇嘛支吾回奏阿喇尼巡行邉塞猝遇爾兵不待朕㫖遂與爾戰因特遣王與皇子與爾會議爾屬下人又先抗拒以致交兵其時所發他路之兵朕急遣人止之勿與爾戰爾前年至巴顔烏䦨遂掠喀爾喀之納木扎爾陀音朕又特遣使問故約與議盟今朕與爾若不覿面定議不但爾國難存而我邊民亦不得寧居因爾來既近故秣馬繕備朕於三月初旬起行西路兵於二月十八日起行黑龍江兵於四月初六日起行盛京寧古塔兵於三月起行今朕大軍已出汛界與爾逼近西路兵俱已到土喇河東路兵俱已溯克魯倫河而來朕向崇禮義順天理而行不恃勢力戕滅他人朕果恃勢力則竟不遣使統各路之兵而𠞰滅爾無所不可朕乃不忍生靈橫被鋒鏑是以抒誠遣使朕與爾等覿面定議指示地界爾照舊貢獻貿易則爾國安生而我邊民亦安乃協朕保列國如赤子之意豈不休歟朕斷不以計誘人切勿疑畏朕來欲與各處將帥閲兵已𫝊令伊等勿戰非虛言也爾如不信可留朕所遣使臣內一人在爾地倘各處兵進而攻爾爾可差所留之人止之一面遣爾前曽奉使為朕所識之人來奏朕統御萬邦豈肯誘人而破滅之爾或妄動而去則虛朕美意而生靈有不利矣癸亥上以克魯倫河為噶爾丹必爭之地乃分布隊伍躬在前鋒前行於途次率數人登髙執圎鏡遠望見東有額爾德尼拖羅海山西有山麓從巴爾代哈迤邐接河岸上諭科爾沁土謝圖親王沙津達爾漢親王班第喀爾喀車臣汗納木扎爾王西第什里貝勒盆楚克貝子曰爾等各率爾屬下䝉古十許人往據西方巴爾代哈山麓髙處佯作全軍從此經行之狀敵人來犯勿與之戰誘之前來敵若有備則大兵爭先據河是日駕抵克魯倫河諭各隊領軍大臣曰噶爾丹若據克魯倫河我兵奪河交戰猶稍費力今觀其不於此拒戰而竟逃竄是自開門户以與我也除此地外他處斷不能拒我軍審其情形必連夜逃遁矣當輕騎急追之乙丑上遣大喇嘛垂喇克查木蘇格隆齎敕往諭噶爾丹敕曰朕惟治道原期有益羣生朕親統大兵欲與爾共議俾羣生享其利益故至此與爾相近處兩次遣使其到否未知爾何竟無一次遣人來也朕為天下大一統之主不肯罔人而行已經屢頒諭㫖爾仍不信逃遁而去兵仗器皿盡皆拋棄爾所屬之人乞降而來者甚多爾生計迫蹙朕所甚􅊖爾前此無禮於朕使臣朕皆不介意將爾遺棄疾病之人與來歸之人盡皆收養朕若存嗜殺之心豈肯收養爾所屬之人爾仍不信遁去今西路大兵已至巴顔烏䦨朕親統大兵至克魯倫河黑龍江盛京寧古塔等處大兵皆會集於克魯倫河又斷爾歸路之大兵亦已至厄嫩巴爾查地方爾即欲遁去安可得乎朕不忍生靈之塗炭故復遣使前來並不欲將爾𠞰滅出自至誠爾試反覆思之若仍照舊職貢而來歸順可於丹濟拉丹津俄木布阿拉布坦三人中速遣一人來特諭丁卯上諭議政大臣等曰噶爾丹亡命奔逃量已至巴顔烏䦨矣若我全軍追趕似不能及應選兵䡖騎追逐除喀瓦爾達所領前鋒二百外其餘前鋒盡行派出滿洲火器營兵及親隨護軍亦盡派出著追至巴顔烏䦨過巴顔烏䦨以北不必前往諸王等所屬之人若自有二十日口糧不用官糧亦令同往其同回之兵但留其至拖陵所需五日之糧將餘糧著各旗大臣親驗給與前進兵丁辛未上諭大將軍費揚古曰爾於十三日擊敗厄魯特噶爾丹之事據厄魯特降人奔第來告朕甚慰恱自五月初八日朕先士卒疾追五日噶爾丹窘迫拋棄器械甲胄鍋釡帳房等物及羸病幼小乘夜遁竄朕親率大兵追至拖諾山再欲往追因爾各路兵會合不逺兩軍既會需米甚多恐至缺乏糧餉關係重大量此窮寇以爾兵自西而來此處又發兵夾攻即可𠞰滅於是朕統大兵回迎糧米以內大臣馬思喀為大將軍授之大兵凑給二十日糧隨以帶來牛羊遣繼爾後又䟎運爾路兵糧留內大臣明珠於克勒河朔地方料理朕又給發馬駝充運糧之用交與明珠將見到米糧陸續運至爾軍運到汛界米糧甚多爾還師時由朕所行之路而來則米糧不致缺乏也癸酉撫逺大將軍伯費揚古奏捷大學士伊桑阿張玉書恭捧諸王大臣文武官員慶賀表入奏上曰朕為中外生民之主綏輯海宇愛養元元惟以率土又安為念厄魯特噶爾丹擾亂邉塞心懷狡謀逆天虐民不容不行𠞰滅朕親統大軍逺出塞外聲討有罪噶爾丹聞風遁走希圗幸脫適與西路大兵相遇大將軍費揚古等奮勇力戰大敗賊衆擒斬無算盡獲其人口牲畜從此邉境寧謐不煩逺事征討四海蒼生可共享升平之福朕心深切喜恱丙子上駐蹕席喇布里圖留牧汛界䝉古玉等行慶賀禮上諭曰爾等意中曾料朕此行可直抵克魯倫立奏大功而還如是之速乎朕尊為天子富有四海此番出征朕日食一餐夙興夜寐􅌨風沐雨每至一處朕皆步行及聞噶爾丹確信朕親率前鋒窮追凡此特欲速滅凶寇使爾等咸得安生故耳今噶爾丹已滅不但爾等永無侵擾之虞得享升平之樂朕亦不復為爾憂勞矣庚辰上駐蹕塔爾竒喇賜留牧䝉古諸王貝勒貝子台吉等宴及白金喀爾喀妻子老幼齊集行宫東門叩謝再造之恩上諭曰朕君臨天下統御萬邦本無分於內外即海隅荒陬皆吾赤子一體眷念厄魯特噶爾丹逆天肆虐恃強凌弱虜掠喀爾喀等國朕不辭勞瘁親統大兵征伐𠞰滅今厄魯特之禍靖則朔方永清矣爾七旗喀爾喀自今以後各自樂業圖報國恩以副朕家視天下之至意六月乙未上諭大學士等曰此番出征地方形勢守亦可戰亦可但得天時甚難兵早出則天寒無草乏水兵不能行遲出則天暑雨水多倘連日霪雨則樵採不敷必致窘乏此番兵出遇無水之地而得水無草之地而草生寒暑俱調此特上天眷祐故滅寇而成大功並非人力之所能也其以是𫝊諭九卿八月甲午上賜敕諭策妄阿喇布坦曰朕統御寰區遐邇一體仁育萬民皆欲使之共享安樂朕躬為一統之主懷保萬方奬善良懲凶逆未嘗或爽先是爾陳奏噶爾丹之狡詐與侵害爾之實情誠心懇請眷恤朕嘉爾恭順全受爾之貢獻且以噶爾丹狂悖不靖䦨入烏䦨布通為朕偏師所敗跪誓於威靈佛前後又背誓害我使臣掠喀爾喀阻止班禪胡土克圗之來又至巴顔烏䦨將為禍亂其意顯露因發三路大兵𠞰殺噶爾丹諸事降敕詳諭矣朕親統中路大兵近逼噶爾丹即欲率大兵𠞰滅之又不忍衆生橫罹鋒鏑是以暫停撲𠞰遣諭噶爾丹使來會盟定議喀爾喀之事爾勿疑懼朕躬俟使臣覆奏遡克魯倫河而上噶爾丹聞之心膽俱裂棄其子女廬帳釡鐺什物遁去遇朕所遣堵截西路大將軍費揚古兵於特勒爾濟之地噶爾丹即來戰大兵乃進擊之噶爾丹不得旋踵遂大敗斬噶爾丹之妻阿奴及厄魯特二千餘人丹巴哈什哈察罕西達里哈什哈等人二千餘俱降盡獲其人口馬駝牛羊廬帳什物噶爾丹丹濟拉丹津俄木布阿拉布坦等紛紛潰遁噶爾丹今已困窮矣爾向誠心肫篤請安進貢不絶於道與噶爾丹有不共戴天之讐噶爾丹窮凶極惡不可留於人世一刻尚存即為生民之不利務必𠞰除以安厄魯特䝉古之生今或流行爾屬下厄魯特地方或奔往哈密地方如生擒噶爾丹則擒之來殺之則以其首來如此則爾向來恭順之心益著而朕眷顧之恩益無窮矣九月辛酉上諭户部尚書馬齊兵部尚書凱音布等曰噶爾丹窘迫已極近朕差阿南達以巴圖爾額爾克濟農之兵堵禦其外恐噶爾丹乘虛往巴圗爾額爾克濟農行劫爾兩部檄總兵官王化行如噶爾丹往彼處即率其兵往援并諭巴圖爾額爾克濟農知之已已撫逺大將軍伯費揚古遣郎中本什同卓力克圖押護丹濟拉所遣察哈代等入奏上賜敕諭費揚古曰丹濟拉雖云投降而噶爾丹之奏未至然彼雖不投降破敗已極如或來降大將軍可善言慰導令至歸化城其時相與籌度措置特易易耳今自丹濟拉以下凡所遣人至奏聞送至朕所噶爾丹若遣使來爾即與言爾等若往奏而歸時愈寒冽必致凍斃爾可即歸令噶爾丹來降其時我為爾奏懇我主亦不拂我言也此等情事一面奏聞一面更加周防其周防事宜馬匹最為緊要朕在軍中見我軍之勇健無可訾議而於防護馬匹最覺疏虞萬一詐稱投降夤夜乘我不備驅馬以出所繫匪輕爾諳練行間事多閲歷聊以朕意念所及書以諭焉朕一聞噶爾丹信息即以在京豫養之馬令軍士騎乘朕躬於九月十九日起程前往歸化城此際常須奏聞情勢為佳朕心喜悅欲亟聞彼中實音為此特諭壬午上諭內大臣蘇爾達等曰據厄魯特降人言噶爾丹往博羅烏納罕空津扎巴哈等處地方度冬令丹濟拉往就之所云博羅烏納罕者乃扎薩克圖汗舊居之地距汛界有四十餘日之程大將軍費揚古進兵之時右衛兵每人乘馬一匹以驢騾負裝其臕亦瘦料斷不能到噶爾丹所在之地必自翁金等處因馬瘦而還則徒勞無益朕所以使大同養馬者正欲探實噶爾丹所在如立刻可行則於黑龍江六百兵內選前鋒二百新滿洲四百察哈爾兵一千全用肥健馬駝充足米糧進𠞰乘其窮困可一舉滅之噶爾丹業已盡破今我何故不深算𠞰滅之策而徒勞人馬乎今速檄大將軍費揚古不必進兵至來年青草萌時秣馬以待視噶爾丹所往𠞰而除之此際當頻遣厄魯特降人招撫為要十月甲申朔上問喀爾喀多羅郡王塞稜阿海等喀爾喀厄魯特搆兵之由顧諸王大臣曰今日喀爾喀厄魯特皆在朕直論其事彼皆向來貢獻本朝之國兩國交惡其曲不在厄魯特而在喀爾喀喀爾喀先犯厄魯特喀爾喀理曲是以其國為厄魯特所破但厄魯特假伐喀爾喀為名進我境內烏䦨布通之地為我師所敗已誓不復侵喀爾喀矣今又背誓入犯我汛界屯於克魯倫之地則厄魯特理曲是以朕親統六師滅之天道昭然毫髮不爽朕為天下萬國之主寧有偏徇之理乎朕所以破厄魯特者非為喀爾喀也喀爾喀王及厄魯特降人皆跪奏曰䝉皇上申明大義方知兩國致敗之由實我等所自取也甲辰先是昭莫多之捷有厄魯特曼濟受傷被擒至是曼濟以其妻子在噶爾丹所求歸上命遣之至大將軍費揚古處偕阿旺丹津齎敕諭噶爾丹丹濟拉等敕曰朕統御天下要以中外一體為務往者烏䦨布通之役爾等雖經敗北朕尚欲與爾等會約以定喀爾喀之事故使命屢頒爾等乃違棄誓言搶掠納木扎爾陀音竟至克魯倫地方朕親率師欲與爾會同定議遣使申諭爾復狐疑不信不親見朕使及朕至克魯倫爾遂望風奔潰遇朕西路之兵爾先犯我顔行遂至喪兵敗衄盡棄駝馬牛羊子女廬帳什物爾衆寨桑台吉等接踵來降丹濟拉格壘沽英車陵奔等寨桑十五人亦願歸服遣察罕哈什漢來陳奏悃誠朕已面諭遣還今朕又親率六師逺蒞於此且各處調兵邀截爾等妻子馬畜諸物俱已散亡衣食已盡勢迫無歸况時漸嚴寒朕不忍爾屬下厄魯特妻子相失窮困凍饑而死特遣諭招撫今重復降敕爾等若悔前愆俯首向化朕一體加恩撫恤俾各得所爾部下厄魯特亦得妻子完聚咸獲生全朕斷不念爾舊惡况爾部落人內有被我軍所俘其父母妻子尚在爾處不忍分離願歸故土者朕皆恩賚賜之坐騎糗糧即令遣歸使與其骨肉完聚其欲內附不願歸者朕皆富貴之各得生養爾部人曼濟重傷為我軍所擒今曼濟言其妻子尚在爾處因欲告歸朕是以給之恩賞賜以坐騎糗糧使齎敕遣回爾地爾等思尚能永存有能收養爾等之人否其熟籌之今已無所歸爾等可速領餘衆抒誠歸順朕必令爾等家富身榮各遂生養惜此厄魯特如許生靈被爾驅迫至於此極今若又不覺悟聽信匪言則後悔莫追矣爾其勿疑勿懼特諭己酉上命和碩扎薩克圖親王長史馬尼圖等齎敕招撫厄魯特阿拉布坦丹津俄木布曰朕統御天下撫恤黎元務使人人各得其所先是爾厄魯特與喀爾喀互相讐怨朕欲爾等和好已頒敕諭喀爾喀厄魯特俱違朕諭自起戰爭喀爾喀既敗來歸朕為天下元后不忍坐視其滅亡於是納之注其名籍酌量封為王貝勒貝子公扎薩克與以厚祿咸致富貴俾各得所噶爾丹乃不願朕拯救天下生靈借喀爾喀為兵端䦨入烏䦨布通之地既被我兵所敗雖詭誓遁逃朕猶數遣使頒諭令其會約以定喀爾喀之事噶爾丹違背誓言掠納木扎爾陀音越克魯倫而前朕親統大軍欲與會約特遣使往告噶爾丹狐疑不信不與一見及朕親至克魯倫即望風敗遁遇朕西路官兵彼先逆戰遂至大敗子女牲畜盡被俘獲丹巴哈什哈等先來抒誠後沙克朱木等接踵歸附俱給以官職令其貴顯足其衣食使之富有固已各得其所其來降之衆內有子女被我兵所俘者皆行察出令其父子兄弟夫婦完聚今朕又親統六師各路皆已調兵阻截噶爾丹倘不來降必窮之於其所往爾阿拉布坦丹津俄木布前雖附噶爾丹然皆非倡亂之人今歸降之人皆云爾等與噶爾丹分析各居朕嘉爾猶知天道能自振拔憐爾之馬畜等物散失衣食已絶特遣和碩扎薩克圖親王之長史馬尼圖多羅郡王昆都倫博碩克圗之烏勒木濟多羅郡王墨爾根濟農之阿玉西又爾屬下之喇嘛羅卜藏班珠兒亦願招安爾等今同持諭前往其扎薩克圖汗之子先經離散朕已收留覓爾嶽母令與相會封為親王食以厚祿頻加撫恤頃又賜以牛羊馬羣擇地令其遊牧使之得安生業享有富貴此顯然之明驗也敕書一到著即率爾部落來降前此依附噶爾丹之咎朕槩不介意必待爾以富貴顯榮爾之部落亦使各得生業妻子完聚從容度日丹巴哈什哈等朕尚憐恤使之富貴况爾等乎若爾尚有疑懼今春策妄阿喇布坦之使來時稱爾與策妄阿喇布坦甚善皇上若滅噶爾丹請勿討阿拉布坦令其與我會合等語且策妄阿喇布坦屢遣使納貢敬慎有加故朕亦深加憐恤爾若同丹津俄木布往附策妄阿喇布坦處朕亦不窮詰爾其向朕使明白回奏倘於此二者不審一自處徼幸於厄克阿拉爾空汗洛齊斯希等處棲身茍免朕斷不姑容必會同策妄阿喇布坦根敦戴青貝勒等尅期進討爾其早作良圖特諭十一月乙丑上諭議政大臣等曰視厄魯特人擕妻子來降則噶爾丹窮困已極但噶爾丹乃極狡之賊恐彼不得已來降乘我兵不戒竊奪零散喀爾喀財物逸去應著侍郎滿丕郎中桑格前往善巴王汛界地方駐扎不時差人出汛界外偵探如有聲息即收喀爾喀入汛界內越大將軍營安插一面星速馳報前已有文檄知令滿丕等到彼後口𫝊㫖諭大將軍費揚古可也丙寅撫逺大將軍伯費揚古奏請調太原滿兵署撫標下騎兵共一千及大同殺虎口未出征騎兵五百速赴軍前上諭費揚古曰太原府兵未嫺行陳且至歸化城殆將千里其緑旗兵止各乘一騎值此嚴寒即得到已不自支緩急用之必至悮事今撥火器護軍一千炮手二百四十前鋒二百六十共足爾所調一千五百之數為爾豫備目前馬甚肥衣亦厚此係隨朕親兵故極嫺熟朝聞信息晚即可行朕暫駐蹕於此俟噶爾丹實信今若來降即星速遣至行在如有噶爾丹來降之信若不速撤汛界外喀爾喀信其降而坐待之則悮大事不淺矣近來丹濟拉差人請降而又來襲糧餉可為明鑒今不得復悮當益詳慎逺慮可也戊寅噶爾丹之使格壘沽英至上命之近前諭曰朕為天下之元后萬國一家今日科爾沁諸王貝勒台吉及喀爾喀厄魯特皆在此朕當公言之喀爾喀厄魯特向皆職貢本朝之國朕初無偏徇喀爾喀土謝圖汗執喀爾喀扎薩克圗汗而殺之又殺爾主噶爾丹之弟其曲實在喀爾喀後喀爾喀為爾國所敗前來歸朕朕憐彼十萬餘身命失其生路受而養之凡有人窮迫來歸者朕皆收養無分彼此不但喀爾喀即爾厄魯特今為敵國有來降之人朕皆軫恤各使得生路量材授之官職雖被俘虜之人皆贖還其妻子完彼骨肉朕豈以喀爾喀厄魯特有異視乎前以噶爾丹無故䦨入我汛界侵內地䝉古朕遣兵敗之於烏䦨布通之地爾主噶爾丹窘極遁逃立誓不復犯汛界朕向以至誠待人故不遣兵窮追爾主噶爾丹逆天背誓離其故巢竊伏克魯倫地方侵掠納木扎爾陀音朕不得已統兵出塞然仍再三遣使約噶爾丹會盟修好此朕不嗜殺人之心爾主不自引罪朕始整兵進討噶爾丹不能抗我軍威日夜奔逃適遇我西路豫堵之兵亦係噶爾丹先犯我軍故我師乃進戰大敗之爾今窮困至此極者皆爾等自取非朕欲陵之也爾既奉使而來第公言之毋隱格壘沽英初與諸大臣言猶支吾巧辨及聞皇上諭㫖傾心恱服叩首奏曰誠天下之聖主也大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷十七
