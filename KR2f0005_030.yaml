body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷三十重農桑康熙十四年乙卯三月乙丑上諭户部國家賦稅皆出於農而勸農又在有司近因供應大兵恐有私派纍民雖屢禁止未必實心奉行值今春耕之時宜申飭有司毋得私派夫役濫准詞訟并嚴禁胥吏指公需索土豪魚肉良善致妨農業爾部速檄直𨽻各省督撫通行申飭如州縣官有不實心撫字致民失業者即行指參康熙十五年丙辰二月癸酉上至鞏華城道中諭扈從諸大臣及侍衛等曰朕周視沿途田間春麥正當盛長著傳諭扈從官員人等悉循路而行勿得蹂踐春田其嚴禁之康熙二十年辛酉三月癸酉上奉太皇太后幸遵化溫泉諭內大臣等曰今當田禾發生之候必須遵路而行安營時令於道途村莊沿途荒野處駐扎出入毋踐田禾見遣户部司官隨後稽察遇有駐扎處或出入之時蹂躪田禾者嚴行議處回鑾時仍從原路行朕將親察之康熙二十一年壬戌十二月丁亥上諭禮部農事為民生之本必雨雪以時庶春耕不誤秋成可望今歲入冬以來尚未降雪愆陽日久時序失宜田畝暵乾恐妨明春東作應䖍行祈禱爾部即照例作速舉行康熙二十三年甲子六月壬寅上駐蹕蘇貝昻阿博爾齊爾諭扈從諸臣曰小民賴榖以生倘西成無望必致凍餒爾等宜嚴行約束如人馬踐踏禾苗定加重處康熙二十五年丙寅正月壬申上命副都統馬喇等往黑龍江督理農務諭之曰農事關係兵餉須積貯充足其在驛遞人夫亦令合力播種屯田爾等前往務期農政修舉收穫饒裕年勝一年懋著成效以副朕意十二月丙辰上諭大學士等曰日者遣部員自吉林烏喇至黑龍江以䝉古席北打虎兒索倫等人力耕種田榖大穫夫民食所關至重來歲仍遣前種田官員以䝉古席北打虎兒索倫等人力耕種郎中博竒所監種田地較諸處收穫為多足供驛站人役之口糧又積貯其餘穀博竒效力視衆為優其令注冊此遣去諸員可互易其地監視耕種博竒又復大穫則議叙之康熙二十八年己巳正月庚辰上過獻縣民有進嘉禾一莖雙穗者上諭侍郎庫勒訥等曰自古帝王不貴金玉而貴五穀穀者民之命也朕甚寶之六月庚寅上諭奉天府府尹王國安曰奉天為根本重地今聞遊民甚多務農者少一遇旱潦即難補救今年亢旱朕遣賽弼漢往奉天諸處將糜費米糧如蒸酒等項悉行禁止爾至彼當勸民務農嚴察光棍游手之徒奉天田土旗民疆界早已文量明白以旗下餘地付之莊頭俟滿洲蕃衍之時漸次給與耕種近金世鑑奏請將旗下餘地俱與百姓耕種徵收錢糧此地畝縱給百姓所增錢糧亦復有限所見何淺陋也今已另遣官前往丈量雖係彼處户部之事爾在地方亦須公同詳察永定則例毋忽康熙二十九年庚午正月甲辰上諭户部朕惟阜民之道端在重農必東作功勤然後西成有賴畿輔地方去歲遭罹荒歉已經蠲免錢糧特發帑金兼支倉粟賑濟雖小民糊口有資其籽粒牛具恐多匱乏今時届首春田功肇始若弗經營措給將誤俶載之期播種不齊倉箱何望直隸被災州縣衛所窮民有不能自備牛種等項者該撫率有司勸諭捐輸及時分行助給務令田疇遍得耕耨毋致稍有荒蕪八旗官兵皆倚屯莊收穫用以資生若有被災窮乏耕作無力者該都統等通行各該佐領酌量資助牛種所有莊田勿致播種後時以副朕敦本勸農愛養兵民至意爾部即遵諭通行十二月己巳兵部以三路官兵踐踏田禾業經户部文明賞給田主銀兩其出兵都統公蘇努等請免察議上曰稼穡艱難自古志之蘇努彭春海蘭等出兵時朕再三面諭嚴禁兵丁勿踐民田蘇努等亦言臣等親身殿後斷不至傷殘今將田禾踐踏議為無罪不合著再嚴議康熙三十年辛未九月辛未上諭大學士等曰朕咨訪蝗蟲始生情狀凡蝗蟲未經生子而天氣寒凍則皆凍斃來歲可復無患若既經生子天氣始寒則蟲已凍斃而遺種在地來歲勢必更生今年寒凍稍遲蝗蟲已有遺種朕心預為來歲深慮宜及早耕耨田畝使蝗種為覆土所壓則其勢不能復孳設有萌孽即時驅捕亦易為力可傳諭户部移咨被蝗災各地方巡撫責令有司曉示百姓務於今冬明春及早盡力田畝悉行耕耨俾來歲更無蝗患倘或田畝不能盡耕來歲蝗蟲復起亦須盡力驅捕無致為災十二月丙戌理藩院題歸化城一帶地方耕牛八旗內兩佐領共助一牛其耒耜等項俱移文山西巡撫預偹上曰所用耕牛不必令其幫助即於御厰內牛取用耒耜等項若令巡撫製備將仍委之屬吏一委屬吏必致纍民其鐵器著支用庫銀製造從驛遞運送邊外木植甚多其木器即於彼處製用夫農田人生之根本朕凡所至之地先察其土田邊外耕種必培護穀苖使髙其隴此皆由土性寒而風又厲之故不如此則穀苖不能植立矣內地之田其隴不高各處耕種不同者皆隨其地土之宜也丁亥上諭大學士等曰邊外積穀甚屬緊要逹爾鄂莫地方著交與內務府派各莊壯丁耕種呼兒鄂莫地方令五旗王等莊屯人前往耕種其籽粒耒耜耕牛皆令預偹著派諳農事官員前往監管布種完時酌留耘田之人餘人遣歸田熟時即令耘田之人收穫其農夫所食米穀著於古北口所貯米穀計口帶去席喇穆倫地方仍照前議令盛京人役前往耕種秋收之時有收穫多者該部將監管官員議叙具奏朕觀各處地畝肥瘠不同朕巡視南方見彼處稻田歲稔時一畝可收稻三四石近京玉泉山稻田一畝不過一石又見古北口穀田豐收之年一穗約三千粒口外近邊地方豐收之年穗幾萬粒此皆土脈不同故收穫亦異以此觀之逹爾鄂莫等三處墾種所費無幾而所穫必多矣康熙三十一年壬申二月丙戌上命都統瓦代等往逹爾鄂莫等三處耕種田畝諭之曰耕種之事最為緊要爾等諸臣善為經營管理邊外寒冷當及時廣播麥種將田隴深耕勤謹耘耨耘時將草根勿令土壓若草重發芽則有妨田禾耕種若太稠密田禾雖覺可觀所得實少若稀疏耕種所垂之穗既好而所得甚多凡有河之處可造船捕魚更須愛養耕夫和睦附近䝉古耕種畢時將夫役酌量留於彼處其餘夫空費糧米先即遣回今年倘或米穀多穫不可因後來難繼遂致收多報少收穫多寡雖由人力亦賴雨澤及時耳四月辛丑上御瀛臺內豐澤園澄懷堂召尚書庫勒納等入諭之曰頃爾等進來時曽見朕所種稻田耶諸臣奏曰曽見過稻苖已長尺許矣此時如此茂盛實未有也上曰朕初種稻時見有於六月時即成熟者命取收藏作種歷年播種亦皆至六月成熟故此時若此茂盛若尋常成熟之稻未有能如此茂盛者朕巡省南方時將江南香稻暨菱角帶來此處栽種北方地寒未能結實一過霜降遂至不收南方雖有霜雪然地氣溫暖無損於田苖諺云清明霜穀雨雪言不足為害也總之南北地氣不同節候各異寒暑之遲早全視太陽之逺近所以赤道度數最宜詳審欲定南北之向惟以太陽正午所到之度為凖即指南針亦不能無偏設有鐵器在旁則針為所引亦復不凖此是一定之理今將一片石以繩懸之使之旋轉俟其既定刻記所向南北復動如前其所向南北仍復不變即此可思其理所以凡物皆有自然一定之理庫勒納奏曰聞黑龍江日長夜短雖晚日落不至甚暗不知何故上曰黑龍江極東北之地日出日入皆近東北方所以黑龍江夜短日落亦不甚暗又命看澄懷堂後院所栽修竹前院盆內所栽人參及各種花卉上指示曰北方地寒風髙無如此大竹此係朕親視栽植每年培養得法所以如許長大由此觀之天下無不可養成之物也康熙三十二年癸酉二月丙子上命內大臣公坡爾盆等詣歸化城等三處督耕諭之曰種地惟勤為善北地風寒宜高其田隴尋常之穀斷不能收必藝早熟之麥與油麥大麥糜黍方為有益去歲往彼墾種之人朕曽以此命之因違朕㫖多種蕎麥以致田禾失收爾等須問土人宜種何穀易得收穫朕曽問老農皆云將雪拌種可以耐旱爾等試為之朕前帶南方稻穀菱角種於京師雖以泉水灌溉因無南方蓄養之水且又霜早因此不熟以此觀之若將此地之穀種帶往北地亦難收成惟將麥與大麥油麥糜黍及早播種庶可收穫爾等謹識朕言克勤毋怠十月己卯上諭大學士等曰聞山東今年田收之後九月中蝗螟叢生遺種在田況值今歲多雨來春少旱蝗則復生未可知也先事預圗可不為之計與乘時竭力盡耕其田庶幾蝗種瘞於土而糜爛不復更生矣若遺種或有未盡來歲復萌地方官即各於疆理區畫逐捕不使滋蔓其亦大有益也命户部速檄山東河南山西陜西巡撫等傳示所屬郡縣咸令悉知必於今歲來春皆勉力耕耨田畝蝗螟之災務令消滅若郡縣有不能盡耕其田蝗或更生則必力為捕滅毋使蝗災為吾民患康熙三十四年乙亥正月乙酉上諭大學士等曰去歲於直隸山東河南山西陜西江南諸省下詔捕蝗諸郡盡皆捕滅蝗不為災農田大稔惟鳯陽一郡未能盡捕去歲雨水連綿今歲春時若或稍旱蝗種復生遂成災沴以困吾民未可知也凡事必須預為防備斯克有濟其下户部行文直隸山東河南山西陜西江南諸巡撫亟宜耕耨田畝令土瘞蝗種毋致成患若或田畝有不能盡耕者蝗始發生即力為撲滅毋使滋蔓為災康熙三十五年丙子六月己丑上諭大學士伊桑阿曰朕進獨石口見今年麥禾俱盛朕衷欣悅念小民皆倚田禾度日如大兵陸續歸時或致踐踏或偷盜餵馬又何恃以糊口今將獨石口至懷來縣交侍即多竒自懷來至京城交侍郎馬爾漢及隨行部院官率地方官沿途巡察如有踐踏田禾偷取餵馬者立拏參奏如有縱徇朕聞之必以軍法從事決不姑恕康熙三十七年戊寅三月戊子上諭大學士等曰聞湖廣江西江南浙江廣東廣西福建陜西山西米價騰貴是必糜費於無益之事湖廣江西地方糧米素豐江南浙江咸賴此二省之米今此二省米價騰貴誠為可虞酒乃無益之物耗米甚多朕巡幸直隸等處見雖有禁造燒酒之名地方官不甚加意未曽少止著令嚴禁以禆民食康熙三十八年己卯三月庚辰上南巡舟泊新豐諭領侍衛內大臣等曰此地麥田茂盛朕心深喜此來原為民生凡駐蹕處勿使踐踏田畝至於隨駕兵丁巳足守衛此處之兵盡著發回其將軍副都統及各官員等既係該管地方著乘舟隨行可遍行曉諭凡有踐踏麥禾者被獲決不輕貸乙酉上駐蹕蘇州府諭兵部前者京口江寧接駕官兵亦曽扈送朕恐踐損麥田盡行遣還今往浙江塘路狹隘可傳諭該將軍督撫不必令官兵扈從又朕見百姓欲覲朕顔接踵摩肩踰疇越隴彼雖心切瞻依不暇顧田禾朕實深惜之此後百姓聚觀不必禁止但令勿損麥田可遵路而行閏七月乙卯上駐蹕遙亭諭大學士等曰朕巡幸至此見田禾甚好可謂豐年但各處俱有蝗蝻恐地方官民旗下莊屯因田禾已收遂至怠忽今年若不將蝻子捕絶貽害來年悔之無及須於未能翼飛之時預先滅盡著即行曉諭康熙三十九年庚辰二月辛卯右衛將軍宗室費揚固題請開墾山代地方田地上諭大學士等曰山代地方田既甚饒且逼近二河之間只引河灌溉無不豐收所以西邊回子引水入田而耕之除蟲食之外總無虞於旱潦必獲豐登費揚固題請開種之處著允其所請待收穫時奏聞四月乙酉上巡視永定河工駐蹕寶坻縣城內諭內大臣等曰方今青苖在野扈從大臣侍衛護軍執事並行裝人等在途須約束人衆遵路而行毋得蹂躪田禾朕還仍由此路倘田禾被踐朕必責問大臣及管轄人員康熙四十六年丁亥四月癸巳上諭福建浙江總督梁鼐浙江巡撫王然江南江西總督邵穆布安徽巡撫劉光美江蘇巡撫于凖山東巡撫趙世顯等曰朕頃因視河駐蹕淮上江浙兩省官及地方紳士軍民皆環道逺迎懇請臨幸朕勉順羣情涉江而南巡省風俗所至郡縣見雨暘應時二麥蕃殖比閭樂業可冀盈寧雖山東一路尚未悉覩而江浙田疇鬱葱在望深愜朕懷方今麥熟將穫一切扈從人員皆以次舟行不致蹂踐誠恐百姓沿途迎送老稚扶攜動盈千萬越阡度陌不無踐傷朕心甚為軫惜凡所過地方悉令停止迎送且節候漸熱朕舟行乘夜迎涼亦未可定民雖逺來無由親見爾等可張示遍加曉諭無負朕重農愛民之意十月己亥上諭大學士等曰邊外地廣人稀自古以來無從開墾朕數年避暑塞外令開墾種植見禾苖有高七八尺穗長一尺五寸者今年南巡曽以語張鵬翮伊未敢深信近值邊外收穫之時命特取數本驛送總漕桑額轉送張鵬翮矣且內地之田雖在豐年每畝止收一二石若邊外之田所穫更倍之可見地方不同然人力亦不可不盡也康熙四十九年庚寅五月丙子上諭內閣兵部內務府數年以來已無蝗蟲矣今復見一二宜急捕之朕於去歲秋間曽諭直隸巡撫趙宏燮山西巡撫蘇克濟河南巡撫鹿祐山東巡撫蔣陳錫加意捕捉今應傳諭邊外皇莊八旗之莊并提督馬進良令各行捕除若不實心奉行斷不輕恕觀今年田禾甚佳當是大有之年所慮者惟此耳康熙五十一年壬辰八月戊寅上駐蹕遙亭諭領侍衛內大臣等曰連日雨雪交下不得行獵諸臣必以朕悶坐為念不知此番雨雪於來年耕種大有禆益直隸各處亦皆如此則更佳矣可傳諭扈從諸臣知悉康熙五十四年乙未二月庚辰上諭直隸巡撫趙宏燮曰朕嘗讀無逸篇留心稼穡久矣去歲臘前瑞雪盈尺時届陽和細雨連綿輿情怡悅早得布種矣所慮者起發太盛則收穫之際恐有二疸之虞爾等遍示民間藝鋤時令苖稍疏預防風霾朕以民生為念勸農為本已有所知不得不示特諭康熙五十五年丙申四月戊申上諭大學士等曰近問外省奏摺人等僉云麥苖甚好但路上未曽遇雨據此則暵旱不特京北地方矣見今麥穗秀齊若再不雨豈能生發結實朕望雨心切著將此㫖録出發往京師令大學士九卿等再䖍行祈禱康熙五十六年丁酉三月壬午上巡視河西務耍兒渡等處堤岸自暢春園啓行駐蹕南苑諭領侍衛內大臣護軍統領等曰今麥苖方長應加意護惜不可蹂踐朕仍從此路而回可遍行傳諭交與諸大臣等派出人員嚴為管束四月戊子上諭大學士等曰今春地氣潮濕所種春麥甚多朕頃閲視河西務堤岸時麥苖甚佳但近來風大漸有旱意爾等㑹同九卿如有事不合宜應更改之處詳查議奏自初五日起齊戒三日祈雨庚子上諭九卿等曰目下雨澤愆期今早雖小雨未能霑足但從來月望時雨極難得昨十二十三等日朕固知未必有雨嗣後十八二十二十三等日或可望其大沛也今歲少雨處甚多聞江南大麥收有十分小麥猶望雨山東巡撫未曽奏報得雨想亦未霑足河南巡撫有摺云今歲雨澤頗調窪地有十分收成朕心差慰又諭曰天時地氣亦有轉移朕記康熙十年以前四月初八日已有新麥前幸江南時三月十八日亦有新麥麵食今四月中旬麥尚未收又黑龍江地方從前氷凍有厚至八尺者今却和暖不似從前又聞福建地方向來無雪自本朝大兵到彼然後有雪雲南貴州廣東廣西舊有瘴氣從前將軍賴塔進征雲南留八百人在廣西俱為瘴氣所傷今聞雲南惟元江微有瘴氣餘俱清和與內地無異矣康熙五十八年己亥五月戊寅上諭户部朕幸熱河見一路麥苖盈野收穫必豐但麥熟之歲往往雨水早而且多朕留心稼穡厯年最久深悉其故爾部傳諭直隸河南山東山西并口外地方速將已收之麥晒乾入囤收貯不致潮濕黴爛則今歲所收足用二年矣大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷三十
