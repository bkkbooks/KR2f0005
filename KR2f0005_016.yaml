body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷十六武功四康熙二十年辛酉正月丁巳上諭貝子章泰等曰廣西大兵已入滇境貝子章泰等兵宜乘機速行進𠞰今大兵秣馬貴陽已經月餘且鐵索橋盤江最為要地提督桑額等既報逆賊欲據盤江貝子章泰總督蔡育榮等不躬親馳赴扼據要害撲滅賊寇止遣薩克察巴圖魯等率兵前往殊非事宜章泰等其親統大兵迅往𠞰賊平定滇中勿失機會丙子上諭兵部今談𢎞黨羽俱已就戮萬縣諸地悉經收復將軍噶爾漢其簡選士馬疾赴重慶盡統貝子準達軍速定遵義副都統得爾德等兵亦聽調用萬縣地處狹隘難以飼馬可趨至重慶秣馬而進噶爾漢軍中效力有年困乏無馬者悉令準達率還荆州至於䕫州要地令提督徐治都率標兵暫駐防守總督哈占可率所屬兵馳赴敘州府與大兵協力前驅𠞰賊十二月己亥以逆寇蕩平詔諭天下曰朕纘承丕緒統御寰區仰惟天地眷佑之庥祖宗付託之重聖祖母太皇太后慈訓之殷蚤夜孜孜勤求化理期於兵革寢息海宇乂安不意逆賊吳三桂負國深恩倡為變亂隂結奸黨同惡相援抗違詔令竊據疆土滇黔閩浙楚蜀關隴兩粵豫章之間所在驛騷肆騁痡毒吳三桂僭稱僞號逆熖彌滋負罪尤甚朕恭行天討分命六師𠞰撫竝施德威互濟或縶頸於闕下或駢戮於師中擒捕誅鋤以次收服乃吳三桂既膺神殛逆孫吳世璠猶復鴟張踞六詔之一隅延殘喘以拒命朕惟賊患一日不除則民生一日不靖策厲將士屢趣師期於是虎旅協心進逼城下賊衆計窮勢蹙通款軍門約日獻城凶渠授首師克之日市肆不擾邊境晏如捷書既至上慰郊廟社稷之靈下抒中外臣民之憤神人胥悅遐邇騰歡念自變亂以來軍民荼苦如在水火披堅執鋭卒嵗靡寧行齎居送千里相望被兵之地既罹於鋒刃供億之衆復困於徵輸朕憫恤民艱不忍輒加額賦間施權宜之令用濟征繕之需意在除殘事非獲已而身處宫寢之內外廑閭閻之依中夜屢興旰食不暇惄焉思治八載於茲今羣逆削平疆圉底定悉剪歷年之蟊賊永消異日之隱憂用是蕩滌煩苛維新庶政大沛寬和之澤冀臻熙皥之風體覆載好生之德秋肅必繼以春溫法帝王更化之模義正尤期於仁育誕告天下咸使聞知康熙二十一年壬戌八月庚寅初鄂羅斯所屬羅剎劫掠邊境上遣副都統郎談公彭春等率兵往打虎兒索倫聲言捕鹿以覘其情形將行上諭之曰羅剎犯我黑龍江一帶侵擾虞人戕害居民昔發兵進討未獲剪除歷年已久近聞蔓延益甚過牛滿恆滚諸處至赫哲飛牙喀虞人住所殺掠不已爾等此行除自京遣往參領侍衛護軍外令畢力克圖等五台吉率科爾沁兵百名寧古塔副都統薩布素等率烏喇寧古塔兵八十名至打虎兒索倫一面遣人赴尼布潮諭以捕鹿之故一面詳視陸路近逺沿黑龍江行圍徑薄雅克薩城下勘其居址形勢度羅剎斷不敢出戰若以食物來餽其受而量答之萬一出戰姑勿交鋒但率衆引還朕别有區畫爾等還時須詳視自黑龍江至額蘇里舟行水路及已至額蘇里其路直通寧古塔者更擇隨行之參領侍衛同薩布素往視之十二月庚子上諭議政王大臣等曰據郎談等奏攻取羅剎甚易發兵三千足矣朕意亦以為然第兵非善事宜暫停攻取調烏喇寧古塔兵一千五百名竝置造船艦發紅衣炮鳥鎗及演習之人於黑龍江呼馬兒二處建立木城與之對壘相機舉行所需軍糧取諸科爾沁十旗及席北烏喇之官屯約可得一萬二千石可支三年且我兵一至即行耕種不致匱乏黑龍江城距索倫村不逺五宿可到其間設一驛俟我兵將至淨溪里烏喇令索倫接濟牛羊甚有裨益如此則羅剎不得納我逋逃而彼之逋逃者且絡繹來歸自不能久存矣其命寧古塔將軍巴海副都統薩布素統兵往駐黑龍江呼馬兒康熙二十二年癸亥七月癸未上諭户部兵部海洋險逺風濤不測自明代以來賊寇盤踞島嶼出沒靡常為害已久本朝平定閩省逆賊鄭成功竄伏海島侵擾沿海一帶地方雖屢經𠞰殺未盡根株逆孽遁踞臺灣蠢爾遊魂尚恣窺伺自滇黔底定賊寇殄除獨茲海外鯨鯢猶梗王化必須用兵撲滅掃蕩逆氛庶海隅安全民生樂業特命施琅為水師提督統領舟師竝飭該督調度會商相機征𠞰今克取澎湖已扼險要臺灣逆穴指日殲滅立見廓清凡進𠞰軍前所需兵餉米折應用器械及修理船隻豫備物料各項錢糧所關甚為緊要應差部院堂官一員前往會同督撫速為料理不拘何項錢糧儘見在者准其動用毋致貽誤康熙二十四年乙丑正月癸未議政王大臣等請敇直𨽻山東山西河南巡撫每省派熟習火器兵二百五十人竝選賢能官各四員豫備火器送京師至日增發薩布素軍前協攻雅克薩城上諭曰疏內不請發禁旅良是但直𨽻各省緑旗兵未歷戰陳且黑龍江火器甚多不須增用朕意選福建投誠善用藤牌官兵見在八旗及安插山東山西河南者五百人令臺灣投誠左都督何佑等率往薩布素一應咨題多屬支吾借端延滯度四月進兵不過刈取田禾事必無成此皆遣發黑龍江狂悖之人從中沮議不欲成事薩布素出身微賤髙視若輩毋敢有違用兵所關甚巨宜周詳籌畫期於必克倘謀事草率復似明安達禮等退兵則羅剎將益肆披猖矣當自京城選賢能大臣一員統兵以行俟克取雅克薩之日班師又發盛京兵五百人代黑龍江兵守城種地出征兵還亦令還盛京種地事宜遣户部大臣一員督理所云早熟之穀即內地春麥今我兵亦多種春麥及大麥油麥霜降前六日皆得收穫則不因師出而曠一年田功矣藤牌兵給馬二千匹帶往盛京盛京各佐領亦派馬二千匹照舊制嚴督飼秣候京城馬到更代北行至馬喇等所養馬皆預備於齊齊哈爾屯此間催趲月杪可到聞此路間有缺水處不免貽誤今自盛京抵烏喇自烏喇經新設驛站路直且近當從此徑抵黑龍江沿途馬匹或有倒斃馬喇以所備者足數補送如此則我兵馬匹無虞矣藤牌兵各帶炮彈或十圓或二十圓以行其餉銀兵月給二兩官月給三兩又諭議政王大臣等曰兵非善事不得已而用之向者羅剎無故犯邊收我逋逃後漸越界而來擾害索倫赫哲飛牙喀竒勒爾諸地不遑寧處剽劫人口搶虜村莊攘奪貂皮肆惡多端是以屢遣人宣諭復移文來使羅剎竟不報命反深入赫哲飛牙喀一帶擾害益甚爰發兵黑龍江扼其來往之路羅剎又竊據如故不送還逋逃應即剪滅今仰副天心大兵逼臨雅克薩城姑再傳㫖羅剎云前屢經遣人移文命爾撤回人衆以逋逃歸我數年不報反深入內地縱掠民間子女搆亂不休乃發兵截爾等路招撫恆滚諸地羅剎赦而不誅因爾等仍不去雅克薩特遣徑旅徂征以此兵威何難滅爾但率土之民朕無不惻然垂憫欲其得所故不忍遽加殲除反覆告誡爾等欲相安無事可速回雅庫於彼為界捕貂收賦毋復入內地搆亂歸我逋逃我亦歸爾逃來之羅剎果爾則界上得以貿易彼此寧居兵戈不興倘執迷不悟仍然拒命大兵必攻破雅克薩城殲除爾衆矣如此宣諭後羅剎果回雅庫為界即駐師於黑龍江設斥堠於雅克薩令疆圉帖然否則大兵酌量進止不如此宣諭今縱克取雅克薩城我進則彼退我退則彼進用兵無已邊民不安爾等其詳議以聞四月乙未上諭議政王大臣等曰黑龍江兵於是月起行五月中旬可至雅克薩城凡奏報軍機自雅克薩至額蘇里經黑龍江前來恐紆道遲延令理藩院侍郎明愛於杜爾伯特扎賴特派兵五百人竝索倫兵酌自墨勒根至雅克薩設驛奏報軍機庶免貽誤明愛往來覺察驛夫糧食匱乏以索倫所貯米支給黑龍江以內每驛原設二十人應核減一半併入䝉古若䝉古兵五百人過多再為核減索倫效力勤勞傳諭異日加恩以示鼓勵六月癸巳上諭諸王大臣等曰治國之道期於久安長治不可圖便一時當承平無事朕每殫心籌畫即今征羅剎之役似非甚要而所關甚巨羅剎擾我黑龍江松花江一帶三十餘年其所竊據距我朝發祥之地甚近不速加剪除恐邊徼之民不獲寧息朕親政之後即留意於此細訪其土地形勝道路逺近及人物性情以故酌定天時地利運餉進兵機宜不徇衆見決意命將出師深入撻伐然兵貴相機而動變化無窮惟恐諸將不遵朕指授致失機宜今收復雅克薩地得遂初心至於撫綏外國在使之心服不在震之以威近遣侍衛關保等往軍前諄諭之曰兵凶器戰危事古人不得已用之朕以仁治天下素不嗜殺爾其嚴諭將士毋違朕㫖以我兵馬精强器械堅利羅剎勢不能敵必獻地歸誠爾時勿殺一人俾還故土宣朕柔逺至意茲一一奉行朕甚嘉焉又諭曰朕思凡事必周詳審度方獲實效不可輕率從事向者尚書明安達禮輕進至糧餉不繼將軍沙爾瑚達巴海等失計半途而歸遂致羅剎驕恣而索倫竒勒爾鄂羅春等心懷疑二朕詢其失機情形一一詳計今始奏功兵法云多算勝少算不勝詎可忽視且兵貴神速前逆賊吳三桂等叛朕思嶽州係湖廣門户遣人指示速戰始克嶽州遂一面進取四川以分賊勢一面密諭大將軍賴塔從廣西趨雲南於是諸省底定兵革休息然亦在將軍等奮勉效力耳倘怠忽不奉行雖有良策亦何益焉壬寅上諭大學士勒德洪學士麻爾圖圖納曰鄂羅斯入我邊塞擾害鄂羅春索倫赫哲飛牙喀等處人民搶掠其家口雖屢肆凶暴朕不忍遽興兵革故未即遣發大兵征討數遣使曉諭鄂羅斯恃其遼逺仍復抗拒益侵伐我邊鄙之人肆虐不止用是遣大兵直抵雅克薩之城彼因困迫已甚而後歸降爰遵朕命宥其困而後降之罪釋之使還大兵迅速征行破四十年盤踞之鄂羅斯於數日之間獲雅克薩之城克奏厥績薩布素向來逗遛不進兵之罪應概從寬免又雅齊納鄂山本獲罪發遣之人其所互告之事仍行察議今進𠞰官兵殊屬勞苦令伊等暫回吉林烏喇地方於盛京打虎兒之兵酌量派往防守至雅克薩城雖已克取防禦決不可疏應於何地永駐官兵彈壓此時即當定議著大學士勒德洪學士麻爾圖圖納同郎談關保與議政王大臣等會議具奏十一月甲戍上大閲兵於王家嶺先是上諭兵部國家武備不可一日懈弛故事每嵗必操練將士習試火炮爾部即傳諭八旗都統等整備軍容朕於十八日將親閲焉是日喀爾喀部落土謝圖汗子多爾濟厄爾德尼阿海台吉等以朝貢在京請於理藩院尚書阿喇尼轉奏曰臣等聞皇上大閲甲兵逺方之人幸逢盛典願一觀軍容上曰從來撫綏萬邦在德教不在威武故兵不得已而用之今四海升平偃兵不用然選練士卒簡閲軍器所以修武備昭法制也喀爾喀台吉既請往觀可允其奏至是八旗都統各率所部將士以軍禮分列至王家嶺上升御座軍中吹螺發巨炮排鎗竝發前後相繼聲絡繹不絶又命將士發紅衣巨炮及諸火器一時盡發聲震天地巨炮所擊樹侯欄牆莫不應聲而倒時阿海台吉及衆䝉古驚懼失色皆戰栗不止上傳諭曰朕惟以寬仁撫馭欲使薄海乂安家給人足近者悅而逺者來此朕本懷也若兵為凶器非可輕試第念古來世際升平不忘武備閲兵乃本朝舊制嵗以為常無足驚懼也尋設布侯校射上親射五發咸中次令諸王貝勒八旗善射者校射中的者甚衆阿海台吉等相顧驚訝曰皇上真神射也康熙二十五年丙寅七月乙巳上諭兵部理藩院我兵圍困雅克薩城羅剎勢迫死守今時序漸寒自墨勒根至雅克薩所設蒙古驛馬冬月飼秣維艱其免索倫打虎兒今嵗貢賦俾之飼秣竝修整器械以備調用至䝉古每驛應設夫馬若干令明愛馬喇等定議移文索倫總管洪吉郎中滿丕等如數取用索倫打虎兒夫役與備養之馬又博鼎率往築城種地官兵內選二百人俱暫留墨勒根亦候調用餘悉遣還八月丁丑上諭黑龍江將軍薩布素等曰今天時漸寒河流將結宜每事籌畫豫為之備羅剎復來雅克薩城待援兵之至且冀我兵於流澌時撤回耳目前我兵雖掘壕防禦至隆冬冰合後船艦若何收藏馬匹若何飼秣敵兵來援若何撲𠞰勿令入城爾等其詳加籌畫密以奏聞康熙二十九年庚午正月辛丑上諭內大臣等曰朕於國家政務竭力勤求是非自任從不委於臣下即如遷移吳逆之事索額圖奏稱建議之人應請正法朕堅持獨斷必令遷移彼時十三省用兵數載天下大事皆朕一人獨任亦曽推諉爾等乎前年湖廣兵叛衆議紛紜朕謂此亦何難遂命緑旗兵丁即行𠞰滅又平定鄂羅斯之事滿漢諸臣咸謂彼距中國道逺難以成功朕謂此事斷不可中止即遣大臣前往遵朕指示而行鄂羅斯隨即欵服朕未嘗自伐其功但不似爾等稍有功績即有人代為表揚也朕乃萬姓之主惟以兆庶未安此衷不能稍釋至於無知之人妄生議論朕毫不介意也四月甲子上諭內大臣公舅舅佟國維等曰據阿南達奏言厄魯特與拖多厄爾德尼戰頗被殺傷其襲席北推哈灘巴圖爾時兩人共一騎有斬木為兵者且聞來侵昆都倫博碩克圖而至今未到想已狼狽必有退回俄儂之勢阿南達欲帶行炮竝禁軍前往相機征𠞰朕非不知禁軍足以克敵但路逺艱於糧運朕前率察哈爾兵行獵見其人材壯健皆思效力可選精鋭六百左翼令阿要率之右翼令博爾和代率之馬駝牛羊於八旗大場內派出兵各擕五月糧再於漢軍每旗選章京一員領行炮八門及炮手前往檄阿喇尼額赫納知之五月癸丑上諭鄂羅斯使人吉里古里伊法尼齊等曰噶爾丹迫於內亂食盡無歸內向行劫今乃揚言會爾兵同侵喀爾喀喀爾喀已歸順本朝倘誤信其言是負信誓而開兵端也爾等可疾遣善馳者二人歸告尼布潮頭目令伊遍諭鄂羅斯之衆六月辛巳上諭兵部噶爾丹追喀爾喀已進汛界朕將親往視師出征諸王出喜峯口公蘇努等所領之軍隨朕行令諸王先朕進發先檄知尚書阿喇尼等理藩院遣司官星馳以往其令議政王大臣集議癸未上諭兵部噶爾丹已至烏爾會河軍宜速出其軍中無火器者與前所發禁軍兵及盛京兵俱應增發令議政王大臣速行詳議甲申上將出師先遣理藩院員外郎阿爾必特祜達賴齎敕往諭噶爾丹敕曰朕統御宇內懷柔萬邦惟願率土生民咸得其所相與協和無分中外夫兵凶器戰危事互相讐怨無有巳時非計也故遣尚書阿喇尼散秩大臣吳巴什扎薩克大喇嘛阿齊圖綽爾濟一等侍衛阿南達傳諭令罷兵息戰爾回奏云聖主施仁撫育令共相協和以享康泰我亦與焉伏願指示安樂之策聞聖上將盡驅出喀爾喀之人不勝歡忭不敢以殺我弟多爾濟扎卜為憾所奏甚明今乃聞爾復興兵伐喀爾喀故遣尚書阿喇尼防境內之不靖者今烏朱穆秦遣使至爾所爾言中華與我一道同軌我不敢犯界內地方而又䦨入汛界掠烏朱穆秦人畜是背前言而隳舊好也且朕前所遣伊拉古克三胡土克圖等至今不歸爾誠何意耶今遣員外郎阿爾必特祜達賴齎敕諭爾爾尚可以改圖爾既入邊我諸部王及貝勒台吉等行且興兵擊爾故亦遣來使止之恤爾至矣其速給還所掠歸我使人爾其明白回奏七月庚寅朔上諭兵部本朝自列聖以來戰必勝攻必克所向無敵者皆以賞罰明法制嚴兵卒精鋭器械堅利人思報國殫心奮勇之所致也今軍行其令各該都統以下察核軍實凡甲胄弓矢諸器械務令犀利堅好其盔甲俱繫號帶馬騣尾書旗分佐領姓名其行也視大纛整隊齊發有零星前後錯行及醉酒者該管官立拏懲責其止也各按旗分隊伍分列屯扎有前後錯亂者罪及該管大臣馬無印箭無名各罰以銀給拏獲者竊取鞍轡什物馬匹者視其多寡治罪失火者亦從重究懲官兵厮役所過百姓䝉古地方毋騷擾毋搶掠毋踐踏有擅離營伍入村落山谷奪人財物者軍法從事罪及本主及該管官軍士厮役逃亡在汛界內立行察拏治罪如出汛界外該管大臣即遣官兵窮追務獲立斬以徇如不能獲則將往追將卒從重治罪其逃人之主及該管官一併嚴行察懲既出我境哨探斥堠務期嚴密如曠野交兵對陳見敵王貝勒貝子公大臣不按次序攙越前進及見賊兵寡弱不復請令冒昧前進者有功不敘仍治以罪其進也須齊列緩轡按隊前行如自離其隊而附人後或自棄其伍而入别行或他人已入而獨留不進身死家沒及重責革罰分别治罪如整齊而進擊敗賊兵厥功維均勿以略分先後致生爭競至彼不抗我軍而奔潰則選精兵良馬逐之列隊躡踪而進如前忽遇伏或賊兵有旁抄者則後隊接戰夫兵者所以討逆而安順也領軍大臣果能嚴束其下不使良民受害朕不靳厚賞否則罰亦無赦凱旋之日有以兵器私售䝉古者本人治罪竝及該管官馬乃大軍急需須視水草善地小心護養起行時則留將卒察遺失之馬視騣尾所繫字樣交還原主如係疲馬則開明馬色數目交所在官司人民䝉古善行牧養報知兵部如有匿而騎用及殺之棄之者治以罪其遺失疲馬之人亦開明馬色報兵部存案恐官兵未能遍知爾部其刋布曉諭之壬辰上諭理藩院額赫納軍從某汛界達阿喇尼所較為捷近其諭阿喇尼等遣能員速往迎之兵力薄恐突遇敵兵也阿喇尼所駐地如有可虞漸移入內謹防斥堠又聞喀爾喀行劫驛馬其曉諭嚴禁之癸巳安北大將軍和碩恭親王常寧奏臣既出喜峯口當由何道進兵上曰視其道之近者往與大軍會其出古北口之兵糧儲多爾等未會之際糧宜節省出邊後有助糗糧者聽助籍其姓名以聞所助牛羊俱收牧及時以散給之炎暑軍行恐人馬勞苦其令晝止夜行丙申上諭內大臣舅舅佟國維等曰京城大軍絡繹出邊阿霸垓阿霸哈納蘇尼特蒿齊忒等兵無所調用今不必赴尚書阿喇尼軍前著於各旗形勝之地駐扎嚴防喀爾喀新來之衆妄行壬寅噶爾丹遣達爾漢格隆奏言喀爾喀吾讐也因追彼䦨入汛界向在中華皇帝道法之中不敢妄行上因賜來使筵宴賞賚令齎敕歸諭之敕曰據爾使人達爾漢格隆陳奏具見敬慎悃誠朕統御天下重信義而賤欺誑前以七旗喀爾喀彼此搆怨與達賴喇嘛共議遣大臣諭和不意左翼興兵妄動朕弗之直也後喀爾喀為爾所敗匍匐來歸朕念普濟衆生之意賜以米糧牲口所全活者無算喀爾喀何利於朕而施恩若是皆朕不忍生民之顛沛故耳是年出盟方分别七旗曲直昭雪扎薩克圖汗之事欲仍前設立右翼議未及定爾兵已至乘虛驟入褫守汛界者衣服出言不遜朕亦不深責六月二十五日遣員外郎阿爾必特祐等問其故而阿喇尼等在邊以爾公然䦨入汛界守邊責重不能容忍遽與爾戰朕甚非之六月二十九日復遣郎中滿丕齎敕諭爾及商南多爾濟歸取行糧而已豈有正事尚未議定即可言執土謝圖汗澤卜尊丹巴胡土克圖以畀爾乎此皆使臣設計脫身而為此言也爾謂與達賴喇嘛道法為一則當憐念衆生同心以安喀爾喀令七旗同享安樂以仰副朕意乃反肆殺戮拆人妻子離人骨肉䦨入汛界掠及四佐領之人揆之道法可若是行乎恐達賴喇嘛未必使爾為此也西寧報至聞策妄阿喇布坦以爾罪告之達賴喇嘛將興兵伐爾夫興兵非美事也朕且將與達賴喇嘛共議調和而聞爾已駐兵烏爾會河故朕遣和碩裕親王及皇子大臣量發滿兵而往非討爾也欲定議耳前者遣大臣往鄂羅斯議事亦發兵往議畢而回爾所夙知也為爾計其聽達賴喇嘛言罷兵息戰各享安樂既合衆心亦易畢事如仍以前事為辭妄行劫掠則隳敗名教自爾始矣癸卯上諭都統瓦代等曰據關保奏噶爾丹於六月二十七日遣發其使人及我撥什庫次日潛師遁去班第蘇爾達等遣人屣視之噶爾丹兵果已北去朕之欲幸此軍者以躬近行間便指示也今噶爾丹雖退而喀爾喀方且橫行劫掠驛遞及諸扎薩克馬牛衣服乘此大兵集會朕乃親往視師以靖喀爾喀之肆橫俾知所畏忌事可一舉而定也辛亥上諭裕親王福全等曰爾軍進止與哨探噶爾丹所在宜不時報聞今朕與爾相距僅三百里而往來之信常遲非軍機所宜也其不時警飭之八月辛酉上諭裕親王福全及參贊王大臣等曰卿等奏報大敗噶爾丹疏初三日已到此皆上天鑒臨祖宗默佑諸王大臣盡心官兵效力之所致也朕聞之焚香謝天不勝欣悅此後當何以窮其根株平其餘黨熟籌始末一舉永清勿留遺孽其詳議以聞丁丑上諭議政大臣等曰噶爾丹雖認罪立誓上書請降但人殊狡詐難以深信我大兵撤後背盟妄行亦未可定且諭噶爾丹敕內有厲兵秣馬見俱整備之語仍宜發兵豫備萬一有悖叛之信則夕聞朝發即可撲滅若待有變而後發兵緩不及事矣見在各佐領有喂肥馬匹著每佐領派護軍七名甲兵五名六名整頓備之其即會議尋議政大臣以豫備官兵人數啓奏派出上諭曰此軍非為出征而派也以噶爾丹雖降而人殊狡猾不可深信萬一叵測所以派出備之其以此故曉諭官兵知之康熙三十三年甲戌四月己卯上令班第策旺諾爾布夸色俄齊爾杜喇爾覘噶爾丹情狀諭之曰爾等若往擒生口則起釁端矣姑探其動靜可也惟以招撫和托輝特根敦戴青等為要爾至彼宣朕諭㫖曰朕念噶爾丹與汝逼近常恐為汝害汝當移近席北推哈灘巴圖爾納木扎爾陀音阿里雅等逺設哨探倘有警汝等同心併力而行於事乃有大濟此為汝等慮也席北推哈灘巴圖爾等見在土喇游牧汝等不論居何地朕無所嫌况噶爾丹事平之時喀爾喀通國仍遣歸故土也爾等無兵如得消息可即歸來七月癸酉上諭領侍衛內大臣等曰尚書班第等疏言和托輝特根敦戴青遣人往探噶爾丹消息擒厄魯特色楞以回據供云噶爾丹於去年春冬間二次遣人窺根敦戴青所居處今年正月來於庫克朔東杭幾爾察克地方居住根敦戴青聞噶爾丹移營近彼前進遂亦向內移營於土喇之席北推哈灘巴圖爾處觀噶爾丹之前進情形當是圖根敦戴青而來不遇則隨其踪跡而求之來至土喇一帶地方搶掠汛界之喀爾喀亦未可定今時會既佳馬復肥壯可調寧夏歸化城及右衛之兵循克魯倫河於土喇等處往尋席北推哈灘巴圖爾探彼情形消息若果噶爾丹來近土喇擾害喀爾喀我軍有可乘之機將軍等相機而行倘我師未至之先彼已過而前進則從後襲之趙良棟諳習軍務郎談前往時可與之偕行令趙良棟率寧夏火器營兵二百人寧夏兵即支寧夏之米歸化城與右衛之兵即支湖灘河朔之米此時機會甚便斷不可失爾等與議政王大臣會議以聞壬午兵部題建威將軍希佛請將大同緑旗兵三千令總兵官率之與臣等同行又鑲藍䝉古旗分察哈爾兵近殺虎口居住其八旗察哈爾俱接壤而居丁壯整齊秋髙馬肥請將伊等前鋒護軍驍騎酌量派發時各旗遣至臣等軍前上諭大學士等曰緑旗兵若多發往則其馬少且邊外地方米糧何能運到朕前巡察邊外時曽帶古北口緑旗兵往沿途常賞賚食物贍養然去時猶可及觀其回時情形甚憊隨朕行走尚有苦纍之處今希佛亦能如此賞給乎希佛每遇一事必生疑阻此番發往之滿洲兵已有八千有此兵力所向無敵將軍費揚古勳舊大臣今駐防歸化城衆皆稱贊軍士亦皆心服都統郎談邊外行走熟練於此事無不能辦者若又遣希佛往或致疑阻大事亦未可定此處關係甚大希佛著停其前往右衛新駐兵丁令將軍希佛料理大同緑旗兵丁不必多發著大同總兵官康調元親選五百名與將軍費揚古一同前往至京城兵亦已預備察哈爾兵倘有緊要差遣即與所備之兵一同調遣不必發往大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷十六
