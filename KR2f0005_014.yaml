body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷十四武功二康熈十五年丙辰正月辛卯上諭大將軍貝勒董額將軍侯張勇總督哈占等曰秦省不能即定皆平涼未下王輔臣未滅之故目前攻取平涼最為𦂳要爾等宜相機公議速定平涼斷賊餉道綏靖地方二月壬戌上諭兵部大將軍貝勒董額等屯兵平涼日久賊寇尚未𠞰滅城池尚未恢復夫秦省不能即定川賊尚在窺伺者皆由王輔臣未𠞰滅平涼未克取故也其以都統大學士圖海為撫逺大將軍率每佐領䕶軍二名亟赴陜西總轄全省滿漢大兵斷賊餉道𠞰滅平固逆孽速靖地方大將軍抵平涼時盡收將軍敕印遇有分遣酌量給付貝勒董額以下悉聽大將軍節制乙丑上諭議政王大臣等曰見駐寧夏滿洲䝉古大兵無人統轄其仍授都統畢力克圖平逆將軍印止以所部前鋒赴寧夏統轄滿洲䝉古大兵鎮守地方俟草青時酌調鄂爾多斯兵協力進取平固己巳上諭兵部據平南王尚可喜疏報賊犯惠州肇慶諸處省會危急朕思粤省要地倘有疎失為害不小頃雖調遣江西兵仍恐單薄今以兖州每佐領驍騎兵一名䝉古兵七百名調赴江寧其見駐江寧每佐領驍騎兵一名䝉古兵六百名及駐防徽州池州滿洲䝉古兵七百名令將軍哈爾哈齊統領馳赴粤東如有稽遲坐以失誤軍機之罪其哈爾哈齊所用平寇將軍印留付副都統科爾科代鎮守江寧其徽州池州餘兵七百名恐難捍禦地方或令見駐安慶提督移鎮池州或撥蘇州駐防五百甲兵往駐徽池將軍總督等公同酌量調遣至山東兖州戍防不可無兵大將軍圖海所統兵内分每佐領一名往山東駐守俟盛京兵到時遣發圖海軍前辛未上諭兵部前命康親王傑書為大將軍平定閩省伊奏先滅浙寇再進福建即允其請後授貝子傅喇塔為將軍進取黄巖乃借稱修橋造船展轉遷延為日甚久屢下詔嚴催始取黄巖前赴温州時曽言紅衣礮至即取温州今據伊報稱礮已齊集而温州之得與未得竝未聲明師行猶豫若此何時始得入閩王貝子率領大兵駐浙江曠日持久以致師老餉匱今温州如尅期可取即當速行進取倘不能即克宜酌量分兵留守王親統大兵即克取福建如仙霞嶺路險難進或由分水闗入或别從何道而進當相機作速進兵福建一定則江西之兵可以全力𠞰賊而吳三桂亦可指日滅矣王貝子係朕懿親大小將弁皆素所信任當各効心膂奮力前驅如仍瞻顧不前則師益老餉益匱貽悞大事莫此為甚王等其勉副委任乗此事機作何進止速議以聞甲戌上諭兵部貝勒尚善等統領大兵往駐岳州將及二載竝未移師前進作攻城破賊之勢因循坐守令師老財匱今因大將軍安親王由袁州進取長沙湖南逆賊遂欲分我大兵之勢来犯江廣前據報岳州賊衆分遣往援彞陵等處則岳州賊勢已分貝勒尚善貝子章泰公蘭布皆朕懿親委以重任都統朱滿䕶軍統領額司泰副都統路什阿晉泰前鋒統領噶爾闢等皆以勝任擢用廵撫韓世琦提督桑額亦以才幹著稱擢付封疆重任今岳州滿洲䝉古兵為數不少又提督桑額標下士卒頗多湖南賊勢既分即應整理甲兵為進取岳州之勢可取則取不可取須覘賊虛實或發兵過岳州攻長沙賊出即擊殺之使逆賊之勢潰亂不能分擾他處則江西廣東可以少息而大將軍安親王亦從容克取萍鄉進圖長沙矣尚善等竝不思𠞰滅賊衆恢復地方負朕委任之意又不切行偵探逆賊情形度有機會奮力前進賊兵分援各處安坐罔聞止知自守汛地各保身軀不能少進尺寸若謂逆賊深其濠塹多用火器以傷我軍如值大雨之時其火器尚可用耶總之不實心任事致賊得以任意應援貽悞軍機莫此為甚若仍前不改逆賊何日得滅地方何日得平尚善等以文到日即宜作攻取岳州發兵長沙之勢以分賊力倘有機可乗速行進取又諭曰吉安為進通廣東要地今聞吉安為賊將髙大傑等所圍應速發兵救援著見駐江寧將軍哈爾哈齊於率赴廣東兵内選其半馳往南昌與大將軍簡親王喇布副將軍希爾根等會商即於所帶兵及南昌兵内酌量派出領赴吉安破賊解圍通入廣之路此路既通哈爾哈齊仍率兵赴粤其所留江寧之兵交賢能夸蘭大俟兖州兵到即令遄往其吉安情形竝移文大將軍安親王知之以便隨機策應戊寅上諭兵部今大將軍安親王將賊固守之地攻破賊已䘮膽宜即乗機直取湖南但我兵進取湖南時逆賊吳三桂或撤諸處賊兵往長沙抗拒亦未可知著行文荆岳大將軍王貝勒等飭勒兵馬時加偵探乗機進𠞰辛巳上諭兵部今賊兵聲言斷闗山道闗山險要之地將軍席卜臣總督哈占宜相地方緩急調各隘官兵往守闗山將軍侯張勇兼程速回同將軍佛尼勒等堵𠞰出犯秦鞏之賊自後一切軍機大將軍董額等一面奏聞一面具報大將軍圖海知之三月癸巳上諭兵部今逆賊吳三桂分遣賊兵應援長沙大將軍安親王兵已經深入赴援之賊甚多恐相持遲延時日貝勒尚善等宜乗機速行攻取岳州倘未可取則分兵徑過岳州絶賊餉道若慮岳州兵力單薄可調武昌兵以資防守其彞陵諸處賊勢既分順承郡王勒爾錦貝勒察尼等或攻破彞陵上流賊衆或整理舟師以張渡江之勢俾賊潰亂不能救援長沙一帶倘有機會可進即渡江酌量速進至南漳逆賊既經退回即調南漳諸處大兵赴荆州併力破賊大將軍王等仍量留官兵同總兵官劉成龍防守南漳辛丑上諭議政王大臣等曰安親王軍已深入湖南亟宜添發大兵應援今大將軍圖海兵尚在懐慶應以戍守河南兵每佐領驍騎一名選才能者署為夸蘭大領赴岳州其叅領胡世巴額勒布暫駐懐慶再發京師每佐領驍騎一名與盛京兵一千五百名合為一營令叅領達漢泰沙禮領之抵河南日以盛京兵五百名留與胡世巴等防戍河南餘令達漢泰等率赴岳州前大將軍貝勒尚善等奏請添發每佐領兵四名便可分遣由雲溪驛赴長沙今所發禁旅竝河南盛京兵已足每佐領四名之數此兵未到時若長岳二郡尚未恢復大將軍貝勒等酌撥官兵速援長沙與大將軍安親王合兵攻取平定湖南其盛京兵一千名速添發大將軍圖海軍前四月庚申上諭兵部今吳啓鎮尚之信受吳三桂偽將軍號總兵苗之秀等相繼以叛總督金光祖等降賊廣東變亂則江南江西殊屬可虞若閩粤諸賊會犯京口等處則江南兵單難以防禦且江西告急自江南往援甚便官兵不可不増其調大將軍圖海所領盛京兵一千名及駐防兖州每佐領驍騎一名遣赴江南發京城每佐領兵一名駐兖州其江南滿洲䝉古兵令將軍華善用平寇將軍印統轄以學士薩海署副都統科爾科代為叅贊副都統楊鳳翔以安南將軍印駐防京口其遣赴江南之兵到日將軍華善王之鼎及叅贊大臣督撫等會同整飭軍馬以待調遣尋大將軍簡親王喇布果請兵援江西上諭曰粤東之事如此則長沙宜急攻取今貝勒察尼總督蔡毓榮既回荆州則自河南發往荆州之兵可速遣赴岳州貝勒尚善亦分兵自陸路趨長沙與安親王協力進取簡親王等應即令將軍哈爾哈齊額楚等速取吉安與將軍舒恕等合兵禦閩粤諸寇以繼安親王大兵之後五月癸巳上諭兵部今聞南安餉缺閩粤諸寇来犯贛屬地方贛州既危應速取吉安合兵𠞰賊簡親王等亟檄將軍哈爾哈齊額楚提督趙賴等克取吉安會合將軍舒恕額赫納之兵撲滅閩粤諸寇竝檄舒恕等酌量倘可由贛攻吉即分兵夾攻之六月丙辰上諭兵部聞賊船七十餘隻自衡州来泊蒼頭舖又賊兵三千来犯攸縣逆賊知安親王進取長沙欲斷大軍後路窺伺袁州亦未可定江西既發有江南大兵省城又有總督駐守簡親王喇布副將軍希爾根其以文到之日即檄無事地方官兵赴袁州駐鎮𠞰禦賊寇戊辰上諭兵部近覽大將軍簡親王喇布總督董衛國等奏稱尚之信背恩反叛逆賊孫延齡馬雄等分路来寇江西袁州諸處閩賊亦乗機侵犯江西逆賊吳三桂部下髙大傑死守吉安大兵尚未克復等語見在江西兵力單弱分布𠞰禦防守地方又欲接應大將軍安親王兵實難支應貝勒尚善請分岳州兵遣發江西大有裨益今阿晉泰韓世琦雖往長沙其自京師𤼵出每佐領兵四名見到岳州可將兵合計量留防守其餘官兵即令起程竝嚴飭將弁兼程速往十月壬申上諭兵部據征南將軍穆占疏請令大將軍圖海率兵同赴湖廣再於荆岳彞陵兵内揀選發往以滅吳逆并進取四川雲南朕思陜西兵隨征各處勤勞備至運糧民多苦累若復進取四川恐征𠞰轉輸兵民重困平涼雖已底定軍中缺乏馬匹新附兵心猶未大定大將軍圖海及新附兵不便調往湖廣且荆州諸處有大將軍順承郡王勒爾錦貝勒尚善都統鄂内宜理布等統兵駐守又大將軍安親王岳樂統率大兵圍困長沙前令穆占率兵抵湖廣日將荆州諸處兵每佐領配足十名又添撥䝉古兵及陜西湖廣綠旗兵隨往兵力不為單薄今宜仍遵前㫖施行迨克復地方其應設鎮守官兵調遣機宜與各將軍總督提督等議行著大將軍安親王順承郡王貝勒等探知穆占何處進兵即相機應援十一月辛卯上諭兵部醴陵陷賊頃者賊又聲言犯萍鄉諸處朕思醴陵萍鄉為安親王大將軍後路所闗非細副都統席山雖已赴袁州仍恐兵力單弱今閩省已定建昌諸處似可稍紓大將軍簡親王及副將軍希爾根總督董衛國等量調建昌撫州樂平饒州南昌等處滿漢官兵速赴袁州萍鄉諸處同副都統席山楊古代總兵官趙應奎等協力𠞰賊疏通道路仍間道移㑹安親王若可發長沙兵量行速發夾𠞰丙申上諭大將軍順承郡王勒爾錦等曰爾等故違指授遲延時日以致逆賊得間四出應援今荆岳之兵安處日久馬皆肥壮著將軍穆占速赴湖廣簡選荆岳彞陵士馬由岳州趨長沙接應安親王兵若長沙軍無虞或出彞陵或取岳州或由荆州渡江便宜進發十二月己巳上諭兵部賊衆来援吉安又聲言犯萍鄉賊帥馬寳等率賊兵已至永新安福竝欲為吉安救援朕思逆賊吳三桂知我荆岳大將軍等斷不進兵故身往常徳調集賊衆併力於長沙吉安將軍穆占速選荆州士馬相機前進以分長沙吉安賊勢平定湖南大將軍簡親王喇布等嚴飭所部保固疆圉康熈十六年丁巳正月庚寅撫逺大將軍都統大學士公圖海奏稱二月進取漢中興安將軍侯張勇以為宜俟秋成再舉上曰大兵即克復漢中興安須設重兵重兵一設則運餉維艱若俟夏秋進取又頓兵曠日虛糜糧糗今將軍穆占方𠞰吳逆機不可失圖海等其暫停漢興之役留滿洲䝉古兵一萬同緑旗兵防守秦州諸隘分兵五千遣大臣一人統赴荆州到日順承郡王等量留官兵防守荆州彞陵諸處乗穆占由岳州長沙進取湖南時相機渡江破賊庚子上諭兵部簡親王喇布疏報来援吉安賊衆宵遁或因將軍穆占進兵長沙聞風掣回或謀潛襲袁州俱不可料今吉安已調建昌諸處官兵簡親王喇布等宜乗機速行攻取吉安至於袁州所繫甚大宜分兵固守勿致疎虞總督董衛國其檄令總兵官趙應奎協力防禦三月甲申上諭議政王大臣等曰今閩地悉定大將軍安親王圍困長沙已久將軍穆占復帥師進𠞰將軍鄂内統兵水陸赴岳殲滅吳逆蕩平諸寇在此一舉康親王宜及兵威大振之時分遣官兵同耿精忠兵進取潮州其進𠞰留守機宜速議以聞又大兵分路進擊逆賊不暇窺贑其授署副都統莽依圖為鎮南將軍精簡士馬夾攻廣東以副都統額赫納署副都統穆成額叅贊軍務令侍郎舒恕量留甲兵同廵撫佟國楨總兵官哲爾肯鎮守贑州諸處至江西建昌諸路大兵俱已撤赴吉安簡親王軍士卒甚衆酌撥每佐領兵三名合在贑大兵令莽依圖共選每佐領兵六七名俟康親王所議俞㫖到贑即率之前進乙巳上諭議政王大臣等曰據荆州坐塘筆帖式報賊犯逺安旋復退回逆賊或因我兵進取長沙岳州虛聲牽制亦未可知大將軍順承郡王勒爾錦等應作進兵之勢揚言渡江以疑賊兵尋定逺平寇大將軍和碩安親王岳樂等奏逆賊吳三桂糾聚賊衆死守長沙上曰勒爾錦等作速勒兵臨江再令圖海整飭陜西滿漢官兵進扼漢中要路移檄聲言進兵以分賊勢倘機有可乗即行進𠞰丙午上諭揚威大將軍和碩簡親王喇布等曰爾等將王府佐領下兵及大兵内選有馬者每佐領三名速發贑州此兵到日將軍莽依圖等即選足每佐領七名速赴韶州仍與尚之信相聞令立圖内應袁州乃安親王大兵後路其以滿洲兵每佐領四名以上及自安慶發往綠旗兵一千竝付額楚俾赴袁州屯駐為安親王後繼前所送馬及礮抵袁州付與来迎官兵額楚仍添兵䕶至長沙其吉安新復簡親王可偕多諾統每佐領兵三名及自安慶發往綠旗兵五百名竝城守官兵駐鎮吉安更撥每佐領兵一名添發贑州令侍郎舒恕統領防守其餘缺少馬械之兵竝綠旗官兵付副將軍希爾根提督趙賴令回南昌整繕候調簡親王同理事官麻爾吉酌遣幹員齎諭招撫原任貴州提督李本深廵撫曹申吉廣西提督馬雄將軍孫延齡等孫延齡果否身死竝著偵探的信奏聞四月戊午撫逺大將軍都統大學士公圖海奏稱臣令駐防秦州寳雞官兵進逼禮縣驛門諸處隨移檄聲言大兵分路進𠞰今欲親統重兵深入四川但恐時多霪雨輸輓艱難當俟機㑹酌量前進上曰今將軍穆占協𠞰長沙貝勒尚善與將軍鄂内水陸攻岳故逆賊吳三桂親赴長沙集諸路賊兵死守湖南我兵若乗此機各路進𠞰則吳逆指日可滅計在陜官兵為數甚多當此逆賊勢分之時若不進逼四川則坐糜糧餉殄賊無期大將軍公圖海其仍遵前㫖速行進𤼵五月乙巳上諭兵部前安親王岳樂等疏請紅衣礮隨已發往今聞袁州到長沙道路險阻運礮夫役既多為費實繁若礮一到即得長沙則解送固宜倘難猝㧞則送亦何益今安親王兵久入湖南馬多致斃已自京撥馬陸續發往今將軍穆占率精兵㑹𠞰猶未克取長沙與賊對壘如故我兵甚衆芻秣無多即馬到長沙勢必坐致疲瘦不堪驅策可令馬匹暫停袁州紅衣礮暫留南昌温代先赴安親王岳樂將軍穆占等軍前詳議以聞六月辛酉上諭各省王貝勒大將軍將軍總督廵撫提督等曰逆賊吳三桂背恩倡亂散布偽劄誘惑兵民迫脅官吏以致生民塗炭所在騷然今各路大兵𠞰撫竝行平涼福建廣東等處相率平定文武大小官員兵民人等俱被恩賞安插得所惟湖南四川雲南貴州官員兵民人等仍陷賊中未得歸正念此等俱受國恩必非甘心從賊盖有懐忠義之心而無脱身之路者亦有身被迫脅懼罪疑畏者今大兵雲集不日蕩平賊寇玊石難分朕心深為不忍今特頒敇諭概示招徕凡在賊中文武官員兵民人等悔罪歸正前事悉赦不問仍照常加恩或有擒殺賊首投獻軍前及以城池兵馬来歸者仍論功優叙爾等即宣布曉諭以副朕寛仁矜全之意庚午上諭奉命大將軍和碩康親王傑書曰據筆帖式塔穆哈圖報潮州劉進忠已於本月初六日投誠今劉進忠復遺書吳三桂為平南王尚之信舉發是劉進忠投誠本非真心不過勢窮就撫耳又總兵官劉炎所遺吳三桂書亦皆捜獲其心迹與劉進忠畧同此等皆心懐反側久留潮州必致生變若果巳投誠康親王等即托言欲與相見以計撤回留駐福州設或遲疑不至速行奏聞劉進忠等既撤則令將軍喇哈達以兵之半守漳泉都統賴塔率其半守潮州仍令尚之信遣原任潮州總兵官王國棟盡率其標兵詣賴塔處協守七月丁酉上諭兵部將軍穆占速行分道進𠞰湖南其進兵機宜仍行奏聞又大將軍貝勒尚善等前奏須得鳥船始可破賊已命江蘇廵撫慕天顔督造今將軍穆占即統兵到岳州亦必俟鳥船告竣然後進攻度鳥船到彼正當隆冬水涸難以前進若俟来年水長進兵勢必坐守岳州虛糜日月穆占宜勿赴岳州以兵㑹簡親王規取衡永諸處遏賊後路如此則粤東得以寛緩而粤西欲降者亦可乗間来歸穆占等其即率岳州官兵速赴茶陵攸縣與簡親王兵合協力進取衡永諸處九月丁酉上諭議政王大臣等曰逆賊吳三桂憑江湖之險抗拒大兵為日已久若不速行𠞰滅湖南民困無有已時聞逆賊多備鳥船戰艦死拒我師我師亦宜倍製鳥船沙船多載糧米由岳江入洞庭盡占江湖斷賊糧道夾攻岳州如事屬可行應遣賢能大臣官員㑹同督撫尅期造船多設水師營兵同大兵齊進期於一舉滅賊但増船破賊事闗𦂳要大將軍順承郡王勒爾錦貝勒尚善等身在地方與賊逼近應否舉行著速議以聞勒爾錦等議逆賊造船未巳長江闗係最重目今賊舟漸増若豫行添造鳥船沙船以載數月之米甚屬有益上命添造鳥船六十艘沙船二百艘户部尚書伊桑阿赴江南同該撫速行督造俟船將告竣量發綠旗官兵前往大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷十四
