body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷二聖德一康熙六年丁未七月己酉上躬親大政詔諭天下曰朕以沖齡嗣登大寶輔政臣索尼等謹遵皇考世祖章皇帝遺詔輔理政務殫心效力七年於茲今屢次奏請朕承太皇太后之命躬理萬幾惟天地祖宗付託至重海內臣庶望治方殷朕以涼德夙夜祗懼天下至大政務至繁非朕躬所能獨理宣力分猷仍惟輔政臣諸王貝勒內外文武大小各官是賴務各殫忠盡職潔已愛民任怨任勞不得辭避天下利弊必以上聞朝廷德意期於下究庶政舉民安早臻平治凡我軍民宜仰體朕心務本興行樂業安生以迓休寧之慶政在養民敢虛天地生成之德時當親政恆念祖宗愛育之心布告天下咸使聞知康熙八年己酉正月戊申上諭工部前奉太皇太后諭謂乾清宮交泰殿棟梁朽壞宜撤舊重建以為朕宮慈命諄復朕不敢違但陶唐茅茨不剪夏禹宮室是卑其毋事華麗止令朴質堅固以稱太皇太后惓惓至意八月辛未上諭吏部前京察處分滿尚書侍郎等因無事故被革俱給還原官令其候補今思滿漢諸臣被革相同朕原無異視應一體施恩京察內有漢尚書侍郎被革者察明議奏康熙九年庚戌二月癸未上諭刑部向來定例流徙尚陽堡寧古塔罪人於六月十二月停遣餘月皆令發往今思自十月至正月俱嚴寒之候所徙罪人貧者殊多衣絮單薄無以禦寒罪不至死而凍斃於路甚為可憫繼自今流徙尚陽堡寧古塔罪人自十月至正月及六月俱勿遣閏二月庚寅上諭工部朕經行城外見道旁枯骸惻然可憫或因爾部修治道途以致暴露亦未可知其令有司掩埋並行各省凡胔骼悉為收瘞四月乙未浙江巡撫范承謨疏言仁和縣知縣丁世淳以繼母劉氏年老呈請終養吏部議覆定例父母年七十以上者終養竝無終養繼母之例上曰既有終養之例豈可分别生母繼母丁世淳准其終養康熙十年辛亥三月壬子朔上諭年幼諸王曰聞爾等恃威行事豈果有所利耶夫無益之威逞之何用爾等皆朕懿親人自敬畏至於所屬在外官員原為國家治事理民爾等若勒索其財物彼何所取而應奉耶宜以時嫻習騎射暇則讀書毋徒溺於嬉戲也是日上諭和碩安親王曰爾在諸王中以齒則高以行則長若年幼諸王率意妄為爾其訓飭之四月壬午朔吏部題鑲黃旗拖沙喇哈番阿喇密故無子弟承襲罷世職其母年老無依應給半俸嗣後均照此例若係繼母不准給豫上曰繼母亦母也其與生母一體給之著為令九月辛未上往盛京謁陵禮成諭戶部刑部奉天係祖宗發祥重地奉天府寧古塔等處除十惡死罪不赦外凡已結正未結正死罪俱著減等其軍流徒杖等罪俱著寬釋自山海關至奉天府所屬地方康熙十年十一年分正項錢糧俱著豁免康熙十五年丙辰五月丁亥上諭兵部據寧夏提督趙良棟疏報逆賊犯寧夏河東諸堡俱被脅從今聞招撫相繼投誠朕思河東各堡因地狹民稀不能敵賊一時被脅誠非得已其槩從寬宥該提督仍加意撫綏以副朕惠愛元元至意七月己酉上諭兵部吉安一郡逆賊盤踞日久小民被脅蓄髮者多此不過畏死曲從耳且勞師討賊原以為民若大兵所至將蓄髮者槩行誅戮殊非朕撫恤殘黎至意倘有據守城池山寨執持兵械抗拒不降者仍誅勦之其餘俱著免死俾得自新爾部通行曉諭各將軍一體遵行康熙十七年戊午二月甲辰上諭兵部廣東兵變時被掠男婦子女可令平南王尚之信總督金光祖等嚴行察出令人民識認悉皆發還俾其父子夫妻完聚粵西平定之日將軍莽依圖傅宏烈等亦各察明被奪人口遣還原籍閠三月丙寅上諭戶部朕巡視京畿見八旗亡故軍士葬地窄狹邱墓纍纍亦有竟無塋地者皆因郭外近地價值騰貴故不易得本朝軍士奕世效力行間殞命疆場或身被重傷在家老死皆家業貧窮至無葬地朕每觸目甚為憫惻作何撥給地土俾八旗貧苦兵丁俱獲葬所令議政王貝勒大臣詳議以聞四月戊子上諭兵部吳三桂背恩倡亂伊所屬人員向沐國恩甚久其中不無被脅者韓大任等既經投誠仍令議叙加恩其同來護軍甲兵皆國家素所豢養之人若輩父母妻子俱陷賊中可遣發令歸滇中俾得完聚其續至者爾部逐一問明或有願歸者奏聞併發乙未上諭戶部前命爾部清察地畝以給出征死亡兵丁葬地必平原髙燥之處方可若地勢卑濕不堪為墳塋雖撥給何所用之又須與道路相近若道路太逺則貧家難以趨赴矣至於官員秩卑小民貧乏者皆資地畝為生若取伊等之地撥給兵丁又致伊等失業可查內務府所管地畝及諸王大臣地畝詳加丈量有溢於正額者給與兵丁以副朕優恤至意康熙十八年己未四月丙戍上諭兵部湖南廣西已經底定滇黔指日蕩平凡在京在外大小文武官員內有家口陷於賊中者有孑身投誠家口仍在彼地者有前以抗賊被害而家口尚有遺留者大兵到日一一清察務加保全俾之得所聽其家屬完聚爾部即通行傳諭各路大將軍將軍督撫提鎮等遵行七月庚申上諭戶部工部朕御極以來孜孜求治期於上合天心下安黎庶夙夜兢惕不敢怠荒乃於本月二十八日已時地忽大震皆因朕躬不德政治未協大小臣工弗能恪恭職業以致隂陽不和災異示警深思愆咎悚息靡寧茲當力圗修省以迓天庥念京城內外軍民房屋多有傾倒無力修葺恐致失業壓傷人口五城御史不能逐戶細察止聽屬員開報於朕加恩軫恤之處不得均沾實惠著另遣滿漢御史詳加稽察其窮苦兵丁出征在外房屋毁壞妻子露處無力修葺朕心更為憫念該部即行令八旗都統副都統參領親行詳察毋致遺漏八月甲子上諭內閣戶部官員兵丁房屋牆垣頃因地震塌毁甚多一時不能修葺四品官員以下現食半俸此一次仍行全給其護軍撥什庫披甲當差人役錢糧著即支與兩月令其修理庚辰上諭戶部通州三河等處遇地震壓死者甚為可憫户工二部㑹同將旗下及民人房屋并寺廟被壓之人速察明數目遣司官四員前往驗視動支帑銀帶往有主收殮者給豫銀兩無人承認者著所遣司官同地方官設法埋瘞十二月丙寅上召大學士等至懋勤殿諭曰君臣誼均一體勢分雖懸而情意不隔安危欣戚無不可相告語者堂陛之誼固宜如是也邇者朕體初平殿廷不戒被燬於火爾諸臣因朕偶恙復覩此災愛主心切必謂朕當過於憂慮朕披閲經史頗明大道朕之一身上受祖宗之付託下繫臣民之瞻仰為任匪輕寧不自愛惟是今秋有地震之變又各處饑饉洊臻寇盜未息此朕早作夜思中心惶懼寢食靡寧者至於殿廷告災乃上天致警敢不夙夜祗畏修省厥愆然其所關止屬朕躬臨御之所但得海宇清晏置斯民於袵席之上則朕今所居較諸前代茅茨土階尚或過之矣豈至以露處為慮哉朕自五齡即知讀書八齡踐阼統蒞萬方太皇太后嘗問朕何欲朕敬對曰臣無他欲惟願天下乂安生民樂業共享太平之福而已當時左右實共聞之自昔迄今謹持此心兢兢業業恆如一日可以質諸寤寐倘有政治失宜皆朕躬之咎從不諉過臣下惓惓之意茲與爾等悉之康熙十九年庚申八月癸未先是吳三桂反平南王世子尚之信從賊及歸正仍隱與弟之節等糾黨誘殺都統王國棟謀亂事覺下議政大臣等集議論罪上諭議政王大臣等曰尚之信謀為叛逆卿等集議論罪如律但平南王尚可喜航海歸誠效力行間鎮守粵東著有勞績及吳逆叛亂堅守臣節不肯從逆為逆子尚之信所逼憤恨殞命朕每念及深為憫惻其妻舒氏胡氏從寬免死竝免籍沒尚之孝尚之璋尚之隆等俱從寬免革職枷責尚之信不忠不孝罪大惡極法應立斬姑念曽授親王從寬賜死其餘逆黨尚之節李天植等悉按律正法康熙二十年辛酉七月甲子上諭吏部兵部凡官員祖母母竝妻緣事者即議鞭責折贖於大體不合如果事犯重大不妨削其封誥治罪若鞭責折贖小過或將伊夫或伊子孫品級俸祿議罰爾部㑹議定例具奏八月丙申上諭刑部商民領吳逆資本者甚多隱匿者亦或有之若據告追究恐無賴之徒借此詐害富民有纍百姓商民為四民之一富民亦國家所庇藏富於民不在計此銖兩以後有首告者俱不准行九月壬申上諭户部積貯為國家大計嵗運漕米充實京倉最為緊要旗丁人等挽運勤勞宜加存恤朕頃巡行近畿至通惠河一帶見南米漕船旗丁人等資用艱難生計窘迫恐其苦纍難支以致沿途遲滯貽誤倉儲所關匪細前以軍需浩繁漕運額設錢糧節經裁減今應作何酌復著詳議以聞十二月癸巳九卿詹事科道等以滇南蕩平請加上尊號上諭曰爾等以大憝既除寰宇底定奏請上朕尊號朕思曩者平南王尚可喜奏請回籍時朕與閣臣面議圖海言斷不可遷移朕以三藩俱握兵柄深恐日久滋蔓釀成不測故決意撤回不圖吳三桂背恩反叛八年之間外內騷動兵民交困賴上天眷佑祖宗福庇逆賊蕩平倘復再延數年百姓不幾疲敝耶憶爾時惟有莫洛米思翰明珠蘇拜塞克德等言應遷移其餘竝未言遷移則吳三桂必致反叛也議事之人至今尚多試問當日曽有言吳三桂必反者否及吳三桂倡叛四方擾亂多有退而非毁謂因遷移所致若彼時朕諉過於人將㑹議言應撤者盡行誅戮則彼等含寃泉壤矣朕素不肯諉過臣下即部院事有錯誤朕亦自任朕自少時以三藩勢熖日熾不可不撤豈因吳三桂反叛遂諉過於人耶今亂賊雖已削平而瘡痍尚未全復君臣之間宜益加修省息兵養民布宣德化務以廉潔為本用致太平若遂侈然以為功德崇上尊稱濫邀恩賞實可恥也和碩裕親王福全等再三陳請上復諭曰頃九卿等以逆首既除四方底定奏請上朕尊號朕自御極以來日夜孜孜以乂安生民為念乃逆賊吳三桂一倡變亂遂致塗炭八年當吳三桂初叛時散布僞劄煽惑人心各省兵民相率背叛此皆德澤素未孚洽吏治不能剔釐所致幸賴上天眷佑祖宗威靈滿洲兵士之力逆渠授首姦黨悉除地方平靖獨念數年之中水旱頻仍災異疊見師旅疲於征調被創者未起閭閻敝於轉運困苦者未蘇且因軍興不給裁減官員俸祿及各項錢糧并增加各項銀兩仍未復舊每一軫念甚歉於懷若大小臣工人人廉潔俾生民得所風俗淳厚教化振興天下共享太平之福雖不上尊號令名實多如一切政治不能修舉則徒上尊號朕斷不受此虛名也朕自幼讀書覽古人君行事始終一轍者甚少嘗以為戒惟恐幾務或曠鮮克有終以故宵衣旰食祁寒盛暑不敢少間偶有違和亦勉出聽斷或中夜有機宜奏報未嘗不披衣而起朕非不知燕息自怡蓋所愛不在一身總為天下生靈之計政事務求當理官職務在得人期於家給人足百姓樂業而已今吏鮮潔清之效民無康阜之休君臣之間全無功績可紀倘復上朕尊號加爾等官秩則惟有負愧耳何尊崇之有至於太皇太后皇太后加上徽號詔赦天下理所宜然其上朕尊號之事斷不可行乃朕實意非粉飾之詞也自今以往大小臣工宜各洗心滌慮砥節勵行休養蒼黎培復元氣爾等可向九卿各官悉諭朕意不必再行陳請康熙二十一年壬戍二月甲午外藩王貝勒貝子公台吉等請上尊號上曰朕自御極以來夙夜孜孜勤求化理期於中外乂安生民樂業今逆寇雖已蕩平治化尚未孚洽前諸王大臣等請上尊號已經有㫖這外藩王等所請亦不准行四月丁酉上諭大學士等曰朕巡幸沿邊地方見設立界限處墳墓毁損枯骨暴露者甚多朕心憫焉夫掩骼埋胔王政所重可令盛京將軍遍察而瘞埋之五月丁已上諭戶部兵部工部從前盛京守奉陵寢及山海關等處城守章京員缺俱令其子弟頂補自停止此例悉由京師補授頃朕以昭告成功展謁永陵福陵昭陵因周視所歷地方見道里遼逺往返艱難若章京員缺盡從京師補授則家口遷移重為貧寠者之纍且將前任章京房屋田地掣給新補之員以致前官孤孀無倚不能回京如欲即留彼處則田廬既空資生何策困苦日甚深用憫惻嗣後盛京守奉陵寢及山海關等處城守章京員缺不必自京補授著於伊等子弟內令該將軍選擇賢能者具題引見頂補以免往返遷移之苦倘伊等子弟無人堪用别有補授發往之員可另撥田屋給與其前任章京田屋仍行留給不必掣出令其孤孀得所六月辛卯上諭大學士等曰自古聖主每遇水旱災祲未有不行䖍禱者今亢旱已甚朕欲虔誠齊戒親行祈禱爾等查例具奏八月己卯翰林院奏經筵講章上曰經筵所以講學修德大典也講章須有勸戒針規之意乃稱啓沃今講章內有道備君師功兼覆載二語太過其易之康熙二十二年癸亥閏六月庚申上諭刑部人命關係重大凡現審人犯自宜蚤取口供速行完結庶不致無辜久禁囹圄淹滯斃命其中有應行詳審及等候質對者或暫行監候或羈禁各門該管官員亦當嚴加稽察不時照管毋令獄卒及守門人等借端需索恣行凌辱雖各犯有應得之罪若未死於法先死於獄既非憲典亦干天和朕心尤為不忍向來在外各衙門審理人犯或係監斃或在路物故凡一起內至三人以上者定有處分之例今思內外刑獄事屬一體嗣後在內各衙門及各門監禁人犯一起至斃幾人以上者作何處分著九卿詹事科道詳議以聞十月丁未九卿詹事科道以海寇底定請加上尊號上曰加上尊號典禮甚大臺灣屬海外地方無甚關係因從未嚮化肆行擾掠濱海居民迄無寧日故爾興師進𠞰即臺灣未順亦不足為治道之缺朕觀古來史冊盛世無屢赦之事此時雖頒赦加恩小民未必均沾實惠治天下之道但求平易宜民而已何用矜張粉飾且吳三桂𠞰滅後頒赦未久今又以升平行赦殊覺太煩朕但願以平易之道圗久安長治不願煩擾多事可將朕意傳諭九卿詹事科道知之大學士等隨奏臺灣雖在海外乃海賊歷年占踞慿恃其險蒙皇上指授方略𠞰撫兼行海賊遂爾向化神功聖德超越千古非加上尊號無以慰臣民仰戴之願上曰海賊乃疥癬之疾臺灣僅彈丸之地得之無所加不得無所損若稱尊號頒赦詔即入於矜張粉飾矣不必行康熙二十三年甲子六月庚戍上巡幸口外侍臣奏曰聖駕往幸牧馬地方請乘便過烏闌哈逹等處其地水草肥美但柴薪稀少膳房所用已經預備其餘官軍令各帶柴薪前往上曰凡事豈可獨為朕一人計要當為衆人計也朕所需用豈致有誤惟恐軍士窮乏不能攜帶柴薪以致窘迫設使衆人勞苦朕有何樂即今天下偶有一省水旱朕必遣官支發倉庫即行賑濟雖邊疆海島之逺朕尚惻然加念豈有隨從軍士令其枵腹跋涉乎在爾等有管軍之責亦應體恤羣下也十月丙辰上幸金山乘沙船渡楊子江風浪恬靜舟行甚速諭侍臣曰自兵興以來恢復嶽州長沙多得舟楫之力今海宇承􅊭昔時戰艦僅供巡幸渡江之用然安當思危治不忘亂朕乘此舟未嘗不念艱難用武之時非以遊觀為樂也大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷二
