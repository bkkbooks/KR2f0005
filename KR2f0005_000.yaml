body:
  text: 欽定四庫全書聖祖仁皇帝聖訓序朕荷皇考聖祖仁皇帝付託至重兢兢業業早作夜思以期無負繼述仰惟皇考留遺矩矱朕得監於成憲是則是效實天下萬世所當欽承觀法爰命大學士等纂修聖祖仁皇帝實録閲時九載書成千卷自古帝王功德之隆盛記載之繁富未有加於此者顧實録乃編年之書我皇考順時布化若天道之流行春秋冬夏各協其宜而其中條分縷析飭綱振紀精微所寓隨舉一端皆為法式於是復令纂修諸臣分類恭輯聖訓六十卷洋洋乎盛德大孝敬天勤民文教之誕敷武功之赫濯禮樂之明備政刑之修舉一經睿謨千古莫易夫六經諸史之傳皆有經有緯朕於皇考神功聖德精心體察以實録為經以聖訓為緯於編年見因時之宜於分類見隨事之要一敷施而有所循也一話言而有所法也一寤寐飲食而有所遵也於戲如天之仁如日之照如神之哲萬類雖賾莫不含𢎞并包於聖人之度內而警惕訓諭之辭尤必凜凛于時幾孜孜於熙績勤勤於小民之恬養亹亹於嘉師之祥刑蓋聖心愈切而聖德愈崇是以統乾坤之範圍而不過發聖賢之閫奧而靡遺以六十餘載之鴻規為千萬世後昆之垂裕其所裨益曷有涯量哉此朕命官敬纂皇考實録而又恭繕聖訓之深意子子孫孫其永寶諸雍正九年十二月二十日欽定四庫全書聖祖仁皇帝聖訓序自古聖人誕受天命為下民君師必亶聰明睿智之資首出乘乾以綏猷而立極凡其經緯萬端敷之彞訓者罔不深切著明炳日星而章雲漢典謨所載雅頌所陳唐虞三代之隆有如一轍欽惟皇祖聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖德廣運久道化成文治光昭武功赫濯薄海內外深山窮谷之衆總淪浹於仁心仁政之中教思無窮訓詞深厚歷考熙明之運未有躋此崇隆者也肆我皇考世宗憲皇帝以聖繼聖用人行政一一仰法前徽既纂修實録成書復分類恭輯聖訓六十卷俾皇祖六十餘年敬天尊祖經國保民農田學校禮樂兵刑之盛蹟見之都俞吁咈間者粲然常新釐然備具永貽我後嗣子孫億萬年升平矩範蓋皇祖性本生安道兼創守實集千古聖帝明王之大成是以聖謨洋洋明徵定保宏綱巨目有要有倫精一之心傳蕩平之王路胥不外乎此也豫小子昔在齠齡早荷聖慈賜育宫庭祗聆訓迪茲膺基緒紹聞衣德之志兢兢業業不懈益虔昕夕尋繹惟期懋遵祖訓以無負皇考善繼善述之貽謀顧金匱石室之藏中外無得見者爰命儒臣敬謹繕寫授之剞劂庶我皇祖聖祖仁皇帝建中表正牖民覺世之言昭垂寰宇羣工士庶咸得漸摩於聖訓之崇閎而率由無斁也不亦庥歟謹序乾隆六年三月二十四日欽定四庫全書史部六大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓目録詔令奏議類詔令之屬卷一聖孝卷二聖德卷三聖德卷四聖德卷五聖學卷六聖治卷七聖治卷八聖治卷九聖治卷十敬天卷十一法祖卷十二文教附武科卷十三武功卷十四武功卷十五武功卷十六武功卷十七武功卷十八武功卷十九武功卷二十武功卷二十一恤民卷二十二恤民卷二十三任官卷二十四廣言路卷二十五嚴法紀卷二十六嚴法紀卷二十七理財卷二十八愼刑卷二十九愼刑卷三十重農桑卷三十一興禮樂卷三十二省方卷三十三治河卷三十四治河卷三十五治河附運河北河水利卷三十六澄叙卷三十七賞賚卷三十八蠲賑卷三十九蠲賑卷四十蠲賑卷四十一蠲賑卷四十二積貯卷四十三飭臣工卷四十四飭臣工卷四十五飭臣工卷四十六飭臣工卷四十七訓將士卷四十八訓將士卷四十九訓將士附恤兵卷五十褒忠節卷五十一恤舊勞卷五十二廣幅員卷五十三𢎞制度卷五十四弭盜卷五十五牧政卷五十六禮前代卷五十七柔逺人卷五十八柔逺人卷五十九柔逺人卷六十柔逺人臣等謹案聖祖仁皇帝聖訓六十卷雍正九年世宗憲皇帝恭編乾隆六年皇上御製序文刋布凡三十二類總一千九百餘則篇帙視列聖為富蓋我聖祖仁皇帝道符帝縡命自天申景祚延洪卜年久逺六甲五子首末循環與天運相始終故神功聖德史不勝書實録數盈千卷而貽留大訓亦紀載獨繁伏考周易有曰日月得天而能久照四時變化而能久行聖人久于其道而天下化成寶祚綿長故彛訓最為詳備此誠帝王之盛軌也然其故有不止於此者昔虞舜鳴韶鳳儀獸舞而皋陶揚拜猶期以慎憲省成慮其始勤而終惰也使厯年久逺而暇豫之念或萌則怠氣所乘又安能於天下之事一一為之衡量於在廷之臣一一為之啓導今跽讀聖謨所為保泰而持盈謹小而慎微者六十一年殆如一日然則聖訓之獨多固在享國之永亦在􅊩政之勤矣周公告誡成王厯舉太戊武丁祖甲文王之壽考而歸本於無逸聖人之心固異世而同符也乾隆四十八年八月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀
