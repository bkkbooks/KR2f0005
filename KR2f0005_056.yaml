body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷五十六禮前代康熙十四年乙卯九月庚子上諭禮部往代帝王陵寢所在地方理宜守護以安神靈朕近行幸湯泉道經昌平見明朝諸陵殿宇雖存户牖損壞附近樹木亦被摧殘朕心深為憫惻爾部即嚴加申飭守陵人户令其敬謹防護仍責令該地方官不時稽察勿致仍前怠玩以副朕優禮往代之意康熙二十二年癸亥八月己酉刑部題發掘故明廢藩墳墓盜案上諭大學士等曰部議照盜發常人墳墓律擬絞盜發藩王等墳墓何得與平人一例凡歷朝俱應稱某代必稱故明深覺未當以後本章凡故明廢藩字樣應悉除之其盜發墳墓與撥人看守之處著九卿詹事科道議奏康熙二十三年甲子十一月甲子上諭江南江西總督王新命江蘇巡撫湯斌曰明太祖天資英武敷政神明芟刈羣雄混一區宇肇造基業功德竝隆其陵寢在鍾山之麓係江寧所屬地方向已有㫖令有司各官春秋致祭嚴禁樵採并設有守陵人户朝夕巡視但為日已久不無廢弛今朕省方江寧親詣拜奠見墻垣傾圮林木凋殘皆係無知民人不遵約束恣肆作踐往來行走殊干法紀嗣後爾等督令地方各官不時巡察務俾守陵人役用心防護勿致附近旗丁居民仍前踐踏所有春秋二祭亦必䖍潔舉行以副朕崇重古帝王陵寢至意康熙二十八年己巳二月己酉上南巡駐蹕杭州府城諭扈從部院諸大臣曰朕行次浙江禹陵在望大禹功德隆盛萬世永賴朕親詣行禮祭文內書朕名乃親撰文致祭其詞曰惟王精一傳心儉勤式訓道由天錫啓皇極之圖疇功在民生定中邦之井牧四載昔勞胼胝永賴平成九叙早著謨謀惟歌府事行其無間德逺益新朕省方東南道經吳越覩長江之浩渺心切溯洄瞻髙巘之嵯峨企深仰止幸矣松楸伊邇儼然律度可親特薦馨香躬修祀事惟祈靈爽尚克來歆是日上諭禮部祭以敬為主禹陵僻處荒村恐致䙝慢凡供獻粢盛禮儀諸事令左都御史馬齊與侍郎席爾達同往省視甲寅上諭福建浙江總督王隲曰朕巡幸江表𬗟懷禹德躬率羣臣展祭陵廟顧瞻殿廡傾圯禮器缺略人役寥寥荒涼增歎愚民風俗崇祀淫祠爼豆馨香奔走恐後宜祀之神反多輕忽朕甚慨焉在昔帝王陵寢理應隆重培護况大禹道冠百王身勞疏鑿奠寧率土至今攸賴特書地平天成四字懸之宇下令地方官即加修理詳備儀物守祀人役亦宜增添俾規模𢎞整歲時嚴肅兼賜白金二百兩給守祀之人此後益令敬慎守土之臣亦須時為加意副朕尊崇遐慕之懷其各凛遵毋忽康熙三十一年壬申正月丁丑上諭大學士等曰前纂修明史諸臣以所撰本紀列傳數卷進呈朕詳晰披閲并命熊賜履校讎熊賜履於洪武宣德本紀訾議甚多朕思洪武係開基之主功德隆盛宣德乃守成賢辟雖時殊事異然皆勵精著於一時謨烈垂諸奕世為君事業各克殫盡朕亦一代之主也鋭意圖治朝夕匪懈綜理萬幾孶孶懋勉期登郅隆若將前代賢君搜求其間隙議論其是非朕實無此意也朕於古之聖君尚未能逮何敢輕議前代之令主耶若表揚洪武宣德著為論贊朕尚可指示諸臣重加稱美倘深求刻論非朕意所忍為也至於開創佐命諸臣各著勳績列傳內紀文臣事蹟優於武臣則議論失平難為信史纂修史書雖史官之責而當朕之時修成此書稍有未協咎將歸朕明代實録及紀載事蹟諸書皆當搜羅藏弆異日明史告成新史與諸書俾得竝觀以俟天下後世之公論焉康熙三十六年丁丑正月甲戌上諭大學士等曰觀明史洪武永樂所行之事逺邁前王我朝現行事例因之而行者甚多且明代無女后預政以臣陵君等事但其挽季壞於宦官耳且元人譏宋明復譏元朕竝不似前人輒譏亡國也惟從公論耳今編纂明史著將此諭增入修明史敕書內康熙三十八年己卯四月庚戌上南巡駐蹕句容縣諭大學士等曰明代洪武乃創業之君朕兩次南巡俱舉祀典親往奠醊今朕臨幸當再親祭大學士等奏曰曩者皇上兩次南巡業䝉親往奠醊今應遣大臣致奠不必親臨上曰洪武乃英武偉烈之主非尋常帝王可比著兵部尚書席爾逹致祭行禮朕親往奠御製祭文曰帝天錫勇智奮起布衣統一寰區周詳制作鴻謨偉烈前代莫倫朕曩歲時巡躬修醑薦仰其遺轍不囿成規兹因閲視河防省方南邁園陵如故睇松柏以興思功德猶存稽典章而可範溯懷彌切奠酹重申靈其鑒兹尚期歆享壬子上駐蹕江寧府詣明太祖陵奠爵閲視陵寢諭大學士等曰朕今日詣明太祖陵寢致奠見其圯毁已甚皆由專司無人朕意欲訪察明代後裔授以職銜俾其世守祀事古者夏殷之後周封之於杞宋即今本朝四十八旗䝉古亦皆元之子孫朕仍沛恩施依然撫育明之後世應酌授一官俾司陵寢俟回都日爾等與九卿會議具奏九月二十八日大學士等議得明亡已久其子孫急難查訪今皇上隆禮前代恩澤有加臣等愚見應委該地方佐二官一員專司祀典俟查訪得人再行奏聞從之康熙四十一年壬午十一月壬申工部議覆浙江巡撫趙申喬題請修葺禹陵應令捐修上曰凡古帝王陵寢地方官應不時修葺今禹陵必頽壞已極趙申喬始行題請著杭州織造㑹同地方官動用歷年節省錢糧即行修理以稱朕尊崇前代聖王之意康熙四十二年癸未十一月丁巳上駐蹕西安府翰林院以撰擬周文王武王祭文進呈上曰文王武王皆古之聖君非他帝王可比且向以孔子聖人已書朕名致祭矣此祭文內亦須書名康熙五十五年丙申十一月乙酉刑部題盜犯韓七等偷掘明朝陵寢為首之韓七現在脫逃獲日另結為從之王五等擬絞監候秋後處決上曰偷掘明朝陵寢即與掘伊祖父墳墓相同韓七著該管官嚴緝務獲到日著即處斬王五等著立絞康熙五十六年丁酉正月己卯上諭諸皇子及領侍衛內大臣等曰世祖章皇帝曾以禮殯葬崇禎念太監王承恩盡忠并命大學士為之殯葬諸帝陵寢皆躬親奠酹命人看守歲時祭祀垂為定例近日拏獲偷掘明代陵寢之賊部議將為從者擬以充發朕思今日之百姓皆明代所遺之百姓也此與掘伊祖父之墓何異是以降㫖將首從諸賊俱行處死但明代諸陵年久或看守之人不謹亦未可定爾等往各陵祭奠務詳細查明具奏四月丙申禮部題皇上命諸皇子及領侍衛內大臣等拜奠明朝諸陵請宣付史館上曰明朝十三陵朕四十年前曽經親往今已多年恐看守人等疏忽陵寢或有毁壞之處故遣諸皇子等往奠據回奏宫殿與一切屋宇修葺堅整歷年雖久毫無動壞看守人等亦俱謹慎此所奏已知之康熙六十一年壬寅四月辛酉禮部遵㫖會議自伏羲氏以逮有明應入廟崇祀帝王及從祀功臣詳開一摺偏據一方不入正統及不應崇祀者詳開一摺具疏陳奏上諭大學士等曰此所議應崇祀處皆是但其中尚有宜詳細斟酌者從前所定配享功臣大槩開國元勳居多如明之徐逹不過一草莽武夫劉基係元之進士遭遇成功遂以元勳配享耳其有治安之世輔佐太平有功軍國者反不得與配享之列是皆未為允當也又如有明天下皆壞於萬歷泰昌天啓三朝愍帝即位未嘗不勵精圖治而所值時勢無可如何明之亡非愍帝之咎也朕年少時曽見明耆舊甚多知明末事最切野史所載皆不足信愍帝不應與亡國之君同論萬歷泰昌天啓實不應入崇祀之內爾等會同九卿將此詳細分别確議具奏大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷五十六
