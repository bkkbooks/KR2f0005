body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷八聖治三康熙四十七年戊子閏三月甲午上諭大學士等曰前命直隸各省督撫將欽件部案限內完結及未完結之處逐季奏報是以邇來盜案按限具題者甚多可傳諭吏部將逐季奏報之事見在某省已奏某省未奏著即查明具奏康熙四十八年己丑十月丙午上諭大學士等曰趙申喬為人苛刻參劾武官甚多武官與文官不同即爾等文官能一無所取乎已即不取能禁家人一無所取乎爾等自思之當各自知之也且武官窮苦若至一無所有一旦有事則弓刀馬匹人人向巡撫求助彼豈能盡給乎故抑武人是眀代陋習武人粗鹵不宜抑之太甚凡治天下之道當以和平為貴也康熙五十年辛卯五月己酉上諭大學士等曰朕理幾務年久閲本甚速凡一應奏摺及緑頭牌頃刻即能遍閲前尚書穆和倫數次奏事意朕未加詳閲復行奏請朕將事內緣由指明穆和倫乃默然無言而退且朕閲事不止於速凡一經目斷不遺忘一應奏章及彚題案件無不詳閲有差悮字句朕必以硃筆更改發出六月乙亥上諭大學士等曰先曽令各部院彚題案件每十日十五日內務須彚題一次諭㫖甚明從前彚題案件殊多壅積朕催促具奏俱已完結今看彚題之事又多有逾限具奏者著再行嚴飭十二月丁卯左都御史趙申喬奏請禁止創建寺廟上曰近見直隸各省創建寺廟者甚多建造寺廟則占踞百姓田廬既成之後愚民又為僧道日用湊集銀錢購買貧人田地給與以致民田漸少且游民充為僧道窩藏逃人罪犯行事不法者甚多實擾亂地方大無益於民生者也著各省督撫及地方官除原有寺廟外其創建增修永行禁止康熙五十一年壬辰二月壬午上諭大學士九卿等曰朕覽各省督撫奏編審人丁數目竝未將加增之數盡行開報今海宇承平已久戶口日繁若按見在人丁加徵錢糧實有不可人丁雖增地畝竝未加廣朕凡巡幸地方所至詢問一戶或有五六丁止一人交納錢糧或有九丁十丁亦止二三人交納錢糧詰以餘丁何事咸云䝉皇上洪恩竝無差徭共享安樂優游閒居而已此朕之訪聞甚晰者前雲南貴州廣西四川等省遭叛逆之變地方殘壞田畝拋荒自平定以來人民日增漸次開墾或沙石堆積難於耕種者亦間有之而山谷﨑嶇之地已無棄土盡皆耕種矣由此觀之民之生齒實繁朕欲知人丁之實數不在加徵錢糧也今國帑充裕屢歲蠲免輒至千萬而國用所需竝無遺悮不足之虞故將直隸各省見今徵收錢糧冊內有名人丁永為定數嗣後所生人丁免其加增錢糧但將實數另造清冊具報豈特有益於民亦一盛事也直隸各省督撫及有司官編審人丁時不將所生實數開報者特恐加徵錢糧是以隱匿不據實奏聞豈知朕竝不為加賦止欲知其實數耳嗣後督撫等倘不奏明實數朕於就近直隸地方遣人逐戶挨查即可得實此時伊等亦復何詞耶五月壬寅上諭大學士等曰湖廣百姓往四川墾地者甚多伊去時將原籍房産地畝悉行變賣至滿五年起徵之時復回湖廣將原賣房産地畝爭告者甚多巡撫潘宗洛以此情由曾繕摺啓奏嗣後湖廣民人有往四川種地者該撫將往種地民人年貌名姓籍貫造冊移送四川巡撫令其查明其自四川復回湖廣者四川巡撫亦照此造冊移送湖廣巡撫兩相照應查驗則民人不得任意往返而爭訟可以止息矣又諭曰山東民人往來口外墾地者多至十萬餘伊等皆朕黎庶既到口外種田生理若不容留令伊等何往但不互相對閲查眀將來俱為䝉古矣嗣後山東民人有到口外種田者該撫查眀年貌姓名籍貫造冊移送稽察由口外回山東去者亦查明造冊移送該撫對閲稽查則百姓不得任意往返而事亦得清釐矣九月庚子上諭大學士等曰紅苖等居深山之中自古以來竝未向化鄂海等宣示德澤盡行招撫殊屬可嘉今紅苖等輸誠削髮投順地方文武官員務仰體朕無分內外咸俾盡享升平無不樂業至意將紅苖等安插得所從容化導倘有不肖官員將紅苗侵蝕擾害者該督撫即行指名題參從重治罪康熙五十二年癸巳三月壬寅上命大學士等傳諭直隸各省慶賀萬壽節衆老人曰書稱文王善養老孟子云五十非帛不暖七十非肉不飽帝王之治天下發政施仁未嘗不以養老尊賢為首務近來士大夫只論居官之能否而移風易俗之實政入孝出弟之本心未暇講究朕因今日之盛典特宣此意若孝弟之念稍輕而求移風易俗其所厚者薄而其所薄者厚矣爾等老人比回鄉井之間各曉諭鄰里務先孝弟倘天下皆知孝弟為重此誠移風易俗之本禮樂辭讓之根非淺鮮也昨日甘霖大沛田野霑足朕心大悅爾等無悮農時速回原籍特諭四月甲寅左都御史趙申喬奏請農忙之時京城地方亦應遵例停訟上諭大學士等曰農忙停訟之言聽之似乎有理而細究之實無裨益趙申喬總未知事之本源耳天下之民非獨農人商賈涉訟即廢生理百工涉訟即廢手藝地方官不濫准詞狀於應准者准之即行結案則不失農時訟亦少矣若但四月至七月停訟而平日濫收民詞案牘堆積冬季詞訟遲至次年五六月而後審理雖停訟何益康熙元年間去明代不遠明之官員太監尚有存者朕聞其君常處深宫不與臣下相見而惟與宦豎相處既不讀書亦不勤政所以上下之情壅蔽不通民間疾苦竟罔聞知朕理天下五十餘年周知民隱一切訟事皆有代告說合之人暗司其事地方官於此等人應嚴加懲治孔子云聽訟吾猶人也必也使無訟乎無訟之本竝不在停訟為大臣者當先憂後樂凡事周詳籌畫實心辦理乃能利益民生趙申喬謂農忙之時應行停訟倘四月至七月數月之間或有光棍詐害良善則寃向誰訴耶且自八月以後正當收穫竝非閒時果如伊言亦不應准詞狀至如南方四月收麥北方五月收麥福建廣東十一月布種二月收穫五月布種十月收穫四季皆農時也如此等處豈終歲停訟乎趙申喬居官固清但性多疑所屬州縣每疑其貪詐書云用人勿疑朱子曰疑人即自疑今朕所用大臣朕曷嘗疑之凡督撫有才者未必有守有守者未必有才然自恃清廉妄事紛更則民即受其害矣讀書之人務先明理當以克己為要有過則改無容掩飾惟有益於民之事朕即允行否則斷乎不行也六月丁酉上諭大學士等曰今督撫俱報地方之事甚善觀前史壞事皆生於隱匿眀時賊情俱隱匿不聞以致四方情形全然不知朕臨御年久凡事莫不豫為籌畫旱潦之災民之疾苦自古所有之事若果督撫凡事奏聞不為隱匿豫為防備雖有事亦復何慮又諭曰嶽拜自陜西來奏云陜西省免五十一年錢糧甘肅衛所應徵之米未免請將此米免徵朕言汝度兵餉之米足與不足再奏彼回算果不足一如朕言彼今無法繕摺具奏請酌分數量減因昔趙申喬有奏請免右衛錢糧之事故彼援此具奏但為彼之聲名耳兵餉關係緊要朕不斟酌即據奏寬免可乎七月乙卯上諭大學士等曰部院官員內還有辦事好者但於事不甚留心未免疏略朕總理萬幾經歷勞苦當煩劇時日閲二三百件事今只二三十件事閲之何難昔年少時能步行四五十里今雖有年尚可步行十數里凡事皆在歷練耳辛酉上諭大學士等曰朕自幼與舊時大臣同理國事至十三歲親政頒恩詔時有奏悮赦一人者大學士李霨奏云業已悮矣聽之便朕曰宥人聽其悮猶可也若殺人聽其悮可乎李霨喜極涕零奏云聖諭誠可昭垂萬世臣甘待罪曩朕與輔政大臣等共理政時紅批已發科抄之事常有取回換本改批發出者馮溥為給事中奏云凡事在內當即詳定已批出者不可反汗遏必隆鰲拜皆粗鹵即欲罪馮溥朕以紅批奏章所關甚要馮溥言是因於本上批獎之自此遂無取回之事十月丙子戶部議原任偏沅巡撫潘宗洛題請墾荒展限應行文接任巡撫查眀詳議上諭大學士等曰凡督撫條陳地方事務應以實奏潘宗洛奏湖南荒田五百餘頃今天下戶口甚繁地無棄土湖南安得有如許未墾之田著差戶部司官一員會同湖廣總督額倫特就潘宗洛奏疏內所有州縣親身查勘詳眀具奏如此則伊所奏虛實即可知矣又諭曰湖廣陜西人多地少故百姓皆往四川開墾聞陜西入川之人各自耕種安分營生湖廣入川之人每每與四川人爭訟所以四川人深怨湖廣人或有將田開墾至三年後躲避納糧而又他往者今四川之荒田已盡開墾果按田起稅則四川省一年內可增錢糧朕意國用已足何必苛求且先年人少田多一畝之田其值銀不過數錢今因人多價貴一畝之值竟至十數兩不等即如京師近地民舍市廛日增居址連亘毫無空隙此皆朕與爾等所親見者也今歲不特田禾大收即芝麻木棉皆得收穫如此豐年而米粟尚貴皆由人多地少故耳又諭曰朕巡幸時見直隸自苑家口以下向年永定河衝決之處今百姓皆築舍居住斥鹵悉變膏腴不下數百頃皆未嘗令起科也今江南一帶河隄至遙隄間有二三里者亦有六七十丈者其空地先皆植柳以備河工取用今彼處百姓盡行耕種亦竝未令起科昔黃河泛漲時遙隄之內水常灌入不得耕種自清水暢流以來河底刷深水必長至二丈才能及岸今皆成沃壤矣大凡濁水與清水合流方可無壅決之患如直隸永定河一交冬令水即漸涸或有壅沙高出河身及夏秋水發不由故道而行遂至橫散四潰湮沒民間田廬朕計度河工情形自引芒牛河之水入於永定河冬春雖水小不能行舟而仗此引流故道不至淤壅至水發時清水合流水力大故河底刷深無衝決之患矣大學士李光地奏曰永定河為害眀時糜費金錢二三百萬卒無成效皇上開引芒牛河之水所費不過千金遂成萬載奠安之利上曰凡人力能為者朕猶能慮及之去年趙申喬條奏河南黃河近岸被衝田畝請查眀數目蠲免錢糧黃河東岸刷則西岸之田出西岸刷則東岸之田出被衝之田應免錢糧則新出之田不應取錢糧乎今年浙江提督吳郡陛見時朕謂吳郡云聞浙江海中漁船甚多凡此等船進海口時防汛官兵索錢方令入口其中有不聊生之窮人不得入海口從此遂為海賊觀此則海賊即內地漁人是官兵迫而驅之海中為賊者也吳郡乃驚異奏云皇上聖眀洞鑒萬里臣當竭力禁約近聞此弊未絶朕於吳郡下此諭㫖特欲使提鎮等咸知之今遣官勘驗湖南荒田亦此意爾總之督撫不可侵部院之權部院亦不宜刻求督撫之非凡事宜用中不可一偏也又諭曰各方水土不同種桑止宜江浙北方氣寒不能養蠶人之不習水土亦然南方人不能居口外猶口外人不能居南方然以理論則皆同此所謂性相近也康熙五十三年甲午四月乙亥上諭禮部朕惟治天下以人心風俗為本欲正人心厚風俗必崇尚經學而嚴絶非聖之書此不易之理也近見坊間多賣小說淫詞荒唐俚鄙殊非正理不但誘惑愚民即縉紳士子未免遊目而蠱心焉所關於風俗者非細應即通行嚴禁其書作何銷毁市賣者作何問罪著九卿詹事科道會議具奏六月丙子上諭大學士等曰太監等不可假以威權事發即殺之朕御極之年去眀代不過二十年萬厯時太監以及官員朕俱曾任使伊等向朕奏眀末時事謂流賊自南而來將兵盡發往保定從流賊從居庸關入跳越京師南關攻城城內無兵祇太監百姓官員家人防守七日城即陷平日太監等專權人主不出聽政大臣官員俱畏懼太監以致悮事此輩性情與常人異祇足備宫中使令耳天下大權惟一人操之不可旁落豈容假之此輩乎又萬厯年間太監奏庫內積銀二百萬兩有餘應入大內遂盡收養心殿後掘窖埋藏後欲取用已無有矣所以我朝耆舊常言眀代蓄積徒資太監侵盜耳今我朝庫銀有數千萬兩若掘窖埋藏亦安所用朕嘗謂漢大臣云眀代以爭議河套事曾殺大臣此一小事何致殺戮大臣若當此時朕只須遣一筆帖式一撥什庫事即定矣漢大臣皆相顧驚愕朕幸寧夏過鄂爾多斯地方謂松阿喇布王云爾等祖宗不過欺侮漢人遂據河套耳若朕則自橫城坐船帶糧從鄂爾多斯之後抄出據守爾等將若之何松阿喇布王瞿然奏云今內外一家皇上奈何出此可畏之言回鑾時朕由橫城坐船計二十一日至湖灘河朔己將馬匹發往陸路此二十一日率步行圍獵打魚而回又諭曰朕自幼讀書聽政已久治國之道莫要於寬舒今天下承平無事凡屬老幼無不歡欣鼓舞以為得生斯世皆有福之人也七月己未上問學士關葆曰爾曾居䝉古一年用漢人之道可治䝉古否關葆奏曰不可上曰拂人之性使之更改斷乎不可譬如陜西江南百姓令其易地而居則不但彼處田土此不能耕此處器械彼不能用即水土亦多不服惟天賦忠孝之性無有異同雖窮荒僻壤亦有至忠至孝之人不可以地論也康熙五十五年丙申四月乙巳上諭領侍衛內大臣等曰聞熱河米價甚貴每石至一兩七錢扈從人等復行齊集採買則米價愈加騰貴官兵每月既得錢糧若復給口糧未免重復但以所給錢糧買米又恐不敷著將熱河之倉及唐三營倉所貯之米發出設立一厰每石定價銀一兩賣與隨駕官兵令各該管之人查視不許多買自無轉賣之弊而於官兵亦大有裨益矣五月乙丑上駐蹕熱河諭扈從諸臣曰今歲米價甚昂頃曾降㫖將八月所放之米令即支給目前雨水之時應於未雨之先即將此米給與衆人始為有益今年四月前甚旱既雨之後又恐多雨都統副都統參領等於此等處未必能實心籌畫倘雨過多道路泥濘車輛難行勢必至米糧潮濕拋棄於軍民全無實惠著將此㫖傳示八旗都統等九月甲申上諭大學士等曰聞山西陜西今歲收穫較往年甚豐但西邉見有軍務沿邉一帶地方錢糧及舊缺錢糧應豫蠲免其在軍前緑旗兵丁所借錢糧免其坐扣今歲湖廣收成亦好湖南大熟湖北微不及江西雖覺稍旱究亦無妨江浙素稱豐富朕前巡幸南方時米價每石不過六七錢近聞竟賣至一兩二三錢如此民何以堪今江浙兩省被災地方錢糧作何蠲免之處爾等詳議具奏前張伯行曾奏江南之米出海船隻帶去者甚多若果如此亦有關係洋船必由乍浦松江等口出海稽查亦易聞臺灣之米尚運至福建糶賣由此觀之海上無甚用米之處朕理事五十餘年無日不以民生為念直隸今嵗米價稍昂朕發倉糧二十萬石分遣大臣巡視散賑米價即平小民均沾實惠若內而九卿科道外而督撫提鎮悉體朕軫念蒼生至意則天下無不理之事矣十月辛亥上諭大學士等曰朕訪問海外有吕宋噶囉吧兩處地方噶囉吧乃紅毛國泊船之所吕宋乃西洋泊船之所彼處藏匿盜賊甚多內地之民希圖獲利往往於船上載米帶去并賣船而回甚至有留在彼處之人不可不豫為措置也壬子上諭大學士九卿等曰天下事未有不由小而至大小者猶不可忽大者益宜留心爾等在衙門或能辦理事務或以清白自持亦止為身計耳其關係封疆大事未必深思遠慮也即如海防乃今日之要務朕時加訪問故具知原委地方督撫提鎮亦未能盡悉也朕南巡過蘇州時見船厰問及咸云每年造船出海貿易者多至千餘回來者不過十之五六其餘悉賣在海外齎銀而歸官造海船數十隻尚需數萬金民間造船何如許之多且有人條奏海船龍骨必用鐵梨竻木此種不産於外國惟廣東有之故商人射利偷賣即加查訊俱揑稱遭風打壞此中情弊速宜禁絶海外有吕宋噶囉吧等處常留漢人自眀以來有之此即海賊之藪也官兵出哨或遇賊船四五隻官兵船止一二隻勢不能敵舵工又不奮力向前將領亦無可如何不過尾追而已何能𠞰滅耶張伯行曾奏江浙之米多出海販賣斯言未可盡信然亦不可不為豫防出海貿易海路或七八更遠亦不過二十更所帶之米適用而止不應令其多帶在東洋可使貿易若南洋商船不可令往第當如紅毛等船聽其自來耳且出南洋必從海壇經過此處截留不放豈能飛渡乎又沿海炮臺足資防守眀代即有之應令各地方設立往年由福建運米廣東所雇民船三四百隻每隻約用三四十人通計即數千人聚集海上不可不加意防範臺灣之人時與吕宋地方人互相往來亦須豫為措置凡福建廣東及江南浙江等沿海地方之人在京師者爾等可加細詢朕令廣州將軍管源忠浙閩總督滿保兩廣總督楊琳來京陛見亦欲以此面諭之海外如西洋等國千百年後中國恐受其纍此朕逆料之言又漢人心不齊如滿洲䝉古數十萬人皆一心朕臨御多年每以漢人為難治以其不能一心之故國家承平日久務須安不忘危爾等俟管源忠等到京後會同詳議具奏大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷八
