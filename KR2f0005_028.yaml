body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷二十八愼刑一康熙二年癸卯正月壬午上諭兵部凡查解逃人有主認識始應照例擬罪今見靈夀縣所解逃人李大增督捕傳撥什庫七人到部俱不認識即李大增自供竝地方十家長俱云竝未投充滿洲李大增明係民人督捕不行審明即議李大增等入官李九山等流徙恐屬寃枉且陳氏等七人何以盡斃於獄爾部即將該縣典史楊煦快役髙應正溫起家并出首李大增之髙萬臣作速差人提取到部請㫖定奪十一月乙丒朔刑部題覆山東總督祖澤溥審鞫原任按察使宋琬等通同于七謀反一案兩議上請一擬極典一擬流徙將原審總督祖澤溥議處上曰據審宋琬等原無通賊情節干證唐進夏吳八等亦堅稱烏有叛逆重罪理應詳審情實即應正法如虛即應免罪爾部將無確據之事懸揣定擬兩議俱屬不合宋琬等著免罪總督祖澤溥亦免議處十二月辛酉刑部以嵗終彚報病故監犯上曰據奏監犯物故者甚多人命關係重大罪不至死者久淹獄中管獄官役不與犯人飲食餓斃亦不可知獄官獄卒如此疏忽殊為不合著嚴加申飭康熙三年甲辰十二月壬午兵部督捕左侍郎馬希納等奏請嗣後首告逃人之人帶有逃人之主同赴具告者准咨該督撫嚴查解部若竝無逃人取地方官保結咨報免提案內牽連之人質審上曰不將被告千證提來質審則逃人獲者稀少若提來質審不但牽連人多且往來提解甚苦以後有首告逃人在某處某家者將首告之人拏送地方官照發去口供止將窩隱之人令出質問若無逃人而挾讐控告或牽引妄扳將謊告之人加等治罪康熙四年乙巳二月癸酉上諭刑部向來流徙人犯定例有止應將夲身流徙者有應并將妻子流徙者後因夫妻不應拆離故凡應流徙人犯將伊妻子一併發遣原欲令其夫妻不致拆離一同完聚其妻子夲係無罪如夲犯已死仍將妻子發遣未合以後除反叛重案內應連坐者仍照前㫖定例遵行外其餘凡犯贓等罪應流徙人犯如夲犯已死妻子俱免流徙爾部即遵諭行康熙八年己酉五月癸巳朔上諭刑部凡行幸之處有叩閽者若不審明事之虛實遽照衝突儀仗律則此內或有寃枉亦未可定以後著審明所告之事虛者責四十板免其充軍六月癸酉上諭刑部直隸各省罪囚舊遣恤刑官審録今恤刑罷遣遇熱審時有非實犯死罪者宜具題減等如在京法司例爾部通行直隸各省永著為令康熙九年庚戌二月壬申上諭刑部盜案內論死者甚多其為誣引株連亦或有之宜加詳勘至於夾棍乃慘痛之刑必不得已而後用其愼之毋忽六月丙申上諭刑部近覽章奏罪犯監禁逾限不行速審以致斃獄者甚多夫各犯自有應得之罪未死於法先死於獄殊非愼刑之意朕心深為不忍嗣後逾期不結監斃幾人以上者著嚴議處分定例己酉上諭刑部今年雖經頒詔將重犯赦免但時值暑熱天氣亢旱牢獄重犯內有可矜疑者亦未可知著圗海杜立德等前赴刑部㑹同將監內重犯確審酌議具奏康熙十年辛亥四月丙戌上諭刑部等衙門邇來天氣亢旱不雨或因刑獄淹禁中有寃抑亦未可知爾等將見禁人犯詳加清理如有可矜疑者照例減等發落其見審人犯亦速為審理應減等者即與減等應釋放者即行釋放務祈獄無寃滯以迓天和康煕十一年壬子六月己亥上諭刑部刑獄重地人命攸關天時炎暑急宜清理雖熱審見有定例但已結大案中監禁諸犯或有無知而罹法網小過而陷重辟者株連無辜久淹羈禁朕心深為惻然兹特遣大學士圗海等同三法司詳加審鞫凡有罪可矜疑者即為察明列奏務使情法允協有枉必伸以副朕欽恤刑獄至意閏七月丁亥上諭刑部設立刑法原以戢奸禁暴必事情重大方可用刑嚴訊近見內外問刑衙門嘗有濫用夾棍致斃人命者朕心殊為不忍嗣後審問事情爾等務加詳愼勿得輕聽問官不分輕重動輒夾訊希圗草率結案仍將審事官員嚴加申飭不時稽察其有任意濫刑者即指實題參務使重刑不得濫及無辜以副朕欽恤民命至意如有不應夾訊之人擅用夾訊及罪不至死而夾訊至死者作何治罪爾部㑹同吏部定議以聞十月辛亥刑部議覆江蘇巡撫馬祜疏言吳潦子等行劫殺人情實擬斬在獄相繼病故應無庸議上曰人命關係重大此案因監禁日久以致瘐斃多人殊非欽恤之意嗣後限內雖取口供不早題結致監斃幾人以上者作何處分其一併再議康熙十二年癸丑十一月丙寅朔上諭刑部自古帝王欽恤民命務期獄無枉縱讞決明允以成刑措之治朕每於秋決重犯特為詳愼惟恐一夫有寃以傷和氣向來期審之例先期進呈招冊然後九卿科道㑹審覆奏完結乃各省秋審奏夲內止有節略觀覽未能明晰又有秋審後續到者不及入覆奏案內以致留俟來年殊為不合以後各省秋審應令照在京朝審例豫期造冊進呈亦著九卿科道㑹同覆核奏請定奪其造進呈招冊及奉㫖結案行咨俱應限定日期爾部一併詳議定例具奏康煕十四年乙卯五月乙亥上諭刑部邇者天氣炎亢農事堪憂雖䖍誠祈禱尚稽雨澤朕念切民瘼夙夜焦勞或因刑獄淹滯中有寃枉致干天和亦未可知特遣索額圗等㑹同三法司將已結重案詳加審鞫如有罪可矜疑者即與察明事由開列奏聞務期情法允協有枉必伸以副朕欽恤刑獄至意十一月辛丑上諭刑部尚書艾元徴等曰罪人久繫朕心不忍今時嚴冬應速行審結康熙十六年丁巳七月壬辰上諭刑部秋審事關人命直隸各省重案著仍令定限送京師覆核如舊制康熙十八年己未三月己未刑部等衙門議覆御史黃斐疏言殺人羣盜中有同行為盜而非手刃人者宜許其自首減罪因具兩議上請一照律勿聽自首一如斐請上曰同行為盜雖未手刃人若聽其自首減罪恐有凶徒懷仇報怨投入羣盜令其黨殺人而後自首或親自手刃缷罪逸賊俱未可知應從依律論罪之議四月戊辰上諭刑部今已入夏亢暘不雨耕種愆期民生何賴或內外問刑衙門有無知而罹法網小過而陷重辟株連無辜淹禁日久刑獄重地人命攸關審擬未當有干天和朕每思及此深用警惕兹特遣索額圗明珠杜立德等㑹同三法司將已結大案見在監禁者逐一詳加審理務期明允無使寃滯其在外直隸各省監候重犯應遣三法司滿漢賢能司官前往察審凡罪可矜疑者㑹同該撫臬司詳開情由具奏俾無枉無縱以副朕愼刑愛民至意壬午上遣刑部郎中索爾孫等往直隸各省察審刑獄諭之曰朕因天時久旱恐外省罪犯中或有寃抑特選爾等前往察審務須體朕矜恤庶獄之意勿徇一己私見顛倒是非仍宜兼程遄往作速清結倘或遲延時日恐無賴之徒借端生事造作虛詞妄行訐訟反為良民之纍且爾等審理當否朕無不洞悉各宜愼之康熙十九年庚申四月戊辰上諭講官等曰律與例不容偏廢律有正條自應從律若無正條非比例何以定罪總之用律用例俱在得人也癸酉上諭刑部國家設立法制原以禁暴止奸安全良善故律例繁簡因時制宜總期合於古帝王欽恤民命之意向因人心滋僞輕視法網及強暴之徒凌虐小民故於定律之外復嚴設條例俾其畏而知警免罹刑辟乃近來犯法者多而奸宄未見衰止人命關係重大朕心深用惻然其定律之外所有條例如罪不至死而新例議死或情罪原輕而新例過嚴者應去應存著九卿詹事科道會同詳加酌定確議具奏康熙二十年辛酉正月辛巳上諭刑部等衙門帝王以德化民以刑弼教莫不敬慎庶獄刑期無刑故讞決之司所關最重必聽斷明允擬議持平庶幾民無寃抑可幾刑措之風近覽法司章奏議決重犯甚多愚民無知自陷法網或為教化未敷或為飢寒所迫以致習俗日偷愍不畏死每念及此深為憫惻在外督撫以下問刑各官審理重案有律例未諳定擬失當草率完結者有膠執成見改竄供招深文羅織者有偏私索詐受囑徇情顚倒是非者有一於此民枉何由得伸以後著嚴加申飭內外大小問刑衙門洗心滌慮持廉秉公務期原情凖法協於至當不得故縱市恩亦不得苛刻失入痛改積習加意祥刑以副朕尚德好生欽恤民命至意五月甲戌上諭刑部六月節若在五月內即以交節日停刑若六月後方交六月節即以六月初一日停刑至立秋雖在六月內必俟交過七月初一日方令行刑八月丁酉上諭刑部凡重案悉歸爾部擬罪關係最要早完一日牽連者得早安一日如遇齊戒不能審結犯人拘繫日久甚苦亦應於齊戒前速行完結再犯人各有應得之罪今聞爾部枷孔大小不一板有厚薄賄囑者板薄而孔大否則板厚而孔小所帶項鎖亦有輕重又聞爾部發在各衙門罪婦輒為門軍汚穢恐嚇索詐分外苛擾此等情弊爾等宜親行嚴察禁止十月丙午理藩院題盜馬罪犯阿畢大等五人應立決家産妻子請給事主上曰朕念人命關係重大每於無可寬貸之中示以法外得生之路書所謂罪疑惟輕也阿畢大等家産妻子既給失馬之人若夲犯免死給與為奴則失馬者得人役使於法未為不當嗣後著為定例康熙二十一年壬戌五月壬子上諭大學士等曰流徙寧古塔烏喇人犯朕向來未悉其苦今謁陵至彼目擊方知此輩既無房屋棲身乂無資力耕種復重困於差徭況南人脆弱來此苦寒之地風氣凛冽必至顛踣溝壑逺離鄉土音信不通殊可憫惻雖若輩罪由自作然發遼陽諸處安置亦足以蔽其辜矣彼地尚有田土可以資生室廬可以安處且此等罪人雖在烏喇等處亦無用也丙辰上諭刑部頃以逆寇殲滅海宇蕩平朕躬詣盛京展謁永陵福陵昭陵以告成功因而巡行邊塞咨詢民間疾苦東至烏喇地方見其風氣嚴寒由內地發遣安插人犯水土不習難以資生念此輩雖干憲典但既經免死原欲令其生全若仍投畀窮荒終歸踣斃殊非法外寬宥之初念朕心深為不忍以後免死減等人犯俱著發往尚陽堡安插其應發尚陽人犯改發遼陽安插至於反叛案內應流人犯仍發烏喇地方令其當差不必與新披甲之人為奴以昭朕軫恤民隱哀矜保全之意爾部即遵諭行六月丁亥上諭刑部尚書魏象樞等曰天氣炎熱可將爾部事件次第速行審結勿得遲延使犯人於應得罪外更受餘辜康熙二十二年癸亥十二月丙辰刑部以嵗終彚報病故監犯四十餘人上曰人命關係重大無辜枉死上干天和朕念獄中犯人自作罪孽理固應死但恐死於非命曾命御醫給與藥物療治有疾之人聞今嵗獄囚患病者甚多何故不將見給醫藥療治秋決之犯尚不及四十餘人今乃病死若干人犯豈皆命耶此由該部怠忽之故著傳諭刑部堂官嚴加申飭令伊等不時親自巡視仍令該管官員加意存恤無致濫斃以副朕慎重人命至意康熙二十三年甲子正月丙戌刑部議覆御史錢珏奏請申外吏酷刑之禁有司濫用非刑久已通行申飭應無庸議上諭大學士等曰刑罰關係人命凡讞獄用刑理應恪遵定制精詳慎重不得恣行酷虐致滋寃濫此夲內事情雖已經條奏申飭或有不肖官員日久玩忽仍於法外妄用重刑有負欽恤之意爾部仍通行內外審刑各衙門嚴加申飭如有故違即行指參從重治罪五月丙寅朔上諭大學士等曰前輔臣理事時有包衣佐領下人為盜於通州地方被擒該管包衣大赴通領糧遇見之歷數其惡加以鞭責後鞫審時遂銜恨扳陷包衣大同夥此包衣大竟坐強盜正法包衣佐領下人無不知此事者由此觀之天下如此等事不少朕常以此為念凡裁决政事遇有重罪雖應死必於死中求其生路反覆推詳下部再議必無疑竇然後完結此寧失出無失入之意也十二月丙午刑科給事中楊爾淑疏言直隸各省軍流人犯請比流徙尚陽堡寧古塔例嚴寒盛暑暫止發遣部議不准行上曰軍流人犯甫離刑獄一線僅存炎暖之時尚可就道若嚴寒發遣恐有道路死亡之患嗣後令過嚴寒發遣康熙二十四年乙丑四月戊戌刑部題易州知州韓文煜等誣良為盜應革職遣戍知府以上降革有差上曰此案可如所議不肖官員止為一已考成誣良為盜者甚多百姓受寃莫訴深可憫恤自後應作何立法勸懲俾善良得安民無寃抑庶不負朕祥刑之意其令九卿詹事科道集議以聞十月庚子上諭大學士等曰今年所擬秋決貪官甚多若盡行處決朕心不忍若不行處決貪劣之徒何以知警且或有犯贓雖多而情有可矜者或犯贓雖少而情有可惡者若一律議罪殊屬未允爾等將貪官情罪分别輕重朕當酌量定罪十一月乙丑大學士等以在京秋審人犯覆奏上曰爾等可執所議票㫖以進朕當詳覽之但援引成例乃部院官奉行之事朕與爾等宜虛公裁斷審度時宜酌量情罪豈可亦拘成例康熙二十五年丙寅三月庚午上諭刑部都察院大理寺大小諸臣曰刑曹民命攸關國典所係今見法司讞鞫刑獄或恐不得其情専事苛刻夫人命關係重大必以中正之心行平恕之道使法蔽其辜毋縱毋枉必得實情始免屈抑若惟以深文為能事煆煉為盡職及獄詞既具奏牘既成即反覆推詳欲求其更生之路亦甚難矣朕於爾諸臣所上章疏有情可矜疑罪未允協者皆駮令覆審嗣後其各體朕懷殫竭心慮矢愼矢明以副朕祥刑之意朕披閲史冊採擇厯代賢臣愼刑事蹟書之簡牘內閣三法司官其詳加省視又諭曰刑者所以禁暴止邪若豪猾奸宄毋使漏網貧弱無知雖偶失於寬亦不為過縱六月己未上諭刑部等衙門近因天氣炎熱特遣部院大臣㑹同三法司詳加審鞫將罪犯減等發落其直隸各省問刑衙門罪犯雖經詳愼始定爰書但內外原屬一體有情可矜疑者亦未可定著直隸各省督撫將已結案內見在監禁者逐一詳審果可矜疑開明具奏爾三法司覆加詳核照例減等以副朕愼刑愛民至意七月辛丑上諭刑部刑獄民命攸關聽斷雖貴精詳而案牘務無留滯庶事得速竣民免株纍向例凡月朔初二日及齊戒等期不理刑名爾衙門一切奏章俱行停止因而案件間有停積恐聽審人犯久候拖纍覆核事件遷延滋弊嗣後遇前項日期除循例不行刑外其餘照常章疏事務仍行審理啓奏務期獄無稽緩案得早清以副朕明愼用刑至意是日上諭大學士等曰每月朔初二日及齊戒等期刑部所上奏章照常發科刑戮重罪事關人命者勿發可併數日奏章於齊戒畢發之或留中或發內閣者皆如之十月戊寅上諭大學士等曰人命關係最重各省所審録強盜人命事件文致周密無隙可窺故閲之最難此等事皆深宜詳愼康熙二十八年己巳閏三月癸亥上諭吏部尚書阿蘭泰等曰時已入夏天氣亢暘農事方殷雨澤未降朕軫念民依深為惓切或因刑獄中有無知罹法審擬失平情罪未符致干天和亦未可定兹特遣爾等㑹同三法司將已結重案見在監禁者逐一詳加審理凡有罪可矜疑者即與察明事由開列具奏務俾情法允協不致淹滯圜扉以副朕省刑恤民至意十一月戊午刑部議覆兵科給事中朱雲條奏減死發遣人犯暫令圈守至春發遣應不准行上曰流徙人犯遇有勢力者每羈禁不嚴及至發遣又展轉遷延其貧困之人無力營求者即肆行凌虐濵於死亡向來此等情弊甚多嗣後如遇有勢力之人即行發遣不得遲延其貧困者不許凌虐致斃著户部刑部堂官不時詳加稽察如有前項情弊立行指參從重治罪大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷二十八
