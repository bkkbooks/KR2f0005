body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷二十武功八康熙五十七年戊戌九月己卯上諭議政大臣等曰在噶斯一路駐扎之阿齊圖等帶領兵丁一千業已進藏所剩兵一千有西安之佐領禪播等帶領駐扎柴旦木地方今届秋時探知策零敦多布等設兵處便可發大兵進𠞰若謂彼兵趁冬雪之際輕兵來至噶斯一路驚擾青海因此遽將進取西招之兵撤回噶斯則彼且謂得計亦未可定朕意駐扎肅州之總兵官李耀身材壯健今閒住肅州若令李耀帶領兵丁前赴噶斯今冬在彼防守似有裨益爾等㑹同確議具奏十二月庚午上諭議政大臣等曰派黑龍江索倫打虎兒及寧古塔船厰盛京六處兵共三千名令於來年三四月間青草發生時各帶馬匹由索嶽爾濟地方至喀爾喀河下流上克魯倫河而去其一路行糧著先派人前往車臣汗一帶令不曽派兵之二十二處扎薩克幫助馬羊再於達里剛愛羣內取羊撥給其盔甲器械著於京師製造給豫此所派之兵俱發往將軍傅爾丹處再將傅爾丹向時所領之安逸好兵三千名撥過富寧安處至於胡什圖英柱領去之兵竝未到所指之處亦無勞績將伊等帶去之每佐領下護軍一名披甲一名亦發往富寧安處令其效力再有不取吐魯番之兵若進吐魯番界口竝烏䦨烏蘇等形勢之處著設兵一枝修築城垣四逺哨探加意防守則可得一切總要信息亦可常得逃人自此直至巴爾庫爾地方沿途修築墩堡每堡設兵四五百名令其堅守而大兵仍照常駐扎巴爾庫爾如敵兵來少則即行殱滅若多則相機進𠞰如此則我兵永占要地可以待敵兵之自斃矣此各處邊境駐守之兵每年不過用銀一二百萬兩將此等事爾等公同詳議具奏康熙五十八年己亥正月癸卯上諭額駙吳爾衮等曰今年大兵既不能前進若發兵襲擊策妄阿喇布坦則伊情形自露著派盛京烏喇察哈爾索倫喀喇沁以及內地喀爾喀之兵一萬自前年進兵之處往彼襲擊出兵時厄魯特王策零旺布公多爾濟色卜騰之人不必派往又從前曾欲令盛京三千兵過巴爾庫爾地方今暫行停止此次襲擊之兵令於六月間發往及秋而回設或今年不便襲擊來年另為籌度爾等到傅爾丹處詳議後即差人到巴爾庫爾將軍處一同定議具奏九月乙未上諭議政大臣等曰差往西邊胡畢圖奏稱策零敦多布等及土伯特衆喇嘛民人俱言在西寧見有新胡必爾汗實係達賴喇嘛之胡必爾汗天朝聖主將新胡必爾汗安置在達賴喇嘛禪榻上座廣施法教實與衆人仰望之意允協且土伯特處時有瘴氣厄魯特之子孫不能滋生多生疾病有何貪戀之處惟懇天朝聖主將法教速為廣施觀此情形似乎易結今將新胡必爾汗封為達賴喇嘛給與冊印於明年青草發時送往藏地令登達賴喇嘛之座送往時著大臣帶滿洲兵一千名䝉古兵一千名土番兵二千名緑旗馬兵一千名步兵一千名前去其行糧牲口接續之處令大將軍辦理再由巴爾喀木帶四川滿洲兵一千名緑旗兵一千名土番兵酌量派往其行糧牲口接續之處令年羮堯辦理青海王貝勒貝子公等亦帶領屬下兵或一萬或五六千送往前去策零敦多布等若實為法教自必俟達賴喇嘛登禪榻後然後前去若不行等候遁走即為無恥之賊此行大將軍帶領兵馬在索落木周圍水草佳處駐扎兼照管青海家屬駐牧處四川兵二千名出口駐扎兼照管王察罕丹津駐牧處事關甚大將此㫖傳諭大將軍處令伊等公同確議具奏又青海王台吉等令大將軍傳集一處曉諭唐古特國內達賴喇嘛班禪法教原係爾祖上設立今策妄阿喇布坦無故將拉藏殺害令寺廟喇嘛各自散去將衆鄂里格一路截斷今達賴喇嘛之牀空虛從前爾將此新胡必爾汗稱為達賴喇嘛之胡必爾汗若安置在達賴喇嘛禪榻為法教廣施之事我等願捨命效力業經保奏土伯特之喇嘛民人及阿木島地方喇嘛等俱亦稱為達賴喇嘛之胡必爾汗皇上將此胡必爾汗特封為達賴喇嘛於明年大勢一同送往藏地令登禪榻將法教廣施放開衆鄂里格一路令其販賣茶布此正宜效力之時爾等應各帶兵丁與送去之大臣㑹同一處前去爾等之意如何令伊等各陳已意㑹盟畫一具奏俟㑹議完時令都統延信楚宗公策旺諾爾布侍讀學士長夀等由固關前來京師具奏十二月丙辰議政大臣并軍前召至大臣九卿等公同議奏進藏一事上曰此議尚未周詳只議西地進兵竝未議及阿爾泰巴爾庫爾兩路之兵兩路之兵㑹合取吐魯番若烏魯木齊難以堵塞看守應將兩路兵㑹合襲擊或各減騎進入震懾從呼爾達拉之處襲擊則彼必畏懼自然棄此牧放牲口之處而去再聞知西地大兵進𠞰并兩路兵襲擊不但驚惶無措亦且首尾不能相顧矣額駙阿寶所屬厄魯特兵五百名察哈爾兵四百名令帶往取藏柴旦木所有之兵亦令前往取藏大將軍留駐穆魯斯烏蘇三千兵內令派兵一千前進大將軍之兵若少將京師每佐領下派出護軍二名甲兵一名於二月內起程前往西寧今新胡必爾汗奏稱各處俱有禪牀皆可安設若為我興兵實關係衆生此或是新胡必爾汗之意或是青海台吉等畏懼策妄阿喇布坦密囑新胡必爾汗具奏亦難預知倘新胡必爾汗與青海台吉等意同此新胡必爾汗不可送往青海台吉等若無此意必將新胡必爾汗送往安設禪牀廣施法教令土伯特之衆誠心歸向則策零敦多布自畏勢逃遁我師進藏定立法教之後或留兵一二千暫行看守或久住則土伯特之衆即如我兵縱策妄阿喇布坦策零敦多布發兵前來伊係勞苦之兵我則安逸之兵即可𠞰滅朕意如此事關重大不可急迫從容周詳定議為是今若照衆大臣議惟行看守自西寧至四川雲南內外土番雜居一處西藏之人皆係土番伊等俱是一類倘藏地被策零敦多布占據則藏兵即是彼之兵丁而邊疆土番豈能保全爾等暫行看守之議不合著另行周詳定議具奏康熙五十九年庚子正月壬申上諭議政大臣等曰太祖太宗時滿洲兵於凡征戰之所馬匹口糧自備行走所向立功竝無遲誤今官兵凡有行走之處馬匹糧餉及一切物件俱給自官帑且以為不足而怨咨生焉此皆滿洲風習較異曩昔亦由該管官竝不嚴飭之故也朕辦理軍務閲歷甚多向時攻取嶽州但從陸路抵禦以致許久不克朕諭令洞庭湖備船隻以水路遏賊貝勒察尼奏湖中風浪甚大船不能行恐有礙於兵丁請撤戰船朕諭以嶽州城已被困不久即下若將戰船兵撤回賊得由水路往來何能有得嶽州之期哉於是不撤船兵嚴飭看守未幾而嶽州下矣再征討雲南時滿漢官兵合計四十餘萬貝子章泰等離雲南城七十里安營一面臨湖一面抵山未令設兵湖中斷其水路賊寇米糧仍舊運行城內竝無危急後趙良棟率寧夏兵至云我等連營四布不就近速戰逮至日久米糧不繼雖滿兵無妨營兵何以存立耶章泰云雲南城久被圍困朝夕可下爾兵丁俱從逺來宜休養之何可令其傷損設或營兵不能禦敵我等勢必捐軀趙良棟不從章泰之言自率標兵前往力戰奪取得勝橋而趙良棟之兵亦瘁甚矣章泰又向趙良棟云爾兵已瘁應暫撤回令總督蔡育榮率兵看守趙良棟云我死戰所得之地肯交與他人看守乎城內賊寇聞之始覺恐懼失措不數日而雲南下矣此亦由決於進戰乃得成功也再出征烏䦨布通時阿密達因天晚撤兵云皇上必不以撤兵故遂殺我等將兵撤退索額圖明珠選勇士數百人埋伏勇士云挑選我輩原擬或戰或追詎意止令看守衆俱忿怨後中路出兵時令大臣官員等㑹議進兵之處衆皆謂不可獨朕與費揚古以兵為可進決意進兵及至科拖地方衆皆不欲前發大臣等勸朕撤兵朕諭以祭告天地太廟社稷親統兵前來不見賊踪如何驟行撤去不允所請將兵前進噶爾丹聞我兵威甚是驚懼鼠竄而去朕選兵令馬思喀為將軍尾追噶爾丹又遇西路兵攻擊大敗之朕將中路初次運到之米遣明珠速送至費揚古軍前二次米亦即令續送三次米內朕但留十八日口糧餘俱送西路軍前是以西路兵丁未至饑饉得保全而回彼時若輕信大臣等言中道撤兵則兩路兵丁安得立功奏凱耶今觀領兵大臣官員等只為保身之計不以國事為重內存私意爭論不和又向兵丁等沽名市恩多取口糧及不能䭾載至於拋棄全無珍惜之意如此居心行事可乎朕之滿洲兵俱極精練全在領兵者將國家之事專心辦理不圖安逸賞罰嚴明則斷無錯誤進兵西藏時色楞不候衆人獨自前往額倫特為國家奮不顧身雖至失機豈可論伊等進兵太速乎今策旺諾爾布係差往䇿應之兵而遲延不前雖伊所統兵丁善全而歸伊屬下之兵固然感念於國事有何裨益惟進征西路身亡兵丁朕甚為憐憫當分别加恩至大臣官員等在部院衙門亦能清亷自守若行軍大事又非僅清廉自守者能勝任也朕年少時每於講武練兵等事違命者必置之法內外大小悉知警惕由此觀之訓練之事不可疏忽也兹衆喀爾喀及青海等俱服朕之風化其策妄阿喇布坦之人霸占藏地毁其寺廟散其番僧青海台吉理應棄命忘身奮勇致討乃伊等口稱維持黃教却無實心效力之人策零敦多布領兵在藏以我兵隔逺不能往救策零敦多布步行一年有餘忍饑帶餒尚能到藏我兵顧不能至乎今滿漢大臣咸謂不必進兵朕意此時不進兵安藏賊寇無所忌憚或煽惑沿途番部等將作何處置耶故特諭爾等安藏大兵決宜前進十月乙卯撫逺大將軍允禵疏報平逆將軍延信等率領大兵於八月十五日駐扎卜克河地方是夜策零敦多布等率衆來犯擊敗之奪其馬匹器械十九日自卜克河起程二十日駐扎齊嫩郭兒地方三更時有賊兵二千餘人來襲我師我師嚴整備禦賊衆久持不能抵敵遂奔北二十一日自齊嫩郭兒起程二十二日駐扎綽馬喇地方是夜五更又有賊兵千餘劫營因營中四面哨兵鎗炮矢石齊發賊兵被傷身死者甚多餘賊皆望風而遁延信等隨率領滿漢官兵於九月初八日自達穆地方起程送新封達賴喇嘛進藏其從前達賴喇嘛博克達不便留住藏地應發回京師上諭曰前遣大兵進藏議政大臣及九卿等俱稱藏地遙逺路途險惡且有瘴氣不能遽至宜固守邊疆朕以準噶爾人等見今占取藏地騷擾土伯特唐古特人民再吐魯番之人皆近雲南四川一帶邊境居住若將吐魯番侵取又鼓動土伯特唐古特人衆侵犯青海彼時既難於應援亦且不能取藏朕決意獨斷著靖逆將軍富寧安振武將軍傅爾丹征西將軍祁里德管領兩路官兵前往策妄阿喇布坦邊境驚擾襲擊又遣定西將軍噶爾弼領雲南四川滿漢官兵由拉里前進平逆將軍延信領西路官兵由青海前進又遣大將軍總領大兵駐扎穆魯斯烏蘇調遣官兵辦理糧餉伊等俱各加奮勵兩路襲擊之兵至策妄阿喇布坦邊境屢次大勝𠞰殺賊兵擒獲人畜招撫數千準噶爾人衆兹覽大將軍奏延信等三次將策零敦多布殺敗賊兵逃竄殊屬可嘉在事將軍以下兵丁以上俱著從優議敘康熙六十年辛丑六月癸巳上發硃筆諭㫖命福建總督滿保傳諭臺灣百姓曰據督臣滿保等所奏并伊等進摺家人所言臺灣百姓似有變動又奏稱滿保於五月初十日領兵起程等語朕思爾等俱係內地之民非同賊寇或為饑寒所迫或因不肖官員刻剝遂致一二匪類倡誘衆人殺害官兵情知罪不能免乃妄行强抗其實與衆何涉今若遽行征𠞰朕心大有不忍故諭總督滿保令其暫停進兵爾等若即就撫自原諒爾等之罪倘執迷不悟則遣大兵圍𠞰俱成灰燼矣臺灣只一海島四面貨物俱不能到本地所産不敷所用祇賴閩省錢糧養贍耳前海賊占據六十餘年猶且𠞰服不遺餘孽今匪類數人亦何能為耶諭㫖到時即將困迫情由訴明改惡歸正仍皆朕之赤子朕知此事非爾等本願必有不得已苦情意謂與其坐以待斃不如茍且偷生因而肆行虜掠原其致此之罪俱在不肖官員爾等俱係朕歷年豢養良民朕不忍𠞰除故暫停進兵若總督提督總兵官統領大兵前往圍𠞰爾等安能支持此㫖一到諒必就撫毋得執迷不悟妄自取死特諭乙卯議政大臣等以將軍富寧安報稱吐魯番回人托克托麻穆忒等歸順一摺請㫖上諭曰據富寧安奏稱策妄阿喇布坦將吐魯番回人托克托麻穆忒等遷往哈喇沙爾地方中途逃回在魯克齊木地方駐扎等語見今歸順之回人與準噶爾之人爭鬪將準噶爾之人殺害取甲來獻觀此情形䇿妄阿喇布坦似略無報復之意或伊同黨內有不睦亦未可定此機不可遺失朕意策妄阿喇布坦將伊等不能遷往哈喇沙爾又不能護衛準噶爾之人足見萬不能敵我兵今收復吐魯番若不看守則策妄阿喇布坦處歸順之人以及來使逃人有回人居中倘行殺掠此路必致阻隔爾等速議行文富寧安派緑旗兵一千名察哈爾厄魯特䝉古回兵一千名前赴吐魯番收納歸降回人照看駐扎將歸順之人及來使逃人往內解送之處牢設哨汛今回人歸降於我與厄魯特世成讐敵即係我民其巴爾庫爾相距吐魯番止六百里為途不逺如果策妄阿喇布坦率衆侵擾我兵前去援救不遲著富寧安預行轉飭回人等於我軍尚未抵境之時若有策妄阿喇布坦之處來使逃人萬勿隱匿侵犯即行解送著議奏九月戊戌上諭議政大臣等曰上年策妄阿喇布坦將伊邊界之人收去又將吐魯番回人移往哈喇沙爾其阿爾泰烏魯木齊等處無一哨汛因其寂然以處遂有策妄阿喇布坦身死之信然不可據以為實也將軍祁里德奏策妄阿喇布坦若果身死則機不可失請預備進兵爾等行文大將軍及靖逆將軍富寧安等宜照原議今嵗將吐魯番堅守為要又阿爾泰吐魯番一帶汛地均宜加意防守冬令雪降草枯之際不可貪功輕進且將兵丁馬匹一應什物整齊備辦以俟來年大舉征𠞰此㫖著即行抄録傳諭軍前大臣等知之丁巳䝉古王貝勒貝子公台吉及土伯特酋長等奏西藏平定請於招地建立豐碑以紀盛烈昭垂萬世御製碑文曰昔者太宗文皇帝之崇德七年班禪額爾德尼達賴喇嘛顧實汗謂東土有聖人出特遣使自人跡不至之區經讐敵之國閲數年始達盛京至今八十載同行善事俱為施主頗極安寧後達賴喇嘛之殁第巴隱匿不奏者十有六年任意妄行拉藏滅之復興其法因而允從拉藏青海羣衆公同之請中間策妄阿喇布坦妄生事端動準噶爾之衆肆行奸詐滅壞達賴喇嘛竝廢第五輩達賴之塔辱衊班禪毁壞寺廟殺戮喇嘛名為興法而實滅之且欲竊據土伯特國朕以其所為非法爰命皇子為大將軍又遣朕子孫等調發滿洲䝉古緑旗兵各數萬歷烟瘴之地士馬安然而至賊衆三次乘夜盜營我兵奮勇擊殺賊皆喪膽逺遁一矢不發平定西藏振興法教賜今胡必爾汗冊印封為第六輩達賴喇嘛安置禪榻撫綏土伯特僧俗人衆各復生業於是文武臣工咸謂王師西討歷瘴癘險逺之區曽未半載輒建殊勳實從古所未有而諸䝉古部落及土伯特酋長亦合詞奏曰皇帝勇略神武超越往代天兵所臨邪魔掃蕩復興䝉古向所尊奉法教坎木藏衛等部人衆咸得拔離湯火樂土安居如此盛德大業非臣下頌揚所能宣罄請賜御製碑文鐫勒招地以垂永久朕以何功焉而羣衆勤請不已爰紀斯文立石西藏俾中外知達賴喇嘛等三朝恭順之誠諸部落纍世崇奉法教之意朕之此舉所以除逆撫順綏衆興教云爾康熙六十一年壬寅正月庚子上諭議政大臣等曰策妄阿喇布坦之兵屢被我師擊敗死傷頗多策零敦多布等賊衆亦大半死亡棄藏竄走仍回伊里地方固守三嶺若我滿洲兵至則舍命交戰勢有不敵又思逃避他所希圖存活此等情形瞭然可賭朕數日來細加尋繹伊里山蹊險隘我朝大兵雖欲今年進𠞰倘為三嶺阻隔遲延時日或策妄阿喇布坦戰敗帶領妻孥逃往則我師應否追𠞰不可不詳加定議今策妄阿喇布坦之伎倆悉已深知策妄阿喇布坦亦稔知天朝兵威所加勢必不能自存但此時遽遣使向策妄阿喇布坦處招撫彼不知我寬仁之意反以為不能取彼復生他心亦未可定爾等可議寫發往策妄阿喇布坦之書著澤卜尊丹巴胡土克圖選派好喇嘛為使作速差往其差往之人過阿濟嶺由吐魯番一路前往不久可到彼處信息情形亦即得聞知如胡土克圖之使者善為曉諭策妄阿喇布坦畏懼天討將拉藏妻子家屬并從前被虜之人送來請罪誠心投順永不敢侵犯邊隅如此可另行商酌倘策妄阿喇布坦已死或伊處內變生亂除向天朝投奔外彼將焉往則我兵進發亦不可緩即一面進兵一面差使亦無耽擱之處今各路兵丁或向伊里前進或於吐魯番固守漸進烏魯木齊等處駐扎營寨相機而行或幾路前往襲擊以及大兵糧餉作何運到之處著議政大臣軍前調回將軍大臣會同核議妥確具奏二月己卯上諭議政大臣等曰今年大兵前進駐扎烏魯木齊地方爾等僉慮米糧不能接濟或致遲誤彼時撤兵不可駐兵不可似有煩難之處朕亦慮及但我兵預備數載去年曽議進兵而竟不果今年若再駐扎不進則䇿妄阿喇布坦得以休息一年從此或生他志不如乘此預備之兵仍照從前令阿爾泰巴爾庫爾兩路兵丁照常襲擊前進至烏魯木齊地方兩兵㑹合如䇿妄阿喇布坦果有兵來正可𠞰滅若畏懼不敢前來即將我兵收回各往本處駐扎如此每年襲擊驚擾賊衆彼或生內變亦未可定爾等㑹同酌議具奏九月乙酉上諭議政大臣等曰從前曽有以朕每年出口行圍勞苦軍士條奏者不知國家承平雖久豈可遽忘武備前噶爾丹攻破喀爾喀并侵擾我內地扎薩克至烏䦨布通朕親統大兵征𠞰噶爾丹敗走後又侵犯克魯倫朕統兵三路竝進至昭莫多𠞰滅之今䇿妄阿喇布坦無端侵犯哈密地方朕徵發阿爾泰及巴爾庫爾兩路兵進𠞰策妄阿喇布坦聞之心膽俱碎乃遣策零敦多布等潛往西藏劫掠毁壞寺廟土伯特地方已被殘蠧朕又遣大兵前往擊敗策零敦多布等復取西藏救土伯特於水火之中我兵直抵西藏立功絶域此皆因朕平時不忘武備勤於訓練之所致也若聽信從前條奏之言憚於勞苦不加訓練又何能逺至萬里之外而滅賊立功乎爾等諸臣咸宜知之大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷二十
