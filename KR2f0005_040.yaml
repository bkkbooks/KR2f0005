body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷四十蠲賑三康熙四十年辛巳二月癸酉上諭直隸巡撫李光地曰朕厯年省耕畿甸咨訪民隱屢行蠲賑加惠黎元近見霸州大成文安地居窪下被水最甚雖遇豐年民猶艱食其三州縣纍年積逋及本年應徵地丁正項察明豁免務使窮民咸沾實惠如有勢豪土棍包攬侵冒不肖有司聽胥吏作弊指富作貧假揑災傷以致澤不下究據實題參期於民困獲蘇以副朕愛養軫恤之意十月己未上諭戶部朕孜孜圗治宵旰靡寧於民生疾苦時切軫念甘肅等處地方切近邉陲土瘠田薄今年雨澤愆期田禾多有未穫閭閻饑困朕心深用憫惻已特飭該督撫等官將被災之處親行蠲賑令其得所更念來嵗青黃不接西土小民輸納維艱著將甘肅巡撫所屬州縣衛所康熙四十一年分地丁錢糧通行豁免地方有司務期切實奉行毋令官吏借端侵漁俾小民得均沾實惠以副朕軫恤災黎至意癸亥上諭户部朕惟帝王致治裕民為先免賦蠲租實為要務矧江蘇等處地方尤為財賦重地朕比年巡幸東南目擊民艱多方軫恤令其安乂猶恐有司奉行不力德澤未盡下究民生罕遂康阜莫登兹將江蘇巡撫所屬州縣等處除漕項外康熙四十一年地丁錢糧盡行蠲免地方有司務期實意奉行使閭閻窮黎均沾實惠庶幾民生樂利豐裕可期倘不肖官吏陽奉隂違私立名色借端科派恣行侵尅負朕愛養生民至意事發定行正法决不姑貸康熙四十一年壬午十一月乙邜上諭大學士等曰蠲賦為愛民要務徵取錢糧原為國用不足國用若足多取奚為比年以來附近省分俱屢行寬免惟雲南貴州四川廣西等處未得常邀蠲恤今户部庫帑有四川五百萬兩每年竝無糜費國帑大有贏餘朕欲將此四省四十三年錢糧悉行蠲免倘更寬裕并及廣東省亦令蠲免其蠲免四省諭㫖明春即行曉示庶經費易為措置也丙辰上諭户部今嵗山東河南地方俱報豐稔惟被災州縣民多匱乏頃朕巡幸至德州見有一二災民流移載塗者詢問疾苦深為軫念雖據山東巡撫稱被災州縣已令地方官發粟散賑但自冬徂夏青黃不接之際頒賑不繼無以資生應行山東河南兩省巡撫凡被災地方令有司加意賑濟至明嵗麥收時方止其災傷田糧雖已照分數蠲免猶恐被災之後民力艱難宜更沛特恩用加休養山東萊蕪新泰東平沂州䝉隂沂水河南永城虞城夏邑被災州縣康熙四十二年地丁錢糧除漕項外著察明通行蠲免該地方官務悉心奉行俾閭巷窮黎均沾實惠以無負朕宵旰勤民殷殷軫恤至意又諭曰從來致治之道裕民為先故必蠲免田租時加膏澤而後閭閻充足永享樂利之休朕臨御以來咨求民瘼蠲賑頻施誠恐小民疾苦未蘇生業未遂用是宵旰靡寧江北田土瘠薄生計尤艱朕心彌切軫念著將安徽巡撫所屬府州縣衛等處康熙四十二年地丁錢糧除漕項外通行蠲免地方有司務切實奉行俾小民得沾實惠以副朕愛養黎元至意倘不肖官吏陽奉隂違或借端苛取澤不下究事發定從重治罪不宥又諭曰朕撫御寰區四十餘年無一刻不以民生為念天下至大兆民至衆惟恐窮鄉僻壤百姓疾苦不能上達所以孜孜勤求未嘗少懈天時水旱自古有之備荒之法全賴督撫得人倘平日虧空一遇歉薄莫知所措遂諱災不報視民命如草芥何以為民父毋况秦省不通水運若不謹於蓋藏儉歲難於賑恤河西一帶地方素稱貧瘠雖免康熙四十一年錢糧民生未裕再將康熙四十二年地丁錢糧通行蠲免該督撫遍示所屬地方務使閭閻均沾實惠以副朕愛養元元至意如有不肖有司違㫖私徵希圗侵蝕者督撫察參從重治罪或被傍人告發或被科道糾劾該督撫一并嚴議康熙四十二年癸未正月壬申上諭户部朕甲子己巳兩次南巡路經東省見民生豐裕士庶樂利近來淮黃告成朕不辭逺涉減從輕裝待旦而興夜分乃寐再經齊魯存問民生休戚似不及甲子己巳朕深憯怛如痌瘝之在抱也若閭閻蓄積有餘即遇有水旱亦不致困苦今特加恩蠲恤用𢎞愛養朕所經過地方德州平原禹城齊河厯城長清恩縣夏津武城館陶臨清清平博平堂邑聊城東阿陽穀壽張滕縣嶧縣二十州縣康熙四十一年未完地丁錢糧著通行蠲免濟南府屬之海豐利津霑化兖州府屬之寧陽滋陽泗水金鄉單縣曹縣鄆城曲阜費縣十二縣去歲農收歉薄康熙四十一年未完錢糧亦行免徵其去嵗曾被水災之東平新泰蒙隂沂州沂水萊蕪六州縣康熙四十一年未完錢糧亦著全免其泰安郯城魚臺汶上嘉祥巨野濟寧七州縣雖未成災康熙四十一年未完錢糧俱著蠲免康熙四十二年地丁錢糧著分三年帶徵爾部即移文該撫率各州縣有司詳慎奉行務令人沾實惠户有餘藏以稱朕重期黎元殷阜之至意二月丁丑上諭河道總督張鵬翮曰朕經過泰安新泰䝉隂沂州郯城等州縣見民有饑色應即行賑救經過地方雖經賑濟蠲免錢糧但州縣倉穀年久朽爛無禆於散賑今著漕運總督桑額以漕米二萬石付爾揀選賢能官員運至濟寧州兖州府等處即行賑濟桑額亦將米二萬石於泰安州一路散給又將收稅有力之官七員竝發在京旗民犯罪降級贖罪人一百名伊等俱照養䝉古例以所用之多寡分别議叙壬午上南巡舟過邵伯更樓諭河道總督張鵬翮曰此地舊日被災情狀與今山東饑民無異豈朕今日覩此地安居景象而忘山東之饑民乎朕念運糧賑濟事不可緩乘今日順風爾作速回清江料理轉運截留漕糧差官前往山東散賑七月戊申上諭大學士等曰今嵗山東雨水連綿黎民被災若不豫為賑濟一經逃散難復安集今當照前養山東饑民例多遣人員令其撫養爾等可㑹同九卿議奏己巳上諭大學士九卿詹事掌印不掌印科道等曰今六月內因有二王之事朕心不勝悲慟至今猶未釋然至饑民救養之計未嘗時刻不廑於懷近有蘇州織造李煦人來詢知郯城至泰安田穀稍有可望由泰安至德州被災甚重今嵗口外田穀大收口內各處田禾俱屬平常合共計算所糶之榖必不能多今應將漕糧多行截留與山東沿河州縣村鎮俱各存貯以備賑濟平糶之用朕意八旗滿洲䝉古漢軍佐領一千有餘每三佐領下共出一人可得三百人每三佐領借與銀三千兩分派各州縣仍照前去人員瞻養饑民至來年七月為期及今八月內可即到彼爾等確議具奏至東省今嵗錢糧漕米俱應速行停徵為此手書特諭癸酉上諭大學士等曰賑濟山東饑民事關緊要應差大臣分為三路每路差大臣一員將先派去人員一併往返巡察於事有益自泰安至郯城為中路著穆和倫去自濟南至登州為東路著辛保去自德州至濟寧為西路著卞永譽去截留漕糧亦屬緊要總漕桑額現今無事著作速前來親看截留其賑濟饑民人員所領雖係公物而勉力自效有濟於民事竣回時一并議叙八月丙子上諭户部邳州等處地方屢被災傷不減於東省但尚有水路可通著該督撫親往察閲應作何速行拯濟一面頒賑一面奏聞俟具題到日將應蠲豁錢糧另議具奏十月壬午上諭戶部山東省去嵗收成各州縣豐歉不一今春朕南巡過山東時已分别被災輕重蠲免錢糧竝遣效力人員星馳賑濟比及回鑾東省又告潦災朕宵旰軫懷悉心籌畫截留漕糧平價發糶兼出帑金遣八旗人員分道散賑仍於三路各遣大臣經理所在饑民庶得資以全活不致仳離失所猶念被災之後民力未紓宜更加德澤以宏休養康熙四十三年地丁銀米著通行蠲免有積年錢糧拖缺在民者亦著察明免徴行文該撫率所屬有司詳慎奉行務令人沾實惠有違㫖私徵者察出定行從重治罪仍令各州縣遍示曉諭俾窮鄉僻壤咸悉朕惓惓惠愛災黎至意又朕南巡回時原擬蠲浙省明嵗錢糧兹因東省災傷先行蠲免其浙省錢糧俟至明嵗另頒諭㫖甲午上諭大學士等曰朕聞山東巡撫布政使將賑濟饑民人員齎去銀兩俱收布政司庫內迄今尚未賑濟如此則賑濟之事不致遲誤乎此項銀兩俱自京師發往竝非伊等庫內之銀且前往賑濟人員係三佐領合同薦舉殷實才能之人王國昌等但可查其養饑民之優劣其錢糧浪費與否乃賑濟官員干係與伊等何涉而為收貯乎是何意見朕所不解此又劉暟之詭計也况派去三百餘員不作速分派地方俱令久留濟南必致米價騰貴人皆受困可將朕㫖速交該部移問王國昌等十一月戊午上諭四川陜西總督覺羅華顯陜西巡撫鄂海甘肅巡撫齊世武等曰朕撫有區夏思臻上理期於舉世又安宵旰勤勞未嘗少釋而秦省為天下要地時厪朕懷曩者連嵗荒旱所司未經奏報朕訪聞得實即多方籌畫運米賑救一由襄陽運至商州一命河臣由黃河運至潼關一由湖灘河朔運至渭河一由甘肅運至西安分行賑濟蠲正賦免宿逋安集流離秦民始得少蘇自康熙三十二年遣皇長子允禔致祭華山以來雨暘時若年榖豐登閭閻稍有起色但秦省關係最重且不通水運撫綏尤宜加意故不憚隆冬跋履風霜逺臨兹土見百姓歡迎載道且知今嵗有秋地方文武官吏更能恪勤奉職滿漢軍士亦皆訓練有方朕心甚悅凡巡幸所至必大沛恩膏今將陜西巡撫及甘肅巡撫所屬地方康熙四十二年以前各項積缺銀米草豆錢糧盡行蠲免俟四十三年直隸各省咸獲豐稔當將秦省四十四年正供亦行免徵該督撫通行曉諭俾窮鄉僻壤小民均沾實惠倘有不肖有司希圗侵蝕以致澤不下究該督撫嚴加訪察據實指參以副朕愛養黎元之至意康熙四十三年甲申三月庚戌上諭八旗都統等曰聞京城附近有山東之民河間之民行乞頗衆已於五城給食而施與未均或不遍及著八旗各於本旗城外分三處煮粥飼之八旗諸王亦於八門之外施粥大為利濟今已派出諸人赴山東養民但此輩俱集京師求乞若不如此設法賑濟則皆立斃矣兹派出鑲黃旗國舅佟國維正黃旗內大臣明珠正白旗內大臣阿密達尚書馬爾漢伊家人衆監散為易其他五旗著派大臣家計殷實者監賑凡粥厰所飼之民病則醫治殁則棺殮至給粥時詳加識認恐此處既食又顧之他務使清楚周遍為善如或怠玩施不周遍察出竝罪都統副都統斷不輕恕至漢大臣有仰副朕㫖施賑者亦分為三處內務府大臣亦將內務府人分為三處俱令殷實可托之人監賑六月戊子上諭大學士等曰觀山東巡撫所奏今嵗春麥大穫又問自山東省來人咸云民生大有起色不似從前被災景象此甚非易致也山東百姓今始獲蘇明嵗錢糧不可急徴若秋田有收再當商酌爾等識之俟十月十一月間啓奏十月甲戌上諭户部今嵗直隸地方雨暘應候禾稼有秋各郡民生皆獲安恆業惟是去嵗山東被災之民自冬月以迄春夏流離轉徙入順天河間境內者甚多於時設厰煮糜所在賑救而米價至今未減誠恐近畿一路閭井小民拙於生計是宜加恩寬恤用𢎞休養順天河間二府屬康熙四十四年應徴地丁銀米著俱蠲免該巡撫即飭府州縣官遍諭窮鄉僻壤以副朝廷優軫畿輔黎氓至意又諭曰山東比年歉收民生艱窘朕焦勞宵旰未嘗晷刻稍釋於懷康熙四十一年錢糧既分别減免帶徴又停四十二年徵收蠲四十三年額賦截漕平糶發帑賑施遣用多員分道瞻養有就食京城者復設厰煮糜命滿漢官員資送回籍給以籽粒之需然後民間漸有起色今嵗幸風雨和調二麥畢登秋禾稔穫流移悉返里閭復業者咸安耕鑿朕於往來山東人員備加詢問深用心慰但念被災之餘甫離重困若非大敷恩澤終不能遽底盈寧將康熙四十四年山東省應徵地丁銀米等項除漕糧外悉行蠲免從來水旱靡常撫綏百姓之道全視大小官吏實心講求庶幾民有攸濟諭㫖到日該巡撫即飭有司張示曉諭務俾通省均沾實惠仍牖導小民撙節蓋藏期於比户皆有餘蓄則於朕惓惓為民經畫之意可以無負矣又諭曰朕昨嵗南巡至浙江見其農桑遍野户口蕃殖閭閻氣象較勝於康熙三十八年巡幸之時甚為心慰浙省錢糧雖前此屢經蠲貸而朕車駕親臨應更敷恩寬恤俾民生益加充裕當回鑾以後即擬免康熙四十三年額賦因山東急賑災荒遂爾少緩兹直隸各省皆獲有秋特申前命康熙四十四年浙江通省應徵地丁銀米等項除漕糧外著俱蠲免諭㫖到日該督撫即嚴飭有司張示遍諭務使窮簷蔀屋均沾實惠地方大小官吏仍不時訓誡小民令各守分節用不論年嵗豐歉咸有蓋藏庶無負朝廷殷殷愛養賜租給復之至意辛巳上諭户部朕宵旰孳孳惟以康濟生民為念每嵗四方水旱皆諭令各督撫不時奏聞仍間遣人員馳往各路咨詢農事有自外省來者必詳問所過地方雨暘耕作之狀凡以民生所重無如粒食不得不預為經畫也康熙四十一年冬朕巡幸至山東德州聞知萊蕪等六州縣民被災傷即將四十二年錢糧悉豫豁免及四十二年春南巡視河經行泰安一路見其閭閻生聚逺不逮於從前隨下諭詳察被災州縣蠲除額賦竝動倉穀賑濟但蠲賑雖行而人民甚屬窘迫非以瞻養䝉古之法行之不能立遂生計再三籌䇿乃命官民願效力者百餘人星速前赴山東計口授糧給衣濟用兼量助牛種等物貧窶之民皆賴以全活比朕避暑口外覺夏月雨水頗多即命行文移問山東等省而東省果告潦災秋禾失收民滋困苦但地方人情猶帖然安堵此即遣官養民之實效也因又下諭增益多員分往被水失收處再加賑濟顧各州縣地廣人衆需費浩繁猶必大張賑施方能遍及特命漕臣親赴東省截留漕糧五十萬石分貯沿河鎮市衝要之地散賑而外即平價發糶又諭八旗滿洲䝉古漢軍每三佐領各派一人計得三百餘人此所派人員每佐領領帑金一千兩給之竝備車輛駝馬等物令分往山東各州縣照前遣人員瞻養以至來年七月為期其登青萊三府則截留漕米由天津海道運至其地每府各三萬石又遣大臣三員分三路往來巡視稽核散賑事宜酌定平糶價值而民間始盡沾實惠至於未經散賑之際饑民有流入京城者老幼仳離急於得食爰於今嵗正月命八旗王貝勒大臣內務府官員竝漢大臣官員設厰數十處煮賑一月有餘復念饑民拋棄鄉土久住京師究非長䇿於是遣官雇募船隻悉送還籍仍給以銀兩為日用耔粒之資而流移之人遂得復安本業入夏以來風雨調和二麥稔登秋田多稼該省呈進穀穗合之往來人等奏對之語朕心始為大慰夫水旱災傷事所時有非恃廟堂之上多方賑救則民將何依朕為山左勞心籌畫者兩載於兹乃幸奏有成效今三路大臣及該撫俱奏年穀順成民生得所賑事告竣前後效力諸臣宜加奬勸去歲春秋二次遣往養民各員著察明議叙內有自出己力瞻養饑民者從優議奏其在京捐銀及資送回籍人員亦著一併議叙東省停止升轉官員俱令照常升轉十一月戊戌上諭大學士等曰明歲春間正青黃不接之時當自正月為始於京師及通州地方發倉米照今年例平糶爾等會同户部議奏康熙四十五年丙戌五月丙寅上諭大學士等曰前日直隸巡撫趙𢎞燮摺奏河間數州縣厯年拖缺錢糧請分年帶徴朕已批發令其具題至直隸各省厯年拖缺錢糧總數著交户部查明速奏內有民困無徵者酌量豁免甲戌上諭户部朕宵旰圖維勤求民隱每欲敷蠲貸之恩以為閭閻留有餘之力直隸山東地方康熙四十二年偶遇災荒因特免山東康熙四十三年四十四年額賦竝康熙四十一年以前積缺錢糧直隸則順天河間兩府康熙四十四年額賦亦俱行豁免今雖屢年收穫民氣漸舒而所有宿逋尚應輸納朕念黎元方有起色辦賦猶艱若一時新舊竝徴勢難兼應宜更寬恤以𢎞休養直隸自康熙四十一年至四十三年各府屬未完民缺銀八萬二千七百兩有奇糧五千九百石有奇山東省康熙四十二年各府屬未完民缺銀一百六十九萬一千七百兩有奇糧五千九百石有奇或現在徵取或分年帶徵俱著蠲免俾小民悉除逋負之纍倘應徵舊缺有現完納在官者即准抵本年正賦諭㫖到日各該撫速行所屬有司遍示曉諭倘有不肖官吏朦混徵收不與開除明白者該撫即時參劾嚴加治罪十月己酉上諭户部朕子育黎元日求所以休養利濟之道念惟賜租減賦實有禆益於民生直隸各省錢糧次第全蠲一年者業經數舉獨是厯歲逋負積纍加增舊稅新徵勢難兼辦縱使稍寬民力分年帶輸而督令續完仍多拮据朕眷懷及此深切軫恤用是大沛恩膏俾閭閻獲免追呼官吏亦不罹參罰直𨽻山東積缺錢糧今年俱已蠲免其山西陜西甘肅江蘇安徽浙江江西湖北湖南福建廣東各省自康熙四十三年以前未完地丁銀二百一十二萬二千七百兩有奇糧十萬五千七百石有竒著按數通行豁免或舊缺已完在官而現年錢糧未完足者亦准扣抵十一月甲戌上諭户部今嵗漢江水大南鄭等縣城垣田舍被水衝沒且米價騰貴小民艱食所有本年應徵錢糧著豁免明年以後地丁錢糧亦暫行停徴俟應徴收之年該督撫察明具奏起科現在被災人民著督撫速行賑濟康熙四十六年丁亥十月乙酉上諭户部江南地方頻年雨暘時若百穀阜成閭井黎氓咸得遂生樂業但民間宿鮮蓋藏禦荒無術一遇嵗歉即有匱乏之憂朕屢次南巡素所洞悉今年自夏入秋雨澤愆期該督撫先後奏至朕念小民久未被災驟罹荒旱所關甚巨業今敕令停徵竝發倉穀賑濟顧倉儲數少未足遍給惟各州縣截留漕米可以實惠及民目下時已届冬著總漕桑額會同總督邵穆布巡撫于凖親厯各州縣被災地方備加察勘將今年所徵漕糧每州縣或留八九萬石或留十萬石酌量足支給賑濟之數分别多寡存留支散及今漕米尚未開兑截現收之糧以濟待哺之衆實於民生大有裨益此朕殷殷懷保赤子軫念如傷之至意爾部即移文該督等實心奉行仍開具賑濟實數奏聞又諭曰從來漕糧關係倉儲最為重要每嵗刻期輸挽概不停徴即蠲除節年額賦亦不及漕項朕前以國家經費尚充曽有酌免漕糧之事係出特恩去年頒發諭㫖已將江南省民缺地丁銀米自康熙四十三年以前通行豁免而漕項所缺尚在徵收今念江南地方現被旱災除新徴糧米另有諭㫖酌量截留散賑外其康熙四十三年以前江蘇巡撫所屬各府州縣未完民缺漕項銀六十八萬七千兩有奇米麥三十一萬一千八百石有奇著該撫一一察明悉與豁免用舒閭閻之餘力俾辦額運之正供事切利民蠲逾常格爾部行文該撫令張示遍諭務使均沾實惠以稱朕深軫民依之意十一月己酉朔上諭户部江南浙江地方賦役殷繁倍於他省朕屢經巡厯時切朕懷比年以來業已節次敷恩頻行蠲貸頃因兩省偶被旱災隨命按數減徵豁免漕缺竝分截本年漕糧今該督撫親往散賑猶念民間素鮮積儲生計不充非更加格外滋培則荒歉之餘未能驟臻康阜兹特再施恩澤用𢎞休養康熙四十七年江南浙江通省人丁共額徵銀六十九萬七千七百餘兩著悉豫蠲免其今年被災安徽所屬七州縣三衛江蘇所屬二十五州縣三衛應徵康熙四十七年田畝銀共二百九十七萬五千二百餘兩糧三十九萬二千餘石浙江二十州縣一所應徵康熙四十七年田畝銀九十六萬一千五百餘兩糧九萬六千餘石俱著免徵所有舊缺帶徵銀米竝暫停追取俟開徵時一併輸納務使小民一嵗之內絶跡公庭安處隴畝俾得優游作息經理農桑庶幾閭里氣象可以日加豐豫諭㫖到日該督撫體朕惠愛黎元至意各飭有司實心奉行仍張示通令知悉倘蠲除不實致有侵冒察出從重治罪康熙四十七年戊子十月戊午上諭户部朕屢次南巡見閭里殷阜之象逺不逮於舊時雖不時蠲免額賦停徴積逋僅可支吾卒嵗絶無餘積朕每念及此未嘗不為之惻然去年江南浙江兩省俱被旱荒多方軫恤民力稍蘇逮今嵗復報潦災旋經照例蠲賑竝留漕資濟但嵗再不登生計益匱欲令辦賦力必難供康熙四十八年除漕米外江南通省地丁銀四百七十五萬四百兩有奇浙江通省地丁銀二百五十七萬七千兩有奇著全行蠲免所有舊缺帶徵銀米仍暫行停止此朕因江浙二省為東南重地特於格外施仁用𢎞休養之至意該督撫各飭有司張示遍諭務令窮鄉蔀屋咸共知悉倘或别借事端侵冒徵派事發定從重治罪大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷四十
