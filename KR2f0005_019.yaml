body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓巻十九武功七康熈三十七年戊寅十月乙巳諸王大臣等以蕩平噶爾丹奏請立碑太學以垂萬世御製碑文曰惟天盡所覆海内外日月所出入之區悉以畀予一人自踐阼迄今蚤夜殫思休養生息冀臻熈皥以克副維皇大徳好生之意庶幾疆域無事得以偃兵息民廼厄魯特噶爾丹阻險北陲困此一方人既荼毒塞外輒狡焉肆其兇逆犯我邊鄙虐我臣服人用弗寧夫蕩寇所以息民攘外所以安内邊寇不除則吾民不安此神人所共憤天討所必加豈憚一人之勞弗貽天下之逸於是斷自朕心躬臨朔漠欲使悔而革心故每許以不殺彼怙終不悛我師三出絶塞朕皆親御以行深入不毛屢渉寒暑勞苦艱難與偏裨士卒共之迨彼狂授首脅從歸誠荒外君長来享闕下西北萬里灌燧銷烽中外乂謐惟朕不得已用兵以安民既告厥成事乃蠲釋眚災潔事禋望為億兆祈昇平之福而廷臣請紀功太學垂示来兹朕勞心於邦本嘗欲以文徳化成天下顧兹武畧廷臣僉謂所以建威消萌宜昭斯績於有永也朕不獲辭考之禮王制有曰天子將出征受成于學出征執有罪反釋奠于學以訊馘告而泮宫之詩亦曰矯矯虎臣在泮獻馘又禮王師大獻則奏凱樂大司樂掌其事則是古者文事武事為一折衝之用具在樽爼之間故受成獻馘一歸於學此文武之盛制也朕嚮意於三代故斯舉也出則告於神祗歸而遣祀闕里兹允廷臣之請猶禮先師以告克之遺意而於六經之指為相符合也爰取思樂泮水之義為詩以銘之以見取亂侮亡之師在朕有不得已而用之之實或者不戾於古帝王伐罪安民之意云爾銘曰巍巍先聖萬世之師敬信愛人治平所基煌煌聖言文武道一禮樂征伐自天子出朕臨域中逾兹三紀嘗見羮牆寤寐永矢下念民瘼上承帝謂四海無外盡𨽻侯尉維彼兇醜瀆亂典常既梗聲教遂窺我疆譬之於農患在螟螣秉畀不施將害稼穡度彼遊魂險逺是怙震以徳威可往而取朕志先定龜筮其依屬車萬乗建以龍旗祝融驂鸞風伯戒途宜暘而暘利我樵蘇大野水涸川瀆効靈泉忽自湧其甘如􅌬設為犄角一出其西一出其東中自將之絶域無人獸羣受掩五日窮追彼狂走險大殲於路波血其孥剪其黨孽俘彼卒徒衆烏晝號單馬宵遁恐久駐師重為民困慎固戍守還轅於京自夏徂冬雨雪其零載馳載驅我行至再蠢兹窮寇昏惑不悔我邊我氓以休以助爰寧其居爰復其賦藩落老稚斯恬斯嬉嵗晏来歸春與之期春風飄翩揚我旌旓我今于邁如渉我郊言秣我馬狼居胥山登髙以眺閔彼彈丸天降兇罰孤雛就羈三駕三㨗封狼輿尸既腊梟獍既獮豺貙大漠西北解甲棄殳振旅凱入澤霈郊卜明禋肆赦用迓景福昔我往矣在泮飲酒陳師鞠旅誓屈羣醜今我来思在泮獻功有赫頌聲文軌来同采芹采藻頌興東魯車攻馬同亦鐫石鼓師在安民非出得已古人有作昭示此㫖緬維虞廷誕敷文徳聖如先師戰慎必克惟兵宜戢惟徳乃綏億萬斯年視此銘詞康熈三十九年庚辰七月庚子大學士等遵㫖以商南多爾濟等所奏青海事宜問侍郎常綬等回奏上曰此事稍覺遲延方奏到日即為行文甚好青海台吉亦屬失算何以先將己意洩漏但將来使照常欵待禮遣斷不敢搆釁今以朕計之亦尚無妨朕廵幸䝉古之地頗多凡事朕皆熟悉策妄阿喇布坦人雖狡猾但由博羅塔拉至土伯特必經哈喇烏蘇等艱險之處路徑甚惡斷不能往伐何也策妄阿喇布坦素行奸惡故其附近哈薩克布魯特諸部皆相仇讐欲悉軍大舉則路既難行且無留䕶其妻孥者若兵單力弱斷難成事惟有奮激而行妻孥與俱幸而有濟則己無濟則有歸附土伯特之謀而已然策妄阿喇布坦奏書之意特張虛聲欲觀青海之動静耳亦未必果有爭戰也觀古趙充國所議五事良是應宜留意康熈四十二年癸未九月丁卯湖廣提督俞益謨偏沅廵撫趙申喬題報紅苗搶掠地方上諭大學士等曰紅苗事當籌一勞永逸之計苗人固慣行搶掠而因内地人勾通煽誘者亦有之今照招撫廣東八排猺人事遣大臣一員前往領荆州兵再酌派廣西湖南貴州三省兵齊至苗地并力圍困令其畏懼就撫則百姓可永免侵掠之患矣爾等與九卿㑹議具奏己巳大學士九卿等遵㫖議覆湖廣提督俞益謨等所奏紅苗一事仍照前招撫廣東八排猺人之例派遣在京大臣率前鋒四十人前往調遣荆州及廣西貴州湖南三省兵酌量招撫𠞰滅上曰滿洲兵所向無敵頃廣東僅發前鋒四十名八排猺人望風投降今苗人一聞特遣禁旅必自畏而就撫若輩不如此示以利害則地方百姓何能安居尚書席爾達原任川陜總督曽管兵丁紅苗之事著席爾達同副都統圖斯海徐九如前往康熈四十五年丙戌十月庚寅上諭武殿試讀巻官等曰今天下太平日久曽經戰陣大臣已少知海上用兵之法者益稀朕甲子年南廵由江寧登舟而下至黄天蕩江風大作衆皆危懼朕獨令衝風而行朕竚立船頭射江豚畧不經意後又南廵乗船渡江微覺心動去嵗之行見人渡江者即為心悸由此觀之皆年為之也大約年少則血氣强年老則血氣衰嘗問之宿將皆云年少力壮故能登城陷險今則怯矣凡將軍提督總兵官當年少時冒鋒鏑越險阻所在効力及位至大僚家亦富饒而年齒漸髙設一旦有事使之率兵而行欲其奮勇効命如前何可得耶乙巳上諭大學士等曰前遣䕶軍統領席柱等往取假達賴喇嘛及第巴妻子時諸皇子及諸大臣俱言一假達賴喇嘛取之何為朕意以衆䝉古俱傾心皈向達賴喇嘛此雖係假達賴喇嘛而有達賴喇嘛之名衆䝉古皆服之倘不以朝命遣人往取若為策妄阿喇布坦迎去則西域䝉古皆向之矣故特遣席柱等前去席柱等方到其地策妄阿喇布坦果令人来迎以此觀之若非遣人前往則假達賴喇嘛必已歸策妄阿喇布坦矣至西域回子及䝉古今衰弱已極欲取之亦甚易但并其地不足以耕種得其人不足以驅使且見今伊等已俱恪守法度是以不取此等情事漢大學士及九卿等想俱未深悉爾等可將朕諭示之康熈四十七年戊子三月己巳上諭議政大臣等曰朕自幼時讀書之餘常習騎射因見滿洲挽硬弓者甚少常以騎射鼓舞衆人今見官員兵丁中挽十五力及十餘力弓者甚多矣且朕自幼常習畋獵身體强健中路出征時往来行走四月有餘日進一餐五更起行至晩始歇遇沙地則下馬歩行殊覺耐勞至寧夏出征時往来兩月有餘竝不曽在路途中歇養馬駝自往迄還馬駝俱無倒斃舊時將軍出兵於未到西安寧夏荆州等處之先必喂養馬匹二三十日然後起行尚不能無倒斃之累由是觀之凡領兵行走欲士卒精强馬匹壮健俱視帶領之人措置何如耳且寧夏出兵之時朕帶領兵丁於六鄂爾多斯花馬池定邊等處行圍每日殺兎數千一日所獲可作兵丁㡬日乾糧朕於花馬池地方一日殺兎三百一十八隻自寧夏回時至黄河渡口因無大船朕量帶侍衛人等乗小舟順流而下以所帶乾糧甚少每日往山間畋獵河中網魚而食二十餘日竝未用及乾糧至湖灘河朔渡口朕日御小舟令新滿洲四人棹舟追射鴈鴨等物一日可得數百隻彼時朕方年壮兼之熟習水性故毫不介意迄今思之轉覺自懼也然領大兵行走事必率先心能預料始可服衆令其遵指授而行也朕於諸事閲歴已周行走已熟深悉其可成而後行似朕帥領有方身先士卒嗣後將軍大臣等亦難倣效葢天下事無有過於領兵之難者也康熈四十九年庚寅八月庚辰上諭大學士等曰朕自即位以来辦理軍務甚多向年平定三逆取臺灣降鄂羅斯討滅噶爾丹用兵之道朕知之甚明部院諸事朕尚與諸臣商酌惟軍旅之事皆出自一心籌畫前於烏䦨布通擊敗噶爾丹人言彼時天晚未獲全𠞰嗣後費揚古於昭莫多地方至傍晚時大敗噶爾丹殺賊竟夜以此觀之隨時遇見賊寇即當擊殺豈可以日夕推諉而不奮擊乎朕廵行塞北至烏䦨布通觀我軍排列陣勢俱甚合節但噶爾丹乃行陣積年之賊於沙岡之下排列所以我軍火器俱髙未獲盡𠞰後費揚古遵朕指示奮力擊殺始能𠞰賊今海内承平邊疆無事選擇武弁但視其歩射騎射才堪管轄者用之而已其於行陣如何則無由知之也或有軀幹短小歩射平常而善於行陣者必遇敵時方能知之耳凡人誠知顧惜顔面能効命者即為勇士原任正白旗副都統塞黑尹善射且相貌魁偉善扵管轄兵馬烏䦨布通之戰彼則大懼故為受暑下馬其家人俱憤曰身為二品大臣如此臨陣退怯歸去何顔見人耶扶之上馬塞黑尹復下馬卧於草内及回營猶戰慄不已身披甲冑䝉被達旦因此伊所管兵丁無不恥笑内府員外郎喀青阿之父海西尼身小力微曽往福建隨征得本旗頭等功牌八次雖身體數處被傷而攻城之時猶令人用木板舁之前往以觀攻城及城既㧞謂衆曰我因殘疾未獲與汝等一同効力憤恨大哭又原任廵撫楊熙亦甚瘦小醜陋當尚之信反叛時彼與海澄公之弟黄世名拜音達禮俱在廣東城内被賊圍困三人各率家人殺出重圍往赴大兵營内以此觀之人之勇怯斷不可以相貌定也且三逆叛時李之芳曽任浙閩總督伊雖不諳騎射執刀立於船首率衆突前大破敵人以立功績彼時同出征者回京俱稱李之芳之勇近征紅苗提督李芳述親冒礮銃鼓衆力戰連破數寨聞趙申喬亦甚强毅又將軍穆占孫思克等在平涼時與賊大戰孫思克之手被賊砍中馬進良曽為孫思克標下武弁聞之曰砍我總兵之手者吾必殺之遂突入萬軍中追殺砍孫思克手之賊馬進良數處中傷至今尚有傷痕可謂竒勇矣今承平日久善於馬歩射能管轄兵丁者尚不乏人若經歴行陣之人甚難得也野戰尚易水戰尤難葢水戰必待迎風方出此特為易退之計也或我兵欲出之日賊兵不出或賊兵欲出之日我兵不出彼此相遇甚難必能識水性諳水陣之人始可隨機應變調度成功也康熈五十二年癸巳閏五月乙卯兵部題浙江廵撫王度昭招撫海賊陳尚義等見解到京九十二人作何安插上曰先經拏獲海賊俱已發遣寧古塔等處見今陳尚義等一百餘人又來歸誠伊等俱熟識水性海道之人將伊等歸併盛京錦州地方著設立水師營近據山東總兵官李雄奏請裁伊標下水師營戰船十隻即將此所裁數内截留數船分往錦州㸔守地方廵防海洋似有裨益著滿漢九卿詹事科道㑹同確議具奏康熈五十四年乙未四月己丑上諭議政大臣等曰朕經歴軍務年久且曽親統大兵出塞征討凡行兵機務靡不周知今欲用兵兵非不敷但慮路逺運餉殊難誠能輓輸無悮令全軍得至策妄阿喇布坦之地朕心始慰此兵多係從前在昭莫多烏䦨布通屢經對敵之兵且人人懐報効之志若策妄阿喇布坦來戰不論何地制勝有餘再若由噶斯路進兵一萬赴伊里河源抵彼巢穴由哈密吐魯番進兵一萬由喀爾喀進兵一萬前至博克達額倫哈必爾漢地方如此三路進𠞰料必成功但其間進止又在臨時相機而行未可預定爾等雖未身歴軍旅既為國家大臣於議此等要事時當詳審籌度務合機宜非可視同泛常也乙未上諭議政大臣等曰軍中機務甚屬𦂳要前𠞰噶爾丹時曽由兩路運米至翁金河乃已經熟識之地而推河與翁金甚近又從前兩路所運之米至回軍時尚未用完度今所用錢糧最多不過三四百萬可以足用著户部動支正帑運送軍務乃係大事著遣司官二員分往富寧安祁里徳處令公同商議策妄阿喇布坦兵已大敗而去今若三路進兵或即行進𠞰或前逼近彼處遣使招降著富寧安與將軍提督總兵官祁里徳與喀爾喀汗王台吉等各詳議具奏喀爾喀汗王台吉等若自度兵力可以進𠞰固善或再助以我兵及黑龍江索倫打虎兒兵更為妥當再西安甘肅廵撫處著將河東鹽課銀四五十萬兩解往七月甲午朔上諭議政大臣等曰近和托輝特公博貝奏請招撫吳梁海及策妄阿喇布坦所屬厄魯特杜爾伯特丹津一千户人若伊等抗拒不服即行攻取臣有兵一千五百度己足用若聖上謂應添兵則有根敦扎薩克羅卜藏所屬翁科特兵扎薩克濟納米達兵扎薩克台吉阿禮雅兵俱善於攻戰可以破敵將此三扎薩克兵添給足矣著照博貝所請將三扎薩克兵添給博貝帶領前去遣人往吳梁海處以好言招撫若不歸順逃入樹林深密處亦無闗𦂳要相機行事可也至於杜爾伯特丹津處應再探其情實或撫或𠞰博貝領兵前往時若有策妄阿喇布坦兵向我喀爾喀直衝前來即著尾其後以牽制之杜爾伯特丹津與厄魯特散秩大臣車領為弟兄可令車領遣一親信人寫給書信爾等將此事派一章京或筆帖式飛馳發往博貝處并帶車領人同去即隨博貝兵一齊進發康熈五十五年丙申三月辛丑上諭議政大臣等曰差往策妄阿喇布坦處之克什圖保柱并澤卜尊丹巴胡土克圖之使人楚陽託音及策妄阿喇布坦差至澤卜尊丹巴胡土克圖處之使人潘提忠内等来京朕詢問策妄阿喇布坦情形皆已悉知策妄阿喇布坦乃巨猾奸詭之人甚屬無恥以朕之使臣非係使臣㫖意非係諭㫖是部文等語今爾諸大臣等向克什圖保柱等詳詢策妄阿喇布坦情形將克什圖保柱及楚陽託音潘提忠内等一同遣往作何遣往之處爾等㑹同副都統以上并九卿大臣各陳所見詳議再傳諭漢大臣等從前但以兵糧牲口路逺難到為念今祁里徳處糧米見剰有二千餘石而西路之米亦皆陸續運到兩處之米悉屬充裕無容計慮朕從前中路出兵時曽於沿途按站留米令煮粥以贍養營中困乏之步行跟役并貿易人等大有裨益今兩路進兵之站亦應照此行將軍席柱胸中毫無主見一應軍務糧餉俱將軍之責伊云我但統領兵丁運米之事與我無渉糧到我即行等語可見席柱無將軍之才此處亦著確議再總兵官路振聲一聞侵犯哈密即領兵往救且聞伊愛養標下兵丁甚屬出力路振聲著授為叅贊據策妄阿喇布坦奏懇遣使一賢能大員等語克什圖保柱出使策妄阿喇布坦處所已經數次今加伊等大銜即係大員矣再凡為使臣者果能一體同心於事方克有濟若内有不睦互相掣肘彼此言語矛盾一有差失則無益於事伊等有不合處即當明言為是再派出在京一人偕克什圖保柱前去此處亦著㑹議朕書諭㫖時令克什圖保柱等面看繕寫伊等俱以為宜其再明示諸大臣我兩路兵馬牲口糧米一應俱已齊備兩處軍中業已種地秋季收穫可期此番使臣知策妄阿喇布坦處確實情形即將大兵逐漸進至伊地且告以㑹講遣往竝非進𠞰之兵亦無不可也十月丁未上諭議政大臣等曰策妄阿喇布坦賦性狡詐知我兵在巴爾庫爾阿爾泰等處防守嚴密若探聽噶斯路兵勢單弱由噶斯路來犯侵擾青海亦未可定不可不預為防備朕意派西安滿洲兵及督標兵二千名著䕶理西安將軍印務總督額倫特帶往西寧預備如策妄阿喇布坦由噶斯路來犯著西寧預備之兵與青海左翼台吉等㑹合提督康泰帶領四川之兵與右翼台吉等㑹合兩路協守策妄阿喇布坦斷不敢来犯倘由嘉峪闗外及布隆吉爾等處以彼微弱之卒驚我大兵之後亦未可定著行文富寧安令選兵一千名預為防備朕意以為策妄阿喇布坦知祁里徳之兵今值冬季雨雪之時決不前進或由公博貝之後以微弱之卒潛來驚擾亦未可定著行文曉諭爾等速議具奏十一月辛酉上諭議政大臣等曰朕綜理軍務年久經歴甚多且曽親統大兵安定邊塞衆議欲於明嵗進兵又慮路逺糧米難運其見不可為非但大兵進𠞰策妄阿喇布坦勢不能當必致逃避明年著暫停進兵加意耕種將糧餉馬匹預備整齊後年再行進兵其盛京寧古塔兵丁照舊𤼵往京城之兵著暫停止策妄阿喇布坦詞雖卑遜竟遣人盜我噶斯路兵丁之馬我兵豈可坐守著將孔格札布罕兵内揀選精騎由阿爾泰作三四路襲擊巴爾庫爾兵内揀選作兩路襲擊此襲擊之兵遇可擊之處即行襲擊可取則取應退則退相機而行襲擊後仍回駐兵之處策妄阿喇布坦地方必然震動其餘黨或有變端以致逃亡亦未可定我兵如此一舉其道路地勢皆可悉知將此詢滿漢大臣若仍欲明嵗進𠞰爾等將原議具奏十二月丙午上諭侍衛郎泰等曰爾等往諭尚書富寧安明嵗暫停進兵之故朕親加籌度復命議政大臣等詳議已降㫖於兩路出征大臣矣遣兵襲擊之處爾等與富寧安彼處大臣及公傅爾丹并厄魯特喀爾喀王貝勒貝子公等㑹同詳議具奏至厄魯特等甚屬狡詐指稱投誠或潛來侵犯亦未可定此處應加意防範如果實心率衆來投將彼為首之人解送來京其餘令在克魯倫河地方遊牧交與左翼喀爾喀扎薩克等酌量安插所遣襲擊兵丁將擒獲賊犯釋放一二人告彼云汝輩盗竊中國馬匹所以邊上駐扎之兵竝未候㫖即行追𠞰前進今朝廷深憫汝輩降㫖不許肆行殺戮因此各回汛界再傳諭公博貝此處正伊効力之所著益加勤慎厄魯特喀爾喀公内亦有身材壯健者著將和托輝特等處兵派出一同前往襲擊如此則策妄阿喇布坦情形自然顯露矣然軍機事務臨期酌量難以預揣惟在領兵大臣善為籌度耳爾等㑹同定議後即速行奏聞康熈五十六年丁酉三月丁丑上諭議政大臣等曰大兵前進宜攻取吐魯番或招撫之即與哈密相類盡入國家版圖既入版圖不得不善為保䕶若襲擊之兵勢覺單弱或策妄阿喇布坦擁衆而来救援吐魯番或吐魯番等更變彼時不能看守則得而復失闗係甚大著軍中大臣詳加籌畫如有難處之勢仍照前議襲擊回来為是又軍務應相機而行若此兵襲擊能使策妄阿喇布坦軍中内亂分散来歸則竟行襲擊不必請㫖將此訓㫖曉諭軍中大臣五月癸酉上諭將軍傅爾丹等曰吳梁海之有無總無闗係見今掃滅策妄阿喇布坦之事乃屬𦂳要若大處不理止將吳梁海收取遷移以為𦂳要一經舉動之日向何處驅逐耶策妄阿喇布坦若一摇動吳梁海自俱為我有凡謀大事之人應將小處暫置見今羅卜藏達席之信亦尚未來也八月壬午朔上諭議政大臣等曰聞策妄阿喇布坦在阿里克地方幫助拉藏發兵六千名一事雖虛實未知朕意料之甚屬可惡策妄阿喇布坦先曽向澤卜尊丹巴胡土克圖之使者云拉藏汗係嗜酒無用之人不足介意羈留其子并留達賴喇嘛班禪之使不令前去今此兵或征取拉藏收取西邊地方或幫助拉藏侵犯青海俱未可定若係征取拉藏其兵於去年十一月前往今已成讐我兵欲救援拉藏恐地方遥逺策妄阿喇布坦之兵若幫助拉藏同來侵犯青海則不可不備兵協助迎𠞰矣見今巴爾庫爾有富寧安阿爾納等一應軍務俱已諳練行兵甚易應將額倫特撤回仍駐扎西寧協助兵丁與青海之人一同預備爾等議奏十月丙午上諭九卿等曰口外有一定當行之路水草足用若不諳路徑則難於前進所以行路先須酌量形勢策妄阿喇布坦所住之處即古陽闗哈宻以西即古𤓰州沙州所通之地甚廣前有以守邊之説進者勢必將邊牆之外棄去斷斷不可即如臺灣南澳人以孤懸海外無闗𦂳要自得其地福建廣東之賊便無容身之地所係非輕然海中之路亦有一定福建至盛京沿海一路曽令詳細繪圖島嶼停泊皆有定所口外亦是如此彼處行路宜於冬不宜於春夏昔人用兵以為春間口外馬瘦内地馬肥殊不知春間馬一出口肥者先壊受累不小凡人平時易出大言臨事多畏縮逡巡口外行走遇大雨大雪即驚惶無措用兵須主意堅定若主將倉皇人心皆為摇惑矣趙申喬前在偏沅征紅苗挺身前進新滿洲令其在後以避鳥鎗伊云即有不測我後人尚可得廕襲與我身在何異趙申喬竝不嫺軍旅但立定主意便無畏怯從前耿逆變亂李之芳守衢州亦是身先士卒也當初西路用兵滿兵已先進綠旗兵畏死欲退將軍孫思克諭云滿兵前發竝未傷損一人爾等且看滿兵若有死傷再退未遲衆始前進因成大功十一月甲戌上以甘肅提督師懿徳議不可進兵一摺示滿漢大學士學士九卿詹事科道等諭曰此事彼處督撫不奏師懿徳獨奏亦是倣劉䕃樞之意且將師懿徳留京用兵之事原要機謀非拘執不通者所能辦理當中路出兵時人云地寒馬瘦到彼處馬匹必致凍死又包衣大力言糧餉未到難以前進朕即止之云此中機謀非爾等所知如再妄言即律以軍法朕來時祭告天地宗廟必見噶爾丹方回又與費揚古約兩路合兵今不前進如何先回朕親率大兵深入敵境算在必勝也噶爾丹使人來朕留營中七日諭来使云不見噶爾丹必不輕回鼓兵前進差人往視噶爾丹已遯去二日再差人往視已盡棄廬帳器械逺遯矣朕乃回兵今策妄阿喇布坦本屬小醜不足為慮但怙惡不悛侵陵哈密前曽以二百人敗其二千餘人矣今因其移兵到藏道路甚逺又無接應自去年十月起行今年七月方到過三層冰山噶斯等處實為難行然彼既可以到藏我兵即可到彼處兵亦不用多二百餘人便可破之矣人奏彼處雪深八尺兵不可住今李先復係漢人自彼處運米回来氣色甚好竝不見途中有病人是西邊水土可住故復議明嵗三四月出兵用兵惟以安寧百姓保䕶地方為先故各省督撫奏摺来俱批先固内地𦂳要不可聽小抄以惑人心我朝驛遞之設最善西邊五千餘里九日可到荆州西安五日可到浙江四日可到三藩叛逆吳三桂輕朕年少及聞驛報神速機謀深逺乃仰天歎服曰休矣未可與爭也大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓巻十九
