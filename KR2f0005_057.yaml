body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷五十七柔遠人一康熙五年丙午五月乙未敕諭安南國王黎維禧曰自爾父抒誠進貢以來朕遣使錫賚恩禮有加兹海寇楊二楊三黃明標等久逋天誅在爾亦應同仇近兩廣督臣盧興祖奏至云此數賊并洗彪妻子等俱藏匿爾所屬海牙州官潘輔國處一切船隻器用皆其資給曾差官往索乃閉柵開炮若敵國然朕覽之殊為駭異念係邊吏所為或爾未與知今特此敕諭爾其祗遵即察出楊二楊三黃明標并其家口及洗彪妻子等解送兩廣督臣處交收且察處潘輔國助逆抗拒情罪若不將賊犯拏解不處分爾之屬官恐生兵端爾其籌之特諭康熙七年戊申四月庚寅初安南都統使莫元清為安南國王黎維禧所逼奔入雲南上疏陳訴上命安置莫元清於南寧安南國王黎維禧亦上疏言興兵復讐始末上遣內祕書院侍讀李仙根等齎敕宣諭黎維禧敕曰皇帝敕諭安南國王黎維禧據爾奏稱因莫元清之祖莫登庸有逼陷爾先國母先嗣王行弒奪國之讐今興兵致討等語又稱報復爾國前讐𠞰除莫氏止有莫敬恭莫敬寬竄居髙平爾又往討已經設誓和好等語據此則爾讐已復和好完結各居異地矣莫氏作亂之人既皆喪亡又係故明嘉靖時已完之事蓋已世遠年久莫元清先經納貢歸誠朕授為都統使之職爾後又納貢歸誠隨封為王爾今生事興兵稱為復讐理應於未興兵之前將情節陳奏聽候敕旨乃竟未請旨遽爾興兵殘破髙平地方殺戮兵民殊為不合今既稱遵旨罷兵著將髙平地方人民俱復還莫元清各守土安生以副朕綏乂生民之心盡爾奉藩之義庶永承寵眷之祉矣其慎思恪遵而行毋違特諭五月甲子安南國王黎維禧疏請六年兩貢並進禮部議仍照會典定例三年朝貢上曰覽王奏稱該國僻居禹服之外道路悠遠山川阻深貢役勞苦三年六年先後雖異禮意恭敬則一等語該國遵奉教化抒誠可嘉這進貢著照該王所奏行十一月已亥禮部題暹羅國進貢方物與會典不符應責其後次補貢上曰暹羅小國貢物有産自他國者與會典難以相符所少貢物免其補進以後但以伊國所有者進貢康熙八年已酉十二月庚申朔雲南貴州總督甘文焜疏報赧牛等四十九寨野苖慕義來歸上曰野苖慕化歸順可嘉著加意撫綏勿致失所康熙九年庚戌二月己巳雲南貴州總督甘文焜疏報定番州所屬岡渡等一百四十五寨苖蠻傾心歸化請納賦起科上嘉其誠命兵部檄督撫賞賚康熙十年辛亥六月壬午上諭理藩院聞蘇尼特等八旗人民被災牲畜俱死難以存活朕心深為惻然爾衙門會同禮部太僕寺將馬場之馬與禮部所管之牛羊酌量派出賞給被災之人康熙十一年壬子三月戊辰廣東巡撫劉秉權疏言暹羅國貢使又至所進方物仍與會典不符較前次更少其一上以先有諭旨命禮部免其察議其攜來貨物或願運至京師貿易聽其自運願在廣貿易令督撫委官監視之康熙十二年癸丑二月壬戌禮部奏暹羅國貢物短少請令補貢上曰暹羅國貢物雖與原數不符但念該國航海遠來抒誠進貢其蟲蝕短少等物免其補進六月辛丑禮部奏吐魯番國進貢方物未全請責其如會典入貢上曰吐魯番國路途遙遠入貢殊艱嗣後止令進貢馬匹玉石其餘諸物俱令勿進以示朕軫念遠人至意康熙十三年甲寅正月辛巳上諭户部邇者京師需用駝馬凡蒙古駝馬進張家口殺虎口貿易者自今至九月免其稅課康熙十四年乙卯四月癸巳上命撫遠大將軍信郡王鄂扎等帥師征討察哈爾布爾尼諭之曰大兵出山海關當宣布纍朝待布爾尼厚恩及朕不忍加誅之意彼若悔罪來歸則已否則以敕書付縱還蒙古持往諭之即布爾尼等臨陳來降亦當保全恩飬今值蒙古馬瘦爾等速往毋違五月甲子上諭議政王大臣等曰昔察哈爾遭亂覆亡太宗文皇帝收集豢飬編為整旗歷有年所今布爾尼背恩作亂實僧額渾津噶爾馬色冷輩匪類教之其餘官民俱無干涉此皆太宗文皇帝撫育之人朕甚憫焉凡投歸軍前或投入鄰旗及潰散者其令大將軍卾扎副將軍圗海等速行收集作何贍養另疏請旨九月戊申上以察哈爾布爾尼已平遣理藩院侍郎博羅特等於義州錦州等處安插餘黨諭之曰今時屆嚴冬其逃散人丁户口加意移來安插務令得所以副朕柔遠至意康熙十五年丙辰六月己卯上諭兵部平涼投誠猓苖官兵若留內地恐伊等父母妻子或被逆賊殘害其官員各加一級兵丁酌量賞賚俱發回原籍并曉諭令招撫從賊人民倘立有功績準與優敘康熙十六年丁巳四月戊午上諭科爾沁和碩卓禮克圗親王鄂齊爾曰爾部人民宜勤加撫恤爾能馭之以恩則屬下自竭忠盡力若但以威制則人皆解體不樂效用爾其志之五月甲午上諭大學士等曰厄魯特鄂齊爾圗車臣汗與噶爾丹台吉向俱進貢今噶爾丹台吉與鄂齊爾圖車臣汗內自相殘噶爾丹台吉攻鄂齊爾圖車臣汗以陳獲弓刀等物來獻若徑收納朕心不忍可止收其常貢之物以此旨傳諭來使十月甲寅上諭大學士等曰聞厄魯特喀爾喀交惡興戎雖虛實未確朕統御寰區一切生民皆朕赤子中外并無異視厄魯特喀爾喀倘因細故交惡至於散亡朕心大為不忍兩部落向相和好貢獻夲朝往來不絶若交惡果實當遣使評其曲直以免生民於塗炭如仰副朕一視同仁之意仍前和好相與優遊太平朕大嘉悅焉但天寒路遠若遣使前往無飼馬馳驛之所或致有誤今厄魯特喀爾喀使至其令理藩院明白偹檄交發來使傳諭之康熙十八年己未四月丙寅上諭逹賴巴圖爾台吉等曰去年閏三月吳喇忒巴逹里台吉等男婦子女馬駝盔甲為厄魯特厄爾德尼和碩齊劫去今墨爾根台吉察獲送還誠屬可嘉夫勸善懲惡國之法也今聞厄爾德尼和碩齊等在額濟內河之地爾逹賴巴圖爾台吉墨爾根台吉將伊等嚴加治罪所掠人畜什物照數察還如此則同修和好邊境生民得安矣墨爾根台吉事畢之日另加恩賚九月庚申上諭大學士等曰厄魯特厄爾德尼和碩齊等搶掠吳喇忒人畜深為可惡今噶爾丹正遣使來可寫敕付彼齎往若收回人衆則已如不收回當另有處置即令鄂爾多斯圖之亦不為難也康熙二十年辛酉五月己未上諭理藩院蘇尼特等旗被災今雖賑以銀米止可供一歲之用又聞别旗亦皆罹災甚是飢饉倘秋草不肥何以為生此事重大應預為久遠生全之計爾等速遣司官前往相閲情形以聞七月丙子理藩院郎中賽柱等以往賑蘇尼特等處事竣回奏上切責之曰前遣爾等往賑濟時在朕前惟言事關重大及至彼處復奏糧米斷難運至使非侍郎阿喇尼陳奏爾等即不顧而歸矣朕軫念蒙古飢荒死亡流散陸續催儹運米至彼蒙古方得更生若聽爾等之言此數萬生靈豈不徒死乎爾等便利則趨勞苦則避大虧職守矣八月甲申上命理藩院侍郎明愛等往遷蘇尼特等被荒蒙古諭之曰此等蒙古飢饉殊甚故令遷移當聽其徐來不可促之恐斃於道路現今所給牲畜必當節省以偹來年之用恐今歲食盡來年禾稼不登又致飢饉爾等前往詳視先所給米榖今年足用則已如不足再行議奏遷移到日交與八旗蒙古分駐善為撫恤務令得所若不善養以致死亡必將夲旗總管議罪朕亦不時遣官往察爾等將此旨傳諭庚寅上命理藩院郎中馬喇等往查張家口外貧困八旗蒙古諭之曰此等蒙古因遇災荒先經賑濟糧米牲畜今聞其尚無生計爾等前往詳察果係窮困之人作何再賑俾得資生即行議奏間遇有牲畜者爾等勿以為有此即可度日不行察出其畜牧之物今若食盡明年必致又飢其稍有牲畜而米榖缺乏生業艱難者亦以實聞務加詳愼毋忽十月己亥理藩院尚書阿穆瑚琅等奏嗣後進貢蒙古內有年老殘疾者賜食時請免其進內上曰外國之人遠來進貢如此分别即非柔遠之道賜食時仍令同進癸卯禮部奏吐魯番國貢物請照康熙十二年例進貢上曰外藩所進方物有用者令其進貢若犬馬等物甚屬無益且沿途供應草料驛站苦之嗣後免其進貢戊申上諭蘇尼特多羅杜楞郡王阿玉錫等曰觀爾屬下衆台吉服用甚是不堪爾為部落之主所屬人等當矜恤撫養豈可不撫恤下人獨自享用乎且爾國之人與喀爾喀不和互相侵擾偷盜亦為非宜理應各加嚴禁視爾等所屬相宜地方飼牧牲畜令得遂生朕為爾外藩人等每常留意是以凡事盡知朕所以再三教誨者無非欲俾天下人民各得其所安生樂業耳爾其切識朕諭善養爾民康熙二十一年壬戌七月乙卯上命內大臣竒塔特費揚古等賞賚厄魯特喀爾喀諸外藩諭之曰爾等俱係貴顯之臣凡事須仰副盛典以正大行之爾等皆屬一體勿以滿洲蒙古各分彼此務須同心協和滿洲大臣不諳蒙古語言凡議事爾台吉塔布囊等譯宣於滿洲大臣一同商酌確妥對答之勿致失言爾等所言伊等所答及一切傳聞事件俱備録來奏至內地蒙古向與喀爾喀互相盜竊以致盜風漸熾若將妄行作亂生事者各自擒拏懲究盜何由生盜賊既弭則牲畜可以散放牧養牲畜既肥則入冬不瘦春時孶孕無復可虞蒙古何至貧困又加以各置汛哨遇有妄行作亂之人即從公究處則民庶得安其生矣其以此曉諭之又諭曰我朝威德天下外國無不知之諒厄魯特喀爾喀必大加恭敬然伊等現行之例俱用蒙古禮今若凡事指授而去或致相岐行事反多滯礙是在臨時斟酌行之近聞人言羅卜臧台吉已為扎薩克圖汗所執爾等可於沿途細加採探如果被執爾等即歸可也至羅卜臧設有子弟代襲則敕書賞賚不可輕與須喀爾喀通國保奏授為扎薩克準納九白之貢始可加以恩賚其厄爾德尼和碩齊等如係噶爾丹屬下即限日收捕如非彼屬下不能收捕我朝另有裁奪至給發貢使符驗前已諭檄噶爾丹矣近見來使有給符驗者亦有不給符驗者何項人等給以符驗須詢明至無符驗不準放入之例亦明白曉諭之爾等行路如馬駝等物被小賊偷竊當優容之勿令追賠更須約束隨從人等毋使妄行爭鬬厄魯特喀爾喀有至爾等旅寓者須以禮貌和藹接待之和則可以識其心志也十月癸未理藩院奏稱厄魯特巴圗爾額爾克濟農陳訴屬下人等所盜馬匹竭力償補僅及百數餘欠實不能完應仍令追繳照例處分上曰巴圖爾額爾克濟農等自本地敗竄投至近邊未諳法令盜馬與牲畜亦迫於貧困耳今力不能償情詞哀懇其應賠馬匹及處分姑免此一次仍行文嚴禁嗣後毋違法肆擾自干罪戾十一月辛亥禮部題安南國進貢金銀器皿與本內數目缺少不符上諭大學士等曰外邦貢獻其物本無足重特以傾心向化誠意可嘉耳金銀器皿缺少乃細事也其餘各種皆非適用之物盡納之則彼將輕視中國矣况驛遞傳送尤屬煩苦令禮部酌減為例癸丑上諭理藩院京城痘疹盛行今年朝賀元旦蒙古王貝勒貝子公台吉塔布囊等已出痘者令其來朝其未出痘者可俱停止各屬護衛隨從人等亦如之速行宣示康熙二十二年癸亥七月辛未上諭科爾沁達爾漢親王額駙班第等曰人生以道理為重人為情欲所牽恣意妄為以致喪身者皆由不明道理故耳朕見其無知陷罪甚為憫惻即今阿祿科爾沁翁牛特二旗盜賊甚衆為盜賊而致富者能有幾人身受惡名被獲則死凡貧富皆由天命違理妄求能必得乎爾等若遵法守分有一二牲畜者擇水草善地畜牧能耕田者勤於耕種則各得生理天亦佑之如此豈不善乎倘有貧困至極無以聊生者該管之主宜加撫恤使之得所坐視其迫於飢寒以致離散爾等之心何安朕本內外一視並無分别爾外國遇年嵗荒歉朕即運糧米賑濟或有困乏即賜牲畜縀匹無非慮爾等失所之意况此番巡幸爾等或有過犯朕並不執法治罪且頻加賞賚優待爾等於此可見嗣後爾等宜遵守教諭革除惡習以副朕好生之意八月庚子朔上諭大學士等曰近觀厄魯特噶爾丹博碩克圖來使較前漸多每一次常至數百人聞其沿途遇邊外遊牧蒙古肆行擾害外國之人若行痛懲又恐失柔遠之意彼處遣來人員當有定數不可聽其意為多寡嗣後正使頭目酌量數人令進關口其餘人等或令在張家口外或在歸化城交易事畢應即遣回此事著議政王大臣會同確議具奏己酉理藩院題打虎兒哈納烏爾等三人告稱貧苦難以聊生懇入內地應編入旗下上曰哈納烏爾等以貧苦無聊來投內地甚為可憫務令安插得所乙卯理藩院題蘇尼特四子部落台吉及屬下人等無以聊生者先曾遷至八旗遊牧地方養贍今該扎薩克王並協理旗下事務台吉等既請收回撫養應準發回上曰此不能資生之台吉人等遷至遊牧地方給贍牲畜糧米已經三年今該扎薩克王等既請收回撫養應遣大臣一員前往親行驗明交與扎薩克王等內有不能前去願留者仍準存留嗣後如再不能養贍則該扎薩克王及協理旗下事務台吉等俱應處分著申飭曉諭九月丁丑上諭理藩院尚書阿穆瑚琅曰朕統一寰區無分中外凡爾民人咸吾赤子惻然憐憫皆欲使各安其居各樂其業鄂羅斯國羅剎等無端犯我索倫邊疆擾害虞人肆行搶掠屢匿根特木圖等逃人過惡日甚朕不忍即遣大兵𠞰滅屢行曉諭令其自釋過愆速歸夲地送還隱匿逃人前次所差使臣尼過來亦經曉諭但羅剎尚執迷不悟反遣部下人於飛牙喀奇勒兒等處肆行焚殺又誘索倫打虎兒鄂羅春之打貂人額提兒克等二十人入室盡行焚死此曺雖經曉諭藐不畏法因特遣將軍統兵駐守黑龍江呼馬兒等處不許羅剎仍前恣意妄行遇即擒殺頃者羅剎諸人經過黑龍江地方遇我將卒降其三十餘人奏至朕體好生之德未戮一人皆加豢養使各得其所今牙克薩尼布潮羅剎等若改前過將根特木圗等逃人送來急回夲地兩相安於無事於彼為益不淺倘猶執迷不悟留我邊疆彼時必致天討難免誅罰如路逺難歸傾心投誠者朕亦納之必加恩恤使各得其所爾衙門即遵旨明白具文曉諭彼有何言令其回奏癸未上諭厄魯特噶爾丹曰聲教既一以來爾厯世相承虔修職貢聘問有年朕嘉爾盡心敬順往來不絶故向來爾處所遣之使不限人數一槩俱準放入邊關前此來使無多且頭目人等善於約束是以並無妄行作亂者比年爾處來使或千餘人或數千人連綿不絶沿途搶奪塞外蒙古馬匹牲畜進邊之後任意牧放牲畜殘食田禾捆縛平民搶掠財物妄行者甚多邊外蒙古與內地百姓非不能相拒報復祗以凛遵朕之法度耳朕俯念爾等素行恭順不將若輩照內地律例究處遂致妄行殃民日以益衆用是限定數目放入邊關嗣後爾處所遣貢使有印驗者限二百名以內準入邊關其餘俱令在張家口歸化城等處貿易其向不用爾處印驗另行納貢之厄魯特噶爾馬戴青和碩齊和碩特之博洛庫濟台吉杜爾伯特之阿爾逹爾台吉圖爾古特之阿玉奇台吉等所遣貢使放入邊關者亦不許過二百人爾噶爾丹博碩克圗汗尚其仰體朕四海一家中外一體至意敬慎遵行嗣後遣使必選賢能頭目嚴行約束若仍前沿途搶掠殃民作亂即依夲朝律例傷人者以傷人之罪罪之盜劫人財物者以盜劫之罪罪之特此先行曉諭爾其知之乙未户部議奏羅剎歸順人機里郭禮等應交與正白旗編入佐領下少壯丁者上曰羅剎歸順頗多應令編為一佐領令其彼此相依庶有資藉十一月壬申喀爾喀土謝圖汗車臣汗等遣子弟請安入貢并奏請水草遊牧以何處為界上賜敕諭曰爾喀爾喀等向來不越噶爾拜瀚海之地遊牧康熙三年七月內爾等越界而來朕念亂之所生皆此之故特頒敕旨曉諭爾等部下屬衆逮後喀爾喀間有一二違禁來近邊遊牧以致逃盜紛紛不絶故令爾等設哨立界今爾等既稱就水草遷徙居止不定難以置哨請限以何地為界可停其置哨限以噶爾拜瀚海為界不得越此遊牧噶爾拜瀚海之地距我邊界有三日程其瀚海盡界之東亦須離我邉境三日之地不得入內朕視天下為一體率土之人靡不撫恤我邊境地方芻牧美好朕亦知之若喀爾喀遇災旱芻草不生必不得已具奏請旨方可內向遊牧俟草生時仍回原處如不請旨擅入內地即令我邊地官兵驅逐大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷五十七
