body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷四十二積貯康熙十七年戊午二月庚戌上諭戶部積貯係國家大計年來各路兵馬需用糧餉浩繁在外總督巡撫及經管錢糧各官俱宜潔己奉公殫心稽察一應支放開銷務嚴加核實節省方於軍國有裨近見各路奏銷或製偹物料並不先行題明藉口軍機緊急濫請銷算或不行察核重復支給又不為扣抵或朦混重領希圖利己致滋糜費以及侵欺浮冒種種弊端難以枚舉以後應作何禁飭爾部會同兵部工部詳議具奏康熙十八年己未六月辛未上諭戶部民生以食為天必蓋藏素裕而後水旱無虞自古耕九餘三藏富於民經久不匱洵國家之要務也比以連年豐稔粒米充盈小民不知儲積恣其狼戾故去年山東河南一逢嵗歉即以飢饉流移見告雖議蠲議賑加意撫綏而被災之民生計難遂良由地方有司各官平日不以民食為重未行申明勸諭故也近據四方奏報雨澤霑足可望有年恐豐熟之後百姓仍前不加撙節妄行耗費著各該地方大吏督率有司曉諭小民務令力田節用多積米粟俾俯仰有資凶荒可備以副朕愛養斯民至意康熙二十年辛酉三月庚午上諭戶部倉場侍郎等曰近聞各倉發米多雜土塵有賄者給好米經管之人種種作弊上下串通侵欺盜取者甚多此米係人生命朕一經體察務將始末澄清爾等應知此等情弊若不加嚴察永行杜絶是知而自取罪戾矣康熙二十一年壬戌七月甲寅上諭戶部各省常平等倉積貯米榖甚屬要務有此積貯偶遇年榖不豐彼地人民即大有禆益雖先經奉旨通行恐有名鮮實一遇水旱議賑之時未能接濟致民生艱困今將某省實心奉行某省奉行不力其逐一詳察以聞康熙二十五年丙寅六月丙辰上諭大學士等曰朕自即位以來二十餘年凡民間之事留心體訪深知情狀古人不言救荒而言備荒故三年有一年之積九年有三年之積雖間值水旱小民不致失所去嵗可謂豐年設今嵗不登即致飢饉總由素無積貯耳即常平一倉積米太多亦易朽爛若臨時令有司捐貸則又不可縱有良法奉行不得其人終屬無益苟得良有司視民如一家休戚相關始克有濟耳十二月丙辰上諭大學士等曰聞有運盛京糧米於山海關內者又有泛海販糶於山東者糧米所繫最為緊要况今議遣防戍官軍人口衆多糧糈未必足用宜下所司密咨移盛京將軍副都統戶部侍郎令以已意禁止之康熙二十八年己巳十月辛卯上諭戶部倉厫積貯專備本地災歉若因應賑州縣無糧以他處倉米易銀移賑則有糧州縣反無備災之糧倘遇凶荒其何以應且一時出糶其價必賤於賑濟亦無大益其積貯不足之所可動支正供錢糧速行賑濟康熙二十九年庚午正月癸卯上諭戶部朕撫御區宇夙夜孜孜惟期厚民之生使漸登殷阜重念食以養民必蓋藏素裕而後水旱無虞曾經特頒諭旨著各地方大吏督率有司曉諭小民務令多積米糧俾俯仰有資凶荒可偹已經通行其各省遍設常平及義倉社倉勸諭捐輸米榖亦有旨允行後復有旨常平等倉積榖關係最為要緊見今某省實心奉行某省奉行不力著再行各該督撫確察具奏朕於積貯一事申飭不啻再三藉令所在官司能俱體朕心實有貯積何至如直隸地方偶罹旱災輒為補苴之術嗣後直隸各省總督巡撫及司道府州縣官員務宜各遵屢次諭旨切實舉行俾家有餘糧倉庾充牣以副朕愛養生民至意如有仍前玩愒茍圖塞責漫無積貯者將該管官員及總督巡撫一并從重治罪爾部即遵諭通行七月癸巳上諭戶部朕撫育黎元勤思治理足民之道宜裕蓋藏從來水旱靡常必豐年恆有積貯庶歉嵗不憂飢饉如康熙二十七年頗稱嵗稔誠使民間經營撙節早為儲偫何至康熙二十八年偶遇旱災室皆懸磬總因先時無備遂至糊口維艱比蠲除正賦特發帑金分行賑濟所在官司悉仰體朕懷竭力從事被災之衆始獲安全倘非拯救多方則煢黎必流移失所今霖雨時降黍苗被野刈穫在即可望有秋惟恐愚民不知愛惜物力狼籍耗費祗為目前之計罔圖來嵗之需縱令年獲屢豐亦難漸臻殷阜應行直隸各省督撫嚴飭地方官吏家諭戶曉務俾及時積貯庶終嵗所食常有餘儲用副朕軫念民依綢繆區畫至意爾部即遵諭行康熙三十一年壬申正月壬子上諭大學士等曰去嵗陜西西安等處年榖不收罔有積貯以致閭閻困苦已遣使賑濟之矣今年豐歉尚未可知陜西省府州縣見存米榖之數應行察明先時豫備至各省府州縣皆令積貯米榖數千石則禆益黎庶者大矣可下各該督撫等令各府州縣積貯米榖其所積榖數逐一繕册報部五月辛亥上諭大學士等曰朕思積貯米榖最為要務倘能實有蓋藏則雖遇荒歉必不至於飢餒但小民不知儲備每遇豐稔之年恣意糜費一遇歉嵗即坐困不支今值麥田收穫之時應行各該地方官勸諭百姓令各户量力捐輸積貯該州縣官以輸納之人姓名數目詳記册籍當秋禾收穫以後亦依此例舉行至春月轉貸於匱乏之民俟秋月即照此數償還備用每嵗如此遵行不數年間米榖充裕縱使嵗遇不登何至閭閻艱於粒食乎康熙三十三年甲戌七月辛卯上諭大學士等曰密雲縣田禾失收今年雨水甚大著速行文倉場侍郎將通州倉所貯粟米以一萬石運至密雲縣五千石運至順義縣乘水方盛速行運到令其收貯康熙三十四年乙亥八月癸巳上駐蹕密雲縣諭大學士等曰去嵗朕見此處高粱結實者少秕者多米價騰貴髙粱一斗幾三百錢故將通倉米令運一萬石至此處五千石至順義縣減時價發糶米價稍平一斗百錢民以不困北地寒冷米榖多至失收今河水方盛著將通倉米運至密雲順義各一萬石令貯倉備用康熙三十五年丙子十二月辛亥上諭大學士等曰黑龍江吉林烏喇地方頻嵗不登可移文盛京將軍令整繕船隻將盛京倉儲米榖以彼地人力運五千石至莫爾渾阿敦之地積貯之又諭曰今嵗自天津海運至盛京之米已給散科爾沁貧乏之衆來嵗仍當自天津運米至盛京其轉運船隻不必用福建浙江二省船止用天津船挽輸一次可傳諭侍郎陶岱康熙三十六年丁丑三月壬戌上諭大學士伊桑阿曰州縣俱有積貯米榖兵丁所駐沿邉衛堡亦甚緊要其榆林等處衛堡俱照州縣積貯之例將米榖積貯豫備著交該巡撫遵行七月丙午戶部議覆陜西巡撫巴錫疏言各衛堡積貯米榖宜分撥沿邉各堡運貯應如所請上曰此各衛堡米榖若責令承收官員自備轉運之費路逺而險勢必科𣲖小民巡撫之奏户部之議皆非也其俟秋成後令該撫酌支正供買米收貯康熙三十七年戊寅二月庚午上諭大學士等曰戶部將曾經保舉司官二員差往被水災沿河之保定霸州固安文安大城永清開州新安等州縣截留山東河南漕糧每處運致一萬石以備積貯俟米價騰貴時平價糶賣康熙三十八年己卯十月癸酉上諭大學士等曰黑龍江地方連嵗歉收著將烏喇收貯米糧運至默爾根齊齊哈兒地方豫備若彼處有引水種田之處著能耕種之人前去教導交該部議行康熙三十九年庚辰三月乙未上諭戶部淮揚等處百姓罹於水災未寧幹止朕心時切軫念比嵗以來多方優恤蠲免賑給靡不舉行去年春朕親履河工目擊小民田廬皆被淹沒災黎艱於粒食益惻憫於懷爰命地方按戶賑濟又將截留漕糧發賑平糶俾得贍養上下兩河堤岸前屢發帑金修築去年二月面諭河工諸臣速行修治至今尚無成效復遴選廷臣同往經理無非軫念民瘼欲令黃運兩河堤岸速成斯民早安生業耳念水患一日不除則百姓一日不得耕種因是深以為慮著將今年漕糧截留二十萬石存貯淮揚地方備用爾部即遵諭行七月丙辰上諭戶部國家要務莫如貴粟重農朕宵旰圖治念切民生惟期年榖順成積貯饒裕於以休養黎元咸登樂利今聞直隸各省雨澤以時秋成大熟當此豐收之時正宜以飢饉為念誠恐嵗稔榖賤小民罔知愛惜粒米狼戾以致家無儲積一遇嵗歉遂致仳離著該督撫嚴飭地方有司勸諭民間撙節煩費加意積貯務使蓋藏有餘閭閻充裕以副朕重農敦本愛飬元元至意康熙四十一年壬午三月辛卯上諭户部朕躬理幾務年久深知稼穡之事念阜民之道期於有備去冬北地少雪今春雨澤微降尚未霑足誠恐蝗蝻易生有傷農事所在官吏亟宜先時預防直隸山東山西河南陜西江北地方歷年積貯倉糧果否足額該督撫宜確加稽核務使廪有餘儲不致匱乏其一切豫備事宜須悉心講求料理縱年嵗不甚豐稔亦可賑濟無虞至直隸各省見今雨澤有無多寡著該督撫即行具摺奏聞以紓朕宵旰勤民之意康熙四十二年癸未十二月辛卯上諭大學士等曰朕頃巡幸陜西閲視汾渭俱屬大河直與黃河相通河南等處米榖似可由黃河轉運但聞三門砥柱水勢極溜船不能上朕欲親往閲視因陜州知州奏無路徑斷難行走遂未果行特命三貝勒允祉同近御侍衛往視據回奏言伊等遣人乘騎涉河一道閲有神人鬼三門俱係鑿石開通水從三門流出其勢甚寬其流甚急古人於山上鑿有曵船眼孔但未經以船試驗不知可否行走前總河靳輔亦曾奏黃河通於汴河但淤墊年久若行疏導即可運糧朕至河南閲河南府居各省之中水路四達最為緊要之地應於此處儲積米榖每年田畝豈能必皆豐收倘山陜等省間或收成歉薄即可將此積貯米榖修造船隻由黃河挽運若到三門砥柱船不能上亦可於三門砥柱造船剝運以至山陜誠使河路疏通則商賈人民大有禆益所宜於無事之時預為籌畫者也豫省每年解京漕糧二十萬石有奇若將豫省三年漕糧截留備用則陜西等省雖值歉收之年將此米榖運至彼處賑濟殊屬有益俟明嵗遣大臣往視康熙五十二年癸巳五月辛巳上諭大學士等曰今年八九月內應撥江南省積貯倉米十萬石用京口將軍標下戰船及松江提標戰船狼山鎮標戰船裝載著總兵官穆廷栻總管船隻浙江省積貯倉米內亦撥十萬石用浙江提標戰船及定海鎮標戰船裝載著總兵官吳升總管船隻俱運至廣東此運米兵丁往返時或遇風勢不順行船有阻亦未可定所需口糧皆宜預備但不得動用賑濟額米江南織造署內朕曾令貯米一萬石如八九月間江南無動用此項米石之處即將此米石亦令一并運去著行文該督撫知之康熙五十三年甲午七月辛亥上諭大學士九卿等曰朕聽政年久深悉民生利弊凡國家要務無時不預為籌畫有奏摺人來朕皆細問咸稱江南天旱江浙米價亦不甚賤今春山東河南田麥歉收交冬米必騰貴若待彼時方為料理恐不能及朕詳悉思維將漕糧撥三十萬石江寧府十萬石蘇州府八萬石淮安府揚州府共五萬石杭州府五萬石開封府二萬石著漕運總督親身閲兑速行運至令其加謹照數收貯有此米石軍民心安而米價自不至驟貴豫省漕糧該部亦應預行詳議今若雨澤及時田禾豐收則此項米石由水路撥給他處亦可著議奏十一月乙卯上諭戶部朕臨御多年無時不軫念民瘼每嵗於直隸各省凡雨暘期候豐歉情形莫不留心訪察雖在僻逺必務周知偶值一二處災傷蠲免賑救不惜重費倉帑以蘇我民困也朕思賑濟災歉以速為貴必待督撫奏報往返候命使小民嗷嗷待哺何如預備積貯於平時則所在有可恃之資而臨事免轉移之勞今漕挽通行倉庾充裕江浙地方年來頗有歉收州縣應酌量截留漕米分貯各處江寧原留五萬石今再截留十萬石蘇州原留八萬石今再截留二萬石安慶截留十萬石杭州原留十萬石今再截留十萬石皆於本年起兑內就近截留令地方官加謹收貯至應動用之時著該督撫題請爾部即遵諭行康熙五十五年丙申五月壬申上諭大學士等曰閲今嵗督撫等奏摺陜西山西河南山東等省二麥豐收乃京師麥價未見甚減京師所賴者山東河南之麥此兩處俱通水路不知一年販來幾何或沿途富商大賈預行收買以致京師麥價不減亦未可定從前江南浙江所買湖廣江西米數及湖廣江西賣去米數該督撫俱具摺奏聞大有禆益今山東河南除陸路販賣者無庸稽察外自水路買來麥榖數目可否照湖廣江西督撫具摺奏聞之處爾等會同九卿確議具奏十月丁亥朔上諭大學士等曰張伯行條奏宜立社倉前李光地為直隸巡撫時亦曾請立社倉朕諭此事言之甚易行之甚難爾姑試行後試行之果無成效倉糧庫帑設官專理尚且虧空社倉所收榖石交百姓收貯寺廟虧空又何待言耶其果否可行之處爾等會同九卿詳議具奏康熙五十六年丁酉四月乙未上諭大學士九卿倉場侍郎等曰邇年以來通倉積米甚多著分運直隸各府州縣存貯預備於民甚有裨益每府或貯萬石每州縣或貯數千石附近通州河道者交與倉場總督等運送其餘府州縣所運米石速行文直隸總督𣲖地方官乘未雨之先挽運值此青黃不接之時於各府州縣平糶亦大有益於百姓其江南浙江如有應行截留漕糧若干之處爾等一并速議具奏丁酉上諭大學士九卿等曰近來米價必不能如往年之賤昔大學士張英曾奏桐城縣米價銀一兩可得三石見今四川米價亦復如此雲南廣西貴州米價亦不甚貴大抵戶口稀少則米價自賤今太平日久生齒蕃息安能比數年前之米價乎戶口殷繁固是美事然當預籌安養之策今將米石運送各處或平糶或賑濟不過僅可糊口未必即能充裕張伯行曾奏於永平府設立社倉永平知府近日行之甚苦社倉之法既屬難行通倉米石有餘不如運送各州縣為便又諭曰見今通倉米石甚多應運送之州縣即當運送去年皇莊米石俱交州縣積貯但倉中未必實有其數畿南廣平大名等府有水路可通應交直隸總督作何運送至密雲古北口去年曾運通倉米每處各一萬石亦甚易或仍交倉場總督運送爾等速議具奏康熙五十八年己亥正月壬寅上諭大學士九卿等曰京城通州倉內貯米甚多各省運至漕糧亦無虧欠在倉堆積恐致紅朽杭州蘇州鎮江江寧淮安安慶等處俱有倉厫與水路相近江南浙江漕船想此時已過淮朕意欲將湖廣江西等未過淮漕糧截留存貯此等地方倉內遇米價騰貴之年將此存貯米石或減價糶賣或行散賑則民人得沾實惠大有禆益如蠲免地丁錢糧不過於田多富戶有益其無地窮民未必均沾實惠米榖甚屬緊要不可不預為備也年來豐收米價雖賤但嵗嵗大有豈能期必乎應將久逺禆益之處預行籌畫爾等將漕糧作何截留之處會同議奏康熙六十一年壬寅四月戊午上諭戶部趙宏燮奏將收貯真定順德各州縣四萬石米平糶其餘各州縣有未貴之處亦將倉米平糶十分之三俱俟秋收後買補還項等語去年各州縣收貯莊頭等所交米石部內曾遣司官會同地方官糶賣其糶米銀兩至今尚未完繳據此各州縣收貯倉米俱無實際平日積貯原為備荒而設今值青黃不接之時固應平糶但地方官虧空倉米不過糶賣數石即借此掩飾虧空究竟倉米既虧百姓何從糴買於民生並無禆益也見在存倉米榖如果足數即照該督所請糶賣倘朕遣大臣查看時州縣並無米榖黎庶不得糴買將州縣官即行正法該管上司從重治罪六月壬戌上諭大學士等曰暹羅國人言其地米甚饒裕價值亦賤二三錢銀即可買稻米一石朕諭以爾等米既甚多可將米三十萬石分運至福建廣東寧波等處販賣彼若果能運至於地方甚有禆益此三十萬石係官運不必收稅十月辛酉上諭議政大臣等曰倉糧關係甚要支放米時理應一厫放畢再放一厫今聞此厫米石支領方半又向别厫支領所剩米少而所占之厫甚多又支領白米時諸王公主等屬下之人不按應放之厫領米而揀厫霸占支領者有之此等斷然不可理應按厫支領如厫內餘米一半者即是弊端應將此徹底清查若遣他人亦未能辦著和碩雍親王帶領𢎞升延信孫渣齊隆科多查弼納吳爾泰前往會同張大有查勘再從前倉內每日進厫之米止四五千石自簡任富寧安以來每日進厫之米至四萬石進米多則於回空糧船有益至於米色之變俱在收貯之善與否即如昭五達地方所貯米石厯四十年米色照常並未黴爛今厫座有損漏者著即修理厫座如不敷用著即添造大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷四十二
