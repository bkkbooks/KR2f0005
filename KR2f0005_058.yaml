body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷五十八柔逺人二康熙二十三年甲子二月庚子先是喀爾喀右翼扎薩克圖汗疏言自康熙元年羅卜臧變亂以來我兄弟子姪多投左翼屢索不還曽往訴達賴喇嘛䝉諭七旗曰爾七旗當共尊扎薩克圖汗其投左翼人民俱應發還為此差扎爾布奈前來蒞盟而左翼土謝圖汗不至皇上係我大衆之主謹以此情上聞至是上念喀爾喀纍世恭順職貢有年不忍其子弟人民離散遣阿齊圖格隆等齎敕往諭達賴喇嘛令遣使議和敕曰朕統御寰區願中外無征戰之勞離散之苦使羣生皆臻安樂近者喀爾喀扎薩克圖汗屢奏右翼子弟人民離散奔入左翼索之未還爾喇嘛從來積大福力永逺真誠慈悲濟衆聲聞炳著無不欽乃髙行而讚頌之者喀爾喀諸汗貝子皆供奉爾喇嘛信爾之教而尊崇道法爾於本朝亦誠心敬慎進貢來往不絶今天下共享太平而扎薩克圖汗人民離散未得完聚朕心大為軫惻念其中必有父子兄弟骨肉分離者未必不生事互殺交相戰爭兵戎一起姑無論人民困苦即兩汗亦豈能並存伊等於朕向來恭順竭誠奔走於爾喇嘛亦為護法久矣何忍默視使至此極乎朕與爾俱當遣使往諭將扎薩克圖汗離散人民給還俾兩翼永歸於好既副朕一視同仁之至意而於爾喇嘛六度之行四無量之心亦符合矣爾喇嘛其遣大喇嘛一人與朕行人會於喀爾喀境內定期而遣之朕於此亦遣使臣赴所約之地與爾使同往十二月己酉上諭貴州威寧總兵官王潮海曰威寧乃猓蠻雜處之地性多驕悍今海內升平邊陲無事爾在任宜加意撫恤務使敉寧以副朕意康熙二十四年乙丒四月戊申禮部議准福建總督王國安所奏外國進貢船內貨物一體納稅上曰外國私自貿易之船或可稅其貨物若進貢者亦槩稅之殊乖大體且非朕柔逺之意五月癸未上諭大學士等曰巴圖爾額爾克濟農違離彼土嚮化而來宜加愛養經理其居處乃彼等原為鄂齊爾圖汗所屬纍世進貢誠懇恪恭鄂齊爾圖汗之孫羅卜藏滚布與巴圖爾額爾克濟農當使聚合一處於所宜居之地為之經理令其居處賜之封號給以敕印用昭示朕繼絶舉廢之至意可遣賢能台吉與理藩院堂官侍衛曉諭巴圖爾額爾克濟農云以爾等搶奪毛明安及三吳喇忒之故本宜遣兵征𠞰悉行翦滅但念鄂齊爾圖汗纍世進貢誠懇恪恭特加矜恤爾等罪戾盡皆寬宥羅卜藏滚布乃鄂齊爾圖汗之孫爾等皆屬一國為親近兄弟今令爾等皆與羅卜藏滚布等聚合封以名號與羅卜藏滚布等可以同居之善地相度定居遣使於達賴喇嘛亦如此頒朕諭㫖其宜居之地亦與羅卜藏滚布巴圖爾額爾克濟農等公同相視令其遣台吉等還奏此事於今年八月即宜舉行爾等與議政王大臣蒙古大臣會同詳議以聞七月丙寅上諭理藩院尚書阿喇尼曰朕頃見蒿齊忒郡王車卜登奏所屬旗下䝉古大饑朕心深為憫惻奚可坐視任其艱厄彼所居地距此亦不甚遠可亟遣爾衙門司官速察饑民戶口以聞癸酉上諭理藩院尚書阿喇尼曰食為民天朕先有諭旨各處設立常平倉令其儲積以備賑饑今歲畿內秋成大熟正宜詳酌舉行至救荒之道以速為貴倘賑濟稍緩時日則流離死喪者必多雖有賑貸亦無濟矣朕每聞水旱災傷即遣官動支正項錢糧賑濟以此故也今欲救蒿齊忒䝉古若以畿內粟轉運至彼恐不能待可速以拜察地方儲備之粟措支一千石遣賢能司官晝夜兼馳運往賑濟十一月癸酉上命扎薩克喇嘛垂木珠爾拉木扎木巴得木齊商南多爾濟副都御史拉篤祜齎敕往諭達賴喇嘛敕曰朕統御宇內繼絶舉廢欲期咸底隆平厄魯特噶爾丹博碩克圖汗滅鄂齊爾圖汗時羅卜藏滚布阿拉布坦巴圖爾額爾克濟農等紛紛離散來至邊境竄跡於金塔寺賀蘭山等處乃巴圖爾額爾克濟農厄爾德尼和碩齊等又以生計窮迫在鄂爾多斯毛明安吳喇忒寧夏等處妄行劫掠朕於此時不即發兵𠞰滅者乃軫念鄂齊爾圖汗歷世職貢誠敬奔走是以寬宥其罪巴圖爾額爾克濟農等亦戴朕恩願依朕為生屢疏奏請敕印前此朕曽諭厄魯特噶爾丹博碩克圖汗云巴圖爾額爾克濟農等如爾所屬即當收之不能朕另有裁度乃彼約以丑年春為期如逾期悉惟上裁今逾期已數月矣天下太平惟伊等兄弟骨肉分離散處失所朕心殊為惻然爾喇嘛素以惻隱之心度此衆生凡厄魯特諸貝子皆供奉喇嘛信崇爾法朕思羅卜藏滚布阿拉布坦巴圖爾額爾克濟農皆鄂齊爾圖汗之苗裔也鄂齊爾圖汗於喇嘛為護法久矣何忍默視其子孫宗族至於困窮今朕欲將伊等歸併一處安插於可居之地以示興絶舉廢之至意爾喇嘛其遣使與朕行人定期往㑹朕於此即遣大臣至所約之地偕爾使人前往康熙二十五年丙寅正月戊辰先是理藩院奏厄魯特巴圖爾額爾克濟農攜其屬七百八十人將至請遣官往迎上曰巴圖爾額爾克濟農所屬亦限以二百人入關餘者留歸化城則現在噶爾丹之貢使可無辭矣兹當嚴冬之際行李牲畜盜賊可虞歸化城都統古睦德現以年節來覲可令速回監視著遣戶部理藩院司官各一員前往宣化府優給供應以示柔逺之意至是巴圖爾額爾克濟農來朝上賜宴錫賚以優禮之乙亥上諭厄魯特巴圖爾額爾克濟農曰爾祖顧實汗於太宗皇帝時輸誠進貢是時同達賴喇嘛來通款爾叔鄂齊爾圖車臣汗當世祖皇帝時竭抒忠悃每年進貢請安其土産白鷹以時來貢朕猶及見之夫貢物何足珍貴正鑒其誠敬之心耳及爾等厄魯特內亂噶爾丹攻滅鄂齊爾圖車臣汗并吞其衆遣使獻俘朕念前此鄂齊爾圖車臣汗勉效悃忱聞其破亡且加憫恤何忍受之因諭來使却其所獻俘獲頃者爾為噶爾丹擊敗奔來邊境將沿疆附近居民牲畜等物偷盜侵奪朕即應正爾犯邊之罪何難遣兵𠞰除但念爾祖昔時頗竭誠款爾復引罪自首以迫於饑窮瀕死妄行等情奏請朕即寬宥今若徙爾於邊境內外不拘何地居之爾敢不凛遵特念爾祖顧實汗爾叔鄂齊爾圖車臣汗素效恭謹故俾爾絶者復繼散者復聚欲使鄂齊爾圖車臣汗之孫羅卜藏滚布阿拉布坦與爾聚處爾等宜相與輯睦善自安業至於爾等聚合與否在朕本無損益惟是朕為天下主凡在函蓋咸欲使之共樂太平朕兹諭旨自爾身及爾子孫當世世念之勿替四月乙酉朔上賜敕諭喀爾喀七旗汗濟農台吉等曰朕統御寰宇中外一體務使交相輯睦共享升平乃爾右翼扎薩克等內自相亂兄弟人民多歸左翼其左翼扎薩克兄弟人民亦有歸於右翼者爾等以兄弟之親互相吞并異日必致交惡生亂朕心惻焉康熙二十三年曾頒敕於達賴喇嘛議遣使諭和爾等而達賴喇嘛亦謂朕俯念道法慈憫衆生有如父母意甚善也特遣噶爾丹西勒圖前來朕亦命尚書阿喇尼台吉巴忒馬什畢力克圖喇嘛阿齊圖綽爾濟等與之偕往爾汗濟農台吉等當仰體朕意及達賴喇嘛之心盡釋舊怨將兄弟人民各歸本扎薩克令其和協照舊安居不但仰副朕命與達賴喇嘛之意即爾七旗永無離散之苦爭鬬之害福祿所綏亦且無疆矣七月癸巳上諭理藩院右侍郎拉篤祜一等侍衛文達曰爾等可與達賴喇嘛使者同往召集巴圖爾額爾克濟農羅卜藏滚布阿拉布坦等相度伊等可以遊牧之地指而與之仍㑹同提督孫思克將地之界限令伊標下官辨認記如巴圖爾額爾克濟農等因給地安插欲來謝恩則許之來達賴喇嘛使人欲來請安亦許之來否則給以廪餼而遣之其厄爾德尼和碩齊等欲與巴圖爾額爾克濟農等一同遊牧亦許之爾等可與彼定沿邊為盜作亂之罰著為令前巴圖爾額爾克濟農來覲時已自誓不復令屬下為非其羅卜藏滚布阿拉布坦亦須嚴禁所屬兄弟既已完聚從此和睦安居倘再致流亡他往殊負朕歸併眷恤之意朕所以不憚諄切訓諭者亦以其先世恭順有年不欲令其子孫失所也其一一傳諭之己酉上諭議政王大臣等曰向者羅剎侵犯雅克薩尼布潮諸地戕我居民邊境騷然曾諭鄂羅斯察漢汗來使尼果來等撤回其衆自後竟不覆奏反在在侵犯肆行擾害意尼果來未達前㫖於察漢汗復令被擒羅剎持書從喀爾喀地宣諭之亦不覆奏因遣發官兵往雅克薩招撫羅剎不戮一人令其頭目額禮克謝等持書歸去羅剎聞我師言旋復回雅克薩築城以居朕思本朝頻行宣諭曾未一答而雅克薩羅剎又死守不去或尼布潮諸地阻隔前書未達或雅克薩羅剎皆彼有罪之徒不便歸國俱未可知今問荷蘭國貢使稱伊國與鄂羅斯接壤語言亦通其以屢諭情節備悉作書用兵部印付荷蘭國使臣轉發鄂羅斯察漢汗處收回雅克薩尼布潮羅剎於何處分立疆界各毋得踰越則兩界人民均得寧居不失永相和好之意察漢汗覆奏時令其使由陸路直來若陸路難通即以來疏付荷蘭國代奏再以此作書發西洋國轉達之九月己亥禮部題朝鮮國王李焞遣使謝罪進貢方物應交內務府收貯上曰朝鮮國因謝罪進貢理宜不收但恐發還不惟齎送人役勞苦亦且驛遞騷擾可將此項准作年例常貢嗣後因謝罪貢納著停止己酉鄂羅斯察漢汗遣使疏陳下國邊民如有搆釁作亂之人恭請天朝察明正法先令米起佛兒等星馳齎書以行乞撤雅克薩之圍仍懇詳晰曉諭下國上諭議政王大臣等曰鄂羅斯國察漢汗以禮通好馳使請解雅克薩之圍朕本無屠城之意欲從寬釋其令薩布素等撤回雅克薩之兵收集一所於近戰艦處立營并曉諭城內羅剎聽其出入毋得妄行攘奪俟鄂羅斯後使至定議十一月癸巳上諭理藩院噶爾亶多爾濟既係鄂齊爾圖車臣汗之孫應令其與巴圖爾額爾克濟農等一同遊牧其拉篤祜等所定地界并嚴禁盜竊之例爾衙門其移文督撫提鎮通行曉諭康熙二十六年丁卯二月丙子喀爾喀車臣汗故其長子伊爾登阿拉卜灘遣使奏聞上曰喀爾喀七旗誓和未久車臣汗之位不便久懸其敕諭土謝圖汗澤卜尊丹巴胡土克圖扎薩克圖汗等將車臣汗長子伊爾登阿拉卜灘速襲為汗仍敕諭達賴喇嘛知之賜土謝圖汗等敕曰朕惟自古帝王統御寰區遐邇一體其厯年久逺職貢恭順竭盡誠心者益加眷賴焉爾等纍世悃誠遣使入貢恭順有年正在嘉賞忽聞車臣汗身故朕殊震悼特遣大臣遺之賻贈近念爾喀爾喀內自交惡朕特遣大臣諭令和睦未久車臣汗之位不可久虛爾喀爾喀例以長子承襲伊爾登阿拉卜灘台吉既係長子且聞其人亦可著嗣立為汗爾等其遵諭行九月庚子上賜敕諭噶爾丹曰據喀爾喀土謝圖汗奏稱厄魯特內向遊牧兩路來攻我界上人等屢請赴彼故出兵迎之等語朕統御宇內無分中外爾厄魯特喀爾喀兩部落若果互相殘害朕心大不忍焉曾於康熙十六年檄諭爾等務期共相和好爾覆奏云厄魯特蒙古之道仗達賴喇嘛福庇得以鞏固聖諭誠是等語爾噶爾丹纍世恭順職貢有年如果舉此大事無不奏聞於朕者因路逺地遙虛實難明朕尚未之深信或不逞之徒兩地搆煽亦未可定爾兩部落如果興兵必有一方至於敗亡不但重負朕向來一視同仁之至意羣黎之死亡離散朕心深為憫惻敕書到日即為息爭修好則爾恭順之心朕實嘉之已敕諭土謝圖汗令其罷兵矣為此特令爾使陶賴哈什哈等齎敕往諭十一月丙申上諭大學士等曰今聞外藩蒙古出汛界哨地有侵害搶虜喀爾喀之巴爾呼等蒙古者甚多以後著嚴行禁止毋使妄行康熙二十七年戊辰八月癸丑上諭理藩院尚書阿喇尼曰聞蒿齊忒貧困實甚應賑濟米糧且賜以銀兩買牲畜養庶有裨於生理拜察地方有米五百石并發白銀一千兩令侍讀學士喀拉等持往量給之癸亥喀爾喀洪俄爾戴青台吉等率其屬來朝上諭曰爾等喀爾喀與厄魯特世世進貢朕心寵眷從無偏庇一體優待恩賚有加今聞喀爾喀厄魯特互相結怨亟遣使臣令其和睦使臣未至而喀爾喀敗遁悉至哨探地方居牧朕一體加恩今亂尚未定故留之未遣爾母達賴達熙納聞朕大兵往尼布潮地方預備餱糧牛羊以待朕甚嘉之爾先衆人報厄魯特橫肆情形又先衆人請安進貢尤為可嘉諭畢上取所帶珊瑚數珠賜之以示優眷大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷五十八
