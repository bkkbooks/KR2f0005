body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷三十八蠲賑一康熙三年甲辰六月庚申上諭户部等衙門各項錢糧關係國計民生必徵輸起解厯年清楚然後國用有裨軍需不匱小民無催科之擾官員免參罰之纍向因直隸各省自順治元年至十七年拖欠銀共二千七百萬兩有餘米七百萬石有餘藥材十九萬斤有餘紬絹布匹等項九萬有餘先曽有旨應作何催徵作何蠲免著議政王貝勒大臣九卿科道會議具奏今據奏將河南湖廣等省所欠錢糧內有議蠲免者有仍催徵者此纍年積欠錢糧豈盡屬小民之故與前者假託催徵貪汚官吏科派小民侵吞入己者甚多此皆貪官汚吏侵尅那移撮借運糧官侵漁解糧官役自用盜賊劫奪火燒水溺等項拖欠至此而追徵之時有將人繫獄者亦有實欠在民雖遇恩詔未得盡蠲免者若將此項嚴催小民無故派徵見任官空受處分且以此拖欠錢糧撥給兵丁必致兵餉缺額尤為無益况不肖官役嚴加追比借端多派小民朕甚憫之今將自順治元年以來十五年以前所欠銀米藥材紬絹布匹等項錢糧悉豫蠲免其先經議處官員人等不議外見在催徵監禁追比各犯之罪俱著寬釋以後貪官姦吏若將奉旨蠲免款項復借端苛擾派徵加等從重治罪至直隸各省兵丁征勦守禦效力備極勞苦唯需糧餉以資生計向因新舊兼徵錢糧不完以致兵餉亦多壓欠十五年以前所欠兵餉理應找給但民欠錢糧俱經蠲免不必復給自順治十六年以來所欠兵餉俱著找給以後務按期支給俾兵丁無內顧之憂乃副朕軍民一視同仁至意如仍前將應給兵餉不實給發及違禁侵尅那用等弊從重治罪爾等通行曉諭俾咸知朕意康熙七年戊申七月丁未上諭戶部小民資生惟賴田畝一遇災祲禾稼損傷誠可憫惻急宜蠲賦以昭恩恤嗣後凡有水旱蝗蝻等災有司官星夜申報督撫督撫各照駐劄附近地方隨帶人役務極減少一切執事盡行撤去勿致纍民將被災田畝作速親勘定明分數造册達部照例蠲免務令人沾實惠爾部速飭直隸各省遵行康熙九年庚戌十月甲午上諭户部淮揚所屬地方嵗比不登屢廑朕懷今年又遭水災黃淮交漲堤岸衝決百姓室廬多被淹沒夏麥未獲登場秋禾播種水潦難施民生失所特差部臣速行踏勘準動正項錢糧存積銀米將飢民賑濟但被災之民既無耕穫何以輸糧如再加催科愈不堪命今年淮揚所屬被災地方應徵錢糧爾部速行酌議蠲免以副朕恤災愛民至意康熙十年辛亥三月己巳上諭戶部頃因差往江南郎中禪塔海奏事來京朕面詢民生休戚據奏淮安一帶地方水患未消人民飢饉流移前雖行賑濟今無以糊口困窮已甚聞此情形深切憫惻民為邦本如斯困苦豈可不速行拯救今應即行差官前往賑濟或就近截留漕米或動支庫內銀兩糴米給散飢民爾部速議具奏六月壬午上諭理藩院聞蘇尼特等八旗人民被災牲畜俱死難以存活朕心深為惻然爾部會同禮部太僕寺將馬場之馬與禮部所管之牛羊酌量派出賞給被災之人康熙十一年壬子四月己卯上諭户部江南連年水旱相仍災傷甚重所有舊欠錢糧若一并追徵民生愈苦朕甚不忍其以前未完錢糧實係逋欠在民者可暫停徵俟民力稍蘇時再行請旨康熙十二年癸丑四月辛亥上諭户部江南蘇松常鎮淮揚六府連年災荒民生困苦與别處不同朕心時切軫念除今年錢糧已經派撥兵餉外其蘇松等六府康熙十三年分地丁正項錢糧特行蠲免其半以昭朕存恤災黎至意壬戌甘肅巡撫花善奏稱鞏昌府屬西和禮縣去年疫癘盛行牛驢倒斃甚衆若待請旨散賑恐播種愆期已於康熙十一年徵解銀內發買耕牛於積貯屯糧內散給籽種并計口量賑部議該撫未經題請任意違例不合應交吏部議處其擅動銀穀仍令賠補上曰此所支銀穀既經給發小民巡撫司道府等官免其賠補議處六月甲子上諭户部江南泰州積水決堤淹沒田畝正賦已悉豁免尚有牧馬場租等雜辦銀兩小民無從措納可並除之九月丙戌上諭户部山東寧海州荒蕪地二千七百餘頃逃亡户三千餘丁纍年逋賦小民力難賠補自康熙九年以後錢糧如數悉為豁免仍敕巡撫設法招徠勸墾康熙十三年甲寅二月辛丑上諭戶部江南清河安東鹽城興化髙郵寶應泰州山陽諸州縣疉被水災雖已經蠲賑而將來涸出田地收穫之期尚遙賦無從出按期徵課必致纍民爾部行查涸出地畝其應徵額賦及漕項漕糧俱俟三年後起徵康熙十七年戊午閏三月丙辰上諭議政王大臣等曰海寇盤踞厦門諸處勾連山賊煽亂地方皆由閩地瀕海居民為之藉也應如順治十八年立界之例將界外百姓遷移內地仍申嚴海禁絶其交通但窮苦之民一旦遷徙必棄其田舍難以為生殊可憫惻可將本年地丁額賦差徭雜項盡行豁除該督撫揀委能員料理俾安輯得所勿致苦纍六月癸酉上諭戶部浙江屬江山西安等十九縣溫衢各衛所逼近閩中首先被陷百姓困苦其康熙十六年以前錢糧槩從蠲免并令該督撫多方招徠避賊黎庶各還故土俾事耕墾十一月庚戌上諭內閣學士噶爾圖屯泰曰遵化州所屬有附近湯泉之婁子山袁各莊啓新莊梁家莊石家莊此五莊供辦徭役其一年地丁錢糧俱令蠲免如今嵗已經徵收準於來嵗蠲免至鮎魚關城內外居民七十一家免其一年正供外仍每戶賜銀二兩爾等從戶部支取親閲分給所蠲錢糧令州官即遍諭婁子山等莊及鮎魚關居民務使均沾實惠康熙十八年己未二月己巳上諭戶部江南舊欠錢糧屢經督撫及科道等官奏請蠲免朕已洞悉但當逆賊煽亂之時各省地方與賊接壤者被其侵犯迫而從逆情非得已故於平定之後其舊欠錢糧悉行蠲免江西於賊未到之先地方姦徒輒行倡亂廣信南康饒州奉新寧州宜黃安仁永新永豐彭澤湖口瀘溪玉山鉛山等處所在背叛紳襟兵民人等或附和嘯聚抗拒官軍或運送糧米助張賊勢或布散偽劄煽誘良民或窩藏姦細潛通消息輕負國恩相率從逆以致寇氛益熾兵力多分遲延平定之期勞師費餉揆厥所由良可痛恨即今田廬蕩析家室仳離皆其自作之孽逋賦未蠲職此之故但思逆寇漸經殱除地方凋敝追比舊欠民困愈深朕心殊為不忍其康熙十六年以前舊欠錢糧著盡行蠲免爾部即行該督撫通行曉示務使小民均沾實惠以昭朕愛養百姓至意四月庚寅上諭户部江南財賦繁多如舊欠無徵錢糧更行追比恐纍小民其康熙十年十一年十二年錢糧俱行蠲免其十三年十四年十五年十六年錢糧俱令於十九年始分年帶徵以紓民力著該撫通行曉諭務令均沾實惠以副朕休養斯民至意康熙十九年庚申二月丙戌上諭戶部尚書伊桑阿曰朕聞宣府等處歲值大祲貧民乏食甚至鬻賣妻子以求存活夫人孰不愛其家室哉乃欲延朝夕之命而割其所親慘惻莫甚焉其遣爾部郎中明額禮馳驛速往會同地方官賑濟急拯艱危以紓朕懷三月己未上諭御史洪之傑曰據奏賑粥期滿請行停止朕思飢民流集京師今非麥熟之時若資遣還鄉仍恐失所著添設粥厰於五城關廂外再行賑粥兩月俟麥收之時聽其各回鄉里四月庚辰上諭戶部前差爾部侍郎薩穆哈賑濟直隸飢民至春麥收成之時停止今聞春麥已枯秋成難定其間災重地方麥既無望飢民何以聊生仍著薩穆哈等前往賑濟直接秋收勿令災黎有失生理康熙二十年辛酉五月壬戌上諭戶部比年以來宣府大同疉罹飢饉而邉外蒙古亦復凶荒故發宣大二府存貯米石盡用賑濟朕思邉境糧儲所關最要古稱三年九年之蓄蓋合侯甸藩畿通為之計豈僅謂公廩之充盈已也養人足食道貴變通可發京倉米二十萬石運往宣大備用其運送米石用就近地方驛站車夫不致糜費爾部派才能官一員前往會同該撫確議以聞六月丙戌上遣員外郎穆稱額等往大同賑濟諭之曰前爾等奏飢民因賑濟又得雨澤不至流移各安其業頃朕復遣人往視人民飢餒流移如故雨澤猶然未降則所云賑濟尚未遍及矣前此姑置不問爾毋自護前非朕知之最悉今往同撫臣賑濟務令飢民得遂其生及作何設法拯救確議奏聞康熙二十二年癸亥四月辛已上諭戶部黔省為滇南孔道地瘠民貧大兵凱旋挽輸芻糗供應人夫極其浩繁且起解吳逆家口絡繹運送不無苦纍小民竭力供億生計艱難朕心深為憫惻所有本年秋冬及來年春夏應徵地丁正項錢糧盡行蠲免以示朕軫恤民隱之至意十二月丙辰上諭戶部陜西西安甘肅等處前當大兵進勦之時轉輸糧糗辦運芻茭一應軍需取給閭里小民由陸路供億勞費煩多今既經蕩平朕心時切軫念康熙二十三年應徵地丁各項錢糧著蠲三分之一以昭朕眷念民生勞苦之意又山西崞縣欣州定襄五臺代州振武衛新經地震被災頗重雖經遣官賑濟仍應量行加恩以示軫恤其被壓身故民人所有康熙二十三年應徵地丁錢糧著與全免其房舍倒壞力不能修者丁銀全免地畝錢糧著免十分之四爾部速行該地方曉諭小民務俾各沾實惠如有司官役借端朦混私行重徵者或經參奏或被告發將經管各官從重治罪康熙二十三年甲子三月癸未上諭户部民為邦夲必年穀順成家給人足乃愜朕撫育羣生之至意比者巡行近畿見閭閻生計僅支日用米價漸貴民食艱難又聞河南地方年歲荒歉所在苦飢小民無以資生恐致流移失所朕心深切軫念直隸河南應作何賑濟事宜著九卿詹事科道會同確議具奏四月丁酉河南巡撫王日藻疏請發常平倉穀賑濟飢民上諭大學士等曰設立常平原為飢荒之備可令速行賑濟隨遣户部郎中吳什巴往河南諭之曰賑濟飢民最為迫切爾其馳驛速往同該撫察賑務令得沾實惠其被荒地方錢糧亦詳查奏請酌量蠲免不得將未被災地方錢糧借端混入槩行奏請須嚴飭該司道官員令其確查申報康熙二十四年乙丑三月丁丒户部題賑濟順德等處飢民應如撫臣所請令地方官捐助上曰朕聞順德河間真定廣平等處百姓殊苦飢饉今正值青黃未接之時不速賑濟恐致流移離去鄉土可令巡撫動支正項錢糧亟行賑濟以救災黎辛巳上諭大學士等曰朕南巡時見閭閻疾苦深為軫念所經過地方如此其他省可知今國帑充足朕欲蠲免直隸各省明嵗錢糧以紓民困爾等會同户部豫行酌議俾天下均沾實惠其直隸順德等府正在飢荒且此地供應甚多徭役殷繁今宜即行議蠲直隸撫循得所實為有益爾等會同戶部議奏四月辛丑上諭戶部朕撫御方夏愛養黎元早作夜思勤求治理閭閻疾苦無時不深軫念欲使民生樂業比屋豐盈惟當已責蠲租萬姓得沾實惠直隸地方頻遇旱災小民匱乏宜加恩恤順永保河等處圈占地方應徵康熙二十一年地丁錢糧已經詔行蠲免所有直隸八府康熙二十三年未完地丁錢糧盡與豁除其順永保河未經圈占地方及真順廣大等處康熙二十四年應徵地丁各項正賦俱著免三分之一爾部速檄該地方官通行曉諭務使人人得被膏澤以副朕勤恤民隱至意如有不肖有司借端朦混私行重徵者或經參奏或被告發定行從重治罪爾部即遵諭行九月丙寅漕運總督徐旭齡疏報淮揚等處水災請行賑濟户部議賑濟事應令地方官料理上諭曰淮揚等處疉罹水患百姓被災甚苦朕心深為憫惻若令地方官賑濟恐災黎未沾實惠應急為拯救使小民不致流移失所可速遣部院堂官一員馳往踏勘情形具題到日詳議奏聞十一月己未户部議侍郎蘇赫往勘淮揚水災疏請免被災百姓錢糧將運丁所餘米麥賑濟應如所請上諭大學士等曰今國用亦云充足前曽令詳察各省錢糧於來嵗蠲免夫欲使民被實惠莫如蠲免錢糧朕南巡時觀宿遷邳州百姓生計今年尚可支持淮揚等處飢民已經被災不能辦納錢糧今僅免本年錢糧百姓沾恩有限須將明歲錢糧一并蠲免庶於民大有禆益至直隸各省遇災錢糧亦欲蠲免爾等會同戶部將被災地方蠲免錢糧數目一并察明詳議具奏庚申上諭戶部朕惟自古帝王統一寰區懋宣德化必子惠黎元勤求民莫幹止寧成家給人足而後世躋雍熙治登上理朕御極以來宵旰圗治未敢即安念切民依思培邦本雖編氓漸得遂生而閭閻正資惠養欲使羣生樂利比户豐盈惟頻行減賦蠲租萬姓得沾實惠前此用兵以來河南湖北兩省人民轉輸供億勞費繁多特沛仁恩以昭軫恤所有康熙二十五年應徴地丁各項錢糧可免其半其康熙二十四年未完錢糧盡與豁除又直隸獻縣河間縣河間衛江南宿遷縣興化縣邳州髙郵州鹽城縣山東郯城縣魚臺縣地方今年重罹水災小民艱苦亦應加恩軫恤所有康熙二十四年秋冬二季二十五年春夏地丁各項錢糧俱與豁免爾部速行該地方官通行曉諭務使人人均沾恩膏以副朕愛育羣生至意如有不肖有司官役借端朦混及私行重徵者該督撫指名題參從重治罪如該督撫徇隱不行糾舉或經參奏或經告發定行一并從重治罪康熙二十五年丙寅九月庚寅上諭户部自古帝王撫馭九有軫念民依凡鞠謀生養為計甚周猶以賜復蠲租為布德行仁之要務朕嘉與海內元元共圖樂利弛征減賦時厪於懷惟頻渙恩施俾萬姓得沾實惠念直𨽻畿輔重地天下根本寬租之詔屢沛但順天永平保定河間較之畿南諸府差徭加倍供億尤劇又湖南福建四川貴州地方昔年為賊竊踞民遭苦纍今雖獲有寧宇更宜培養以厚民生其將直隸順永保河四府及四川貴州兩省所有康熙二十六年應徵地丁各項錢糧俱著蠲免二十五年未完錢糧亦著悉與豁免湖南福建兩省所有康熙二十六年秋冬二季二十七年春夏地丁各項錢糧及二十五年未完錢糧亦與盡行豁免十二月戊辰上諭户部朕惟自古帝王撫馭寰區勤宣德意必軫恤民隱加惠閭閻俾黎元樂業比户豐盈則化洽時雍治登隆理朕念切民依鞠謀生養欲使羣生樂利幹止寧成惟頻行減賦蠲租庶萬姓得沾實惠前念直隸畿輔重地王化所先宜大沛恩膏用培邦本而順永保河四府地方人民較之畿南差役倍多繁苦故將康熙二十六年地丁各項錢糧同湖南福建四川貴州四省錢糧盡與蠲免比慮兵餉或有不敷真順廣大四府地方未經一體蠲免今聞此四府人民亦有艱苦朕心深為軫念宜速施渥澤均示仁恩著將此四府康熙二十六年地丁各項錢糧俱行蠲免爾部速遵諭行康熙二十六年丁卯九月乙未大學士等會同户部奏稱蠲免江寧等七府陜西全省錢糧合計六百萬有餘亘古以來未有如此之多者臣等不敢輕議上曰朕從愛百姓起見六百餘萬未足為多也十一月辛丑上諭户部朕惟自古帝王統御萬方又安九有殫心懷保節愛攸先期於物力充裕爰以惠養黎元俾膏澤旁流咸蒙美利朕自御極以來軫恤民依力圗休養惟理財為國家之大經蠲貸為愛民之實政厯年敦崇節儉嚴核浮冒蓋欲為布德行惠之資邇年各省錢糧雖已次第蠲免但江蘇所屬各郡縣為財賦重地額徵錢糧甲於他省且纍嵗輸將供億效力惟勤兹用大沛恩膏除漕項錢糧外所有康熙二十七年應徵地丁各項錢糧俱令蠲免二十六年未完錢糧亦悉與豁免又陜西省錢糧前雖已曽蠲免但念該省人民用兵之際轉輸餽餉效力可念再宜加恩以𢎞樂利其康熙二十七年應徵地丁各項錢糧及二十六年未完錢糧亦俱與豁免爾部速行該地方官通行曉諭務使小民均沾實惠以副朕愛育蒼生至意康熙二十八年己巳七月丙辰上諭户部朕巡幸江南凡所經厯之地於編氓疾苦必詳加體察如傷念切每沛恩膏勿令一物不得其所朕過邳州親見彼處田地多為水淹耕耘既無所施賦稅於何取辦若仍徵收錢糧小民必致重困其見在被淹田畝應納地丁及漕項錢糧俱行蠲免厯年逋欠亦盡與豁除該督撫即行出示遍曉窮鄉仍不時亷察倘有仍行私徵者題參從重治罪以副朕愛恤民生至意九月庚戌户部議覆郎中殷特等會同直𨽻巡撫于成龍疏言察勘直屬被災地方七八九分不等請照定例按分數酌免錢糧應如所請上諭大學士等曰小民生計最多苦辛今人動稱耕九餘三談何容易農家終歲勤動幸遇有秋而穀價又賤欲辦八口衣食與來嵗耕種之資猶恐不足安得寬然有餘一遇歉嵗不免顚連困苦矣惟富饒業户陳陳相因賤買貴賣每獲厚利然賴有富户居積猶得散糶民間以濟荒歉若使盡為災黎其何以堪自古帝王生長深宫少知稼穡艱難與民生疾苦朕軫念民艱時常巡省周咨博訪悉知窮簷困踣之狀實可哀憐直隸被災地方本年未徵錢糧及康熙二十九年春夏二季錢糧俱應蠲免著候諭旨行十月辛巳户部議覆盛京遼陽興京屯莊所種田地因亢旱及霜隕米穀不收應免其納租移咨盛京户部詳計所需米數採買賑濟上曰盛京地方今年亢旱米糧不收聞兵丁見在買米而食朕心深切軫念其令户部侍郎阿山乘驛速往與盛京各部大臣公同察明量其度嵗所需令內務府官往取莊上所有之米散給俾得均沾實惠是日理藩院議喀爾喀信順額爾克戴青等六台吉所屬之人飢饉難以度日應遣官將殺虎口倉內所貯之米給發上曰給發此米可差賢能司官前往勿令減少照數取給務令得沾實惠若米內有雜和粳土及給發短少等弊發覺之日將給發官員從重議處康熙二十九年庚午二月乙丑上諭內閣九卿詹事科道等曰昨嵗畿輔荒歉朕慮民食維艱或至流離失所既蠲除其田租矣復特發帑金三十萬兩并動支常平等倉粟令該撫遍行賑貸蓋期災黎得所毋使離散也今聞通衢相近之民雖已獲沾恩澤而僻壤窮簷究不能自存至於越鄉去土者甚衆夫小民流移若此則司牧大吏所賑救者安在耶前所發三十萬帑金未審如何散給所在人民有無轉徙應遣部院大臣往加詳察至於四方流民率多就食京師今年五城粥厰雖經倍給銀米寬其期日但恐飢氓漸集無以遍贍罔克均沾恩惠宜增設粥厰擇各部滿漢賢能司官俾親賑焉爾等其會議以聞康熙三十年辛未十二月甲申上諭戶部朕撫御寰區三十年以來早夜圖維惟以愛育蒼生俾咸臻安阜為念比歲各省額徵錢糧業已次第蠲豁其嵗運漕米向來未經議免朕時切軫懷所有京通各倉米穀撙節支給數載於兹今覩厯年儲積之粟足供三年給放應將起運漕糧逐省蠲免以紓民力除河南省明嵗漕糧已頒諭免徵外湖廣江西浙江江蘇安徽山東應輸漕米著自康熙三十一年始以次各蠲免一年至江寧京口杭州荆州大兵駐防地方亦應豫行積貯著將康熙三十一年起運三十年漕米各截留十萬石存貯倉厫令該地方官敬慎守視以備需用大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷三十八
