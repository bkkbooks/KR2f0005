body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷四十三飭臣工一康熙七年戊申二月丁酉上諭吏部等衙門前諭督撫奏事必舉其事之原委明晰入告部院將應結之事亦即行完結勿得遷延駮察近見督撫奏疏仍有事情未晰者部院亦有將應結之事遷延駮察者如此草率不加詳慎殊負委任之意今後督撫奏事若不詳明具奏著嚴行參處各部院若將應結之事復搜求細故借端駮查定行治罪康熙八年己酉六月丁卯上諭户部凡奉差及直𨽻各省地方見任各官俱有董理公務並撫綏百姓之責宜各盡乃職以副朕差遣簡用之意近聞奉差官員及督撫提鎮大小文武各官不思盡職惟圖利已及買良民為奴甚至多買餽送親友此等違法妄行殊屬可惡以後著通行嚴禁若仍前恣買良民者從重治罪决不姑恕康熙九年庚戌三月己卯上諭吏部等衙門時已入夏雨澤愆期皆由部院大小臣工因循舊習不能精白乃心公廉盡職以致政務失當有干天和爾等堂官宜力圖修省靖共職業嚴督所屬司官凡事秉公勤勵革除積弊毋得瞻徇情面仍稽察胥吏作奸事有宜結者速為完結勿借端屢駮兾遂已私至於法司一切訟獄務期平允得情速審速結勿株連無辜久致淹繫爾等大小官員當實心修省毋視為具文怠玩如故有負朕委任責成之意九月乙亥上諭吏部兵部朕惟致治雍熙在於大小臣工悉尚廉潔使民生得遂內外滿漢文武官員各有職守必律已潔清屏絶餽遺乃能恪共職業副朕任使近聞在外文武官尚有因循陋習借名令節生辰剝削兵民餽送督撫提鎮司道等官督撫提鎮等官復苛索屬員餽送在京部院大臣科道等官在京官員亦交相餽遺前屢經嚴禁未見悛改殊違潔已奉公之義兵民日漸囷乏職此之由以後著痛加省改斷絶餽遺以盡厥職如仍蹈前轍事發之日授受之人一并從重治罪康熙十二年癸丑五月庚辰上諭吏部國家大小事務在內責成部院在外責成督撫其事情重大繁難者仍照限完結如平常易結之事理應速結以清壅滯近見內外各衙門題覆本章有將易結之事遲延不結必俟限滿具題其不行具題完結者必多牽連守候以致苦纍自後著速行完結毋得遲延務俾案牘一清副朕委任至意八月庚子上諭都察院左都御史多諾等曰爾衙門職係言官凡事宜各抒己見豈可以公同具奏充數已乎爾衙門所奏之事雖皆曾經列名但副都御史嶽諾惠等畏懦瞻顧竟無建白嗣後應公奏者公奏若事應獨奏其各出己見以聞九月甲申上諭吏部等衙門國家致治首在崇尚寬大愛惜人才俾事例簡明易於遵守處分允當不致煩苛乃符明作惇大之治向來各部院衙門俱定有處分條例已經頒行但其中款項太多過於繁密以致奉行者或以膠執為守法或以苛索為詳明或例所未載援引比附輕重失宜徒據成規罔原情理大小各官稍有過誤動觸文網雖具才能弗克展布深為可惜著部院各衙門將見行處分條例重加訂正斟酌情法刪繁從簡應去應留逐一分别詳議具奏十二月辛丑上諭吏部兵部國家用人宜先沈靜之才人臣服官首重亷恥之節邇來文武官員或因不得升遷或因不得差遣輒稱寃抑紛紛控告不過圖便已私原非從公起見縱屬應升應差而自為辨白希求營利廉恥之道已虧豈能修舉職業克副任使理宜嚴禁以肅官常爾二部可通行申飭康熙十三年甲寅正月庚辰上諭朝覲藩臬等官曰爾等朝覲官員各有職掌俱宜實心任事潔已愛民安輯地方消弭盜賊錢糧不得加𣲖刑名務期明允賑濟蠲免必使民沾實惠以副朕察吏安民至意如不遵行國法具在三月辛巳上諭安南將軍華善曰京口地當要害特遣爾率兵往鎮倘附近有警亦宜應援軍行往來與駐防之地務嚴禁軍士勿令擾民聞前者兵行率多擾害爾等當以為戒否則罪有所歸康熙十六年丁巳三月己丑上諭鑲白旗副都統吳亶及兵部尚書塞思赫顯親王下長史馬七辦理府務佐領達席賢溫郡王下長史鄂樂辦理府務一等護衛郭布博濟等曰邇年以來鑲白旗盜賊光棍匪人甚多凡此妄行之人皆因該管官不豫行曉諭嚴禁聽其陷於法網無知愚人自投死地且某旗好尚何事則一旗之人皆尤而效之某族中好尚何事則一族之人皆尤而效之種種陋習罔不漸染爾等係此旗官員各有管轄教訓之職嗣後須曉諭嚴切務令盜賊光棍永行禁止至於所屬之人因伊主幼小遂爾藐視恣行匪僻此皆爾大臣衆官不行嚴禁之故嗣後爾等宜各敬其主竭力料理公事至於用人勿得較論分屬之人惟當選擇賢能任事七月甲辰上諭大學士等曰人臣服官惟當靖共匪懈一意奉公如或分立門戶私植黨與始而蠧國害政終必禍及身家厯觀前代莫不皆然在結納植黨者形跡詭祕人亦於指摘然背公營私人必知之凡論人議事間必以異同為是非愛憎為毁譽公論難容國法莫逭百爾臣工理宜痛戒若夫汲引善類不矜己長同寅協恭共襄國事是又不可以朋黨論也八月丁卯上諭吏部等衙門向來各衙門事件關係重大者雖有定限赴科道稽察但事易結者即宜速結必俟限滿方行題覆多致壅滯更有各項呈狀不係注銷者任意耽延借端拘提人犯數月不為審結無辜牽連殊堪憫惻自後題覆本章俱速為料理不必盡拘定限至於審理事件亦速為完結照注銷欽件例定限每月造册赴都察院科道稽察具奏爾等各宜力圖振作體恤民隱以副朕孜孜求治之意康熙十七年戊午正月戊戌上諭議政王大臣等曰逆賊吳三桂等背恩倡叛荼毒生靈擾亂疆宇朕念切除凶志安民社仁育義正恩威並行大將軍等既承簡任當勵忠貞之誼早奏戡定之勳以副朕愛民至意乃自用兵以來大將軍王貝勒將軍大臣等固有盡心王事已著勞績者亦有觀望逗遛不思振旅遄進竟爾營私適已希圖便安或諉甲兵之不全或托舟楫之未具借端引日坐失事機者甚而干預公事挾制有司貪冒貨賄占踞利藪更有多方漁色購女鄰疆顧戀私家信使絡繹尤可異者新定地方亟需安輯乃於所在攘奪焚掠種種妄行殊乖法紀本宜嚴察職名從重治罪但時當進𠞰姑免處分䇿勵後效各路大將軍王貝勒將軍大臣等各宜乘時進取恢復封疆拯救民命一切違法之事嚴加禁止倘有不遵許督撫指參繩以重典兵丁厮役犯者其將領家主均行連坐官員犯者除本官重治外將帥分别議處地方官逢迎餽獻一并嚴懲如督撫不糾或經言官劾奏或為被害首陳該督撫以徇庇論督撫提鎮等官自違禁條加倍究治其以此傳示內外嚴加曉諭俾一體遵行三月壬午上諭吏部戶部兵部朕統御寰區孜孜圖治期於朝野安恬民生樂業共享升平乃副朕宵旰勵精之意不意逆賊吳三桂背恩煽亂各處用兵禁旅征𠞰供應浩繁念及百姓困苦不忍加𣲖科斂因允諸臣節次條奏如裁減驛站官俸工食及存留各項錢糧改折漕白二糧顔料各物增添鹽課鹽丁房田稅契牙行雜稅官戶田地錢糧奏銷浮冒隱漏地畝嚴行定例處分用過軍需未經報部不准銷算以上新定各例不無過嚴但為籌畫軍需早滅逆賊以安百姓之故事平之日自有裁酌各省督撫提鎮大小文武等官俱宜上體朕意下念民生潔已奉公愛惜物力務期早奏蕩平與民休息以稱朕乂安海宇至意四月壬辰上諭吏部等衙門國家設法定例原期章程盡善垂之久逺上裨軍國下益民生必藉內外臣工精白乃心恪共詳慎實心奉行方克永遵而無弊近見各處章奏凡於見行之例或借端營私巧為掩飾或推諉卸過冀免處分或徇庇情面曲為彌縫凡行一事每滋弊端以致良法美意澤未下究而纍已及民揆諸立法初意殊為未符此等情弊科道官雖有風聞因無確據難於指參朕雖洞悉緣由期其自行改悔不加深求遂爾因循以為僥幸之路以後在內部院等衙門在外督撫各官滌慮洗心痛改積習於有益國家民生事務籌畫擔當不避嫌怨務期法行無弊恩被閭閻以副朕立法定制愛養斯民至意如視為故事仍蹈前轍事經發覺定行嚴加處分著通行申飭遵行七月戊午上諭兵部直隸各省緑旗兵丁經制額數專為防守汛地征𠞰賊寇而設該管各官自宜實足兵數以資戰守督撫提鎮等經制兵內如有充伴當書記軍牢以及馬夫水夫等役悉行裁汰務足兵額倘仍不改陋習因循踵行該督等糾劾從重治罪若督撫徇庇不糾或為科道指參或被旁人首發治以徇庇之罪決不輕貸其通行曉諭康熙十八年己未八月甲戌上諭吏部等衙門凡為臣子者同寅協恭自古皆然今各部院辦理事務大小漢官凡事推諉滿官事之得當則歸功於已如事失宜則卸過於人至於入署不待事畢諉於滿官祇圖早歸宴㑹嬉遊不為國家盡力擔當料理公務此後各宜協力同心務盡厥職不可仍前推諉至科道各官平日章奏內將一二可行之事隱附私情希圖作弊凡有條議鮮非無因閲覽奏疏多以已為至公至亷其囑託公事肆行妄為外播威勢挾制多端地方督撫等官莫不畏懼小民困苦未必不由於此作何懲戒著九卿詹事科道詳議具奏辛卯上諭大學士等曰滿漢論事往往不能和衷漢官每謂滿官偏執若漢官肯實心為公據理辨論滿官豈有不從之理若滿官堅意偏執漢官即當奏聞從來有治人無治法為政全在得人人臣事君全在辨心術之公私今爾諸臣之才皆能料理政務但徇私利已者多公忠為國者少若諸臣肯洗心滌慮公爾忘私國爾忘家和衷協恭實盡職業庶務何患不就理國家何患不治平哉爾諸臣其勉之九月庚子上諭議政王大臣等曰孫思克奏稱賊多步行踰嶺登山如履平地小路曲徑賊所稔知我兵前進恐賊由曲徑潛躡我後以絶餉道為害滋甚朕思秦地緑旗之兵為數甚多其中步兵不少且各省緑旗兵向推秦兵精鋭賊能跋涉山嶺我兵豢養有年何獨不能况漢中興安為秦內地滿漢大兵經行熟悉何得視同絶域輒荒誕其辭凡將帥用兵前進衝鋒後顧餉道務詳度以合機宜乃一定之道也倘以賊間道潛來斷絶餉道為憂怯懦不前則永無破賊之日矣又疏言大將軍公圖海分滿漢兵為四路雖分賊勢終憂兵單緑旗兵每人止有一馬且未必皆强壯可用之兵惟滿洲大兵堪任第為數無多雖欲另調又恐秦地三邉番夷甚衆當此秋髙馬肥思逞之候實無兵可調不若俟來春二三月間塞外草尚未生水泉猶涸之時多調邉兵以資戰守各路進發朕思秦中滿兵不少緑旗兵較各省更多今稱兵力單弱顯屬畏縮憚於進兵且各省緑旗兵亦止一馬曾無多給而且越境征𠞰粵東粵西閩楚諸處今又進定滇黔較之平定境內漢興勞逸何如耶向者凡將軍提鎮官募兵時必選精壯勿使濫收充數定例嚴明今若以秦兵皆非强壯難以應用則孫思克職任何事觀此則欺蔽之情更顯然矣且有大將軍公圖海在彼乃妄議大兵多寡殊屬狂妄又云番夷馬肥思逞欲俟來春二三月間草尚未生泉水猶涸之時進取設或二三月間進取之後四五月間番夷馬肥思逞將若之何正值秋成凉爽各處賊冦大敗震驚之餘不速行蕩平反欲於來春青黃不接之時進取是又何意耶又奏稱秦省大半皆山地瘠民貧不産粳稻所種惟麥豆之屬向有捐納之事稍裨用兵今例已停罷民受採買之苦且山路險阻必資負載駝運其雇賃之價數倍於應輸之賦今各路需餉甚多山徑狹隘挽運維艱時當初冬草枯葉落畜牧無資欲俟來春調集官兵務期兵强餉足共圗進取者職此之故朕思粵東粵西諸省山嶺亦多何曾豫備糧餉官兵豈有止食稻米不食他粟之理至於捐納各省俱停止留粵西事例以資平滇軍需之用自定秦省數年以來未曾勞民轉運且漢興雖多險阻乃陜西內地非隔省百姓轉輸可比今恐挽運纍民至春又誰為轉運耶當逆賊敗遁之時急令進兵者正為早定地方以安百姓耳採買恐纍於民巡撫杭愛題奏已經改定今以請開事例轉運維艱為辭其規避進兵明甚又疏稱八旗官兵今年七月二十八日京師地震房屋傾壞壓斃人民聞之各懷內顧之憂臣所以暫停進取以回天意俟人心稍定再議進兵未晚朕思八旗官兵世受豢養朕之加意臣僚士卒尤為渥厚不特房屋傾圯細故即蹈湯赴火誼亦難辭孫思克封疆大臣凡事不加詳察妄言人情皆動以惑軍心殊失大臣之體細察孫思克疏內前後情由惟耽安逸怯於進兵列款巧奏且自秦省有事孫思克等係封疆大臣俱應按律議處念同大兵進𠞰宥過計功給以世襲之官加以不次之擢當捐軀報國破賊安疆自請前進效力乃孫思克身任提督統轄全師不思奮力前進反煽惑滿漢動搖民心飾辭妄奏深負朕擢用之恩情罪殊屬可惡其令翰林學士喇沙里速往嚴取口供來奏尋喇沙里取供還奏上曰孫思克理應嚴察治罪但今方統兵與大兵分路進𠞰俟事平日再議十月辛卯上諭九卿詹事科道等曰邇來諸事爾等全不擔當或遇事有疑難即以未經與聞不同啓奏或托言他事及病不赴㑹議在部辦事或推諉不肯列名或有過缷於司屬意圖僥幸若果應坐罪豈推卸便可脫免乎又有臨事全無一語及既退之後輒云我曾如此立論而某官不肯見從朝廷不曾俞允此豈臣子靖共之道乎至部院衙門司官亦多偷安廢弛各堂官宜將此等司官指名題參九卿㑹議處有規避者著都察院及科道官糾參嗣後爾等當直攄所見陳奏審酌可否自在於朕爾等勉之康熙十九年庚申正月辛亥上諭九卿等曰科道官內升外轉原以示勸懲也今見才優者猶知憚於外轉其或才力不及不稱言職之人安於外轉道員者甚多是但以示勸非所以示懲也故令九卿詹事科道㑹議務期得當乃㑹議時俱瞻徇情面不肯議以小品用此無他直是畏科道耳夫人臣事君茍立心正直行事公平何所顧慮於人其畏科道者皆由平日自處不正故也朕於諸臣素行無論在官在家一舉一動罔弗知之不即發覺者欲令改過自新以全國家待臣下之體奈何不畏朝廷而徒畏科道之指摘乎近日科道官專以虛聲肆其恐嚇並未有真能參大奸大貪者如此不職若不分别懲勸何以大破積習使知勉勵乎據魏象樞等奏恐天下不肖之輩不識朝廷慎重科道之意疑為厭薄言路之端邇年以來姚文然李之芳施維翰等內升未久即任以大僚督撫亦因其克盡言職才能素著之故此無論天下智愚賢不肖當亦知朝廷無厭薄言路之意矣其外轉者或係素無建白或係昧於事理或係任臆妄言或係才力不及原非因其條奏而外轉也外轉科道以小品官員用遂言有礙國體殊不可解朕心本虛公初不執定一說若果在必行何難旨意票出特命諸臣㑹議者正欲公同參酌務合乎中道耳爾等可傳諭各官示以朕意二月壬午上諭大學士等曰初逆賊反叛時克殫忠義或從賊所設計來歸或大兵已至尚為賊困此等人録其善而奬其忠方為允當亦有大兵已恢復地方奸猾之徒先附賊妄行因賊衆潰散焚毁僞劄逃避山林文飾耳目以圖僥幸者今給事中姚祖頊概請奬叙被難人員甚為失當可加嚴飭嗣後科道官條奏朕先行披覽仍面加詳問如此則人之才能及所奏之意咸可知矣五月癸卯上諭大學士等曰向以亢暘齊居䖍禱雖雨澤薄降四野田疇尚未霑足今兹不雨為時又久旱魃為災朕甚懼焉意者政事之失宜者多歟不然天心仁愛下民何其宜雨而久不雨也日者以政理之故勤求言矣而言者文繁無益其集九卿詹事科道掌印不掌印各官問有何事當行何事當革悉意以陳毋有所隱是日上諭大學士九卿詹事科道等曰朝廷致治惟在端本澄源臣子服官首宜奉公杜弊大臣為小臣之表率京官為外吏之觀型大法則小亷源清則流潔此從來不易之理如大臣果能精白乃心恪遵法紀勤修職業公爾忘私小臣自有所顧畏不敢妄行在外督撫各官自應慎守功令潔已愛民乃大臣等每自謂清正無私粉飾空言至其所行往往營私作弊有玷官方深負委任之意科道係耳目之官凡有弊端自當據實參奏且居處甚近如此情弊豈無見聞乃瞻徇情面緘默不言即有條奏多係繁文言官職掌殊為未盡如肯從公糾舉孰敢恣行無忌朕以為目今之弊莫大于此近因天氣亢旱朕夙夜焦思念慮所及無不舉行感格之道猶恐未盡故特召爾等各面陳所見因宣諭朕意令爾等知之六月戊辰上諭黃巖總兵官林本植曰黃巖要鎮今海賊雖已敗遁恐其出沒不常又沿海之民或有奸宄勾連外寇為害匪細尤宜加意嚴防林本植奏曰沿海之地必須精練水師臣西北人恐未深諳上曰自古用將何分南北惟在得人且靖寇本以衛民攘外必先寧內為將之道亦惟在得民心也七月乙未上諭陜西總督哈占四川巡撫杭愛曰據哈占奏稱秦餉由略陽運至保寧令四川接運杭愛又言四川官少船缺不能接運杭愛既以不能接運為言仍著哈占及巡撫鄂愷甘肅巡撫巴錫等即以略陽糧艘運官運至敘州四川督撫速趣空船使回方今大兵進𠞰雲貴需餉至急既已尅期進取挽運無過今秋川陜督撫自宜殫心籌畫勿誤軍需乃妄分彼此互相推諉遲延至今殊負職任嗣後當同心商酌不拘疆界速為饋運無悮進取如仍推諉遲延有失軍機經管其事自督撫以下各官俱以軍法從事康熙二十一年壬戌正月己巳上諭理藩院尚書阿穆瑚琅等曰近見內外䝉古接壤處所互相攘奪盜竊者甚多遇此種事遣爾衙門官員前往察閲不思調和兩界裨益地方據實奏聞以副朕驅使但苟且竣局希圖脫免凡事有問諉云不知今朕俱已洞悉爾等堂司官何曾啓奏一事尚可謂克盡職掌者乎嗣後務期勤慎宣力不得仍前草率疏忽二月壬辰上諭直𨽻巡撫格爾古德曰凡為官者承貪吏之後名譽甚易承良吏之後名譽甚難金世德于成龍居官有聲爾繼其後得名必遲爾毋欲速以求名速則恐致擾民直𨽻旗下莊頭與民雜處朕聞所在凶惡莊頭自以旗下倚恃其主甚為民害爾涖任後加意嚴查務期懲創即管皇莊者亦毋寬宥九月己酉上諭福建將軍佟國瑶曰國家設立督撫提鎮原以為民向來駐防鎮江杭州福建等處漢軍官兵皆恣意妄行侵占市㕓擅放私債多買人口如哈喇庫諾邁等一味營私罔遵法紀買人口至盈千百此等匪人用之何益昔孟喬芳總督陜西李率泰總督福建俱能潔已奉公愛民恤士秦閩人至今思之爾到地方宜恪遵國憲安戢兵民毋負朕委任至意十月乙亥上遣郎中崑篤倫等採辦楠木諭之曰爾等查採楠木所至地方當㑹同督撫實心詳察毋借端滋擾凡官廨民房寺廟墳墓毋拆毁封採恐奸徒乘機詐害平民此意可曉諭地方令共悉知大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷四十三
