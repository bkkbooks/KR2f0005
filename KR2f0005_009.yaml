body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷九聖治四康熙五十六年丁酉四月丁酉上諭大學士等曰從前工部及光禄寺每年動用錢糧數十餘萬近俱節省減至數萬但節用之事有益於此即無益於彼近來舖戸招買頗有難於辦理者以此故耳如欲禁止江浙養蠶織帛亦甚易然衣布者多則布價更昂於帛亦未可知朕記前曾禁貂皮而諸項皮張竟與貂皮同價總之天下事託諸空言則易見諸實事則難行文與辦事固不同也十月己亥上諭大學士等曰自古人主多厭聞盜賊水旱之事殊不知凡事由微至鉅豫知而備之則易於措辦所以朕於各省大小事務惟欲速聞之也即如各省來京之人從福建來者朕以浙江米價詢之自江南來者朕以山東米價詢之伊係經過之地必據實陳奏即彼省大吏知不可隱亦皆實奏米價既己悉知則年歲之豐歉亦可知矣庚戌上諭大學士等曰朕近日精神漸不如前凡事易忘向有怔忡之疾每一舉發愈覺迷暈天下至大一念不謹即貽數百年之患爾等大臣又皆年老鬚髮盡白有奏事不能起者辦事有悮或推耳聾年邁者如此則事必致貽悮古人雖云無為而治人主不過總其大綱然一日二日萬幾豈皆大綱乎書中之言多不可憑二十一史朕皆曾披閲悉屬筆底描摹無足徵信所以讀書與行事截然不同爾等以為我讀書報皇上亦是虛文務在盡心勉力庶不致有悮天下之事十一月辛未上御乾清宫東暖閣召諸皇子及滿漢大學士學士九卿詹事科道等入諭曰朕少時天稟甚壯從未知有疾病今春始患頭暈漸覺消瘦至秋月塞外行圍䝉古地方水土甚佳精神日健顏貌加豐每日騎射亦不覺疲倦回京之後因皇太后違和心神憂瘁頭暈頻發有朕平日所欲言者今特召爾等面諭從來帝王之治天下未嘗不以敬天法祖為首務敬天法祖之實在柔遠能邇休養蒼生共四海之利為利一天下之心為心體羣臣子庶民保邦於未危制治於未亂夙夜孜孜寤寐不遑寛嚴相濟經權互用以圖國家久逺之計而已自古得天下之正莫如我朝太祖太宗初無取天下之心嘗兵及京城諸大臣咸奏云當取太宗皇帝曰眀與我國素非和好今取之甚易但念中國之主不忍取也後流賊李自成攻破京城崇禎自縊臣民相率來迎乃翦滅闖寇入承大統昔項羽起兵攻秦後天下卒歸於漢其初漢高祖一泗上亭長耳元末陳友諒等竝起後天下卒歸於眀其初眀太祖一皇覺寺僧耳我朝承席先烈應天順人撫有區宇以此見亂臣賊子無非為真主驅除耳今朕年将七旬在位五十餘年者實賴天地宗社之黙佑非予涼德之所致也朕自幼讀書於古今道理粗能通曉凡帝王自有天命應享壽考者不能使之不享壽考應享太平者不能使之不享太平自黄帝甲子至今四千三百五十餘年稱帝者三百有餘但秦火以前三代之事不可全信始皇元年至今一千九百六十餘年稱帝而有年號者二百一十有一朕何人斯自秦漢以下在位久者朕為之首古人以不矜不伐知足知止者為能保始終覽三代而後帝王踐阼久者不能遺令聞於後世壽命不長者罔知四海之疾苦朕已老矣在位久矣未卜後人之議論如何而且以目前之事不得不痛哭流涕豫先隨筆自記而猶恐天下不知吾之苦衷也自昔帝王多以死為忌諱每觀其遺詔殊非帝王語氣并非中心之所欲言此皆昏瞀之際覓文臣任意撰擬者朕則不然今豫使爾等知朕之血誠耳當日臨御至二十年不敢逆料至三十年三十年不敢逆料至四十年今已五十七年矣尚書洪範所載一曰壽二曰富三曰康寧四曰攸好德五曰考終命五福以考終命列於第五者誠以其難得故也今朕年将七十子孫曾孫百五十餘人天下粗安四海承平雖不能移風易俗家給人足但孜孜汲汲小心敬慎夙夜不遑未嘗少懈數十年來殫心竭力有如一日此豈僅勞苦二字所能該括耶前代帝王或享年不永史論槩以為侈然自放耽於酒色所致此皆書生好為譏評雖純全盡美之君亦必抉摘瑕疵朕為前代帝王剖白蓋由天下事繁不勝勞憊之所致也諸葛亮云鞠躬盡瘁死而後已為人臣者惟諸葛亮一人耳若帝王仔肩甚重無可旁諉豈臣下所可比擬臣下可仕則仕可止則止年老致政而歸抱子弄孫猶得優游自適為君者勤劬一生了無休息如舜雖稱無為而治然身歿於蒼梧禹乘四載胼手胝足終於會稽似此皆勤勞政事巡行周歴不遑寧處豈可謂之崇尚無為清靜自持乎易遯卦六爻未嘗言及人主之事可見人主原無宴息之地可以退藏鞠躬盡瘁誠謂此也昔人每云帝王當舉大綱不必兼總細務朕心竊謂不然一事不謹即貽四海之憂一時不謹即貽千百世之患不矜細行終累大德故朕每事必加詳慎即如今日留一二事未理眀日即多一二事矣若眀日再務安閒則後日愈多壅積萬㡬至重誠難稽延故朕莅政無論鉅細即奏章内有一字之訛必為改正發出蓋事不敢忽天性然也五十餘年每多先事綢繆四海兆人亦皆戴朕德意豈可執不必兼總細務之言乎朕自幼強健筋力頗佳能挽十五力弓發十三握箭用兵臨戎之事皆所優為然平生未嘗妄殺人平定三藩掃清漠北皆出一心運籌戸部帑金非用師賑饑未敢妄費謂此皆小民脂膏故也所有巡狩行宫不施采繢每處所費不過一二萬金較之河工歲費三百餘萬尚不及百分之一幼齡讀書即知酒色之可戒小人之宜防所以至老無恙自康熙四十七年大病之後過傷心神漸不及往時況日有萬幾皆出自裁每覺精神日逐於外心血時耗於内恐前途倘有一時不諱不能一言則吾之終身遺語豈不可惜故豫於眀爽之際一一言之可以盡一生之事豈不快哉人之有生必有死如朱子之言天地循環之理如晝如夜孔子云居易以俟命皆聖賢之大道何足懼乎近日多病心神恍惚身體虚憊動轉非人扶掖步履難行當年立心以天下為己任許死而後已之志今朕躬抱病怔忡健忘故深懼顛倒是非萬㡬錯亂心為天下盡其血神為四海散其形既神不守舍心失怡養目不辨逺近耳不分是非食少事多豈能久存況承平日久人心懈怠福盡禍至泰去否來元首叢脞而股肱惰至於萬事隳壞而後必然招天災人害雜然竝至雖心有餘而精神不逮悔過無及振作不起呻吟牀榻死不瞑目豈不痛恨於未死昔梁武帝亦創業英雄後至耄年為侯景所逼遂有臺城之禍隋文帝亦開創之主不能豫知其子煬帝之惡卒致不克令終又如丹毒自殺服食吞餅宋祖之遥見燭影之𩔖種種所載疑案豈非前轍皆由辨之不早而且無益於國計民生漢高祖傳遺命於吕后唐太宗定儲位於長孫無忌朕每覽此深為恥之或有小人希圖倉卒之際廢立可以自專推戴一人以期後福朕一息尚存豈肯容此輩乎朕之生也竝無靈異及其長也亦無非常八齡踐阼迄今五十七年從不許人言禎符瑞應如史册所載景星慶雲麟鳳芝草之賀及焚珠玉於殿前天書降於承天此皆虚文朕所不取惟日用平常以實心行實政而已今臣鄰奏請立儲分理此乃慮朕有猝然之變耳死生常理朕所不諱惟是天下大權當統於一十年以來朕將所行之事所存之心俱書寫封固仍未告竣立儲大事朕豈忘耶天下神器至重倘得釋此負荷優游安適無一事嬰心便可望增加年歲諸臣受朕深恩何道俾朕得此息肩之日也朕今氣血耗減勉強支持脱有悮萬幾則從前五十七年之憂勤豈不可惜朕之苦衷血誠一至如此每覽老臣奏疏乞休未嘗不為流涕爾等有退休之時朕何地可休息耶但得數旬之怡養保全考終之死生朕之欣喜豈可言罄從此歲月悠久或得如宋高宗之年未可知也朕年五十七歲方有白鬚數莖有以烏鬚藥進者朕笑却之曰古來白鬚皇帝有幾朕若鬚鬢皓然豈不為萬世之美談乎初年同朕共事者今竝無一人後進新陞者同寅協恭奉公守法皓首滿朝可謂久矣亦知足矣朕享天子之尊四海之富物無不有事無不經至於垂老之際不能寛懷瞬息故視棄天下猶敝屣視富貴如泥沙也倘得終於無事朕願已足願爾大小臣鄰念朕五十餘年太平天子惓惓丁寧反復之苦衷則吾之有生考終之事畢矣此諭已備十年若有遺詔無非此言披肝露膽罄盡五内朕言不再甲戌上諭大學士等曰朕莅政五十餘年海内昇平皆恃衆大臣為朕股肱耳目朱子亦云為政在於用人大小臣工俱宜實心任事直言勿隱方為社稷蒼生之福為大臣者當識大體不可瑣屑刻薄朕待大學士尚書侍郎以至小臣各有等級若待大學士與小臣無異即非禮也又如翰林等作詩寫字作古文或時文朕皆因材器使未嘗求全責備也乙亥八旗都統等因豁免公庫扣除銀兩率領兵丁謝恩上曰小人得財則喜用盡則怨見今八旗得見舊日風景者已無其人而能記憶祖父之遺訓者亦少以致風俗日奢人心不古嗣後務期悛改以副朕諄諄訓誡至意丙子上諭大學士等曰柔遠能邇之道漢人全不理會本朝不設邉防以䝉古部落為之屛藩耳䝉古終年無殺傷人命之事即此可見風俗醇厚若直隸各省人命案件不止千百固縁人多亦習尚澆漓使然也康熙五十七年戊戌正月辛酉上諭大學士等曰諸臣陳奏國家之事輒用稱頌套語於朕躬並無裨益朕歴年夏月避暑九月回鑾所積四月内口外不能辦理之事日夜辦理必在歲内完結至次年開印又復速為辦理無致壅積今自五十六年四月至今所積事務應作何辦理之處諸臣當切實指陳國家事務所闗甚大豈可潦草完結若朕置事務不理諸臣又誰能擔任朕每念及中心惕然嗣後當盡刪除稱頌套語将有益於朕躬之處速為指陳使事務不致壅積可以知諸臣之實心報効而朕之病體亦得調䕶矣四月庚辰上諭大學士等曰京畿一帶歴年以來二月内或大雪大雨故麥苗滋長田禾尚可耕種今歲二三月間天時亢旱麥苗漸黄且有妨耕種朕憶國有大喪之年多遭水旱及今不可不豫為准備爾等會同九卿詹事科道詳議或政事尚有缺失宜盡心講求雨澤亦應祈禱朕躬雖尚未愈為天下憂更加兢惕爾等勿視為故事也十一月戊戌上諭大學士等曰朕從前屢諭諸臣及科道官員各省有應行奏聞事件隨聞隨即繕摺具奏非令其糾叅不過欲知之早耳朕雖聞之亦不即聲眀或未詳確亦不即治罪也即如去年河南兇犯亢珽等擾害地方妄行不法朕他有所聞即特頒諭㫖遣大臣拏獲審結今嵗聞江南地方起蛟即傳諭訊問陜西地震即差大臣散賑彼處人民咸謂皇上注念小民加意軫恤少有災異有聞即便施恩不令失所近日湖廣地方有奸宄之徒揑造妖言煽惑愚民放火劫掠曾經總督滿丕奏聞朕即諭令審結此皆因朕聞知方傳㫖遣人如無所聞何由降㫖料理耶且各省兵丁空糧甚多康熙五十二年大賞天下兵丁時曾諭散賞諸臣逐一按名散給其遣往諸臣因不認識兵丁不能清查頂冒以致所有空糧隱匿尚多不獨遠省為然即直隸近省空糧亦不勝數豢養兵丁特為備用而設平日將空乏之兵不行補足不行訓練臨時欲用縱有募補之兵累萬亦何濟乎此事朕甚慮之前歲朕聞往吕宋噶囉吧之人甚多恐其生事曾諭查眀作何設法令回内地自從議奏之後聞於來船附回者頗衆此係外洋於内地毫無闗涉而朕留心訪詢者竝無他故不過欲知地方情形人數多寡以便整理耳且各省文官私派加耗武官空糧等事朕頗得聞知則人皆知畏懼可以悛改於事大有裨益此等有闗地方事務及官員賢否諸臣何嘗不知即鄰省大吏亦未嘗不知或係師生親友或係同年或因子弟親戚在伊省居官故彼此相隱不以上聞何以防微杜漸嗣後九卿大臣科道官員凡有關地方事務及官員賢否有所聞即繕摺具奏若所聞未確不妨即以所聞未確之處一并聲眀可傳諭九卿康熙五十八年己亥四月辛亥上諭大學士九卿詹事科道等曰朕臨御以來一切機務必皆躬親從不敢稍自暇逸但少壯時精力有餘不覺其勞今氣血漸衰精神漸減辦事殊覺疲憊寫字手亦漸顫仍欲如當年事事精詳則力有不能若草率辦理此心又所未安從來書生論歴代帝王多指摘過失謂其安享富貴耽於逸樂朕披閲史書歴觀古來帝王因深知為君之難即朕六十年宵旰勤勞雖金石為質亦應消耗況氣血之身乎又如詩文一事皆出朕心裁内書房翰林輩不過令其校對謄冩耳見今在位大臣年老者大約與朕年相仿衙門辦事不過一二時辰即可歸寓安息有疾亦可告假且有託病偷安者同列與司屬豈能強之入署乎如去年考試武進士趙申喬在朕前睡去侍衞屢次喚醒朕前尚且如此在衙門辦事時可知矣今天下大小事務皆朕一身親理無可旁貸若将要務分任於人則斷不可行所以無問鉅細朕必躬自斷制早夜焦勞而心血因之日耗也但年力雖衰而志意始終如一仍未少懈自朝至於日昃坐卧起居曾無片晷餘閒勉強支持心勞力竭爾諸臣曾無一人為朕黽勉抒誠者或有不肖之徒見朕精神氣血漸不如前因以為奸亦未可定此諸臣俱應留心者也朕前冬曾有諭㫖爾諸臣未必記憶理應不時省閲今部中之事錯悮亦有如恩詔援赦刑部逐件具題殊非舊例部院衙門如此𩔖頗多朕欲不悉心詳閲得乎又如總督鄂海題請蠲免甘肅米石草束章奏甚長朕字字細覽所擬票籖錯悮朕曾刪去改批發出總之諸臣徒事虛文見朕躬煩勞不過云皇上理宜靜養似此皆如畫餅有何實濟耶又凡有論説諸臣不過敷陳頌揚套語如勵精圖治健行不息聖不自聖安愈求安之𩔖若與不讀書者言之甚覺可聽朕讀書眀理凡事皆身體力行此等粉飾浮詞六十年中盈溢於耳久已厭聞爾等務須實心任事盡去虚文於國家方有裨益也康熙六十一年壬寅十月甲寅上諭領侍衞内大臣侍衞等八旗都統前鋒統領䕶軍統領副都統叅領等大學士學士九卿詹事科道直隸巡撫守道等曰朕臨御天下六十餘載年至古稀太祖高皇帝時大臣官員幼時及見三分之一太宗文皇帝時大臣官員猶見其半世祖章皇帝時大臣官員俱曾全見眀萬厯泰昌天啓崇禎時大臣官員及舊太監亦曾有及見者朕凡事留心詢問故於前朝諸事知之甚悉御極以來嘗思事多變易皆難豫定惟寛平公正因時制宜一切未嘗豫執已見孔子云寛則得衆信則人任焉朕宵旰憂勞無刻不以民生為念凡政事利弊必推求其故近見天下錢糧各省皆有虧空陜西尤甚其所以致此者必有根源蓋自用兵以來大兵經行之處督撫及地方官惟期過伊地方便可畢事因資助馬匹盤費衣服食物甚多倉卒間無可設法勢必那用庫帑及撤兵時又給各兵丁馬匹銀兩即如自藏回來之將軍以及兵丁沿途所得反多於正項動輒萬金人但知取用而已此等銀兩出自何項竝無一人問及也官之虧空錢糧者俱已題叅離任其虧空銀兩追比不能即得新任官又不代完此項銀兩終無著落故用兵之地歴年錢糧奏銷朕悉從寛緩正為此也前蕩平三逆原任布政使徐惺所用兵餉至四十餘年尚不能清完朕念皆係軍需那用將未完銀兩俱從寛免蓋寛緩則州縣力舒上可不悮國帑下可不病民力去年陜西督撫題叅虧空各官奏請將此虧空銀兩追出以充兵餉後追比不得伊等無可奈何巡撫噶什圖密奏欲加通省火耗以完虧空此摺朕若批發便謂朕令加徵若不批發又謂此事已曾奏眀竟自私派定例私派之罪甚重火耗一項特以州縣官供應甚多故於正項之外畧加些微以助其不足原屬私事若公然如其所請聽其加添則必致與正項一例催徵將肆無忌憚矣所以將噶什圖奏摺申飭批發第陜西督撫既不能追比虧空又不敢請撥錢糧倘有𦂳要軍機焉能不致遲悮朕因交與議政大臣動戸部庫帑解送矣又如賑饑一亊自應於夏麥無収之後散賑方於百姓有益今各省每於三四月間或遇有冰雹或雨澤愆期即借此以為青黄不接具題請賑冒銷倉穀及至五六月時民間乏食而倉中已顆粒無存矣且今年陜省地震因言倉糧朽爛奏請蠲免夫地震何至糧朽此皆州縣官借端開銷耳今各省雖有虧空而陜省尤屬𦂳要特傳集爾等面諭其噶什圖所奏虧空錢糧一摺交與九卿詹事科道確議具奏大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷九
