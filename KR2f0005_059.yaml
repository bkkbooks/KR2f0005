body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷五十九柔逺人三康熙二十八年己巳正月丁亥喀爾喀土謝圖汗以不能與噶爾丹㑹盟具疏自陳上諭議政王大臣等曰朕統御天下凡窮者救之絶者繼之離散者使之完聚交惡興戎者使之和協一切生靈無不欲其咸底於安樂也土謝圖汗澤卜尊丹巴胡土克圖等背棄盟誓加兵厄魯特今為厄魯特所敗奔入我汎界請降朕念土謝圖汗向來職貢惟謹久在屬國之列是以受而納之留於邊境矜其困窮給以米粟車臣汗之子亦准其承襲但兩國相攻生民不得乂安兵戎無日休息今土謝圖汗澤卜尊丹巴胡土克圖等又難於㑹盟其以朕收養伊等中外一體不忍令人失所之徳意并將土謝圖汗等背盟興戎之故一一申明遣使齎敕宣諭噶爾丹令達賴喇嘛亦遣使於噶爾丹則案可結矣是日上賜敕諭達賴喇嘛曰朕統御寰區惟願中外息征戰之勞無敗亡之禍率土共享昇平前聞喀爾喀兩翼内自作亂兄弟人民互相吞并日後必成戰爭之禍特敕諭爾喇嘛同遣使人諭和爾喇嘛亦謂朕鑒恤衆生心如父母誠至善也遣西勒圖來朕特使台吉巴忒馬什尚書阿喇尼等與西勒圖偕往召集七旗喀爾喀㑹閲誓和意謂從此兄弟相親可永享安樂後土謝圖汗奏言聞厄魯特興兵兩路來伐是以出兵往迎朕軫念厄魯特喀爾喀兩國相攻必有一傷復遺書於爾喇嘛息其干戈仍敕諭喀爾喀土謝圖汗以為厄魯特噶爾丹職貢恭順往來有年果似此大舉諒必奏聞朕心猶未深信未必非不良之徒從中離間爾等慎毋先啟兵端務體朕不忍生民死亡之至意爾喇嘛亦遣齊緝克他賴堪布偕朕所遣阿齊圖綽爾濟學士拜里往厄魯特諭和朕與爾如此行事原不忍視喀爾喀厄魯特至於塗炭欲其相睦衆生得安之意也乃喀爾喀土謝圖汗澤卜尊丹巴胡土克圖等自取滅亡達旨興戎首先起兵殺扎薩克圖汗又殺噶爾丹之弟多爾濟扎卜噶爾丹遂起兵破喀爾喀此喀爾喀先舉召釁之過朕不以之責噶爾丹也朕之初念本欲率土之民皆獲生成原無樂他人敗亡以為己利之意今喀爾喀敗汗及濟農台吉等率其通國之人決計歸降於朕朕為天下主來歸之人不為收養其誰收養之爰納其降安插於汛界之外發粟賑濟仍存其汗濟農台吉之號嗣立其車臣汗之子為汗朕興滅繼絶之心非特於喀爾喀如是己也諸國有窮迫來歸者朕之愛養皆與之同不但朕之所行如此喀爾喀等如往歸爾喇嘛決不忍其死亡亦必如此愛養之也征戰非美事互相報復無有已時亦豈能保其常勝乎朕意欲使厄魯特喀爾喀盡釋前怨仍前協和各守地方休兵罷戰特遣使齎敕往諭噶爾丹噶爾丹向遵奉爾喇嘛道法若遣使往諭務令兩國嗣後永息兵戎則朕與爾解紛恤難之本心亦可以慰矣爾喇嘛可即遣使與朕所遣之人偕往四月甲午先是喀爾喀土謝圖汗等以米糧將盡續到二萬餘人不能贍給奏請賑濟上命領侍衛内大臣費揚古等齎銀兩茶布前往散給至是諭大學士等曰朕聞喀爾喀乏食有至餓死者深為軫念頃雖令内大臣費揚古等齎茶布銀兩採買牲畜賑其乏絶但採買尚需時日若不速發糧以拯之則死者愈多矣澤卜尊丹巴胡土克圖現有貿易駱駝百餘在張家口竝内駟厰及太僕寺駱駝共發一百將張家口倉米星速運到散給計支一兩月間費揚古等所買牲畜可繼之矣如此則喀爾喀可活也其令侍衛吳達禪侍讀學士西拉牧厰侍衛太僕寺堂官戸部賢能司官各一員前往經理八月丁丑上諭内大臣大學士等曰朕自春至今縁兹旱災無日不為軫念近出口閲視更不堪寓目當此仲秋之時即以山核桃作粥而食若時届冬春何能存活且聞諸蒙古所在亦然如此情形躬親目擊憂不能止前於邊口積糧特為衆蒙古計今蒙古牲畜目前尚可支持若不豫給米糧則牲畜羸瘦至極窮困之時雖再議給賑無論彼不能承領此間亦無術可以運致矣今擇賢能官分遣諸處察其實不能存活極困窮者一面令帶人夫車輛駱駝而來即以就近邊口所收糧食量給之則所需之糧不至萬斛而衆蒙古之感戴無窮矣九月戊戌理藩院題喀爾喀信順額爾克戴青等六台吉奏稱所屬牲畜盡斃饑荒不能度日祈賜恤養應遣官清察上曰此六台吉饑荒不速行拯救則死亡愈多著速行差官確查是日理藩院議蘇尼特滿濟思哈碩色等搶奪喀爾喀多爾濟巴爾桑之駱駝行李又喀爾喀朱布爾哈什哈等搶奪哨探人之馬匹應將為首者論絞餘各罰牲畜有差上諭大學士等曰滿濟思哈碩色朱布爾哈什哈等竝從寛免死照為從例完結至求入内地之喀爾喀等互相殺奪若不速為安插漸至流亡今宜專遣大臣收集喀爾喀散亡之衆又諭曰昔太宗文皇帝以次收定四十九旗蒙古後欲全收北邊喀爾喀未及行而太宗文皇帝賓天後蘇尼特騰機思懐恨睿王反入喀爾喀喀爾喀欲殺騰機思所尚我國公主騰機思向喀爾喀哭云我如何負太宗文皇帝仁恩殺我妻耶爾等欲殺我妻將我一并加戮如此堅執故我國公主未曾遇害今聞喀爾喀國内饑荒互相殺擄朕欲普天萬國皆得其所一體加恩喀爾喀流離至此故特遣大臣收集流亡使安插得所十二月癸亥朔上諭大學士等曰朕覽書籍邊外各處蒙古等在明代時屢侵邊境即於伊各蒙古内亦互相戰鬬不得寧謐太宗文皇帝統馭以來各䝉古皆安静矣如朕所見三十年來各蒙古俱獲安生極其恬息彼等歡欣稱道謂從未聞有如此太平令我諸蒙古安然享昇平者皆出自聖恩所賜伊桑阿等奏曰皇上視天下百姓盡如赤子故使内外之民各得其所如此康熙二十九年庚午七月甲寅上諭理藩院朕問二等侍衞吳達禪云喀爾喀土謝圖汗澤卜尊丹巴胡土克圖屬下貧不聊生者甚多可遣爾衙門司官一員至土謝圖汗處將至窮乏食者帶至張家口外相宜處同口北道動支張家口所貯之米日給飯食將食米人及所需米數奏聞十一月甲辰達賴喇嘛率西海諸台吉及噶爾丹等具疏請上尊號進貢禮物上諭議政王大臣等曰朕統御宇内冀中外人民咸無戕賊共享昇平是以前聞喀爾喀七旗兄弟不睦特遣使於達賴喇嘛欲使歸好達賴喇嘛遣噶爾旦西勒圖朕遣尚書阿喇尼前往而伊等所行不能仰體朕心及達賴喇嘛之意雖已和喀爾喀七旗而喀爾喀與厄魯特相仇之故實從此起後聞交惡興戎即遣使於達賴喇嘛達賴喇嘛遣齊緝克他賴堪布朕遣阿齊圖綽爾濟學士拜里等止彼相攻乃伊等不行宣諭止之聽其縱戰喀爾喀遂為所敗朕不忍坐視復遣使達賴喇嘛相與同定兩國之好達賴喇嘛遣濟隆胡土克圖朕遣伊拉古克三胡土克圖往説之詎意兩人見噶爾丹不行諭止與之偕行䦨入汎界搶奪人畜朕出兵問罪而兩人又不為諭止立視其戰我軍不得已而擊之致厄魯特大敗遠遁請罪朕與達賴喇嘛期於撫育衆生而使臣故違意㫖遂至於此朕心甚為隠痛有何可賀而受尊號乎其以是曉諭達賴喇嘛諸汗衆台吉來使所貢禮物其併發還康熙三十年辛未二月乙丑上賜敕諭噶爾丹曰朕為天下一統主務使四海之内人民咸獲其所以享太平雖向與本朝抗拒之國如窮迫來歸必拯而養之無不使得其所者喀爾喀向曾與本朝交戰窮而來歸朕竝不念前罪受而撫養之濟困繼絶之心不但於喀爾喀為然也諸國有窮迫來歸者朕之撫養皆與此同前已有㫖諭汝矣今聞喀爾喀逃來人等言汝厄魯特牲畜已盡無以為食極其窮困人被疾疫死亡相繼朕重念天下率土人民之命聞此困敝有不惻然軫念者乎况前已致諭於達賴喇嘛言噶爾丹如不得已而來歸朕亦撫而養之使之得所今果窮困無食不能歸故土其移近邊汛朕當厚加恩賜如決計入降益從優撫養斷不辱汝此朕俯視率土人民一體之實心勿貳勿疑汝亦曾誓不侵擾喀爾喀况我軍已在在設備矣若朕果有蹙汝困窮之事則不使䇿妄阿喇布坦使人見汝之人如此情事汝使亦皆知之自此以後汝之人無所刼奪不能歸故土衆庻益至死亡雖悔莫及汝當熟審之五月戊子上諭喀爾喀濟農諾顔台吉等曰朕承天命統御萬方惟思率土人民咸得其所中外同觀罔有殊别前爾七旗喀爾喀等本皆兄弟乃互相爭奪吞噬人民以致不睦朕曾特遣大臣往涖㑹所令爾等各相和協而土謝圖汗等自食誓言不遵約會已定之議起釁用兵致為厄魯特噶爾丹博碩克圖所敗喪其國土汗諾顔台吉等不能保聚所屬人民其人民亦不能各保妻子紛紛潰散來求歸附爾等當此困窮至極之際倘朕之衆扎薩克等各行收取爾喀爾喀早已無遺類矣朕好生之心本於天性不忍坐視爾等之滅亡給地安置復屢與牲畜糗糧以資贍養汗諾顔台吉仍留如故車臣汗仍令承襲又因爾等互相偷奪故於各處添設管轄扎薩克以便稽察且念爾等素無法紀故頒示定例令各遵行自古以來未有如朕拯救愛養如此者也朕既加愛養更欲令爾等甦息繁育用是親臨訓諭大行賞賚㑹同之時見爾等傾心感戴故將爾等與朕四十九旗一例編設其名號亦與四十九旗同以示朕一體仁愛之意土謝圖汗車臣汗名號俱著仍舊存留扎薩克圖汗無辜被殺且所屬人民離散困苦已極深為可憫著將伊親弟策旺扎卜封為和碩親王其餘各分等級授以郡王貝勒貝子公台吉之銜自今以往爾等體朕愛養之恩各守法度力行恭順如此則爾等生計漸蕃福及子孫世世被澤若違法妄行則爾等生計既壞且國法具在凡事必依所犯之法治罪特諭六月乙卯朔上諭大學士等曰喀爾喀厄魯特諭和之舉朕令達賴喇嘛行之今喀爾喀已安插得所應遣使齎敕於達賴喇嘛著丹巴色爾濟往諭之敕曰朕統御寰區以仁育為本撫養是先雖末陲異域之民有困窮而歸命者必受而養之使得其所爾喇嘛奉行佛法廣度衆生而救苦難其心亦猶是也前以七旗喀爾喀兄弟内相侵奪外與厄魯特交兵朕與爾喇嘛諭令罷兵歸好後噶爾丹又追侵土謝圖汗澤卜尊丹巴胡土克圖殺奪喀爾喀之人朕遣伊拉古克三胡土克圖爾喇嘛遣濟隆胡土克圖往諭噶爾丹爾使人不能仰副朕與爾之心噶爾丹稱兵大舉殺掠喀爾喀深入我邊汎之地朕稍發兵以問其故反與我兵拒戰至於大敗乘夜逺遁此彼來犯順非朕往伐之也彼所行違朕與爾好生善念自求窮困而已喀爾喀土謝圖汗車臣汗諸濟農諾顔台吉決志内附於本年四月躬親大閲喀爾喀之汗濟農諾顔台吉等既執臣禮跪而稽顙諄請與四十九旗同列朕設大宴厚賜之照四十九旗編為旗分給地安插土謝圖汗自以妄舉興戎陳情請罪朕發衆喀爾喀議之皆言加彼之罪則與我衆無光是以宥免其罪仍留士謝圖汗車臣汗之號又念扎薩克圖汗被殺寃痛屬下裔民散亡可矜授其親弟䇿旺扎卜為和碩親王其餘各分等級授以郡王貝勒貝子公台吉之銜明其法度昭其典章矣爾喇嘛普濟生靈向以喀爾喀國破為憂今已安措得所遣諭爾喇嘛知之爾喇嘛聞之必大喜也其左翼之喀爾喀無復可議至右翼扎薩克圖汗屬下人等被擄散亡有在爾喇嘛所者亦有在他處者爾喇嘛普濟生靈必能查明發歸原土也今厄魯特人等屢有歸降聞噶爾丹窮困已極無食而饑於此可見噶爾丹之獲罪於天矣未必不往歸爾喇嘛若果往歸作何措置惟爾喇嘛裁之噶爾丹遁去之時曽立誓而去倘違誓而稍犯我喀爾喀降人朕必發大兵分路前進務期𠞰滅之其時地方遙逺不及遣人齎敕於爾喇嘛亦未可定是以豫遣教習唐古特文喇嘛丹巴色爾濟諭爾知之七月甲午理藩院以喀爾喀既照四十九旗編為旗分其遣使請安進貢及來朝等事亦應照四十九旗例上曰喀爾喀初來歸順新經安插其俟三年後行之九月丁卯上以達賴喇嘛向來恭順噶爾丹事必其使臣及屬下人通同䝉蔽非達賴喇嘛意因賜敕諭之敕曰朕統御宇内以愛育黎庶為本務使萬邦共相安樂前聞喀爾喀厄魯特交惡相攻屢遣使於爾喇嘛以和兩國爾喇嘛從來奉命不違敬慎而行亦屢遣喇嘛説和奉差喇嘛諸人若能仰體朕與爾好生之意盡心行事則喀爾喀厄魯特和好早息戰爭矣但爾近侍與濟隆胡土克圖等皆有私意不體朕與爾之心濟隆胡土克圖身在噶爾丹營中竝不説和噶爾丹借追喀爾喀為名闌入邊汛刼掠烏朱穆秦又不勸阻且噶爾丹與我軍交戰濟隆張蓋於山頂觀之而報爾以為竭力説和聽從立誓濟隆之去朕面諭以告爾喇嘛之言亦不行傳諭以前項事情揆之未必由濟隆一人之意亦爾近侍之人通同貪利而欺蔽汝徇庇噶爾丹之所致也爾豈有如是之心乎朕灼見於爾喇嘛無涉是以朕不責汝朕與爾之心向來合一故將若輩行事違朕與爾之心遣敕諭爾知之至噶爾丹乞兵於達賴台吉而不許駐防四川打箭爐之兵盡撤已具悉所奏矣康熙三十一年壬申三月壬申理藩院題喀爾喀部落多羅郡王固魯西希旗分無牲畜之人請以米糧給之上曰貧窮䝉古給與米糧特為施恩贍養聞奉差放米官員往往誘買轉賣惟思利已不論蒙古之果能度日與否而稱為窮困者甚多嗣後朕若察出其實必將該管堂官一併置之重典十一月丙午朔上諭大學士等曰聞外藩蒙古有極貧困不能為生者宜作何撫養爾等㑹同領侍衛内大臣議政大臣䝉古大臣都統等酌議以聞康熙三十二年癸酉九月辛亥兵部議覆廣東廣西總督石琳奏稱風飄日本國船隻至陽江縣地方計十二人請發回伊國應如所請上曰外國之人船隻被風飄至廣東情殊可憫著該督撫量給衣食護送浙省令其歸國康熙三十三年甲戌四月辛卯理藩院員外郎二郎保奏報厄魯特台吉巴拜與其兄子齊克宗來歸上曰巴拜等習居邊外若來内地居住難以為生著理藩院遣官送至喀喇沁令扎什王撫養之康熙三十四年乙亥二月乙卯上賜敕諭噶爾丹曰去歲諭爾敕内諸凡開示甚晰朕俯念中外咸在懷抱爾厄魯特與喀爾喀仇殺相尋日無寧息心實傷之且思爾等皆職貢之國朕一槩秉公舉無偏庇後喀爾喀窮迫來歸朕乃收撫以全其生命此亦朕矜恤羣生之至意也爾噶爾丹不遵朕言亦自失其生理而已於我四十九旗蒙古何敗壞之有今爾縱戕害使臣馬迪之人不正法請罪巧飾誑奏是爾違朕之㫖迷惑回子之教壞宗喀巴與達賴喇嘛之法明甚朕是以遣回爾使不令進邊嗣後若仍怙非不悛蔑視前諭爾永勿上疏遣使貿易特諭康熙三十五年丙子二月己亥厄魯特䇿妄阿喇布坦遣使囊素等請安進貢又奏噶爾丹姦惡乞遣還回子歸已上賜以敕書曰朕為萬國元后惟以率土乂安咸享樂利為心其能體朕覆載之懐敬慎自持者朕必愛惜教育之其或不循分誼包藏禍心悖安和之理者朕必懲創匡正之此朕統御寰區為人君之大道也今爾策妄阿喇布坦遣使請安貢獻方物又以噶爾丹姦詐屢肆侵陵與爾有不共戴天之讐披瀝情實齎奏入告誠心求恤朕為一統萬邦之主有不眷爾誠心效順之人乎查爾所奏回子之事今噶爾丹處雖無回子前來貿易此後或來朕必交該部查明如爾所請發往爾尚永懷敬慎朕將洊加恩賜焉前噶爾丹猖獗横行䦨入烏闌布通之時朕遣偏師大敗之欲即窮追殲滅其衆而噶爾丹乃長跪於達賴喇嘛所遺威靈佛前設誓曰自後不敢復侵中華皇帝之喀爾喀與衆人民載書加印始免其誅滅而縱之朕殊不喜征誅今噶爾丹悖棄誓言戕我賚爾之使刼喀爾喀之人阻止班禪胡土克圖之來今又至巴顔烏䦨動搖我人民内懷詭詐欲行禍亂其跡顯然朕不得不加創艾是以發三路大軍誅討其罪罪在噶爾丹他無與也但三路大軍竝集聲靈赫濯恐邊外人民不無震怖爾其遍諭屬衆以至吐魯番諸處各令照常安居勿致驚潰六月癸丑達賴喇嘛使人戈尼爾羅卜藏帕克巴格隆等遵㫖自西寧至京上命領侍衛内大臣索額圖大學士伊桑阿𫝊諭曰噶爾丹敗於烏闌布通遁走之時首頂威靈佛像設誓云不但聖上屬下人民即喀爾喀降人以外再不敢復犯矣去年又背誓至克魯倫地方殘害喀爾喀掠我降人納木扎爾陀音於是朕親統大軍往討噶爾丹懼而奔遁適遇我防禦之兵誅殺過當噶爾丹率數人逃竄餘者盡降厄魯特遂滅厄魯特降人告曰達賴喇嘛久已脱緇矣天下蒙古皆遵奉達賴喇嘛如達賴喇嘛身故理宜報聞諸護法主以班禪主喇嘛之教繼宗喀巴之道法乃匿達賴喇嘛之喪指達賴喇嘛之名唆誘噶爾丹朕屢遣使問之第巴偽稱達賴喇嘛居髙樓之上不令與使臣相見第巴原係達賴喇嘛下管事人朕優擢之封為土伯特國王乃陽奉宗喀巴之道法隂與噶爾丹朋比欺陵達賴喇嘛班禪而壞宗喀巴之法前遣濟隆胡土克圖至噶爾丹所為噶爾丹誦經選擇戰日朕為衆生往召班禪阻而不遣朕無責達賴喇嘛達賴汗青海諸台吉之意朕今遣使於達賴喇嘛果達賴喇嘛尚在則面見朕使臣曉諭噶爾丹遵朕㫖行朕凡事俱畧無介意若仍誑我使人不令相見斷不輕止至噶爾丹之誓濟隆胡土克圖等現在其地問之豈有謬乎今將遣使往彼其來人或欲全歸或欲數人先歸可詢明隨其意遣之大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷五十九
