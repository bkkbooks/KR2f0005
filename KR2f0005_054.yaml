body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷五十四弭盜康熙四年乙巳七月庚子上諭兵部近來地方失事盜賊遁逸不能即獲皆各地方防汛官兵不急追捕之故如地方一有盜警防汛官兵即將盜賊去向接續速報於彼處防汛官兵隨即𠞰捕盜賊安能逃遁以後凡有盜賊事情地方官兵一面速行追捕一面馳報於盜賊所到地方官兵該地方官兵亦即一面追捕一面接續前報務窮追盜賊蹤迹期於必獲如已經報知所到地方官兵因非其汛地不行追捕或稽誤不行交付接續前報或失事地方官員遲延及隱匿不報俱應分别處分作何定例爾部嚴議具奏康熙八年己酉八月乙丑上諭兵部刑部京師重地理宜肅清近聞竊盜詐奪甚多此皆步軍及五城司坊官并巡捕營官兵稽察不嚴巡緝不力或番役等與盜交通受賄容縱以致姦惡之徒肆行無忌殊違法紀嗣後所司文武官嚴加巡察督率番役兵丁力行緝捕務期姦宄斂迹良民無擾如仍前弊所司各官概治以重罪罔宥康熙十年辛亥十二月壬午上諭兵部督捕衙門直𨽻重地理宜肅清邇來盜賊繁多大為民害地方官怠玩不能力行禁戢以致劫掠時聞盜賊捕獲者少良民株連甚多皆因防汛官員止於降罰帶罪緝拏至有失事最多不能盡職者仍令留任愈至貽悮地方今盜賊應作何禁戢嚴拏及以盜案降罰幾次者作何處分爾部再行定議具奏至京城內外盜賊棍徒肆行無忌作何責成官役嚴行緝拏亦著一併議奏康熙二十年辛酉六月癸未直𨽻巡撫于成龍題直𨽻地方旗民雜處失事甚多道廳正印等官為盜案干連沉滯深為可憫祈寬限緝獲上曰朕親巡畿輔自山海關以西永平以東一面傍海一面臨邉盜賊無地潛藏故剽劫猶少至玉田豐潤遵化薊州霸州保定諸處居民稠密盜賊所以繁也今處分之例太嚴恐官民俱纍著九卿詳議以聞康熙二十一年壬戍九月戊辰上諭刑部朕閲三法司會奏人命事件盜案甚多按律凡強盜情實即行梟示其情罪固為可惡較之反叛重案猶屬稍輕向來反叛牽連之人尚有擬死罪而不行梟示者此等關係人命大辟朕每欲得良策澄清本源使逺近清平永行遵守近見光棍事案較前差少惟強盜一事常厪朕懷未能即得良法夫人非至窮迫孰肯甘為盜賊每見盜案有獲贓甚少牽連多人此類若不置之重典則匪人不知畏懼無以警戒將來若概置重典朕心又復惻然此皆未得澄清本源之道故耳今如何使盜賊屏息良善獲安爾等會同三法司詳議以聞十月丁丑上諭大學士等曰盜案人命攸關與其誅於既為盜之後不若弭於未為盜之先朕見每嵗盜案處決甚多究其劫奪之物甚微豈盡甘於為盜亦或飢寒所迫而然朕心深為憫惻思立良法以弭盜源故與爾等商之至於情實罪當本無可寬然朕欲於伊等應死之中求可生之路故又令諸臣詳議耳康熙二十三年甲子十二月癸卯上諭都察院滿漢堂官五城御史曰京畿重地理宜肅清近聞盜竊公行居民不得安靜且盜賊各有窩主馬匹器械晝則藏匿其家夜則出而為盜大約多在墳圈荒僻之處為其窟穴即如向所拏獲開人窑誘賣人口者必有藏匿處所盜無窩主何以能行其令五城嚴緝務在必獲正法則盜源自絶矣康熙二十六年丁卯十一月丙子朔上諭都統紀爾他布御史巴什錫米圖郎中邁圖員外郎沙拜曰喜峯口冷口外盜賊藏匿山谷恃強霸占人之妻女劫掠財物莊頭居民受其擾害爾等將喜峯口冷口滿洲緑旗官兵酌量帶往搜緝康熙二十八年己巳六月甲申湖廣道監察御史李時謙條奏弭盜事宜上諭大學士等曰李時謙以盜案令文官舉報而緝拏責之武官則盜賊可弭朕就根本處言之若果家給人足孰肯為盜然亦托之空言則易行之實事則難朕自聽政以來早夜孜孜惟以吏治民生為務凡事之可行與否俱加詳審文官管民凡巡察鄉村嚴緝姦宄是其專責今若置之不論獨責之武官則州縣兵少不但不足以緝盜即使業已緝獲文官審訊時又謂其誣良為盜此豈可行者耶朕即欲降旨申飭恐言官畏懼不言此事令該部如常議覆康熙三十年辛未二月丁巳朔上諭大學士等曰京師為輦轂重地人民商賈四方輻輳京城內外統轄必有專責俾稽察姦宄消弭盜賊然後商民得以安堵今城內地方既屬步軍統領管理城外巡捕三營又屬兵部督捕衙門管轄內外責任各殊不相統攝遇有盜案反難查緝嗣後巡捕三營亦令步軍統領管理京城內外一體巡察責任既專則於芟除盜賊安輯商民庶有禆益其三營事務著確議歸併管理康熙三十六年丁丑十一月丙午上諭刑部每見廣東省所題盜案糾集夥黨多至數十人或恣行焚劫或勒贖子女種種不法皆由文武各官不能化導百姓禁戢姦頑所致嗣後該督撫提鎮及各有司務實心教養綏靖地方以副朕息盜安民至意該部即行嚴飭康熙三十七年戊寅八月戊辰上巡幸塞外駐蹕巴倫席喇鄂纍地方諭阿祿科爾沁多羅郡王等曰朕數出征伐躬臨朔漠觀蒙古生計惟水草是賴今見沿途水草極佳但因盜賊時有恐牲畜被盜圈地拘守不使就牧水草以致瘠斃是以生業未遂不惟屬下貧不聊生即王貝勒台吉等亦俱衣食維艱朕君臨萬國目擊其狀豈不為之撫育乎爾等勿謂主上諭旨撫育必行賞賜我等設使朕今日賜之爾等即於明日盡之無益也朕必曲加措置務使爾等得遂生業耳爾等若念撫育之恩仰體朕意嚴緝匪類消弭盜賊以安良善則已如仍怠惰不加嚴飭屬下之人為盜不悛必加誅戮斷不寬宥朕既能撫育豈不能禁止盜賊乎逆賊噶爾丹朕三行征討親𠞰滅之俘其妻子降其臣屬噶爾丹雖死即朽骨朕亦不寬貸務必致之爾等當已聞之矣宜速行緝弭盜賊以副朕意康熙三十八年己卯九月甲寅上諭理藩院侍郎滿丕曰欲復蒙古生業必嚴盜禁不嚴則不能弭盜朕頃巡省歸化城曾問副都統阿迪據云歸化城地方賊盜比前甚少朕曾諭爾務嚴盜禁嗣後倘有盜案必將爾等一併議處斷不姑貸十一月戊午理藩院奏稱阿霸垓多羅郡王烏爾占噶喇布報伊屬下人等牛隻被劫臣等與刑部各差司官一員帶領古北口喜峯口官兵查拏上諭曰蒙古生養之計惟馬匹牛羊是賴今盜賊行劫則蒙古生計必致困乏著侍讀學士拉西將古北口喜峯口官兵酌量帶往緝拏康熙四十二年癸未九月戊午上諭大學士等曰山東地方稱有海賊坐鳥船二隻行劫朕思山東不能造鳥船必往福建浙江江南造成而來歷年福建商船於六月內到天津候十月北風始回朕因欲明晰海道令人坐商船前往將地方所經之路繪圖以進知之甚悉今欲知海賊之源但令往福建浙江及江南崇明等處察訪即得之若在山東察訪必不能得目下冬令將屆正值北風海賊不能久留於直𨽻山東必已向浙閩路去俟明嵗船隻可行時令有水師海船之省入各海島搜𠞰十月甲戍上諭大學士等曰江南督撫提督著公同造洋船二十隻俟來年春令山東水師營官兵前往江南取至山東候用目前山東海盜非確係積賊皆貿易之人資本虧折因肆行搶奪可命學士常夀前往招撫康熙四十三年甲申正月辛酉福建浙江總督金世榮疏報擒獲海寇徐榮等供出夥衆屯扎情形上諭大學士等曰見差內閣學士常夀前往招撫海寇此事交與常夀帶去即將所獲人內量遣往招之此輩原係竊盜衆亦無幾冬春嘯聚海島夏秋揚帆出掠今往撫之彼必歸誠解散但日後難保其必不嘯聚若撫之不來當即興師殄滅如湖廣紅苖從前邉民無不被害土司及地方文武官隱匿不報昨嵗致討彼奔逃無路殱厥渠魁宥其脅從軍威震懾土司猓猓等無不股栗翕然奉法朕初以海寇故欲嚴洋禁後思若輩遊魂何難掃滌禁洋反張其聲勢是以中止然未雨綢繆何可忽耶三月辛酉上諭內閣學士常夀曰沿海諸省雖稍有海賊聞俱嘯聚於廣東新會縣地方若不掃靖此處不能奏績爾可先至福建將已獲賊中有緊要之人不必帶去其餘量帶一二人前往廣東至新會縣時先遣一人偕彼同往招撫遣去之時爾可令彼曉賊云爾等情事皇上皆已洞悉爾等歸順則已否則必加大兵盡行掃滅如此曉諭則新會賊寇盡可招撫招撫之後爾可自廣東而福建而浙江而山東沿海招撫而來自可奏績十一月癸丑上命刑部右侍郎常綬內閣學士拉都渾往阿祿科爾沁察審盜案諭之曰爾等到彼會同扎薩克等查審盜賊如台吉等官員內有為盜者爾等可請旨其餘照例將為首者正法為從者俱解京不可留於其地至喇嘛為盜者亦正法爾等往宣朕旨緝盜大為緊要今各旗俱無盜賊止一旗有盜以致衆蒙古之馬畜俱不得牧放爾等若不查出懲治則衆人皆不得安居矣康熙四十七年戊子二月丁酉上命户部侍郎穆旦往浙江察審大嵐山賊一案諭之曰此賊結隊橫行已二三年不比尋常小盜情罪可惡爾速往會同將軍督撫嚴審若與江南干涉便同江南督撫會審務須決斷毋得柔弱一到即將賊首所供朱三等作速追拏并將見獲賊犯速行審結若俟衆犯全獲則曠日遲久矣閏三月己亥上諭大學士等曰直𨽻各省人命盜案今已漸少惟盛京尚多皆因罪犯發遣多在盛京左側僅有一府尹衙門衙役人少雖有駐守滿兵不行嚴拏盛京乃本朝龍興之地當興行教化著諭兵刑二部檄盛京將軍及副都統嚴加稽察禁止爭鬬消弭盜賊康熙四十九年庚寅九月辛亥上諭大學士等曰奉天將軍嵩祝奏報錦州邉海之處有洋賊二百餘人上岸搶劫經防禦官兵擒斬三十餘人見今冬季正遇北風餘賊敗遁者必乘風自東南方去一至山東江南又必行劫恐山東江南官兵不能追殺若舟師出大洋中不遇南風即難回汛略有疏虞關係非小此番之賊原欲劫糧因巡哨兵辨奮力殺之故皆敗走總之洋賊惟仗行劫若兵辨實心防禦使洋賊不得行劫則船中無糧必自飢餓而死矣康熙五十年辛卯正月乙卯上諭吏部兵科給事中王懿奏請禁止海洋商賈不知海洋盜劫與內地江湖盜案無異該管地方文武官能加意稽察盡力搜緝匪類自無所容豈可因海洋偶有失事遂禁絶商賈貿易耶五月己酉上諭大學士等曰聞福建百姓聚集數千在泉州所屬地方搶奪食物奔入山中提督藍理三路率兵進𠞰一路兵稍為折挫如果有所獲藍理必早已題報矣此事督撫提督等俱未奏聞據大學士李光地奏稱有盜賊之處與臣居甚近彼處民皆堅守各人城堡等語去年朕一聞福建飢荒即命截漕三十萬石賑濟差去大臣及地方官以三十萬石太多十五萬石即足因止存留十五萬石想此米俱散給兵丁未必散給百姓所以無甚裨益若果截留三十萬石米運去民食充足於地方必大有裨益也伊等原非賊盜因年嵗歉收乏食不得已行之耳若即出官兵征𠞰未免又生一事朕意遣部院大臣侍衛往行招安即可平復如此則人民不傷亦不致有害地方著問九卿詹事科道具奏六月己未朔上命戶部侍郎張世爵等往福建招安泉州山寇諭之曰此輩山寇原係農民今一旦為寇田畝無人耕種必至荒蕪如此則米價益貴無有生路矣彼若來降仍可耕田度日將伊等不行治罪之處使之通曉為首一二人須加懲治爾等到地方可將朕諭旨盡行書出大張告示明白曉諭十月辛未上諭大學士等曰竊盜強盜皆係不良之徒不可姑息乃地方官不肯緝拏督撫提鎮文移往來不過沿襲故套州縣有司概行不究更有鄉紳大户始而畏賊相為容隱久之便作窩家盜賊橫行皆由於此直𨽻山東向年盜案甚多近日地方官協力屣緝漸漸稀少北方盜賊流往南方因而江南浙江湖廣江西所在多有若地方官實心辦事何難消弭即如往年朱三一案初不過一二人州縣不能緝獲致成大盜今年福建山寇至於拒傷官兵此皆地方官畏葸之故須嚴行申飭康熙五十二年癸巳三月己卯兵部議覆戶部尚書張鵬翮疏言閩省沿海地方請將深知水性謀勇兼全之人委用凡各緊要之處添設兵丁營船及船中所用器械火藥預備訓練又春秋二季令該總兵官親身巡查有賊船逃匿者即行文廣東江南浙江等處協力擒𠞰應如所請上諭大學士等曰張鵬翮所奏海上事宜率皆空言無補不可施行賊船停泊必依據海島有淡水之處每日在山頂瞭望見官兵船來即遁去外洋官兵退後乃復却回有謂商船宜改為平底只用一桅者不知商船重載入水數尺方能壓浪每造一船費至一二千金若勒令改造則不肖官員因此擾害商人將何以堪商船雖帶軍器火藥一遇賊船商人並不敢與敵船中所有隨其所取盛京泛海兩三日即可抵盡山花鳥利之所在人所必趨泛海往來既速又省路費商船豈有不往之理朕昨問投誠海賊陳尚義康熙三十八年間伊等海賊尚多因與廣東提標官兵拒敵大敗而遁止存船四隻此後從未登岸沿海官兵防守甚嚴即海外諸小國亦不許伊等停泊賊船缺少火藥無處購買俱托漁船往盛京旅順等處代買朕昨閲地圖山東水師住處未為扼要然設立已久不便議裁宜於盛京上遊要地添設營船十二隻此駐防之船即將各省水師營船及駕船水手酌量調取出洋巡哨并帶陳尚義等前往海中盜賊伊悉知之自然漸次擒獲矣張鵬翮並未熟悉情形其所條奏即令伊身任其事亦未有裨益也康熙五十六年丁酉九月癸酉上諭大學士等曰旅順口脫逃陳君元等賊黨不過八人昨廣東巡撫法海奏稱此夥已獲七人只有一名未獲朕前以海中各島皆可為賊藪及詢投誠海賊云島內樹木不生地皆礫石不可耕種亦無好水故難棲止即如澳門地方所居不過萬人因無田可耕米無所出俱自廣東運米而食今海中藏賊之故皆沿海所居姦民春時覓小船捕魚遇商船即行劫奪商船既得便拒敵官兵至嚴冬時水米既無伊等焚船上岸藏匿大勢不過如此斷不能於海島棲止也明代金門厦門海壇澳門普陀巖崇明盡山花鳥等處俱有海賊從前海賊鄭芝龍投順本朝用為內大臣令伊作字招降伊子鄭成功伊子不從順治十六年領海賊三十萬侵犯江南攻鎮江城宜思恭之父宜永貴時為巡撫坐鎮瓜洲因未從賊城得不陷及賊進圍江寧時滿兵甚少值貴州回軍之副都統噶褚哈等至同江寧將軍喀喀穆合軍出東門於明太祖陵南誘賊進三十里大敗之殱其衆朕幸江南曾親閲戰地我朝所殱敵衆松山杏山敗洪承疇兵十三萬山海關敗敵兵二十萬安親王於永興地方敗吳三桂兵并此番所敗海賊共計四處江南地方所殱海賊若此福建地方施琅等又攻取金門厦門賊無棲止之處始取臺灣為巢今臺灣一帶皆入版圖矣康熙六十年辛丑十二月丙寅上諭大學士等曰聞江浙私鹽盛行盡流為盜賊地方官員明知並不查拏應令江寧杭州京口將軍等派出官兵嚴行查拏著九卿詹事科道會議具奏大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷五十四
