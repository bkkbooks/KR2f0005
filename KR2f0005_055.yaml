body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷五十五牧政康熙九年庚戌三月辛未上諭兵部設立驛傳原為往來差遣緊要事速於接應近聞州縣各驛馬匹缺少應付遲悞驛遞原有額設錢糧以資芻牧驛傳道專司其事乃不殫心嚴察以致侵減公帑缺少驛騎宜作何詳核嚴其禁令爾部定議以聞康熙二十年辛酉九月辛未上諭大學士等曰烏朱穆秦等各旗䝉古往牧於喀爾喀巴爾虎之間先竊彼兩地馬畜以致喀爾喀巴爾虎等亦竊其馬畜以報之曩無盜賊時驅馬北至涼地牧養肥壯收回儘可度冬自盜賊繁興夜間不敢放馬拘於欄柵中牢籠防䕶馬不得肥以致不能度冬斃者甚多且喀爾喀巴爾虎等結黨行竊夜襲邊汛我汛地之人畏懼四五汛併居一處兩汛之間或去一日二日之程其間盜賊公行出入此汛雖覺不能即逹知彼汛且窮䝉古馬畜被竊急報該王貝勒及總統扎薩克等閒有不肖者或貪飲沈醉不即遣人緝拏詳細察究縱有首告置若罔聞躭延時日有報一馬被竊者守候食費竟至數馬今有馬被竊不敢舉首多行隠匿誠以此也朕聞之深為惻然軫念作何籌畫得以屏息盜賊貧窮者各遂其生其令議政王大臣及來朝貢之外藩䝉古王台吉等公同詳議具奏康熙二十一年壬戌十二月甲申户部會同内務府上駟院議山海關外大凌河地方展拓牧場事宜上曰此内民居村落歴年已久定有邱墓今若圈為牧場遽令遷移必致失所朕心不忍應將民地盡行開除康熙二十七年戊辰三月戊子上諭大學士等曰盛京寧古塔沿途驛站往來官員多索車馬鞭撻驛站人役所在多有嗣後如此苦累驛站者管理驛站官即行報部如狥情不報事發并驛站官治罪其下兵部定例具奏康熙三十一年壬申三月丙辰上命内大臣阿爾第理藩院尚書班第等往邊外䝉古地方五路設立驛站諭之曰凡遇邊外事務皆用䝉古馬匹不但甚累䝉古且恐事亦有悞今設立驛站雖費國帑日後於䝉古裨益良多亦不致遲延貽悞此事最為緊要特遣爾等料理務加詳慎必将確然不易可垂永久之策籌畫而行康熙三十四年乙亥七月乙酉上諭大學士等曰馬之所係甚重宜於四十九旗諸地購買歸化城二千匹科爾沁二千匹其餘諸旗定額購買爾等定議以聞此買馬事遣部院中曾出關差者副以八旗䝉古䕶軍叅領侍衞各一人會同該王台吉等遵諭以行十月甲午上諭議政王大臣及八旗都統等曰朕觀京城八旗兵卒俱已熟練器械亦俱整齊倘有舉動惟馬匹缺少前命滿洲䝉古漢軍各佐領下拴馬一半給草豆錢糧喂養但軍行以馬為重今可令衆兵一概置馬一匹春冬全給草豆錢糧自四月起發一半放青留一半拴喂至九月驅回照常拴喂此所置馬匹令兵丁各自小心飼養各交與該管官嚴行稽察設有怠玩從事以致馬匹羸瘦遲悞公用者将該管大臣從重治罪其叅領以下撥什庫以上以及拴馬之人俱照軍法治罪俟噶爾丹事畢之後仍照常養馬一半康熙三十五年丙子二月壬辰理藩院奏烏朱穆秦等旗扎薩克王貝勒貝子公台吉等官兵應𣲖在何路上曰目今䝉古兵衆正當馬匹羸瘦之時可止其來會大軍著都統杜思噶爾理藩院章京達賴馳驛前往令䝉古王等將所屬兵丁内情願効力馬匹足供驅策者儘數派出駐烏爾揮河地方預偹乗青草牧肥馬匹以待遣用杜思噶爾等宣諭畢可於汛界内來赴軍前三月乙丑上諭議政大臣等曰内廐馬撥一千匹兵部馬撥五百匹八旗佐領所養馬内擇其肥者撥一千五百匹共三千騎於毎佐領所留䕶軍一名内酌量𣲖出令同内廐人將此馬趕䕶於三月二十日啓行出張家口約行二十餘日可到此馬到時如正當對敵之際則給兵騎用甚有裨益即旋師時令兵丁騎用亦大有濟其趕䕶馬匹之䕶軍與内廐人亦應照出征人例給馬四匹戊寅上諭議政大臣等曰兵丁疲乏馬匹應交與驛站牧養部給四匹馬内若有疲乏二三匹者察明即并本人留於驛站令於有青草處牧放肥壯等候旋師其察核沿途驛站馬匹并存留牲口米糧等物俱係緊要著在京吏部尚書庫勒納前來自存留米糧馬匹之驛站以至汛界令其往來稽查四月乙未議政大臣等奏京城送來馬三千匹應作何給發兵丁上曰自京城每佐領下出兵七名每人給馬四匹四人共騾一頭今每旗留八十名則八旗共留六百四十名矣合綠旗兵察哈爾兵自京城趕馬䕶軍二百名通共計算比原數仍多計每旗所留八十名兵丁之馬騾共三百四十有餘於此馬匹内揀臕壯者可得馬一百五十匹再添自京城帶來馬一百五十匹則每旗三百匹矣若給火器營兵每旗一百匹二總兵官下綠旗兵各五十匹馬自有餘所留兵八十名著留十五日口糧其餘米糧給與前去兵丁其補還此項米糧俟于成龍運米到時照數補給此馬三千匹内撥給兵丁所剩著交與上駟院其趕馬䕶軍二百名令歸各旗營内行走又諭曰在前之兵若將趕來馬匹復趕送前去則馬匹勞苦内御馬羣有馬八百匹在前將此馬内給前鋒兵一百匹給兩黄旗三百匹其在前行走之綠旗兵著馬思喀逹禮善安布祿給兵部馬五十匹其在後六旗兵漢軍火器營兵綠旗兵馬匹著索額圖將兵部趕來馬匹取其臕壯者五百匹并自京城趕來旗下馬匹照數給與内御馬羣馬一千匹不用給與其所留之兵著左都御史傅臘塔副都統海蘭在此駐扎總管兵馬遣人察看哨口偵探信息六月乙未上諭大學士等曰軍士所乗出征馬匹到時監收仍給錢糧照常飼養缺者毋令按補每佐領駱駝二隻馬或二十匹或三十匹定數飼養凡有軍事可供需用為益良多至内廐發與騎乗之馬到時亦俱交送内廐隠匿不交者亦或有之著各都統嚴察令其儘數送入康熙三十六年丁丑三月戊辰上駐蹕安邊城東寧夏總兵官王化行奏請行圍花馬池以觀軍容上諭曰朕行軍二次深悉軍情今噶爾丹未滅馬匹關係緊要寧夏兵來花馬池往來須七八日馬必疲乏夫獵細事耳以擒獲噶爾丹為急今罷獵而休養馬匹以獵噶爾丹何如爾速遣人傳諭所屬官兵勿來花馬池俟朕至寧夏閒暇之日閲爾軍容閏三月癸未上諭領侍衞内大臣公福善索額圖馬思喀大學士伊桑阿等曰黑龍江之兵効力心切故薩布素自稱馬壯朕今日巡視見黑龍江軍中馬匹羸瘦若將此馬乗用恐歸時必至疲斃伊等若有行走之事朕當另給馬匹將伊等之馬於察罕托海地方牧放遣人送往歸化城俟軍事畢各乗己馬歸本處則易到也康熙三十七年戊寅正月辛丑上諭大學士等曰青海厄魯特親王扎什巴圖爾等遣還時此處給與馬駝遣司官送往總督吳赫速赴寧夏俟伊等至寧夏時即應付馬駝而遣之其自京師乗往寧夏之馬駝交與送往之官於草生時在察罕托海地方牧養數日從塞外遊牧而來若草未生則暫於彼處飼之俟草生加意牧養帶回三月庚子上諭大學士等曰今承平無事八旗佐領所飼馬匹毎佐領或留六騎或留七騎其餘以四月發往牧地於九月初旬仍復來京毎歲如此則錢糧不致虛耗而羸馬亦得以蘇息矣其更代監視每旗副都統一員叅領二員量領官員兵丁於水草佳處遊牧十一月丁酉上諭大學士等曰前諭西寧茶馬五千匹自邊外驅送三千至京此地需馬不甚緊要送二千足矣聞得南省駐防軍士馬匹甚艱其餘三千送至荆州江寧杭州三處各一千給散軍士此馬由内地而行正值稼穡時必踐踏民田著及時遣部院賢能官員赴彼領取起行沿途牧養盡心䕶送各至所派之處交與該將軍康熙三十九年庚辰八月丁夘上諭太僕寺卿喇錫等曰八旗察哈爾所交爾衙門牧場之馬撥八百匹給賜翁牛特多羅杜楞郡王班第旗分伊等馬匹短少分給牧場令其生息此馬即著喇錫前往分給康熙四十年辛巳四月辛酉上諭大學士等曰朕前命右衞西安兵丁撥往寧夏蘭州二處豫備今右衞將軍費揚固疏言領兵至鄂爾多斯馬匹羸瘦請照向年例給一月草料向者朕率師至寜夏時值二月隨行侍衞執事人等及軍卒馬匹竝未支給草料惟牧放往還而馬匹仍然肥壯今正值草青茂盛之時將軍費揚固請給喂馬草料殊属不合今西陲絶無邉警應將撥往寧夏之右衞兵丁撤回其往蘭州之西安兵丁令於蘭州所属有糧及青草茂盛處牧馬六月己未上諭大學士等曰驛遞馬匹甚覺勞瘦可諭坐臺筆帖式凡御遣奉差人員及京都差送物件人員往來俱書姓名并記隨從騎䭾之數造冊存查倘有冒乗驛馬者指名題叅甲子上諭領侍衞内大臣等曰牧場之馬著大臣督理其侍衞人等自京師乗來之馬有疲瘦者令將牧場中肥馬換給之太僕寺驅來牝馬駑馬亦可給散䕶軍執事人等䭾載至烏蘭布通仍繳太僕寺聞乗官馬者有私將良馬留存以駑瘦之馬換繳嗣後凡給官馬將旗分姓名并馬毛色牝牡注檔存冊倘有倒斃者於馬首用印令其呈明倒斃之由記數回京送部查對是日上諭喀爾喀台吉等曰近數年來興安境内爾等數旗窮困已極朕皆一體豢養爾台吉内尚有無馬徒歩者身係台吉何至如此爾䝉古等度日甚無成算今將台吉内有馬一騎者給牝馬九有二騎者給牝馬八有三騎者給牝馬七有四騎者給牝馬六有五騎者給牝馬五無馬貧窮台吉皆給牝馬十其乳既可取食所生馬駒又可各立生業八年後將所給原數仍交牧場其所生之馬爾等當善為畜養令其蕃息甚為有益朕令爾等立業如此倘仍難度日雖彼蒼亦不能拯救也康熙四十四年乙酉閏四月乙未吉林烏喇將軍宗室楊福請以吉林烏喇白都納等處動支庫銀買馬給兵丁牧養上曰此事不准行朕屢以太僕寺之厰馬竝茶馬賞給京師兵丁及各處駐防兵丁所以兵丁無賠馬之苦歴觀宋明之時嘗議馬政皆無善䇿牧馬無如口外者朕口外厰馬今孳生已十萬牛有六萬羊至二十一萬若將如許馬與牛羊驅至近畿牧養即日費萬金亦不足也因擇塞外水草肥美處牧放是以毫不費餉而馬畜自然孳息前巡行塞外見馬畜彌滿山谷歴行八日猶絡繹不絶也康熙五十四年乙未四月庚辰上諭議政大臣等曰八旗馬匹俱已出厰著照出厰馬數令該佐領下人拴養照常給發錢糧後來如有用處甚為便益至於拴養駱駝之處併著詳議具奏康熙五十五年丙申十月己酉上諭議政大臣等曰江南杭州荆州西安固原甘州寧夏等處拴養馬駝如有用處甚屬有益著西安兵拴養馬二千匹駝一百隻固原甘州寧夏兵各拴養馬一千匹駝一百隻江南杭州荆州兵各拴養馬一千匹俱給發價銀令其購買康熙五十六年丁酉三月庚午上諭八旗都統副都統等曰舊例八旗官兵派往馬場牧馬皆預支俸餉按月扣除嗣後每年往口外馬場牧馬官兵毎人各賞給行月錢糧五月不必扣除俸餉康熙五十七年戊戌十二月庚戌上諭大學士等曰福建廣東地方潮濕馬匹難存所倒馬匹若屢令賠償必至苦累兵丁業已給過草料銀兩者免其追賠著照綠旗兵丁例半為馬兵半為步兵馬兵各養馬二匹爾等會同議政大臣九卿議奏大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷五十五
