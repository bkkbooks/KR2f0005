body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷二十七理財康熙七年戊申三月辛酉上諭吏部户部都察院鹽課關係緊要必得亷幹之員差遣乃能嚴緝私販惠恤商民疏通引法以裕國課近見課額未增商民又鮮裨益之處以後不必專差監察御史應將亷幹之員選擇兼差爾等酌量定議以聞康熙十八年己未九月乙巳上諭大學士等曰今聞錢法漸弛鼓鑄收銅等項滋生弊端以致制錢日少價值騰貴著户部工部都察院堂官同詣錢局每鑄錢一文必重一錢應作何釐剔弊端俾制錢充裕永可遵行著徹底確察逐一定議具奏至於部院衙門各處所有廢銅器皿毁壞銅鐘及廢紅衣大小銅炮并直隸各省所存廢紅衣大小銅炮著盡行確察解部鼓鑄康熙二十三年甲子三月癸酉上諭大學士等曰户部管理各省錢糧一時難以清楚地方督撫將在庫銀兩那移私用雖云補墊及至題奏時每多朦混銷算部內無憑稽察百姓深受其害即今原任廣西巡撫郝浴侵欺銀至十九萬兩由此觀之天下類此者不少朕日夜思維欲清查各省錢糧訪之外任官員及督撫等皆云清出存留錢糧則别項錢糧自必清楚朕思此事一行雖在外督撫司道不無被罪實於國家有益果錢糧充足更可為加恩百姓之用今九卿曽為外官者多知之必詳爾等會同詳議具奏康熙二十四年乙丑二月辛亥上諭大學士等曰財賦出於閭閻凡查核錢糧必徹底澄清不致以完作欠額外科派方於小民實有利益朕於正供所入毫無濫用正以愛養物力使國有三年九年之積縱遇水旱民生亦不致苦纍朕所以留意清核正欲加惠元元也三月辛酉朔上諭大學士等曰光祿寺估計價值等項頭緒繁多各物俱照時價須詳察估計使公私俱便釐剔諸弊逐一定為條款以便永久遵行則國課不致妄費户部儲有餘財凡遇有旱潦可以酌量賑濟蠲免無所顧慮民間不致困苦大有裨益庚午上諭户部賦役全書將永為定例纂修官員必盡心詳愼務求切當編纂成書朕思土田一畝之外亦有竒零不足畝者若以毫忽俱改為釐雖目下易於辦理誠恐有纍小民爾等其詳議之六月丁巳上諭兵部侍郎佛倫等曰錢糧所關甚重宜詳加釐剔以除虛冒濫支之弊近見上駟院以假印誑領太常寺亦以假印取絲見今發覺者雖止此其未發覺者謂之無有可乎此皆支給時不行詳察怠玩疏虞之所致也嗣後凡關係支用錢糧事務必告之該部院堂官稽核得實用印文支取其四五十兩以下者遣筆帖式往領若踰此數則遣司官往領其給與時亦詳加稽核告之該部院堂官然後與之可也如此於職事亦無所曠廢告於該堂官及司員親往領取亦豈難行之事爾等可傳諭户部十一月丁巳朔吏科給事中楊周憲奏稱纂修簡明賦役全書不便於民請停止上諭大學士等曰楊周憲奏稱纂修簡明賦役全書將銀之尾數收入釐內糧之尾數收入勺內所增銀米豆麥為數無多在部議所收者乃州縣之尾數州縣所收者則各圖各里各甲之尾數殊為繁多不無滋弊且嵗造册籍書吏需索恐致擾民伊言似是不知户部初題時是何意見果能永久無弊否此事關係國計民生須求確當方可永久遵行勿以一人以為可而輒行勿以一人以為不可而輒止宜虛心公議從容確定務期可垂久逺倘急遽議行不過數年又議更改豈可為法爾等再公同確議具奏康熙二十五年丙寅二月丙申大學士等奏稱部定銅斤價值採買不敷其各差造册四季報部不如改令差滿之日一并彚送上曰國家設關𣙜稅原以阜財利用恤商裕民必徴輸無弊出入有經庶百物通流民生饒裕近來各監督不恪遵定例任意徴收官役通同恣行苛虐託言辦銅價值浮多四季解册需費將商人親填部册隱匿更改既以充肥私槖更圗溢額議敘重困商民無裨國計種種情弊不可枚舉朕思商民皆我赤子何忍使之苦纍今欲除害去弊必須易轍改絃所有見行例內收稅溢額者即升加級紀録應行停止其採辦銅斤定價不敷作何酌議增加至四季達部册籍應俟差滿一次彚報嗣後務令各差潔已奉公實心釐剔以副朕體下恤商至意六月丁巳上命户部郎中吳什巴督理閩海稅務諭之曰凡收海稅官員因係創行設課希圖盈溢將出入商民船隻任意加徴以致病商纍民亦未可定著嚴加申飭務令恪遵定例從公徴收無濫無苛以副朕軫恤商民至意康熙二十六年丁卯二月壬申户部奏滸墅關監督桑格任內溢額銀兩上曰設立𣙜關原欲稽查姦宄照額徴收以通商賈桑格徴收額課乃私封便民橋以致擾害商民著該衙門嚴加議處關差官員理應潔已奉公照例徴收嗣後有不肖官員希圖肥已種種強勒額外橫徴致害商民亦未可定爾部通行嚴飭五月己卯上諭大學士等曰各項採買估計價值浮冒欺飾者甚多是以令其核減今所減者太過又凡修造工程其估計在前若照新例銷算則物料匠役工價核減太過必至苦纍其前此修造已完者著仍照原估計銷算至於各項物料所值之價俱訪時價採買估計銷算康熙二十八年己巳閏三月丁未上諭户部國家設關𣙜稅原以通商裕課利益民生非務取盈致滋紛擾朕巡行地方軫恤民隱咨諏利弊有應興革者即見諸施行近聞江浙閩廣四省海關於大洋興販商船遵照則例徴取額課原未纍民但將沿海地方採捕魚蝦及貿易小船槩行徵稅小民不便今應作何徵收俾商民均益著九卿詹事科道會同確議以聞康熙三十六年丁丑十一月丙戌上諭户部朕頃謁陵時見用小錢者甚衆所換之數亦多舊錢及兩局之錢使用者少此實非益民之事今嵗田禾大有而米價仍貴詢之土人皆云錢賤所以米貴又問小錢從何而來皆云由山東來者多由此觀之自古以錢法為難誠然先年科爾坤佛倫管錢法時題請將錢式改小朕每謂錢改小易改大難錢價若賤則諸物騰貴後因題請再三方始準行今果如朕言爾等即同九卿將錢法如何方能盡善確議具奏康熙三十七年戊寅四月壬戌上諭大學士等曰廣東海關收稅人員搜檢商船貨物槩行徴稅以致商船稀少關稅缺額且海船亦有自外國來者如此瑣屑甚覺失體著減廣東海關額稅銀三萬二百八十五兩著為令康熙三十九年庚辰九月丙午工部奏銷雜項修理錢糧上曰一月內雜項修理即用銀至三四萬兩殊覺浮多明代宫中一日用萬金有餘今朕交內務府總管凡一應所用之銀一月止六七百兩并合一應賞賜諸物亦不過千金從前光祿寺一年所用銀兩亦甚浮多朕節減大半工部情弊甚多自後凡有修理之處將司官筆帖式俱奏請派出每月支用錢糧分晰細數造册具奏若三年內有塌壞者著賠修如此則工程堅固而錢糧亦不至妄費矣康熙四十五年丙戌四月己亥大學士等會同户部議今錢價甚賤不便於民奉有諭旨應暫動支户部庫銀十萬兩由户部差官會同五城御史收買舊制錢俟錢價既長奏聞上曰錢價賤者皆私錢多之故也果欲力禁私錢何難之有明代尚能行紙鈔豈有不能禁私錢之理但與其嚴行禁止毋寧和平處置在京收買準如爾等所議至天津臨清地方亦當遣賢能官各一員即支該地方餉銀各一萬兩收買専差侍郎穆旦督買視錢價貴後不時奏聞又聞山陜兩省販去制錢甚多著行文山陜直隸督撫查察緊要關口嚴令擒拏如擒獲時將販運之人從重治罪其錢入官七月辛酉户部侍郎穆旦遵旨回奏差官齎銀收買制錢天津臨清地方錢價已長但五城民人行用之錢攙和小錢者尚多上諭大學士等曰查拏小錢乃五城提督府尹專司之事查拏疏忽是以仍用小錢若不將伊等治罪則弊將不止著將五城官員提督府尹交都察院嚴加議處十月辛亥上諭大學士等曰山東長山縣周村一帶俱開爐私鑄巡撫趙世顯不禁不捕乃奏請鼓鑄大錢若不禁私錢而鑄大錢則大錢重小錢輕小民必思射利毁大錢而鑄小錢是大不利於地方矣頃差侍郎恩丕等帶德州兵四十名馳驛往長山縣周村等處捕鑄私錢之人已諭伊等於拏獲之後並私鑄之爐帶往趙世顯處示之問伊地方見鑄私錢不禁不捕又欲請鑄大錢何故觀趙世顯更將何辭以對外省督撫孰賢孰否朕俱知之清濁斷不能掩也十一月己巳上諭大學士等曰因山東私鑄小錢故特差侍郎恩丕等緝拏今既禁私錢又不收取則用私錢者無日可止矣朕意欲令來年徴收山東錢糧其銀一兩折錢二千俟錢盡時照二千錢之數折收諸樣銅器則不出一年私錢自盡矣彼地官員不能緝拏私鑄俱係有罪之人即將所收錢及銅交付伊等運至京城以贖前罪運到之時即著增爐作速鼓鑄制錢爾等可與九卿詹事科道會同詳核議奏康熙四十七年戊子閏三月己丑上諭大學士等曰朕聞湖廣襄陽地方鼓鑄私錢糧船裝載至京各處售賣此事須清其本源著大理寺卿塔進泰速往會同該督撫嚴察具奏并檄總漕將楚省糧船裝載私錢偷賣者嚴行查拏康熙四十八年己丒十一月丙子上諭大學士等曰適科臣郝林條奏各省錢糧虧空郝林但知州縣錢糧有虧空之弊而所以虧空之根原未之知也凡言虧空者或為官吏侵蝕或為餽送上官此固事所時有然地方有清正之督撫而所屬官員虧空更多則又何説朕聽政日久歷事甚多於各州縣虧空根原知之最悉從前各省錢糧除地丁正項外雜項錢糧不解京者尚多自三逆變亂以後軍興浩繁遂將一切存留項款盡數解部其留地方者惟俸工等項必不可省之經費又經節次裁減為數甚少此外則一絲一粒無不陸續解送京師雖有尾欠部中亦必令起解州縣有司無纎毫餘剩可以動支因而有那移正項之事此乃虧空之大根原也再如正項錢糧二千兩徴收未完五百兩者按分數議處其例甚輕若因公那用五百兩則處分甚重今但責令賠償足額則那移出納還充官用其罪似乎可寬不必深究凡事不可深究者甚多即如州縣一分火耗亦法所不應取尋常交際一二十金亦法所不應受若盡以此法一槩繩人則人皆獲罪無所措手足矣且如户部庫中錢糧歷年存積數極難清前此庫貯一二千萬時曽令部中逐案盤查轉多二十餘萬即各倉糧米亦歷年堆積陳陳相因贏餘不少不肖官役侵盜銀米未嘗無人若行盤查細微不必深究諸事大抵如此見在户部庫銀存貯五千餘萬兩時當承平無軍旅之費又無土木工程朕每年經費極其節省此存庫銀兩並無别用去年蠲免錢糧至八百餘萬兩而所存尚多因思從前恐內帑不足故將外省錢糧盡收入户部以今觀之未為盡善天下財賦止有此數在內既贏則在外必絀凡事須豫為之備若各省庫中酌留帑銀似於地方有濟倘在外各省一旦倉卒需用反從京師解出得無有緩不及事之慮此亦當於無事之時從長商榷者也康熙五十三年甲午正月癸亥户部題為禁用小錢請再展限三年上曰爾等所見甚善自古錢法未有如夲朝流行之廣者如宋時錢至元末尚有元時錢至明末亦尚有惟夲朝不但順治錢於今已少即康熙初年之錢亦少前者湖廣總督額倫特奏湖廣一省小錢甚多若將大錢二百萬貫運去收買小錢則小錢可盡矣朕諭爾但知一省之事未知天下之事以二百萬貫錢運至湖廣能保途間無不測之事乎伊愕然奏稱上諭甚是臣實意料不及總之錢法必期便民若不計便民而但期法之必行嚴加禁止亦有何益凡事必酌量權變不失其宜方有濟耳七月己未上諭大學士等曰朕理事年久洞悉錢法錢價隨時不同銅價貴即燬小錢作銅賣銅價賤即盜鑄小錢用小錢則私鑄之人有益用大錢則私鑄之人無利然小錢又不可禁今大小錢兼用於民甚便錢法流行無如我朝南至雲南貴州北至蒙古皆用制錢從古所未有禁小錢甚易但於民無益耳治天下當寬裕仁慈以因人性不可拂逆即如滿洲蒙古各方之人飲食日用其性各殊必欲一之亦斷不可行也九月乙丑上諭户部臨清關錢糧每至缺額皆由地方積棍串通作弊所致不心派遣監督著交該巡撫收稅康熙五十四年乙未七月壬寅户部題鼓鑄銅斤請仍交商人採買上諭大學士等曰商人採買銅斤前已令停止今復交商人採買必致積纍拖欠無了期矣已經料理完結之事豈得再有紛更今各關差官員更換將畢應將銅斤交與各關差官員速行採買不可有誤鼓鑄著再議具奏康熙五十五年丙申七月壬午户部題請更換鳯陽關監督上諭大學士等曰各關監督所欠錢糧甚多未派之先俱願前往及到任之後額稅必缺此皆多帶人役徴收過刻之故昔南新關有一監督問巡撫王度昭錢糧如何不致缺額王度昭告以從寬徵收斷不欠缺後果如其所言鳯陽關著交與該巡撫徴收餘缺俟朕另派康熙五十六年丁酉三月甲子户部議覆長蘆巡鹽御史田文鏡疏請山東所裁鹽引補足辦課應準行上諭大學士等曰鹽務朕所深悉加引雖可增課然於商人無益如兩廣鹽課纍年虧空至一百八十餘萬兩該部反置之不問殊覺失宜辦理鹽務必得亷能素著實心辦事之人庶正課不至有虧商人亦不受纍著問九卿具奏六月己亥大學士九卿等議覆民間私燬小制錢作銅變賣當嚴行禁止上曰燬瓌制錢原有明禁特因銅少價昻部內鑄錢不敷採買廢銅以致小民射利燬小制錢作廢銅變賣朕辦事五十餘年屢次更定錢法皆視民之形勢從未嚴行禁止銷燬小制錢亦屢為寬限前李光地請將小制錢嚴禁朕曾下旨斷不能行伊後知其不可始以朕所見為是總督額倫特請於湖廣省發大制錢二百萬串通用將小制錢銷燬朕以不可之故分晰下旨伊始曉然小制錢私燬如何禁止之處九卿詹事科道會同確議具奏康熙五十八年己亥三月壬辰上諭大學士等曰户部見今採買器皿舊銅兹工部又行採買京城焉有如許器皿舊銅乎採買至不得之時不肖之徒乘機射利必致將制錢轉買銷燬燬錢則錢價必長甚於民生無益且伊等局內每月鑄錢即將伊匠役工錢作為採買銅斤所鑄之錢交部亦未可定此事不無情弊爾等詳問九卿具奏康熙六十一年壬寅九月戊子上諭大學士等曰朕撫御寰區時以生民為念凡各省將軍督撫提鎮差遣進摺之人及從外省來者必詢問雨暘收獲與米糧物價今年五月間因京師錢價甚貴故將應給兵丁月餉銀錢兼發至今錢價尚未得平昔年因錢價貴管理錢法侍郎陳廷敬阿蘭泰佛倫馬世濟等條奏姦宄圖利燬錢作銅以致錢價騰貴如將制錢鑄重一錢則錢價即平於民甚便九卿照陳廷敬等所奏議覆準鑄小錢朕遲至數月未肯準行是時科爾坤佛倫屢奏將制錢鑄小甚有裨益始從其請逮後私鑄甚多朕以制錢仍應照舊鑄大者為善故特降諭旨而九卿請鼓鑄大錢將小錢鎖燬朕念小錢行之已久今又專行大錢未知於民有無利益暫令大小兼用試行三年一次奏聞於是大小兼行自後錢價並未見增於民亦甚便利此皆朕所理之事也再從前商人辦買銅斤價值尚平自趙申喬奏請交八省督撫採買遂致遲誤部臣將遲誤官題參朕以採辦銅斤改交八省初行之始若將違限官治罪似屬寃抑故暫行寬恕其後銅斤雖陸續解送而不能全到有誤鼓鑄矣銅斤少則鼓鑄誤鼓鑄誤則錢價自貴凡事不可執一須隨時制宜鼓鑄一事從前屢經更改今錢價何故驟貴如何使之得平交九卿詹事科道會同確議具奏可否鼓鑄小制錢與大制錢兼用其一併議之大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷二十七
