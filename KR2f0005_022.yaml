body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷二十二恤民二康熙三十四年乙亥正月戊寅上諭大學士等曰興永朝奏請丈量湖南田地有纍於民否治國之道莫要於安民或有不肖州縣官將田地竟不行丈量而輒稱餘田加賦者亦未可定安有加增田賦而全不纍民之理著湖廣總督吳琠詳察具奏四月庚子户部題天津開河工程行文附近州縣派夫定限挑濬上曰若行文各州縣定限派夫必至苦纍民間著停止行文即發與雇價令天津等處雇民挑濬如此則公事既得告成而窮民亦可資以度日矣五月壬戌朔上諭户部尚書馬齊曰爾傳諭巡撫噶爾圖平陽等處地震房舍倒壞人民壓斃伊應親身於彼處設厰居住將被災百姓救護候朕諭旨乃遽回省城殊屬不合除噶爾圖所奏外有地震重處爾可詳察閲視加恩賑給本年應徵錢糧停其徵收爾到彼處即曉諭衆民皇上為爾百姓深切軫念特遣大臣賑救爾衆民毋妄遷徙離散且恐因地震地方不良之人及鎮標兵丁借端搶奪擾害生民傳諭總兵官周復興親身率領官兵將此一帶地方善為防護其平陽府洪洞縣被災百姓爾會同巡撫噶爾圖親身到彼處賑濟務令均沾實惠六月癸卯上諭大學士等曰時值久雨連綿乍止復雨將不利於田稼朕甚憫焉亟宜祈晴其傳禮部速議以聞康熙三十五年丙子七月庚申上諭户部朕親征時聞宣化府牧養三旗駝馬所需草豆甚急皆先派龍門赤城蔚州百姓供用後給價值恐小民不能如數支領著該撫委地方賢能官查明照價估給務令小民得沾實惠以副朕撫恤至意此地百姓供應軍需修治道途勞苦可憫俟冬間當免其來年之賦九月丁丑上諭大學士阿蘭泰等曰右衛兵丁馬匹若在大同一處喂養恐纍小民著侍郎阿爾拜前去與監喂內大臣酌量於附近州縣分養務給實價毋苦百姓十二月辛亥上諭大學士等曰去嵗霸州等處州縣曽運通州之米與被災百姓減價平糶閭閻甚為得濟今年水災更甚應如去嵗運米於各州縣平糶可敇直隸巡撫沈朝聘何州何縣當運米若干與民懋遷之其作速具摺奏聞勿緩俟開印時也康熙三十六年丁丑二月乙未上諭大學士伊桑阿曰修理道路專責之地方官恐至太過可遣鄉導官法保布逹修一車可行之道足矣山西道路著按察使巴什道員王輔鳩工督修令侍郎常綬前去按站備辦草料柴薪渡黃河後陜西路濶無庸大修或有宜略修處著常綬等驗視令地方官修之若修路太過勞及百姓責在法保布達與地方官無涉也戊戌上諭右衛將軍宗室費揚固曰山西巡撫倭倫等頃給發右衛官員兵丁米豆草價值較時價減少以致窮兵苦纍亦未可定又詢察大同府所屬州縣衛所之民運送右衛官兵馬匹所用草束殊為苦纍可將官兵之馬各留一匹於右衛餘馬發附近州縣衛所酌派官員兵丁看守飼養小民可免運送之苦此後每草一束作何給價著議政大臣大學士在事官員會同爾等議奏辛丑上諭山西巡撫倭倫陜西巡撫黨愛甘肅巡撫郭洪等曰朕比年出師𠞰寇總期乂安邊徼永輯民生兹厄魯特噶爾丹勢蹙力窮畏死悔罪遣使具奏乞降朕特親統六師再臨邊塞相機𠞰撫因乘便巡覽邊境形勢察視軍民生業遂發禁旅取道邊外朕自大同從內地前赴寧夏一路地方見緣邊州縣地土瘠薄軍民生計艱難朕心深切軫念一切御用所需皆自內廷措辦不以煩民扈從簡少市易之物悉依時值誠恐有強取抑價等事己令都察院及科道官逐日稽察糾劾其經過城堡衢市輒多結綵殊覺擾纍嗣後著通行禁止乘輿巡幸本為安民豈可反勞民力爾等務嚴飭有司不得借端科派仍張示曉諭俾窮簷編户咸悉朕曲體民依至意閏三月甲午寧夏紳襟兵民人等聞駕起行齊集行宫前叩懇皇上駐留數日以慰羣情上曰朕欲掃蕩寇氛以安黎庶特幸寧夏經理軍務駐蹕十有餘日曩者南巡凡所巡幸之處未有駐蹕至三日者且邊地磽瘠民生艱苦朕甚憫之朕扈從人衆恐多留一日即滋百姓一日之擾朕己定於十五日起行爾等誠懇之意朕已知悉又向者曾欲使禁軍駐防此地恐民間居處狹隘己命將房舍查明給還本主爾等即回故居可也五月丙申上諭大學士九卿等曰朕前巡幸直隸山東江南浙江見地方人民皆各安生業大小官員恐朕不時臨幸咸兢兢守法奉職以為他省類皆如此頃由大同歷山西陜西邊境以至寧夏觀山陜民生甚是艱難交納錢糧其火耗有每兩加至二三錢不等者前曾面問總督吳赫據言西安等府距省甚近收耗尚輕若沿邊所在地方火耗不免加重矣至於山西特一小省聞科派竟至百萬民何以堪科道官因朕已經訪問始行參劾並未有言於未發覺之前者亦屬何益戊戌上諭吏部等衙門朕頃以狡寇噶爾丹未滅調度軍務親蒞塞外因念切民依巡厯邊境所至咨訪目擊山西陜西緣邊一路地皆沙磧難事耕耘人多穴居類鮮恆業其土壤磽瘠固已生計維艱而地方遼逺疾苦無由上聞大小官吏不能子愛小民更恣橫索遂使里井日漸虛耗比年用兵以來一應軍需芻糗俱動支正項錢糧儲偫供應從不取辦閭閻乃各府州縣官員借端私徵重收火耗督撫布政使等官又不仰體朝廷恤民至意糾察貪汙禁革加派反多瞻徇曲庇又或督撫庸懦懈弛因而筆帖式及衙門人役無所忌憚擅作姦弊以致民生滋蹙朕心深切軫惻今外寇已經蕩平惟以綏乂地方拊循百姓為急務山陜兩省關係緊要應作何撫恤休養著九卿詹事科道詳議以聞六月戊寅山西巡撫倭倫疏請建萬壽龍亭恭勒聖諭上諭大學士等曰何事建立龍亭若果善民自感頌大同田薄民窮其建龍亭著停止倭倫奏稱大同地方飼馬萬匹全不費民力自朕觀之前大同養馬不過六千未始不用民力朕因民勞苦故將康熙三十六年錢糧盡免朕凡事俱務實行不尚過譽爾等可曉示之康熙三十七年戊寅二月庚午上諭大學士等曰山東巡撫李煒居官不善地方飢饉百姓乏食竟不奏聞及至言官參奏始行具疏朕為人君於國計民生日切存心詳加審慮李煒身任巡撫不知撫恤百姓朕又何賴焉著革職五月甲申户部議覆總督倉場侍郎德珠等疏言直隸朝鮮等處米貴將各省漕糧截留一十五萬石賑濟請令有漕各省督撫於本年秋收時買補帶運還倉應如所請上曰此截留賑濟等項所費米石若令有漕省分採買帶運則小民運丁必致苦纍京倉米石充裕所用之米無多採買補額著停止康熙三十八年己卯九月戊申上諭大學士等曰各省採買物件科派纍民不若折色解京官買總之纍民之事雖纎毫亦不可行向日口外蒙古困窮人不聊生朕近年來任人經理多方撫育培植之今己家給人足樂業安生可見治民之道全在休養也康熙三十九年庚辰二月乙酉湖廣總督郭琇奏稱皇上命臣選奏丈量地畝官員但湖南民稀地廣恐清丈後錢糧較前減十分之二上曰果於民有益所減雖倍於此亦有何害若不清丈以荒田著落他人徵收錢糧有纍羣黎斷不可也此事綦重保題丈量官員爾具疏來照所請行三月甲午朔上諭大學士等曰修築永定河夫役雲集人多則需米穀價必致騰貴遣户部賢能司官二員截山東河南漕米二萬石留於信安栁岔二處會同地方官照前稍減時價平糶至附近信安修河諸處屯莊米石亦令糶賣有益於民令內務府總管查明具奏康熙四十一年壬午閏六月癸未户部議覆山西巡撫噶禮疏言右衛駐防官兵浮給康熙三十六年分草束折色銀兩請交各旗追還上曰此浮給官兵草束折色銀兩復行追賠殊為可憫若向誤給官吏追補必致派纍小民其免之康熙四十二年癸未正月壬申上巡閲南河駐蹕長清縣界首鋪諭大學士等曰昨夜大風南村失火朕遣大臣侍衛撲滅之小民遭此深為可憫著傳諭巡撫布政使察明被災房數并議作何行賞之處大學士等遵旨令巡撫王國昌等察眀并議每房一間賞銀三兩上曰專委地方官行賞小民未必盡沾實惠著交近御侍衛海青等監視散給二月丙子朔上諭山東巡撫王國昌曰朕自泰安州見新泰蒙陰沂州郯城等處城郭鄉村黎民被災甚苦雖蠲免正賦兼行賑濟猶恐未能大有裨益如以養蒙古之例施於山左庶青黃不接之際小民得以度日命在京滿漢大學士九卿會議無論官民有情願效力者作速遣往山東不拘銀米同地方官分界賑濟以及降級革職人等有情願贖罪者亦準其贖罪俟秋成之後視其果有裨益酌量議敘至該撫尤宜董率屬員善為撫綏勿致流離務期副朕視民如子之至意即將告示刋刻遍行曉諭八月甲申刑部尚書王士正等因山左被災奉旨截留漕米并派八旗官員領帑往賑具疏奏謝上曰朕四次經歷山東於民間生計無不深知東省與他省不同田野小民俱係與有身家之人耕種豐年則有身家之人所得者多而窮民所得之分甚少一遇凶年自身並無田地産業少壯者流離於四方老弱者即死於溝壑此等情由爾省大臣庶僚及有身家者亦當深加體念似此荒年雖不能大為拯濟若輕其田租等項各贍養其佃户不但深有益於窮民爾等田地日後亦不致荒蕪如果民受實惠豈不勝謝恩千百倍耶十月庚寅理藩院議覆扎薩克大喇嘛綽朱兒喇穆扎木巴奏將伊所原居洮州衛卓奈克依特之廟伏懇開廣修造應如所請上曰取邊氓之地以廣修廟宇關係民生嗣後凡有廣廟宇與民間田廬有關者永行禁止康熙四十三年甲申三月辛酉上諭大學士等曰朕因山東及直隸河間府等處飢民流至京城者甚多特命八旗諸王貝勒大臣總管內務府各官及漢大臣官員於數十處立粥厰日煮粥賑濟務使流移之人得所酌量賑給數月但此等飢民棄其家業聚集京城以糊其口實非長策應作何料理始復舊籍得安生計爾等會同九卿詹事科道等確議具奏康熙四十四年乙酉三月己亥上諭山東巡撫趙世顯曰朕為兩河告成特來巡閲道經山左見民生自去嵗休養之後漸有起色朕心甚慰夾岸黃童白叟歡呼載道感恩叩謝者日有數十萬今仲春之時麥苖未長未致妨農至回鑾之際正值農忙麥秀恐妨稼穡爾即曉諭百姓概免叩謝各務農事可也癸丑上諭兵部侍郎貝和諾江寧將軍鄂羅舜等曰自江寧至蘇州坐臺兵丁可令撤去各回本汛今當麥秀之時倘軼路而行恐致踐傷隴麥且御舟所泊亦時與坐臺處相左隨駕人員自足環衛爾等轄下兵丁固當在此效力朕非謂其勞苦而遣歸也但係農時不比冬令耳其兩岸護送緑旗兵鎮江坐臺兵丁一併撤去壬戌上諭江南江西總督阿山江蘇巡撫宋犖曰朕為兩河告成楊家莊新河建閘特來閲視爾等復偕地方官民再四懇請故渡江而南見百姓雖不能比户豐饒幸安居樂業無憔悴之色朕心少慰編氓皆朕赤子休養生息已數十年民雖至愚亦所深悉故扶老㩦幼日計數萬隨船擁道歡聲騰沸此皆由中而發非假飾也但人多路隘菜蔬苖麥瀰漫田野不無踐傷朕甚惜焉爾等即出示曉諭萬勿踏壞田禾有負朕恤民之意康熙四十六年丁亥七月戊寅上諭大學士等曰浙江巡撫王然江南江西總督邵穆布奏報旱災以此揆之被旱之處甚廣朕屢幸南省其地方山川形勢及小民生業鮮有不知者南方溝洫最多水之出入固易然亦只可備平常小旱而已若至大旱河蕩盡涸惟近大河之處猶可薄收若田髙河逺之處水不能到必至全荒且小民有田者少佃户居多豐年則納糧之外與佃户量其所入分之一遇嵗歉則佃户竟無策可施矣南方卑濕民間難以蓋藏故比户而居有米者少凡飲食諸物每日見買此數年幸遇豐稔可以無虞今遇大旱所關匪細奏聞之後若能得雨不必言矣如未有雨不早加詳議殊非朕保民如赤子之心矣著九卿詹事科道會同速議具奏十一月己未上諭大學士等曰福建內地之民居住臺灣者甚多比來洊罹災祲米穀不登若土著之人猶可採捕為生內地之民在彼者糧食缺少難以自存欲歸故土則又隔大洋誠為可憫著行文該地方官察明情願復歸本地者或遇兵丁換班之船或遇公務奉差之船令其附載帶回原籍康熙四十八年己丑七月乙亥上諭大學士等曰湖廣江西稻穀豐收沿江之米甚多而近日江浙米價愈貴朕為民生計時切憂勞輾轉思之上江之米不禁其沿江而下者特欲使江浙米價平耳今富豪之家廣收湖廣江西之米囤積待價於中取利雖米船沿江而下而糶賣之米愈少此事關係貧民甚大爾大學士及九卿諸臣皆國家倚賴之人所以為民生憂慮者必與朕同當何如有濟於民著公同詳議速奏己卯大學士九卿等遵旨議覆湖廣江西産米甚多但恐富商囤積圖利應嚴查禁止上諭大學士等曰朕因湖廣江西之米商販由江而下者多而江浙米價不減故命爾等會議若將囤積米石定例禁止則借此橫查不過利於胥役而已百姓不但無益反致受害矣爾等但言其枝葉未究其本源朕意以為必於本源之地清查自無收買囤積之弊湖廣江西之米或江浙客商或土著人民某人於某處買米若干清查甚易應行文湖廣江西督撫委賢能官將有名馬頭大鎮店買賣人名姓及米數一併查明每月終一次奏聞并將奏聞之數即移知江浙督撫湖廣江西之米不往售於江浙更將何往此米衆所共知則買與賣不待申令而米之至者多即大有利於民也康熙五十二年癸巳二月丁丑上諭吏部尚書兼管倉場事務富寧安等曰朕聞京城近日米價較往年稍貴想因直隸各省人民今嵗來京甚衆之故應發倉米一萬石照時價減糶則米價可平於民生大有裨益若一萬石不敷即再發一萬石平糶四月辛亥上命都察院左都御史趙申喬往廣東平糶倉穀諭之曰朕覽廣東奏銷册內見存米二萬餘石以之減價平糶似屬有益爾至廣東詳查如所糶穀石尚不足用即速奏聞朕令動正項錢糧買米平糶江西湖廣二省不禁商人販米良有益處前江浙米貴朕諭將湖廣江西米船放下江浙米價遂平廣東督撫若於正月間早行奏聞則海運可及今風信不順海運尚難行也五月庚辰上諭大學士等曰提督康泰奏稱蜀省一碗水地方聚集萬餘人開礦隨逐隨聚見在差官力行驅逐朕念此等偷開礦厰者皆係無室可居無田可耕之貧民每日得錙銖為養生之計若盡行禁止則伊等何以為生果如滇省礦厰所出頗多亦可資助兵餉此處所出無多應令該地方文武官員盡心設法使窮民獲有微利養贍生命但不得聚衆生事妄行不法耳六月己丑上駐蹕熱河行宫諭大學士等曰從來壬辰癸巳年分雨水應多去嵗幸而未潦觀此兩日雨勢連綿此處山水或發亦未可定東邊之隄因城牆所逼水必洶湧東邊巡守之人在河灘中者若不小心則無走避處矣應預為之備至於貿易人民所居之屋凡當澗口之處亦各應防備若山水夜發當水處恐致被衝將此曉諭辛卯上諭大學士等曰連日之雨朕甚恐致潦今晴甚佳人居高處尚無妨但田禾可惜耳昔人謂壬辰癸巳年潦去嵗獲免倘今嵗五月初十間雨至此時可奈何朕記太祖皇帝時壬辰年潦大飢另户人家以致賣身世祖皇帝癸巳年霪雨大潦京城內房屋牆垣傾頽不堪明成化時癸巳年潦城內水滿民皆避居於長安門等處後水至長安門復移居端門前至棋盤街今嵗朕未來時雨水甚大老人有言後潦不及前潦但霪雨不止則田禾倒青矣朕甚慮之九月辛未户部等衙門題廣東廣西總督趙𢎞燦浙江福建總督范時崇等言將江南浙江米石運至廣閩備用於地方民生大有禆益應將江南省捐納米十萬石令總兵官穆廷栻總管船隻運至閩省廣東督撫撥船至閩省接運往廣東浙江亦報被災將五萬石仍留浙省將五萬石令總兵官吳升運至閩省上曰浙省今嵗歉收十萬米石仍留備用江南十萬石內將五萬石運至福建五萬石運至廣東米到日即行平糶勿致浥爛十月庚寅上問户部尚書張鵬翮曰錢糧之數若何張鵬翮奏曰此數年因皇上所免錢糧甚多今見動用至四十九年錢糧上曰即動至五十年錢糧亦無妨爾等為户部故如此奏耳朕心惟百姓為重今廣東福建沿海之府州縣等處正青黃不接之時尚宜酌量免其錢糧張鵬翮奏曰頃皇上特加殊恩已令運米賑濟矣上曰米雖運去但足糊口耳不能辦錢糧也張鵬翮奏曰至彼時再行請旨上曰不可遲延今即其時矣康熙五十三年甲午三月乙巳上諭户部甘肅一帶地方去年春麥失收秋田亦歉經該督撫奏報甚明其地俱係山田稍遇天旱易致荒歉是以舊嵗特沛恩澤蠲免租賦見在雖據該督撫設法賑濟給與牛種此外更應作何籌畫使小民得所永有裨益著遣工部右侍郎常泰大理寺少卿陳汝咸到彼會同該督撫詳查地方百姓情形確議具奏癸丑上以甘肅被災命工部右侍郎常泰大理寺少卿陳汝咸前往察勘諭之曰朕曽至寧夏其地方有似蒙古所種惟青稞遇嵗不收民即流散爾等到彼應與總督鄂海巡撫嶽拜計議教百姓牧養牛羊蓋甘肅地方不比直隸山東與蒙古同宜畜牛羊雖遇荒嵗食乳亦可度日矣又其地産肉蓯蓉天門冬煮食之味似山藥又一種沙米亦可食被災諸處爾等悉親身往勘會同督撫酌議以聞六月丙戌上諭領侍衛內大臣等曰天氣甚熱貿易人等多夜行者伊等但知為利不顧其身朕甚念之嗣後有緊要事方許夜行朕視商民皆如赤子無論事之巨細俱當代為熟籌也至於一應隨行官員兵丁執事人等如有公事不必過亟緩緩前行將此交與兵部自喀喇和屯以至口上俱遍張告示併於各該管處通行曉諭十月壬辰甘肅巡撫綽竒疏言甘肅寧夏等處今嵗被災窮民請計口散賑至來年夏收時停止上諭曰甘肅地方被災流移各處就食之民見令招回本處但時尚沍寒本處並無糧米招回無益俟來年春耕時送回方有益也康熙五十五年丙申閏三月壬午上諭大學士等曰直隸巡撫趙𢎞燮因順天永平兩府所屬地方米價騰貴民多乏食奏請借帑銀差官貴買賤賣再借莊頭積貯之米減價糶賣朕思治天下之道以養民為本當此太平之際而使民乏食可乎從前如福建廣東逺處偶遇災荒猶海運賑濟况京師畿輔之地乎去年順天永平保定河間宣化五府因雨水過多米穀歉收已將錢糧盡行蠲免積貯之米減價糶賣見今閭閻積貯無多若又以銀買穀則米價益加騰貴今京倉通倉之米甚多將倉內所貯之陳米發二十萬石遣堂司官運至各處地方不論旗民確查賑濟窮民始得均沾實惠且直隸北四府地方有水路可通即由旱路運去亦不甚逺不過在人區畫而已至於運米腳價以米給之亦可煮粥之柴以米易之亦可近京之地減價糶賣今又發陳賑濟則小民斷無乏食之虞矣又諭曰朕聞今年直隸南四府地方麥苖甚好但麥收時亦止有地之人得食而己未種麥之人何由而得朕意此番賑濟須至九月民方不致乏食每嵗五城煮粥施濟至三月即止今尚未停止於民大有裨益古之人君居深宫之中不知民間疾苦者甚多朕巡行各處曾目擊之故知之甚確又於直隸各省年穀豐歉時加訪問地方大吏所以不敢隱瞞朕凡事但求實濟不務虛名即如積貯之事聞之似善行之甚難從前連嵗豐收朕曾諭地方官令民間節省積貯但窮民一年所得糊口之外别有費用何得餘剩至於社倉一事李光地任直隸巡撫時曾以此為有益卒不能行今太平已久生齒日繁而田土未增且士商僧道等不耕而食者甚多或有言開墾者不知內地實無間地今在口外種地度日者甚多朕意養民之道亦在相地區處而已陜西臨洮鞏昌等地方雖不可耕種若於有水草之地效蒙古牧養則民儘可度日而百姓但狃於種地不能行此昔年去山東賑濟人員曾云或有人在牛旁不知取乳而食坐以待斃此皆不習之故耳爾等將趙𢎞燮所奏之事會同九卿確議具奏五月壬戌上諭大學士等曰京畿地方至今雨未霑足朕心不勝焦勞自密雲至口外田禾甚佳及問各處來人俱云雨水尚有不足之處念京城人民輻輳就食者多且太平日久人口滋生多至數倍以此平素間諄諄以此事面諭諸大臣今值暵旱之際若再不亟為籌畫朝廷之上所理者何事乎閲此次報內米價又長八旗官兵糧米定例於八月內支放今若候至八月米價必愈加騰貴著於五月初十日起即行支放至京城米石若仍行減糶甚為有益著再發米三萬石交與原派賣米官員減價糶賣爾等轉諭户部康熙五十六年丁酉六月丙戌上諭大學士等曰今年雖旱然得雨之後或連綿陰雨亦未可定應傳八旗軍民人等將危圮房屋牆垣修理滲漏之處早行苫蓋并潮濕朽壞物件移置髙處凡事豫則易備朕凡經歷之處心思所到即行傳諭即不連綿陰雨平常豫備亦可也十月癸卯上諭大學士等曰朕理事五十餘年無時不以民生為念凡巡行所至之地即加訪問故於民之疾苦無有不知各省奏事之人伊所過地方年景豐歉米價貴賤無不詳悉問之故總督巡撫提督總兵官等一切事皆無敢隱匿者今年各處皆豐收河南連年大熟朕念切民生爾諸臣當體朕恤民之意凡有聞見之處即當奏聞不可佯為不知也康熙五十七年戊戌八月庚子上諭大學士等曰聞今年安徽所屬地方出蛟發水甚是傷民前日曹俯家人來奏晴雨録詢問是實總督巡撫雖未啓奏朕既聞知心切軫恤京中有安徽地方官員著九卿速行問明康熙六十年辛丑四月己酉上諭大學士等曰去冬雪大所以今春雨澤甚少大約冬雪多則春雨必少春雨少則秋霖必多此非有占驗而得知者也朕六十年來留心農事較量雨暘往往不爽且南方得雪有益於田土北方雖有大雪被風飄散於田土無益今嵗山東得雨河南山西陜西未甚得雨備荒最為緊要不可不預為籌畫若直隸山東河南已難料理至山西陜西其補救尤難古人云三年耕則有一年之積九年耕則有三年之積言雖可聽行之不易如設立社倉原屬良法但從前李光地張伯行曾經舉行終無成效至於各省積貯穀石雖據報稱數千百萬實在存倉者無幾即出陳易新之法亦不為不善第春間僅有所出秋間並無所入州縣官侵蝕入已急則即以折銀掩飾此等積弊朕知之甚詳其報荒之真偽虛實朕亦無不洞悉如熱河所積穀石每年減價平糶秋收糴補還倉數目無多稽查頗易所以每有餘糧語云大兵之後必有凶年昔征𠞰三逆時豐收足以供給並無一州一縣貽誤及平定以後間有歉收之年不可不綢繆於未雨也邇來稍覺暵旱或者政事有缺失應行改正之處亦未可定爾等會同詳議具奏五月甲申上諭户部朕御極六十年自沖齡時惟以黎庶為重宵旰圖維勤勞至今今春朕之子孫暨六世孫輩與舉國官兵人民請行大慶典禮在朕固所應受衆亦咸以為宜朕意昔年辛丑係皇考賓天之嵗今嵗又值辛丑况西陲用兵事尚未竣是以堅辭不受今年朕躬自四月違和五月初旬又復感寒遂覺甚病以致面色稍減或稍行動或多言語便不勝倦乏目今直隸山東河南山西陜西麥已無收民多飢餒屢令大學士九卿議奏茫無頭緒似此尚忍而不言將來不知作何底止也諸大臣皆受髙爵厚祿應視萬民如一身一家各抒拯救之法若必俟朕降諭旨推諉於朕則大臣所任何事耶今朕躬甚弱心思亦短易倦善忘惟諸大臣是賴救民之策不可不急為籌畫著大學士九卿等速行詳議甚勿輕視倘再遲時日被災之民不能待矣九月辛亥上諭近御侍衛等曰爾等日侍朕側於朕心憂勞之處差知大槩若百官萬民何從而知朕日理萬幾其他姑置勿論即每年春時為雨水田禾時刻不忘留心究問直至秋成始稍釋念至於冬日內地常恐雪少口外地方又恐雪大此等苦心惟身厯方能知之即爾等日侍左右者亦未必悉知也康熙六十一年壬寅二月乙酉上諭吏部侍郎張廷玉內閣學士勵廷儀曰去嵗秋冬雨雪頗少今春已屆清明尚覺亢旱民以食為天朕以萬姓為念雨暘不時朕心豈能安乎見今各處為朕祈福不如祈雨倘得大沛甘霖朕即以為福矣六月壬戌上諭大學士等曰盛京地方屢嵗豐收米穀價值甚賤民間或致濫費著令盛京米糧不必禁糶聽其由海運販賣可傳諭盛京將軍府尹知之大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷二十二
