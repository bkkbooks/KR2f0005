body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷六十柔逺人四康熙三十六年丁丑二月丁酉上諭副都統吳達禪曰右衛所有厄魯特降人著撥戶部理藩院官各一員解往張家口曼都處如伊等馬駝羸瘦難行著內務府郎中董殿邦助之沿途糧草及賞賜衣服等類亦令董殿邦給與董殿邦可住右衛如大將軍處解到厄魯特即收養之如解到者多則逐隊送往張家口俟青草出後董殿邦往歸化城住待大將軍解到厄魯特即從外送往張家口曼都處壬寅上駐蹕榆林村前桑乾河崖奉差達賴喇嘛理藩院主事保住回至御營以第巴疏呈奏上以示議政大臣等問曰第巴之疏爾等以為何如議政大臣等奏曰第巴差尼麻唐胡土克圖面奏今尚未到應俟到日再行議奏上曰朕意與爾等之意不同朕閲經史塞外䝉古多與中國抗衡自漢唐宋至明厯代俱被其害而克宣威䝉古竝令歸心如我朝者未之有也夫兵者凶器聖人不得已而用之譬之人身瘡瘍方用針灸若肌膚無恙而妄尋苦楚可乎治天下之道亦然亂則聲討治則撫綏理之自然也自古以來好勤逺略者國家元氣罔不虧損是以朕意惟以不生事端為貴達賴喇嘛蒙古等尊之如佛第巴者即代達賴喇嘛理事之人噶爾丹叛逆皆第巴之故因朕遣主事保住嚴頒諭㫖第巴悚懼悉遵朕諭奏辭甚恭自陳乞憐畏罪矢誓此亦敬謹之至矣至達賴喇嘛身故朕已悉知今第巴云遣尼麻唐胡土克圖前來代彼密陳其情想尼麻唐胡土克圖到後必奏明達賴喇嘛已經身故懇朕為伊等掩飾達賴喇嘛與我朝交往六十餘年竝未有隙第巴既如此奏懇事亦可行即此可以寬宥其罪允其所請第巴必感恩而衆蒙古亦歡悅矣三月庚辰上遣理藩院主事保住薩哈連齎敕往諭第巴偕尼麻唐胡土克圗同行敕曰朕臨御天下統理萬邦溥播仁恩懲創亂逆其誠心恭順者必加奬賚焉爾布特逹阿卜地前與噶爾丹同謀凡事必徇厄魯特而行濟隆胡土克圖敗乃公事爾堅留不遣其時朕謂逹賴喇嘛若在斷不至此故嚴加詰責兹爾奏言聖上嚴㫖下須心甚憂懼今惟欽遵聖諭隨力報效倘軫念逹賴喇嘛乞降溫綸諄切奏請爾既知過引罪朕豈不念逹賴喇嘛通使修禮歷有年所乎且朕若不加眷恤爾土伯特國豈得安其生耶其濟隆胡土克圖乃逹賴喇嘛所特遣以合喀爾喀厄魯特之好者也彼竟不使喀爾喀厄魯特和好反導厄魯特入我境內與我軍交戰情罪甚屬可惡務必擒解彼之身命朕俱准爾所請寬而宥之其班禪胡土克圗應於何年月日來朝爾從容定期具奏至噶爾丹與朕抗我師大克之凶惡逆賊情罪重大其女斷不許留於青海爾必解來若不解送則罪歸於爾矣如噶爾丹果悔罪來歸其時另有處分今尼麻唐胡土克圖至將爾奏請之言俱已密奏朕前朕亦密有諭㫖朕之素懷惟願率土之人咸躋雍和共享安樂斷不欲摘發隱私傾人家國嗣後爾宜益加恭順勿違朕㫖朕亦嘉惠如初如此則爾土人民大蒙利賴爾之榮貴可獲長享矣閏三月乙巳上諭議政大臣等曰青海諸台吉來朝若於口外受之恐於典禮不備且伊等於四月起程正遇塞內炎熱著在九十月間朝於京師八月辛酉上諭大學士阿蘭泰曰撰敕賜䇿妄阿喇布坦宜曰噶爾亶多爾濟率衆來歸朕已安集使之耕種得所今忽棄其田苗逃去想彼有甚不得已之情朕已諒之彼乃鄂齊爾圖車臣汗之孫也倘至爾所如欲居爾即留養如欲歸爾即遣還九月癸未厄魯特台吉丹濟拉至御營上命大學士阿蘭泰及郎中阿爾法引入上獨坐氊帷內屏退左右并令阿蘭泰阿爾法出獨留丹濟拉語良久丹濟拉出驚謂諸大臣曰我乃叛逆罪人窮困來歸䝉皇上略不致疑盡屏左右召我入見授我顯爵乃知聖主至勇至仁如此我敢不誠心感戴永無異念上隨召阿蘭泰入諭曰爾等偕丹濟拉入者蓋以防不測也爾等所見雖是朕思凡人無不可以誠感丹濟拉雖來降其心不無疑畏朕推誠如此伊必感激喜出望外斷無妄動之事朕令爾等俱出不留氊帷內者欲使丹濟拉之不疑也十一月戊戌禮部議覆朝鮮國王李焞疏請於中江地方貿易米糧應不准行上諭曰朕撫馭天下內外視同一體竝無區别朝鮮國王世守東藩盡職奉貢克效敬慎今聞連嵗荒歉百姓艱食朕心深為憫惻彼既請糴以救凶荒現今盛京積貯甚多著照該國王所請於中江地方令其貿易癸卯青海扎什巴圗爾台吉等來朝上御保和殿受朝禮畢引至御座前諭曰朕頃巡幸寧夏所以命爾等來朝者蓋欲天下生靈各得其所此朕本懷朕富有四海率土皆臣固不在爾等之來否此後宜仰體朕意各遂安全即噶爾丹亦非朕先加征討因彼屢侵邉境擾害邉民然後致討朕性從不以威武臨人惟願與天下共享太平之福耳康熙三十七年戊寅正月庚寅上召䇿妄阿喇布坦之使彭蘇克喇木扎木巴多爾濟寨桑至前問以疏恭第巴之故彭蘇克等奏曰第巴行事不端有乖道法是以參奏上諭之曰休息兵戎令宇內升平始云道法若以護法為辭必生釁端如爾等雖招撫回子遏止其教亦能令其皈依佛法跪拜喇嘛乎今天下太平之時惟令各行其道若强之使合斷不可行四十九旗扎薩克蒙古等迄今六十餘年朕視如一家初喀爾喀厄魯特搆兵時朕曾諭逹賴喇嘛令從彼處遣人往解朕亦於此處命大臣等前往諭之使其相和不意逹賴喇嘛之使竟偏向厄魯特彼時朕即知逹賴喇嘛當已物故矣若彼尚存決不為此第巴之搆釁噶爾丹人盡知之又假託逹賴喇嘛之言令將澤卜尊丹巴胡土克圗土謝圗汗擒拏解赴噶爾丹今者澤卜尊丹巴胡土克圗土謝圖汗親身皆在此處前土謝圖汗於鄂羅海地方為噶爾丹所敗比時曽遣一寨桑來奏云臣等係歷來進貢請安之國若蒙主上憐恤收養我等即投順前來等語今不但澤卜尊丹巴胡土克圖土謝圖汗等即七旗之喀爾喀數萬蒙古歸順前來朕皆收養離散者使之完聚危殆者使得生全令其各得恆業至於澤卜尊丹巴胡土克圖土謝圖汗朕皆待以優禮無稍替焉衆䝉古以第巴為達賴喇嘛𫝊戒之人皆緘口不敢議朕曽以敕諭往責第巴彼甚心服具疏認罪朕因宥之嗣後第巴若改前行敬奉班禪達賴喇嘛則已若怙終不悛不但爾等請征第巴即其所屬青海台吉等朕亦不寬貸也前者青海台吉等聞朕出師寧夏之信盡皆震怖遊牧移營而去今日青海台吉等以噶爾丹平定親來慶賀伊等竝無過端朕豈忍加兵朕統馭天下總願宇內羣生咸各得所豈有使爾兩國生釁之理惟期爾等安謐而已七月壬午御製海運賑濟朝鮮記曰朕聞救災拯患王政所亟是以夙夜求莫雖在遐荒絶域猶若痌瘝乃身矧屬在藩維茍有疾苦何忍一日置也康熙三十六年冬朝鮮國王李焞奏比嵗洊饑廪庾告匱公私困窮八路流殍相續於道籲懇中江開市貿榖以蘇溝瘠俾無殄國祀朕深為惻然立允其請遂於次年二月命部臣往天津截留河南漕米用商船出大沽海口至山東登州更用雞頭船撥運引路又頒發帑金廣給運直緩徴鹽課以鼓勵商人將盛京所存海運米平價貿易共水陸運米三萬石內加賚者一萬石朝鮮舉國臣庶藜藿不飽獲此大倉玉粒如坻如京人賜之食莫不抃舞欣悅凋瘵盡起該王具表陳謝感激殊恩備言民命續於既絶邦祚延於垂亡蓋轉運之速賑貸之周亦古所未有也朕念朝鮮自皇祖撫定以來奠其社稷綏其疆宇俾世守東藩奉職修貢恩至渥矣兹者告饑不憚轉輸數十里之勞不惜糜費數萬石之粟環國土而戶給之非獨一時救災拯患實所以普澤藩封而光昭先德也是烏可以無記康熙三十八年己卯二月丁未御舟泊楊栁青地方扈從大臣等㑹議商南多爾濟等奏請禁止第巴遣人貿易應如所請上諭曰前扎海保住等來奏第巴與達賴汗魯㑹同商議以為今年乃班禪胡土克圖本命之嵗不便前去請俟來嵗三月遣之而阿南達等以為此係推諉之言欲遣二郎保扈木德同彼前去催令速來并駁其奏章朕思阿南達之謀亦失之輕率即使二郎保等前去能令班禪胡土克圖速來耶第巴以匿其奏章禁其貿易藉為口實彼所屬之人皆賴貿易為生朕為天下主何必以班禪胡土克圖之故泥於小見集其貿易絶其生計乎第巴既稱來嵗使班禪胡土克圖前來且待至三月如仍不遣來則曲在彼矣我朝惟圖理直凡事豫為斟酌然後行之亦不為遲朕巴遣扎海等作速回京傳諭尚書班第令其移文阿南達等倘第巴有奏章前來即行轉奏母得攔阻商南多爾濟等竝不計此即請止第巴貿易之人殊為未當爾等准其議亦失之矣八月己巳上駐蹕烏喇岱昻阿諭大學士等曰朕軫念䝉古生計曽遣官教養已各安生理無有不樂業者近聞巴林人等饑荒離散朕甚憫之此係公主所居若令微員前去恐亦無濟著護軍統領鄂克濟哈學士蘇赫納至彼會同扎薩克等將巴林所存米一千石賑之勿僅給公主人員也其離散之人令其招徠若人衆米少再將坡賴村米糧速行挽運至彼可速議以聞康熙三十九年庚辰十月丙寅福建浙江總督郭世隆奏稱紅毛國英圭黎被風飄至夾板船請遣回本國上曰英圭黎船隻遭風飄來可憫著該地方官善加撫恤酌量資助給足衣食乘時發回本國以副朕柔逺之意康熙四十一年壬午正月丙午上命郎中舒圗員外郎鐵圖等往打箭爐地方監督貿易諭之曰爾等至彼即將奉差情由移文第巴須文辭明悉令彼速遣大喇嘛來監督貿易倘若遲滯將我等撤回永逺不得貿易矣侍郎滿丕督師彼處與爾等事各不同務各勤爾事其畨人最貪見小利便喜稅銀勿取於彼只就我國商人徴之不可専以稅額為事若立意取盈商賈不至與禁止何異此項錢糧不多勿以此注念至彼處尤當熟諳地方情形有應奏之事即行具奏五月丁亥户部題喇嘛商南多爾濟養育銀兩令地方官捐助上諭曰商南多爾濟食用之物若令捐助重為地方之纍著動支正項錢糧不必捐助仍移文商南多爾濟飭其日用飲食務從節儉所用錢糧數目明晰以聞九月戊午浙江巡撫趙申喬奏稱琉球國進貢使臣遭風船壞救出二人上諭曰琉球失水二人拯救復蘇著該地方官加意贍養俟便船資給發還此等船隻損壞人被溺傷皆因修艌不堅所致嗣後琉球貢使回國時該督撫須驗視船隻務令堅固以副朕矜恤逺人之意十二月壬寅厄魯特丹津阿喇布坦來朝上召入面諭曰爾厄魯特為人多疑朕親率師至克魯倫屢遣使諭噶爾丹歸降彼不肯從故致交戰失利其時設若歸欵朕亦已矣前厄魯特來歸者朕皆授以大臣之職爾等尚不之信有言此必是計後定誅戮今厄魯特為大臣者現在已養至十年矣計耶非耶至於喀爾喀人材庸劣不及爾厄魯特厄魯特來歸者雖未遇從征立功其扈從巡哨亦甚盡力今觀爾體貌健壯他日得力可知念爾逺涉勞乏且善調攝暇日更與爾言也康熙四十三年甲申十一月戊午禮部題朝鮮國王李焞議將其國越境殺人之金禮進等立斬該管人員革職流徙應如所議上諭大學士等曰覽朝鮮國王奏章其所議甚為敬慎周詳越境殺人者依該國王所議正法固其宜也其餘罪犯內尚有當恕者爾等可參酌原宥議奏凡外國之事輕忽者多處置少有不當即不能以服其心所關甚大朕必慎之而又慎焉尋大學士等將事內應宥人員酌議具摺奏請上曰內地被殺之人皆偷採人參者非良民也即為內地擒獲亦當從重治罪但朝鮮國人越境而來殺人行劫法所不宥應將金禮進等立斬其該管官員當寬以處之李有白等俱從寬免罪朴錫昌等俱革職從寬免流徙如此則盡得其當矣康熙四十五年丙戌十月丁未上諭大學士等曰觀朝鮮國王凡事極其敬慎其國人亦皆感戴聞其國有八道北道與我瓦爾喀地方土門江接界東道接倭子國西道接我鳯凰城南道接海猶有數小島此等地方太宗文皇帝定朝鮮之役我兵無處不到以已破之國我朝為之重加營建俾安堵如故是以其國人於太宗文皇帝駐軍之地樹立石碑備書更生之德纍世感戴以至於今且彼更有可取者明之末年彼始終未嘗叛之猶為重禮義之邦也康熙四十六年丁亥十一月丁卯理藩院議外藩諸王供應折給銀兩事具奏上曰爾等所議殊不均平少者太少多者太多䝉古護衛及喇嘛等供應俱如所議行公主每日食物折價銀兩可稍裁減至公主等來未嘗攜如許隨從今當據彼來人實數酌量給發如果隨來人多再照爾等數目供給勿得逾額昔年外藩䝉古來部院必濫開浮數冒支錢糧朋分肥已此弊已久今如此行則錢糧不致妄費而事務亦易清楚爾等再議具奏至外藩䝉古來京有當住五日者亦有當住七日者今一概俱五日一次給發銀兩則住七日者不得不將所餘兩日另作一次支領矣今爾等可將五日者五日一次給發七日者七日一次給發如是則於外藩䝉古其便爾等辦理之事亦不至繁瑣也康熙四十八年己丑正月乙未理藩院題阿祿科爾沁固山額駙巴特瑪之妻縣君以所屬人丁進獻上曰此等人斷不可受縣君乃中朝下嫁者也所獻之人乃阿祿科爾沁之畨兵豈可取乎爾等將朕諭㫖明諭䝉古諸王照土默特蘇克圖爾之妻所獻八佐領一例暫遣官至彼處管理事務日後仍將所獻之人安插彼旗內可也康熙四十九年庚寅五月丙子江蘇巡撫張伯行疏報朝鮮國商人高道弼等被風壞船請候朝鮮國使來交付遣回上曰若俟朝鮮國使來為日遲久著髙麗通事一人自部給文驛送前去康熙五十年辛卯十月戊寅上諭禮部朕統御寰區撫綏萬國中外一體保育維殷惟期遐邇咸寧共享升平之福至於藩邦有能仰體此心修明厥職者朕尤加意優待之兹朝鮮國王李焞自襲爵以來慎守邦圻恪循儀度嵗時貢獻方物克殫悃忱四十餘年未嘗少懈其國中之事稍有關係者必奏明仰請定奪罔敢隱諱每於欽差人員竭盡小心倍加敬禮且撫恤國人善於愛養所屬靡不悅服朕用是甚為嘉美既嘗曲示恩誼值彼地饑饉又自海洋運米賑濟故舉國人衆至今猶深感戴朝鮮貢物朕屢次裁减以至甚輕但國小地隘其年例貢物內有白金一千兩紅豹皮一百四十二張猶恐艱於備辦嗣後將此二項永停貢獻又聞朝鮮國使沿途館舍盡皆傾圮難以止宿歷年進貢奏事人員甚為勞瘁著令各該地方官作速修葺堅固用副朕加惠逺人至意康熙五十二年癸巳正月戊申上諭理藩院班禪胡土克圗為人安靜熟諳經典勤修貢職初終不倦甚屬可嘉著照封逹賴喇嘛之例給以印册封為班禪額爾得尼康熙五十三年甲午六月乙亥上諭領侍衛內大臣等曰朕想拉藏汗二子一往䇿妄阿喇布坦處娶親一現在青海地方駐劄往䇿妄阿喇布坦處娶親之子倘彼託詞愛壻留住數年不令之歸再如駐劄青海之子朕復憐愛留住則伊處竟至無人豈不孤危可憫况拉藏汗年近六十自當為其身計伊處人少土伯特人甚多而又秉性凶惡可保安常無事乎拉藏汗將凶惡第巴殺死朕加褒奬封為翊法恭順汗伊傾心內嚮不但朕知之即各處人皆知之但厄魯特秉性猜疑又甚疏忽倘或事出不測朕雖憐伊伊雖倚朕此間相隔萬里救之不及徒貽後悔耳凡事當為逺大之計伊亦係曉事之人是以朕為伊時常留意若不深謀防範斷乎不可康熙五十五年丙申二月丙子禮部題安南國進貢禮物請交內務府察收上諭大學士等曰安南國年例進貢犀角象牙等物物既沉重道復遙逺運送未免勞苦非所以柔逺之意嗣後著將犀角象牙免其進貢康熙五十六年丁酉九月己巳禮部題朝鮮國王李焞因目眚甚劇遣人來購空青應准其採買上諭翰林院侍讀學士阿克敦鑾儀衛治儀正張廷枚曰朝鮮國王李焞安靜奉法人民愛戴四十餘年伊國中享太平之福未有如此之久者朕甚嘉之覽禮部奏請王因病目來購空青朕聞王病深為軫念特簡爾等齎空青往賜此係格外之恩凡一應禮節爾等到時令王不必拘於成例隨處可以相見并𫝊諭之康熙五十七年戊戌五月戊午侍衛阿齊圗疏奏蘇爾扎之妻與從前屬下人等現在若可以糊口聼其自為生理若不能糊口請令青海寨桑等酌量養濟上諭曰據奏蘇爾扎妻既云我係婦人屬下人等不能養育且恐他人欺壓亦未可定著翰林院侍讀學士花色領銀一千兩前往波羅重可克地方給與蘇爾扎之妻令其辦理生業且朕差官照看伊等必無有敢行欺壓之人矣康熙五十九年庚子九月甲申上諭理藩院朕巡視土默特喀喇沁等旗分見今年禾稼著霜微早來年恐致米貴應𫝊諭伊等各旗分務宜節省米糧不得耗費戊子翁牛特喀喇沁土默特王貝勒等奏臣等所屬旗分因亢旱歉收請借支倉米賑濟上曰各旗分設倉貯米原以備水旱賑濟之用前蘇尼特阿霸垓等旗分荒旱之年朕曽令發帑賑濟其翁牛特等所屬之人朕視之均係一體該王貝勒等以此奏請極合朕心著即照所請行如尚有不敷之處仍著再行陳奏十月甲辰朝鮮國王李焞薨世子李昀遣使奏聞兼貢方物上曰朝鮮國王李焞襲封將五十載自來伊國從未有似此歷爵年久者且襲封以來奉藩至為敬謹進獻方物極盡誠款未嘗稍懈又防禦伊國邊疆安靖克享太平伊舉國老幼靡不感戴具見事上恭順撫民慈愛深為可嘉忽聞患病溘逝朕心不勝痛惻除遣大臣往唁外其所貢禮物著即交使臣帶回以示軫念之意應得恤典該部察例具奏大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷六十
