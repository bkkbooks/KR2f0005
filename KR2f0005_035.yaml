body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷三十五治河三附運河康熙三十五年丙子六月戊戌先是上以每年漕運遲滯命大理寺卿貝和諾往漕河封閘蓄水故糧艘抵通較速於昔至是貝和諾回奏上曰濟寧以南各閘止賴一嶧山湖之水以濟其流豈可令其啓閘不時耶此法既於漕運有益著每嵗遣官行之康熙三十七年戊寅十二月丁未上諭大學士等曰運河一帶惟黃水清水交匯之處甚屬緊要此處得宜則他處易治前日于成龍亦謂大墩地方緊要此處修築堅固始可無慮此言極是夫河務深微不訪土著之人不可而全聽其言亦不可如向日天妃閘以板阻水啓板行船須五六百人撁挽方得過閘今已平緩船隻不需撁挽坦然而行以此觀之乃時候之不同也康熙四十三年甲申十月戊辰朔上諭內務府郎中齊蘇勒曰耍兒渡東旺西旺等處運河兩邊向來皆沙其隄工係沙土築成故不堅固且又敵數處山水兼之海潮一日二次倒灌所以逼回運河之水不及流行常漲滿盈出於隄者因不能容受之故朕前閲楊村相近有舊河形迹一道即於此間建減水石壩以分水勢甚為有益此處近海疏通甚易所分之水不可使通百靈港寶坻縣香河縣此三處地勢低窪難以抵敵至建造減水壩須口寬四五十丈以石鋪之使尾長而斜堅固修築若水長不至四尺不能越減水壩可將見存舊河形迹挑寬十丈將土即築兩邊之隄爾會同直隸巡撫李光地前往驗看丈量具奏己巳上諭大學士等曰曩日耍兒渡等處隄岸常被衝決是以朕親臨遍視見楊村原有一引河去海尚近即欲疏此引河建滚水壩水長開閘使河水入海因需餉浩繁又恐無益故不輕舉朕今遣李光地等往估欲仍開此引河大都天津海潮至時一股向王慶坨一股向楊村逆流故河水長時即相觸旁流以致隄岸衝決今將楊村舊引河挑濬建壩自必有益再子牙河廣福樓亦有引河昔開引河時文安大城百姓謂開河於彼有益而青縣等處百姓則稱開河於彼不便互相爭論皆集河干各控其情及朕諭以挑此引河不獨便於文安大城而青縣亦自無虞民始各退後果兩處皆便矣癸巳上巡幸畿內臨閲齊蘇勒等所勘薛家莊擬築減水壩之處諭大學士等曰此處迎溜頂衝若築減水石壩遇水漲時石壩雖不妨而兩邊土壩可虞如水漲過四尺由減水壩流出視其流髙幾寸可算知一晝夜水泄幾分如能流泄水之三分則大有濟矣此處河勢南岸露出磯嘴北邊暗被衝刷今已近北岸矣朕向巡幸西塞之外見黃河一邊露出磯嘴則一邊必然衝刷水性原如此朕故知之此處斷不可築減水壩也因問之土民皆云三十年前河原近南岸衆皆驚服甲午上閲視筐兒港隄工諭齊蘇勒等曰昨日踏勘之處迎溜頂衝彼處若築減水壩甚為可虞倘水發時衝刷其東則所築減水壩反在河中徒費人工矣其楊村以南河岸離隄雖遠而相其地勢亦難修築此筐兒港近處有磯嘴與河隄相去不遠且河路又直通舊河取道甚順况東邊原因修築堅固屢經大水並無妨礙此處修築減水壩甚好朕製木樁式樣與之減水壩兩邊鴈翅須令加髙與隄平其外邊流水之處盡用石鋪預鑿兩路柱眼其上則搭橋以便行人築減水壩時須令其尾長如此則下注之水可無妨礙若欲保減水壩之水溜當於東邊酌量修築數處挑水壩以分頂衝水勢俟後再定至新挑河兩邊築隄則兩邊田地之水為隄所阻不能流出或恐不利於田地若使通於新挑河及分減大河之水令入漯河淀湖內則水集而滿必致泛溢恐民田地淹沒可將湖邊丈量圈築小隄使水不致漫流以保護田地修築大河兩邊隄工附近居民俱請加髙朕看此隄加築大有裨益可將此隄先修俟工部堂官到日爾會同前來將舊隄加髙之處丈量估算需用錢糧幾何具題之日再將修築減水壩之處定奪康熙六十一年壬寅六月丙寅上諭大學士等曰秦家厰隄工楊宗義牛鈕不能堵築馬營口所出之水想又如去年流至直隸長垣縣等處著行文直隸總督趙宏燮查看民間房屋地畝有被水淹者加意撫綏毋致失所此水泛溢必由張秋流入運河於漕船亦有關係著山東巡撫李樹德親身前往監看料理修治若水勢甚大可引入鹽河流泄使漕船可過毋致有誤附北河康熙二十九年庚午六月丙寅上諭內務府玉泉山河水所關甚巨西山一帶碧雲香山卧佛寺等山之水俱歸此河從前此河由青龍橋北匯入清河後因欲引此水入京城將髙處挑濬河之兩旁復加謹防固以分水勢今值霪雨之際水勢漫溢隄岸衝決數處爾等速將閘板啓放使河水暢流一面令工部將衝決之處速行堵築康熙三十七年戊寅二月庚午上諭大學士等曰霸州新安等處此數年來水發時渾河之水與保定府南之河水常有泛漲旗下及民人莊田皆被淹沒詳詢其故蓋因保定府南之河水與渾河之水匯流一處勢不能容以致泛濫渾河著左都御史于成龍往察保定府南河著原任河道總督王新命往察作何修治令其水自分流詳看繪圗議奏今值農事方興不可用百姓之力遣旗下丁壯備器械給以銀米令其修築伊等往時部院衙門司官筆帖式酌量奏請帶往於十日之內即令啓行三月丁丑上諭直隸巡撫于成龍原任河道總督王新命曰清河發源太行山脈會漳河子牙河滹沱河易水諸流其勢雖盛但堅築隄岸以遏之即嵗潦亦可無虞又漳河支流經大城縣入子牙河其勢湍悍數年以來文安大城諸處屢遭水患皆此河之故也爾等宜詳悉查勘至渾河發自馬邑其源甚微每遇大水之年則橫流泛濫致淹民田詳審其故蓋由渾河淤沙既多或遇春時水乏保定以下居民又引河水灌田沙礫壅墊河身積髙霪雨水發則避髙就卑水勢瀰漫遂致田土衝沒爾等惟挑濬淤沙河之兩岸掘五六尺深濶令水得暢流當不至於漲溢矣爾等須詳視具奏築隄濬河工竣設立河夫委官監視及時預為挑濬遇旱嵗力去淤沙庶無水患矣辛卯直隸巡撫于成龍以渾河圗形呈覽上曰朕經行水災地方見百姓以水藻為食朕曾嘗之百姓艱苦朕時在念是以命爾於雨水之前速行濬河築隄使田畝得耕百姓生計得遂也五月甲戌朔上巡視武清縣隄岸衆民跪奏曰耍兒渡地方自蒙皇上修築迄今永無水患此地隄岸正當水勢衝射請於隄岸之外另築一隄上諭曰此隄岸之外若另作一隄爾等田畝豈不多致占廢衆民奏曰原非一家田畝即稍入隄內於小民亦無大損倘河水一決其患更甚上諭曰轉盼間雨潦將屆今嵗不及修築暫立木樁堅護隄岸另開小河以殺水勢今嵗田畝可以無虞俟明春雨水前另築重隄爾等田廬俱得安固矣康熙三十八年己卯二月壬子上諭直隸巡撫李光地等曰漳河與滹沱河故道原各自入海今兩水合流所以其勢泛濫爾等往視如漳河故道可尋即可開通引入運河如慮運河難容即於運道之東别挑一河使之赴海其可否修浚情形爾等閲後再奏十月甲戌上巡視永定河隄至蘆溝橋以南諭原任河道總督王新命等曰此河性本無定溜急易淤沙既淤則河身墊髙必致淺隘因此泛溢橫決沿河州縣居民常罹其災今欲治之務使河身深而且狹束水使流藉其奔注迅下之勢則河底自然刷深順道安流不致泛濫今朕遍觀兩岸將緊要應修處逐一詳審爾等務期次第修築遵諭而行乙亥上閲北蔡村夏莊村南蔡村等處諭原任河道總督王新命等曰於此三處從上流作挑水壩不必過長長則大溜為其所逼對岸淤處略加挑濬水即瀉入直流矣著俟明春興工又諭曰官不清則為民害水不清亦無利於民天下之濁者皆如此也不清之官朕有法以正之不清之水朕有策以治之丙子上至郭家務村南大隄以豹尾鎗立表於冰上親用儀器測驗諭原任河道總督王新命等曰測驗此處河內淤墊較隄外略髙是以冰凍直至隄邊以此觀之下流出口之處其淤髙必甚於此如此壅滯安能暢流此等隄工卑矮可虞若不預行修築明春水發難以堵禦必自今冬下掃加幫增髙不可取近隄之土若取土成溝水流溝內有傷隄根著取近河土用之即運土稍遠亦無不可也辛巳上諭直隸巡撫李光地原任河道總督王新命等曰今永定河自郭家務以下壅淤已髙出七八尺若掘畢方濬河身不但多需工力必致嵗嵗壅淤南隄之南地最窪下若隨其窪下濬治於掘出之土即行釘樁築隄堅固則修理最易抑且北隄三層於河更屬有益爾等修理時可將河口修窄漸次放寬於兩邊築隄使髙大則水勢迅急沙自不能停住矣若遇村莊近處宜詳視妥當委曲遠移或砌之以石與村居無礙始行修理俟新修河工告竣朕親臨視開放河水康熙三十九年庚辰二月乙亥上諭大學士等曰朕往閲永定河見河工諸員並無知曉因朕指示周詳河工諸臣方悟而大悅總之經任河務者勤而且亷即克底績此河告竣則黃河亦可倣此修之朕御小舟入郎城等淀淤淺之處遍視之則河之當移柳岔也益無疑矣郎城之河全被沙淤墊髙至來年可耕為田而欲於此處出水直強之耳水口所關重大若非親臨目擊可輕斷乎至治河大臣畏縮不前反再三陳奏以為不可行者今復何辭又諭曰郎城之遙隄甚有用清水渾水俱以此當之新河開畢著即修築南北兩岸遙隄完工之後交地方官各自分守稍有損壞處用民夫補修著傳諭直隸巡撫李光地朕將於四月來臨不時遣人察視爾等敬慎無忽四月庚辰上巡視永定河隄諭大學士等曰朕前者到此曾指示挑濬河灣令其下樁今日觀河水已涸乘此水涸之時易於成功其徑直挑濬處須令寬濶即以所挑之土培築隄岸甚為有益見無雨水二十日可以告竣目今東作方興夫役難於驟雇八旗並包衣屬下每佐領派護軍驍騎各二名步軍共一千令其挑濬凡人員廢官有願濬河效力者亦令前往康熙四十年辛巳四月戊寅上巡閲竹絡壩河道諭直隸巡撫李光地等曰莽牛河出水之口亦宜下掃防之隆冬冰結之時莽牛河口著照常開泄清水流於冰下則水為冰所逼向下衝刷河底自然愈深又閲新修石隄諭曰朕修此石隄特欲其堅而更堅之意如此則河水斷不復歸舊河此地黎民亦可安枕矣又閲竹絡壩迤東河道大灣諭曰此地正當頂衝甚為危險見今此處續修石隄尚未興工著速取南方運來杉木即下排樁及掃堅固修築又諭曰觀新挑河道水流既直出柳岔口亦順河岸較前甚髙而河亦深此皆被莽牛河水衝刷之故閲其地勢南岸最為要緊故將應行堅修諸處詳行指示爾等勿謂其已成而遂忽之附水利康熙二十六年丁卯十月壬戌大學士等議覆河道總督靳輔疏言於髙家堰之外再築重隄停止丁溪等處工程應如所請上曰朕今挑濬此河原欲有益七州縣生民靳輔疏稱髙家堰等處築隄以為屯田可獲百餘萬錢糧朕從利益民生起見非為錢糧也若止為錢糧起見則不必蠲免江南陜西應徴六百餘萬矣此挑河關係緊要著戶部尚書佛倫吏部侍郎熊一瀟給事中達竒納趙吉士會同江南總督總漕確勘議奏康熙三十九年庚辰九月庚戌福建道御史劉珩疏言直隸永平真定等府田地應令巡撫李光地視其近河之處引水入田耕種上諭大學士等曰水田之利朕所洞悉已交李光地見令引水耕種水利一興田苗不憂旱潦嵗必有秋其利無窮但不可太驟耳今若竟定一例諸處剋期齊舉該部復行催查則事必至於難行矣亦惟興作之後百姓知其有益自然鼓舞各相效法於是因地制宜設法行之事必有成今觀此處亦不必開池惟如寧夏水田開濬溝渠潦則撤田中之水自渠出之旱則放渠之水引入田中災荒總可無虞矣康熙四十五年丙戌三月壬戌大學士等議覆直隸巡撫趙宏燮疏請開墾水田應準行上曰此處水田不比江南與寧夏澤州等處水田約略相似大都俱恃開溝以引河水今直隸河道處處俱通若開通三河縣河亦可直抵薊州昔開護城河甚有利益今朕又欲挑濬清河此河一開於右翼人衆亦大有利益矣康熙四十六年丁亥十一月乙亥上命江南浙江兩省在京官員齊集乾清門外召大學士張玉書等入諭之曰朕在宫中無刻不以民間疾苦為念恐遇旱潦必思豫防至巡幸各省於風俗民情無不咨詢即物性土宜皆親加詳考今嵗南巡江浙見天氣久晴所經河渠港蕩之水比舊已淺即慮夏間或有亢暘之患是時麥秋雖見豐稔然南方二麥用以為麯糵者多不似北方專需麥食南方惟賴稻米北方不獨種稻兼種黍稷粱粟此水上異宜不可強也且江浙地卑下不雨則蒸濕人不能堪有雨則涼燥人皆清爽雖稱水鄉然水溢易泄潦嵗為患尚淺旱嵗為患甚劇若北方則經月不雨亦無礙南方夏秋間經旬不雨則田皆坼裂禾苗漸稿矣故喜雨亭記云十日不雨則無禾也江浙農功全資灌溉今見其河渠港蕩比舊已淺者皆由素無瀦蓄故雨澤偶愆瀕河低田猶可戽水濟用髙燥之地力無所施往往三農坐困朕兹為民生再三籌畫永遠之計無如興水利建閘座蓄水灌田之為善也江南之蘇松常鎮及浙江之杭嘉湖諸郡所屬州縣或近太湖或通潮汐所有河渠水口宜酌建閘座平時閉閘蓄水遇旱則開閘放水其支河港蕩淤塞者並加疏濬引水四達仍行建閘多蓄一二尺之水即可灌一二尺之髙田多蓄四五尺之水即可灌四五尺之髙田行之永遠庶髙下田畝無憂旱潦矣朕特念江浙財賦重地小民粒食所資故欲講求經久之䇿著該部速行文兩省督撫將各州縣河渠宜建閘蓄水之處通行確查明晰具奏以朕度之建閘之費不過四五十萬兩且南方地畝見有定數而戶口漸增偶遇嵗歉艱食可虞若發帑建閘使貧民資傭工度日糊口亦善策也大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷三十五
