body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷二十九慎刑二康熙三十一年壬申十月甲申上諭刑部朕保乂黎元務崇寛大每於刑獄之事輒廑矜恤之懷秦省西安等處地方比歲洊饑閭閻困苦業已多方賑恤屢諭蠲租兹更大沛仁恩特加赦宥凡陜西廵撫所屬今年秋審情實緩決人犯内除十惡及軍機獲罪不赦外其餘自諭到日通著免死照例減等發落有現在審擬未結案者亦如之嗣後務令革心向善副朕法外生全至意康熙三十二年癸酉十二月辛未上諭大學士伊桑阿等曰適都察院議處吏部悞議知府盧騰龍等革職一案将堂官降三級司官降四級俱調用所議甚當朕觀人之識見精神有限不能過其本來分量烏得無錯但自知其錯即宜承認若既知其錯而不承認希圖文飾則其錯彌甚必致壞事前朕十三四歲輔政大臣理事時有悞行一事朕至今猶憶之彼時遇頒恩赦釋放罪犯曾赦一不應赦之罪人該部以不應赦而赦應否釋放請㫖大學士李霨奏欲将錯就錯朕問爾此言於此事尚可如遇不應正法之人悞行正法則人死豈能復生此言亦可乎李霨慙服不能措辭大學士圖海奏此事實臣等之錯有何辨處天下事惟人命最重朕察之又察然已行之事其中能保無悞耶康熙三十三年甲戍四月庚寅刑部等衙門議覆民人高宏擢毆死伊兄高宏先應正法上諭大學士等曰此案原供内有高宏擢之父高昇因伊子高宏先暴惡先行砍害之語今悉刪去但苟且定議人命關係重大即使㫖意未當亦宜據理執奏况議此案者止滿洲官一員漢軍官一員似此關係人命事情不多令司官詳察㑹議苟且結案可乎将刑部嚴加申飭嗣後倘仍蹈前轍决不輕恕十二月壬子刑部議覆阿哈尼坎盜伐風水禁地樹木罪應立絞上曰此伐木處雖與風水相近然非内地愚人無知犯禁此等情罪前此曾經寛宥著枷責發落康熙三十六年丁丑十一月戊子上諭大學士等曰凡關係人命事朕再三詳閲務期平允昨見高陽縣盜案情有可疑特差司官覆審今據奏張三等果非真盜嚴刑誣坐希圖銷案沈朝聘竟不詳察草率審擬具題殊屬不合著三法司㑹同吏部議處具奏康熙三十七年戊寅四月己酉上諭大學士等曰人命所關重大朕數年以來将為盜者止誅首惡為從者從寛免死此朕之特恩也又恐此等罪犯交發黒龍江聚集或致生事及問将軍薩布素據奏新滿兵衆多将兇徒分給為奴勢孤力散惡不能逞由此觀之不但全活甚衆且新滿洲得之資益良多矣十一月甲申大學士等以朝審情實各犯四十八人請㫖上諭曰奏讞之成當預為詳審臨時可以無寃若不慎之於先而伺察於死生呼吸之間豈有及乎如今日各案朕先已熟覽知其曲折猶欲與爾等斟酌而行耳十二月庚戌上諭大學士等曰緣事婦人除親身犯罪外無論官員民人之妻有事屬牽連應行質訊之處可遣司官筆帖式往其家問取口供其拘至公庭永行停止康熙三十八年己卯三月壬午上諭刑部朕愛養民生慎重刑獄凡有奏讞時示矜全兹鑾輿南廵見沿途老稚男婦環跪歡迎朕甚嘉悦念此編氓皆吾赤子原期生聚敎訓共底善良其或陷於刑章致困囹圄改過無路惻然傷之所經過山東江南兩省見在監禁人犯除十惡死罪及詔款不赦等罪竝官吏犯贓不宥外其餘自康熙三十八年三月十五日以前死罪以下已結未結俱著寛釋此朕廵幸所至欲使竝生之至意可通行曉諭令咸悉朕懷乙未上諭刑部朕廵視東南行次浙省因官吏軍民依戀誠懇特㽞蹕數日以慰喁喁奏請之情獨念獲罪人犯身淹刑獄一干法網無由自新兹乘輿經臨惻然矜憫用沛好生之澤聿示格外之仁該省各屬地方有罪犯見在監禁者除十惡死罪及詔款不赦等罪與官吏犯贓不宥外其餘自康熙三十八年三月二十六日以前死罪以下已結未結悉著寛釋可行文該督撫徧傳所屬張示曉諭康熙三十九年庚辰九月癸巳都察院以秋審事請㫖上諭大學士等曰若停秋審此内矜疑人犯又致多監一年将可矜疑者照常審理即行減等完結其情實人犯今年著停處決己酉刑部以龍巖知縣趙光榮誣良為盜一案兩議具題一議前雖錯審後察出實情應免議一議誣良為盗雖審出實情已經致死人命仍應革職上諭大學士等曰将覆審得情之官仍因初審錯誤議處則人皆懼罪不肯露其實情朕意欲定一例凡部駮應審事件不交原問官審理則人斷不致負屈倘仍令原問官詢理彼必固執前議致令銜寃者多矣著九卿詹事科道一併詳議具奏庚戌上諭刑部人命關係重大今年停審情實罪案爾等不必忙廹一應矜疑等犯必再三詳審盡得實情方可是日上諭大學士等曰朕聽政有年人命之事無不加詳然亦不能保無寃抑者但有錯處朕未嘗不行指出也該州縣取原供時雖不得其情亦必飾詞以詳上司上司復加詳審然後到部此間即少有寃抑亦何由周知所以外省之事朕皆委任督撫督撫委任司道今以不可委任之人居司道之職督撫題叅誠為得當且有失何妨但有失復隱諱不自任則惡矣甲寅刑部奏口外偷盜馬匹之范崧擬立斬上曰用兵之際嚴盜馬之禁故行即斬今海宇昇平兵革不試仍照前例即斬殊屬可憫范崧著從寛免死照例減等發黒龍江給披甲新滿洲為奴康熙四十年辛巳十一月甲午上諭大學士等曰歲内秋審重案朕皆一一詳閲其字句錯誤處甚多此皆人命案件關係最重即一字一句不可錯誤乃九卿等自七月至今閲視數月其字句錯誤處竝未看出一二何也此屬伊等專任似此怠忽不加詳愼可乎刑部刋此檔案先不詳審殊屬不合著交都察院嚴察議奏近看部院事件亦多錯誤朕凡事詳閲即一字之訛亦為改正嗣後爾等宜加敬慎毋忽康熙四十一年壬午正月丙午上諭刑部朕欽恤民命念切好生每於法司奏上爰書必披覽再三詳求可生之理其或情罪允符不忍立置之法者則令監候緩決以俟來歲再讞顧罪犯一經緩決即皆冀望生全而長困桁楊淹㽞歲月自新無路朕甚憐之今方春始和萬物暢遂憫兹沉繫之獄用沛矜釋之仁見在爾部及直隸各省監禁人犯凡經康熙四十年秋審奉㫖監候緩決者著察明通行減等發落仍開具人數奏聞康熙四十三年甲申十一月乙卯大學士等以情實人犯請㫖上詳閲招冊審定再三諭大學士等曰刑部招冊關係人命冊内字訛舛甚多殊非慎刑之道爾等傳諭刑部嚴行申飭嗣後於此等事宜加謹毋忽康熙四十四年乙酉十月乙巳上諭大學士等曰今年情實罪犯少著停止處決情有可矜各犯著分别核議照例減等發落再各省秋審尚無可議朝審則太寛書云罪疑惟輕以其罪之情由有可疑之處而輕之也若無疑則以公平為貴見在殺人之人情罪顯然又何所疑而欲從寛乎是以執法之人但當詳情據理以定罪一味從寛則惡人何所儆戒可以此諭刑部康熙四十五年丙戌十月庚子上諭刑部緩決罪犯至於三四年者俱即行察出免死減等發落十一月丁卯大學士等以秋審情實罪犯七十人請㫖上将招冊逐一詳閲反覆審定勾決者二十五人諭大學士等曰四輔臣時毎年勾決動至百餘人朕親政後數十年來每遇勾決凡有一綫可原者未嘗不從寛宥直至萬無可疑始予勾決至於光棍及有關主僕之分者其罪斷不可寛也十二月乙巳上諭刑部歴年以來監候緩決人犯二百二十五名俱著免死減等發落在直隸各省者爾部即移文各該廵撫令遵㫖速行康熙四十八年己丑十月壬子上諭大學士九卿等曰江南浙江連歲災荒地方困苦今年兩省疾疫盛行人民傷斃者甚多雖該省督撫未經奏聞而朕訪知災病之狀深用惻然民命至重朕宵旰孜孜惟以矜全百姓為念一切刑獄奏讞尤加矜恤比年因江浙盜案疊見秋審時情實各案所議情罪俱屬允協但念災荒疾病之餘復将數十罪犯一時正法朕心殊為不忍江浙兩省應處決情實人犯俱著停止一年十一月癸未上諭大學士等曰向來勾決罪犯止開犯人姓名順治年間有兩犯同名者一勾一留唱名時二人同應監斬御史不能辨别具本請㫖其被勾者亦留至次年正法今令開明承審各司及罪人籍貫年歲自無錯誤矣自順治初年至康熙八年滿洲内無殺人之罪犯後來漸多朕欲禁絶之故交與該旗即行完結著為定例其時大臣或謂朕立法太嚴朕決意行之由是殺人罪犯日少去年止有一案今年絶無矣康熙五十年辛卯四月庚申上諭大學士等曰朕綜理政事以人命為重務必再三斟酌除情實死罪外其餘皆酌量寛宥如盜人參等案為從者俱照例完結為首之人擬絞罪在獄者甚多時值立夏天氣漸熱監禁人犯易於染病致斃甚為可憫著交與刑部酌量減等議奏五月己酉刑部等衙門題福建海賊鄭盡心浙江海賊蔡元良山東海賊張景龍等俱擬即行正法上曰此案正法人犯五十餘名人數甚多朕心殊屬不忍鄭盡心竝未與官兵抗拒不過廹於飢寒搶奪食物聞鄭盡心等人頗壯健且俱係熟諳水性之人今将伊等從寛免死或歸併旗下或發往盛京烏喇等處為水手當差著問九卿詹事科道以聞八月辛酉上諭大學士等曰頃者梁世勳題請復熱審減等例朕聽政多年惟日孜孜期以乂安萬姓故凡發政施令務以真誠為尚倘博取矜憫犯人之虗名夏則遇熱而審冬則遇寒而審不時遣官恤刑将督撫審擬案件頻飭堂司官分行駮改則貽累於兵民官驛糜費於迎送餽遺互訐多端不知作何底止督撫之專責首在敦風厚俗導民於善不時訓飭有司簡清詞訟速結案件不因細事多繫妻子無辜以致蕩析家資逃匿流亡即為良吏雖不熱審亦無所害使不清本原不愛黎庶徒以熱審為言則各省刑獄之事未至熱時而審結者甚多是有熱審之名而無其實益滋煩擾矣康熙五十一年壬辰十一月丙申大學士等以秋審情實罪犯請㫖上将刑部重囚招冊逐一審定凡情有可原免勾者十餘案諭大學士等曰朕於招冊皆細加研勘此情實五十人即盡誅之竝無寃枉而三覆奏後應當正法者朕必反覆詳究於彼無可生之中求一綫可生之路無非矜慎民命之意也十二月甲子上諭大學士等曰朕辦事有年凡人命審擬事件要期悉當乎理今陳汝咸條陳應照宋時洗寃錄較定致命傷痕處所畫一除鎗刀弓箭銅鐵等器械外木棍等俱不作兇器夫人命事件将拳毆脚踢木棍毆打致死者酌量兇器輕重以定罪之輕重則事必致舛錯如針乃最微之物将針刺人致死豈可因針非兇器而免其罪乎孟子云可使制梃以撻秦楚之堅甲利兵由此觀之木棍亦兇器也康熙五十二年癸巳三月己丑上諭大學士等曰赦詔一事關係甚大今頒詔日近若不預定恐臨期舛錯朕将歴年所下詔款皆已徧閲應用者一一標記其中有款同而字句異者亦另行標出爾等詳審酌定七月辛酉上諭大學士等曰昔聽政時每令讀本朕與公遏必隆公鰲拜共聽之或因一時言笑往往忽略後朕向伊等言此内人之生死攸關我等不可不愼焉雖懲惡勸善亦有不可宥之處聖人法内有仁所謂惟仁者能好人能惡人也康熙五十三年甲午二月甲戌上諭大學士等曰今年秋審著停止情有可矜疑人犯著照常審理具奏見審人犯内罪不至死者亦著減等發落十月丁亥上諭刑部朕聽政多年勤求民瘼刑獄之事尤所留心詳閲直隸及各省所議奏命盜各案自審結以至具題或踰時或經歲部議又間有覆駮再令詳審者案内牽連之人雖笞杖輕罪不免羈禁以俟完結淹歴歲時離家失業至於飢寒病斃者往往有之朕軫懷民命深用憫惻嗣後直隸各省除重犯案内軍流徒罪仍應候㫖完結外所有杖罪以下輕罪著各該督撫於審結日即行發落不必羈候部覆只於疏内逐一聲明務使無知罣誤之民早得脱身寧家以副朕哀矜體恤至意其不關題請各該督撫應自行審結發落者仍著依舊例爾部即遵諭行康熙五十四年乙未十月丙寅上諭大學士等曰閲刑部秋審奏章繁複者甚多皆由府州縣司道各官審録供招盡行全載所致該府司道所審若與州縣互異自應敘入否則但註明該府司道與州縣各官歴審皆同一語止将州縣初招竝督撫等大吏審擬之處敘明本内足矣此非為朕便於省覽蓋恐案牘繁多則事務必致遲延矣庚辰上諭大學士等曰刑部等衙門所奏各省緩決罪犯案件竝不将緩決情由聲明只書某人打死某人應行緩決一語嗣後應照舊例聲明情由其情實可矜犯人等案亦著照舊例聲明十一月丁酉上諭九卿等曰秋審案牘俱九卿所辦之事若令在朕前書寫未必能書十件何也此皆爾等漫不經心草率完結之故嗣後爾等應實心辦事并保舉叅劾之處亦不可執私意庚子上諭大學士等曰今年京師情實罪犯甚少此内稍有可矜者再宥數人其應勾決者十四五人而已即至來年亦不過二三十人今年停刑亦無不可将此情實緩決案内折角處記檔來年審奏時聲明具奏康熙五十五年丙申六月壬辰上諭大學士等曰熱河地方涼爽尚未甚熱觀京畿奏報内六月初二日甚熱今時漸大暑應将監禁人犯暫行從寛拘繫此㫖速行傳諭刑部十月丙申上諭大學士等曰人命案件關係重大不可稍有疎忽朕御極以來於奏讞刑獄之事必極其愼重細察情罪反覆披閲幾可成誦如此詳勘毫無疑竇方分别輕重批發施行閲今年朝審情實人犯止七十餘人迨三次覆奏後勾決不過二三十名除緩決人犯已有諭㫖令将年乆者分别減等發落外其朝審情實人犯今年處決著停止康熙五十六年丁酉二月丁未上諭大學士等曰嗣後各省大盜案件爾等㑹同三法司将此内有造意為首殺傷人者一二人正法餘俱照例減等發往黒龍江等處著為令六月癸巳上諭大學士等曰口外原係涼爽地方六月初十日甚覺炎熱京城必更甚矣爾等将此㫖傳與刑部所有罪人照每年寛釋例行康熙五十七年戊戌十月甲寅上諭刑部凡人命事朕必各案詳看方肯完結此次朝審情實各案朕欲一一詳看覺精力不支若俟從容看過再行批出則該部必照例覆奏三次冬至以前總不能結前數年俱曾停決今年亦著停決十一月戊戌上諭大學士等曰直隸各省監禁緩決及秋後處決人犯甚多已經緩決斷不至死遲至年乆仍然得釋若乆監禁不但患病死亡且使獄中人犯亦漸增多爾等㑹同九卿将直隸各省緩決及秋後處決人犯情罪作何分别完結之處詳加確議具奏再被毆受傷至保辜限外身死部内奏明緣由兩行請㫖者無庸議外有當時不曾殞命逾數日或因傷風或因他病而死仍将毆打之人議抵情有可矜此等向未有定例亦㑹同九卿確議定例具奏康熙五十九年庚子十月癸亥上諭刑部朝審情實人犯内有遇赦應寛免者有不應寛免者今若不詳察分别則明年或遇赦詔将伊等於赦詔前混行正法殊屬可矜其外省事情與京城事情不同外省罪人甚少照例完結惡棍亦知警懼至今年朝審人犯著九卿詹事科道㑹議除照常不赦罪犯外其餘逐一詳核分别具奏康熙六十年辛丑閏六月丙寅上諭大學士等曰每年暑熱時将犯人暫行釋放今年朕未降㫖該衙門亦未陳奏著照前暫行釋放大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷二十九
