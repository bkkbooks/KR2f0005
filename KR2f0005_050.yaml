body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷五十褒忠節康熙十四年乙卯三月丁丑上諭兵部寧夏總兵官陳福效力巖疆勞績素著屢次舉首逆劄克篤忠貞且其妻子家屬現在川中逆賊挾此招誘全無顧戀矢志不移深為可嘉著以現兼職銜升補陜西提督仍暫駐寧夏管總兵官事俟平凉底定之後即赴該管地方料理提督事務陳福之弟守備陳竒妻子家口亦陷賊中深為可憫著從優以參將升用爾部即遵諭行閏五月壬子上諭吏部兩廣總督金光祖奏稱懷集縣知縣李雲龍著有功績積勞殞命如俟事平議敘則孀母孤兒久待可憫李雲龍係旗人其旅櫬及家口應沿途護送歸旗著督臣給以水陸夫船再給藩庫銀一百兩以資孤寡九月庚戌吏部奏陜西定邊營守備劉士英當朱龍反叛同妻子殉難照旗下陳亡官員例優給拖沙喇哈番恤銀四百兩上曰劉士英不肯從逆同妻子殉節深為可憫與一身陳亡者不同可更從優給拜他喇布勒哈畨恤銀五百兩十一月庚寅上諭吏部禮部凡有世職官員以下及有頂帶官員以上陳亡無承襲子嗣銷去所給官職者照伊陳亡所得之官併其原官品級給與祭葬著為令康熙十六年丁巳三月癸卯上諭吏部戶部兵部自逆賊吳三桂煽亂以來凡用兵地方文武官員或矢志固守勢窮莫支盡節封疆或身陷賊中堅貞不屈橫被慘害或從容就義全家殉難視死如歸此皆為國捐軀克全忠節深為可憫其有骸骨未能歸葬妻子尚寄逺方孤苦無依更堪軫惻宜加恩恤以慰忠魂著各該督撫察明凡殉難文武大小官員骸骨妻子俱准動正項錢糧資送歸里以昭朕優恤忠節至意五月壬辰上諭福建水師提督海澄公黃芳世曰爾父子功烈素著復全家殉難每念及此朕心深為傷悼况爾由粵東進𠞰忽遭廣省兵變孤身涉險而出可見忠貞不二顛沛不改其守今仍襲海澄公鎮守福建水師提督總兵官宜愈加訓練鼓舞將士以靖海氛使地方秋毫無犯百姓安堵方為不負封疆重寄康熙十八年己未六月丙寅殉難廣西巡撫馬雄鎮之子馬世濟疏請赴粵西取父骸骨上曰馬雄鎮當地方叛亂之時不肯從逆克篤忠貞捐軀殉難深為可憫其骸骨併家口令馬世濟馳驛前往搬取仍著麻爾吉等預為察明料理交與馬世濟到日從優議恤十月戊子辰州永興陳亡參贊軍務都統宜理布參贊軍務護軍統領哈克山及諸將士喪至上命內大臣公噶布喇等四十七員各以茶酒往奠之復遣侍衛費耀色等齎銀六百兩賜宜理布之母傳諭曰宜理布時侍朕前深悉其人今出師著有勞績方謂成功之後即可凱旋相見忽聞陳殁朕還顧議政王大臣不覺悽愴痛悼兹聞爾家費用不給特賜白金六百兩治喪又命內大臣舅舅佟國維等齎銀五百兩賜哈克山之弟巴克山傳諭曰哈克山臨陳捐軀戮力盡瘁殊為可嘉特賜白金五百兩又傳諭正白旗大臣侍衛等曰退朝後於宜理布未出喪以前即赴喪次舉殯時除值日大臣侍衛外餘俱往送其哈克山噶爾圖色黑郭色門度那穆渾舉殯時分遣內大臣或散秩大臣一員侍衛等往送康熙十九年庚申四月壬戌上諭吏部兵部自吳逆叛亂以來凡用兵地方文武官員有矢志忠貞克篤臣誼抗賊不屈捐軀殉難者幽忠難泯大節可風彼時即宜錫以恤典但以各處尚未蕩平其中有情節未確者有應行察訪者不得已緩至今日朕每念及深為惻然兹各路㑹𠞰大勢底定餘氛指日殲滅其殉難各官應加褒恤以慰忠魂爾等即詳察議奏康熙二十年辛酉二月丙申戶部題故平南王尚可喜子尚之隆請給其父在日所賜海州房地上曰平南王忠誠勞勩堅守臣節其房地遣司官一員速往撥給五月甲子隨內大臣班尚之孝奏請迎其父尚可喜喪上曰尚可喜當通城背叛時矢志不移臨殁猶被服太宗皇帝所賜朝衣言雖死必葬於海州倘有知覺必效力於先帝其忠誠之心始終無二今尚之孝前往可令其將還京之日預行啓奏遣官往德州前後迎其骸骨尋尚可喜喪至遣侍衛鎖住等往奠之庚午兵部題殉難雲南巡撫朱國治喪櫬家屬請令大將軍貝子章泰等察明送京上曰吳三桂反叛以來地方官有從逆者亦間有逃歸者如朱國治仗節不屈罵賊身死殊可嘉尚如議速行康熙二十七年戊辰八月丁未上諭諸王大臣等曰凡地方官城存與存城亡與亡者乃人臣之分近有武昌兵亂葉映榴守義不屈罵賊自刎朕閲其遺奏五內傷悼王大臣等其共聽之因令展讀奏疏聞者莫不感泣隨諭吏部禮部葉映榴值裁兵鼓譟抗志不屈捐生殉難忠節可嘉今覽遺疏情詞慘烈朕心深為惻然不忍披閲應從優賜恤以表忠貞康熙二十八年己巳二月戊午上駐蹕蘇州府諭扈從部院諸臣曰楚省兵譁時湖廣糧道葉映榴盡節捐軀朕心深加憫悼特詔所司優贈亞卿兼豫恤廕今巡行江南見其子葉敷迎伏道左彌增軫惻應特豫諡以彰異數隨御書忠節二字賜之康熙三十八年己卯三月丙申上駐蹕杭州府賜湖州府知府陳一䕫父故溫處道陳丹赤御書名垂青史匾額諭曰爾父為國殉難朕至今憫之賜此特表爾父之忠康熙四十九年庚寅十二月戊辰海澄公黃應纘疏稱伊父黃芳泰䝉恩以總兵官承襲公爵今殁已二十餘年尚未營葬懇賜恤典上諭大學士等曰平定三逆之事朕知之甚明黃應纘之祖黃梧世祖章皇帝時曽遣人令伊投降因海寇鄭芝龍齎書阻之故黃梧未降後鄭芝龍之子鄭成功寇鎮江瓜洲貝子羅託總兵官梁化鳳內外夾攻大破之餘賊敗北投黃梧黃梧遂獻海澄縣歸順因封為海澄公黃梧故後公爵與伊子黃芳度承襲黃梧之弟有二子長子黃芳世次子黃芳泰黃芳世自一等侍衛授廣東總兵官耿精忠叛時黃芳度堅守漳州府舉家被害黃芳泰逃至廣東請兵值尚之信叛黃芳泰同伊兄黃芳世巡撫楊熙力戰而出黃芳泰等實心效力所立功績部中亦有檔案著該部查明賜恤康熙五十二年癸巳五月癸卯禮部題黃巖守備管遊擊事閻福玉與海賊戰亡業已䝉恩賜恤贈參將廕子弟一人以守備用其祭葬相應停止上曰閻福玉係登州人朕曽召見人材壯健戰時為賊所傷血流滿面謂衆曰此即報主之處也奮勇前進手刃十餘人力戰而亡此係與伊交戰賊人所說宜優加恩賜以示鼓勵著給與祭葬康熙六十年辛丒十一月壬辰上諭大學士等曰原任總督額倫特侍衛色楞副都統查禮渾皆陳亡伊等世職俱著承襲又陳亡提督康泰總兵官康海司九經俱著議敘伊等有世職亦著承襲西安佐領札木素在軍中頗出力索倫之藍翎查倫察頗勇猛射死數賊身受重傷自盡俱著交部議敘大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷五十
