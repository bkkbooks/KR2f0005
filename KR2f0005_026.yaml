body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷二十六嚴法紀二康熙三十五年丙子二月丁未上諭議政大臣等曰軍士所齎米糧務如數攜帶自啓行以至在途該管官員不時嚴查倘有減數帶往者將本身及該管官員一併從重治罪有盜米糧馬匹逃回及軍士縱酒殺人或鬭毆傷人扎薩克蒙古等盜我軍馬匹軍士及厮役等盜貿易蒙古馬匹者俱立行正法昔時行軍以厮役牧放馬匹此番既派出軍士守視其庸劣不堪之厮役可停其帶往至於隨軍貿易之人固不可少若縱其貿易又至紊亂應於某營相近即令某營之夸蘭大派出章京於一里外駐扎準其貿易嚴禁喧譁火燭并戒沽酒倘貿易人不遵法禁偷盜米糧馬匹者亦即正法帶往之人一併治罪軍士或將米私售貿易之人或強買搶奪者定加重罪可遍行曉諭使咸知凛遵丙辰上諭領侍衛內大臣公福善曰古北口一路兵衆惟爾督率而行凡所過城池村舍恐軍卒搶虜當行嚴禁兵丁馬匹最要須加意牧養朕前所示法令極明毋使有違出古北口後或有無知之徒以捕獸馳騁勞苦馬匹者當嚴行禁止五月丁巳上諭行在兵部征討莫要於法令奮勇先登者錫賞怯懦退後者議罪俱係定例嶽升龍馬進良白斌等係簡選任用之人今已逼近噶爾丹若遇敵交戰時副將以下至兵衆人等有退怯違令者著該總兵官正法奏聞九月己巳上諭理藩院是役經蒙古地方官兵馬駝擺站馬匹關係重大爾衙門可檄外藩衆扎薩克喀爾喀扎薩克各自嚴禁本旗盜賊如竊取官兵馬駝擺站馬匹什物借交易為名而來偷盜立正軍法梟首示衆該扎薩克管轄人員從重治罪著嚴行傳諭十月乙未上諭內大臣等曰明日到歸化城停止圍獵歸化城商賈叢集恐僕從或行騷擾及土默特蒙古盜竊兵丁馬匹著交副都統阿迪嚴行禁止康熙三十六年丁丑二月癸巳上諭副都御史努赫曰爾每日親率科道官一員在輜重之後如沿途兵厮匪類有爭鬭搶奪民間財物者即行查拏指名題參三月己未上諭大學士等曰隨駕人員搶奪強買民物朕皆差官查拏從重治罪但恐京城後來者及離大營在一二日後至者搶奪強買民物亦未可知著曉諭經過沿途地方官員如有此等事查拏指參從重治罪其衆人車輛不得攔阻著通行傳諭五月辛卯上諭議政大臣等曰山西巡撫溫保居官極惡刻剝百姓不可言述前者彼自謂居官好民甚頌之欲為之立碑今觀沿途之民無不切齒思食其肉況溫保不比他人嘗為學士朕愛惜斯民之意不可謂不知之布政使甘度居官亦極惡今蒲州之民皆逃入山中伊等若善民豈肯逃乎倭倫往撫如不肯降即押溫保甘度至彼處立斬如此貪官若不誅戮何以懲衆著議政諸臣會奏九月己卯刑部以太監劉進朝逃出訛詐議罪奏聞上曰劉進朝乃禁中役使之人逃出己屬可惡況又於所逃處嚇詐有司宜照光棍例議罪嗣後太監有與同罪者以此為例康熙三十八年己卯六月辛酉上諭大學士等曰選授雲南貴州廣西四川官員故違限期處分解任希圖另補善地其續選之員不能一時即到每致員缺久懸嗣後將此輩計月多寡革職留原任效力則不肖之徒知有處分赴任自速矣七月戊辰朔上諭兵部近聞直𨽻各省經制額兵虛冒錢糧者甚多殊干法紀嗣後須痛加省改嚴行禁止如有仍前濫行冒支扣尅者事發定行從重治罪又直𨽻各省自副將以下把總以上官員督撫提鎮當不時嚴察如有衰老庸劣不諳騎射之員即行題參若互相徇隱或差官察出或經引見罷斥或經該部糾參該管各官一併嚴加處分不貸十一月丁酉上諭大學士等曰順天鄉試所中式者童稚甚多物論騰沸大殊往昔考試係國家大典所當嚴飭以示警戒御史鹿祐題參可嘉著九卿詹事科道會同將李蟠等嚴加議處丁未九卿遵旨磨勘順天鄉試中式舉人試卷並議覆江南道御史鹿祐疏參考試不公一案擬將順天正副考官李蟠薑宸英等革職上諭大學士等曰此科考試不公已極且聞倩代之人亦復混入闈中京師何地可如此乎此案若照議完結仍不知警著將所取舉人通行齊集內廷覆試如有托故不到者即行黜革其考官等處分俟覆試後具奏十二月戊辰刑部題湖廣總督郭琇遵旨查參審理茶陵州叛案郎中剛五達等恣肆橫行擾害地方俱實請旨定罪上諭大學士等曰剛五達陛辭朕曽諭云爾係部院保舉賢能他日乃上進之人此行須從公審理斷不可顛倒是非倘行止妄亂決不輕恕今肆行無忌不加重治何以懲警著將剛五達等交刑部等衙門嚴加議處尋刑部等衙門遵旨察審剛五達應擬絞監候秋後處決上曰若輩即當正法以示警戒何待秋後也著再議癸酉上諭吏部凡奉差官員理宜恪慎潔已辦理公務事竣即行復命庶不負委任之意嗣後如巡鹽𣙜稅審事一應差遣各官倘有沿途騷擾繞道妄行或公務已畢仍逗遛地方借端生事或將所帶筆帖式撥什庫等私自遣往他處督撫即指名題參以憑究治如督撫瞻徇容隱不行糾參事發一併議處爾部即遵諭行康熙三十九年庚辰正月壬戌上遣學士滿都等往盛京審理偷刨人參一案諭之曰凡事皆有為首之人聞偷採人參者若輩皆衣食不贍之徒一切馬匹糧米帳房何能自辦爾等但詳察源流能獲其養贍此輩給發盤費馬匹收攬人參之為首者則案即結矣七月乙卯山東道御史吕琨條奏秋審罪案宜分兩議具奏上曰此事斷不可行若分兩議誰肯附於議斬者惡人不除則法既不行而善類何以得安朕凡遇難決之事必與諸大臣商酌行之即如昨日刑部題毆死伯父叔父之人擬即正法朕著問九卿者非謂此等人不當處斬也但其中或有他人毆死而罪歸於彼亦未可知故令詳議耳彼等果係情實豈可寬宥此本著發還吕琨給事中御史專任言職各以聞見入奏甚是朕此發還非阻言路之意因於事不合故發還耳可將朕旨明諭康熙四十一年壬午二月戊辰上行幸五臺駐蹕行唐縣諭內大臣侍衛等曰前所過地方原係旗民雜處人俱熟習貿易自此以往皆係民地隨從人等凡一切諸物俱宜從公市易毋得騷擾民間其令各管轄官遍行曉諭嚴加禁飭更令學士賴都率一二章京乘其後察之如有犯者即行參奏倘隱匿不舉從重治罪壬申吏部彚題以疾解任各官上曰漢官告疾者既痊仍以原任部院衙門補用若滿洲解任官員或因所遇之缺不佳冀得改補美缺或揣其堂官將以庸劣參處故先自引退如此任意行私可乎凡前後具呈解退者俱照漢官例補以原部院之缺著為令四月壬戌刑部議奏毆死陳大勝之陳潮應照例留養上曰有罪之人存留養親必其親原無罪犯情有可矜方為奏請陳蒂生與其子陳潮同毆陳大勝致死亦屬有罪陳潮照留養例殊未允協其另議以聞康熙四十二年癸未五月壬戌上命領侍衛內大臣和碩額駙尚之隆等傳諭曰朕觀索額圖並無退悔之意背後怨尤議論國事伊之黨類朕皆訪知阿密達馬爾圖額庫禮溫代碩甘佟保伊等結黨議論國事威嚇衆人且索額圖施威恐嚇舉國之人盡懼索額圖乎亦有不懼者即今索額圖家人已將伊告發索額圖能殺害乎至溫代額庫禮俱犯重罪流徙之人因其年老令回京師伊等應安靜以養餘年乃與索額圖結黨議論國事妄自怨尤伊等之黨俱屬利口愚昧無知之徒被伊等恐嚇遂極畏懼果至可殺之時索額圖能殺人或被人殺俱未可料雖口稱殺人被殺者誰乎至索額圖之黨漢官亦多朕若盡指出俱至滅族朕不嗜殺人嗣後爾等若與索額圖絶交將所行之事舉出尚可不然被索額圖株連必如噶楚哈阿思哈被滅族之禍索額圖之黨阿密達額庫禮溫代馬爾圖佟保碩甘之同祖子孫在部院者俱查明革退副都統佟保不在家俟到時再傳諭此旨著曉諭門上大人與衆侍衛等爾等若在索額圖處行走必被索額圖連纍致死癸亥上諭刑部額庫禮溫代馬爾圖碩甘等俱係問罪充發之犯念其年老取回京師伊等至京並不善養餘年與索額圖結黨議論國事俱交刑部鎖禁不可疏放僉侍衛海青武格馬武傳諭索額圖曰爾家人告爾之事留內三年朕有寬爾之意爾並無退悔之意背後仍怨尤議論國事結黨妄行爾背後怨尤之言不可宣説爾心內甚明舉國俱係受朕深恩之人若受恩者半不受恩者半即俱從爾矣去年皇太子在德州住時爾乘馬至皇太子中門方下即此是爾應死處爾自視為何等人此處問公福善即知爾任大學士時因貪惡革退後朕復起用爾並不思念朕恩即如養犬尚知主恩若爾者極力加恩亦屬無益朕差人搜查與爾行走之江潢家得書字甚多朕亦欲差人到爾家搜看但被爾連纍之人甚多舉國俱不得安所以中止朕若不先下手爾必先之朕亦熟思之矣朕將爾行事指出一端就可在此正法尚念爾原係大臣朕心不忍但著爾間住又恐結黨生事背後怨尤議論著交宗人府與根度一處拘禁八月甲戌朔上諭吏部山東一省官員平日不知重積蓄備荒災所以一遇凶年束手無䇿致勞京師遣官賑濟今應將山東合省官員停其升轉俟民生復蘇之日再行開復此內除丁憂離任外有以老病乞休者俱令來京引見再行定奪十月癸未上以西巡駐蹕良鄉縣十三里村諭大學士等曰見在扈從給事中滿普御史顧素令其後行查有肆行搶掠者即時鎖拏並將其主亦行參究至地方官員若私行禁阻民間市賣亦指名題參康熙四十三年甲申正月戊辰上諭大學士等曰近八旗漢軍俱圖任外吏不思在京效力或一家兄弟子孫數人俱外任者有之可著各都統察出酌調回京任用若不察出調回罪即在伊等可傳諭知之三月己酉上諭刑部熱審謂之慎刑夫刑在平時亦宜加慎何必因熱而始慎也如謂熱審減等於犯人有益則於原審時即以減等議之豈不更有益乎且犯人苦熱猶可而苦寒更甚熱既宜審則寒亦宜審既多此一事不肖官員遂欲延至熱審故意遲玩其停之十一月癸卯刑部題覆朝審案件上諭大學士等曰觀今年秋審外省罪犯議出者少京城罪犯議出者多用法豈可如是原任工部郎中費揚嘏於內外河分司之事不但侵蝕帑金凡諸弊端皆專擅而行諸大臣既不肯以此人應正法之處公同奏請反謂之情罪可矜朕今斷不寬宥凡人出身為筆帖式即思盡忠效力日後始可用為大臣費揚嘏各處差遣竟不為國家效力如留此等人將於何處用之費揚嘏著改情實戊午上諭大學士等曰凡人皆當立品筮仕之初即思干請於人其立意如是則他日將何所望哉倘自為筆帖式之日即有急公盡力之心何憂不至顯位或有未仕之先早已債負盈積至入官後若不脧民何以償之國家名器豈為此輩償債設乎朕於滿洲蒙古漢軍漢人視同一體善者即稱之為善若有罪一概不恕也康熙四十四年乙酉閏四月丙午上諭河道總督張鵬翮曰河工積弊汛官利於堤岸有事修建大工得以侵冒河帑又希圖修橋建閘興無益工程於中取利著嚴飭各官痛改前非加謹修防倘有故違定行正法以示懲戒其地方有司官員漠視河工致有貽誤者爾題參到日將地方官亦行正法河官平時須豫備物料以為不時修防之需若料物不備遇工程險要倉皇無措雖將該管官重處亦無濟矣七月乙酉上諭刑部凡管理兵丁將辨必平素約束軍伍禁令嚴明兵丁始克遵法紀地方無事湖廣兵丁王漢傑等糾集三百餘人在城中搶掠當鋪又於城外執旗纛勒索府縣官印結該管將辨何得稱為不知伊等所司何事況因此案已將總督提督等俱行治罪今總督喻成龍不將各營武辨讞審明白輒以並不知情徇庇具題殊屬不合喻成龍著該部嚴加議處此案遣郎中吳進泰前往究審具奏八月甲午上諭大學士等曰向來滿洲無犯法殺人之事康熙初年一年之內最多不過一二件而已自平吳三桂以來滿洲殺人之事漸多五年前至每月七八件朕謂若不力禁斷不知改自定為新例又將都統副都統佐領官一併治罪是以去年僅有三件今年僅有一件由是觀之則知法嚴而人命之事自少矣康熙四十五年丙戍二月壬辰刑部議覆差往湖廣郎中吳進泰等察審提標兵丁搶掠當鋪一案上曰此風不可長也湖廣兵丁原皆良善後因武臣不能約束流弊至此豈可不嚴加懲治且地方官亦不將此案審明延捱推諉朦朧具奏殊為不合著將兵丁首犯王貴等依擬立斬從犯王漢傑等俱依擬應斬監候秋後處決施世綸董昭祚董廷恩郎廷棟等俱著革職提督俞益謨居官好且在事發之後到任著降二級從寬留任十月丁酉上諭大學士等曰九卿議土司事但欲使兩造平息湖廣總督石文晟原參田舜年建造宫殿行凶作惡是以羈留於武昌府今田舜年已故石文晟又具奏欲息其事如土司等果抗拒不法則當發兵征勦土司若無罪則當反坐原參之人朕意以二格所奏為是此事不便令督撫提督會同審理當再特遣大臣前往察看著以此諭九卿丁未上命大學士席哈納吏部侍郎張廷樞兵部侍郎蕭永藻等往審土司田舜年事諭之曰田舜年一事關係土司並於地方總督提督亦有關係若不究其本末辨其是非則衆心不服爾等到彼可與前次遣往都御史梅鋗學士二格詳加研審如總督理虧則罪坐總督土司理虧則罪坐土司惟公平則人心自服爾等須出示曉諭衆土司若彼果有寃枉許其陳訴爾等收呈詳審窮詰根柢如無寃枉而欽差大臣至彼地提人不解反固守關隘不納公差則特欲反耳果其如此竟發荆州大兵立𠞰之不可持兩端茍且結案也總督參田舜年事極其狠毒今又欲草草完結何以服人九卿並不據大體立議首鼠兩端愈非理矣爾等前往若不能辨明此事則於爾等聲名亦大有關係也康熙四十七年戊子正月庚午上諭大學士等曰聞內地之米販往外洋者甚多洋船行走俱有一定之路當嚴守上海乍浦及南通州等處海口如查獲私販之米姑免治罪將米入官則販米出洋者自少矣閏三月甲午上諭兵部鳥鎗等火器祗當用於搜獵行陳之間此外一應旗下民間不得擅用著嚴行禁止七月丁丑上諭刑部凡減等流徙者俱係死罪豁免之人理當在流所安靜守分若仍不改過逃回作惡者情罪殊為可惡嗣後流所逃回不犯罪者仍照原定例完結外逃回後又復犯罪不論罪之輕重并將舊案查出立時正法庶匪類知所警戒著為令康熙五十年辛卯八月辛酉上諭大學士等曰太平之時不宜屢赦罪犯執法之人若將不應宥者宥之則姦徒逞欲怙惡不悛矣康熙五十一年壬辰五月戊申刑部覆四川陜西總督殷泰疏參縱容遊民連直等地方文武官員應分别議處上諭大學士等曰連直等俱係行醫小業為生各處糊口地方官員著從寬免其查參朕前諭各省督撫查拏越省遊行者蓋謂姦惡之徒有為僧道而行者亦有市藥賣卦而行者若不防微杜漸嚴行禁止令其任意行走結成黨類漸至人多勢盛即行劫掠有害地方或致難圖凡多費錢糧豢養兵丁者特欲剪除惡亂之輩耳明代李自成即其驗也不豫為之計可乎康熙五十二年癸巳正月癸卯上諭大學士等曰鄉會試皆掄才大典關係緊要今見考試官不遴取人才貪圖賄賂夤緣作弊者漸多此等人若不立置重典斷乎不可正考官係考場統領之員副考官同考官等通同作弊嚴加覺察是其專責而諉為不知情可乎刑部議江南科場處分未當應另行嚴議七月丁巳上諭大學士等曰總督赫壽因為廣東省運米所奏疏內以戰船今係大修之年俱各修理不堪應用請雇民船運米等語沿海各省設立戰船者特為防護地方禆益民生以備急需也今據稱戰船俱不堪用請雇民船可知戰船少而民間貿易之鳥船多雖有修船之名徒致耗費錢糧況修一戰船需用之錢糧甚多觀此將所修戰船或賣與民人或雇與民人貿易并將民人破壞船隻頂補充數揑稱修理亦未可定倘有用處將如之何此習相沿成風應用之時恐必致遲誤著問九卿令會議以聞十月庚辰上諭大學士等曰御史周祚顯條奏百姓保留地方官及督撫保留官員請行禁止甚是頃口外博洛和屯地方有二百餘民叩閽保留萊州知府朕未曽準後又至熱河叩閽只剩五六十人朕疑之因令拏審皆係雇覔見居口外之山東民知府家人及代寫呈之人相隨指使且百姓糾黨保留地方官若準留任則官必為民挾制實非美事令民不畏官官不畏其上司此處關係匪輕理宜留心或以己居官清潔不畏上司者有之清官如此而貪官被參之後亦謂我不能迎合上司所以被參學清官之語以自飾朱子畏大人注云大人理所當畏國家有上下貴賤之體雖清官可不畏上司乎是日九卿等遵旨議覆八旗出征舊人有將虜獲之人為養子分産開户者傳至子孫輩或行勒詐稱係祖父家奴混行控告殊違祖父初心嗣後有子孫控告祖父時為養子分産年久者永行禁止有惡劣不肖之徒不遵法度揑造他故控告者該部指名題參有職者革職無職者枷號兩個月鞭一百如有勒詐欵項審實照訛詐律處分著為定例上曰此議尚有未盡處如以家人為養子分居開户若日後原主子孫或極庸懦或至絶嗣伊等稱係近族弟兄反肆欺凌爭告家産者亦當入議禁止康熙五十三年甲午八月甲午上諭兵部販馬人等往往暗結將軍總督巡撫提督總兵官子弟將疲憊不堪之馬發與不肖道府營辨索取髙價代為壓派甚至無驛站之州縣及管步兵之頭目一概濫派以致所屬官員勉強收受負纍甚多著行令直𨽻各省將軍等嚴查禁止康熙五十五年丙申七月戊寅上諭領侍衛內大臣等曰本朝舊制王大臣及衆執事人等凡係御用之物各極謹慎不致遲誤今漸染漢人習氣惟尚虛浮鑾儀衛遲誤御轎之事無大關係但該管官於御用之物怠忽從事情殊可惡朕今將納音圖等拏問觀鄂倫岱之意大以為不然朕洞察其情必欲懲治以彰國法特諭爾等知之九月癸酉江南蘇松水師總兵官胡駿奏臣不諳水性請調極邊效力部議行文該總督將胡駿果否諳練水性之處查明之日再議上諭大學士等曰朕聞蘇松兵丁習俗甚惡自胡駿到任因其約束嚴峻兵丁幾起釁端總督巡撫提督等欲潛行消弭故未奏聞至於給餉俱係知縣等微員不能彈壓兵丁胡駿征勦海島勤勞素著今為兵丁惡習所迫故爾奏請改調部臣未悉此情議將胡駿果否諳練水性之處行查該督誤矣倘因胡駿不諳水性另行改調則兵丁惡習愈長此斷不可況崇明逺在海島民稠地廣應將江南事簡地方道員移駐於彼以資彈壓著九卿議奏康熙五十六年丁酉正月乙丑上諭內閣學士星峩特等曰爾等俱曽出江南海差海船一年造若干應令報明監督於出洋時將從前報過造船人名與船隻字號逐一查對方不致隱匿凡大船指稱貿易領票出洋每另泊一處用小船於各處偷買米石載入大船不知運往何所乍浦地方有堤一應貨物必於此遞運他處大船不能出入惟上海崇明等口甚屬緊要爾等將此傳諭九卿著議奏康熙五十七年戊戌七月甲戌上諭大學士等曰河南南陽總兵官髙成標下兵丁因查拏賭博人等至知府署內爭閙將知府沈淵帶至教場看守三日巡撫業已奏聞御史楊汝榖一聞即行題參甚是聞此等人俱係詭冒營兵夥同二三百人詐擾百姓不獨河南一省他省俱有之其行文各省督撫提鎮伊等地方有此等並不食糧詭冒營兵合夥妄行不法之人嚴查據實奏聞其作何禁約治罪之處著九卿議奏康熙五十九年庚子十一月丙子上諭大學士等曰朕見九卿薦舉之人有初次列名至第二次又不列名者是必因缺有美惡任意趨避也嗣後一次薦舉之人即當每次薦舉凡某官薦舉某人著吏部注册以備查核康熙六十年辛丑六月甲辰上諭大學士等曰聞得米從海口出海者甚多江南海口所出之米尚少湖廣江西等處米盡到浙江乍浦地方出海雖經禁約不能盡止福建地方正在需米之時又派浙江兵二千往閩駐防恐米價益貴米到乍浦價值必賤交與浙江巡撫提督嚴禁私賣不許出海動帑買米三萬石豫備海船裝載提督派官兵護送押運從海運至厦門收貯自福寧州直至福州府不過十數日之內即可達厦門斯事甚屬緊要嗣後出海米石交與江南浙江總督巡撫提督總兵官嚴行禁止其福建販賣米石不必禁止爾等將此旨交九卿閲過速行大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷二十六
