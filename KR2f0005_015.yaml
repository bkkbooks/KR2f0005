body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷十五武功三康熙十七年戊午正月庚辰征南将軍都統穆占奏稱呉逆自茶陵失守饋餉不給軍士胥怨民多遠避但茶陵等地方新復亟須堅守臣俟安親王等諸路兵知㑹到時相機進取湖南若逆賊韓大任等逸入楚境江西大兵宜追躡至湖南庶賊可撲滅新復地方亦得無虞上曰前命平南王尚之信率兵赴韶州㑹将軍額楚等由樂昌進宜章郴永其進兵可否尚之信等尚未奏知穆占所領陜西荆岳諸處將士皆經簡擇平定湖南惟此精兵是賴兹當逆賊窮蹙之時即宜速定湖南殄滅兇醜不可待尚之信等兵坐失機㑹至江西大兵現在征討韓大任平賊之後自有措置豈可懸揣即行指示穆占亦不必待江西兵至湖南即鼓行滅賊亟靖疆埸安親王亦宜速遣提督趙國祚赴茶陵其逆賊地方失守軍怨民遁情形可移㑹荆岳長沙大將軍王貝勒等知之二月辛未上諭兵部傅𢎞烈既以兵少請濟師平南王尚之信可發精鋭萬人多備火藥火礮速赴廣西應援將軍賴塔㑹同靖南王耿精忠選藩下兵千人竝劉進忠標兵五千人付與都統馬九玉亦令疾趨廣西從莽依圖傅𢎞烈等併力破賊莽依圖傅𢎞烈以謀勇兼備竝見倚任宜共相和洽同心協衷謀濟國事滿漢兵士務令輯睦俟尚之信馬九玊等兵及前所調將軍額楚等兵至或一路進發或滿洲綠旗分二路進發公同詳酌定議以聞三月戊寅上諭兵部頃以江西底定因命大將軍簡親王進取永州寳慶遣將軍舒恕防守韶州南雄相機而行又令平南王尚之信發兵赴廣西調將軍額楚等自肇慶赴梧州今諸路竝進滅寇恢疆正在今日總督金光祖又稱賀縣開建乃粤東門户最為𦂳要地方守此二處則兵餉可由封川輓運今閲報文將軍莽依圖傅𢎞烈自平樂回軍倘莽依圖等還至肇慶徳慶俾賊得據賀縣開建為死守之計則復圖進取良屬不易梧州諸處將不可保即恐東粤亦或至動摇莽依圖等宜固守賀縣開建諸處如遇有機㑹可乗即行前進金光祖督運糧餉以給大軍毋致有悞甲申上諭議政王大臣等曰岳州前後船艘多於賊數倍合此船破敵何難之有乃尚善統大兵駐岳已經數年未一大創賊寇今大將軍安親王岳樂既克平江江西湖廣道路已通俟公温齊等兵與陜西調往之兵抵岳州日尚善可率所部大臣及每佐領兵五人赴長沙駐守令安親王率所部大臣選每佐領兵五人恢取岳州其進取岳州時應遣將軍鄂内率舟師前進陸地則令滿漢官兵實土蘆囤排列挨牌進逼賊壘晝夜火攻俾賊水陸應援不暇江之南岸石首縣城即宜攻取令水陸兵連營江岸或另立一營扼湖之險更於南潯港地方水陸立營斷賊後路安親王總統官兵相機𠞰援庶為有濟不必令舟師往泊君山無用之地若準此而行斷賊餉道必能克取岳州矣乙酉上諭議政王大臣等曰韓大任既抵福州其江西追𠞰官兵度已回汛大將軍簡親王宜乗此機㑹統率大兵亟𠞰湖南逆賊一應機宜可與將軍穆占定議或併力㑹𠞰或分道進發相機速行一面奏報尋征南將軍都統穆占奏請令簡親王兵與臣所部兵㑹合一路自茶陵取郴州耒陽諸處即自永州渡江直向衡州上曰簡親王整頓軍馬速與穆占㑹合詳加籌畫令江西萬無他虞保固茶陵諸處及大將軍安親王後路然後㑹師一路進發平定湖南其䕶軍統領哈克山追𠞰韓逆直抵福建軍士馬匹羸乏可將現在南昌馬一千解至簡親王軍前均給缺馬軍士又諭曰今逆賊侵犯潯州諸處梧州髙州所闗最要將軍莽依圖可駐鎮梧州若遇髙州諸處有警即行應援將軍廵撫傅𢎞烈整頓士馬俟進兵平樂桂林與將軍額楚都統勒貝署副都統穆成額同行如兵力未足許於莽依圖等兵内量調前進丙戍上諭撫逺大將軍都統大學士公圖海曰卿前疏言秦地遼濶留守兵單今當進取漢中興安之期度果萬無一失有易復之機仍行進取但秦地所係重大卿等親率大兵前進而王進寳孫思克等倚任諸臣俱在戎行脱行後更有他虞殊難遏禦宜暫停漢興之役固守所在要害廣布恩威從事招撫俟後有可取之機再行奏聞閠三月辛丑朔揚威大將軍和碩簡親王喇布奏報麻爾吉等抵吉安稱孫延齡為吳三桂所殺馬雄病死上曰馬雄孫延齡雖死其餘黨尚踞粤西理事官麻爾吉等仍同簡親王軍偕行以朕赦罪論功之意概行曉示其被脅從賊之人有悔罪投誠者即行招撫丁巳上諭兵部今當逆賊震動之際穆占急宜進兵郴州耒陽以分賊勢耒陽諸處克復即於上游渡江斷賊歸路與安親王協力𠞰寇如江未可渡則作渡江之勢畧定沿江北岸地方以張安親王大軍聲勢庚申上諭兵部據將軍穆占奏偽將軍林興珠赴大將軍安親王軍前投誠逆賊俱無固志岳州長沙相距頗近貝勒尚善必已聞知前尚善等疏稱俟添造鳥船皆至前破湖賊今方逆賊震讋之時若有隙可乗不必俟船齊備即以現在船隻進攻仍錄穆占所奏示尚善及順承郡王知之己巳定南將軍額駙華善奏稱茶陵為江西門户重地將軍穆占留兵甚少恐吳逆乗間自衡州出犯安仁攸縣諸處請増發大兵為防禦計上曰茶陵攸縣闗係江西全省將軍穆占因聞安親王渡江故率兵深入乃安親王實未渡江倘逆賊間道來侵江省可慮簡親王與將軍華善前鋒統領希佛學士薩海等共商鎮守茶陵諸處以兵付䕶軍統領哈克山由穆占進兵之路急行追及併力破賊穆占軍前聲息及逆賊情形簡親王不時奏報四月甲戍上諭議政王大臣等曰韓大任之兵新經招撫不宜聚處一軍著大將軍康親王叅贊大臣將軍耿昭忠及該督撫提等詳議將撫提標舊兵與新附之兵相叅配合以足兵額其統轄官員著該督選擇題補五月庚子朔上諭兵部詹事宜昌阿奏稱水陸大兵進攻岳州貝勒尚善等宜熟計萬全以期速克既克之日即乗虛速取常徳澧州諸處勿令賊得為備尚善等前以所在逗留貽悞大事今宜殫心竭力勉圖自効毋得仍蹈前轍玩日稽時六月壬辰上諭兵部覽大將軍簡親王等奏逆賊以大隊犯永興有必死之形由我軍每佐領一二人或數百人所在遣防兵勢太分以致失利將軍穆占大將軍簡親王其速收可緩之地所有防兵還駐要害㑹合羣力大創永興賊鋒務期剪滅凡摧寇破賊必審已量力可擊則擊之如賊衆我寡即宜調集諸路合為一軍壯其聲勢以圖攻𠞰倘株守新復城池以已經駐鎮憚於旋師遲留疑畏於大事殊無所濟爾部明白移文速𫝊示穆占簡親王知之乙未上諭征南將軍穆占曰今逆賊既併力郴永將軍穆占可盡撤閒地防兵擊敗犯郴賊寇保固廣東江西勿致疎虞并令大將軍安親王速遣兵赴大將軍簡親王軍至日簡親王等大振軍威𠞰除郴州永興之賊更令廣東韶州總兵官尚之瑛遣副將一員率樂昌綠旗兵二千速赴郴州聽穆占隨宜調遣仍授和碩額駙華善將軍印馳至永興總統鎮守以署副都統多諾叅贊軍務至於碩岱等失利即宜逮繫嚴加處分但因穆占調取官兵所在分防致兵力單薄遂爾失機其悞事之罪穆占及碩岱俱不可辭碩岱等各暫留原任立功贖罪是日上諭康親王傑書等曰頃聞海澄援師退回朕心甚為被困官兵憂之此非尋常事宜奮力急為救出切勿遲疑畏難滿漢官軍閒散人及厮役有能倡率衝敵直過潮溝抵於海澄救出被困官兵者准克復上等府城例從優議叙給以官職將軍以下將士即從前屢有失利退縮之罪俱從寛宥不必顧戀城池但使被困官兵得出即為克奏膚功也大將軍康親王將軍賴塔喇哈達總督姚啟聖提督石調聲等概行曉諭滿漢官兵期慰朕懐丙申上諭兵部將軍穆占大將軍簡親王克復永興茶陵等九州縣之地我兵立營及賊壘所在令詳悉繪圖具奏岳州水陸駐兵形勢并賊所立營亦令詹事宜昌阿詳悉繪圖具奏七月甲辰上諭議政王大臣等曰據福建所報海賊劉國軒等攻取同安水陸犯泉州前大將軍簡親王奏永興諸處賊勢稍退已飭將軍穆占撤閒地之兵鎮防險要而大將軍安親王所遣援師已抵攸縣岳州大兵復水陸齊舉賊欲深入能不懼歸路阻絶耶向以永興警急江右可虞因令署副都統岳爾多率師赴江西今閩中事迫岳爾多仍率師赴福建并移文江浙督撫將軍等速各撥馬千匹給岳爾多兵俾兼程馳往副都統馬思文自京率往漢軍兵四百名亦與岳爾多同行移文大將軍康親王備夫船於浦城迎取大兵勿致有悞將軍王之鼎標兵六百名不必率往福建可仍留京口現今所發漢軍兵一千令副都統官保率赴江西南昌俟陜西所遣兵至江西視何處當用即協力從事竝移㑹將軍穆占大將軍簡親王知悉是日上諭兵部福建海逆猖獗事勢急迫因令前赴江西署副都統岳爾多仍率兵赴福建江西闗係重大其傳示將軍穆占大將軍簡親王等今前進擊賊尚非至急惟擊退侵犯永興諸處逆賊俾不能進薄江西福建乃為最要穆占等其同心詳酌力禦賊寇保固江西使萬無一虞以副朕懐辛酉上諭兵部頃因海逆猖獗侵犯漳泉已調靖南王耿精忠侍郎達都率潮州兵往援今若撤還副都統尚之璋則潮州止餘總兵官馬三竒駐守宜令尚之信速趣提督侯襲爵前赴潮州并量發官兵以補尚之璋之缺同侯襲爵馬三竒協力固守又諭曰海逆犯漳泉事在廹急浙江總督李之芳廵撫陳秉直量留兵守浙江而於各營兵内酌便抽選二三千人遣往延平至浙江兵丁屢經調發福建浙地兵力單薄該督可召募有資力壯健兵丁五千人分隸各營壬戍上諭安逺靖寇大將軍多羅貝勒尚善曰我船甚多諸將亦衆公溫齊副都統杭竒徳業立等似宜酌遣一員於陸路賊雖各路赴援諒皆小舟少有巨艘况巨艘非旦夕可成我沙船兵亦宜抽調陸地調時毋令賊覺諸路調來綠旗之兵酌量令屯九貴山或貝子章泰或公温齊副都統杭竒以一人駐守立營之時仍宜兼顧三眼橋地方賊若遁走即宜進𠞰葢兵貴神速也貝勒等視賊得毋藐忽賊雖非我敵猶必慎為之防至岳州一克即宜分兵往取湘隂長沙前雖有敕㫖命克復岳州之後即進取常徳澧州今思深入常澧賊或襲我後饋餉不易渡馬亦難總宜臨時相機而動至於賊船僅四十餘我船甚多宜載火器於小舟乗夜擾之勿使寧息近岳州安塘筆帖式報我兵奪賊一船復沉其一船詹事宜昌阿身在彼地嗣後一切應報事宜可悉奏聞八月甲申上諭議政王大臣等曰今日之事岳州最要不可不速行攻取乗此民心讐賊羣相内嚮之時朕欲親統六師躬行伐罪若逾此機恐滿兵不耐水土因而挫鋭所遣諸將軍破賊無期後雖勉圖終成掣肘國家所賴在於僉謀此外如有早戡逆亂救民水火之策竝宜預籌爾等其詳議之九月辛丑上諭議政王大臣等曰覽大將軍簡親王等奏逆賊吳三桂已死渠魁既殞賊必内變諸路將軍宜乗時各統大兵分路進𠞰克復疆圉永興賊既遁去簡親王宜由茶陵赴安仁進逼衡州其永興官兵勞苦已久可駐茶陵諸處暫息自陜西調來副都統夸岱所領每佐領兵二人不必遣赴茶陵即留岳州軍前大將軍貝勒察尼等務水陸夾擊速取岳州戊申上諭兵部吳三桂已死諸逆潰變之際宜急取岳州動支如許錢糧營治舟艦入湖三月餘況將軍林興珠獻策甚明俟湖水盡涸我船與賊船俱無所施彼時多掣舟師無不足用我之戰艦兵卒頗屬有餘豈可推諉使大事中阻今宜於南靖港君山髙家廟諸處俱立營壘斷賊糧道務湏困取岳州至於君山髙家廟諸處既需大隊應令副都統官保所率之兵毋往江西改赴岳州聽貝勒察尼調遣如舟師必難久頓湖中其速以狀聞甲子上諭兵部乗此逆賊驚擾之時大兵亟宜前進𠞰撫竝用綏定疆圉授平南王尚之信為奮武大將軍統兵赴永興郴州諸處㑹合大將軍簡親王將軍穆占等併力同心以圖進取將軍莽依圖額楚傅𢎞烈總督金光祖等各駐本汛相度機宜規定廣西應給尚之信敕印準滿洲大將軍等例遣内閣官員齎往十月丙申湖廣廵撫張朝珍奏稱各路軍前投誠官兵發臣標効力者甚衆其間臧否莫辨請以臣標投誠効力各弁竝嗣後自軍前𤼵來官兵分布安插於江南河南内地上曰今值𠞰撫竝用之時若以現在武昌投降官兵安置江南河南誠恐後此來歸者必致疑畏不前大將軍順承郡王貝勒察尼等其勿令若輩聚處隨宜分布安置於湖廣諸處俾各得其所十一月辛亥上命加山東按察使何毓秀太常寺卿工部郎中張光岳太僕寺卿奉天府治中佟啓聖通政使司左通政安邱縣知縣胡端通政使司左叅議行人司行人崔啓元鴻臚寺卿武鄉縣知縣齊漳通政使司左叅議各齎敕諭往諸路大將軍軍前招撫陷賊官員兵民敕曰自逆賊吳三桂煽亂以來所在官民多被誘惑故陷身賊中莫能自㧞朕已洞悉情形屢頒敕諭廣示招徕開其自新之路今逆首吳三桂已伏天誅念在彼脅從文武官員兵民人等皆朕赤子素受國家恩養必非甘心從逆或志存忠義遲回待時或勢被迫驅無由歸化朕甚憫焉茲特命爾等齎敕往陜西大將軍長沙大將軍岳州大將軍征南將軍揚威大將軍荆州大將軍等軍前特行招撫爾等曩在滇黔素多親識易於開導必相信從須宣布徳音相機勸諭務令陷賊人員翻然悔悟爭先来歸有密謀内應擒斬賊渠及率領兵民獻城納欵者俱赦其前罪論功敘録加恩安插俱令得所煌煌諭㫖昭如星日爾等奉茲委任務須殫心籌畫勿失事機或親身徑前招撫或先遣人曉諭後乃親往俱同各將軍等酌量而行若招撫成功量功大小從優議敘加恩爾等其勉圗報効以副朕定亂安民至意康熙十八年己未正月甲子上諭兵部頃筆帖式馬爾賽去時令其傳諭諸將軍今岳州既經克復應發兵一枝從荆河口渡江立營於華容石首之地以為根基若由華容石首前往常徳澧州一路水潦難行且諸將軍亦曽奏此路水澤甚多艱於前進今在岳州滿漢官兵甚多宜乗賊未及固守湘隂之先水陸竝進乗機急取湘隂即望長沙進發若少遲疑觀望則賊堅守城池湘隂江中水洲恐賊立營其上預備火器我舟師欲過甚難不可不乗其未及堅守城池江洲之先急取湘隂也岳州地最險阻偏師足守其取湘隂往長沙應令貝子章泰署前鋒統領杭竒率每佐領滿洲甲兵十名提督桑額總兵官萬正色全率所部兵并多發緑旗兵整備大礮鳥鎗火器水陸夾攻著行文大將軍貝勒及安親王等知之二月戊辰安塘筆帖式報大將軍安親王岳樂已復長沙今亟進取衡州上諭貝勒察尼等曰賊失岳州長沙諸要地正當驚惶騷動之時乗機進取衡州擊滅逆賊殊為要務宜將岳州所有大兵并船礮速行多撥増發大將軍安親王軍前大將軍貝勒察尼等除先遣總兵官張忠標兵外今更速發滿洲大兵多撥船礮迅赴長沙此𠞰滅衡州賊衆較諸處不同所調岳州舟師火器早至一日於大事有一日之益調遣船礮官兵如或稍遲使賊江中置樁預為堅守阻我舟師致遲進取衡州事機則皆貝勒察尼悞之也諭到貝勒察尼即撥舟師火器速發安親王軍前於滅賊機宜勿致有悞其大將軍簡親王等亦已率兵進取衡州兩軍相合之後總用大將軍安親王印信協力𠞰滅逆孽恢復衡州諸路如有分兵之處仍各用大將軍印信施行甲戍先是海逆鄭錦乗耿精忠叛竊據漳泉諸郡後耿精忠降諸郡以次收復鄭錦屢敗仍遁入海而厦門金門猶為所據上欲乗勝蕩平海逆乃厚集舟師規取厦門金門二島以圖澎湖臺灣又以曩時征取厦門金門曽用荷蘭國夾板船特諭荷蘭國王令具夾板船二十艘載勁兵協力攻取二島至是奉命大將軍和碩康親王傑書等議奏戰艦水師未備荷蘭國舟師又不能預定来㑹時日海賊現據海澄厦門之固勢難急圖上曰征𠞰海寇調發滿洲綠旗官兵甚多福建經制兵外又増兵數萬授水陸提督為將軍以統之宜乗此兵力速行進討若如大將軍康親王所奏需以嵗月則供億煩費必將撤還大軍海寇何由殘滅其令康親王㑹同將軍總督廵撫提督等詳議以聞是日上諭平南王尚之信等曰今長沙岳州諸處俱已恢復偽將軍總兵文武官員船艦兵卒来歸者甚衆又彞陵州對岸之鎮荆山盤踞賊寇盡行潛遁分逐諸路潰敗之賊多所斬戮大將軍順承郡王等已渡江平定湖南安親王又進取衡州諸處宜乗此各路賊寇渙解之際平定廣西大將軍平南王尚之信將軍莽依圖舒恕額楚傅𢎞烈總督金光祖等勿失事機速定廣西乙亥上諭大將軍和碩康親王傑書等曰剪滅海寇事綦重要其令江南浙江總督京口將軍發江浙戰艦各百艘於進𠞰期内送至福建仍許福建增兵二萬大將軍康親王等并檄荷蘭國迅調舟師務令如期而至庚辰上諭議政王大臣等曰今岳州彛陵之賊以舟来降長沙之賊焚舟潰遁諸處賊寇困蹙逃竄無有舟楫宜固守荆襄乗機速滅賊黨貝勒察尼酌留官兵於岳州水陸齊進速㑹順承郡王軍合力亟取常徳沅州鎮逺諸處至恢復常徳諸郡之後順承郡王勒爾錦貝勒察尼等㑹同安親王簡親王等作何進取雲貴定議具奏其大兵進討雲貴宜設將軍總督廵撫提督隨大兵進征吏兵二部開列應補者以聞三月庚戍上諭奉命大將軍和碩康親王傑書等曰頃因定海舟師少已特増兵今荷蘭國人為寇所阻何以不行撲滅俾得前行音問既未能通舟師必不能如期而至如此則我兵遇有機㑹可不俟荷蘭舟師即進𠞰耶抑必俟彼船至日方舉事耶茲以𠞰蕩海寇増調師旅修理戰艦糜費軍餉甚多大將軍王等宜規取厦門金門速靖海氛不必專候荷蘭舟師四月壬午上諭議政王大臣等曰覽學士孔郭岱等奏報廣西悉已底定宜速移文令簡親王及穆占等之兵不必進廣西但莽依圖舒恕額楚等兵力稍單簡親王及穆占等兵内選有馬精兵每佐領三人或四人遣前鋒統領希佛率赴莽依圖等軍前於通雲貴要路宜從何路協力前進公議進發至於廣西現無官兵平南王或宜同大兵前進或宜駐廣西適中要地亦同將軍大臣等共議而行其彛陵兵徒爾坐守似屬無用宜整繕甲兵自歸州巴東作進兵狀以制之巴爾布本在彛陵即遣彼往歸州巴東効力并令都統噶爾漢等率兵同總督楊茂勲提督佟國瑶等前進宜由何路協力撲滅山賊或規取興安聽其酌量而行康熈十九年庚申正月戊戍上諭議政王大臣等曰進取四川以滿洲大臣為後應最為要策宜令將軍吳亶繼將軍王進寳軍之後將軍鄂克濟哈繼將軍趙良棟軍之後陜西已有將軍張勇提督孫思克廵撫杭愛巴錫等鎮守宜令大將軍圖海帥師前赴漢中接濟進蜀諸軍糧餉鄂克濟哈率漢中滿兵馳往合之吳亶官兵均分統率以為王進寳趙良棟後繼轉餉源源不絶相隨而進丁未上諭議政王大臣等曰將軍趙良棟攻克白水壩青川招撫龍安成都指日可復將軍王進寳亦分兵三路於正月初旬進逼保寧逆賊王屏藩等困迫必各潰遁其移檄嚴飭楊茂勲徐治都等乗機急取重慶䕫州𠞰禦逆寇如遲延觀望悞此事機嚴治其罪甲寅上諭議政王大臣等曰將軍趙良棟等軍深入四川保寧重慶䕫州諸處速宜平定將軍吳亶王進寳等軍雖抵保寧必於蟠龍山相對立營果爾則恐稽時日今宜面蟠龍山分兵堅壘别遣一軍渡昭化江壁錦屏山下滿漢兵合勢以規取重慶䕫州若下重慶諸處則保寧賊兵歸路阻絶可計日而克假使賊衆勢迫来降則民免重困而全蜀亦不久大定矣二月辛酉朔上諭議政王大臣等曰今成都保寧皆已恢復宜乗此機會速定雲貴四川既平湖廣已屬内地其令順承郡王勒爾錦貝子準達都統范達禮等盡率所部兵泝流而上規取重慶順承郡王等即於重慶駐守將軍吳亶鄂克濟哈與趙良棟等同進取雲貴吳亶鄂克濟哈於順承郡王軍中簡精鋭馬兵將之前行總督楊茂勲提督王之鼎駐守成都將軍王進寳駐守四川徐治都還軍守彛陵荆州等處丁卯上諭議政王大臣等曰成都保寧順慶諸府今已恢復四川底定湖廣大兵今正分道進定雲貴其廣西滿洲緑旗大兵休息日久亦當乗機速進大將軍簡親王留每佐領兵一人於桂林其餘官兵盡率之往屯栁州大將軍平南王可駐守貴縣將軍莽依圖馬承廕都統馬九玉總督金光祖等可各率所部官兵并酌調平南王藩下官兵分道進取雲貴庚辰上諭議政王大臣等曰今四川底定大兵宜速赴重慶進取滇黔否則逆賊復犯重慶亦未可料其移文吳亶鄂克濟哈即馳赴重慶精簡士馬進取雲貴三月癸卯上諭兵部頃簡親王喇布奏馬承廕反叛恐此賊自廣西侵犯廣東今閩疆悉定可令將軍賴塔即率滿兵二千馳赴潮州防守廣東全省己酉上諭議政王大臣等曰今楓木嶺辰龍闗俱已恢復四川廣西悉皆底定雲貴不日可平若行招撫更可速定雲貴人民得早安其生張起龍本吳三桂屬下之人宜使招撫雲貴可貰其罪著捧敇前往七月辛卯上諭兵部初馬承廕及所部官兵背叛蹂躪疆土擾掠生民罪惡已極後見湖南平定廣西恢復窮迫請降朕欲生民早獲寧息悉貰前罪封以伯爵授為將軍仍令管兵標員亦分營補用及大兵規取雲貴無故背恩復叛致悞征討大事今因兵敗勢蹙復窘急来歸令内閣學士薩穆哈速往撥滿漢官兵押送馬承廕及標下守備以上官來京其標兵令督撫提鎮等分隸各營汰其老弱回兵亦宜散置切勿令其黨聚廣東諸處被難人民詳察遣還故土提督哲爾肯可屯駐栁州八月庚申上諭兵部厦門金門諸處悉設兵鎮守福建大兵宜量行撤還將軍喇哈達副都統馬思文率千人守福州副都統紀爾他布倭申巴圖魯率千人守漳州兩軍悉令喇哈達統轄餘兵一千令尚書介山侍郎吳努春率之回京又諭曰閩省近海要區總督提督標下可各設五營兵五千人廵撫標下設二營兵千五百人至通省防守兵依舊額留五萬一千七百五十人餘一萬九千九十五人俱行裁汰提督駐鎮海澄其銅山厦門諸處分設總兵官副將鎮守現在水師留二萬人其餘五千人亦行裁汰己巳上諭兵部廣東省會地闗重要合計廣西現有大將軍簡親王兵及將軍莽依圖兵與都統馬緝等率往之兵每佐領共有二十八人今宜檄簡親王令簡軍中精騎每佐領五人俾副都統博濟率之馳赴將軍賴塔軍協守廣東省城并檄馬緝速赴簡親王軍至所撤福建兵已就道者令其来京如未啓行仍暫留福建總漕帥顔保現在江西吉安令率所部速赴廣東視南雄韶州何地𦂳要酌量駐鎮以安輯人心壬申上諭揚威大將軍和碩簡親王喇布曰聞南寧距雲南邊界路僅七站向因逆賊尚之信馬承廕背叛或未可輕進今若輩皆已無濟復何所瞻顧而遲延也現在廣西滿兵每佐領幾三十人宜精選强壯有馬者十人益以綠旗官兵協力進𠞰賊可立破矣王其速圖之進兵之時令巴爾堪哈爾哈齊為夸蘭大責以軍前報効閏八月己丑上諭兵部今進取雲貴為期已近將軍吳亶率兵進瀘州取合江仍兩路進取雲南湖廣大將軍將軍總督等宜速取貴州大將軍公圖海等趣所調陜西兵往四川海潮龍感戴國恩率衆獻地先機効順可嘉授為懐忠將軍令統所部為前導破賊至賊帥張國柱李本深王㑹髙啓隆俱係舊臣或一時迫脅降賊亦未可定宜如招馬寳等例書赦罪敕馳驛發趙良棟相機招撫陜西四川督撫等速運糧餉毋悞兩路大兵進𠞰機宜九月乙丑上諭議政王大臣等曰據將軍噶爾漢等奏逆賊譚𢎞率衆至巫山譚𢎞小醜耳我兵但奮力進擊彼自澌滅將軍噶爾漢提督徐治都等其溯江而上速定疆圉大將軍貝子章泰等果如前疏訂期亟進克復貴陽賊勢何至滋蔓今宜令章泰同將軍蔡毓榮等於文到日速進取貴陽以圖遵義四川諸將若能奮擊雲南貴州出犯之賊則譚𢎞無所逃匿自當摧陷今宜令專意進𠞰勿復觀望前此曽命總督哈占馳赴將軍吳亶軍今宜令由保寧江直進破譚𢎞以會吳亶并行文大將軍圖海酌發軍中滿漢兵為之聲援以分賊勢至運餉四川不由彛陵江俱自陜西轉運敘州兵餉度可無虞頃令護軍統領佟佳等率増發四川滿兵赴原指之地其漢軍官兵一千人文到日即由荆門州一月内赴彛陵鎮守著户部郎中額爾赫圖馳赴彛陵趣將軍噶爾漢等兵速滅譚𢎞諸賊額爾赫圖凡事俱準蘇赫臣例以行吏部郎中范承勲亦馳驛追及副都統張長庚軍趣其兼程而往一月内抵彛陵范承勲仍自彛陵趣官兵追及噶爾漢等軍與額爾赫圖同趣官兵擊賊大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷十五
