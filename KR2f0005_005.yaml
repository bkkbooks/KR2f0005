body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷五聖學康熙九年庚戌十月丁酉上諭禮部帝王勤求治理必稽古典學以資啓沃之功朕於政務餘閒惟日研精經史念經筵日講允屬大典宜即舉行爾部其詳察典例擇吉具儀以聞康熙十二年癸丑二月丁未上諭學士傅達禮等曰人主臨御天下建極綏猷未有不以講學明理為先務朕聽政之暇即於宫中披閲典籍殊覺義理無窮樂此不疲向來隔日進講朕心猶然未愜嗣後爾等須日侍講讀闡發書㫖為學之功庶可無間三月甲戌上諭學士傅達禮曰朕以修葺宫殿明日移駐瀛臺暫留數日夫進講所以致知蓄德期於日新未容少間講官其日至瀛臺如常進講又諭曰學問之道在於實心研索使視為故事講畢即置之度外是徒務虛名於身心何益朕於諸臣進講後每再三紬繹即心有所得尤必考正於人務求道理明徹乃止至聽政之暇無間寒暑惟有讀書作字而已因御書一行賜觀曰人君之學不在此朕非專工書法但暇時游情翰墨耳五月壬申上諭學士傅達禮等曰學問之道必無間斷方有裨益以後寒暑不必輟講九月甲戌上諭講官熊賜履曰朕觀爾等所撰講章較張居正直觧更為切要熊賜履奏曰臣等章句小儒不過敷陳文義至於明理㑹心見諸日用則在皇上自得之也上曰講明道理乃為學切要功夫修已治人方有主宰若未明理一切事務於何取則又諭曰學問之道畢竟以正心為本熊賜履奏曰聖諭及此得千古聖學心傳矣己卯上諭講官熊賜履曰大學格物二字包括無餘但其間有根本有切要非泛騖於器數之末為支離無本之學也又諭曰天地古今大本大原只是一理故曰一以貫之然則博文約禮工夫合當如是十月戊戌上諭講官等曰人心至靈出入無鄉一刻不親書冊此心未免旁騖朕在宫中手不釋卷正為此也十一月壬申上諭侍讀學士喇沙里曰朕在宫中博觀典籍見宋儒周敦頤太極圖義理精奧實前賢所未發朕嘗極意探索究其指歸可命學士熊賜履編修葉方藹張英修撰韓菼等各撰太極圖論一篇朕親覽焉康熙十三年甲寅九月壬戌朔上諭學士傅達禮曰日講闗係重大日月易邁恐致荒踈雖當此多事之時不妨乗間進講於軍事無悞工夫不間則裨益身心良非淺鮮爾衙門議奏尋翰林院奏曰機務繁重請間一日進講上曰軍機事情有間數日一至者亦有數日連至者非可限以日期其仍每日進􅊰以慰朕惓惓嚮學之意康熙十五年丙辰二月己未上諭講官喇沙里徐元文曰嗣後經筵講章稱頌之處不得過為溢辭但取切要有裨實學其諭各講官知之十月癸酉上諭講官喇沙里等曰經書屢經講讀朕心業已熟曉通鑑一書事闗前代得失甚有裨於治道作何揀擇撰擬講章進講爾等議奏康熙十六年丁巳五月己卯上諭大學士等曰帝王之學以明理為先格物致知必資講論向來日講惟講官敷陳講章於經史精義未能研究印證朕心終有未慊前曽諭内閣諸臣或朕自講朱註或觧説講章内閣諸臣奏稱朕宜隨便發明書㫖不必預定規程今思講學必互相闡發方能融㑹義理有裨身心以後日講或應朕躬自講朱註或觧説講章仍令講官照常進講爾等㑹同翰林院掌院學士議奏癸卯上諭講官等曰爾等進講經書皆内聖外王修齊治平之道朕亦孜孜詳詢每講之時必專意以聽但學問無窮不在徒言惟當躬行實踐方有益於所學爾等仍愈加直言毋有隱諱以助朕好學進修之意康熙十七年戊午五月己未上諭講官等曰講章内言敬者德之聚朕思誠敬一理敬又為誠之本也康熙十九年庚申六月甲申上以御書賜大學士等諭曰朕萬幾餘暇留心經史時取古人墨蹟臨摹雖好慕不衰未窺其堂奧歳月既深偶成卷軸卿等佐理勤勞朝夕問對因思古之君臣羙惡皆可相勸故以平日所書賜卿等方將勉所未逮非謂書法已工也卿等其知朕意又以御書賜學士等諭曰爾等日侍講筵夙夜匪懈啓沃之暇每以朕書為請朕萬幾餘閒研精典籍間取古人墨蹟臨摹爾等既為文學侍從之臣即有成就德業之責故因所請輒以頒賜其悉朕意十月丁未上御懋勤殿親講易經噬嗑卦辭講官庫勒納葉方藹等進所撰乾坤二卦總論上覽畢諭曰卦爻之義原各不同即如噬嗑一卦中四爻主用刑者言初上二爻主受刑者言每爻各有取義必得總論發揮方覺全卦之義了然諸卦俱可倣此撰進康熙二十一年壬戌五月庚午上御乾清宫講官牛鈕等進講睽卦彖象畢上曰講義云一國非之而不顧天下非之而不顧此必認得道理真乃為無弊否則反為乖戾矣康熙二十二年癸亥八月庚子朔上諭講官等曰朕每旦未明求衣坐待部院奏事既畢然後入講不惟遲延晷刻亦且稽悞工夫自後於未啓奏前進講方得從容議論多所發明自是講官待漏宫門甫辨色上已御經筵矣辛丑上諭講官等曰經筵闗係大典必君臣交儆上下相成方有裨於治理向來所擬經筵講章但切君身此後當兼寓訓勉臣下之意庶使諸臣皆有所警省壬戌講官進講易豐卦三節上曰彖傳講章云驕心一生何所不至故聖人惕之以憂此所發明極是滿招損謙受益聖人乆安長治之道只在能持滿而已十月辛酉上諭講官張玉書曰日用常行無非此理自有理學名目彼此辨論朕見言行不相符者甚多終日講理學而所行之事全與其言悖謬豈可謂之理學若口雖不講而行事皆與道理脗合此即真理學也康熙二十三年甲子三月丁亥上諭大學士等曰朕前奉太皇太后詣五臺山覽觀山川形勢一一親歴其境每臺所製碑文出自一時結搆爾等可詳加斟酌近見漢人中有自負才髙所作文不容人㸃竄此習俗之可鄙文之所以不工也四月庚子上御乾清宫親講易乾卦亢龍有悔一節講畢諭講官等曰亢龍有悔一節何以注在不應講之列天道人事亢則有悔易中所言無非此理正宜以此為戒不必避忌以後繫辭講章不分應講與不應講俱以次逐節進講十一月乙丑上南巡泊舟燕子磯讀書至三鼔侍講學士髙士竒奏請宜少節養上諭曰朕自五齡即知讀書八齡踐阼輒以學庸訓詁詢之左右求得大意而後愉快日所讀書必使字字成誦從來不肯自欺及四子之書既已通貫乃讀尚書於典謨訓誥之中體㑹古帝王孜孜求治之意期見之施行及讀大易觀象玩占於數聖人扶陽抑隂防微杜漸垂世立教之精心朕皆反覆探索必心與理㑹不使纖毫扞格實覺義理悦心故樂此不疲耳康熙二十四年乙丑四月辛卯上諭大學士等曰從來道德文章原非二事能文之士必湏先明理而學道之人亦貴能文章朕觀周程張朱諸子之書雖主於明道不尚辭華而其著作體裁簡要晰理精深何嘗不文質燦然令人神觧意釋至近世則空疎不學之人借理學以自文其陋岸然自負為儒者究其意觧不出庸夫之見真可鄙也康熙二十五年丙寅閏四月己未上諭翰林院掌院學士庫勒納張英曰爾等每日將講章捧至乾清門預備詣講筵行禮進講為時良乆妨朕披覽功著暫停止春秋禮記朕在内每日講閲其詩經通鑑講章俱交與張英令其齎至内廷康熙二十六年丁卯四月己未上諭大學士等曰史事所闗甚重若不參看實録虚實何由悉知他書或以文章見長獨修史宜直書實事豈可空言文飾乎如明代纂修元史限期過廹以致要務多漏且議論偏詖殊乖公正俟明史修成之日應將實録並存令後世有所考據從來論人甚易自處則難若不審已之所行而徒輕議古人雖文詞可觀亦何足道朕嘗博覽羣書於古之聖君哲后未敢漫加評騭也康熙二十八年己巳二月甲子上南巡至江寧府民王來熊獻鍊丹養身秘書一冊諭扈從諸臣曰朕於經史之餘所閲載籍多矣凡鍊丹修養長生及師巫自謂前知者皆妄誕不足信但可欺愚民而已通經明理者斷不為其所惑也宋司馬光所論甚當朕有取焉此等事朕素不信其擲還之乙丑上駐蹕江寧幸觀象臺諭學士李光地曰郭守敬儀器不可行於今由不知恒星與天動故也自古史志厯法多不可信質之以理類空言無實如熒惑退舍之説天象垂戒理則有之若果退舍後來推算者以何積算康熙三十一年壬申正月甲寅上御乾清門召大學士九卿等至御座前上取性理展閲指太極圖謂諸臣曰此所言皆一定之理無可疑論者又指五聲八音八風圖曰古人謂十二律定而後被之八音則八音和奏之天地則八風和而諸福之物可致之祥無不畢至其言樂律所闗如此其大而十二律之所從出其義不可不知如律吕新書所言算數專用徑一圍三之法此法若合則所算皆合此法若舛則無所不舛矣朕觀徑一圍三之法用之必不能合蓋徑一尺則圍當三尺一寸四分一釐有竒若積累至於百丈所差至十四丈有竒等而上之其為舛錯可勝言耶因取方圓諸圖指示諸臣曰所言徑一圍三止可算六角之數若圍圓則必有竒零其理具在目前甚為明顯朕觀八線表中半徑勾股之法極其精微凡圓者可以方算開方之法即從此出遂用方圓諸圖逐一驗算無不脗合又諭曰黄鐘之管九寸空圍九分積八百一十分是為律本此舊説也其分寸若以尺言則古今尺制不同自朕觀之當以天地之度數為準至隔八相生之説聲音髙下循環相生復還本音必湏隔八此一定之理也隨命樂人取笛和瑟次第審音至第八聲還本音上曰此非隔八相生之義耶以理推之固應如是又諭曰算數精密即河道閘口流水亦可算晝夜所流分數其法先量閘口闊狹計一杪所流幾何積至一晝夜則所流多寡可以數計矣又命取測日晷表以御筆畫示曰此正午日影所至之處遂置乾清門正中令諸臣候視至午日影與御筆畫處恰合毫髪不爽諸臣等奏曰臣等今日仰承聖訓得聞所未聞見所未見不勝懽慶之至康熙三十三年甲戌五月甲寅上諭翰林院朕流覽載籍見分類諸書雖各有所長尚多未備唐類函可謂詳贍然唐以後典故藝文亦未採録可依唐類函體例自唐迄明輯成完書以資觀覽閏五月戊辰上諭大學士等曰古先聖賢所著訓詞於學者礪行之道讀書之法居官治民之事無不該備果能孳孳行之自有無窮之益康熙三十六年丁丑七月甲午上諭殿試讀卷諸臣曰作文者無不論理然徒能言而不能行亦奚益哉朕觀性理一書大指只一誠字人可不以誠自勉乎康熙四十一年壬午五月丙午賜大學士九卿翰林詹事科道官一百四十餘員御書有差諭曰尋章摘句華麗詞藻非帝王之本朕四十餘年惟日兢兢未嘗晷刻稍釋萬幾自警有始無終之誚念兹在兹也政事稍暇頗好書射歴年以來所積臨摹字幅以賜卿等十月壬午翰林院侍讀學士陳元龍等遵㫖各書綾字一幅進呈上諭曰學書湏臨古人法帖其用筆時輕重疎密或疾或徐各有體勢宫中古法帖甚多朕皆臨閲有李北海書華山寺碑字極大臨摹雖難朕不憚勞必臨摹而後已朕素性好此久歴年所毫無間斷也康熙四十二年癸未四月戊戌上發出大學士熊賜履所呈明神宗熹宗以下史書四本諭大學士等曰朕自沖齡即每事好問明時之太監朕皆及見之所以彼時之事朕知之甚悉太監魏忠賢惡跡史書僅記其大略而已猶未詳載也明末之君多有不識字者遇講書則垂幔聽之諸事皆任太監辦理所以生殺之權盡歸此輩也又諭曰此書所載楊漣左光斗死於北鎮撫司獄中聞此二人在午門前受御杖死太監等以布裹尸出之至於隨崇禎殉難者乃太監王承恩因此世祖章皇帝作文致祭並立碑碣此書載太監王之心從死明係錯悞至於本朝興兵聲討之故書内並未記載可問熊賜履王鴻緒等康熙四十三年甲申六月丁酉上諭講官等曰古今講道學者甚多尤好非議人彼亦徒能言之而言行相符者葢寡是以朕不尚空言斷不肯非議古人何以言之葢人各有長短棄短取長始能盡人之材若必求全責備稍有欠缺即行指摘此非忠恕之道也故孔子當時惟節取人之善隱諱人之短凡事求諸己不非諸人是豈可少容私意於其間乎又人見講道學之人或不見用輒為太息以為果見用必有可觀此亦徒見其空言而云然也若果見用言行亦未必相符惟宋司馬光編輯資治通鑑論斷古今盡得其當而後之論者反未嘗置諸講道學之列司馬光乃宋朝名相言行相符由此以觀不在空言也故君子先行後言果如周程張朱勉行道學之實者自當見諸議論若但以空言而講道學斷乎不可朱子洵稱大儒非泛言道學者可比擬也七月乙卯上諭大學士翰林等官曰朕自幼好臨池每日寫千餘字從無間斷凡古名人之墨蹟石刻無不細心臨摹積今三十餘年實亦性之所好即朕清字亦素敏速從無錯悞凡批答督撫摺子及硃筆諭㫖皆朕親書並不起稿其事之稍有闗係者雖歳月經久亦不遺忘故批發之㫖俱存所司朕處全無底稿也八月庚午上諭大學士等曰朕覽過之書雖日月間隔不甚遺忘今雖年歳稍増而記性更進即目前陳列諸書内欲稽考某卷某字但指令近侍取之亦可即得不至錯悞大約存心清虛不但事不遺忘於養生亦為有益十一月己亥上諭欽天監初一日日食朕用儀器測驗午正一刻十一分初虧未初三刻二分食甚申初一刻復圓查七政厯未初三刻二分日月合朔新法推算必無舛錯之理此舛錯或因悞寫字畫或因算者忽略將零數去之太多亦未可定著詳察明白具奏壬戌上諭大學士等曰明史闗係極大必使後人心服乃佳宋史成於元元史成於明其中是非失實者多是以至今人心不服有明二百餘年其流風善政誠不可枚舉今之史官或執己見者有之或據傳聞者亦有之或用稗史者亦有之任意妄作此書何能盡善孔子聖人也猶言知我者其惟春秋乎罪我者其惟春秋乎孟子又言盡信書則不如無書當今之世用人行政規模法度之是非朕當自任無容他諉若明史之中稍有一不當後人將歸責於朕不可輕忽也是以朕為明史作文一篇爾等可曉諭九卿大臣康熙四十四年乙酉十一月壬申大學士等以鄂羅斯貿易來使齎至原文及譯出之文進呈上閲之諭大學士等曰此乃喇提諾托多烏祖克鄂羅斯三種文也外國之文亦有三十六字母者亦有三十字五十字母者朕交喇嘛詳考視之其來源與中國同但不分平聲上聲去聲而尚有入聲其兩字合音甚明中國平上去入四韻極精兩字合音不甚𦂳要是以學者少漸至棄之問翰林官四聲無不知者問兩字合音則不能知中國所有之字外國亦有之特不全耳康熙四十五年丙戌十月丁未上諭大學士等曰翻譯之事大有闗係向年纂修實録所譯朝鮮表文滿漢文意皆不相符前大學士圖海杜立德呈朕親覽朕兩年苦心尋譯始得將文義完羙作史之事殊為重大一字不可輕易増減也康熙四十六年丁亥六月己酉上諭大學士等曰朕觀醫書與儒書不同儒者之書皆言五倫之理作文者據以發揮雖文之優劣各由乎人然其理總不出五倫之外若醫書開一方於前又列數方於後果此一方盡善則彼數方者又何用乎以此揆之彼著醫書之人已自不能無疑也至藥性宜於心者不宜於脾宜於肺者不宜於腎好服補藥者猶人之喜逢迎者也天下豈有喜逢迎而能受益者乎朕從不服藥至使人推摩亦非所宜推摩則傷氣朕從不用此法朕之調攝惟飲食有節起居有常如是而已康熙四十八年己丑十一月庚寅上問大學士等曰爾等知山東碣石等山脈從何處來乎李光地奏曰大約從陜西河南來上曰不然山東等山從闗東長白山來即如山海闗與山東登萊相對渡海不過二百里中係海套凡山東泰岱諸山來脈俱從長白山來來龍甚逺不知里數至於濟水伏流三處其實不止濟水凡水發源處多是伏流黄河九曲其實不止九曲其大曲有九其小曲不知有幾千黄河從崑崙來未到積石亦是伏流即如長江之水書云岷山導江似乎江源在岷山其實不在岷山亦從崑崙來也伏流到岷山更不伏流矣此等事讀書人未必能盡知也康熙四十九年庚寅三月己巳欽天監奏京城及各省月食分數上曰朕嘗習算法天文地理靡不詳究月食三分以上者例當入奏不及三分者不奏此疏言雲南四川兩省月不食因地之體圓月之所食被其所掩而人不見若以不見之故而即書不食則人不知之矣乙亥上諭大學士等曰朕留意典籍編定羣書比年以來如朱子全書佩文韻府淵鑑類函廣羣芳譜並其餘各書悉皆修纂次第告成至於字學並闗切要允宜酌訂一書字彚失之簡略正字通涉於汎濫兼之四方風土不同南北聲音各異司馬光類篇分部或有未明沈約之聲韻後人無不訾議洪武正韻雖多駮辨迄不能行仍依沈約之韻朕嘗參閲諸書究心考証凡䝉古西域洋外諸國多從字母而來音由地殊難以牽引大抵天地之元音發於人聲人聲之象形寄於㸃畫今欲詳略得中歸於至當増字彚之闕遺刪正字通之繁冗勒為成書垂示永乆爾等酌議式例具奏康熙五十年辛卯二月辛巳上御經筵諭大學士等曰從来經筵之設皆帝王留心學問勤求治理之意但當期有實益不可止飾虚文朕觀前代講筵人主惟端拱而聽黙無一言如此則雖人主不諳文義臣下亦無由而知之若明萬厯天啓之時何嘗不舉行經筵特存其名耳何裨實用朕御極五十年聽政之暇勤覽書籍凡四書五經通鑑性理等書俱曽研究每儒臣逐日進講朕輒先為講觧一過遇有一句可疑一字未協之處亦即與諸臣反覆討論期於義理貫通而後已蓋經筵本係大典舉行之時不可以具文視也四月甲戌上諭大學士等曰朱子全書凡天文地理樂律厯數俱非泛然空論皆能確見其所以然之故朕常細加尋繹欲求毫釐之差亦未可得即如徑一圍三畸零之數講論已自通徹尚有留待後人參考之語其虚心不自是如此黄鍾之管朕曽試過葭管飛灰未經候騐但南北地形髙下不同一時難於定準今如暢春園距京城觀星臺地形便微有不同至於各省或同此一時未必同此一刻矣十月辛未上諭大學士等曰天文厯法朕素留心西洋厯大端不悞但分刻度數之間乆而不能無差今年夏至欽天監奏聞午正三刻朕細測日影是午初三刻九分此時有舛錯恐數十年後所差愈多猶之錢糧微塵杪忽雖屬無幾而總計之便積少成多此事實有証驗非比書生作文可以虛詞塞責也康熙五十一年壬辰十月癸亥上諭大學士李光地曰爾曽以易數與衆講論乎算法與易數脗合朕在淵鑒齋凡閲諸書必求其實曽將算法與朱子全書對較過今人看正書者少宋儒講論性理亦未嘗不作詩賦但所作詩賦皆純厚朱子以蘇軾所作文字偏於粉飾細閲之果然若看聖賢講論性理諸書雖賦性魯鈍及至日就月將定有裨益康熙五十二年癸巳七月乙卯上諭大學士等曰今算法律吕等韻探究本原皆已明晰黄鍾為最要凡數學以及斗斛尺度無不繫乎其中也九月庚午上諭大學士等曰朱子全書四書註觧刻竣可速頒行又諭曰孟子云排淮泗而注之江朱子謂淮水不入江古今水道不同當時淮水或有入江之跡後來湮塞亦未可知孟子必無錯處李光地奏曰臣等止知導淮自桐栢㑹於泗沂東入於海皇上此論誠發千古所未發也上曰爾等傳諭九卿有真實留心性理正學之人各舉所知康熙五十三年甲午四月癸酉上諭和碩誠親王允祉等曰古厯規模甚好但其數目歳乆不合今修厯書宜依古之規模用今之數目為善十月己巳朔上諭和碩誠親王允祉等曰北極髙度黄赤距度於厯法最為𦂳要著於澹寧居後每日測量康熙五十四年乙未三月乙丑上諭領侍衞内大臣等曰朕常講論天文地理及算法聲律之學爾等聞之輒奏曰皇上由天授非人力可及如此稱譽朕躬轉掩却朕之虛心勤學處矣爾等試思雖古聖人豈有生來即無所不能者凡事俱由學習而成務學必以敬慎為本朕之學業皆從敬慎中得來何得謂天授非人力也康熙五十五年丙申三月乙巳上諭大學士等曰朕常立小旗占風并令直𨽻各省凡起風下雨時一一奏報見有京師於是日起西北風而山東於是日起東南風者古人云隔里不同風此言最確又嘗考騐雷聲不出百里之外易云震驚百里若霹靂則不過七八里也至於礟響竟聞二三百里從前蘆溝橋演礟天津皆聞之此其驗也書籍所載雖不可盡信然亦有鑿鑿可憑者書中云北方苦寒之處冰結十丈春夏不消今果有其地又淵鑑類函有云磎䑕有重至萬觔者今亦有之其身如象其牙亦似象牙但稍黄耳此皆與古書相符者也又諭曰地理上應天文宋儒云天下至大不可執中國地方推算其言甚精而有理中國山脈皆由崑崙而來彼地方四面有江土人呼崑崙為枯隴又云疆地推算天象中國與瀚海俱在赤道四十五度之内四十五度之南水皆向南而東流四十五度之北俱向北流此皆天文地理相合之處也康熙五十六年丁酉四月乙未上諭大學士等曰朕每讀書至風不鳴條雨不破塊二語不能無疑所謂雨暘時若是矣若雨竟不能破塊可乎㸃綴文章無所不可如講到實際不能無議也即如東南西北之風朕細加體驗俱從旁來下雨亦有時候每月十八二十二二十四等日朕留心占驗徃徃有雨惟京師雨澤每年至四月或畧愆期耳隂晴雨雪地方時候各有不同如雲南貴州四川廣西等處從未以旱潦報荒朕御極以來每年北地之雪不過三四寸許從未見有盈尺者昔年南廵在浙江曽見有尺許之雪此外從未之有也七月戊辰上諭大學士等曰朕前閲太宗文皇帝實録所載戰敗明朝滿貴何雲龍馬登雲孫祖夀四總兵時天正大霧人覿面不相見敵營大礮鳥鎗施放不絶樹木枝葉皆燬太宗文皇帝恐我兵受傷遣副都統覺羅艾塔徃視艾塔回奏曰敵之火礟鳥鎗止損樹木我兵並無傷者可見上天祐䕶非人力所能至也夫天象最難揣測而機之所動亦可預知朕少年時在興安嶺上行茂林中雷聲漸迅乃避出茂林震雷忽作少頃雷止遣人徃視樹木皆為所擊此乃朕親歴之事也大學士等奏曰向者皇上駐蹕湯泉時傳諭作速移出樹林甫經移定迅雷立至衆人無不驚異上因諭左都御史徐元夢等曰朕嘗留心格物之學如霹靂碪形質各殊隨地而異今各䝉古瀚海沙漠等處嘗拾得銅鐡或如鎗頭或如箭鏃錐刀之類者葢雷斧也雷書云雷斧銅鐡為之盛京烏喇諸地則皆石色微青黑而通明映之瑩如玻璃其在西洋者石色沉緑明澈無異此雷楔也博物志云人間徃徃得石形如斧刀名霹靂楔者是已又有雷墨雷鑚雷鎚不過以狀異名要皆金石質也唐人雜記謂玉門西有雷廟國人年年出鑚以給雷用是誠謬言夫雷火所至萬物俱化斧楔乃雷氣之所化耳其或金或石者隨地氣而使然也八月乙酉上諭大學士等曰朕徧覽明代實録未録實事即如永樂修京城之處未記一字史臣但看野史記録錯悞甚多朕又覽史記漢書亦僅文詞之工記事亦有不實處即如所載項羽坑秦卒二十萬夫二十萬卒豈有束手待斃之理乎十一月丙子上諭大學士等曰為君之道要在安静不必矜竒立異亦不可徒為誇大之言程子曰人不學為聖人皆自棄也此語亦屬太過堯舜之後豈復有堯舜乎昔人有言孟子不足學湏學顔子此皆務大言不務實踐者朕自幼喜讀性理書中千言萬語不外一敬字人君治天下但能居敬終身行之足矣康熙五十八年己亥二月乙卯上諭内閣學士蔣廷錫曰皇輿全覽圖朕費三十餘年心力始得告成山脈水道俱與禹貢相合爾將此全圖並分省之圖與九卿細看倘有不合之處九卿有知者即便指出看過後面奏十月壬子上諭内閣學士長夀曰朕覽邵子聲音圖於各國聲音有不能該括處朕於聲音之學究心二十餘年雖未親至鄉里而鄉里人之聲音無不悉知即如清字之音有漢字所無者漢字之音亦有清字所未備者朕將此聲音圖討論多日欲該括各國聲音斷乎不能朕以為性理精義内邵子聲音圖宜仍用漢字其清字圖可以不用䝉養齋修書舉人王蘭生諳曉音韻之學爾與之商酌觀其意見如何並將此㫖與漢大臣同閲大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷五
