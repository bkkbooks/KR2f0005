body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷二十五嚴法紀康熙三年甲辰三月庚午上諭刑部直𨽻各省民有寃抑許赴原問衙門及部院等控告如不准行方許叩閽前諭甚明近見有不赴原問衙門及部院控告竟叩閽者有已經叩閽不候原問及部院審結輒行再叩者有覔人代告者嗣後通行禁止其奸棍代人控告者論死爾部曉諭直𨽻各省軍民人等一體遵行四月戊午刑部奏流徙寧古塔犯人項知中途病故伊妻傅氏應否還原籍上曰凡僉妻流徙人犯夫死其妻免流若有子或無子有僕仍照流徙其止有一子尚未離乳者亦免或妻家兾免伊女致死其壻及惡棍欲得其妻設謀致斃作何禁止爾部詳議以聞康熙四年乙巳正月甲午上諭兵部督捕衙門向因滿洲藉家僕資生若立法不嚴必致盡行逃走不得已嚴定窩逃之法非欲以逃人之故貽害於民也今聞各地方奸棍結黨詐害報仇或指逃報部提審全虛或指稱某家窩逃審虛復扳别家或逃檔無名復改易名姓或自稱逃人解部無人識認或棍徒在地方犯罪逃京投旗希圖免罪或地方官拏獲重犯因誑稱逃人不敢加刑遷延漏網或解役與逃人結黨沿途搶掠肆行無忌或地方官唆令逃人指扳富室巧行嚇詐此等株連蔓引寃及無辜餓死道途瘐斃監獄實屬可憫何以立法使逃人可獲奸棍不得肆惡小民不受詐害著議政王貝勒大臣九卿科道詳議具奏康熙六年丁未四月戊申上諭兵部督捕衙門嚴立逃人之法因愚民窩隱旗人逃亡日衆不得已而然非欲苦纍小民也近聞有遞解逃人所過城邑村莊嚇詐搶奪及解役亦將逃人縱放借端枉道村莊同謀挾詐害民殊甚此皆由地方各官起解逃人時不嚴禁解役不將逃人嚴加桎梏之故凡城邑則有該管官員村莊則有經管約長如將挾詐搶奪者嚴拏舉首誰敢擾民以後逃人及解役若於所過地方騷擾者鎖拏送京治以重罪毋有所縱若原起解官不嚴禁解役經過地方官不行察拏事發嚴治其罪必不寬恕爾衙門即通行曉諭直𨽻各省遵行康熙七年戊申三月辛酉上諭吏部近聞在京諸臣違法遣人往各省官員處借名問候多索財物又干預地方事挾持請託顛倒是非甚為良民之害有等遊行閒棍討取官貝書札或雕刻别人圖書投見地方官員恣行欺誑此等情弊深可痛惡地方大小各官果能持己端方制行清直於此等違法干請之輩即不應所求不給財物何懼之有以後地方文武各官遇有此等遊棍應即嚴拏具奏將主使之人究出從重治罪若畏懼徇私不行陳奏被旁人訐告科道糾參將地方官一併從重治罪爾部通行曉諭王以下內外文武大小各官是日上諭刑部向來東西長安門外豎立石牌原為民有寃枉令其伸告近見奸狡棍徒並無寃抑謊揑事端誣告者多實情者少將無辜牽連苦纍又聞無賴之徒指稱叩閽在於地方恣行挾詐擾害良民是負朝廷恤民之心而開奸徒生事之路也通政使司登聞鼓衙門既許封進狀詞伸理寃枉以後內外官民果有寃抑事情著照例於通政使司登聞鼓衙門告理叩閽之例永行停止六月丁丑上諭刑部嚴禁賭博向有定例近聞官民有以此為事者廢棄本業傾敗家産深屬可惡此皆該管官員稽察不嚴或徇情護庇不行發覺所致嗣後滿漢官員軍民人等有賭博者該管官不行察出事發審實作何嚴處旁人首告者作何賞給至樗蒲等物乃敗壞人性導引為非之具將此貨賣亦屬可惡作何嚴行禁止之處一併詳議具奏康熙八年己酉五月庚申上諭吏部兵部鰲拜等以勳舊大臣深受國恩奉皇考遺詔輔佐政務理宜精白乃心盡忠圖報不意鰲拜結黨專權紊亂國政紛更成憲罔上行私恣意妄為用伊之奸黨班布爾善穆里瑪等凡事先於私家商定乃行與伊交好者多方引用不合者即行排陷種種奸惡難以枚舉朕以罪狀昭著將其事欵命諸王大臣公同究審俱已得實以其情罪重大皆擬正法奏聞朕復面加鞫問情罪俱實本當依議處分但念鰲拜纍朝效力年久且皇考曽經倚任朕不忍加誅姑從寬免死革職籍沒仍行拘禁遏必隆無結黨之事免其重罪削去太師及後加公爵其原有一等公爵仍准留與伊子其班布爾善穆里瑪等皆已正法餘皆係微末之人一時茍圖僥幸朕不忍盡加誅戮寬宥免死從輕治罪至於內外文武官員或有畏其權勢而倚附者或有身圖幸進而倚附者本當察處姑從寬免自後務須洗心滌慮痛改前非遵守法度恪共職業以副朕整飭紀綱愛養百姓至意爾二部即傳諭內外遵行六月庚寅上諭刑部設立通政使司及登聞鼓衙門原係通達民隱陳告寃抑果有寃枉事情應赴該部院衙門告理近見奸惡棍徒或以瑣細小事揑成重大或以私仇藉端陷害善良或受人雇托代為控告或擅入禁地及行幸之所衝突儀仗趨近喊告及將此等狀詞交與部院審理並無大事及寃枉之處反因被告干證將良民株連受纍者甚多前此雖行禁止今仍多有違禁妄告者以後著再嚴禁如有惡徒仍前瀆告者除所告之事不准外照律治罪八月壬戌上諭宗人府吏部兵部凡令議政王貝勒大臣㑹議之事俱係國家重大機密事務理應極其慎密今聞㑹議之事尚未具題外人即得聞知此皆㑹議處不嚴行約束閒雜隨從之人以致聽聞傳說將國家大事預先泄漏殊屬不合至於人衆愈覺繁雜其諸王貝勒長史閒散議政大臣俱著停其議政以後凡㑹議時諸王貝勒大臣務須慎密勿致泄漏著即通行曉諭嚴飭壬申上諭內大臣吏部兵部侍衛文武大小各官各有職掌理宜精白乃心恪遵法紀循分盡職以副朕任用之意近見有不安厥分交通在內近侍使令人員妄行干求或潛為援引或畏威趨奉揆之臣誼殊為不合朕夙夜圖治懲創奸佞察其忠賢才能者始行簡用豈容匪類妄行陷人以圖僥幸嗣後如有仍前干求趨奉者定行從重治罪不宥爾等即通行內外及包衣佐領嚴加申飭康熙九年庚戌三月辛未上諭兵部都察院督捕衙門京師重地理宜肅清近聞京城內外豪惡肆行無忌或借端脅詐逼取錢財或公然剽奪侵擾市肆或糾黨橫行毒毆良民又暮夜盜劫時聞而就擒者甚少此皆步軍校該巡城御史司坊各官督捕司屬捕營將辨稽察不嚴緝捕無術以致奸盜不息良民罹害今應作何嚴飭擒捕所司有怠玩者作何定罪其集議以聞康熙十年辛亥七月甲子上諭刑部近聞流徙盛京一帶人犯押解官兵將犯人妻子恣行凌辱或將人犯潛害致死以後爾部嚴飭押解官兵如有此等事發從重治罪仍傳諭户兵二部康熙十一年壬子正月庚申上諭吏部各省藩臬以下丁憂官督撫每奏稱才能請在任守制恐貪戀職任者多方營求彼此效尤有乖孝道其申明定例嗣後丁憂官督撫毋得題留悉令離任守制康熙十二年癸丑十二月癸丑上諭吏部禮部致治之道首重人才儲養之源由於學校必衡鑒得人釐剔有法乃能革除積弊遴拔真才以彰文治之盛近聞各省學差沿襲陋規隳廢職業營私作弊考試不公以致真才淪棄文治不光今應作何整飭差遣何官及磨勘考核之法何以盡善務期永革弊端著九卿科道詳確議奏康熙十五年丙辰正月丁酉上諭兵部督捕衙門逃人事情關係重大前因立法太嚴恐致百姓株連困苦故將條例屢行更改減定期於兵民兩益近見各該地方官奉行疏玩緝獲日少殊非安輯兵民之意應遣部院大臣㑹同爾衙門將新舊條例逐一詳定俾永逺遵行八月乙丑上諭吏部户部兵部邇年以來大兵諸路征𠞰軍需浩繁一切供應皆取給於民凡領兵將軍將辨及督撫文武大小各官俱當以國計民生為念潔己奉公加意撙節表率屬員恪遵法紀以副朕戡亂救民之意乃有不以𠞰寇安民平定地方為念惟圖營私射利糜費錢糧軍前所用米豆草束諸項自將軍以下有自行販賣囑託地方官多取價值地方官有徇情浮冒開銷者亦有地方官販買支放多行開銷者有已備本色不行收納折價入己者有民間運到米豆草束地方官故意遲延掯勒及至軍前又多方刁難解官恣意需索方肯收納者至於購買馬匹不開實價以少為多濫行銷算種種情弊難以枚舉皆由大小各員互相徇庇止知圖便已私殊為不合應嚴加禁飭以清積弊若仍不悛改事覺照貪官例治罪有能舉首者從優議叙丙寅上諭户部今正當軍需浩繁在外總督巡撫及經管錢糧各官俱宜潔己奉公殫心料理一應收支銷算詳明造冊據實開報聽部核議近見部覆各處奏銷本內或因欵項不符或因數目舛錯或因造報遺漏或因冊結不到多致駮察道路往返動經嵗月明係地方各官不加意清釐故留疑竇希圖延挨時日以滋弊端錢糧朦混不清民力苦纍益甚以後如何盡除積習使錢糧不致駮察爾部定議具奏康熙十六年丁巳二月己巳上諭兵部進蜀官兵並未平定地方大創賊寇且屢奉溫綸理宜戮力疆埸乃至西安布匿名札惑衆既抵隴州又妄行控告不赴平涼我國家創業以來從未有此行事統兵將領不能約束兵丁肆行不法及至京師敕令首舉倡告之人官兵又互相隱匿不舉殊干法紀此行軍功俱不准敘康熙十八年己未二月乙酉上諭刑部民間鬻身為厮養者多藉口投充營伍挾制家長勒索身契及妻子財物又有桀黠之徒乘戎馬往來之際發人塜墓或利所有或挾私仇其情罪尤屬可惡著嚴議具奏康熙十九年庚申五月庚寅上諭吏部等衙門致治安民之道首在懲戒貪蠧嚴禁科派而後積弊可清閭閻不擾近見街道衙門蠧役詐索害民又聞提督步兵衙門五城司坊街道巡捕營等衙門各官不能潔已奉公恪遵法紀縱容衙役脧削小民或沿習陋規科斂行户或借端挾詐官役分肥肆意橫行無辜受害種種弊端深可痛恨向來雖經嚴禁定有處分之例但恐小民未能悉知仍被奸徒擾害應再加嚴飭務令家喻户曉以副朕安全生民至意六月壬午上諭刑部等衙門凡大兵經過之地將辨宜嚴加約束務令秋毫無犯屢經有㫖申飭今兵丁陳德任意逗留擾害小民殺死人命該管將辨所司何事爾等不行嚴察但將陳德議斬監候其餘竟置不議殊屬未合可一併嚴加議處七月甲辰上諭兵部朕聞往來官兵所用船及人夫皆借端勒索往往額外多派折價入已沿途生事又輒將縴夫肆行鞭撻民甚苦之各該管將軍不加禁制任其妄行地方官復行苛斂希圖分取互相隱飾種種私弊甚為可惡此後合行嚴禁且此等事科道雖有風聞因無實據未便題參地方督撫又以官兵勞苦不行劾奏以致如此自後如仍前所為事發之日該將軍及地方官俱各從重治罪斷不姑宥康熙二十年辛酉二月甲午上以逆賊尚之信在廣東令其部人私充鹽商據津口立總店又逆賊耿精忠在福建橫徵鹽課擅設報船苛派夫驛勒索銀米久為民害命該部檄各督撫悉革除之又逆賊吳三桂在雲南曽以沐氏莊田賜給為藩莊其藩下官兵侵占民田擅為己利命户部檄該督撫事平之日察出給還小民七月丙寅上諭户部京倉通倉糧米厯來缺額其監督官員交盤時有賄與銀兩者亦有雜以灰土者放米時有與旗下官員銀兩抵完者其貧人所得米糧缺少此等情弊朕悉知之如盡行究察從前經管各官有一得免者乎其飭所司嚴革諸弊康熙二十一年壬戌四月己卯兵部議准寧古塔將軍巴海題緝獲盜採人參之官兵應定例以示勸懲上曰盜人參官兵蹤跡緝獲者視所獲多寡議叙甚為允當但恐非係採參之人妄有拘執奪其資財致孑身採捕他物者無故罹害亦未可知嗣後有犯此者作何處分其再議之康熙二十二年癸亥五月辛酉刑部題覆直𨽻巡撫格爾古德疏稱旗下所買之人當攜歸莊屯不當聽其仍留本籍違者買王及賣身之人均行治罪并地方官亦當議處因定容留人數多寡處分之例上諭大學士等曰地方凶徒或素行橫暴鄉里不容多有賣身旗下倚勢縱恣者此等即一二人已足擾害地方至於守分安居原有田舍者雖賣身旗下於地方無害槩令遷移恐致失業應不論容留人數多寡作何分别定例九卿詹事科道可㑹同確議以聞又諭曰賣身之人或曽犯罪處分或見有犯法事情賣身旗下希圖幸免者從重治罪買主知情亦從重治之八月丙辰大學士等遵㫖議覆刑部事件上曰朕於刑部事件所以念念不忘者特以别部事件雖少遲延不過牽纍一二人而已不致大害若刑部事件遲延太久則正犯暨無辜牽纍者身家性命受害無窮朕念及此每用惻然其借行提兩造干證故意稽遲時日應作何立法盡除弊源可再議又諭曰刑部不獨人命大事遲延日期即杖笞鞭責之罪亦復延挨雖都察院及該科衙門每月稽察檔案不過虛名而已何益實事嗣後照熱審例十日內所結事件造冊奏報則事不致稽延而定罪之當否亦可盡知此等小事朕不應苛察但刑部事務漸至頽廢恐人犯無辜受害故爾頻加稽察可傳諭此意一併㑹議辛酉議政王大臣等㑹議永興過河交戰失利官員分别處分上曰我朝軍法從來嚴明雖承平時不少寬假然尚有未盡處因定例內擊敗賊寇凡受傷回營之人俱准論功又我軍退却凡受傷退回者亦得免罪於是不肖之徒怯於戰鬭故將伊身自作傷痕希圖規避者不無其人更有甚者因一人受傷即數十人扶擁送回規避不前如此則軍法豈不縱弛今雖殱滅賊寇海內寧一所有軍法未盡處不可不詳議改定故特諭爾等知之十月癸亥上諭刑部明罰敕法民命攸關必讞決精詳案無留滯而後聽斷得情民免株纍向因刑部等衙門事務審理遲延屢加申飭今積案已完宿弊漸革惟在外直𨽻各省督撫衙門因循積習怠忽稽遲一切刑名案件有經年不結者有數年不結者或因承審官員不能恪秉虛公妥招定案每年草率含糊希圖茍且完結以致上官屢行批駮沉案積久不清或因上官意有偏徇借端頻行駮審因而營求滋弊顚倒是非寃抑無辜莫由申訴此等情弊皆由聽斷不公完結不速牽連淹滯苦纍小民應作何立法俾在外各衙門痛改積習永絶弊源訟簡刑清克稱平允著九卿詹事科道㑹同詳議以聞康熙二十三年甲子五月甲申上諭户部民間田地久已有㫖永停圈占其存部注冊地畝分撥時或不肖人員借端擾害百姓圈占民人良田以不堪地畝抵換或地方豪强隱占存部良田妄指民人地畝撥給殊為可惡直𨽻巡撫可嚴察此等情弊指名糾參從重治罪康熙二十四年乙丒九月庚辰九卿㑹議廣東雲南秋審人犯上曰凡别項人犯尚可寬恕貪官之罪斷不可寬此等人藐視法紀貪汙不悛者祗以緩決故耳今若法不加嚴不肖之徒何以知警此內貪官耿文明等正法外其餘正犯俱照爾等所議完結十月戊戌理藩院等衙門奏稱厄魯特來使伊特木根於北館中毆死正白旗商人王治民應論死上將伊特木根正法并傳諭厄魯特曰爾等進貢來使沿途往返擾害民生搶掠牲畜以致邊境內外百姓患苦者甚衆朕雖稔知以爾等逺方之人本不諳中國法紀無知妄行屢不加罪槩從寬免嗣後貢使往來如有攘奪為非者爾等率領頭目并犯法之人皆依中國律令治罪曽經頒㫖曉諭今爾進貢頭目並不嚴束侍從任其擾害將內地人毆死干紀甚矣先以爾等愚昧頑蠢凡細微攘奪之罪知而宥之乃屢邀寬免頻加曉諭全不欽遵竟至毆死內地之人今若不按法抵罪日後漸益恣肆大起爭釁未可定也用是將毆死人命伊特木根依律處斬令爾等識之觀之此後爾等其謹遵成法嚴戢從人毋得肆惡妄行十一月戊午上諭大學士等曰穆爾賽身為大吏貪酷已極穢跡顯著非用重典何以示懲且九卿㑹議穆爾賽事瞻顧徇庇並未詳明議罪朕不行立斷誰肯執法耶治天下以懲貪奬亷為要亷潔者奬一以勸衆貪婪者懲一以警百爾等將此意傳問九卿回奏十二月甲辰刑部奏稱旗人史書等辱詈順天府府丞王維珍應將史書等枷一月鞭一百上諭大學士等曰旗下惡棍辱罵職官如此輕處何以警戒衆人著查康熙十八年定例具奏於是大學士等奏康熙十八年曽經九卿定議諸王及大臣僕人有干預詞訟索取財物者其主知情從重議處僕人枷三月鞭一百其主不知情僕人以光棍治罪上曰此情最為可惡著從重治罪伊主一併察議此等事甚多舉首者少王維珍不顧情面舉首可嘉著議叙勒德洪奏曰其主乃康親王傑書也上曰朕止論事之是非不論其為何人也康熙二十五年丙寅閏四月壬戌江寧巡撫湯斌奏蘇州上方山有五通邪鬼祠應焚燬上諭禮部直𨽻各省淫祠濫祀誣民惑衆俗尚甚多有關風化應行文直𨽻各省巡撫嚴察禁革違者按律治罪該管官不行察出隱匿者照例議處康熙二十六年丁卯二月癸亥九卿議覆給事中劉楷條奏請禁止淫詞小說應如所請上曰淫詞小說實能敗壞風俗蠱惑人心至於僧道邪教素悖禮法其惑世誣民尤甚俱宜嚴行禁止四月庚午上諭刑部等衙門凡各省解送京城及京師解發各省人犯有解役中途凌虐及教唆犯人於沿途搶奪者甚至有將人犯拷打致死者其所犯之罪不至於死而凌虐拷打以致斃命殊為可惡爾部㑹同督捕衙門定議條例以聞五月壬辰上諭大學士等曰朕觀今時之人不敦本務實輕浮奢侈者甚多漢人為甚今滿官田舍俱在畿輔之地人皆知之漢官內或有自稱道學粉飾名節而本鄉房舍幾至半城者有之或多置田園者有之且羣㑹宴集流於邪僻嬉戲若不禁止則漸至於放縱或身為大臣沉湎之色形於顔面者實非人類矣著嚴行禁止十月辛未上諭大學士等曰百行莫大於孝近者漢軍居父母之喪親朋聚㑹呼盧飲酒毫無居喪之禮至孝服鞍轡等類所用素白皆異常華美喪禮當自盡其誠服用粗惡豈宜華美孝道如此其他又何足觀又漢軍外官赴任每借京債飾置行裝且多帶家人為伊等謀給衣食勢必苛取於民以資用度親朋債主往往在任所請託需索是官雖一人實數人為之以致脧削小民民何以堪嗣後漢軍居喪違理著都統副都統嚴行飭禁其在外漢軍官員任所有親朋債主前往請託需索貽纍小民者亦令查訪指名題參康熙二十七年戊辰十月庚戍上諭盛京刑部侍郎吳世巴曰朕聞盛京地方光棍匪人聚集頗衆互相告訐者甚多爾往審理諸事慎毋偏向須從至公又聞盛京刑部遇訊鞫時或别部及旗下各官皆得雜至並坐干預所審之事向日京師刑部亦往往有此朕再三申飭今已肅清矣爾往其力除此弊持正以行丁卯上諭兵部尚書紀爾他布等曰朕聞緑旗兵餉兵丁照數得者甚少皆由不肖武辨扣尅夤緣餽送兵部夫兵所恃者餉耳若果全得自然精强今在外各辨或將餉銀私侵入已又餽遺兵部是以兵不聊生以致鼓譟而總兵副將等官亦不能彈壓倉皇失措此等兵將來如何可用凡事當窮根本此事根本全在兵部爾等應通行嚴飭康熙二十八年己巳十一月庚申理藩院題烏斯尼哈白塔住持喇嘛羅卜臧宜寧等稱伊師喇木占巴喇嘛復轉生於世祈請往聚議不准行上曰䝉古之性深信詭言但聞喇嘛胡土克圖胡必爾汗不詳其真僞便極誠叩頭送牲畜等物以為可以獲福長生至破蕩家産不以為意而奸宄營利之徒詐謂能知前生事惑衆欺人網取財帛牲畜敗壞佛教諸䝉古篤信喇嘛久已溺惑家家供養聽其言而行者甚衆應將此等詐稱胡土克圖者嚴行禁止康熙二十九年庚午五月辛丑上諭刑部朕早夜孜孜勤思治理日與在廷諸臣講求無非愛養民生恐其顛連無告以致失所若紳襟土豪倚勢橫行凌虐小民藐法縱恣毫無顧忌窮黎受害何所底止太常寺少卿胡簡敬等一門濟惡霸占民人妻女田産誣告盜情致斃人命闔縣之人遭其毒害種種惡蹟昭然有據督撫不行舉發科道漫無糾參無非畏其勢力瞻徇情面今已告發審實若不嚴加處分立置重典何以為直𨽻各省不法紳襟積惡豪强之戒胡簡敬等應於彼處正法治罪江蘇巡撫洪之傑為地方大吏平日既不能體察糾參及經告發又不速行審治遷延徇庇殊負委任應革職著九卿詹事科道㑹同議奏六月乙亥上諭大學士等曰紳襟優免丁銀原有定例其鄉紳豪强詭寄濫免以致徭役不均偏纍小民積弊已久今山東巡撫佛倫奏請改正釐剔具見實心任事並不贍徇直𨽻各省應一體遵行九卿詹事科道㑹同確議具奏康熙三十三年甲戍閏五月庚辰刑部等衙門議奏太監錢文才打死民人徐二應絞監候上曰凡太監殺人斷不可宥尤宜加等治罪朕觀古來太監良善者少要在人主防微杜漸慎之於始茍其始縱容姑息侵假事權逮其勢既張雖欲制之亦無如何如漢之十常侍唐之北司竊弄威權甚至人主起居服食皆為所制此非一朝一夕之故由積漸使然也太監原屬隂類其心性與常人不同有年已衰老而言動尚若嬰兒外似謹厚中實叵測必人主英明此輩始無由弄權朕聞明代諸君將本章批答委之司禮監司禮監委之名下內監此輩素無學問不知義理委之以事其能免於舛謬耶錢文才此案爾等記之至秋審時勿令幸免十月庚子上諭大學士等曰朕聞奉㫖遣往各省大臣官員沿途文官朝服武官介胄以迎之此皆未當於理著行禁止康熙三十四年乙亥二月丙辰上諭大學士等曰朕昨幸五龍亭因往視光明殿東柴厰內失火延燒處守巡官員兵丁盡皆曠誤凡諸守視之地以有關繫始設官員兵丁若此怠忽將來流弊何所底止可敕八旗滿洲䝉古漢軍都統副都統等嗣後各於本旗官員兵丁守視處不時巡察有曠誤者當參奏則參奏當笞責則笞責之步軍統領等巡察該管官員步兵之便其馬兵守視處並令巡察至於米倉所繫重要尤宜敬慎倘有疏虞守視官員兵丁必戮無赦其下八旗都統副都統等遵行毋怠六月庚申上諭大學士等曰兹後世職若以罪革斥其子勿准承襲令同父昆弟襲之無同父昆弟者則宜削其職其下吏部定例以聞大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷二十五
