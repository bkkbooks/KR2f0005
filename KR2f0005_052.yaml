body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷五十二廣幅員康熙二十三年甲子四月己酉上諭户部兵部臺灣僻處海外新入版圖應設立郡縣營伍俾善良寧宇姦宄消萌教化既行風俗自美著於赤墩設臺灣府附郭為臺灣縣鳯山為鳯山縣諸羅山為諸羅縣設一道員分轄又設總兵一員副將二員兵八千名分為水陸八營澎湖設副將一員兵二千名分二營每營設遊守千把等官康熙二十五年丙寅正月甲戍上諭大學士勒德洪學士麻爾圖曰日者大兵往征鄂羅斯破雅克薩城釋鄂羅斯不誅赦之使生還其時不並取尼布潮地者蓋以尼布潮地畫為疆索使鄂羅斯不得越尼布潮界界外聽其捕牲也今薩布素等奏言鄂羅斯復來城雅克薩地今當即往征而滅之耶抑或緩之以待黑龍江墨爾根地方將士移家既定然後進兵為宜耶令議政王貝勒大臣及與鄂羅斯之役彭春佟保班逹爾沙郎談同爾等會議以聞康熙三十五年丙子五月丙子上駐蹕席喇布里圖諸蒙古王等因大敗噶爾丹行慶賀禮跪奏云皇上念我外藩蒙古不辭勞苦七旬之內行三千里無水草之地立奏膚功誠世所罕有皇上聖德神功如此誰不傾心歸服上曰爾等於引路探信牧馬掘井諸事甚為效力誠屬可嘉朕必重加賞賚朕昔以汛界之內視為一家今土喇克魯倫以內皆為一家矣康熙三十九年庚辰六月庚寅敇諭王布忒逹阿普提曰邉境素有定處爾縱放營官喋吧昌側集烈將四川打箭爐土司蛇蠟喳吧居住地方恃強盡行霸占漸次侵踞河東鳥泥若泥凡州三處潛有窺伺嘉慶擦道之意先經欽差侍郎羅察等往勘營官猶然踞坐有侮慢天使之處今因內土司蛇蠟喳吧漏言將土司蛇蠟喳吧以致於死種種狂悖實難寬假川陜總督席爾逹已經具題據此豈非爾私示所屬人等侵犯生事邉境地方豈可讓與寸地此等事情爾俱違悖妄行敕旨一到將漸次侵占打箭爐版圖內土司地方俱著退還打死內土司蛇蠟喳吧之營官即拏解送不然生事之罪歸於爾身彼時悔之不及矣七月乙卯大學士等將鄂羅斯差人所奏本章進呈上曰鄂羅斯地方遙逺僻處西北海隅然甚誠敬噶爾丹窘迫求救彼曾拒而不答曩者遣人分畫邉界即獻尼布潮地以東為界尼布潮等處原係布拉忒吳梁海諸部落之地彼皆林居以捕貂為業人稱為樹中人後鄂羅斯強盛遂并吞之已五六十年矣逺服聲教畫疆獻地出自忠誠即此允當軫念也康熙五十年辛卯五月癸巳上諭大學士等曰天上度數俱與地之寬大吻合以周時之尺算之天上一度即有地下二百五十里以今時之尺算之天上一度即有地下二百里自古以來繪輿圖者俱不依照天上之度數以推算地里之逺近故差誤者多朕前特差能算善畫之人將東北一帶山川地里俱照天上度數推算詳加繪圖視之混同江自長白山後流出由船厰打牲烏喇向東北流會於黑龍江入海此皆係中國地方鴨緑江自長白山東南流出向西南而往由鳯凰城朝鮮國義州兩間流入於海鴨緑江之西北係中國地方江之東南係朝鮮地方以江為界土門江自長白山東邉流出向東南流入於海土門江西南係朝鮮地方江之東北係中國地方亦以江為界此處俱已明白但鴨緑江土門江二江之間地方知之不明即遣部員二人往鳯凰城會審朝鮮人李萬枝事又派出打牲烏喇總管穆克登同往伊等請訓旨時朕曾密諭云爾等此去并可查看地方同朝鮮官沿江而上如中國所屬地方可行即同朝鮮官在中國所屬地方行或中國所屬地方有阻隔不通處爾等俱在朝鮮所屬地方行乘此便至極盡處詳加閲視務將邉界查明來奏想伊等已由彼起程前往矣此番地方情形庶得明白八月辛酉上諭大學士等曰前差打牲烏喇總管穆克登等查看鳯凰城至長白山邉界伊等業將所查地方繪圖呈覽因路逺水大故未能至所指之地著於來春冰解之時自義州乘小舟溯流而上至不可行之處令其由陸路向土門江查去但道路遙逺萬一中途有阻令朝鮮人供應將此情由令該部曉諭來朝正之朝鮮國官員書文給與帶付伊王康熙五十三年甲午七月丙寅上諭大學士等曰拉藏汗題請打箭爐地方朕思打箭爐原係本朝之地人民攸聚於拉藏汗大有禆益若行撤回則茶市亦停大無益於伊等倘必要此地著伊親來與我諸王大臣等會議康熙五十九年庚子十月庚戌定西將軍噶爾弼疏報八月二十三日進取西藏傳西藏大小第巴頭目喇嘛等宣示聖主威德隨將倉庫封閉扎立營寨撥兵截準噶爾之運糧要路其策零敦多布偽授總管之喇嘛五名即行正法尚有準噶爾之喇嘛九十六名監禁請旨上曰噶爾弼等遵朕指授率領官兵歷從古用兵未到之絶域各加奮勵克取藏地將準噶爾人等信用之逆惡番僧五人正法撫綏唐古特土伯特人民甚屬可嘉在事將軍以下兵丁以上俱著從優議敘十一月辛巳上諭大學士學士九卿等曰朕於地理從幼留心凡古今山川名號無論邉徼遐荒必詳考圖籍廣詢方言務得其正故遣使臣至崑崙西番諸處凡大江黃河黑水金沙瀾滄諸水發源之地皆目擊詳求載入輿圖今大兵得藏邉外諸番悉心歸化三藏阿里之地俱入版圖其山川名號番漢異同當於此時考證明核庶可傳信於後大槩中國諸大水皆發於東南諾莫渾烏巴西大幹內外其源委可得而縷析也黃河之源出西寧外枯爾坤山之東衆泉渙散不可勝數望之燦如列星蒙古謂之敖敦他拉西番謂之梭羅木中華謂之星宿海是為河源匯為薩陵鄂陵二澤東南行折北復東行由歸德堡積石關入蘭州岷江之源出於黃河之西巴顔哈拉嶺七七喇哈納番名岷尼雅克撮漢書所謂岷山在西徼外江水所出是也而禹貢導江之處在今四川黃勝關外之乃褚山古人謂江源與河源相近禹貢岷山導江乃引其流非源也斯言實有可據其水自黃勝關流至灌縣分數十支至新津縣復合而為一東南流至敘州府與金沙江合流金沙江之源自逹賴喇嘛東北烏尼尹烏蘇嶺流出烏尼尹烏蘇嶺中華謂之乳牛山也其水名穆魯斯烏蘇東南流入喀木地又經中甸入雲南塔城關名金沙江至麗江府又名麗江至永北府會打衝河東流經武定府入四川界至敘州府流入岷江經夔州府入湖廣界由荆州府至武昌府與漢江合漢江源出陜西寧羌州北嶓冢山名漾水東流至南鄭縣為漢水入湖廣界東南流至漢陽縣漢口合岷江此諸水在東南諾莫渾烏巴西大幹之內源發於西番委入於中國也瀾滄江有二源一源於喀木之格爾幾雜噶爾山名雜褚河一源於濟魯肯他拉名敖穆綽河二水會於察木多廟之南名拉克褚河流入雲南境為瀾滄江南流至車里宣撫司名九龍江流入緬國瀾滄之西為哈拉烏蘇即禹貢之黑水今雲南所謂潞江也其水自逹賴喇嘛東北哈拉腦兒流出東南流入喀木界又東南流入怒夷界為怒江入雲南大塘隘更名潞江南流經永昌府潞江安撫司境入緬國潞江之西為龍川江龍川江之源從喀木所屬春多嶺流出南流入雲南大塘隘西流為龍川江至漢龍關入緬國此諸水在東南諾莫渾烏巴西大幹之外皆流入南海也又雲南邉境有檳榔江者其源發自阿里之岡底斯東逹木朱喀巴卜山譯言馬口也有泉流出為雅魯藏布江從南折東流經藏危地過日噶公喀兒城傍合噶爾詔模倫江又南流經公布部落地入雲南古勇州為檳榔江出鐵壁關入緬國而岡底斯之南有山名郎千喀巴卜譯言象口也有泉流出入馬皮木逹賴又流入郎喀腦兒兩河之水西流至桑南地岡底斯之北有山名僧格喀巴卜譯言獅子口也有泉流出西行亦至桑南地二水合而南行又折東行至那克拉蘇穆多地與岡底斯西馬卜家喀巴卜山所出之水會馬卜家喀巴卜者譯言孔雀口也其水南行至那克拉蘇穆多地會東行之水東南流至厄納忒可克國為岡噶模倫江即佛法所謂恆河也佛國紀載魏法顯順恆河入南海至山東之渤海入口應即此水矣梵書言四大水出於阿耨逹山下有阿耨逹池以今考之意即岡底斯是唐古特稱岡底斯者猶云衆山水之根與釋典之言相合岡底斯之前有二湖連接土人相傳為西王母瑤池意即阿耨逹池又梵書言普陀山有三一在厄納忒可克之正南海中山上有石天宫觀自在菩薩遊舍是云真普陀一在浙江之定海縣海中為善財第二十八參觀音菩薩説法處一在土伯特今番名布塔拉山也亦謂觀音見身之地釋氏之書本自西域故於彼地山川亦可引以為據也禹貢導黑水至於三危舊注以三危為山名而不能知其所在朕今始考其實三危者猶中國之三省也打箭爐西南逹賴喇嘛所屬為危地拉里城東南為喀木地班禪額爾德尼所屬為藏地合三地為三危耳哈拉烏蘇由其地入海故曰導黑水至於三危入於南海也至於諸番名號雖與史傳不同而亦有可據者今之土伯特即唐之突厥唐太宗時以公主下降公主供佛像於廟今番人名招招者譯言如來也其地猶有唐時中國載去佛像明成化中烏斯藏大寶法王來朝辭歸時以半駕鹵簿送之遣內監護行內監至四川邉境即不能前進而返留其儀仗於佛廟至今往來之人多有見之此載於明實録者爾等將山川地名詳細考明具奏大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷五十二
