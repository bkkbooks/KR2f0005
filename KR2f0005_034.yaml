body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷三十四治河二康熙四十一年壬午五月壬辰戶部題江南賑濟盱眙等三縣水災饑民米數上曰前議加築髙家堰堵塞唐埂六壩時朕曾言如此修築雖有濟於下流其上流州邑必致衝決今信如朕言觀此散糧之事盱眙等三縣大被災害若昔議築髙家堰之日於此處亦築一隄束其水勢不令泛溢豈不甚善該督斯時慮不及此卒令此等地方悉受泛溢之水今欲修難矣其令張鵬翮往勘以聞九月甲子河道總督張鵬翮疏言桃源縣烟墩一帶因對岸沙灘挺出河心逼溜南行恐被衝刷請於北岸邵家莊開挑引河建築草壩以分水勢又顔家莊水勢逼射北岸亦請開引河一道則水流順下而險工不受衝激矣上諭大學士等曰此本若敇部議必致遲延著即照所題行朕觀永定河修築之法甚善河身直河底深所以淤沙盡皆衝刷今治黃河亦用此法方為有益此工多費不過十萬兩試照永定河修治之丁卯河道總督張鵬翮疏報秋水情形上諭大學士等曰覽奏挑水壩築成逼黃河大溜直趨陶莊引河循北岸而行黃水從大通口暢出海口極其深通淮水從清口暢流敵黃絶無黃水倒灌之患髙家堰隄工完固加謹防守經伏秋大漲俱獲無虞運河水由涇河澗河人字芒稻等河分泄各處工程亦皆保固觀此河工大有望矣又諭曰今所開陶莊引河甚善朕巡視南河時曾令員外郎黑碩色將引河之樁加意深築其疏濬人字芒稻二河亦佳得此二河運河甚為有益朕觀明朝治河俱自徐州以上在河南地方修築我朝自康熙元年以來俱在徐州以下修築然治下流須預防上流若上流潰決下流必至壅滯嗣後徐州以上地方河臣亦當留意再黃河之水遷徙無定朕前在寧夏之時見黃河大溜每年更移今年在此來年又移他處其性如此況九河故道原在河間地方後漸移向南歷代以來果能每年防禦相機修理則河道何至如此大壞皆因時當多事或十年或五年不修築不開濬所以漸難治矣明朝三百年間嘗講求河工治法彼時措置亦得其宜如山東微山湖將水蓄聚山中潦則蓄之旱則泄之皆深有益於治河者也康熙四十二年癸未二月庚辰上巡視河工舟泊天妃廟諭河道總督張鵬翮曰歸仁隄引河用以分泄洪澤湖之水勢若黃水加長則恐清口水弱著將祥符閘下板堵閉草壩將五堡閘酌量開放以助清水之勢三月戊申上諭河道總督張鵬翮曰髙家堰工程關係重大保守最為緊要朕今日乘舟由洪澤湖閲視見有殘缺石工以葦草鑲填倘遇水發危險堪虞至六壩見新修石隄堅固方慰朕懷其殘缺石工著即興修乘水未長之先完工用資捍禦至髙家堰防險之人用候選縣丞經歷等微員此不過例監書辦出身家産微薄倘有疏忽干係不小須於候選官員內擇其職銜稍大身家殷實者委令防險如此則彼知自愛身家又有選用之望自能盡心防守有禆工程十月己卯上諭大學士等曰朕觀河道已治河道總督張鵬翮及河工官員俱甚效力黃河一切工程朕知之甚悉先是永定河用掃甚有禆益是以朕諭張鵬翮黃河亦宜用掃張鵬翮回奏永定河勢小可以用掃黃河勢大難以用掃朕諭姑用之張鵬翮因而用掃河隄今果堅固至於洪澤湖水勢甚險而隄岸復髙往來舟楫一遭漂沒人命輒難救援朕曾諭沿岸將長木樁斜釘於水中船雖漂沒人尚可攀援獲命俟於釘樁後驗之是日上諭吏部工部黃淮兩河關係運道民生最為重要朕念治河國家大事夙夜廑懷未嘗少釋披圖咨衆雖已悉其源流顧水勢變遷不常必確知洞悉方可實見施行是以不憚勤勞屢親巡閲察其險易之形勢審其疏導之機宜緩急次第俱有成畫至於簡命河臣倚任甚切凡所屬官吏皆聽舉用大修工程費以數百萬計嵗修帑金亦以數十萬計乃康熙三十七年黃淮竝漲河道總督董安國不堅築隄堰疏通海口因而河身墊髙溢出河岸以致倒灌洪澤湖口湖水從六壩旁泄由運河入下河淹沒民田於是罷董安國以于成龍代之朕隨授以治河方略詳加指示康熙三十八年親往閲河駐蹕清口河干又面諭于成龍清口宜築挑水壩挑黃水使趨北岸方可免倒灌清水之患隨指定其地再三申命于成龍不遵朕㫖致無成功及用張鵬翮為河道總督面諭云頃已發帑金數百萬令大臣官員往髙家堰築隄閉六壩使逼洪澤湖水暢出清口而清口築挑水壩尤為緊要此壩不築則黃水頂衝斷不能使向北岸湖水必不得暢流張鵬翮遵奉朕言壩工築成黃溜遂直趨陶莊清水因以直出疉經伏秋大漲竝無倒灌之事其浚張福口等引河築歸仁隄疏人字芒稻涇澗等河開大通口皆遵朕㫖一一告竣今年春朕閲河至桃源見龍窩等處頂衝危險命增築挑水壩壩工刻日訖事河勢遂平中河仲莊閘口以與清口相對特命改由楊家莊漕挽安流商民利濟曩時黃水泛漲或與岸平或漫溢四出今黃河深流河岸距水面丈餘縱遇大漲亦可無虞矣張鵬翮所修工程雖悉經朕裁斷而在河數載殫心宣力不辭艱瘁又清潔自持一應錢糧俱實用於河工無纎毫浮耗朕心深為嘉悅所屬大小河員竝皆勉力赴工共襄河務亦屬可嘉自總河以下各官爾二部即加議敘具奏康熙四十四年乙酉二月庚寅上巡視河工舟泊土橋閘諭大學士等曰河道總督張鵬翮昨日來問以河工形勢彼云河已治矣從前駱馬湖口設竹絡壩湖水大則從壩流入黃河河水大則溢流入壩內今竹絡壩止有湖水暢流黃水竝無浸灌則黃河之深通可知聞下河等處地方連年皆大熟亦從前所未有也三月乙巳上諭河道總督張鵬翮曰河工已經告成善後之策更為緊要朕今親臨閲視修建天妃閘甚當倘黃水長至五六尺而清水不長則勢弱不能敵黃黃水倒灌亦必致之理豈可因此即謂治河失策乎若遇倒灌即將天妃閘暫時下板蓄清水全力以敵黃流不過數日黃水即退遇糧船過時即起板開放若黃水不灌入不必下板其惠濟祠一帶雖建有石工但運河與黃河止有一線之隄若黃溜衝刷石工恐不足恃可於上下適中之處相度形勢修建挑水壩三四處挑溜開行其王公隄亦應相度形勢修建挑水壩其運河東隄保守最為緊要隄岸應行加幫其髙郵迤南湖河水勢相平界首迤南河水髙於湖水東西兩隄卑薄應加幫修可量建石工淮安近城隄岸卑薄之處亦應相度形勢修建石工黃河南岸隄工關係緊要應加謹修防至於直𨽻山東之河與河道總督相距甚逺應照河南例各交與該省巡撫就近易於料理其楊村通判竝無經管之事應行裁去爾㑹同行在九卿速議以聞壬子上諭河道總督張鵬翮及河工官員等曰今河工雖已告成不可不預為修理防護以圗善後之策朕見淮揚一帶隄岸卑薄未甚堅固倘不加保護以致衝決則淮揚地方百姓何以能堪爾等宜急籌之閏四月癸卯上幸髙家堰遍閲河隄諭河道總督張鵬翮曰朕於康熙四十二年臨閲髙家堰時爾奏石隄可於八九月間告成今已三年尚未完工萬一水大奄至恃此草掃詎能禦之張鵬翮奏曰必能保固斷然無害上曰草掃俱經二三年矣腐爛沉塌者多猝遇大水事難預料如不謹慎修築被水衝決枉費錢糧姑置無論但去年已奏河工告成今年又奏衝決其謂之何爾須日夜謹守保護夫治河莫要於得人觀爾所用之人每多有失豈可倚任此輩分守此隄耶爾等惟見清口之水暢流即以為功成不思防禦倘髙家堰六壩之水泛溢則清水力弱而黃水必復致倒灌矣夫髙家堰關係緊要宜謹識之毋忽是日上幸惠濟祠閲視畢諭大學士諸大臣及河臣等曰朕留心河道親閲者屢矣河之形勢必身歷其地始知成功之次第朕每至河上必到惠濟祠以觀水勢康熙三十八年以前黃水泛濫凡爾等所立之地皆黃水也彼時自舟中望之水與岸平岸之四圍皆可遙見其後水漸歸河岸髙於水今則岸之去水又髙有丈餘清水暢流逼黃竟抵北岸黃流僅成一線觀此形勢朕之河工大成矣朕心甚為快然也乙巳上諭河道總督張鵬翮曰惠濟祠前植標杆處可建挑水壩祠後掃灣處亦宜建挑水壩以保淤灘但此二處挑水壩俱不宜太長恐逼水盡向北岸有礙楊家莊河口至卞家莊舊壩修建甚佳再略加寬長更善丙午上諭河道總督張鵬翮曰九里岡隄工修理得法不似從前直掃不能挑溜今修魚鱗掃逐假挺出逼溜開行使窪處漸淤此法甚善其掃工釘樁處可再建挑水壩二座若恐水深則先建磯嘴壩形出水俟其壩下漸淤層次加修則料不加多而功易成矣七月壬申上諭大學士等曰今春朕欲親閲髙家堰張鵬翮奏稱隄岸工程俱完又時當炎暑蚊虻正起求停止親閲懇奏再四朕以髙家堰關係甚大親往閲視見石隄尚有未完之處所下之掃已經二三年者朽爛亦多將此情形一一指示張鵬翮及河工諸臣朕又諭張鵬翮大水時發難以預料爾務須晝夜防護至分守隄工人員委用不當朕亦諭及今據張鵬翮疏報古溝唐埂清水溝韓家莊四處隄岸衝決河工將有復壞之勢大小河員惟知清水暢流為己功而不知髙家堰之六壩水泄太多則清水力微黃水必復倒灌也此事著九卿詹事科道速行㑹議具奏丙戌上諭大學士等曰凡人必試之而始知張鵬翮多疑今即遣旗員前去未嘗一試而張鵬翮早疑其不清人亦何心為彼效力夫髙家堰之隄全當洪澤湖之水開六壩雖民田略有衝沒淮揚地方斷無可虞如以為利益民田而閉六壩萬一大水驟漲而隄決淮揚大有可虞矣是以前總河靳輔開六壩以注水漲張鵬翮但知閉六壩則運河民田均有利益而不知為淮揚之大患髙家堰之所關甚為緊要也十月甲午上諭工部方今海宇升平惟以安阜黎元為急東南要務莫重於河防朕數經南巡指示修築方略凡以籌運道濟民生也自曩嵗兩河先後衝決而黃流淤墊繼以髙家堰唐埂六壩久決未塞而洪澤湖水直從決口旁泄以致淮水力弱黃水倒灌全河幾至潰壞於是分遣廷臣發帑金數百萬增築髙家堰盡閉六壩俾淮水全注清口又特築挑水壩以逼黃溜趨向北岸仍開濬陶莊引河以導黃北流然後無倒灌之患康熙四十二年以河工漸可底績躬親臨視時髙家堰石工尚多未竣飭令迅速修築又因仲莊閘水勢湍急恐逼黃流倒浸清口遂命閉仲莊閘改建楊家莊閘閘工既成今年春復往巡閲比至髙家堰見石工仍未完固舊掃亦多朽塌諄諭河臣張鵬翮謂水勢無常修防宜豫一有疏忽則前功盡隳且甫奏安瀾旋報衝決天下其謂之何張鵬翮奏稱隄工捍禦可以無虞逮伏汛大水驟發果衝決古溝唐埂清水溝等處淮揚一路田畝被淹者甚多今已嚴飭堵塞決口刻期竣工朕屢親蒞河干詳度形勢當水漲之時若髙家堰及運河減水壩不令開放則隄堰甚為危險若開壩宣泄則閭閻隴畝必致淹傷方春水涸民間盡皆播種一經夏水驟漲開壩放流而所播之種盡皆淹沒朕心惻然殊為不忍使不設法導流俾水有所收束則瀕湖及下河民田究不免水患朕再三籌畫宜於髙家堰三壩之下挑濬一河兩旁築隄束水引入髙郵邵伯諸湖湖外亦量築土隄不使漫溢其髙郵減水壩亦挑濬一河兩旁築隄束水由串場河入白駒丁溪草堰等河白駒等河淤淺之處竝開濬深通俾之入海如此則各壩所出之水不致有渙散衝流之害又洪澤湖水勢大漲泗州盱眙等州縣俱被水災應於泗州一帶受水之地亦酌量築隄束水毋令泛濫則所全於淮安揚州鳳陽三郡民生者多矣此事原於河道無涉在河官止知保護河道不復詳計民生朕惟民間田畝所繫甚重宜圖萬全可久之䇿築隄束水行之北河業有成效則施之南河當亦有濟應從何處築隄延袤若干里需費幾何行令江南江西總督漕運總督河道總督江蘇巡撫㑹同確勘詳議具奏康熙四十五年丙戌正月己巳工部等衙門議覆江南江西總督阿山等疏言河工重大需餉浩繁伏候皇上親臨河上指示方略上諭曰朕屢經躬閲河道凡河工利病地方逺近應分應合應挑應築之處知之甚明雖有未及經歷之地而向來輿圗地名熟悉於衷亦可即行定奪邇者數次南巡見與陸路不同瀕河官民不無勞擾因此朕不必親往閲視阿山桑額張鵬翮等所看已屬周晰但此項工程不應交與總河修築應多派大臣官員分工速修己卯上諭大學士等曰朕昔親臨河上欲往下河因張鵬翮奏言斷不可往是以中止今即去仍然不能親蒞其地則亦何事復往但河工錢糧斷不可交地方官當照山東賑饑之例將八旗官及部院官內有行止端正者令該旗大臣及部院堂官多行保舉派出再將江寧鎮江杭州駐防旗員亦著該將軍副都統保舉派出或副都統或協領帶赴工上其京城派出官員領户部錢糧帶往各省派出官員各就近地領錢糧帶往可派大臣督理工程所派官員每人各給銀三千兩務令照三千兩工價分地開工如此始得河務速成有利民生著九卿再議具奏至髙家堰若不預行修治必有可虞已有旨諭張鵬翮而彼堅稱斷斷無慮若今年不修治髙家堰倘有衝決即開河何用此兩事中髙家堰尤為緊要爾等可將諭旨付挑河大臣轉交張鵬翮一并議奏壬午工部等衙門覆奏挑河事宜上曰爾等所議尚有未詳至將情願往河工效力者令照山東養民例尤為不可山東養民者名為捐助及其後皆無實際所缺銀兩皆朕豁免況所去人員亦甚放縱今挑河之事俱有丈尺稍或不實即誤公務而前去人員若仍行放縱尤貽害於地方爾等於嚴行禁止之處竝未議及著再議具奏五月戊午朔上諭大學士等曰去嵗巡視南河曾於衆人前言髙家堰隄工不堅尚宜增築張鵬翮以河工已完斷然無害朕謂爾雖言工完朕不能信及後隄工潰決幸是唐埂六壩上流若在下流衝決如何堵禦康熙七年九年二十二年七里溝清水潭龍窩等處衝決之時其水甚大去年水不甚大然而衝決者河臣自以為河工已完玩忽之所致也十月辛丑上諭大學士等曰河道總督報秋汛疏二十日方到朕屢次親閲河工洞悉情形如奏報水汛事早到則其中或有所指示猶可及時預防嗣後有奏河工急務者限兩三日飛馳遞送康熙四十六年丁亥二月癸卯上巡視溜淮套駐蹕曹家廟地方諭扈從文武臣工及河道總督等曰前阿山等察勘泗州水勢奏稱溜淮套地方另開一河出張福口可以分泄淮水免洪澤湖之異漲保髙家堰之危險繪圗進呈請朕親閲在廷諸臣亦以河工事關重大再四懇請朕始親行今詳看地勢甚髙雖開鑿成河亦不能直達清口且所立標竿多有在墳上者若依所立標竿開河不獨壞民田廬甚至毁民墳塜朕惟恐一夫不獲其所時存已饑已溺之心何忍發此無數枯骨數年來兩河平靜民生安樂何必多此一事先年靳輔開中河以避黃河之險確有成效然亦止因舊河身疏濬今若欲開濬溜淮套必至鑿山穿嶺不惟斷難成功將來汛水泛溢不漫入洪澤湖必致衝決運河矣又諭曰明代淮黃與今逈别明代黃水勢強淮水勢弱故有倒灌之患朕自甲子年南巡閲視兩河形勢漸次修治今則淮強黃弱矣然善後之䇿尤宜亟講與其開溜淮套無益之河不若將洪澤湖出水之處再行挑濬令其寬深使清水愈加暢流至蔣家壩天然壩一帶舊有河形宜更加挑濬使通運料小河俾商民船隻皆可通行即漕船亦可挽運為利不淺矣乙巳上諭河道總督張鵬翮曰爾身任總河河工事務漫不經心今又以溜淮套地方可以開河請朕親臨殊屬欺誑張鵬翮免冠謝罪懇恩寬宥上曰賞罰者國家大權內而九卿外而督撫原為盡忠於國惠養斯民而設非徒使之榮顯晏安而已大吏亷潔則小吏自然效法茍不能勤慎致誤公事豈可因保全一人而廢國法乎凡事有可以保全者亦有當用剛斷者國家臣工甚多姑息一二人何以服衆朕自甲子年至今六次南巡詳觀河形一年異於一年治河之道當看何處關係緊要便保守何處不可執一自古治河皆順水性為今之計但當使淮水稍泄其流乘水未長時預為綢繆將來水雖大長必不致於危險天然壩一帶舊有河形當挑濬此河酌量可容糧艘建立閘座水小則閉閘蓄湖水以敵黃水大則開閘使之暢流一面由武家墩通至運河一面通至髙郵湖則商民船隻皆得長行爾即公同在河能員定議具奏五月癸丑上諭河道總督張鵬翮等曰古今治河形勢不同舊時常患清水不足敵黃水每有黃水倒灌之虞今清水敵黃水有餘運河清水甚大反流入髙郵湖設髙郵湖水長溢入運河則運河東隄受險少有疏虞雖堵塞不難而生民田廬不可問矣應加謹防護以保無虞清口湖水七分敵黃三分濟運今應將大墩分水處西岸草壩再加挑寬大使清水多出黃河一分少入運河一分則運河東隄不致受險又於蔣家壩開河建閘引水由人字河芒稻河入江新修五里滚水壩由下河及廟灣等處入海不惟洪澤湖之水可以宣泄而盱眙泗州積水田地亦漸次涸出水小則下板蓄水以敵黃水大則啓板泄水且便於商民舟楫往來其祥符閘口門甚窄狹趁此黃水不甚髙之時將歸仁安仁利仁三閘委幹員改寬泄水則徐州一帶民田可無淹沒之虞矣康熙四十七年戊子五月辛巳工部議河道總督張鵬翮疏言髙家堰下山陽盱眙二處增設救生樁銀兩請另行設法不動庫帑應無庸議上曰朕南巡閲河見洪澤湖風浪危險隄岸陡立商民船隻觸石損壞傷人甚多朕心時切軫念因特令河臣沿河隄創設救生木樁自設樁以來數年內竝未損船傷人於商民大有裨益此樁應時加增修愈多愈善嗣後著江寧蘇州杭州三處織造每嵗於莭省銀內各捐五百兩解送總河衙門以備救生之用該省逐嵗增修存案不必奏銷如不實行修理於别項支用者從重治罪康熙四十八年己丑十一月庚寅上諭户部尚書張鵬翮曰河工雖奏績然不可一日不防倘兩隄稍有疏忽則前功盡棄蓋河源出於崑崙朕曾遣官往視上流水長則陜西河南江南之水俱長知之甚詳爾可宣㫖趙世顯令行文川陜總督甘肅巡撫倘遇水大之年黃河水漲即著星速報知總河預為修防始得保全也康熙四十九年庚寅十二月庚辰河道總督趙世顯摺奏御壩西壩工程請修築加長上諭大學士等曰御壩西壩關係緊要甲子年朕南巡時清流不暢黃水倒灌以致洪澤湖上流淤墊朕指修御壩西壩清水遂暢然流出黃水不致倒灌淮黃交㑹之區始得安瀾但其地甚卑濕彼時朕步行閲視十餘里泥濘沒膝指授方略總之治水如治天下得其道則治不可用巧妄行靳輔善於治河惟用人力于成龍心計太過張鵬翮但遵舊守成法而已張鵬翮係漢人豈能乘騎在在馳驅料理惟於朕諭遵行不違是以河工底績耳今御壩西壩加長工程俱如所請令及時興工修築康熙五十年辛卯二月戊辰上諭大學士等曰河務甚難朕昔因挖子牙河親身往視有大城武清縣民跪於兩岸互相爭訴朕慰之曰爾等勿得爭競朕自有處置之法因一一指授監修官員而回後河工告成於兩處百姓均有裨益前張鵬翮任總河時來陛見朕訓之曰爾於河工不可任意從事但守成規遵奉朕諭而行及修御壩之時朕親身指授釘樁張鵬翮遵朕指授修建自此壩告成清黃二水始㑹流入海矣黃河水性善於更移朕幸寧夏時由黃河行二十一日至湖灘河朔因邊外無修治之人故黃河處處更移視水性每向南流北岸尚可南岸多被衝決古時黃水由天津碣石而流此言載在書經禹貢後又移流在德州自後漸移於南方矣治河固宜順水性亦在隨時調度今使諸水入大海者豈盡隨水性哉康熙五十五年丙申十月丙申河道總督趙世顯疏言管河官員遇有丁憂回籍者請仍留河工效力上諭大學士等曰河工告成二十餘年善後之方不可不講在工之人必年久諳練方能辦理譬如行軍務須曾經出征者始於營伍熟諳况黃河之水遷徙不常最難疏治如下掃築隄建挑水壩非久於其地之人不能熟悉著照所請行但築隄亦有不同黃水難於修築而易於保固清水易於修築而難於保固此又不可不知清水暢流可以刷沙使河水深通永無倒灌之虞然欲使清水暢流必全閉六壩使盡由清口而出方能敵黃朕昔南巡乘船閲河隄內居民厯厯可見今於隄內望黃河行舟帆檣皆不可見可知近日河水之深矣康熙五十七年戊戌三月壬子上諭大學士等曰朕昔南巡時曾乘舟閲視沛縣在運河之西隅地勢窪下積水甚多常因運河水淺穴隄引所積之水泄入運河今看每年沛縣之田皆以被水災具奏特以沛縣地勢窪下常被水災遂視為一定之事雖不成災亦以成災奏請蠲免錢糧耳將沛縣所積之水作何區畫與民有益之處爾等㑹同九卿議奏康熙六十年辛丑四月庚子上諭大學士九卿等曰朕於河務留心最切經厯最深往年屢次閲河時精力尚強親乘小舟不避水險各處周覽凡水泉源委皆知之甚悉山東運河全賴衆泉蓄泄微山諸湖以濟漕運今山東多開稻田截湖水上流之泉以資灌溉上流既截湖水自然無所蓄瀦安能濟運水在地中如人身之有血氣血氣有餘方可用滲泄之藥若血氣不足正需滋養安可再加滲泄乎地方官未知水之源流一任民間截水灌田以為愛恤百姓不知漕運實因此而誤也若不許民間偷截泉水則湖水易足湖水既足自能濟運矣今不講究本源但見湖水日少河身日淺徒事開濬假使河身日深泉水不繼雖費百萬帑金終歸無用且古人所置南北諸閘更將何以處之古人置閘其逺近疏密皆因地形髙下水勢緩急以為蓄泄或一處二閘或一二十里一閘確有一定丈尺不可更易分水龍王廟閘座尤關緊要當時宋禮用白英老人之䇿築戴村壩以遏汶水導之出鵝河口入南旺湖然後水流南北以分水口為水脊蓋山東登萊諸山之脉自關東來結為泰山是北幹分支之一在黃河之東而黃河之西山脉自終南太一南届淮汝為中幹分支之一黃河行乎兩支之中故昔時河自天津入海以後漸徙而南至淮安入海而登州以上馬谷山以下從無黃河之迹者山脉限之也分水口之水脊又為泰山分支之分脊處白英積數十年精思確有所見定為此議宋禮從之因勢均導南得七分北得三分增修水閘以時啓閉漕運遂通此等膽識後人實所不及亦不能得水平如此之準也今此二閘最宜斟酌啓閉若淺於南則當閉北閘使分北之水亦歸於南淺於北則當閉南閘使分南之水亦歸於北湖泉竝注南北合流雖有旱暵亦無慮矣豈若徒事開濬勞費而無益乎往年山東百姓欲開新河朕恐其下流泛濫降㫖弗許今巡撫請開彭口新河此地一面為微山湖一面為嶧縣諸山更從何處開鑿耶著張鵬翮到山東將朕此㫖詳諭巡撫申飭地方官令其相度泉源蓄積湖水俾漕運無誤特易易耳黃河關係最大自元至明嵗有衝決未有安瀾二十年如今日者然圗治於已治保安於已安河工雖已告成尤當時加巡視不可疏忽今春多風而少雨恐秋間雨水必多地方官宜加意隄防張鵬翮去看山東運河由臨清起至韓莊閘韓莊閘離邳州不逺并往視邳州低窪之水曾否泄出太行隄有坍塌之處亦當往看有賢能司官多帶幾員去地方有用著之處即留彼處料理九月甲午上諭大學士等曰黃河遷徙無常每有衝決隄岸淹沒田廬之患昔黃河㑹九河從天津入海後漸遷徙而南約討遷徙之地已千餘里矣漢武帝塞瓠子口嗣後代有衝決朕留心河務屢行親閲動數千萬帑金指示河臣修築髙家堰石隄及凡應修築之處奏安瀾者幾四十年於運道民生均有裨益前巡幸至湖灘河朔保德州橫城潼關孟津徐州宿遷邳州桃源清口等處俱曾渡河自橫城順黃河下流厯人所未經行之河套凡舟行二十二日直達數千里所至之處無不詳視惟孟津渡河時因淤沙不能直渡委折而行彼時朕即慮沙淤則流滯隄岸必致衝決今據報黃河衝決流入沁河泛溢至直隸長垣縣等處若今冬將決口堵築堅固可保無虞否則自決處以下勢分沙壅河水陡長隄岸之危非一所矣昨趙𢎞燮奏河決之處或在瓠子口以上或在瓠子口之下并河道情形著詳問九卿及在京河南省官員具奏壬寅上諭大學士九卿等曰直隸總督趙宏燮奏河南黃沁衝決隄岸水勢泛溢至長垣等處朕即遣官查視所決地方據奏河南武陟縣黃沁之水衝決隄岸由長垣流入山東張秋鎮又據山東巡撫李樹德奏河水泛溢自直隸開州流入山東張秋鎮由鹽河入海以致運河隄決漕船阻滯其衝決隄岸見在修築朕思此衝決之處只可略加修防使漕船無阻如竟行堵塞水無歸泄之地他處又必衝決斷乎不可開州係古黃河故道今黃沁泛溢由開州至山東地方已成河道矣將來堵塞完工不使沁水入黃直引至山東或有裨益亦未可定朕留心河務各處黃河渡口俱曾親厯適遣往看河之官所呈圗樣及李樹德所進河圗朕俱詳覽知之最明爾等繕寫諭㫖發往張鵬翮處伊所審事畢著即㑹同總漕施世綸至張秋鎮等處詳行查勘料理使漕船往返不致遲誤如張鵬翮已回即於接㫖之處作速前往至修築決河甚屬緊要朕自京中另遣専官著總河趙世顯將熟練河務官員工役派出并將修築物料多行備辦速發往河南衝決地方丙午上諭大學士等曰朕因黃沁二水泛溢漫及長垣等縣曾諭爾等以堵塞之後不使沁水入黃引入山東漕河於運道民生大有裨益爾等可將此河圗發與九卿共閲即著定議具奏將來引沁入運之後遇水大時流至天津恐河身不能容納必令於鹽河泄其水勢方可無虞直隸山東河南被水之民應行賑濟著該督撫各行查奏丙辰上諭大學士等曰堵築黃河漫溢工程此第一緊要之事著副都御史牛鈕侍講齊蘇勒員外郎馬泰前往監修其堵築時宜先於上流建挑水壩以殺水勢俟沙淤後再漸次加築則漫溢之勢自平而堵塞不甚費力矣朕於清口建築挑水壩時曾經指示此事齊蘇勒馬泰等悉知之至於前項工程毋得吝惜錢糧河南地方河底不凍今冬宜作速興築其建挑水壩之時應挑引河黃河有曲折之處即成洲渚務詳勘酌量取直挑成引河俟黃河決口堵塞報竣之後再引沁河濟運分水龍王廟之中八閘北八閘春時水淺船行有阻應將沁河之水於此處引入運河如不能容納由鹽河瀉其水勢自於運道大有裨益分水龍王廟南八閘水多不需水濟朕另有㫖與張鵬翮令學士格爾布前往宣諭再徐州下流黃河可以無虞獨徐州上流黃河多有沙淤不可不預防衝決將此㫖宣諭該管各官宜先防備大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷三十四
