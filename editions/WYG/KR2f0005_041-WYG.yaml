body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷四十一蠲賑四康熙四十八年己丑十月壬戌上諭户部今嵗入夏以來朕因南方二麥不登北地微潦宵旰軫念甚切焦勞繼而畿輔稔收三吳秋熟兼以四方奏報咸獲有年朕心始為稍慰夫水旱災傷雖事所時有而小民皆如赤子一以疾苦見吿即不忍恝置於懐今念江南淮安府揚州府徐州三屬地卑積水被災獨重秋禾未播種者甚多本年錢糧業經全免又遣官分賑而失業之民更宜加格外之恩以𢎞愛養康熙四十九年淮揚徐三屬之邳州等二十二州縣衛額徵地丁銀五十九萬三千八百兩有奇著悉與蠲免又河南省歸徳府屬商邱等六縣山東省兖州府屬濟寕等四州縣或被夏災或被秋災雖已各依分數例免額賦竝宜更施膏澤用厚民生康熙四十九年商邱等六縣應徵地丁銀二十萬二千四百兩有奇濟寜等四州縣應徵地丁銀十四萬六千六百兩有奇俱著蠲免州縣有舊欠未完錢糧亦著停徵一年諭㫖到日各該督撫務嚴飭有司體朕殷殷恤災至意張示徧諭悉心奉行俾窮鄉僻壤均沾實惠如有不肖官吏借端私徵者即行察叅十一月庚辰上諭大學士等曰本朝自統一區宇以來於今六十七八年矣百姓俱享太平生育日以蕃庶戸口雖増而土田竝無所増分一人之産供數家之用其謀生焉能給足孟子曰無恒産者無恒心不可不為籌之也朕意欲將康熙四十九年應徵錢糧預配各省用度為之抵算至五十年將天下應徵錢糧一槩蠲免如近省有支用之事則以户部庫銀給發應用康熙四十九年庚寅八月乙亥上諭户部福建將軍祖良璧奏稱福建泉州漳州等處被旱未收福建民多田少不可不急為拯救雖總督梁鼐曽疏請借銀買米平價糶賣但所買米數不多且一時不能運至曩昔山東江南等處被災朕一聞知即為拯救天下人民皆朕赤子應即遣部院大臣會同江浙督撫截留本年起運鎮江漕糧十萬石松江湖州漕糧各十萬石鎮江之米運至狼山松江湖州之米運至乍浦著福建督撫提鎮不拘一人率領福建戰船將運往狼山乍浦三十萬漕米轉運至福建賑濟被災之民務期均沾實惠雖此米不能速至而被災之民聞朕此㫖即歡悦而定矣其泉州漳州今年未完錢糧亦著暫行停徵十月甲子上諭户部朕恭膺天眷祇承列祖鴻庥統御萬方子育兆庶廑懐至治宵旰靡寜幸際海宇同風邉隅向化遐邇中外帖然衽席之安是皆仰荷天地祖宗福祐之所致也方朕八齡踐阼之初太皇太后問朕何欲朕對臣無他欲惟願天下治安生民樂業共享太平之福而已迄今五十年矣惓惓此心未嘗一日稍釋毎思民為邦本勤恤為先政在養民蠲租為急數十年以來除水旱災傷例應豁免外其直𨽻各省錢糧次第通蠲一年屢經舉行更有一年蠲及數省一省連蠲數次者前後蠲除之數據户部奏稱共計已逾萬萬一無顧惜百姓足君孰與不足朝廷恩澤不施及於百姓將安施乎朕毎嵗供御所需槩從儉約各項奏銷浮冒亦漸次清釐外無師旅饟饋之煩内無工役興作之費因以厯年節省之儲積為頻嵗渙觧之恩膏朕之蠲免屢行而無國計不足之慮亦恃此經畫之有素也比來省方時邁經臨七省南北人民風俗及日用生計靡不周知而民生所以未盡殷阜者良由承平既久户口日蕃地不加増産不加益食用不給理有必然朕洞矚此隱時深軫念爰不靳敷仁用甦民力明年為康熙五十年思再沛大恩以及吾民將天下錢糧一槩蠲免因衆大臣議奏恐各處需用兵餉撥解之際兵民驛遞益致煩苦朕因細加籌畫自明年始於三年以内通免一周俾逺近均沾德澤直𨽻奉天浙江福建廣東廣西四川雲南貴州所屬除漕項錢糧外康熙五十年應徵地畝銀共七百二十二萬六千一百兩有竒應徵人丁銀共一百一十五萬一千兩有竒俱著察明全免竝厯年舊欠共一百一十八萬五千四百兩有竒亦俱著免徵其五十一年五十二年應蠲省分至期候㫖行民間舊欠既經豁免嗣後毎年額徵錢糧務如數全完倘完不及額或别有虧空託稱民欠則負國甚矣即責令督撫以下官員償補仍從重治罪夫地方大吏以及監司守令皆與吾民誼均休戚者也誠克體朕孳孳保赤之懐實心愛養力社侵漁脧削則閭閻咸得衣食滋殖無有失所而為官吏者亦身名俱泰豈非昇平樂利之盛事歟爾部移文各督撫諭㫖到日即刋刻頒布徧示窮簷咸令知悉十一月辛卯朔兵科給事中髙遐昌疏言凢遇蠲免錢糧之年請將佃户田租亦酌量蠲免著為例上諭大學士等曰蠲免錢糧但及業主而佃戸不得沾恩伊等田租亦應稍寛但山東江南田畝多令佃户耕種牛種皆出自業主若免租過多又虧業主必平均無偏乃為有益著交部議奏康熙五十年辛夘十月戊午上諭户部朕誕膺大統撫育寰區夙夜孜孜不自暇逸凢以為民生勤圖利濟休養安全即無水旱之虞時布寛仁之政蠲租除賦務使遐方率土無不均沾或值雨暘偶愆出帑發粟多方賑恤其有益於吾民者靡弗備舉而亟行之朕慇􅮆周祥之至意前康熙四十九年所頒諭㫖甚明原欲將五十年天下錢糧通行蠲免以諸臣集議恐需用兵餉撥解之際兵民驛遞益致煩苦故自五十年為始三年之内全免一週除將直隸奉天等九省康熙五十年地丁錢糧一槩蠲免及厯年舊欠錢糧一併免徵外山西河南陜西甘肅湖北湖南各撫屬除漕項外五十一年應徵地畝銀共八百四十萬四千兩有奇人丁銀共一百二十萬八千一百兩有奇著察明全免竝厯年舊欠共五十四萬一千三百兩有奇亦俱著免徵其康熙五十二年應蠲省分至期候㫖行民間舊欠既經豁免嗣後毎年額徵錢糧務如數全完倘完不及額或有虧空託稱民欠即責令督撫以下官員償補仍從重治罪該督撫須實心力行期副朕惓惓愛民之意如有指稱事故侵欺科派事發之日必嚴行究治諭㫖到日徧示城郭鄉村深山窮谷咸使知悉康熙五十一年壬辰十月癸丑上諭戸部朕宵旰孜孜勤求民瘼永惟惠下實政無如除賦蠲租除毎嵗直隸各省報聞偶有水旱災傷照輕重分數豁免正供仍加賑恤外將天下地丁錢糧自康熙五十年為始三年之内全免一週使率土黎庶普被恩膏除將直隸奉天浙江福建廣東廣西四川雲南貴州及山西河南陜西甘肅湖北湖南康熙五十年五十一年地丁錢糧一槩蠲免厯年舊欠錢糧一并免徵外所有江蘓安徽山東江西四省除漕項外康熙五十二年應徵地畝銀共八百八十二萬九千六百四十四兩有奇人丁銀共一百三萬五千三百二十五兩有奇俱著察明全免其厯年舊欠銀二百四十八萬三千八百二十八兩有奇亦并著免徵計三年之内總免過天下地畝人丁新徵舊欠共銀三千二百六萬四千六百九十七兩有奇各該督撫務須實心奉行體朕軫念民生至意如有侵欺隱匿使惠不及民借端科派者該督撫嚴行察叅督撫失察事發之日亦嚴加究治康熙五十二年癸巳三月庚子上諭大學士九卿等曰朕聞廣東米價騰貴朕軫念天下民生無間逺近雖邉徼之外視之猶輦轂之旁也粤地素號産米之區今米價驟増小民必致艱食督撫係封疆大吏凢有闗地方事務隨所見聞應即據實陳奏朕處深宫已周悉萬里之情形而伊等漫無奏報殊屬懈忽前福建嵗歉米貴朕令截留江浙漕米由海道轉運賑濟諭㫖方頌市價立平於地方大有禆益今廣東亦宜照福建截留海運朕詳詢投誠海賊陳尚義等見今截留江南漕糧由海運八九日可至福建自福建八九日可扺廣東值今風勢不順不可轉運必至八九月後北風漸利始可轉運朕意於八九月後將水師營戰船装載米石運送易於到廣而兵丁亦可熟練水勢其天下地丁錢糧前已於三年之内全免一週今粤地米貴若將本年地丁錢糧仍行催徵則民力維艱不免輸將之苦應將本年地丁錢糧停其催徵遣趙申喬前往廣東會同督撫將朕軫念民生至意刋示宣布以慰輿情恩詔内有賞賫緑旗兵丁一欵即令趙申喬動支廣東庫帑親行核實按名賞給使各沾實惠又諭曰國家幅員甚大水旱豐歉勢有不齊凢遇歉收之年督撫等但據實速報則或蠲賑或停徵先期酌行於百姓乃有裨益至所奏地方官員捐捧賑濟皆虛名而已何益之有十月庚寅上諭九卿等曰朕念福建廣東沿海州縣值此青黄不接之時宜酌量蠲免張鵬翮奏曰頃䝉皇上特加殊恩已令運米賑濟矣但連年蠲免甚多見今動用至康熙四十九年錢糧矣上曰即動用至五十年錢糧有何妨礙今米雖運去但足餬口不能辦錢糧也朕心惟以百姓為重蠲免之事不可遲延十一月庚戌上諭户部朕勤求民瘼無間遐邇雖在邉徼逺省偶有旱澇災傷無不訪察情形殫思賑救今嵗直隸各省地方俱獲収成惟廣東三水清逺髙要髙明四會五縣福建侯官縣福右衛二處甘肅靖逺衛環縣鎮原縣固原州固原衛平凉縣平凉衛崇信縣慶陽衛靈州所㑹寧縣寧夏中衛寧夏所古浪所一十四處今嵗夏秋被災各督撫已經奏聞雖各省地丁錢糧新經全免然一方災歉悉厪朕心艱食之際重以追呼朕所不忍其明年應徵廣東省三水等五縣額銀七萬七千七百兩有奇米一萬七千六百石有奇福建省侯官縣等二處額銀三萬六千六百兩有奇米六千四百石有奇甘肅靖逺衛等十四處額銀四萬七千七百兩有奇米八萬八千五百石有奇草八十四萬三百束有奇悉與豁免爾部即行文各督撫務須實力奉行徧為曉諭俾民間無催徵之累肆力東作用稱朕撫恤災黎至意康熙五十三年甲午十一月庚戌上諭户部朕撫御寰區勤求民瘼凢地方水旱災傷必詳加咨詢先事預籌其有荒歉上聞蠲賑頻施務令得所五十餘年來夙夜孜孜如一日也前因甘肅靖逺衛等處年嵗不登民艱粒食已多方賑濟本年錢糧或蠲或停而山地磽瘠民鮮蓋藏若不大沛恩施目前已自艱難來嵗更何倚恃此被災二十八州縣衛所康熙五十四年額徵銀九萬七千八百七十兩有奇糧二十三萬九千四十石有奇草二百五十三萬七千八十束有奇俱著通行蠲免行文甘肅巡撫實心奉行務使比屋均沾實惠用副朕撫恤災黎至意康熙五十四年乙未三月己亥先是上以蒙古地方大雪命理藩院遣官閲勘牲畜倒斃缺食窮困人等至是回奏上諭曰散賑之事勢難速達吳喇忒等旗居近黄河蒿齊忒阿霸垓阿霸哈納蘇尼特等旗有達爾諾爾郭果蘇泰察罕諾爾諸水可先教其捕魚為食毎處派新滿洲三十人并造船人等遣理藩院司官帶網前去教導䝉古人等其作何運給米糧及給與牲畜養瞻之處著速議具奏庚申上諭阿霸垓輔國公達爾漢徳木楚克等曰從前四十九旗田禾不収以致大饑朕施恩給以米糧又賞牲畜嗣因大雪牲畜殆盡朕復施恩如前爾等三年内已漸致富又七旗喀爾喀為噶爾丹所敗牲畜帳房全無單身來歸者朕賜米糧牲畜等物不令死傷一人拯濟以後富逾舊日今爾等十餘扎薩克䝉古縱多不過萬數令爾等富足甚易但爾等目今窮困救濟宜速而運米勢需時日故先教以捕魚資食以待米至給散至其後施恩養瞻處朕見在籌畫二三年内可使致富也爾等徧諭衆蒙古知之五月甲辰上諭理藩院聞被雪各䝉古因朕贍濟竝未傷損一人朕甚喜悦䝉古等已知捕魚可將漁船及網給與伊等令其仍在澤旁捕魚而食將所給米糧節省留以度冬又所給牲畜不久蕃息即可漸致富饒矣是日上諭議政大臣等曰哈密為䇿妄阿喇布坦所侵恐不能生理著甘肅巡撫遣官運送米糧牛羊往賑六月庚辰上諭大學士等曰甘肅地方被災之民應作何賑濟著九卿詹事科道會同速議具奏賑濟饑民之事較之征勦䇿妄阿喇布坦為更緊要爾等可速𫝊諭十月壬辰上諭户部朕早夜孜孜軫懐民瘼四方水旱時勤咨詢惟恐閭閻之葢藏未裕一遇歉嵗收穫失望窮黎即無以資生也直隸順天保定河間永平宣化五府所屬地方今嵗雨水過溢田畝被淹者甚多糓耗不登民艱粒食見今緩徵賑濟雖惠澤頻施而來春應徵錢糧若仍行徵収恐匱乏之民輸將難繼著將五府州縣康熙五十五年地丁銀八十五萬五千八百兩有奇糧米豆糓一十一萬五千五百石有奇草九萬四千九百束有奇悉與蠲免爾部即將此㫖行文該督令徧飭所屬州縣官員務須實心奉行俾窮鄉僻壤均沾朝廷徳意倘有不肖官吏私徵侵蝕者察出從重治罪十二月乙酉上諭戸部朕統一寰宇宵旰孜孜惟以年糓順成民生康阜為念故凢地方水旱情形必時加諮詢其有嵗偶不登即詔所司即行蠲賑五十餘年來未嘗稍懈前因甘肅靖逺衛等處年嵗歉収既已多方籌畫蠲賑頻施復將甘肅被災二十八州縣衛所康熙五十四年額徵銀糧草束通行蠲免但被災之餘民鮮葢藏若非再沛宏施恐來嵗辦賦猶艱將寧州隴西渭源狄道臨洮五州縣衛康熙五十五年額徵銀糧草束悉行蠲免外其靖逺二十八州縣衛所康熙五十五年額徵銀九萬七千八百七十兩有奇糧二十三萬九千四十石有奇草二百五十三萬七千八十束有奇亦盡與蠲免諭㫖到日該督撫即通行曉諭俾遐陬僻壤莫不周知務期均沾實惠以副朕軫恤邉民至意康熙五十五年丙申十月癸巳上諭戸部朕統一寰宇無分中外皆欲久安長治共樂昇平宵旰孜孜五十餘年未嘗頃刻去懐也䇿妄阿喇布坦前曽頻行請安遣使來往近忽狂悖侵優哈宻哈密已經編置佐領即與内地無異若不遣發師旅置之不問㫁乎不可故特徵兵備邉一切飛芻輓粟悉支正項毫無累及閭閻然而行軍置驛及諸凢輓運皆由邉境今嵗山陜二省雖年嵗豐収喜登大有但邉民効力轉輸在所宜恤兹特大沛恩膏將山西屬前衛右衛大同懐仁馬邑朔州保徳等州縣衛陜西屬府谷神木安寨綏徳米脂安定吳堡保安榆林保寜常樂雙山魚河歸徳嚮水波羅懐逺威武清平甘肅屬山丹高臺古浪荘浪西寜肅鎮寧夏左屯中屯平羅中衛靈州寧州平凉固原鎮戎西安慶陽阜城甜水河州蘭州洮州等四十一州縣衛所堡康熙五十六年額徵銀六萬六千一百兩有奇糧米豆糓三十一萬七千七百二十五石有奇草一百七十六萬五千九百束有奇悉與蠲免并將從前積年逋欠亦悉與蠲除諭㫖到日該督撫即徧行張示使遐陬僻壤莫不周知仍嚴飭所司實心奉行以副朕加厚邊民至意其或陽奉隂違澤不下究該督撫題叅從重治罪十二月壬子上諭户部朕御極以來念切民生時勤宵旰凢巡厯所至必以編氓疾苦備悉詢問蓋欲比户之蓋藏恒裕三時之水旱無虞斯民氣和樂聿成豐享豫大之休也頃者朕巡幸口外經過三河等州縣暨永平府交界地方見今嵗秋成豐稔米價稱平惟是去年雨水過溢田畝間被淹没朕深加軫恤蠲賦平糶轉漕分賑貧民斯不失所今者雖復有秋然僅足支一嵗之用恐來年之輸將尚多難繼是必再沛恩膏始可大培民力著將順天永平兩府大興宛平通州三河密雲薊州遵化順義懐柔昌平寶坻平谷豐潤玉田良鄉涿州武清永清香河霸州大城文安固安東安房山保定延慶梁城盧龍遷安樂亭灤州撫寜昌黎山海等州縣衛所康熙五十六年地丁銀二十六萬四千三百三十六兩有奇米豆髙粱二萬一千六百四十六石有奇草九萬四千九百五十束有奇俱通行蠲免所有厯年積欠銀九萬三百九十六兩有奇米豆髙粱一萬六千三百七十五石有奇草八萬四千四百七十束有奇亦竝與豁除康熙五十六年丁酉十一月丙子上諭戸部朕撫馭寰宇五十餘年夜寐夙興為小民勤求生遂凢率土逺近皆期共享樂利聿成家給人足之休未嘗一日去諸懐也數十年以來各省正賦屢經全免厯年積欠亦已蠲徴偶有雨澤愆期或發倉廩散給或截漕糧賑救不惜億萬金錢米糓頻沛恩施誠恐窮詹艱難或至於顛連失所耳近者民力雖已稍紓然念分年帶徵銀兩若不格外優免則小民一嵗之所獲分納二年之賦以其贏餘養贍室家㫁難充足朕毎念及此軫惻良深宜更加殊恩通行豁免今將直隸安徽江蘇浙江江西湖廣西安甘肅等八處帶徵地丁屯衛銀二百三十九萬八千三百八十兩有奇槩免徴収其漕項雖例不准免亦著破格施恩將安徽江蘇所屬帶徵漕項銀四十九萬五千九百五十餘兩米麥豆一百十四萬六千六百一十餘石内免徵各半爾部即行文該督撫嚴飭所屬實心奉行徧行曉諭俾民間無徵催之累均沾實惠用稱朕撫恤羣黎至意康熙五十七年戊戌閏八月戊辰上諭戸部朕臨御五十七年凢師行轉餉及災祲偶見靡不廑懐憂切蠲免賑濟稠疉加恩蓋治安天下惟期民生得所而欲民生得所必以敷恩寬賦為急也三年以來因䇿妄阿喇布坦狂逞跳梁遣發大兵屯駐西邉一切軍興征繕雖動支正供錢糧不使累及閭閻而轉輸輓運陜西百姓勞苦急公實堪憫恤又荘浪等處地震隨經特遣部院堂官馳往察賑而用兵之後尤宜格外施仁撫綏黎庶應將陜西巡撫甘肅巡撫所屬通省各府州縣衛所錢糧米豆草束悉予蠲免目今係有軍務之時除米豆草束外其康熙五十八年應徵地丁銀一百八十八萬三千五百三十六兩有奇并厯年積欠銀四萬七百五十七兩有奇著一槩蠲免爾部速行文該督撫通行曉諭實心奉行務俾均沾德意以副朕篤念民勞拯恤災傷至意康熙五十八年己亥十二月辛酉上諭戸部朕惟治天下之要務首以乂安民生為先故自御極以來於閭閻疾苦無不博諮廣詢渙敷庥澤其有動用民力之處尤惻然軫念刻不能忘蓋六十年如一日也比年因䇿妄阿喇布坦狂逞跳梁興兵征勦逺厯邉陲其沿邉數處師旅屯駐一切雖皆支用正項錢糧而協辦轉輸行齎運送之事民力勞瘁朕心時切憫念曽將陜西甘肅所屬康熙五十八年額徵地丁銀一百八十八萬兩零厯年舊欠銀四萬兩零特沛恩綸悉行蠲免而沿邉各州縣衛所軍行既多飛輓之勞辦賦復滋催科之擾若非格外加恩小民恐致失業所有沿邉一帶陜西所屬府谷神木安塞綏徳米脂安定吳堡保安榆林保寜常樂雙山魚河歸徳嚮水波羅懐逺威武清平葭州龍川鎮靖鎮羅寜塞靖邉栁樹澗安邉磚井定邉饒陽水堡髙家堡甘肅所屬山丹髙臺古浪荘浪西寜肅鎮寜夏左屯中屯平羅中衛靈州寜州平涼衛固原鎮戎西安阜城甜水河州蘭州洮州寜夏前衛平涼縣固原衛河州衛蘭州衛慶陽涼州衛永昌衛鎮番衛甘州左衛右衛肅州衛鎮彜所等六十六州縣衛所堡康熙五十九年錢糧米豆草束俱宜蠲免但目今係有軍務之時除米豆草束外將康熙五十九年額徵銀九萬八千一百兩零盡行蠲免爾部行文該督撫通行曉諭實心奉行務俾均沾徳惠以副朕曲軫邉民至意康熙五十九年庚子六月丙辰上諭大學士等曰朕聞保安懐來等處地震宜速遣大臣前往賑濟若俟部中啓奏恐致遲延著副都御史楊柱屠沂速自京城出居庸闗前往延慶保安懐來沙城等處查閲一面奏聞加恩并查騐蔚州廣昌渾源等處如果被災著一并加恩直隸守道李維鈞亦著量帶地方官數員前往賑濟七月丁卯上諭副都御史楊柱等曰保安等處地震爾等前往散賑毋得愛惜銀兩有不足用即以奏聞務使百姓均沾實惠不可速回俟民情安定再行回奏其保安等處本年錢糧及次年錢糧俱著蠲免十月戊申上諭大學士等曰朕臨御以來凢事惟以實心行實政務俾羣黎均沾實惠從未諱言災傷崇尚虚文今嵗江南浙江湖廣等省大稔豫省㣲覺歉收朕已頒諭㫖將漕糧停止起運令於彼處収貯但陜西地方見有軍務又年嵗歉収故朕預頒諭㫖著總漕施世綸協同總督鄂海辦理除陜西厯年錢糧屢經蠲免并明歳錢糧另頒諭㫖蠲免外見令動支倉糓散賑而地方官員大半悉在軍前辦事之人殊少應照從前賑濟山東百姓之例差官往賑著九卿詹事科道會議具奏庚戌上諭戸部朕自御極以來無日不以民生為念凢閭閻疾苦必詳加諮訪至於地方偶遇災傷一有所聞即行蠲賑撫恤備至務期黎庶遂生樂業優游化日六十年來夙夜孜孜未嘗稍釋也邇年因西陲用兵師行糧從雖芻粟悉支正供絲毫無擾民間然轉輸必需民力勞苦宜恤曽將康熙五十八年陜西甘肅所屬額徵地丁銀一百八十八萬兩零厯年舊欠銀四萬兩零康熙五十九年沿邉各州縣衛所額徵銀九萬八千一百兩零屢沛恩綸盡行蠲免近聞二年歉収民有艱於粒食辦賦急公力何能支若非渙敷徳澤無以培養窮民是宜特頒浩蕩之恩用申勤求民瘼之念著將陜西甘肅所屬各州縣衛所除應徵米豆草束外康熙六十年應徵地丁銀一百八十八萬三千七百四十兩零通行蠲免爾部速行文該督撫徧行曉諭實心奉行務俾均沾實惠如有不肖官吏陽奉隂違澤不下究該督撫嚴察題叅從重治罪又署撫花善奏稱甘肅地方數年歉収糧草價值騰貴兵丁採買維艱朕念兵丁効力行間勞瘁堪憫准預給半年兵餉著即行文附近省分撥銀三十萬兩速觧甘撫頒發以副朕篤念民勞優恤軍士至意康熙六十年辛丑四月丙辰上諭户部朕覽京畿所報米價甚貴著將京通倉米石交與侍郎張伯行比時價酌減糶賣内務府荘頭所交榖石見在州縣収貯亦著派滿漢賢能司官照此糶賣正值榖價騰貴之時恐有偷盜倉内米石者著提督不時緝拏五月乙酉上諭大學士等曰朕因陜西歉収雖將錢糧蠲免動給倉糧又發庫帑特差官員散賑百姓尚未安堵今施世綸亦束手無䇿此皆係地方官員不切實留心為民設法綏理以至百姓流離聞得山西陜西富户積藏米石甚多若有賢能官員勸諭糶賣可以多得著將内庫銀發五十萬兩令左都御史朱軾往山西光禄寺卿盧詢往陜西再派部院賢能官員隨往毎處銀二十五萬兩勸諭富戸照時價糶賣米石庶乎易得將此㫖𫝊示九卿大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功徳大成仁皇帝聖訓卷四十一
