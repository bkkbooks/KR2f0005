body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷四十六飭臣工四康熙四十八年己丑正月乙未上諭文武諸臣曰朕向待大臣不分滿漢一體包容諸臣當人人感戴自効乃九卿㑹議時但一二人發言衆俱唯唯其漢大臣則必有涉於彼之事方有所言若不與於彼之事即黙無一語如此寧不有愧於舉國之清議耶此後爾等皆當省改凡人既讀書知義理即當以其所學見之於事非僅作文已也平時讀書至臨大事歸無用則所讀何書所學何事耶是日上諭浙江巡撫黃秉中曰為督撫者當清以持已實心辦事不交通近侍不夤縁部院則無往不宜矣至於偶遇歉收除蠲糧發粟賑粥三者之外别無竒䇿但在地方官實心舉行耳五月丁酉上諭大學士等曰在部効用人員初爲筆帖式之日即當念日後擢用可爲國家大臣自立品行今部院中欲求清官甚難岳飛云文官不要錢武官不惜命則天下太平矣九月甲午上諭大學士等曰工部光禄寺每年所用銀兩奏請預爲儲備赴戸部支領用完復奏一年之中光禄寺用二十餘萬兩工部用四五十萬兩以至百萬兩不等俱造黃册奏閲所用數目雖較前畧省而動工之處奉委官員於未估計之先即已領銀備用以致浮支肥已之弊不絶嗣後工部光禄寺著十日一次將所委官員姓名及支給銀數具摺奏聞如是則事務清而奢用之端絶矣又凡督工人員於工竣後銷算延挨時日至十年銷算者有之至二十年銷算者亦有之凡工作物料俱登册籍何事稽遲若此此不過欲從中作弊耳工程所用錢糧朕常核算極其簡易數日可畢嗣後官員銷算如有踰年者立即奏聞罷斥乙未上諭河南巡撫鹿祐曰爲督撫者不畏懼人奉職循理本無所難每因部費繁多以致不能潔己誠使實心任事專意民生一切情面俱可不必瞻顧河南俗樸民淳易於爲治比年以來五穀豐收今年開歸等處雖少被水已經蠲免錢糧令地方官賑濟矣嗣後一有災傷即當據實奏聞不可隱匿至積貯備荒最屬要𦂳巡撫乃地方大吏不在虛文宜實心爲利民之事且不徒一已清廉必使布按以下屬官俱勵廉潔始能利民至刑獄闗係民命凡錢糧等事有不合者部院可以駮查惟刑獄之事定案達部部院亦難更改爾於疑獄應詳愼駮審朕在位五十年於刑名最加愼重凡督撫陛辭之時每以欽恤刑獄訓諭再三爾可加意詳究以仰體朕矜恤庻獄之心至地方文武共事每多不和爾莅任後須文武和衷兵民一體為要十月丙午上諭大學士等曰近來科道言事必有所倚藉方始上疏至有關國計民生者全不念及如朕因浙江年歲歉收米價騰貴令江西湖廣米商報名不許積囤沿海一帶禁約不許出洋聞江浙米價皆平矣科道何不言及耶朕凡遇饑荒即蠲本年錢糧及歴年逋欠又留漕賑濟但恐民未必得沾實惠聞江南有催徴蠲免錢糧以償已之虧空者科道何以不行指叅己酉上諭四川巡撫年羮堯曰四川苗民雜處性情不一務湏殫心料理撫綏得宜使之相安比年湖廣百姓多往四川開墾居住地方漸以殷實為巡撫者若一到任即欲清丈地畝增加錢糧即不得民心矣湖南因丈量地畝反致生事擾民爾湏使百姓相安錢糧以漸次清查可也此為川中第一要事至於刑名尤宜愼重人命闗係至大審結之事達部亦難更改若有疑處即湏駮審爾當留心地方武官每獲一小賊輒張大聲勢自以為大有勞績盗賊何處無有但湏嚴行巡緝不可將小事看大了武官當勿令生事然亦湏稍留餘地使伊等養給其家爾為巡撫須文武和衷不可偏刻又諭曰為督撫者不請託在京之人便是好巡撫爾湏念一絲一粒民脂民膏得一錢須知從何處來總之以安静為要耳十一月庚寅上命戸部尚書張鵬翮往審江南江西總督噶禮㕘江蘇布政使宜思恭一案諭之曰審事從公而已若預存一意則不可也朕聞江南盗案尚有八百件爾到江南傳諭噶禮作速審結總之罪疑惟輕功疑惟重與其殺不辜寧失不經凡為督撫者俱當體此語以行事康熈四十九年庚寅正月庚寅上諭八旗大臣及内閣部院大臣等曰朕總理國家大小事務必計久逺今見八旗忽於生計習為奢侈此皆由該管之人不能約束伊等族長平時不先訓誡所致也去冬因米價騰貴以二月應給之米於正月給發米價隨即稍減可見八旗官兵以所支之米不運至家惟圖微利一時即行變賣及至此銀費去米價又貴勢必請將八月之米於六七月間給發且將求來年之米於今年預支矣八旗官兵應互相告誡自是以後務將所支之米力加節省必用至支米之時庻不墮富商囤米術中爾等大臣官員俱有教飬之責當仰體朕心潔已奉行康熙五十年辛卯三月辛卯上諭大學士等曰督撫大吏辦事當於大者體察不可刻意苛求寛則得衆信則民任焉治天下之道以寛為本趙申喬任浙江巡撫時民多怨之後任湖南廵撫大小官員無不被叅豈一省之内無一好官耶總之為大臣者不可輕率叅人明時臣工不能秉公顛倒是非挾讎彈劾此風不可不戒夫官之清廉只可論其大者今張鵬翮居官甚清在山東兖州為官時亦曽受人規例張伯行居官亦清但其刻書甚多刻一部書非千金不得此皆從何處來者此等處亦不必究又两淮鹽差官員送人禮物朕非不知亦不追求蓋惟愚民為不可欺居官之善與不善到任不過數月人即知之故曰天視自我民視天聼自我民聽民意即天意也乙卯上諭偏沅巡撫潘宗洛曰凡為督撫者操守甚為要𦂳爾宜潔已為下屬表率今天下太平無事以不生事為貴興一利即生一弊古人云多事不如少事職此意也馭下宜寛寛則得衆為大吏者偏執己見過於苛求則下屬何以克當至於紅苗僻在荒隅不得與内地百姓同視宜善為撫綏朕觀爾等漢官一遇難事便欲告退夫設官分職原欲令其寧謐地方撫飬百姓既為封疆大臣凡事宜一已擔當黽勉効力一遇難事即圖脱卸可乎九月壬辰上諭廣西巡撫陳元龍曰廣西地方近已寧静爾至彼處當使文武和睦兵民相安巡撫亦有管兵之責宜不時操練古人云兵可百年不用不可一日不備爾為翰林年久朕特試用以邊疆之責觀爾辦事如何爾宜盡心加勉至於居官聲名自有公論在也十月丙辰朔江蘇巡撫張伯行題臣屬七府一州比來年歲豐登家給人足嗣後臣更勸民積儲敎民節儉行見戸慶豐盈人敦禮譲矣上曰自古人臣事君必令民生疾苦具以上聞勸善懲惡屏絶私黨以愛民弭盜革除惡習敦厚風俗為務前張伯行奏稱務期家給人足仰報君恩今未及一年而遽云家給人足毋乃文餙太過乎聞江浙地方盗賊叢集鄉紳兵民甚屬不安又聞今歳錢糧未清虧欠甚多又糧船遲誤米色不堪昔朕南巡時米價較前甚賤且竝無災祲猶慮小民窮苦屢頒諭㫖今盗賊滋蔓該撫反稱家給人足者無非掩餙前言耳未必於小民實有利益也嗣後毋得如此虛詞矜譽凡事必速行完結敦風厚俗弭盗安民催儹糧船清理錢糧以圖報効該部其嚴飭之康熙五十一年壬辰十月丙辰九卿詹事科道面奏噶禮張伯行互叅一案上曰從古治天下者莫要於至公朕御極五十餘年凡内外大小之事皆以公心處之觀近日外官滿洲所叅大抵皆漢人漢人所叅大抵多漢軍皆非從公起見朕悉據理處斷竝無偏向張伯行居官清廉人所共知其家亦殷實朕巡河工時適彼為按察使知之甚悉但才具畧短耳噶禮辦事歴練至其操守朕不能信若無張伯行則江南地方必受其脧削一半矣語云文官不要錢武官不惜命然後天下乂安又云清官不累民朕為天下主如此等清官朕不為保全則凡為清官者亦何所倚恃以自安乎康熙五十二年癸巳九月甲戌大學士等以科道内陞外轉請㫖上曰言路不可不開亦不可太雜明代國事全為言官所壞觀今之進言者輒云某為上所喜某為上所惡每揣摩朕意私心窺伺以圖迎合朕竝無所愛憎之人其居官善者則愛之不善者則憎之耳即如噶禮居官如此不善不但無一人劾奏反有從而譽之者後噶禮與張伯行互叅差往審事滿漢大臣謂朕意有偏向故審理俱不公平朕亦不露意㫖直至議定奏聞方向九卿明諭於是衆乃知朕無偏向之意大凡人臣事君之道公爾忘私乃為正理且性理諸書中亦不過辨别公私二字事君者果能以公勝私於治天下何難若挾其私心則天下必不能治今科道於内外官員亦有明知其不善者或其人有所倚仗或其人素有聲勢不可動摇莫敢叅劾亦由學淺膽小故耳為清官者惟潔己不要錢猶是易事若論公爾忘私誠為難得科道官員内朕無深知者今條奏亦少將伊等照例挨次陞轉可也十月庚辰大學士等遵㫖以御史董𢎞彪保舉山西冀寧道彭騰翓問九卿九卿云彭騰翓聲名不佳上曰朕知彭騰翓向來奉職不善屢經降級天下官員甚多朕不能盡識雖識之亦不能確知其為人然後問於九卿九卿宜一意秉公據實舉奏今觀九卿大臣率多茍且謂何必與人為讐不肯直言人臣居官一日則當盡一日之職若互徇情面不實心辦事事何由而得理且科道者耳目之官果九卿保舉不公即當糾叅又科道亦有互叅之例今觀科道官惟有所倚恃始行題叅殊非臣道所宜然也董𢎞彪彭騰翓俱著革退庚寅上諭大學士等曰翰林官員内多有不識字義不能作詩文者此皆敎習不勤之故比年以來武英殿行走之人鄉會試中式者甚多蓋以在武英殿行走毎日不釋卷耳此後凡修書校書處著倂派庻吉士又諭曰道學者聖賢相傳之理讀書人固當加意然詩文亦不可廢或有務取道學之名竟不留心於詩文者此皆欺人耳康熙五十三年甲午三月丁卯上諭奉天府府尹郝林曰盛京旗民雜處命案甚多爾必親歴所屬地方誠心敎𨗳毋謂此非久任之地將事諉與將軍各部國家設一官即有一官之職為官者當立志盡職興起敎化有一畨整頓方無忝厥職也十月壬辰上諭大學士等曰朕自幼讀書無一時不以民間疾苦為念巡撫乃專任封疆之大吏理應實心為民勤求樂利邇來浙省地方歉收民生艱難每觀巡撫王度昭所奏竝無盡心利民之處再河南巡撫鹿祐所奏事宜亦未得當爾等傳問九卿十一月庚戍上諭山西布政使噶什圖曰布政使一官專管錢糧山西錢糧每年全完竝無虧欠州縣或有徴耗過重者爾宜加意訪察凡有益百姓之處當酌量行之十二月戊子先是商人馬維屛等以願領大錢收買小錢叩閽上命内務府同戸部會議戸部尚書趙申喬以其事不可行而郎中羅復晉將准行議稿送侍郎王原祁廖騰煃畫題具奏不曽送伊畫題疏請罷黜上曰凡事有理不可尚氣君子懲忿窒慾此語最宜詳思此一小事司官藐視即當叅拏何必忿怒且寛則得衆爾性苛急不能容人向任巡撫時所叅官員有身自知之而叅者亦有因人言而叅者果能實耶天地之大徳曰生所謂好生者非但不殺而已蓋於萬物皆養育而保全之之謂也爾居官雖清豈可自恃其清而為矯激之行乎又諭大學士等曰布政使牟欽元居官好巡撫張伯行題叅牟欽元交通海賊此皆伊多疑所致朕曽遣張鵬翮往審尋張鵬翮摺奏時朕批令張鵬翮同張伯行領兵於有海賊之處親身往拏總督赫夀聞此消息坐小船往黃天蕩探察方知張伯行所言盡虛妄耳張伯行又奏噶禮下人甚衆恐欲殺伊為噶禮報讐此亦無影響之事特因向牟欽元索幕賔不得遂起釁端總督巡撫皆有幕賔若為此生疑尋隙亦非為大臣之體清官多刻刻則下屬難堪清而寛方為盡善朱子云居官人清而不自以為清始為眞清又如易云不家食為官之人凡所用之物若皆取諸其家其何以濟故朕於大臣官員每多包容之處不察察於細故也人當做秀才時負笈徒歩及登仕版從者數人乘馬肩輿而行豈將一一問其所從來耶庚寅上諭雲南巡撫施世綸曰爾居官聲名甚好但過於偏執不度事理惟以己所知者為是天下凡事當中道而行今為封疆大吏理宜盡改前非不可拘執己性雲南年來米價騰貴地方甚逺倘遇災荒難於賑救爾宜留心料理至馭下屬務以寛恕為本壬辰上諭大學士等曰戸部尚書趙申喬保舉潮州知府張應詔准其陞補兩淮運使但趙申喬又奏張應詔為郎中時寓居寺院能耐貧苦授知府不製衣服隨從數人果如此言殊為未當為清官者竝不係於貧富張伯行家道甚饒任所日用之物皆取諸其家足跡所至防人謀害隨從四五十人今以為不清可乎且巡撫管理軍務一應兵丁宜鼔舞作興常加恩卹今以已為清官獨市餠餌而食兵丁賞賚不及豈合於理凡事皆有道理為官之人不取非義之財一心為國効力即為好官或操守雖清不能辦事無論諭㫖批駮與部駮之事積年累月概不完結似此清官亦何禆於國事乎康熙五十四年乙未二月庚午上諭大學士等曰部院滿漢司官皆有辦事職任必謹愼勤敏始克稱職如有懶惰昏庸輕浮躁妄生事招摇疾病疲癃者豈容姑留又各省地方官内有大臣子弟及大臣保舉陞任之人恃伊父兄及保舉大臣恣意妄行督撫不能約束卽居官清廉之人亦應素位而行謹愼自持豈可自恃清廉偏僻固執乎爾等會同九卿詳議具奏十月丙寅上諭大學士等曰辦理事情固不可不知文理然亦湏諳練政務之人方善若遇大事不可徒執虛文又如外省督撫但以不貪為盡善以朕觀之清乃居官一端之善苟於地方生事雖清亦無益也壬辰上諭大學士等曰凡滿漢大臣遇事應同心辦理今每滿洲大臣一議漢大臣一議此處大有闗係世祖章皇帝時為此特下嚴㫖至今聖訓昭然可不恪遵耶如果兩議亦應滿漢相閒豈可截然兩議從前未曾如此自趙申喬來始然凡事只有一理不可執拗今朕聽政五十餘年何者不曽經歴即小事必向大學士學士九卿問之大臣執拗猶之可也若為君者自行執拗則如之何著將滿漢兩議者交吏部都察院察出議罪十一月辛丑上諭大學士等曰張伯行為巡撫時每苛刻富民如富民家堆積米粟張伯行必勒行賤賣否則治罪此事雖使窮民一時感激要非正道亦祗為米價翔貴欲自掩飾耳地方多殷實之家最是好事彼家貲皆從貿易積聚竝非為官貪婪所致何必刻剥之以取悦窮民乎况小民無知貪得無厭近聞陜西有方耕種即挾制州縣報荒者此等刁風亦不可長又賑荒一事茍非地方官實心奉行往往生事蓋聚飢寒之人於一鄉勢必爭奪明時流賊亦以散糧而起此不可不愼也書云明四目達四聰朕於天下事無不洞悉然知之即發亦非大體總之為政以中正誠敬為本中正則能公誠敬則能去私朕日讀性理諸書見得道理如此康熙五十五年丙申三月戊午九卿議覆貴州巡撫劉䕃樞題請緩圖北征一疏上曰策妄阿喇布坦無知蠢動侵擾我哈密應發大兵即行殄滅但朕好生為念不忍驟加𠞰除因備兵邊地遣使宣諭俟其悔罪自新為中外生靈計其萬全措置之際必籌其前後慮及久逺防微杜漸始合機宜自策妄阿喇布坦侵擾哈密以來朕從容與大小臣工公同商酌辦理軍務竝未嘗有逞一己之怒形諸聲色及統兵親𠞰之處劉䕃樞聽信訛傳邸抄妄行具奏以為分清邊界便可畢事如策妄阿喇布坦乘閒竊發邊民能保不受害乎劉䕃樞尚未衰邁著乘驛前赴軍前盡心周閲矢公詳議具奏九月戊寅貴州巡撫劉䕃樞奏臣遵㫖親赴巴爾庫爾軍前閲視滿漢官兵軍勢䧺壯首尾相連巴爾庫爾地方聞入冬大雪動深數尺倘道路壅阻糧何以運草皆覆壓馬駝何以牧放臣謹奏聞上諭大學士等曰軍機事務闗係重大一言可以鼓勵士氣一事可以退縮人心本朝自太祖高皇帝太宗文皇帝世祖章皇帝迄今百有餘年所向成功事事上應天心以正討逆巡撫劉䕃樞乃讀書之人年已八十非屬無知初以朕為不能忍怒及至軍前無可奏對乃稱雪至三四尺糧何以運駝馬何食於此愈知其無能矣外藩蒙古共有百餘扎薩克人無一分糧餉馬無一束草乾自古及今極寒之地何以各安生業觀其一經雪後驚惶失措忘其身為巡撫管轄文武之責如敵稍強必至效曹申吉羅森方光琛輩所為也朕三統大兵曽當嚴寒盛暑久行沙漠不毛乏水之地於軍機事務以至調飬駝馬無不熟悉然後知古人論兵不得其道多無成功每至敗事深為太息朕中路統兵至博洛和屯於三月十六等日遇雨雪風霰自京師運米出口馬正肥者倒斃反多兵丁馬匹不甚傷損蒙古馬匹如常於此愈知古人乘春以圖蒙古之失策也朕近訓兵校獵至烏里雅蘇台八月十六日嶺巔雪深尺許至行營中惟深七寸駐蹕二日雪已全消此去京師七百里即如此矣設劉䕃樞見黑龍江東海北海等處冰結八尺之雪必至奏請毁城郭棄地方將居民盡行移徙矣古人云雪盈尺表瑞過尺成災劉䕃樞今奏稱巴爾庫爾地方雪深三四尺或係伊親見或係何人告伊之處竝未聲明仍著劉䕃樞前去雪深三四尺果屬親見著據實奏聞倘聽信他人妄誕恐嚇之語亦著據實奏聞甲申上諭大學士九卿詹事科道等曰國家設立科道寄以耳目重任建言叅劾乃其專責原任將軍席柱任都統時補授官員及披甲撥什庫等混索賄賂為西安將軍時尤貪婪不堪頃交議政大臣審訊眞情盡露人無不知而科道等官竟不糾叅昔年所用武大臣邇來漸少所以補授都統副都統等官止視其効力處漸次陞用但伊等多不諳事體亦不能約束兵丁兵丁全無畏懼法度大爲廢弛如原任右衞副都統黒雅圖人皆稱為胡打鐡卒以殺人獲罪宗室内朕亦嘗試用皆少不更事無勝任者至於總督巡撫但於地方不生事年歳豐登錢糧清楚即為稱職或有人自謂清官縱妻子奴僕暗受賄賂以此為清朕㫁不許如此清官何益之有且九卿及督撫提鎭内居官貪婪行止不端者亦或有之即當從公叅劾乃或因係某大臣保舉或因係某大臣門生故舊彼此瞻狥情面竝不題叅閒有條奏彈章亦止受人請託或欲使人畏懼自立威名耳至於會同保舉時或有欲舉之人指使他人舉出而已佯為不知朕為人君特從寛不深求而已非不知也爾等皆讀書之人性理一書公私甚明凡事一出於公斯為善矣科道内有招搖生事索詐取財代人陳奏者即行叅奏康熙五十六年丁酉十月己亥上諭大學士等曰河南省盜賊蔓延地方官未嘗奏聞朕諭山西總兵官金國正巡撫蘇克濟查奏復遣尚書張廷樞等前往查拏今已全獲覽其供狀與金國正蘇克濟等所奏相符皆河南巡撫等不能查緝之故此案鄰省各官俱已確聞而九卿豈無所聞耶九卿内有豫省人何亦無一人奏聞也四川巡撫年羮堯所賞差往松潘兵丁銀兩米石牛羊茶葉康泰等領去竝未全給兵丁致各兵鼔譟而回此皆康㤗平素不訓練竝不撫恤之故也各省督撫提臣悉係封疆大吏總兵官等各有管轄官兵防守地方之責闗係甚重凡補總兵時朕惟視其騎射嫺熟人材壯健曽有効力之處即行除授此内有居官甚劣不留心地方者九卿應隨聞隨奏今觀九卿保舉人員惟圖利己冀其酬報似此有闗地方要務以及大吏賢否雖有聞知竝不具奏此何故也康熙五十七年戊戌十月庚午上諭議政大臣等曰每旗都統副都統或有起家微賤專意狥庇一應補授官員併佐領等事恒有遲至數年或十年不奏者或一官病故已久數年尚仍給俸者一切事件漫不稽查甚是曠廢近聞都統石文英不出門戸亦不見人有事來奏每不俟事畢祗圖早歸亦不瞻仰朕容甚屬不堪現今正藍旗滿洲都統延信前往出兵其滿洲蒙古漢軍三旗之事著七阿哥辦理正黃旗滿洲都統巴賽署理將軍事務其滿洲蒙古漢軍三旗之事著十阿哥辦理正白旗滿洲都統和里差往雲南其滿洲蒙古漢軍三旗之事著十二阿哥辦理如此則别旗各相效法自必發憤勤事也康熙五十八年己亥十月丙寅上諭議政大臣等曰爾等皆係議政大臣凡議政諸事竝不留心俱草率奏聞自備運米人員親身竝未前往將官駝所運米石以為本身運到竟邀議叙自備種地人員竝未種地交糧而管理種地之人希圖利益揑稱交糧入倉亦邀議叙現今倉内米石已致缺乏所以侍郎敦拜等奏請明歲運米應作速運到以補缺乏爾等於諸事竝不留心草率議奏之處朕已屢降諭㫖嗣後爾等須加意恪遵康熙五十九年庚子五月辛巳上諭議政大臣等曰今歲稍旱應速行文與各路將軍或營中亢旱馬匹未肥或進兵之路甚旱水草不敷俱未可定勿謂既經議定進兵不敢復以亢旱為辭奏請停止朕念軍務所闗甚大從前屢諭爾等及領兵大臣凡軍機之事有今日定議明日又改者未可拘執要在相其機變而行朕於用兵之事必熟思而後頒發㫖意若無㫖意又恐軍中之大臣難於奉行也然軍前或因亢旱而無水草馬匹倒斃則兵丁如何前進如何回旋明年又如何進兵耶總之雨水及時牧草果好前進自無艱阻應即行進兵倘或亢旱馬匹疲瘦雨水不調牧草不堪則即以不宜進兵之處令軍中之大臣等定議具奏斷不可以今嵗若不進兵來年亦可再進作游移之語呈奏也路途遙遠恐發去文書遲延遺失亦未可定須於明日行文一次續後再行文一次有一處不可進兵即著將此一處奏請停止大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷四十六
