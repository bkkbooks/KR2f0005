body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷四十八訓將士二康熙十九年庚申三月甲寅上諭督理川湖糧餉佛倫金鋐等曰大兵進勦雲貴務在安輯人民撫綏苖蠻其敇將軍以下諸臣嚴禁官軍擄掠十月甲辰上命禮科給事中莫絡等傳諭大將軍圖海曰爾前奏暫停諸路進兵其説雖是但恐停止進兵賊愈滋蔓前爾面請緩兵朕下詔督戰始復岳州湖南逆賊悉潰暫停入川之師朕趣進兵遂平四川今賊以全力逼犯四川若從廣西南寧湖廣沅州進取貴州則寇蜀之賊自潰從此諸逆漸平地方悉定諸軍可以凱旋矣至投誠官員豈可深信宜留置左右時加防範朕前屢次宻諭今譚宏彭時亨等果復叛亂朕向謂此輩俱在爾軍中不意竟置之别所此等反叛之賊受爾何恩乃輕信如是也嗣後宜宻防之康熙二十一年壬戌五月壬子廣西廵撫郝浴條奏撫標官兵不應裁去九卿㑹議山東江寧河南山西直𨽻兵丁俱應留一千名其餘各省俱留一千五百名上曰廵撫舊制管兵至輔政諸臣時始行停止朕思裁去官兵闗係𦂳要必措置得宜地方始得安寧毎見武弁額兵有名無實虚冒錢糧又徇情將年老有疾者存留强壯者反行裁去則老弱徒然充伍虛糜兵餉强壯棄置不用豈能安静若將此情弊清除則兵丁自俱心服而地方亦保寧謐矣可將此本交與議政王大臣九卿詹事科道㑹議具奏康熙二十二年癸亥四月丁丑上諭西安將軍希佛曰陜西地方甚為緊要因爾効力行間練習軍務特􅂤此任爾到西安須嚴束兵丁加意操演不得騷擾百姓督撫布按俱封疆重臣地方大吏乃有駐防防禦等官公然騎馬入伊衙門平行抗禮者大失體統倘知縣等官與爾等將軍副都統平行爾等之意若何近見浙江福建將軍副都統督撫彼此不睦題請坐見禮儀豈不負朕視文武一體之意乎又漢中地方必􅂤選精兵發往戍守不得以强壯兵丁留置本標止以疲弱者發往爾其識之八月戊午上諭荆州將軍噶爾漢等曰朕以荆州地方極其緊要故特戍兵鎭守爾等至彼務令兵民相安方稱委任荆州自兵燹以來地方殘壞民生困苦曩時爾等親厯其地必知其詳自將領以至兵丁宜嚴行禁飭凡市肆要地毋得侵占至秋成之後爾等可親率兵丁不時操練務期隊伍整肅紀律嚴明毋得借端擾害百姓凡爾等舉動皆為兵丁之表率其所行若正不獨官兵有益即地方亦受其福矣近見西安官兵尚有滿洲舊制杭州駐防滿兵漸習漢俗此等情事皆責在爾等可勉力圖之至於爾等乘往船隻皆係雲南廣西回京官兵所坐之船其船夫勞苦已極爾等最宜體恤勿加凌辱聞船夫受兵丁凌辱不堪皆棄船逃遁深為可憫爾等所宜切戒九月戊寅上諭寧古塔將軍殷圖曰南方各省人人願往至寧古塔則不願者多朕以爾才能可用故􅂤任為將軍烏喇别無他事彼土之人惟好訐訟爾至當敷布敎化俾識義理令俱改過遷善尤宜愛養兵丁令各得所我兵逼近羅刹須時加操練以修武備巴海暴戾貪汚不恤士卒遂致失所其新滿洲皆求主來歸理應撫綏慰勞施以教化俾安其生盛京副都統佟寶是一堪用之人在烏喇將及一載彼處地方情形必能洞悉爾到日暫留佟寶一二月奏明後方遣回十二月辛亥上諭浙江温州總兵官陳世凱江西南贛總兵官許盛曰自吳逆叛亂以來爾等提兵征𠞰戮力用命掃蕩逆氛建立功績朕甚嘉之但為將之道務在戢兵愛民使兵民相安則地方受福爾等亦可永保勲名朕毎見功大者易生驕傲以致文武不和地方多事爾等當以此為戒康熙二十三年甲子四月乙丑江寧將軍瓦岱疏請率標下官兵一年兩次行圍上諭大學士等曰各省駐防官兵若不令其每年行圍習武漸致怠緩軍士將流於玩愒瓦岱所奏著即准行但江寧地方駐防雖久未有行圍之事恐民人不知以為駭異其令該督撫將習武行圍之處明白傳諭又軍士行圍恐有借端搶奪騷擾地方者著該將軍嚴行禁戢康熙二十四年乙丑八月丙申上命理藩院尚書阿喇尼等傳諭八旗察哈爾官兵曰爾等自太宗皇帝時皆編旗分佐領愛養有年今朕廵行邊外講習武備見爾等人材壯健頗諳禮制與京師八旗無異朕所以奬勵爾等不分内外一視同仁嗣後各宜善為畜牧力勤農事謹守成法勿為盜賊如此不特人皆得所即朕任使亦有禆益矣爾等其謹誌之康熙二十六年丁夘十月己巳上諭兵部尚書鄂爾多等曰黒龍江至為要地兵丁勞苦朕㒺不知曩者鄂羅斯占踞打虎兒索倫等處擾害邊疆幾四十餘年後備足軍食永戍黒龍江以困逼之鄂羅斯遂窘迫歸順茍糧儲不足則如沙爾瑚逹塔海等之往征而不能成功矣朕所以委曲區畫自盛京等處轉輸糧食及今所種米穀積貯至裕彼地大臣官員皆不思撙節濫給與無用之人茍且草率希圖軍儲罄盡勢必將彼等撤回在我之官兵撤回鄂羅斯大衆亦難以齊來然或一二人或十餘人陸續聚集於黒龍江松花江之間構造木城盤踞其地則我取之維艱是鄂羅斯為主兵而我反為客兵也今我惟多貯糧食永戍官兵則我兵以逸待勞矣如此則鄂羅斯頻瑣來犯斷乎不能欲大隊侵入則彼糧食何能輓運耶若黒龍江不將官兵永戍自松花江黒龍江以外所居民人難以安居爾等皆係選擇差遣須殫心竭慮務期為久逺充裕之計詳加籌議惟此一舉也亦無事再遣矣康熙二十七年戊辰六月辛亥上諭都統瓦岱曰兹以湖廣督標裁兵鼔譟特命爾瓦岱為振武將軍馳驛前往江寧爾到江寧帶領滿兵京口漢軍兵丁京口鎭標水師營兵江南江西督標火器兵丁戰船酌量帶領水陸竝進星速前徃湖廣與荆州將軍侯巴渾德江寧將軍博霽副都統倭賀商酌而行務須平定亂兵撫安黎庶毋得遲延致令滋蔓仍宜𠞰撫竝用嚴加偵探毋得疎虞大兵一到抗拒不順者戮之有先被賊脅從即時迎降者俱免誅戮有能擒殺賊渠投誠者分别陞賞須嚴禁兵將申明紀律經過地方無得騷擾百姓歸順良民加意撫綏以副朕定亂救民之意其行間將領功績及重罪俱察實紀明彚奏康熙二十九年庚午九月丁酉上諭大學士等曰朕向聞䝉古臨陣初雖驍勇一敗北即奔竄首尾不顧懦怯殊甚頃我兵討厄魯特厄魯特大敗奔髙山頂遁於險惡處因我兵排列太密敵人亂放鳥鎗故有被傷者且進退之際海螺未鳴此皆未熟於戰陣耳從古行兵未有不預操練者向時八旗兵丁毎歲春秋校獵比者恐馬疲於行故暫停止今春秋二季令八旗官兵集於寛敞平原之地排列陣勢鳴螺進退以熟操練康熙三十三年甲戌十月甲寅兵部題昭武將軍郎談移咨彼甲人等不遵法紀應將官兵治罪上諭大學士等曰此事著嚴處且頒給將軍等敕書内首言勿得累民凡行兵若無紀律斷不能成事前南方用兵時不擾民者皆克成功凡擾民之兵無一成功者易曰師出以律民豈可令其擾害乎凡領兵將佐皆宜知之十二月甲辰上諭八旗䕶軍校䕶軍等曰朕於滿洲䝉古地方行圍勤勞効力之人無有及我滿洲者此次官員兵丁盡皆整肅朕心深為嘉悅是以徧加恩賚若率此兵以臨戰陣更復何憂然兵丁所最仗者莫如馬匹爾等所養馬匹甚不加意每致疲乏皆由不善拴繫及不時飲水之故也爾等既養官馬若致疲斃必須買補豈不為累又爾等衣帽雖係小節有闗生計爾等好用貂緞貴物不知一貂帽一緞衣其價值狐皮帽羊皮袍數件爾等何用此貴物朕此次謁陵原欲廵幸邊外見爾等衣裝單薄故不果行若出師豈可如此特降此諭爾等各宜謹誌康熙三十五年丙子正月癸亥上諭督運于成龍等曰爾等輓輸絶塞毎夜如臨賊兵嚴為防䕶喀爾喀等素善盗馬尤宜加意廵視喀喇沁兵守馬防賊頗稱熟練可將伊輩分與各營晝使驅車夜使守馬庶乎有備無虞至新滿洲健於歩行熟於牽輓故選擇數人交與爾等酌量用之二月癸巳上諭安郡王馬爾渾輔國公賴士副都統迓圖等曰爾等往歸化城務揚軍威以示兵力强盛各處遠行偵探最為要𦂳爾等三人須同心効力不可互相推諉王與公皆年幼未曾歴練凡事宜與迓圖商酌而行迓圖亦不得推諉王等至朕行在與歸化城相近此時正當用兵之際不必差人請安五月甲戍上諭八旗大臣等曰爾等皆朕簡用之人今噶爾丹震懾兵威聞風而遁諸大臣雖不得與戰惟約束官兵不擾沿途居民不飲酒不妄行搶奪善飼馬畜就水草小心牧放不盜刈田禾以飼牲畜不踐踏田禾不遺一人一騎全使到家此即爾等之効力也如肆行搶奪遺留人馬事發斷不輕恕康熙三十六年丁丑閏三月已丑上召四川陜西總督呉赫西安副都統阿蘭台寧夏總兵官王化行原任總兵官王潮海馮徳昌及副將道員等諭曰朕往者未嘗臨邊不獲目覩邊地之苦今廵行至此視沿邊地方土瘠民貧但兵丁甚精鋭黄河以西榆林一帶比他處實勝然兵雖良如不善撫綏而困苦之則雖良無用也善撫綏者但將其應得錢糧如數支給即是養兵之道若不知撫恤雖多給國帑兵丁斷不能沾實惠爾等武臣多出身行伍一旦居官頓忘在昔為兵之苦而扣尅糧餉於心何忍今雖末員當計日後漸臻大任可不存心愛惜兵丁乎朕又聞營中虛懸兵數冒食錢糧各處皆然陜西尤甚且或聞朕來現招丁壯以補足原額者亦有之總之督撫提鎭當盡心體惜下僚免其餽獻則下僚不至貧苦下僚既不貧苦則斷不剥兵以自肥矣爾大小官員各有俸禄養亷衣食竝無所缺倘扣尅虛冒即罹於罪闗係利害非輕即今總兵官柯彩練兵甚精前亦曾經効力後以操守不好致人疾怨朕撤彼回京大都武臣之中勇敢果毅出力効用者多而操守潔清者少有愼於履任之初而渝於後者趙良棟操守頗好恢復雲南秋毫無犯在武臣中可謂良將矣爾等居官俱當法之但不可效其驕矜耳又聞總兵官師帝賓操守甚清雖身後而軍士尚愛戴之凡有功而居官好者朕皆擢用矣其一時聲名甚佳日久改節者皆年齒漸增貪貨賄計身家而坐此失也爾等其遵此訓㫖通行曉諭康熙四十一年壬午正月乙酉上諭都統嵩祝副都統達爾占侍郎傅繼祖等曰猺人所居之山通連廣東廣西湖廣三省林木叢密山勢崇峻恃此險僻頑梗不馴自宋明以來即在此三省擾害民生今差爾等到彼務體朕好生至意不必遽行征𠞰先曉示招撫如其不悛再行𠞰滅爾等馳驛前去須約束官兵毋得騷擾居民并將猺人山寨形勢三省官兵進征之路及立營之處繪圖呈覽朕揣猺人受撫之事五月内必成只將殺害官兵之為首猺人即行正法可也三月庚戌上諭大學士等曰廣東猺人盤踞深山恃其險峻素未歸化今忽突出搶奪村民殺害官兵已遣都統嵩祝等前往調集廣東廣西湖廣三省師旅直抵其穴嵩祝等遣郎中尤冷格所進圖形云猺人為數無多棲身之地雖不寛廣但山險路狹地接廣東廣西湖廣三省錢糧轉輸甚易今三省之師已壓彼境若猺人就撫則已否則令嵩祝等公議於猺人居處要隘立營圍之不過稍費錢糧不勞兵力彼自窮迫矣著兵部速移文嵩祝等遵諭行康熙四十二年癸未十月戊寅上諭禮部尚書席爾達副都統圖思海徐九如等曰爾等前往湖廣招撫苖人凡事宜同心協力則事無不成不和則事無一成且行兵立營須用怯遇敵對壘須用勇又以機先為要倘臨事時疑慮不定必致有悞爾等當以果毅行之如苖人歸降止誅倡亂肆虐之人否則殲其抗拒不服者毋得玉石不分戮及無辜我滿兵凡遇對敵恃勇以力勝者多爾等此行須用計招撫委婉從事勿徒恃勇力至於立營必擇高阜處設立朕前在寧夏用兵審度時勢多方調度是以錢糧不致耗費兵民亦無苦累此皆在主將之善於設施耳苖人歸附之後探其巢穴仍謹愼隄防不可以彼歸順遂忽視之康熙四十四年乙酉四月癸巳上南廵諭京口將軍侯馬三竒曰天下之兵朕皆知悉至此處之兵素稱無敵亦朕所聞練兵之法一進一退有緩有急自始至終整肅有叙方為盡善爾等􅂤練素精朕亦不必閱視可傳諭衆兵丁知之康熙四十七年戊子二月丁酉上命内閣學士二格往湖廣察審紅苖諭之曰湖廣紅苖前已設官管轄今何以彼此爭鬬以致殺戮此皆地方官怠忽所致况苖人所居之地纔百里一省之官何難鎭壓爾往㑹同總督郭世隆廵撫趙申喬明白詳審如兵民多事則懲究兵民果係苖人抗法則處治苖人不可姑息其以此㫖傳諭該督撫等康熙四十八年己丑十一月甲申上諭大學士等曰朕聽政年久凡事無不留心昔朕西廵時曾以戰地問於曾經行陣之提督總兵官等皆言自古戰陣之事必於舊戰地交戰從無戰於不可戰之地者朕觀韓信嶺上下凡七十里未嘗有一戰於此者以無水不可立營故也前我師征漠北與噶爾丹戰於昭莫多之地明永樂出塞時亦嘗戰於昭莫多以此觀之皆於舊戰地戰也行兵之道立營必視水草西北土厚掘至百丈有餘始能得泉一井之汲綆須一騎負之其地如此焉可屯兵是以用兵必以地利為要古人善用所長後人萬不及一也凡為將者烏可不知此意乎康熙四十九年庚寅四月癸卯上諭兵部各省緑旗兵惟直𨽻及西方沿邊一帶兵畧有可觀此外别省之兵俱屬不堪江浙之兵尤不耐勞苦該管官訓練稍嚴即出怨言甘汰所食之糧而不願操練此等人平時尚然至行陣之間安可用耶各省皆有食空糧者然不至已甚若浙省兵千名食空糧者則有五百名所存五百名亦僅充數而已俱非可用者近處州協標都司張朝臣往追山賊其身當先而進衆兵棄之先退此皆平時訓練不善之故也若滿兵則不然戰陣間皆願効死無離本伍退回一歩之理江浙駐防滿洲兵朕帶往行獵之處以苦差試之畧無怨意交相黽勉是以朕心大慰以此觀之兵在訓練之善不善耳不闗乎風土也著將此㫖傳諭江浙督撫提鎮等官八月庚辰福建浙江總督梁鼐疏請停止江浙二省官兵㑹哨海洋上諭大學士等曰海中行舟必俟風便福建遇南風始可北來江浙遇北風始可南去風之順逆不同難以㑹同廵邏著照所請停止㑹哨併行文江南浙江福建廣東山東五省各查明海邊分出廵哨康熙五十年辛卯三月壬辰上諭兵部朕於水陸兵丁調用年久深悉其情事船出海洋必俟風候若不察風而强行之必致兵船損壊官兵係朕歴年養育之人遇賊自應効死如無賊而徒以廵哨受傷實屬可惜凡提鎮等官當於此留意務加謹慎康熙五十二年癸巳正月辛丑上諭大學士等曰朕思海防之道惟在陸路兵弁守禦嚴緊乃為扼要如盛京山東沿海汛地官兵能加意防緝以致賊勢窮蹙遂革心向化以次投誠此即嚴防之明驗也蓋海賊原無窩巢初時不過數人或係窮民或為水手其力不能自備船隻亦無器械因飢寒所廹搶奪營伍及商賈之船隻器械漸次嘯聚久而勢衆又苦無米糧乃往來海洋肆行刦掠每趂夏月南風至山東盛京等處至十一月西北風發方能南回其停留數月之中或被官兵緝獲或因風雪凍餒漸次傷損所餘無幾如現在浙江廵撫王度昭招撫海賊陳尚義等詢其原夥賊船十一隻賊衆不下千餘人今止餘船四隻賊衆不滿百人矣觀去年十月十七日陳尚義等在山東與官兵抵敵一事遊擊閆福玉率官兵船六隻在劉公島地方廵哨遇賊船四隻乘西北風而來見官兵船即先發礮官兵放船追𠞰遊擊閆福玉奮勇向前因所乘之船出諸船之先里許賊見其勢孤遂三面圍住鏖戰良久其餘官兵船隻為風飄散不能前救以致遊擊閆福玉被傷殞命而賊衆亦傷多人迨官兵後船追至賊船已於十八日至盡山花島矣原其所以傷官兵者皆因官兵與賊船相遇安排火器之際致賊人乘間圍擁若如滿洲兵操弓挾矢以待賊船何由能逼近也且海賊出没狡猾素習海性非徒恃水戰所能撲滅也朕御極五十餘載凡水陸用兵機宜無不洞悉今沿海地方督撫提鎭能用心防禦不時稽察使賊無所掠奪則不期滅而自滅矣前年闗東海汛章京二員帶領官兵八九十人擊殺海賊四百餘人朕面問二章京爾等何不誘賊遠離海岸再行𠞰獲可無遺類據奏離海岸五里有莊村居民若賊衆過此倘地方萬一有失即不免疎防之罪矣故未敢逺誘是知沿海防汛果能嚴肅賊一登陸便成擒矣此防海之策惟陸路守禦為最要也其令沿海督撫提鎭等官明知朕意康熙五十四年乙未八月辛卯上諭都統穆賽曰朕以爾為人可用特令前往統領大兵其右衛黒龍江喀喇沁察哈爾土黙特鄂爾多斯喀爾喀等處兵丁務令共相和好至管攝兵丁不可失之柔弱其効力贖罪諸人可分在各滿洲䝉古緑旗兵内勿任其聚於一處祁里德諳練䝉古事務且誠實有膽氣婁徵額雖老病曽隨朕行兵熟識地利諸事應與伊等酌議奏聞朕所派往之新滿洲等行走熟練可令同我兵往汛界哨探再彼處有黄羊沙米等物應令兵丁採取食用如省一月口糧即得一月之益康熙五十五年丙申二月壬戌朔上諭議政大臣等曰運送糧餉安設臺站牧養馬匹等項俱係領兵將軍職任今米糧不能運至皆由水草不足之故朕昔親統大兵中路出征時沿途必留有水草之處以牧運米牲口爾等所親知者身為領兵將軍此等事不能深曉領兵直前致沿途水草如火燒赤地後隊兵馬及運米人役牲畜有不至困乏者乎朕曾屢諭衆大臣云領兵將軍甚難凡事不可不周知今歲停止進兵候種地及一應事務預備完畢審察兩下軍情再行定奪者為此故也且去年駐防哈密二百名兵丁戰敗策妄阿喇布坦時衆大臣俱欲進兵如果彼時即行進兵路途遙逺米糧焉能接濟現在駐扎食用米糧尚不能接續若彼時即行進𠞰不知作何景况矣如喀爾喀一路都統穆賽等所統之兵俱係滿洲䝉古熟練之人竝無糧餉不足等事將軍席柱等所統之兵尚未熟練所以如此倘運糧不至所闗甚大行令將軍席柱提督師懿德等酌留足用汛守調遣之兵其庸懦不堪者著㑹議撒回庚午上諭將軍席柱提督師懿德總兵官路振聲額駙阿寶等曰爾等出兵日久策妄阿喇布坦處竝無信息今值春令遣侍衛滿泰閲視營伍汛界西安滿洲兵陜西緑旗兵因係同省所以甚和爾等亦宜和睦為是康熙五十八年己亥八月己未上諭近御侍衛等曰朕於騎射哨鹿行獵等事皆自幼學習稍有未合式處黙爾根侍衛即直奏無隠朕於諸事諳練者皆黙爾根之功迄今猶念其誠實忠直未嘗忘也朕自幼至今凡用鳥鎗弓矢獲虎一百三十五熊二十豹二十五猞猁猻十麋鹿十四狼九十六野猪一百三十二哨獲之鹿凡數百其餘圍塲内隨便射獲諸獸不勝記矣朕曽於一日射兎三百一十八若庸常之人畢世亦不能及此一日之數也朕所以屢諭爾等者以爾等年少宜加勤學凡事未有學而不能者朕亦不過由學而能豈生而能者乎大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷四十八
