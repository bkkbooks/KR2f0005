body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷三十一興禮樂康熙八年己酉七月壬子上諭禮部祈穀之禮大典攸關應照舊例於明年舉行康熙十一年壬子正月乙丑上諭太常寺祀典關係重大理宜敬慎嫺習近見爾衙門典禮俱未諳練所奏音樂亦未合節殊非慎重禋祀之義以後著詳加練習勿仍前怠忽褻越祀典康熙十二年癸丑八月丁巳上諭禮部壇廟祭祀國家大典必儀文詳偹允符古禮乃可肅將誠恪昭格神明其致祭時辰齋戒處所稽諸往代各有定制爾部其詳察典例定議以聞康熙十六年丁巳九月丙子先是上諭内大臣覺羅武黙訥侍衛費耀色等曰長白山乃祖宗發祥之地今無確知之人爾等前赴鎮守烏喇將軍處選熟識路徑者導往詳視明白以便酌行祀禮爾等可於大暑前馳驛速去至是武黙訥等自長白山還京復命上曰長白山發祥重地竒蹟甚多山靈宜加封號永著祀典以昭國家茂膺神貺之意著該部㑹同内閣詳議以聞康熙二十一年壬戌二月壬午副都御史余國柱請釐正郊廟燕享樂章上曰饗祀樂章一代制作所係如郊祀天地各壇廟樂章太廟致祭樂章悉遵舊制其朝㑹燕享等樂風雅未偹著禮部翰林院酌古凖今求聲律之原定雅奏之制集議以聞戊戌上命領侍衛内大臣舅舅佟國維大學士明珠往伯夷叔齊廟行禮諭之曰伯夷叔齊古之聖人清風可仰爾等前往可焚香展敬六月乙巳學士陳廷敬譔雅樂十四章牛鈕等恭譯進呈上諭曰所譔樂章甚善翻譯又符合漢文可即發該衙門謹慎肄習康熙二十三年甲子正月壬辰上旣定筵宴禮儀禮部奏自後筵宴請撥兵部司官及各旗䕶軍叅領䕶軍校監察上曰筵宴關係大禮百僚齊集宜各加敬謹始無失禮之諐朕見元旦朝㑹旗下官員雜坐無紀大禮所在豈容慢忽禮部可㑹同兵部及八旗都統嚴加申飭毋至紊越康熙二十四年乙丑正月辛巳上詣祈穀壇致祭畢諭太常寺卿葛思忒等曰前見太廟致祭時執事官捧福胙趨走失儀對越祖宗典禮甚鉅惟嚴肅不懈始可薦馨在廟奔走之人亦當誠敬將事共襄大禮不應稍有褻慢且亞獻禮俱唱為次獻亦與漢文不符爾等㑹同内閣禮部察例奏聞康熙二十五年丙寅八月戊寅上諭大學士等曰先儒先賢從祀位次應視其道徳為先後不可援師弟為定例其酌議奏聞十一月丙申上諭禮部朕惟敬天奉祖郊祀廟饗必精白厥心竭誠致慎庶幾有孚昭格用洽明禋朕於祭祀壇廟每躬詣行禮未嘗不齋明祓濯實圖感通凡從事祀典者皆宜表裏精誠䖍盡職掌近見執事陪祀各官間有因循怠忽視為具文不能盡志致慤共効昭事之忱殊為非禮嗣後務俾各秉誠心克恭祀事凡行禮儀節始終整肅毋得慢易用副朕敬天奉祖至意康熙二十八年己巳正月乙酉上東廵至泰山之麓率文武諸臣向岱宗行禮畢諭部院諸臣曰朕廵歴所至再經岱麓重瞻祠宇詢其廟祝知香火荒涼日用難給岱頂諸廟亦復如之念泰山為五嶽之長載在祀典有功社稷不宜使之漸就寥落合將每歲香稅錢糧内量給數百金使上下嶽廟與元君諸祠守祠者得有資頼曉夜盡心兼可時加修葺以壯往來觀瞻示朕崇祀之意康熙三十八年己卯十二月壬午上諭大學士等曰元旦祫祭奉先殿捧請四祖神牌往來甚䙝朕心不安爾等㑹同内務府禮部太常寺考明代典禮議奏康熙四十年辛巳十二月辛巳上諭内閣禮部太常寺朕自御極以來一切祀典必敬謹齋戒躬親展祭以盡昭事之誠四十餘年於兹矣毎當臨祭之時朕無一事不敬此禮部太常寺起居注官所共知從來祭祀登降起立莫不如常這次行禮將畢微覺頭眩朕之身體稍遜於前於此可見祀典關係重大朕恐精力偶有不周致敬心少間可以此意諭諸大臣等著議奏康熙五十三年甲午十月己丑上諭南書房翰林等曰向來陞殿所奏中和樂章皆仍明代所譔句有短長體製𩔖詞後因文體不雅命大學士陳廷敬等改譔其章法皆以四字為句而奏樂人未易聲調仍以長短句法凑合歌之是雖文法易而聲調未易也今考察舊調已得其宮商節奏甚為和平必得歌章字句亦隨詞調則章法明而宮調諧此事所關最重著南書房翰林同大學士等詳考定議務使章法與聲調協和歸於允當康熙六十年辛丑四月丙申上諭大學士等曰朕披覽史冊於前代帝王每加留意書生輩但知譏評往事前代帝王雖無過失亦必刻意指摘論列短長全無公是公非朕觀厯代帝王廟所崇祀者每朝不過一二位或廟享其子而不及其父或配享其臣而不及其君此皆出自書生之論未為允當況前代帝王曽為天下主後世之人俱分屬臣子而可輕肆議論定其崇祀與不崇祀乎今宋明諸儒人尚以其宜附孔廟奏請前代帝王既無後裔後之君天下者繼其統緒即當崇其祀典朕君臨宇内不得不為前人言也朕意以為凡曽在位除無道被弑亡國之主外應盡入廟崇祀爾等將朕此㫖録出公同詳議具奏大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷三十一
