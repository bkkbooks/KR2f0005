body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷二十三任官康熙三年甲辰四月己未上諭吏部向來所定部院衙門滿洲䝉古漢軍官員品級陞轉與漢官不同滿洲䝉古官員無向外陞轉之例故其品級稍優今漢軍官員既與漢官一體向外陞轉其品級陞轉應與漢官畫一爾部酌議妥確以聞五月壬午上諭吏部都察院近日内外文武各官考滿一等二等甚多豈無一才力不及不稱職者此後各部直𨽻各省文武官員考滿將三年之内某官所辦某事奉㫖改正者某事駮行者某事處分者某事察明保奏若考過一等二等官員不能稱職者事發之日將考核時具保之官一併治罪十月辛未上諭吏部兵部都察院近見考滿内外各衙門具奏吏部等衙門又行覆題以致事多繁冗賢否甚難甄别内外大小文武各官除今年考滿外以後每三年彚考一次其到任未經三月者不必考向來自陳等官仍照舊例自行陳奏候㫖定奪至於司屬漢官定例陞授時如無考滿之人論俸深者陞授又於一年一次考核無益著停止應行事宜爾部院酌議具奏康熙七年戊申三月丁未上諭吏部國家政務必委任賢能乃可贊成上理今在京各部院滿漢官員俱論資俸陞轉雖係見行之例但才能出衆者常以較量資俸超擢無期此後遇有𦂳要員缺著不論資俸將才能之員選擇補用辛酉上諭吏部舊例科道乏員行取在外有司考選補授原因有司乃親民之官諳悉民間利弊得以據實指陳有裨政治且外官内擢足以鼔勵人才振興吏治今後科道缺出可移文督撫就有司内舉才能夙著者咨部爾部詳核具題行取來京朕親選用每嵗宜行取㡬人爾部酌議以聞康熙八年己酉十月癸亥上諭吏部朕思部院事務殷繁諸司官職掌必得賢能方克勝任今爾部但就部院見任官員調補其隨旗上朝者豈無賢能可備擢用之員可諭滿洲漢軍都統副都統等於阿達哈哈番以下拖沙喇哈番以上有明習滿文或通曉漢文夙具才幹堪任部院事務者從公詳擇一旗數員咨送爾部俟各旗缺出與應陞者並題補用康熙十二年癸丑九月辛未上諭吏部向來定例外官告病不准起用原以防其規避但其中有才品優長政績素著者廹於一時至情引例告歸終身棄置深為可惜宜令地方督撫確行諮訪果有才品堪用者著據實保奏以憑擢用康熙十三年甲寅三月丁丑上諭吏部大兵進𠞰逆賊指日蕩平地方恢復之後即應設官撫綏民生料理事務頃以需人甚急已將漢軍内可用人員照該督撫所請發徃軍前候用其漢人中素有清操及才能堪任煩劇者不拘資格著漢大學士以下三品堂官以上據實保舉發徃軍前與漢軍官員一體委用務期虛公推薦有裨地方以副朕廣攬人才之意康熙十四年乙夘閏五月戊子朔上諭兵部秦省巖疆重地軍務方殷靖逆將軍侯張勇忠勤懋著謀畧優長久鎭西陲奠安疆宇近復躬履行間殫心籌畫屢敗賊衆恢復城池志期殱逆渠定秦隴朕甚嘉之凡用兵籌餉一切機宜必須專其責任而後可以整飭軍機齊一衆心以收蕩平之績所屬地方總兵官有故違節制不聽調遣者許即指叅副將以下有臨陣退縮殺良冒功者聽以軍法從事其文官自道員以下倘有遲悞𦂳急軍需者㑹同廵撫據實題叅務令克展壯猷早奏膚功以副朕委任重意康熙十六年丁巳十月癸亥上諭大學士等曰朕不時觀書寫字近侍内並無博學善書者以致講論不能應對今欲於翰林内選擇二員常侍左右講究文義但伊等各供厥職且住外城不時宣召難以即至著於城内撥給閒房停其陞轉在内侍從數年之後酌量優用再如髙士竒等能書者亦著選擇一二人同伊等入直爾衙門滿漢大臣㑹議具奏康熙十九年庚申六月丁丑上諭大學士等曰據都察院題御史洪之傑試俸已滿應行實授朕思試俸各官一年俸滿稱職者實授不稱職者或仍試俸或作何改用宜更定一例不然試俸竟屬虚文矣洪之傑仍如舊例實授可𫝊諭吏部定例以聞七月甲午上諭九卿等曰各部主事日後皆陞道府與其俟為道府後令督撫保舉何如為主事時即令堂官保舉之為愈今後凡不係正途出身之主事歴俸三年果能勝任該衙門堂官保舉方許陞轉十一月戊午上諭大學士等曰御史張志棟疏叅大理寺少卿張永祺國子監祭酒馮源濟二人品行不端甚當又叅刑部尚書黄機衰老宜罷此言太過當矣國家用人正須老成練達之軰從來才徳難以兼全聞黄機居鄉謹飭安静是一老成人也康熙二十年辛酉正月辛巳上諭翰林院日講官敷陳經史日侍顧問贊襄典學職務繁多宜廣其員以彰右文之治見在滿官足用漢官尚宜増添著即開列應用各員職名具奏六月辛亥上諭大學士等曰行取官員吏部已經引見其各部主事等漢官朕尚未知其人科道為耳目之司選擇不可不愼爾等即𫝊諭九卿詹事科道令各舉所知將居官潔清辦事才能者從公保舉不可以同年同鄉親黨狥情私保即總督廵撫所舉有不當亦著指陳勿隠七月丙寅上諭大學士等曰近來投誠守備千總等官或帶偽總兵副將劄付即照伊偽劄反加優叙先用其緑旗官員於軍前効力顯著者並不得表見淹滯者頗多所在統兵將帥知悉此情者已經囘京無人在彼代奏此等官員甚為屈抑其特行宣諭以示奬勵戊辰上諭兵部在外武職官員有未經從逆効力行間勤勞日久者枕戈卧甲躬冒矢石建立功績雖經叙錄加銜加級亦不能即補實缺仍留該標投閒置散虚糜嵗月或赴部候補又因無缺守候遲延資斧匱乏深為可憫此等軍前効力之人應令本身赴部驗明原劄即行錄用推補壬申上諭吏部兵部大同地方連年荒旱百姓困苦以致流離失所就食他方因而田地荒蕪生計不遂今已屢行賑濟蠲免各項錢糧又聞雨澤霑足秋成有望但饑饉之後安養生全必得清廉愛民官吏方能加意招徠留心撫字著該撫將見任知府以下等官貪劣不職者照常叅處外其才具平常者酌量更調本省簡僻之缺仍於通省見任官員内選擇清廉愛民者調補若果能撫循使户口充實田地開墾著有成效該撫特行舉薦該部從優叙錄以副朕奬勵循良愛養百姓至意康熙二十二年癸亥五月乙夘上諭大學士等曰部院堂官惟敬愼廉潔方可無玷厥職今觀各部侍郎内雖辦事有才而操守不足者有之應將伊等改授武職向來副都統員缺有將侍郎改授之例自後副都統缺出可將侍郎職名一併開列朕將酌用之康熙二十三年甲子三月壬辰上諭兵部國家賞罰所以勸賢懲奸也又語云使功不如使過近見緣事宗室及有罪大臣行間得罪官員閒散者甚衆此軰之人與其置之閒散何如委以一職則賢能者可得其用况伊等或任統兵或歴部院較之旗下人等必優已為大臣者姑勿論其以下者應行選用䕶軍令其効力如此可漸得陞遷之路爾部即遵諭行四月戊申吏部等衙門奏各處闗差奉㫖令臣等於司官内保舉才守俱優存心謹厚之人派徃但司員辦事有才及謹愼者尚有其人至於操守知之實難不能保舉上曰節操清廉最為𦂳要即如部院堂官朕皆信其清操而委任之堂官於司員亦應信其清操而委任之各衙門官員或謹慎有守或生事奔競堂官豈有不知者爾等務將有守之人舉出則被舉者自能効力也六月丁巳上諭大學士等曰凡所貴道學者必在身體力行見諸實事非徒託之空言今漢官内有道學之名者甚多考其究竟言行皆背如崔蔚林之好事居鄉不善此可云道學乎精通道學自古為難朕聞學士湯斌曽與中州孫鍾元講明道學頗有實行前典試浙江操守甚善可補授江蘇廵撫康熙二十四年乙丑三月癸亥上諭大學士等曰内閣翰林院須用通曉漢文善翻譯者其自卿員以下部院無品級筆帖式以上及滿洲䝉古漢軍廢官與隨旗行走暨閒散人曉習漢文能譯滿文者統皆考試計其文理優長者用之其下所司速察以聞九月辛酉上諭大學士等曰漢軍既有旗分缺又補授漢缺不但人不敷用漢舉人進士亦且壅滯不得銓選漢軍既有外任該旗有缺即以外任漢軍補授亦無不可著九卿等議奏康熙二十五年丙寅四月戊申吏部以翰林院掌院學士員缺開列尹泰等請㫖上曰翰林院學士職任闗擊甚重必學行兼優方為允當滿漢學士得人則詞林觀摩興起咸勤學砥行人材成就有裨治道匪淺曩者喇沙里居是官其學問品行詞林至今追述之後來者俱不能及朕觀尹泰品有餘而才不足任以詹事則相宜若用為學士恐辦事不甚敏捷庫勒納任此職時較他人為優通政使葛思忒似亦可用可將此二人酌議來奏癸丑上諭吏部國家選用臣工必得才學通敏之人畀任斯庶官無曠實得用人之益朕見漢軍官員從事學問者少年未成材便渉仕版並無素抱何以莅事臨民去年特行考試分别去留曽將交白卷人員從寛姑免處分令其學習俟通曉文義該部題明考試錄用朕因從前考校情弊多端今特行親試荒陋不堪者甚衆朕不加搜察私藏懐挾自行發露者已交刑部拏問外其考列一等髙璜等及二三四等人員見任者仍照舊供職候補者照常補用王撫民等文理不通及書寫履歴投交白卷者俱著以原品隨旗行走其去年著令學習之人今仍交白卷及考置五等者顯圖僥倖著察議具奏王樑居官有聲仍准候補難廕生馬世永王琨王鎬胡枚念伊父殉節可憫著令學習俟通曉文義之日該部題明錄用程萬坦曽効力行間著以旗内武職補用爾部即遵諭行七月乙酉户部議覆御史戴通條奏坐糧㕔監督員缺應將清廉賢能官員保舉差徃上曰各部院官員不稱職者許堂官不時叅奏𫝊諭已久未見舉行至於保舉揀選不過特㫖偶一行之若以此為定例則資俸深者既有壅滯之患而奔競之端亦即由此而生保舉著不准行康熙二十六年丁夘四月辛亥上諭吏部國家用人凡才優者固足任事然秉資誠厚者亦於佐理有裨比部院中亦有一二才優之人所以未即陞擢者因其有才又能循分故久任之朕聽政有年見人或自恃有才輒專恣行事者思之可畏朕意必才徳兼優為佳若止才優於徳終無補於治理耳康熙二十七年戊辰十一月辛未上諭大學士等曰兵部考武官射箭合例者方記冊錄用或有前在行間顯著勞績若槩以考校不合例之故不得見用事屬可矜朕已屢有諭㫖且射而中者人材皆優射而不中者人材皆劣不可以此一槩論也若執此用人則人材優而有勞者終身不得見用矣又聞兵部閱射情弊有以中者為不中以不中者為中其飭兵部堂官自此以後其嚴之愼之康熙二十八年己巳閏三月壬寅上諭兵部朕幸江南浙江見驍騎校小撥什庫披甲内曽効力行間材力壯健者甚多此軰出兵時有雖得功牌未應得官者亦有因罪抵銷功牌者因是皆不得擢用淹滯可惜其行文江寧杭州荆州西安滿洲將軍副都統等如果有才堪管轄及曽經効力者選擇十人或十五人不拘旗分遇彼處佐領防禦驍騎校缺出即將選擇之人一併咨送來京爾部引見以備任用六月庚寅上諭大學士伊桑阿等曰八旗叅領佐領有職任之官多有以疾告休者此中亦有以不能騎射畏憚而求罷者夫管轄職任須得舊人為佳其𫝊諭八旗都統副都統等自是以後若有告休者詳察之果疾病不可支者允其休致若雖不能嫺於騎射而能管轄者仍留用之康熙三十一年壬申七月癸酉理藩院以効力年久之撥什庫等引見上曰伊等於事務何如侍郎文達奏曰伊等未為司官不曾辦事上曰辦事在人何論曽為司官朕臨御多年何事未歴部院諸臣欲寛人罪却不務求允當而故擬過重直待駮囘旋即改為無罪或注意在此而飾詞在彼實欲為此而佯託為彼此等處最多大凡經理事務須以持平為當此引見諸人曽為撥什庫差遣年久熟知䝉古性情與地方形勢俟理藩院主事缺出將伊等一併選擇具奏康熙三十二年癸酉十一月庚子朔上諭大學士等曰朕每日聽政必於辰刻中御門聞部院奏事大臣每日黎明即齊集午門外久候方始入奏迨奏畢復各歸署理事無乃過勞朕觀大臣内有年及六旬者亦有六旬以上者此後於家中各進糜粥按時來奏亦不至遲悞大臣節勞養體亦可多為朕効力數年爾等可將朕㫖𫝊與部院大臣知之十二月壬申上諭大學士等曰朕觀近日政務簡少每日啓奏部院大臣中有年邁者甚屬勞苦自後年六旬以外大臣令其量力間二三日一來啓奏至折本内遇𦂳要事朕有㫖𫝊進爾等方來請㫖若無朕㫖爾等將折本彚齊亦間三日一來啓奏康熙三十三年甲戌五月癸夘上諭大學士等曰國家以用人為要或有知其人可用而避嫌不舉者或有知其人不善而引為黨援者自今九卿當各將所知居官賢能者敬愼公舉科道官職司耳目誠能於所知賢者從公推薦不肖者立行叅劾則賢者勸而不肖者懲治道豈不羙乎可將此㫖𫝊諭九卿科道甲辰上諭禮部尚書兼翰林院掌院事張英曰翰林係文學親近之臣向因日講時時進見可以察其言語舉止近日進見稀少講官侍班不過頃刻豈能深悉著將翰林院詹事府國子監官員每日輪四員入直南書房朕不時諮詢可以知其人之能否以備擢用康熙三十四年乙亥三月癸亥上諭大學士等曰翰林官撰擬文章是其專任善與不善皆應有鼔勵懲戒之處自是以後凡碑文祭文其撰擬人姓名及所撰之文或經俞允或被申飭一一記明有三次善三次不善者俱行奏聞康熙三十六年丁丑七月丙午上諭兵部都統副都統典兵重任若但於本旗内選授則下五旗即有本旗之王掣肘辦事不得其正者甚多嗣後都統副都統員缺應於左右翼内不論旗分補授八月辛酉上諭大學士阿蘭泰曰山陜兩省最為要地以後文職缺人俱令奏聞朕酌量選用康熙三十七年戊寅十一月甲午大學士伊桑阿阿蘭泰以年邁健忘疏請引退上曰大學士最為重任必平坦雍和辦事敬愼者方為稱職至於記事學士可分任之爾二人著照舊供職十二月丙辰湖廣道御史朱廷鋐條奏服滿候補人員内有係特簡者有卓異者應不論班次即行錄用上諭大學士等曰覽朱廷鋐所奏未必無故但所言之事有當於理夫治國家者以人才為要朕親簡之官如丁憂服滿起補與降級及一槩丁憂者校年補授何時得錄用乎凡條奏合宜即為准行其間有私與否朕不問也康熙三十八年己夘五月癸巳大學士伊桑阿以老疾乞休上諭大學士阿蘭泰曰伊桑阿為人厚重老成辦事年久爾二人自任大學士以來不生事端凡事推誠從公料理不獨朕知之天下無不知者非尸位素餐者可比伊桑阿雖以老疾求罷朕不忍令去也六月戊戌朔上諭大學士等曰當今凡事皆可緩圖惟吏治民生最難刻緩諺云湖廣熟天下足江浙百姓全頼湖廣米粟朕南廵江浙詢問地方米貴之由百姓皆謂數年來湖廣米不至以致價值騰貴然楚省官吏並未奏報水旱又聞湖南百姓甚苦皆由興永朝王樑楊鳯起三人相繼擾害所致見任總督李輝祖為人誠實辦事頗優但俱係于成龍薦舉欲其不徇情面將從前廢弛整理斷斷不能李輝祖可召進京以侍郎用原任左都御史郭琇前為呉江縣知縣居官甚善百姓至今感頌其人亦有膽量無朋比郭琇著補授湖廣總督令馳驛赴任十月己巳上諭大學士等曰凡上司居官有聲者其所舉之人必佳上司不善則所舉者亦屬庸劣然亦有居官先優後劣者亦有居小吏善而陞遷後改變者若始終如一行止不改者不多得也康熙三十九年庚辰七月乙未上諭大學士等曰觀翰林官及庶吉士内有極貧者衣服乗騎皆不能備將此等查出作何施恩有益供職其丁憂告假囘籍之翰林官庶吉士有生計艱難無力至京者著該督撫酌量資助令其來京又翰林官員專司文翰更無他事各省學道員缺應與郎中並差滿任之日仍各囘衙門或掣籖或作何差遣爾等㑹同翰林院議奏九月丙午上諭大學士等曰旗下大臣子弟當令為侍衛執事勤勞効力今皆令入部院衙門大臣交相顧庇一應陞遷出差全不論俸之淺深人之優劣擅徇情面選擇保奏其間攬事恣行者亦有之此軰在部院衙門大臣等彼此相托不無掣肘見今寫本辦事坐臺馳驛等勞苦之處大臣子姪誰曽派遣況漢官見任三品以上堂官子姪不授科道之職若大臣子姪人材果優何處不可効力必在部院衙門方為羙耶今八旗滿洲漢軍大臣除同族不論外其子孫兄弟伯叔兄弟之子在部院衙門為司官筆帖式者著查明開列呈覽朕閱其可留者留之可去者去之上三旗以侍衛執事選用餘著隨旗行走俟伊等父兄不在任時再行補用部院衙門爾等可與九卿㑹同議奏十月己夘上諭大學士等曰今年内陞科道官仍管原任事外轉又停科道暫時無缺候補之人不得即補今嵗行取以科道用者著補額外御史俾隨九卿議事則伊等茍有一得可以陳奏爾等將此㫖𫝊諭吏部康熙四十年辛巳二月庚辰九卿等議覆河道總督張鵬翮題請河工官員保守三年不決照臺灣官員例以應陞之缺陞用應准行上諭大學士等曰河工豈可與臺灣並論臺灣係海外之地彼處官員俱屬揀用赴任時不帶家屬獨身前徃三年後調陞别地此内有意存焉今張鵬翮奏稱河工官員保任三年不決即陞果依此行三年後惟河工官員陞遷其他盡壅滯矣且部中定例亦從此而壊此本發還著再議三月壬辰九卿等覆奏河道總督張鵬翮題河工官員請照臺灣例叙用應不准行上曰凡事得中為善不可太過亦不可不及河工官員俱照臺灣例叙用雖屬不可然竟不准行亦未盡當須按其工程之極險次險與平易者分别作何加級則諸員方肯効力其或才本庸劣而督險要之工或才本優長而督平易之工皆不妨調用爾等可擇善馳驛中書遣至張鵬翮處令分别其工程之極險次險與平易者開明具覆到日再行定議壬子上諭大學士等曰據張鵬翮疏稱上險次險等工程但水性靡常倐爾變遷嵗修工程或變為險要險要淤塞即變為嵗修各官有實心効力者亦有隨衆塞責者豈可俱照臺灣之例一體叙用又言河員冒渉風濤與臺灣官員無異不知臺灣官員三年即陞之例並非僅為風濤起見且河員見今俱係保題從優補授之人若照臺灣例叙用必致吏兵工三部條例俱要更改況河工練員同時陞去獨存新任之員於河工有無裨益之處未經議及今河員已歴二載其三年之限自前到任之日扣算抑自今嵗明嵗扣算且再過三年張鵬翮能保尚在河工否接任河臣焉知從前官員賢否乃欲將河員遽為陞用可乎其不可行之故諭令張鵬翮知之五月戊子上諭大學士等曰自古帝王用人行政皆頼大臣薦舉賢良盡事君之大義天下至大為人君者焉能人人而識别之且官方賢否或操守清正或貪汚不肖必難掩於百姓必難逃於衆論其居官即此可見矣倘所舉之人居官皆善此乃實心為國無私之賢臣也所舉有善有不善此其心雖為國特識鑒未到之故耳若所舉皆貪汚行私此則大玷為臣之義矣辨别臧否以鼔勵實行權在人主或居小吏時亦有善名及得志之後改行者甚多焉能豫料自兹以後朕惟視其居官操守清廉以為實據無庸豫為疑度也十月己巳大學士等以湖南按察使員缺將九卿保舉道員施世綸等開列具奏上諭大學士等曰施世綸朕深知之其操守果廉但遇事偏執百姓與生員訟彼必庇䕶百姓生員與縉紳訟彼必庇䕶生員夫處事惟求得中豈可偏私如施世綸者委以錢榖之事則相宜耳康熙四十二年癸未正月丁夘上諭大學士等曰湖廣總督郭琇摺奏提督林本植標兵於城内公行焚刼朕思湖廣兵丁驕縱若不用一才能者統轄安能除其惡習林本植年邁著解任將大同總兵官俞益謨補授湖廣提督令即馳驛赴任兵弁中有深信者并令酌量帶去其帶去兵弁悉以職名奏聞四月戊戌上諭大學士等曰今吏部尚書缺尚未補人廵撫李光地徐潮原在内任歴年亦久早應擢用朕因地方起見所以暫留外任伊等居官誠優且得大臣體彭鵬趙申喬行事偏執惟務沽名所以事皆背謬李光地自任直𨽻廵撫以來每年雨水調順五榖豐登官吏兵民無不心服吏部尚書員缺以李光地徐潮問九卿尋大學士等問九卿言二人俱優覆奏上命李光地為吏部尚書仍管理直𨽻廵撫事十二月辛夘上諭大學士等曰朕今次西廵見直𨽻河南陜西山西四省接壤如山西澤州人授以河南懐慶府地方官雖云隔省相去實不過百里得無徇庇伊弟兄親戚乎又直𨽻人在河南接壤處河南人在直𨽻接壤處居官者甚多嗣後補授外官時掣籖所得地方如隔伊原籍五百里外聽伊赴任如五百里内雖隔省著廻避康熙四十五年丙戌三月丙寅九卿議雲南貴州廣西四川四省員缺若本省無應委署之員則委隣省附近官暫令署事俟部選官到日仍囘原任上曰如此議則官員到任仍至遲延令隣省官署事則隣省官少又至懸缺當照年滿千總分發各省候缺著將此四省見出知府以下員缺俱行察明單月掣籖補用至候缺官員論省之大小缺之多少一省或十五人或二三十人均匀配算亦歸單月一年一次掣籖分遣俟有缺出著該督撫指名挨次補授一面報部如未有缺出暫給俸候缺如此則員缺不致久懸而於事有濟矣康熙五十一年壬辰二月丁巳吏部以各省學政任滿開列請㫖上諭大學士等曰提督學政有教育士子選取人才之貴闗係甚要從前學差聲名不善者多間或取二三孤寒因而得名亦不可謂之善今大臣官員子弟内雖亦有學問優者但伊鄉㑹試時皆以賄進故一得學差取士亦必受賄科道官員知其情弊徇情不行指㕘此任甚要開列人員内有爾等所知者可各舉出三月乙巳上諭大學士等曰縣令與民切近有刑名錢榖之責未出仕以前如不能諳練事宜則登仕之後於地方民生無有裨益今嵗考中進士除㨂選庶吉士外其餘勿令囘籍俱交與禮部選翰林内學優品端者數人派令教習文藝從事典禮如有修書處率同修書又考中武進士皆以叅將遊擊守備等項員缺補用此等俱有約束兵丁整飭營伍之責未補官以前不可不先令其學習嗣後考取武進士亦著勿囘原籍見在年滿千總皆分撥八旗武進士等亦著分撥八旗隨圍學習行走康熙五十二年癸巳二月癸酉上諭大學士等曰福建廵撫覺羅滿保奏閩縣等十六州縣員缺請於卓異人員内揀選補授部議不准督撫等為地方得人起見懇切陳奏理所宜然其應否准行恩出自朕近見督撫等題請之事言官每從中阻撓前曽有御史條奏稱閩屬十六州縣員缺揀選官員補授可為一時之計未可為經久之例不如擇本省之員調補若揀選卓異薦舉官員發徃補授必至懸缺以待於地方無益等語閱之似乎有理其實皆係卓異薦舉官員料伊等即行陞轉不願徃海濱苦地希圖羙缺因於未經部覆之先求言官條奏則部議自然不准所以特囑言官言之也如此則權盡歸都察院科道等官矣此係明末惡習斷不可長也著問九卿詹事科道五月庚辰上諭大學士等曰武官係朕親驗騎射及人材壯健補授故爾識認文官皆係臨民之官闗係尤重凡掣籖月官悉行引見應補授者俱行補授其年老不及者令原品休致惟在外陞補等官槩不引見伊等賢否豈得周知嗣後作何驗看辨别爾等與九卿㑹議具奏九月丁夘上諭九卿等曰爾等俱為大臣天下督撫之賢否應於平時留心細訪以備顧問誰貪誰廉即行公舉雖門生故舊不為徇庇庶皆知畏懼而勉勵矣乃者朕問時或謂未經同衙門辦事或自謂平日不接見人知之不眞以此推辭非理也康熙五十三年甲午四月癸酉上諭吏部補授州同人内不堪者甚多應取至京師令九卿面試補用有出身不明者著革退康熙五十四年乙未十一月己酉上諭大學士九卿等曰部院司員見在官職雖卑日後亦可至大僚伊等朕多不認識必數數問諸大臣而用之亦不勝其煩今觀部院司員等劣者甚多考校武進士馬歩箭時侍郎覺和託舉止麤鄙向背不知何以辦事又有一司官因劣革退舊例滿洲不分文武兩途出征時則令於夸蘭大章京等處行走此後部院衙門滿洲司員著輪班佩刀在侍衛裏行如此賢否始見部院漢司官等朕亦未盡認識應照見今翰林分班行走例令伊等分班引見康熙五十七年戊戌四月丁未上諭大學士等曰近見八旗補授佐領及襲職官員俱有遲至數年未曽啓奏者此等事甚不宜遲今遲延至此顯有情弊交與都察院查明題叅其應補應襲之人著各旗大人帶徃熱河引見康熙六十一年壬寅三月壬子上諭大學士九卿等曰用人行政朝廷之大權也文官銓選掌之吏部武官遷除掌之兵部吏部論班論俸兵部論俸論銜從來定例也其武官歴三年加銜調補之例甚善近來督撫提鎭題補太多始不過州縣官千把總之𩔖今則司道副叅亦皆題補矣值此用兵之際姑且行之此習若久大有闗係且伊等題補官員内朕不知者甚多補用後遂皆稱為奉㫖補授之員諸臣皆讀書之人何可不慮及此在京大小職官皆朕所選用賢否易知若外省保題之官非朕所素知豈能一一定其優劣乎爾等㑹同詳議具奏七月甲辰上諭兵部撥派年滿千總發徃各省分營當差據爾部所議部文一到遇有守備員缺即照所分次序具題引見以漸補授則徃返多需日期員缺必致久懸伊等俱係朕揀選之人嗣後缺出報部部内即按次序補用不必引見大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷二十三
