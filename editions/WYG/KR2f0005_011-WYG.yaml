body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷十一法祖康熙八年己酉六月戊子上諭宗人府自古帝王建國親親賢賢義在並重我太祖太宗世祖以來篤念本支敦睦九族咸加愛惜欲其成立以共膺福祿也朕思罪有大小法有輕重宗室犯罪遽行革除宗室朕心不忍除世祖章皇帝時定案外自順治十八年以後凡宗室有犯罪革除宗室者著將情節一併查明具奏九月己未上諭理藩院昔我太宗皇帝遣發王師獲額哲等以歸念其為察哈爾林丹汗之子乃元朝苖裔不忍廢絶特沛殊恩加封和碩親王迨額哲既沒以其弟阿布柰襲封王爵阿布柰宜思世受恩眷竭誠圖報乃上負國家豢養之仁累失外藩朝賀之禮情罪重大理宜削封但念皇祖太宗皇考世祖優容撫恤之意不忍奪其封爵其以阿布柰之子布爾尼仍襲封和碩親王康熙十年辛亥四月乙酉上諭内閣翰林院致治之道無過法祖鑒於成憲乃㒺有愆欽惟太祖髙皇帝開天垂統太宗文皇帝式廓鴻圖規模𢎞逺啟佑無疆朕御極以來景仰先猷時切儀型之念世祖章皇帝時曽命儒臣纂修太祖太宗聖訓雖具藳進呈未經裁定頒布兹特命總裁纂修各官悉以前式分别義類重加考定勒成全書朕得以朝夕觀覽是訓是行亦俾子孫率由無斁爾等膺兹委任須恪恭勤勵務期早竣以副朕覲光揚烈至意康熙十七年戊午五月甲寅上諭大學士等曰朕觀古來帝王如唐虞之都俞吁咈唐太宗之聽言納諌君臣上下如家人父子情誼浹洽故能陳善閉邪各盡所懐登於至治明朝末世君臣隔越以至四方疾苦生民利弊無由上聞我太祖太宗世祖相𫝊以來上下一心滿漢文武皆為一體情誼常令周通隠微無有間隔一遊一豫體恤民情創作艱難立萬世不易之法朕雖涼德上慕前王之盛事凛遵祖宗之家法思與天下賢才共圖治理常以家人父子之誼相待臣僚㒺不兢業以前代為明鑒也康熙二十一年壬戌十二月壬午上諭兵部國家撫定寰區削平逆亂必資將士之力我太祖太宗訓詰戎兵申嚴紀律信賞必罰懲勸維彰其時行間將帥爭自奮勵所向奏功後因厯年既久奉行少寛人情不無怠弛朕御極以來恪守祖宗成憲每於戎政兵機加意整飭自逆賊叛亂各路將帥統兵征𠞰行間功罪屢經奏報朕念我國家軍法自昔嚴明稽核殿最務従詳確頻頒詔㫖炳如日星今逆賊殄滅武功告成振旅班師正分别功罪昭示懲勸之時因思軍法固不可寛功罪自宜相抵必酌量重輕情法允協庶俾羣心悦服激勵將來凱旋將帥内見在應議者有直抵雲南建立功績人員應詳察功過准其相抵雖未至雲南果立有大功亦應准抵其未至雲南及並無大功者仍照軍法處分爾部即遵諭行康熙二十四年乙丑五月庚午上諭兵部侍郎勒布等曰従來國家承平軍事不宜廢弛太祖太宗時兵器整齊堅銳今器械雖鮮明恐用時未必堅利此係爾部職掌嗣後可詳加㸃閲以副朕不忘武備之意康熙二十八年己巳五月壬戌禮部右侍郎張英等以編纂孝經衍義告成進呈御覽上曰孝經一書皇考世祖章皇帝以孝為萬事之綱五常百行皆本諸此命儒臣博採羣書加以論斷名曰孝經衍義朕繼述先志特命纂修今書已告成著刋刻頒發以副皇考孝治天下至意九月戊戌上諭大學士伊桑阿等曰昔太宗皇帝以次收定四十九家䝉古復欲全收喀爾喀未及行而太宗皇帝賓天今聞喀爾喀國内饑荒互相殺掠朕欲普天萬國皆得其所一體加恩特遣大臣收集流亡使之安挿得所康熙二十九年庚午三月乙未上諭禮部等衙門太祖太宗肇造丕基永垂謨烈神功聖德千古莫倫世祖綂一寰區𢎞開景運治化綦隆光昭天壤且當時勲舊翊贊勤勞若不及時彚輯成書恐嵗久人湮諸臣事蹟致滋闕畧應即行編纂昭示奕䙫應行事宜著内閣翰林院㑹同詳議具奏四月乙丑敕諭纂修三朝國史總裁官大學士等曰朕惟帝王肇基垂統綏御萬方峻業𢎞謨必勒諸簡册𫝊示無窮所以炳耀豐功宣揚至治甚盛典也我太祖髙皇帝誕膺寳籙鼎命維新締造丕圖規模𢎞逺太宗文皇帝道隆作述運啟休明式廓禎符燕貽景祚世祖章皇帝統一寰區化成治定中和懋建聲教遐敷惟列祖之相承冠百王而首出鴻猷峻徳巍煥難名緯武經文昭垂無斁舉凡戡亂安邦之畧立綱陳紀之宜用人行政之方牖民成俗之本布於方策厯久彌新創制顯庸燦然明備即當時勲舊諸臣翊贊王室宣力四方亦莫不託附風雲懋彰勞績唯従龍而應運信昭代之多才朕夙夜紹庭思闡先烈爰命儒臣恭修三朝國史爾等其督率在館諸臣薈萃琅函博蒐掌故折衷至當裁訂成書毋尚浮夸而乖情實毋徇偏見而失公平毋過質畧而意不周該毋務鋪張而詞多繁縟務期事歸確核文極雅馴勤以董成敏而竣事庶幾垂型萬世𫝊信千秋以覲耿光以揚大烈稱朕意焉康熙三十五年丙子四月乙未領侍衛内大臣索額圖等奏𫝊聞噶爾丹逺遁請皇上班師上召領侍衛内大臣公舅舅佟國維等諭曰朕以噶爾丹侵擾喀爾喀及外藩䝉古故秣馬厲兵整軍運餉分路進𠞰曲盡籌畫告祭天地宗廟社稷務期𠞰滅噶爾丹而還自兵丁以至厮役無不思滅噶爾丹者况爾大臣俱係情願効力告請従軍之人乃不奮勇前往逡巡退後可乎倘有存退後之心者朕必誅之爾等視朕為何如人我太祖髙皇帝太宗文皇帝親行仗劒以建丕基朕不法祖行事可乎我師既至此地指顧間噶爾丹可擒可滅而肯㢲懦退縮乎且大將軍費揚古兵與朕軍約期夾擊今朕軍失約即還則西路之兵不可問矣還至京城何以昭告天地宗社乎佟國維等叩首謝罪康熙三十六年丁丑九月乙未理藩院題喀爾喀故貝子阿南大之妻欲將貝子與其第三子丹津承襲今其長子滚楮克又呈請効力相應請㫖上曰䝉古人欲各為扎薩克不相綂屬朕意伊等若各自管轄愈善昔太宗皇帝招徠䝉古隨得隨即分旗分佐領封為扎薩克各有所綂是以至今安輯宜如阿南大之妻所請令其第三子承襲貝子其長子滚楮克倘欲另為扎薩克亦可封之康熙三十八年己夘六月辛酉理藩院題盜馬賊犯圖薩應擬正法上諭曰往者塞外多盜近朕遣人教養䝉古申嚴法禁盜賊屏迹四十八旗各獲生理風俗稍醇而圖薩獨先犯禁决不可恕且此法非朕創之也太宗文皇帝時因䝉古等無房舍牆垣法令若輕則馬匹難養故爾定法以警匪類耳康熙四十二年癸未七月乙巳朔上臨和碩裕親王福全喪哭奠畢自蒼震門入景仁宫諸王大臣齊集宫門奏請駕回乾清宫少息聖體復幸塞外避暑上諭曰朕但恐皇太后過哀朕心不安耳俟王殯後朕再起程至於居便殿者非自朕始乃太祖太宗之舊典也丙午上𫝊諭次日臨裕親王喪諸王大臣齊集後左門叩首再四勸止上諭曰太宗時穎親王之喪太宗親臨數次載在實録此皆爾等所知穎親王係太宗之姪况裕親王乃朕之親兄乎此朕效法祖宗並非太過朕昨因暑天勞頓今日未往明日必當再臨爾等不必懇奏康熙四十七年戊子九月壬午上諭大學士等曰朕閲實録太宗皇帝綂大軍抵北京擊敗明兵凱旋之時諸大臣競進曰臣等隨従至此本圖建立功業今奈何薄城而不取太宗皇帝曰今取此城甚易當視天意何如嗣後北京為流賊所據我諸王佐世祖皇帝直取北京統一寰宇逮於朕躬厯二代六十五年今天下治安率土人民咸享太平之福此亦朕恪守祖業夙夜勤勞之所致也康熙四十九年庚寅四月乙巳上遣都統蘇滿等往䝉古㑹盟諭之曰㑹盟之事肇自太宗文皇帝三年一次遣大臣㑹盟朕遵行已久爾等前徃不得生事䝉古漸次皆已富饒亦無大事或有小事來訴爾等但従公審理而已至䝉古餽爾等馬匹勿得收受亦不得買其馬匹大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷十一
