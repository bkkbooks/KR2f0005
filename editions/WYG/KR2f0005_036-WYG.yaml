body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷三十六澄敘康熙四年乙巳三月壬辰上諭吏部都察院民生之安危由於吏治之清濁吏治之清濁全在督撫之表率若督撫清正實心愛民則下吏孰敢不潔已秉公近見各省督撫彈章祗將一二衰老微官塞責豈所屬地方果無貪酷害民之輩總由姑息徇庇莫肯直糾吏治民生安所恃賴爾部院職任澄清督撫中有不肖昭著者即行叅處以後督撫糾劾官員除情輕者照例處分外其列款貪酷者即行解任究審儻因循舊習不肯實心任事一幷治罪康熙六年丁未二月戊辰上諭吏部兵部都察院國家政務委任庶官必内外大小臣工咸得其人乃可共襄治理京察大計軍政俱應於今歳舉行將内外大小各衙門滿漢文武官員分别澄敘以勵官方應行事宜爾部院察例議奏十一月甲子吏部遵㫖議覆工科給事中李宗孔疏請復行薦舉查考滿停止見行大計既有三年卓異之官似毋庸又行薦舉應仍照前議其所舉卓異之員不論本任内及陞轉任内一有不職應將從前申詳薦舉等官分别降革上曰前卓異薦舉原係竝行後因舉行考滿將薦舉停止舉劾關係勸懲大典今考滿既經停止薦舉仍著復行其卓異官原任有事舉薦官理宜處分至後任有事仍將前薦舉官處分永塞薦舉之路又所擬處分之例太過著再定議具奏康熙七年戊申六月戊子上諭戸部向因地方官員濫徴私派苦累小民屢經嚴飭而積習未改每於正項錢糧外加增火耗或將易知由單不行曉示設立名色恣意科斂或入私囊或賄上官致小民脂膏竭盡困苦已極朕甚憫之督撫原為察吏安民而設布政使職司錢糧釐剔奸弊乃其專責道府各官於州縣尤為親切州縣如有私派濫徴枉法婪贓情弊督撫各官斷無不知之理乃頻年以來糾疏甚少此皆受賄徇情故為隱庇即間有糾叅非已經革職即物故之員其現任貪惡害民者反不行糾叅甚至已經發覺之事又為朦溷完結此等情弊深可痛恨嗣後如有前弊督撫司道等官不行嚴察揭叅或經體訪察出或被科道糾叅或被百姓告發將督撫一并嚴處不貸至爾部收納直隸各省解到錢糧亦須隨到隨收速給批迴毋得縱容司官筆帖式書辦等勒索作弊苦累解役倘有違法即行叅奏如不行嚴禁察出將堂司各官一并從重治罪又言官於作弊害民者理應察訪指名糾叅乃近日章奏大率摭拾細故茍且塞責嗣後當據實陳奏毋得挾私讐害爾部即遵諭速行直隸各省大小官員刋示曉諭百姓康熙八年己酉八月壬申上諭吏部國家政務惟藉羣工贊理在京各衙門大小官員必各稱其職乃可以襄郅隆之化部院等衙門滿漢各官應行澄叙以示勸懲大學士尚書及三品以上堂官俱著自陳三品司官及四品以下各官爾部會同都察院詳加甄别具奏在外總督廵撫係封疆大臣職任緊要著該部院查明任内功過稱職與否詳加甄别具奏康熙十年辛亥五月辛酉上諭兵部武官有防守地方緝捕盗賊之責必弓馬熟嫺方克勝任其不稱職者雖總督提督有不時糾叅之例但與其糾叅於後貽悞地方不如於選授之時詳加選擇以後除見任推陞各員外凡係應到部掣籖之官爾部即考騐弓馬然後令其掣籖如有不堪者即行題明照例給以原品頂帶停其補授十二月癸未上諭兵部侍郎色塞赫等曰每見爾部題授江南浙江西安諸處章京俱係有資力者於盛京寜古塔諸處員缺則屬之貧弱之人豈無情弊又䕶軍校即陞佐領亦屬越次不公爾部宜詳察之康熙十七年戊午五月己酉上諭吏部兵部向以閩省海疆要地雖經恢復海逆未平民生凋敝撫綏防禦惟在文武大吏相與殫心料理方於兵民有裨今總督郎廷相提督段應舉自簡任以來為時已久山谷之伏莽未靖閭閻之困苦未蘇吏治未見澄清營伍漫無整頓寇警頻聞地方躪擾更有甚者海賊侵犯内地事前不能豫防事後不能𠞰禦皆由該總督提督庸懦無才職業不修所致殊負簡任之意仍令在任貽悞封疆著康親王傑書察議具奏康熙十九年庚申五月庚寅上諭大學士等曰雲南廵撫伊闢疏請將隨行人員坐名題補朕思此等人員果堪用者亦復何害乃一時倉卒奏請往往不能盡當如知府知縣等官俱將此輩補授徒悞地方此後坐名題補各官概行停止吏部仍照例銓選八月己卯上諭吏部科道為耳目之官關係最要必選用得人方能稱職漢官皆由行取考選補授惟滿官論俸敘陞著吏部都察院將見在滿洲給事中監察御史會同選擇堪用者仍留原任不稱職者對品調補部院衙門康熙二十一年壬戌九月癸酉戸部引見各部院保舉關差官員以蘇赫臣辦事有才與其列上曰凡部院司官果能謹愼奉職方不僨事如蘇赫臣及科臣莫洛輩俱狂妄自恃雖有才幹亦無足取可另行保舉以聞康熙二十三年甲子正月壬辰上諭大學士等曰各部院司官内才力庸劣者曾降㫖令不時糾叅然叅處者甚少雖有一二糾叅皆係末員其實係庸劣無能多徇情面不行糾叅又有狂妄好勝專恣行事者較之庸劣無能為害更甚各部内朕所明知而徇情不叅者亦有之可嚴諭部院衙門查各屬司官内有庸劣無能狂妄好勝專恣行事之員即行指名題叅丙申上諭大學士等曰副都御史塞克德自簡任以來竝未見陳奏一事才具庸劣可令解任朕觀部院官員懶惰者甚多一遇苦差或有稱病規避者嗣後部院官員或病或有事故俱註冊以慿分别勤惰又諭曰督撫乃封疆大臣通省民命所闗世祖皇帝時所用者尚屬循良逮至輔臣時用張長庚白如梅張自德賈漢復屈盡美韓世琦等擾害地方以致百姓困苦今之督撫較前雖覺稍愈而相沿成習尚未盡改見在浙江湖廣總督江蘇廵撫員缺最為緊要必擇賢能補授方於地方有濟如不得其人則百姓受害不可勝言矣此三缺爾等加意詳審務得相宜之人公同舉出聽候酌用五月辛巳上諭大學士等曰凡居官以淸廉為要今九卿若有確知其人者無論内外大小官員可據實舉奏近聞陸隴其居官甚善衆皆稱之諒非矯餙從此操守不改永著芳聲是為真實好官耳十二月己亥上諭安徽按察使于成龍之父原任阿逹哈哈番于得水曰爾子于成龍居官淸廉惟爾教子有方特加賞賚爾其朂勉爾子殫心竭力始終如一朕不難頻加顯擢茍末路不終辜負國恩定行懲治亦爾家門之玷也又召八旗漢軍都統副都統侍郎等諭曰國家自祖宗定鼎以來委任漢軍官員與滿洲一體其中頗有宣猷効力者如孟喬芳張存仁輩朝廷亦得其用比年漢軍居官者大不如初每赴外任多攜僕從汰侈糜費惟務黷貨累民恣肆放逸未能謹守法度如張長庚賈漢復白色純等不可勝舉屢加申飭尚多因循未見改轍兹者廵行江南見文武各官及軍民人等衆口一辭稱江寜府知府于成龍淸廉愛民朕心喜悦已面加奬勵超遷為安徽按察使又特召于成龍父賞賜以示褒美廉吏至意凡爾八旗漢軍人等自今以後悉宜洗心滌慮痛除舊習或子弟官守在外宜各貽書訓勉果有潔己愛民如于成龍者朕立行擢用如猶怙非不悛國有常法不能為此輩貸也康熙二十四年乙丑九月辛未上諭吏部督撫藩臬官資相近請託易行每逄大計各省督撫多以藩臬舉報卓異不無結納徇情之弊著通行禁止康熙二十五年丙寅二月辛丑上諭大學士等曰近雲貴督撫及四川廣東廵撫俱疏請征勦土司朕思從來控制苗蠻惟在綏以恩德不宜生事騷擾今覽蔡毓榮奏疏已稔悉其情由蓋因土司地方所産金帛異物頗多不肖之人苛求剝削茍不遂所欲輒以為抗拒反叛請兵征勦在地方官則殺少報多希冒軍功在土官則動生疑懼攜志寒心此適足啟釁耳朕但以逆賊勦除四方底定期於無事如蔡毓榮王繼文哈占身為督撫不思安靜撫綏尚誅求無已是何理也前出征雲南趙良棟將彼等過端㡬至發露穆占之家人舉首朕寢其議若此等尚多朕無不洞悉但事係已結朕不復究置之寛宥至雲貴督撫居官殊無善狀或地處遼逺朕不悉知亦未可定爾等將此諭㫖傳示九卿詹事科道令其詳議具奏四月甲辰上諭領侍衛内大臣公鄔黒福善坡爾盆等曰學士常書原係微賤之人理應仰體朕委任之意効力圗報考試之事乃伊職掌應立法嚴肅查察情弊乃於懐挾諸弊明知不舉惟於朕前䝉蔽行詐見今發覺被獲應將常書革去學士改為三等侍衛照常行走七月庚戌上諭吏部翰林官員内或有不善書法者或有不能撰講章者或有不能句讀通鑑者甚有以飲酒宴會為事博奕為戲者其讀書立品思副委用裨益國事者甚少今若依部議道缺調用恐伊等登第之後未經敭歴驟任監司則無才之人反為僥倖何所懲創應以學問不及者分别一二人降調庶衆皆知儆著吏部翰林院學士會議具奏十月壬申上諭大學士等曰鎮國公哈爾薩為人鑚營有玷公爵應將此公爵令伊兄六格襲替蘇努雖係宗室其行事乃如人之奴僕在安親王及索額圖家諂媚行走至在議政處但遇勢要之人發一議論伊輒唯唯聽從不敢更有論説其阿順之態與家奴無異爾等將此㫖傳諭哈爾薩蘇努二人康熙二十九年庚午正月甲寅上諭吏部用人之權關係最為重大于成龍破壊定例將曾經超擢歷年未久如許官員保題爾部不以為非但稱無庸議殊屬不合且既云直隸好官甚多今竝不能拯救饑民頻多流散如此則平日才能所辦何事武廷适等陞轉著停止令其在任久逺効力康熙三十一年壬申十一月戊辰上諭大學士等曰嗣後所叅才力不及官員仍補授部院衙門殊未允當既因才力不及議處若仍補授録用有何裨益著照伊等所降之級隨旗行走則旗下官員增多且伊等曾在部院辦事自能稱旗下之任至因公詿誤降級而復用者若仍算初任年俸仍不久即陞矣應俟復用三年後無過稱職始准算初任年俸則官員方知鼓勵有過者得少分别矣可將此㫖明諭九卿康熙三十三年甲戌十二月戊申上諭吏部觀部院衙門官員皆係總計年俸補授因而庸常者多爾等傳諭内閣及部院衙門將庸劣之員各行叅奏康煕三十六年丁丑五月丁酉上諭吏部國家舉行大計原期黜幽陟明使大法小㢘以為乂安民生之本所關甚重比年以來督撫等官視為具文每將微員細事填註塞責至真正貪酷官員有害地方者反多瞻徇庇護不行糾叅以致吏治不清民生莫遂重負朕愛養元元至意殊可痛恨今當舉行大典各督撫等官應洗心滌慮力改前轍矢公矢慎整肅官方務期舉薦一人俾衆皆知勸糾劾一人俾衆皆知儆儻仍茍且因循徇私溺職國法具存必不輕恕壬寅上諭大學士等曰今噶爾丹已平天下無事惟以察吏安民為要務然官吏之賢否民生之休戚所關朕一人端居深宫何能徧知昨廵行山陜或先聞其有聲名而居官不善者有之或竝未聞其聲名而居官實善者有之此皆上下相隔不能通逹之故也雖古聖君以知人為難朕豈料温保行事一至於此往者江浙山東等處地方官以朕不時廵幸各加勉力操守皆優山陜官員則劣甚朕恨貪汚之吏更過於噶爾丹此後澄清吏治如圖平噶爾丹則善矣十月己酉上諭兵部軍政大典五年一舉所以黜陟將弁砥礪官方使賢者知勸而不肖者知儆關係甚重每見督撫提鎮不能實心奉行輒向所屬需索部費恣意誅求因而將弁以下節次侵削重為兵害至於所舉所劾或瞻徇情面或庇䕶私交將尅扣額餉虛冒兵糧濫受餽遺虐取規例實係貪酷及衰懦闒冗不能騎射之員不行叅劾止將微員細事草率塞責以致貪酷庸劣之輩無所誡懲而守法奉公宣勞盡職者遏抑不彰無所激勸殊負朝廷旌别淑慝之至意爾部可即通行各督撫提鎮此次舉行軍政務矢公慎力破積弊俾舉一人衆皆以為賢劾一人衆皆以為不肖庶激揚咸當而國家允收得人之效倘因仍陋習不加悛改後有發覺定將督撫提鎮等官一并從重治罪康熙三十八年己卯正月丁酉上諭大學士等曰武職官員掣籤後即准赴任雖有庸劣之員該管官多瞻徇情面茍且姑容嗣後武職掣籤官員著即引見其庸劣者當罷斥之五月丙戌上諭大學士九卿詹事科道等曰朕南廵至浙江見百姓生計大不如前年來已將舊欠錢糧盡行豁免其被災地方概行賑濟恩澤屢加在百姓應比往年豐足今反不及從前者皆因府州縣官私派侵剋餽送上司或有沽名不受而因事借端索取更甚者至微小易結案件牽連多人遲延索詐者甚多此等情弊督撫無有不知乃不釐剔察㕘反將行賄官員薦舉亷正官員糾劾以至民生失所殊失朕愛養元元至意且畿輔重地因朕不時廵察故無私派侵剋等弊若各省督撫俱體朕愛民至意實力奉行自然吏治澄清萬民樂業科道不畏人不徇情能將不肖劣員察訪糾㕘則有司亦知忌憚今作何永革横派嚴禁賄賂以察吏安民爾等會同確議具奏康煕三十九年庚辰四月辛未上諭大學士等曰各部院衙門司官皆論俸陞補或因坐臺運米議叙陞補以致庸劣者多著諭部院將該衙門庸劣司官察叅其司官筆帖式内有才優者亦著保舉引見康熙四十二年癸未五月己未上諭大學士等曰直隸各省總督廵撫提督總兵官補用千總等官秉公者少除功加及稍有優長者俱已録用外其餘年滿千總騎射未必皆能騎射尚且不能豈可令之管轄軍士著行文各省諭令此項人員限於冬季前到京命大臣監試優者録用不堪者革退限内不到者即令除名可諭兵部知之康熙四十四年乙酉五月己卯上諭大學士等曰官員薦舉卓異關係激勸大典必無加派無濫刑無盜案無錢糧拖欠無虧空倉庫銀米者方可膺卓異之選其他所開虛文俱不必入可會同九卿定議具奏康熙四十六年丁亥五月丙子上諭大學士等曰部院筆帖式自初任時即當黽勉以冀大用朕見今關差筆帖式有從都統䕶軍統領之筆帖式派出者問其事務茫然不知著裁去候缺令都統取撥什庫及披甲中知書者用之護軍統領取䕶軍中知書者用之伊等二三年一換又各門筆帖式亦皆裁去候缺其缺取䕶軍用之亦二三年一換此外再有應裁之筆帖式亦皆裁去至中書内竟有年方童稚者此皆徇情補用嗣後補授中書著引見十月辛丑上諭吏部今觀部院衙門司官甚是不及至有不能做稿説堂者甄别既經停止若不考察漸至廢弛爾等俱係大臣不可互相徇情或各部院官員有彼此遷轉任事未久者本衙門堂官不能悉知其人可著九卿會同考察叅奏十一月壬申吏部議覆山西廵撫噶禮疏叅潞安府知府白邦傑借欠官銀限滿未完請令戴罪完結上諭大學士等曰凡借官銀者因不能完銀治罪若留任追賠必希圖還債以致剋剝小民矣嗣後凡牧民官員借欠官銀不能完納即令離任追賠已還後准其開復如不能清還即以家産抵償如此則官銀不致虧欠而亦無剝民之事矣康熙四十八年己丑十二月甲寅上諭大學士等曰世襲之員較佐領尤為緊要襲職之人庸劣者甚多嗣後令該旗大臣引見如其人善則准令承襲否則不拘其幼子族人擇可用者令其承襲康熙四十九年庚寅三月戊子上諭吏部前以補授雲南貴州廣西四川四省官員不能如期到任懸缺甚多故豫發人員備用今觀此等官員但圖以邊俸速陞居官無一善者地方關係甚屬緊要嗣後四省停其豫發仍照舊例歸於月選得缺人員嚴限速催赴任如此則缺不致久懸而於地方亦有裨益其以前發往未經得缺人員俱著掣回各歸月分補用康熙五十三年甲午四月丁亥上諭大學士等曰昔人有言正朝廷以正百官正百官以正萬民舉賢退不肖正百官也二者不可偏廢如但舉賢而不退不肖則賢者知所勉而不肖者不知所懲終非勸衆之道惟黜退不肖之員則衆人方知所戒俱勉為好官矣十月乙亥上諭九卿等曰九卿内各省人俱有凡翰林中曾差正副主考及房考者其聲名賢否必皆知之著從公舉出優者陞用劣者革退九卿於本省出差人員不必與議蓋伊等子弟試而中即以為好試而不中即以為不好殊不可為據若不存私意賢否皆從公舉出則科場可得淸理矣即如月選官員悉令九卿騐看凡出身不明行止不端者俱知畏懼不敢謁選此甚有益康熙五十四年乙未四月庚午上諭吏部凡月選官員與民最親故令九卿騐看今竝未將劣員舉出嗣後月選官員内有出身不明或係人家僕及開復官員内從前居官有劣蹟者九卿各據所見即行叅劾黜退如此則吏治咸修民生大有裨益將此傳諭九卿康煕五十六年丁酉四月丁亥福建廵撫陳璸疏言會安縣知縣田廣運等徵收錢糧有方居官聲名俱好懇聖恩破格鼔舞於吏治民生大有裨益上諭大學士等曰此奏甚善徵收錢糧惟少加火耗百姓易於輸納從前馬齊任山西廵撫張鵬翮任浙江廵撫時錢糧俱清楚蔣陳錫任山東廵撫時錢糧亦清楚外省總督廵撫居官好少加火耗錢糧㫁不至缺欠也田廣運等俱著該部議叙康熙五十七年戊戌十月甲寅上諭吏部考試月選官令作八股時文大都抄録舊文茍且塞責嗣後不必作八股時文止令寫履歷以三百字為限觀其書法妍醜文理工拙則人之優劣自可立見矣甲子上諭吏部各部院衙門滿洲官員在侍衛班行走漢官每遇奏事派六員引見科員及御史無論廵城不廵城奏事日令派出滿洲三員漢人三員侍班翰林亦派出五員侍班此侍班人員内如有不得來者不妨聽其缺少其數不必補足如此伊等可得認識矣康熙五十九年庚子十月癸亥上諭大學士等曰科道官係從部員内揀選補授每年内陞外轉竝未論其原陞品級一體開列今科道官内陞有即超擢至堂官者果其卓然特出雖為布衣朕亦可不次任用况科道乎若本屬平常而不查原陞品級竟一體内陞超用未免越次著交與九卿將科道官由何銜陞任應作何分别開列之處會議具奏十二月己酉上諭大學士等曰翰林官員雖多能作祭文碑文者不過數人此内有人才不及不諳進退之禮者亦有一無所知飲酒遊戲者伊等俱候派考試之官如此等人豈堪備用爾等同吏部翰林院查明叅革或人雖平常實有學問者不必革退或年老翰林見在修書行走者亦不必革退又部院衙門滿漢官員内有才力不及并懶惰者亦會同部院堂官查明叅革癸丑上諭大學士等曰朕觀九卿詹事科道保舉人員並非矢公悉有所為或有視地方優劣而舉者或有自謂屛絶交遊閉戸不出而緘口不舉一人者或有自己不舉轉令他人保舉者凡此等情弊伊等以朕為不知朕則知之甚悉也存是心者乃名教中罪人安得謂之讀書人乎如果矢志公忠則伊所舉之人一有改操之處即宜糾叅矣少詹事龔鐸保舉之人甚多伊竝非外任何所見而濫行保舉耶此風漸不可長宜加懲究使知儆畏爾等會同吏部都察院查從前保人甚多而無當者悉行叅奏大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷三十六
