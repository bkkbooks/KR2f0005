body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷二十四廣言路康熙六年丁未十二月壬申上諭吏部都察院設立言官原為國家大事兵民疾苦内外官員貪酷等項應許陳奏理宜簡約眞切直陳以備採擇近見言官條奏於事理之外牽引比擬多用浮飾之言或有將已結之事𠞰襲充數者或有挾私紛更國家之良法者且本章原令不得踰三百字今踰額浮詞甚多以後陳奏此等無益之處俱著更改如仍前不改嚴加治罪至言官如有所見既許不時陳奏其拾遺著永行停止爾部院即𫝊諭嚴飭遵行康熙七年戊申九月癸丑上諭吏部兵部朕頃以秋冬農隙講武之時欲一往邊外閱視不久即還今覽諸臣前後各疏稱今嵗災變甚多不宜出邊以致兵民困苦朕思諸臣抒陳忠悃直言進諫深為可嘉已允所請停止邊外之行以後國家𦂳要重大事情如有未當務將所見直陳朕不憚更改爾二部即𫝊諭遵行十一月丙辰上諭吏部各部院衙門事務殷繁必得賢能之人乃克辦理都察院科道等官職司建白糾彈内外大小各官有衰庸及貪酷溺職者理應據實指叅近見言官章奏或條陳無可採取之𤨏事或止將㣲員塞責不過以職任言官曽言某事徒沽虚名而已如内而部院堂司各官果有囑託行賄者即行糾叅外而督撫以下有為害地方苛虐小民大貪大惡者即據實不狥情面叅發則惡人知儆地方乂安豈有不臻太平之理爾等身為言官若不攄忠入告即不稱職理應處分姑暫寛免嗣後務破情面據實叅發以副朕用人圖治之意爾部即嚴飭遵行康熙八年己酉六月丁夘上諭吏部朕夙夜圖治念切民生艱難加意撫綏俾各安居樂業乃成久安長治之道邇年水旱頻仍盜賊未靖兼以貪官汚吏肆行朘削以致百姓財盡力窮日不聊生朕甚憫焉爾等部院大臣科道各官或任要職或有言責者即將拯救民生疾苦切實裨益之處各攄所見明白陳奏以備採用勿得妄行借端以無益之事塞責指陳負朕加恵黎元圖治求言之意康熙九年庚戌十二月戊申上諭大學士等曰朕近日披覽章疏於科道官條奏有合於事理裨益政治者虚懐聴納不憚見之施行其所言無益不可行者非勦襲陳言則浮泛塞責爾諸臣寧有不知今後有言闗政理切實可行者照常票擬朕親加裁奪其或不可行者若悉下部議徒令章奏繁多反致應行事務稽遲爾等即以不准行擬㫖朕仍審擇而執其中古之聖帝賢君雖邇言是察亦無稽勿聽用言致治之道盖當如此康熙十二年癸丑八月己酉上諭吏部國家設立言官專司耳目凡政治得失民生利弊必須詳切條陳直言無隠斯為稱職若但敷衍虛文浮冗勦襲或以不急之務草率塞責非朕廣開言路之意今將科道官親加考試其留用各員宜益加勉勵殫心盡職以副委任石文郁范時起何名揚庸劣無文不稱言職令罷之爾部即遵諭行康熙二十一年壬戌八月丙子朔上諭大學士等曰學士乃内閣參贊政事之官如有所見應行啓奏近來並無與議者若惟送本接本用一筆帖式足矣何必設立學士此後各有所見俱令敷陳康熙二十四年乙丑五月戊子上諭大學士等曰九卿咸有條奏之責科道亦為耳目之官凡有見聞及應行事宜當不時入告以明盡忠補過之義今天下雖已昇平而兵刑禮樂之大國計民生之繁豈皆事事允釐無一可言者耶爾等其以此㫖遍諭廷臣焉十一月己未上諭吏部徃者康熙十八年𫝊諭九卿詹事科道一同奏事期於政治得失互相討究雖微員亦得於朕前各抒己見前阿蘭泰於九卿啓奏時言諸大臣跪列於臣之前故未說出此則非朕令一同奏事之意矣爾等將此再行曉諭九卿等康熙二十六年丁夘四月癸酉上諭大學士等曰自設科道侍班糾儀之後啓奏各官徃徃心懐畏懼即科道官雖欲有所建白或恐以失儀被糾不敢條奏亦未可定朕思啓奏各官果有失儀應處分者朕自當付部議處若係無心小悞亦宜寛宥況啓奏者俱係國家大臣即有差悞伊等自行檢舉豈待人糾至科道官朕本欲其盡言無諱其中有新從外任擢授者禮儀未經嫺習雖有些小過悞朕亦不計也科道侍班著停止十一月乙未上諭大學士等曰凡叅劾貪官其受賄作弊之處因未曽親覩無所憑據畏縮而不行叅劾者甚多今間有彈章亦止據風聞叅劾耳豈有身與之通同受賄作弊而顧肯叅劾之耶向者原有風聞糾彈之例世祖章皇帝時及輔政大臣停止今再行此例貪官似有儆懼若有挾讐叅劾者審明果係挾讐自有反坐之典在可𫝊諭九卿詹事科道等康熙二十七年戊辰六月辛亥上諭大學士等曰近來科道絶無章奏條陳乃科道專職惟在中無私意而已爾等可將此㫖徧諭科道如有條陳令至暢春園面奏康熙二十九年庚午四月己夘左都御史陳廷敬奏言官建白不得摭拾小事上曰設立科道原欲其建言也至條奏之事是否可行自有裁定若必大事始言則言官難分事之大小以致進言者少非所以集衆思廣忠益也康熙三十一年壬申三月戊寅上諭大學士等曰國家設立言官本欲令其陳奏得失近日不見一人條陳豈皆無事可言耶爾等可𫝊諭科道等官俾各抒所見昌言勿隠十月丁酉上諭大學士等曰國家設立言官職司耳目一切吏治民生得失利弊皆宜殫心採訪據實直陳近見滿漢科道官員建白甚少殊非朕委任言路之意嗣後應各矢公忠研求時務凡有可以裨益國家之事悉攄所見以俟採擇但不得懐挾私情浮泛塞責其有眞知灼見應糾劾者即行叅奏亦不得暗受囑託代人報復苛責細事希圖傾陷著𫝊諭遵行康熙三十六年丁丑二月乙酉上諭吏部都察院國家設立都御史及科道官員以建白為專責所以達下情而祛壅蔽職任至重使言官果能奉法秉公實心盡職則閭閻疾苦咸得上聞官吏貪邪皆可釐剔故廣開言路為圖治第一要務近時言官條奏叅劾章疏寥寥雖間有入告而深切時政從實直陳者甚少此豈委任言路之初㫖乎自今以後凡事闗國計民生及吏治臧否但有確見即應指陳其所言可行與否裁酌自在朝廷雖言有不當言官亦不坐罪自皇子諸王及内外大臣官員有所為貪虐不法并交相比附傾軋黨援理應糾舉之事務必大破情面據實指叅勿得畏怯貴要瞻徇容隠即朕躬有失亦宜進言朕決不加責其有懐挾偏私借端傾陷者朕因言察情隠㣲自能洞悉凡屬言官尚各精白乃心力矢忠讜以無負朕殷切責望至意爾部院𫝊諭行是日吏部遵㫖將起復原任科臣蘇俊等職名開列啓奏上諭大學士等曰科道職司耳目年來並無一人陳奏故朕將見任言官嚴飭又將伊等起復言路必大開矣此後條奏内如果可行即批准行否則俱批知道了若一槩交部議覆必多更張成例之弊況朕令其陳言原欲聞軍國要務如但以浮詞細故塞責陳奏殊非朕求言本意五月壬寅禮科給事中鄭昱條奏平定噶爾丹慶賀大禮頒詔款項上曰凡頒赦詔皆人主之事非人臣所宜言自古詔赦頻頒不以為善政者以其便於惡人而無益於善人也鄭昱妄以詔款陳奏念係言官特從寛宥著大學士等嚴飭之康熙三十九年庚辰四月辛未御製臺省箴以儆言事諸臣箴曰臺省之設言責斯專寄以耳目寧取具員通明無滯公正無偏黨援宜化畛域宜捐洞達政體斯曰能賢古昔諍臣風規凜然訏謨讜論垂光簡編朕每覽繹如鑑在懸居是官者表裏方直精白乃心克廣其識國計民生臧否黜陟凡所敷陳敬將悃愊風霜之任以懲奸慝搏擊之威以儆貪墨毋摭細務茍塞言職毋紛成憲妄逞胸臆書思入告當宁對揚沽名非正營私孔傷或藏嫌怨謬為雌黄受人指囑尤為不臧形諸奏牘有玷皂囊職司獻替亟宜申詳敬爾在公風紀巖廊詞箴用朂誕告聨常九月乙巳上諭大學士等曰給事中穆和倫條奏服用奢侈本章爾等擬票申飭朕意言官專任耳目之職若因言而罪之誰復敢言但此本内言順治以來至康熙十年尚為儉樸自後漸至奢僭等語殊屬錯謬朕知之甚悉自輔臣攝政十年以前凡器用服食等物甚為奢侈自朕聽政以來一應服食俱從節儉諸王大臣亦皆效法不用金銀器皿金鐙等物此時服用較從前十分之内已減九分矣然筆帖式䕶軍庶人等服用未必不少有奢侈朕嵗嵗賞賚更給官馬而生計尚未充裕謂非奢侈之故乎朕閱載籍歴代以來皆由樸而漸至於奢未有由奢而漸至於樸者不可以不禁也當此之時惟以大開言路為要務況設立科道專為求言所言當則行之不當但將原本發還如此則内外臣僚亦俱知所儆戒矣朕聽政四十餘年言官有為人而言者有受賄陳奏者有報私讎而顚倒是非者此等條奏朕無不知至於䘮祭時恐其僭用朕屢經𫝊諭族長著不時查察今日久漸弛容或有之亦當禁止此本著不必申飭十月丁夘上諭大學士等曰臣下之賢否朕處深宫何由得知緣朕不時廵行凡經歴之地必諮詢百姓以是知之朕欲開風聞言事之例科道官以風聞題叅即行察該督撫賢者留之不賢者去之如此則貪暴歛迹循良競勸於民大有裨益嗣後各省督撫將軍提鎭以下教官典史千把總以上官員賢否若有闗係民生者許科道官以風聞入奏倘懐私怨互相朋比受囑託者國法自在著諭滿漢掌印與不掌印科道官知之康熙四十年辛巳十二月甲子廣東廵撫彭鵬因雲南道御史王度昭疏叅遵㫖明白囘奏上諭大學士等曰朕於科道官許其風聞入告者專為廣開言路使自督撫以下各官有任意妄為及貪劣害民者皆知所顧忌而警戒也科道官員糾叅不實例有處分又或言不合理及生事妄奏者外轉有之罷職亦有之至於被叅之人具疏囘奏止應辯晰是非不應支離牽引因彼一身被叅而舉原叅之父子兄弟親戚皆受指摘以逞報復則自此以後孰敢更糾一人耶彭鵬身為言官時亦曽叅人兹為王度昭所劾理應止以切己之事剖晰奏明乃今訐奏王度昭謂其曲庇親戚而其間所有夙怨又未指出實據彭鵬雖操守清廉居官亦善此囘奏反復凟陳辭氣不勝忿激凡在君上之前不應陳奏之言輙形於章疏粗戾已極著嚴飭行康熙四十一年壬午三月辛丑上諭大學士等曰舊嵗稔收今雖稍旱似未為害然為人主不隨時為計可乎徃者朕以旱潦為災令各陳奏事宜時因人自為奏故辭多粉飾於國家政要莫之言及其令九卿詹事掌印不掌印科道集議有益於時政事宜者具奏以聞康熙四十五年丙戌十一月壬戌上諭大學士等曰徃代之君不接見諸臣臣下之意無由上達政何以得理耶康熙五十一年壬辰正月壬子上諭領侍衛内大臣大學士都統尚書副都統侍郎學士副都御史等曰自古帝王統馭天下君臣一心無有異意故凡事無不就理倘上下暌隔各懐一心則凡事無不滋弊此理所必然也朕今春秋已髙聽政年久衆亦謂朕事事經歴無不周知但不聞不見之事甚多雖有言官若以不可發抄之事入告必闗身命不懼者有㡬是以託合齊等輩小人常昻然張膽搆集黨羽今已顯露若漸使滋蔓其弊不可勝言矣朕為國為民宵旰勤勞亦分内常事此外所不得聞者令各該將軍總督廵撫提督總兵官因請安摺内附陳密奏故各省之事不能欺隠此於國計民生大有裨益之效也爾等皆朕所信任位至大臣當與諸省大臣一體於請安摺内將應奏之事各罄所見開列陳奏所言是朕則擇而用之非則朕心既明亦可手書訓諭而爾等之善惡眞偽亦昭然可見朕於諸事謹愼舉朝無不知之凡有密奏無或漏洩但不肖大膽愍不畏死之徒從中拆視或原奏之人朋友衆多口不密而洩漏者有之况一概奏摺不遅時刻皆不留稿朕親自手批發還凡奏事者皆有朕手書證據在彼處不在朕所也如是則大貪大奸自知畏懼或有宵小誑主竊賣恩威者亦自此顧忌收歛矣為此特諭康熙五十五年丙申七月壬午上諭大學士等曰朕前曽諭九卿科道等文武大臣内有聲名不好者科道即行題叅科道内有行止不端者九卿亦叅奏今部院司官内有辦事雖勤而操守平常者亦著查叅可𫝊諭九卿十月甲午上諭大學士等曰朕令大臣皆奏密摺最有闗係此即明目達聰之意也凡一切奏摺皆朕親批諸王大臣等知有密摺莫測其所言何事自然各加警懼修省矣爾等可𫝊諭九卿知之大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷二十四
