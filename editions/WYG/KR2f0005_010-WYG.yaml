body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷十敬天康熙七年戊申五月壬子上諭吏部等衙門朕親政以來孜孜圖治期於民生乂安聿臻上理乃今年自春徂夏雨澤愆期兹復太白晝見天象屢示儆戒朕甚懼焉今力圖修省彌加敬慎勵精勤政以答天心其在内各部院官理應各盡乃職公亷自効副朕信任之意今惟瞻徇情面圖潤私家不念國計但求便已有負倚任在外督撫提鎮以下各官原欲令其綏理地方撫恤軍民咸令得所近見大吏朘削卑官卑官虐害軍民濫行科派脂膏竭盡甚至逃亡此皆内外大小各官不務公廉有違天意以致災異頻見嗣後務須洗心滌慮痛改前非如仍因循舊習不行更改事經察出従重治罪乙夘上諭吏部等衙門近見天氣亢暘禱雨未應風霾日作禾苗枯槁倘仍不雨秋成無望民生何賴皆由内院六部都察院大臣不能公忠體國政事舛錯及一切事務應完結者駁察耽延則例繁多任意輕重以致屬員胥吏乗機作弊者甚多著即指名㕘奏従重治罪其才庸不能辦事者亦著㕘奏黜革勿得徇情姑留如經朕知或被旁人糾㕘將該管官治罪不貸刑部督捕等衙門獄訟牽連日久不結令無辜沈寃獄底而擬罪引律偏用重條嚴刑酷罰以苛察為明深求為能積怨既深上干天和垂示災異宜加修省以為消弭之計至科道職司言責糾㕘建白必有益國計民生方應陳奏勿得苟且塞責各部院大小臣工尚其同心協力修舉政事共挽天心體朕惓惓求治之意康熙十年辛亥三月庚午上諭禮部今嵗三春無雨風霾日作耕種愆期民生奚賴皆由朕躬涼德政治未洽大小臣工不能殫忠為國恪修職業瞻顧因循惟圖自便偏私怠忽致干天和朕用是夙夜靡寧深切儆惕今實圖修省勵精勤政體上天仁愛之意感召休和為民請命内閣六部都察院等衙門大小臣工各有職掌皆宜體朕倚任之意共効贊襄持㢘秉公克盡厥職洗心滌慮痛改前非以迓天庥爾部即遵諭通行申飭四月戊子上諭禮部時已入夏亢暘不雨農事堪憂朕念切民生躬自刻責特頒諭㫖戒飭各官修省祈求雨澤乃精誠未達霖雨尚稽朕晝夜焦勞不遑啟處兹䖍誠齋戒躬詣天壇祭告懇祈甘霖速降以濟民生爾部即諏吉備物俟朕親詣行禮康熙十二年癸丑三月戊寅上諭兵部尚書明珠曰朕初因修葺宫殿暫駐瀛臺今天時方旱甚軫朕懐雖修葺未竣即日還宫修省九月乙亥上諭起居注官胡宻色曰朕適詣太皇太后宫問安太皇太后問朕曰頃者地動爾知之否朕奏曰此乃天心垂異以示警也太皇太后諭曰人君遇有災異固當益加修省亦在平時用人行政敬承天意耳朕仰繹慈訓誠為克謹天戒之要也爾其書諸史册己夘御史馬大士疏言京師地震請敕大小臣工實圖修省上曰變不虚生地動示警皆由政治未協朕心深為怵惕力圖修省務期庶績咸熙大小臣工其各洗心滌慮省改前愆恪供職業共回天變康熙十六年辛巳三月己丑上諭禮部帝王克謹天戒凡有垂象皆關治理故設立専官職司占候所係甚重一切祥異理應詳加推測不時具奏今欽天監於尋常節氣尚有觀驗至今嵗三月霜霧及以前星辰凌犯等項應行占奏者並未奏聞皆由該監官員冒昧疎忽有負職掌爾部即行察議具奏康熙十七年戊午六月壬午上諭禮部朕惟天人感召理有固然人事失於下則天變應於上捷如影響豈曰㒺稽今時值盛夏天氣亢𤾉雨澤維艱炎暑特甚禾苗垂槁農事堪憂朕用是夙夜靡寧力圖修省躬親齋戒䖍禱甘霖務期精誠上達感格天心爾部即察例擇期以聞康熙十八年己未七月庚申上諭吏部等衙門自古帝王撫御萬方兢兢業業勤求治理必欲隂陽順序和氣迎庥或遇災異示儆務省愆思過實修人事挽回天心兹者地忽大震蓋由朕躬不徳敷治未均用人行政多未允協内外臣工不能精白乃心恪盡職掌或㒺上行私或貪縦無忌或因循推諉或恣肆虐民是非顛倒措置乖方大臣不法小臣不㢘上干天和召兹災眚若不洗心滌慮痛除積習無以昭感格而致嘉祥朕力勤政務實圖修省應行應革事宜令部院三品以上官及科道在外各督撫直言無隠其在京三品以上堂官並督撫提鎮俱據實自陳毋得浮泛塞責仍通諭内外軍民人等知之是日上召内閣九卿詹事科道滿漢各官齊集命大學士明珠等𫝊諭曰朕因地震力圖修省務欲挽回天意爾各官亦宜洗心滌慮公忠自矢痛改前非愛民為國乃爾等全無報國之心於所善之人即以為善而奏聞所不合之人即不行奏請此等不公事情朕聞見最確猶望改過故不即行處分今見所行愈加貪黷習以為常且従前遇有災變之事朕亦屢加申飭一時在朕前俱云欽遵申飭之㫖究竟全不奉行前此大奸大惡之人朕重加處分爾等所明知也科道各官於大奸大惡之人未見糾㕘或因事體曖昧未有憑據難於舉𤼵此後科道各官如有確見即據實叅奏若依然虚節如前所行奸惡巧為掩飾不加省改或事情發覺或經朕訪出雖欲寛免國法具在决不貸宥其即𫝊諭諸臣咸使知之壬戌上召滿漢大學士以下副都御史以上各官集左翼門命侍衛𫝊諭曰頃者地震示儆實因一切政事不協天心故召此災變朕不敢諉過臣下惟有力圖修省以冀消弭朕於宫中勤思召災之由力求弭災之道約舉大端凡有六事爾諸大臣總督廵撫司道有司各官咸共聞知務期洗心滌慮實意為國為民斯於國家有所禆益即爾等亦並受其福庶幾天和可致若仍虚文掩節致負朕意詢訪得實决不為爾等姑容也一民生困苦已極大臣長吏之家日益富饒民間情形雖未昭著近因家無衣食將子女入京賤鬻者不可勝數非其明驗乎此皆地方官吏諂媚上官科派百姓總督巡撫司道又轉而饋送在京大臣以天生有限之物力民間易盡之脂膏盡歸貪吏私橐小民愁怨之氣上達於天以致召水旱日月星辰之變地震泉涸之異一大臣朋比徇私者甚衆每遇㑹推選用時皆舉其平素往來交好之人但云辦事有能並不問其操守清正如此而謂不上干天和者未之有也一用兵地方諸王將軍大臣於攻城克敵之時不思安民定難以立功名但志在肥已多掠占小民子女或借名通賊將良民廬舍焚燬俘獲子女攘取財物名雖救民於水火實則陷民於水火之中也如此有不上干天和者乎一外官於民生疾苦不使上聞朝廷一切為民詔㫖亦不使下達雖遇水旱災荒奏聞部覆或蠲免錢糧分數或給發銀米賑濟皆地方官吏任意侵漁揑報虚數以致百姓不沾實恵是使民窮而益窮也如此有不上干天和者乎一大小問刑官員將刑獄供招不行速結使良民久覊囹圄改造口供草率定案證據無慿枉坐人罪其間又有衙門蠧役恐嚇索詐致一事而破數家之産如此有不上干天和者乎一包衣下人及諸王貝勒大臣家人侵占小民生理所在指稱名色以㒺市利干預詞訟肆行非法有司不敢犯其鋒反行財賄甚且身為奴僕而鮮衣良馬逺勝仕宦之人如此則貴賤倒置所關非細以上數條事雖異而源則同總之大臣㢘則督撫有所畏憚不敢枉法行私督撫清正則屬下官吏操守自潔雖有一二不肖有司亦必改心易慮不致大為民害此事朕非不素知但以正在用兵之際每示寛容今上天屢垂警戒敢不昭布朕心嚴行戒飭以勉思共回天意作何立法嚴禁務期盡除積弊著九卿詹事科道㑹同詳議以聞康熈十九年庚申四月庚午上諭禮部農務為國家之本粒食乃兆姓所資必雨暘時若而後秋成可期自去冬以來雨雪未降今時已入夏甘霖尚稽久旱傷麥秋種未布農事深為可虞且失業之民饑饉流移尤堪憫惻或因政治未協致干天和朕用是夙夜靡寜循省儆惕兹當䖍誠齋戒躬詣天壇親行祈禱為民請命爾部即擇吉具儀來奏康熙二十一年壬戌六月己丑上諭大學士等曰天時亢暘猶望雨澤之降今觀亢旱已甚天行之愆乃人事之失如有應行應革事宜令九卿詹事科道官員㑹議奏聞庚寅上諭刑部時已季夏雨澤愆期邇來亢旱益甚農事堪憂朕思天人一理感格之道必有未孚且刑獄或有淹滯寃抑之氣最能上干天和内外大小問刑各衙門審讞案件恐有聽斷不公曲直顛倒以及草率怠忽任意遲延致無辜之人久覊狴犴爾部即通行申飭自後問刑各官凡應速結事情即為歸結勿得借端稽緩苦累平民務期虚公明允詳慎得情以副朕欽恤刑獄感召休祥至意七月癸酉上諭大學士等曰天道關於人事彗星上見政事必有闕失其應行應革者令九卿詹事科道㑹議以聞康熙二十四年乙丑十一月乙酉上諭大學士等曰今月朔日食十六日月食且比日積隂無雪朕思天象稍有愆違即當修省或施行政事有未當歟或下有寃抑未得伸歟爾等𫝊諭廷臣詳議奏聞康熙二十七年戊辰三月丙申上諭大學士等曰今時畧旱矣而欽天監奏四月朔日食凡應行應革之事其令九卿詹事掌印不掌印科道集議以聞康熙三十年辛未十一月甲戌上諭禮部自昔帝王敬天勤政凡遇垂象示儆必實修人事以答天戒頃欽天監奏推算日食當在康熙三十一年正月朔日夫日食為天象之變且又見於嵗首朕兢惕靡寧力圖修省惟大小諸臣務精白乃心各盡職業以稱朕欽承昭格至意其元旦行禮筵宴俱著停止康熙三十六年丁丑二月壬午朔欽天監預奏日食分數上諭大學士等曰日食雖人可預算然自古帝王皆因此而戒懼蓋所以敬天變修人事也若庸主則委諸氣數矣去年水潦地震今又日食意必隂盛所致豈可謂無與於人事乎可諭九卿如有人事應修改者悉以奏聞十一月甲午上諭大學士九卿等曰朕自臨御以來早夜孜孜以敬天勤民為念不敢少有逸豫偶遇災變則尤悚然靡寧今次地震朕心不勝兢惕方今外寇初平海宇無事而災變示警不可不加修省朕披覽前史如漢之文景宋之仁宗亦有此異因其克修人事遂獲長享太平其他遇災不警視為適然卒致衰替可為炯戒每見内外大小官員多圖暇逸怠於職業能實體朕懷留心民事者甚少兹宜各殫乃忱共勷實政以為修弭之道一切政事有應興應革者爾等可悉心講求集議具奏康熙四十七年戊子九月壬午上諭大學士等曰朕曽因亢旱晝夜焚香懇禱上帝至祀圜丘之日立見感格大沛甘霖始知幽獨之誠具在上天昭鑒中也後又值旱災左右奏請朕仍前禱雨朕言今天下豐裕朕心之誠恐不及前上天皆已鑒知不宜輕禱此朕不敢稍有虚偽之意故以此心告之諸臣自今以後益當與爾等加意圖治耳康熙四十九年庚寅四月丙午上諭大學士等曰據欽天監奏立夏時㢲方風起是日朕於宫中占驗乃東北風起欽天監務取吉利者具奏不知此等事件應據實啟奏何必避忌至各處風信不同或他處東風亦未可定且春秋誌災不言其應孔子書此之意所以示儆今但取吉利可乎本朝並未甞有所避忌也爾等𫝊諭欽天監知之康熙五十年辛夘四月丁丑上諭大學士等曰去嵗冬雪應時入春以來雨澤霑足無風朕即向衆諭云交夏必旱秋月轉恐雨水過多今觀天時果旱雲氣方起即繼以風自古人事有失必干天和或政事未盡合宜或用人未能允當大小官員或有暗結黨援以及殘忍之人尚居職位囹圄中或有無辜凡若此等不能保其必無爾内閣㑹同九卿科道一一詳問具奏五月丙申上諭大學士等曰朕自京師抱恙而出今尚需人扶掖而行又兼天時亢旱蚤夜焦勞以致寢食不安自古君臣之義甚重必上下一德相成然後能感上天之心召致和氣不在徒飾虚文務空名以從事也今當此亢旱之際我君臣應夙夜靡寧以為萬民籌畫生計大抵諸臣内實心以國家為念者固自不少而秉性奸惡亦不可謂無人惟爾諸臣宜仰體朕懐日存憂惕為羣黎竭誠祈禱庶幾甘霖可冀早沛也十一月乙未上諭大學士等曰天壇大祭朕親詣行禮曽有諭㫖嗣因朕躬少有違和大臣等再三奏請故下㫖遣大臣恭代朕則照常齋戒兩日今朕躬安好如常必親祭方展誠心朕仍親詣行禮大臣等不知朕意或又行奏請朕今年已六十行禮時兩旁人少為扶助可也康熙五十六年丁酉十月庚戌太常寺疏請致祭天壇應遣大臣恭代上諭大學士等曰朕自即位以來凡大祀皆躬親行禮去年大臣等以朕年髙恐致勞瘁請遣大臣恭代彼時朕躬尚能親往行禮故不允所請今年入夏雨水稍不及時慮傷稼穡積悶之極身體甚是不安頃雖較前稍愈猶覺無力難以行禮祀典關係重大勉强而行畧有錯悞反非誠敬之意著如所奏遣大臣恭代康熙五十七年戊戌五月庚戌上駐蹕熱河行宫諭大學士等曰連日望雨近今西南風起雲生隨散理合祈求雨澤著交與該部速議令京師祈雨朕於此處俟部覆到日亦一體祈求十月辛未上諭大學士等曰十一月初一日冬至祀天明日即應齋戒朕因腿足乏力來至湯泉身雖在此瞻望郊壇不能釋懷爾等𫝊諭太常寺令將齋戒牌銅人照常送至乾清門朕在此照常齋戒其從祀人員齋戒務令恭敬康熙五十八年己亥正月己夘上諭大學士九卿等曰日食雖係一定交限可以推算且今嵗元旦日食被隂雲微雪未曽得見但别省無雲之處必有見者况日值三始人事不可不謹政事或有缺失之處諸臣確議以聞十一月乙亥上諭大學士等曰敬天尊祖所關至重至大朕自御極以來凡壇廟祭祀朕俱親詣行禮年來因多病足痛不能親往每遣大臣恭代孔子云吾不與祭如不祭朕自不能親詣甚切思慕欲得瞻仰郊壇而非祭祀之日則典儀未備又非盡誠盡敬之禮今朕躬稍愈如南苑湯泉乗肩輿俱可行走今冬至齋戒之時朕足雖不得力潔誠之念有餘擬於祭日朕躬親詣於祭祀之前升壇瞻仰省視俎豆若可跪拜朕拜後退處更衣幄次俟恭代親王行禮畢然後回宫朕心始安已將此㫖諭諸皇子爾大臣㑹同議奏此係創行之禮如大臣以從無此典或引據書史為言朕年已老在位六十年矣豈易得此例乎目今朕躬安好可以前往倘此數日内朕躬稍覺不能親往再𫝊諭停止未晚也尋大學士等奏皇上敬天之心六十年如一日今聖夀將屆七旬足疾未愈時值嚴寒尤宜調攝仰懇依允衆情停止親詣行禮上命諸皇子𫝊諭曰天壇朕必親往前者朕躬欠安偶未親祭王以下公以上俱不齋戒此次著照常齋戒隨朕前往不必隨朕行禮朕行禮時不必贊禮作樂俟拜畢至更衣幄次命親王偕衆行禮禮畢朕乃回宫朕躬親往之處著書於祝文内諸臣又奏本月十二日皇上躬詣天壇十一日御太和殿視祝文香帛聖躬未免太勞懇祈皇上暫停親視令内閣恭捧送往上曰朕照常親視祝版大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷十
