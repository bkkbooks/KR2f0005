body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲㳟儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷三十九蠲賑二康熙三十一年壬申二月甲申上諭戸部朕勤求治理念切民依凢有往來人等必以年歳之豐歉雨澤之有無一切閭閻情形備悉諮訪前聞陜西西安鳯翔各屬饑荒已經特頒諭㫖蠲免錢糧竝發帑金專遣大臣賑濟仍撥給别省錢糧刻期運送務使均沾實惠人獲更生近又聞頒賑之前尚有貧民散入四方流離失業勢不能復還鄉井倘不曲加撫綏必致轉於溝壑深為可憫凢流民所至地方應令該省督撫董率有司官員區畫賑濟令各得所其賑過人數及有能酌量資給俾回原籍者一併造册具奏至於湖廣襄陽等處距潼闗相近且道路平坦易於轉輸襄陽等處所有積貯倉糓應令該督撫運至潼闗陜西督撫接受轉運庶於散給兵餉賑濟饑民均有裨益十月己卯上諭户部陜西西安等處連嵗凶荒繼以疾疫因而閭閻失業洊致流移朕軫念民艱焦勞宵旰自去嵗冬月以來頒發帑金蠲免正賦輓運積糓轉輸漕糧屢遣大臣察勘多方賑濟念國家所重惟在養民目今秦省雖薄有秋収但民間匱乏已極倘非格外加恩無以使積困盡甦轉徙盡復陜西所屬府州縣衛所康熙三十二年地丁銀米悉予免徵從前所有積欠亦悉予豁免務俾比屋均沾實惠小民咸慶更生用稱朕子恵元元撫育安全至意康熙三十二年癸酉八月甲戌上諭户部朕撫御寰宇早夜孜孜惟以實惠及民俾登康阜為念廣西四川貴州雲南四省俱屬邉地土壤磽瘠民生艱苦與内地舟車輻輳得以廣資生計者不同朕時切軫懐厯嵗以來屢施恩恤廣西貴州四川雲南四省積欠錢糧俱經次第蠲豁兹念育民之道無如寛賦矧邉省地方非再沛優恤之恩則閭閻無由充裕所有康熙三十三年四省應徵地丁銀米著悉蠲免仍行該督撫徧加曉諭令人均沾恩澤以稱朕加惠逺省民生至意如有不肖有司借端朦混私自徵収者該督撫指名奏劾從重治罪九月丁巳上諭大學士等曰江浙二省今年夏旱雖不成災秋收諒必有限若漕糧照常徵收恐民食將至匱乏朕為此常切軫念除浙江漕糧已經改於今年蠲免外其江南漕糧今年或三分免一或免一半俟至該省應蠲年分將今年所免米石照數補徵起運於漕糧既無缺少官民大有裨益十一月甲子上諭户部朕念切民生時廑宵旰或在宫禁之中或經巡省之地務以編氓疾苦備悉諮詢其從各省來京陛見官員及往來奉使人等亦無不以該省雨澤曽否應時田畝有無収穫竝閭閻資生情形一一體訪比年以來因國家經費尚充遂將各省地丁額賦及舊欠錢糧節次蠲免即從前未經停徵之漕糧亦逐年免徵總欲使海隅蒼生培固元氣庶臻於家給人足之風今嵗畿輔地方雖禾稼未獲稔収初意小民餬口之需猶足資給生計未必遂致艱難頃者展謁山陵沿途訪察民隱今歳雨水過溢田禾歉収米價翔貴又聞順天河間保定永平四府所屬皆然目前米價既貴將來春夏之際價值益昻小民必艱粒食此朕目所親覩若來年錢糧仍然徵収朕心實有未忍順天河間保定永平四府康熙三十三年應徵地丁銀米著通行蠲免所有厯年舊欠悉予豁除行文該撫曉諭各屬務令人沾實惠以副朕子育黎元至意康熙三十三年甲戌三月辛酉上諭户部山西平陽府澤州沁州所屬地方前因蝗旱災傷民生困苦已經蠲免額賦竝加賑濟而被荒失業之衆猶未盡覩幹寜其康熙三十年三十一年未完地丁錢糧及借賑米銀若仍令帶徵剋期完納誠恐閭閻力絀益致艱難著將所欠錢糧五十八萬一千六百餘兩米豆二萬八千五百八十餘石通行蠲豁用紓民力爾部行文該撫嚴飭該府州縣官悉心奉行務必人沾實惠倘有已完在官揑稱民欠及已奉蠲免仍復重徵官吏作奸侵漁中飽一有發覺定以軍法從事遇赦不宥五月癸丑户部議覆江南江西總督傅拉塔疏言鹽城髙郵等處水涸田地求免徵糧應不准行上曰糧從地出此地尚為水浸若徵錢糧則於民甚困致治之道民為最要凢事於民生有益即宜行之此水浸之田皆令免徵錢糧七月壬午上諭户部盛京等處去嵗禾稼不登粒食艱窘聞今年収穫亦未豐稔米糓仍貴兵民生計恐致匱乏盛京等處地方闗係緊要朕心時切軫念著遣部院堂官一員前往自甲兵以至匠役當差人等有不能餬口者將人口數目查明賑濟康熙三十四年乙亥五月庚寅上諭大學士等曰副都統齊蘭布等自盛京還奏言今嵗盛京亢旱麥禾不成米價翔貴雖市有鬻粟而窮兵力不能糴遂致重困盛京根本之地可令侍郎朱都納學士嵩祝等馳驛迅往㑹同盛京將軍副都統諸臣詳察窮乏者於去嵗海運米二萬石中動支一萬石計㑹散給令可食至秋成餘一萬石平價發糶兵民均有裨益又諸地有告糧乏者遣城守尉部員賢能者散給賑之如二萬石不足散給發糶其速以聞七月戊子上諭户部盛京地方比嵗荒歉糧食艱難朕心軫念本欲巡行省問疾苦情形徧敷恩澤今雖停止東行而所在貧窶兵丁尚望臨幸是宜仍加恩恤用裨資生應作何加恩爾部議奏又盛京兵丁錢糧兩季支領未支領前兵丁每至稱貸嗣後按月支給今嵗秋禾不甚豐茂恐生計漸難今自冬以至來秋應作何賑給不致失所共計需糧若干著盛京將軍副都統㑹同盛京戸部侍郎察明詳畫具奏九月癸未上諭内閣學士嵩祝曰盛京將軍等疏請給米但言兵丁而已其陵上執事人等及衆百姓竝不言及此皆朕赤子爾等亦可㑹同將軍查明一并散給若使海運之米明年可到盛京兵民方可無慮是日上諭户部直隸順天保定河間永平四府所屬地方今嵗水潦三農歉収朕巡行所至徧處諮訪聞髙阜之産尚有秋成而窪下之田被潦者多計所収穫不能相敵雖經勘災頒賑不致仳離失所而額辦錢糧若仍徵取民力匱乏難以輸將朕心深切不忍著將四府康熙三十五年地丁銀米全予蠲免用示寛恤其霸州雄縣香河寶坻皆有水道可以轉輸毎處著發米一萬石各差司官一員齎往照彼地時價減價發糶以資民食著行文該撫通行曉諭俾均沾實惠副朕軫念災黎至意康熙三十五年丙子二月壬辰内閣學士陶岱往盛京賑濟奏請由天津海口運米至盛京上曰從天津海口運米但以新造船與商船轉運尚恐船少應遣人往福建將軍督撫處勸諭走洋商船使來貿易至時用以運米仍給以僱值其裝載貨物但収正税槩免雜費往取此船著各部院衙門派出賢能司官筆帖式各一員令馳驛前去九月丙子上諭户部宣化府錢糧前已屢經蠲免但比年以來所屬各州縣牧養軍前需用馬匹又大兵絡繹往來雖各有支給經費而供億甚繁殊勞民力朕巡幸經臨深切軫念著將康熙三十六年宣化府屬地丁銀米全予蠲豁仍行文該撫通行曉諭俾民間均沾實惠以副朕寛恤黎元至意十二月己丑上諭户部朕惟治天下之要惟以乂安民生為急顧欲安民生必除寇虐欲除寇虐必事師旅方今寰宇昇平人咸樂業獨厄魯特噶爾丹敢犯邉塞荼毒生靈朕思為邉境人民永絶後患故特遣發貔貅分道進勦朕躬不憚勤勞以今嵗春月親統中路大兵深入無水草之地直扺拖諾比噶爾丹聞朕親臨盡棄輜重倉皇宵遁適與西路大兵相遇大敗潰散俘獲其人口其寨桑等來歸甚衆而噶爾丹収殘賊千餘人仍竄伏枯倫白爾齊爾等處地方朕於冬月復統軍出邉相機𠞰撫行抵鄂爾多斯於是厄魯特人民來歸者絡繹相屬噶爾丹力窮勢蹙亦遣格壘沽英具奏乞降隨經頒示敕諭許其歸順惟是噶爾丹乃狡詐叵測之人其果否來降未可深信應仍厲兵秣馬待來嵗出師撲𠞰務絶根株比年以來軍前需用馬匹在大司府屬牧養者甚多措辦草料等項雖俱支用正項錢糧而供億浩繁殊勞民力但必此賊盡滅然後邉外蒙古頼以輯寧而在内生民亦獲休息師旅之興大非得已該郡官民尚各勉力急公勿以煩苦為慮朕兹從邉外回蹕雲中深軫民力之艱用沛特恩以示寛恤康熙二十六年大同府屬州縣衛所應徵地丁銀米著全予蠲免俟噶爾丹殄滅之後朕自誕布德音渙敷庥澤爾部即行文該撫通行曉諭俾咸悉朕惠愛黎元至意辛亥上諭户部朕惟治安天下惟期民生得所而欲民生得所必以敷恩寛賦為要朕於一切事務倘少有動用民力之處即廑懐殷切刻不能忘比年以來因厄魯特噶爾丹狂逞逆命遣發大兵分道進勦軍興供億不得已而煩民力甘肅所屬各州縣衛所及榆林等處沿邉各州縣衛所適當師行要道喂養軍前需用馬匹竝大兵往來經過各項措辦雖俱支給正項錢糧而供億繁多閭閻勞苦朕心深用軫念著將康熙三十六年甘肅巡撫所屬州縣衛所陜西巡撫所屬榆林等沿邉州縣衛所地丁銀米盡行蠲免行文各該撫徧加曉諭務俾小民均沾實惠稱朕體恤黎元至意甘肅所屬銀米既經全免需用錢糧著於鄰近省分作速撥給爾部即遵諭行康熙三十六年丁丑正月戊寅上諭户部淮揚徐各處去嵗水勢驟發被災小民困苦萬狀朕心深為憫惻康熙三十五年一應錢糧著盡行蠲免其三十四年未完錢糧於三十七年帶徵著即通行曉示務使災民均沾實惠二月戊申上諭山西巡撫倭倫曰朕撫御區宇念切民依故不憚勤勞親厯邉境惟孳孳以靖寇安民為急兹簡約扈從人員從大同一路緣邉地方進指寜夏因徧察閭閻生聚及土壤肥瘠収穫豐歉之狀邉民生計維艱雖一切供御之物纎毫不以累民而乘輿臨幸宜敷庥澤除大同額賦已有諭㫖豁免外其經過岢嵐州河曲縣保徳州所屬地方竝各衛所康熙三十六年應徵地丁銀米通予蠲免爾部行令該管官吏張示徧諭務俾窮鄉僻壤均沾實惠四月甲戌上諭大學士等曰前山西巡撫倭倫以去嵗山西數州縣歉収今年米價甚貴奏聞頃噶爾丹殱滅天下悉已無事惟愛養兵民為要務山西米價騰貴民生困苦朕聞之中懐軫惻扈從大臣侍衛官員執事人等前來乗坐船站之船現有水手若至湖灘河朔後將此船逆流牽挽回至寜夏甚難前亦曽諭總督吳赫就此船將湖灘河朔積貯米或五千石或再加多量行裝載交巡撫倭倫所屬賢能官員轉運順流而下至保徳州減價平糶於民大有禆益著學士黄茂前往率部院司官二員同行侍郎安布禄留此監發米石九月乙巳黒龍江將軍薩布素疏言沿河被水之十八莊請計其人數將黒龍江所貯米糧散給上諭户部理藩院朕前至寜夏黒龍江將軍薩布素曽奏伊處收貯糧米三萬餘石年久漸朽與其積之腐爛何若散之為有益乎且出陳可濟軍糧易新便於収貯宜如所請行十月壬戌上諭户部比年出師討寇總為中外民生永圗休息故不憚勞苦逺厯邉塞其一切飛芻輓粟皆動支正供額賦不使累及閭閻獨是大兵牧馬及三次師行出入皆經山西地方縁邉州縣衛所固屬勉力急公其餘郡縣雖非師旅所經亦有協辦轉輸行齎居送之事且該省嵗屢不登糓價翔貴民間生計甚屬艱難朕乗輿頻臨目所親覩軫念殷切未嘗一日釋懐昨嵗曽有諭㫖俟噶爾丹殄滅之後誕敷徳澤今宼氛蕩滌邉境敉寜是宜格外加恩用綏黎庶康熙三十七年山西通省地丁銀米一槩蠲免爾部移文該撫令徧飭各屬實心奉行務俾深山窮谷均沾徳惠倘借端徵派澤不下究事覺定行從重治罪十一月甲辰上諭大學士等曰各省被災地方巡撫先行奏聞俟部覆之後始行察勘被災分數直隸山東近地猶可若逺省則往返奏請為時既久雖議蠲賑於民無及嗣後有被災宜報者即將分數一并察報該部亦一并議覆康熙三十七年戊寅二月辛亥上諭户部據山西巡撫倭倫奏平定州十一州縣連年歉收米價騰貴民間乏食朕心深為軫念此十一州縣所欠康熙三十六年錢糧行令該撫查明到日蠲免并將各倉所貯米糓即行賑濟毋致流離失所有妨耕種五月癸未上諭大學士等曰朕巡行天津閲視沿河隄岸見山東饑民流移至直隸者尚多小民遭此荒歉若仍於秋間徵其逋欠百姓豈能上納泰安州等二十七州縣本年錢糧著於來秋徵收庚寅户部議覆山西巡撫倭倫疏言静樂等五縣未完康熙三十六年錢糧請緩至本年十月全完應如所請上諭曰山西省康熙三十七年錢糧已有諭㫖通行蠲免今静樂等縣未完康熙三十六年錢糧倘於本年徵収則小民仍有催徵之累爾部不行詳察照該撫所題具奏殊屬不合其未完錢糧著於康熙三十八年帶徵十月丁卯上諭户部盛京係列祖創興之地朕謁祭陵寢咨詢民瘼承徳等州縣今嵗田禾未獲全登宜加恩恤應徵米豆槩行蠲免爾部即移文該府尹徧示閭閻家喻户曉務俾均沾實惠以副朕愛民至意十一月乙未上諭户部淮安揚州鳯陽等處比年水患頻仍浸漫隄岸田多淹没耕穫無從百姓艱於粒食朕時加軫恤屢賑屢蠲被災地方賴以安堵但念久歉之餘恐致資生匱乏朕廑憫殷切未嘗稍釋於懐前此雖頻敷庥澤至再至三用裨羣黎生計猶恐開春東作農事艱難若不大沛恩施安能令小民各得其所著將海州山陽安東鹽城髙郵泰州江都興化寶應壽州泗州亳州鳯陽臨淮懐逺五河虹縣蒙城盱眙靈璧等州縣竝被災各衛所康熙三十八年一切地丁銀米等項及漕糧盡行蠲免務使民間均沾實惠以副朕體恤元元生息愛養至意康熙三十八年己卯三月辛未上南巡閲視爛泥淺等處諭户部朕君臨天下期於黎民樂業各獲其所凢興利除害之事靡不舉行蠲免賑濟之恩靡不下逮比年以來因淮揚所屬地方疉罹水患業已嵗蠲額賦賑恤頻施又動支數百萬帑金責令在河諸臣於應挑應築之處酌量修理欲使泛濫之水匯歸入海被淹之田廬涸出庶底幹寧乃糜費錢糧卒不能使積淹有歸田廬未涸民生未遂朕聞之惻然軫懷值兹四海無事之時欲將一切修舉事宜詳閲指示用是躬親臨幸沿途審視黄河水勢咨訪地方父老比至歸仁隄髙家堰量度地形髙下應挑應築一一明示河臣惟是被淹地方米價騰涌生計維艱朕目擊民依深用廑念著將漕糧截留十萬石於髙郵寶應興化泰州鹽城山陽江都受災七州縣各留一萬石悉較時價減值發糶餘米三萬石著於邳州留八千石宿遷桃源清河安東四縣各留五千五百石亦較時價減糶此各州縣發糶之米著就近交與漕運總督河道總督邳州著遣司官一員前往監視再截留米十萬石於揚州淮安各収貯五萬石此應留漕糧不論何處米石著就近截留壬午上駐蹕無錫縣諭户部東南為財賦重地朕時加軫念頻嵗以來雖在邊塞用兵之際未嘗不早夜殷殷睠懐寛恤兹以中外昇平特事巡省竝閲河工比至江南觀察民間饒瘠之狀見淮南北地方疉罹水患深用惻然已經屢蠲屢賑仍命截留漕糧減價平糶其各州縣雖市肆安輯耕鑿恬熙而額費浩繁民生拮据厯年逋負計算日増江蘇安徽所屬舊欠帶徵錢糧幾及百萬念小民方供新税復急舊逋物力維艱勢難兼辦應沛特恩㮣行蠲豁除康熙三十三年恩詔内已經赦免外其康熙三十四五六年奏銷未完民欠一應地丁錢糧米豆麥雜税爾部行文該督撫察明俱著免徵務飭有司悉心奉行俾窮簷蔀屋均沾實惠如有已徵在官詭稱民欠希圗侵蝕肥己者一經發覺定從重治罪凢厥官吏軍民宜咸知朕意辛夘上駐蹕杭州府諭户部朕因淮揚地方數被水患躬臨巡省目擊田廬淹没之苦深加軫恤既截留漕糧以濟民生仍蠲除積欠以紓民困其昨嵗淮揚兩屬被災錢糧曽經該督撫具題部議照例減免三分今念百姓餬口維艱安能辦賦應破常格用沛特恩淮安府屬海州山陽安東鹽城揚州府屬髙郵泰州江都興化寶應九州縣竝淮安大河二衛康熙三十七年未完地丁漕項等銀一十九萬兩有奇米麥十一萬石有奇著全予蠲免乙未上諭户部朕以省方問俗巡厯三吳比至浙省見沿路農桑雖徧隴畝而地有肥磽時有豐歉厯年正供錢糧因輸納維艱致多逋負已准分年帶徵而新舊之賦取給一時恐力作之民終難兼辦應通行蠲豁以𢎞庥澤除康熙三十三年以前恩詔赦免外其康熙三十四五六年奏銷未完民欠地丁錢糧米豆麥雜税著一槩免徵爾部行文該督撫責令有司悉心奉行務俾均沾實惠毋俾官吏以完作欠詭詞侵蝕致干重罪四月乙夘上駐蹕江寜府諭户部朕巡幸江南徧察地方疾苦深知民間生計艱難將通省積欠錢糧盡行蠲免所過州縣有被災甚重者俱經賑濟務俾得所兹聞鳯陽府屬去嵗潦災甚重是用破格加恩以示優恤康熙三十七年該府屬壽州泗州亳州鳯陽臨淮懐逺五河虹縣䝉城盱眙靈璧十一州縣竝泗州一衛未完地丁漕項等銀米著一㮣免徵五月甲戌上駐蹕李海務諭户部朕巡省民生風俗南至江浙兹以回蹕行經山東沿途延見父老咨詢農事幸今嵗雨暘時若二麥繼登小民可以無憂粒食但前年被災泰安等二十七州縣生計尚未豐盈宜更加恩休養所有康熙三十六年未完地丁銀米俱著免徵其康熙三十七年應徵錢糧原因災傷令於康熙三十八年完納今念一嵗之内竝輸二嵗之租恐物力艱難未能兼辦著分作三年帶徵以示寛恤爾部移文該撫轉飭有司明白張示務使窮鄉僻壤均沾實惠以無負朝廷曲軫民依至意七月甲申上諭大學士等曰朕慮各處閘壩俱已閉塞大水一至必至泛溢屢諭于成龍作速挑濬芒稻人字兩河今竟未挑濬卒如朕言著速行文巡撫宋犖令親赴揚州淮安收養被水百姓江西巡撫馬如龍前奏江西地方連年大熟今嵗亦有秋著行文馬如龍令運米十萬石至揚州淮安交與宋犖或煮粥或賑濟相機而行十一月己亥上諭户部朕思小民生計惟農畝是賴必年糓順成斯衣食無缺淮安揚州所屬州縣衛厯年以來河流浸漫田廬編氓艱於粒食朕心深切軫念已將康熙三十八年錢糧俱行蠲免今春南巡目覩民間疾苦恐致失所復將康熙三十七年未完錢糧盡予豁除諭令所司將沿河隄岸堅固修築乃修防未竣夏秋又致衝決田廬盡没水中特命該撫往駐被災地方動支積貯米糓竝將漕糧截留親行賑給今念清口河流未通民田仍遭淹没耕穫無從百姓饘粥尚且艱難來年租賦安能輸辦著將被災海州山陽安東鹽城大河衛髙郵泰州江都興化寶應等州縣衛康熙三十九年地丁銀米等項及漕糧漕項銀兩盡行蠲免速令該督撫通行曉諭務俾均沾實惠以副朕拯恤災黎至意壬寅上諭户部朕君臨天下撫馭兆人無日不以休養生息為念嘉與元元共圗豐樂蠲租賜復時切於懐故從前於直隸各省權其緩急先後頻渙恩施今海宇昇平四方無事欲使普天率土咸登饒阜惟湖南地方素稱魚米之鄉比年雖年糓順成而民間猶未盡充裕是用格外加恩以綏黎庶所有康熙三十九年湖南所屬地丁雜税等項錢糧著一槩蠲免移文該督撫令徧飭所屬實心奉行康熙三十九年庚辰二月乙酉江蘇巡撫宋犖以賑濟淮揚饑民米石奏聞上曰朕發内帑修理各處隄岸總為下河民生起見河工一日不竣下河之民一日不得樂業朕甚惻然今嵗漕運可截留二十萬石交付宋犖備賑大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷三十九
