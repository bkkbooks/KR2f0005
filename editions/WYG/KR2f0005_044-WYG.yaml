body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷四十四飭臣工二康熈二十二年癸亥二月壬午上諭直隸各省朝覲各官曰爾等各有職掌關係國計民生宜實心辦理如奏銷錢糧採買米石借端浮冒希圖侵尅審理刑獄顛倒是非稽延嵗月致累平民皆因爾等因循怠玩積弊未除嗣後俱宜潔已奉公殫心盡職諸凡公務俱照在内各官衙門事例勤慎辦理副朕察吏安民之意若謂道途遥逺所行弊端未必盡知仍沿陋習漫無省改憲典具存決不姑貸癸未上諭大學士等曰閲朝覲布按各官條奏於治民弭盗非不鋪張累牘然如何綏緝則盜源可靖如何儲備則凶嵗無饑未見確切敷陳裨於實用惟麻爾圖所稱陜西積欠錢糧應分四年帶徴其言頗當朕軫念陜西地方連年寇警輓運艱苦毎欲蠲除宿負以兵革未息時方需餉未及豁免龔佳育言江邉蘆田坍塌無常應五年一丈量其在内田地原無增減請免丈量等語亦屬可行餘皆諸司瑣事若概令議覆徒煩章奏爾等𫝊集九卿詹事科道將各朝覲官奏疏同閲㑹議如有益於國計民生者始下所司確議否則擬㫖報聞足矣且九卿詹事科道既全見伊等所奏本章則将來㑹推亦易知其賢否至所頒諭㫖原為察吏安民若伊等各自收藏無益其令刋刻頒發府州縣衛所使兵民一體通知不肖官員雖欲敗檢虐民亦知所忌憚不敢恣意以逞矣三月甲子上諭刑部國家設立問刑衙門期於明罰敕法弼敎化民必審鞫精詳讞決平允而後民情悦服寃抑畢伸近見爾部審理大小事件毎多草率因循瞻徇舛錯如聴訟之時兩造是非自應分别定案因意有偏私徃徃不問曲直含糊完結以致奸頑幸免良善含寃又如奉差籍沒官員不能亷潔自持據實册報乃恣意侵盗竟飽私槖殊非人臣奉公守法之誼至於審事官員膠執己見聴訟不公或更改口詞圖遂私意或恐嚇犯証不令直供或妄肆株連稽遲日月或怠玩踈忽茍且告竣弊端種種難以枚舉嗣後堂司各官俱著洗心滌慮痛改前非一切刑名事務必令情法允協無枉無縱恪遵法紀持亷秉公以副朕委任之意又諭曰爾刑部弊端朕無不悉知自後永行改革則已倘仍因循如故将爾等弊端摘發一事勿望倖免亦毋望止於罷斥已也爾等又毎云身為堂官筆帖式胥吏所作弊端焉能悉知今堂官亦有由筆帖式出身者斷難以不知情弊為辭朕時加諮訪諸事莫逃洞鍳而爾等諉為不知可乎用復申飭務將夙弊盡行除革毋忽閏六月癸亥上諭大學士等曰一切政事皆國計民生所關最為重大必處置極當乃獲實效朕毎詳覽奏章内有所疑或折五六本七八本諮詢爾等者務欲得至當耳今爾等不各以所見直陳一切附㑹迎合朕意則於事何益朕從來不憚改過惟善是從即如乾清門聴政時雖朕意已定之事但視何人之言為是朕即擇而行之此爾等所共知也堅執己見獨持議論之人朕素所不悦觀今之大臣甚不如昔日之大臣今之政事亦不如昔日部院無事無弊大臣無人無私外間之弊較内更多朕知之乆矣欲嚴治之則其人甚多難於盡處所以朕數年來屢下嚴㫖加意剔釐今雖較前差善而弊尚未除且部院堂官止圖已身安逸辦事不勤堂官推諉司官司官推諉筆帖式早歸私家詭稱終日在署此何理也十一月戊辰朔上諭湖廣總督董衛國曰爾在外任二十餘年地方事宜民生利病知之已悉何待朕言第總督為一省大吏惟以奉公秉法潔已愛民為要從前用兵之際未免騷擾閭閻今天下承平休養民力乃治道第一義何利當興何弊當革俱宜從實詳酌舉行惟時當承平而常若民生未遂民困未蘓則地方自然受福若謂地方已經寧謐不時加體恤則所失多矣至一切事務本可速結者自應速結毎見在外官員故意遲延致滋民累爾宜申飭所属各官實心任事又在外官員行事京師無不悉知爾從前在任所行朕皆洞曉爾在軍中克有勞績朕即下㫖褒奨嗣後務益加砥礪爾為部院已久在京部院大臣何須結納爾行事無疵何畏人言若行事失當雖結納大臣亦復何益耶康熙二十三年甲子正月丙戍上諭陕西按察使布喀曰按察使職司通省刑名必事隨結不使遲悮方於事有益凡弊之生及百姓牽累皆由遲延不速結之故爾當潔已勤政將遲延牽累積弊詳加糾察勿致煩苦良民以為屬員表率二月己亥上諭翰林院掌院學士牛鈕孫在豐曰翰林院乃儲養人才之地教習庻常當以品行文章為事一切交際禮文皆宜杜絶近聞有餽送重禮者庻常等俱甚寒苦自翰墨外不應别有所取前拉薩禮在時待伊等甚善所以至今有感念者至庫勒納任學士以來交際之風漸盛爾等冝加洗剔無負簡任之意三月丁丑上諭大學士等曰昨正陽門外被火朕數遣人徃視該城及司坊巡捕營等官並無一人在者亦無一救火之人因遣内大臣侍衛徃救火勢方熾未能旋熄朕親徃登城指揮方得撲滅該城及司坊巡捕等官於該管地方職分所在平日不加謹隄防遇災又不急救殊為怠忽左都御史科爾坤兵部侍郎郭丕阿蘭泰奏請朕還宫伊等留視及朕還宫後使人視之伊等亦己散去城外之地多係漢官居住遇此等亦應協力料理乃置若罔聞袖手不顧則他事亦因循坐視可知伊等皆國家大臣凡事當視若一體乃於身外之事畧不關心可乎爾等可將此言𫝊諭吏兵二部及都察院知之四月庚子上諭大學士等曰凡為臣子必實心任事興利除弊不可茍且塞責俾衙門事一切整頓無有廢弛斯不負職業若循分碌碌因人成事雖小有勤勞殊無足取五月癸未上諭臺灣總兵官楊文魁曰臺灣逺在海隅新經底定將弁立功者頗多尚未簡用因爾係舊人故特簡為總兵官彼處新附兵丁以及土人黑人種𩔖不一向來未沾教化不知禮義爾莅任後務期撫輯有方宜用威者懾之以威宜用恩者懐之以恩總在軍民兩便使海外宴安以稱朕意至於海洋為利藪海舶商販必多爾須嚴飭不得因以為利致生事端有負委托八月庚戌上諭督捕侍郎達哈塔曰朕以爾素有操守簡用侍郎近見爾衙門事務弊端尚多旂下人無不怨言若但守已亷潔而於凡事不能勉力肅清究竟何益嗣後爾當嚴率屬員事務悉加釐剔以副委任之意九月己丑上諭山東巡撫張鵬曰今見山東人民逃亡京畿近地及邉外各處為非者甚多皆因地方勢豪侵佔良民田産無所倚藉乃至如此爾莅任後務剪除勢豪招集流亡俾得其所十一月壬戌朔上巡幸江南駐蹕句容縣諭知縣陳協濬曰知縣係親民之官與一縣民生休戚相關朕巡行之次見此處百姓困若爾當潔已奉公愛民如子否則國法具在爾其慎之康熈二十四年乙丑二月癸卯上諭漕運總督徐旭齡曰源清則流潔爾為大吏潔已率屬官吏自不為奸朕因前任諸臣均不稱職聞爾向任山東居官清慎著有賢聲故特簡兹任爾當益勵勤恪安輯軍民以副朕委任至意至於河漕事務原屬一體凡河工有關漕務者爾便冝行事不必推諉其屬官賢否宜從容亷訪果有真知確見方可入告凡舉一人務使千萬人知勸劾一人務使千萬人知懲至於待屬員不可過刻下吏亦各有艱難之處惟心平氣和則皆悦服矣五月庚申朔上諭新選庻吉士張希良等曰士子讀書稽古原期窮理致用平居砥礪亷隅敦修品行皆為異日服官莅政之本迨一登仕路志在功名未免奮意求進干營奔競喪其懐來徃徃有之爾多士從田間來甫通仕籍務冝率其素履不改初心凡授内外職任其各加黽勉清操自矢恬靜寡營循分盡職潔己愛民以副朕造就人才至意八月已亥上諭九卿等曰官以清亷為本如原任侍郎温代察庫不可謂無才但以貪汚故凡所行皆不足取此皆由不知亷恥耳又諭曰部院堂官惟勤慎者能循分不致生事其專擅好之徒特欲假公事以遂其私意耳雖有才能於國家何禆九月己卯上諭大學士勒徳洪等曰九卿詹事科道令其㑹議㑹推本期至正至公務得真實今聞九卿㑹議之事間或不據實具議草率茍且因循而行有此一次立議爭勝以冀下次不與相拂而從之者或有此一次将彼意中之人薦出兾下次将其親朋薦出以相報者或有薦其門生者有薦其同年者有薦其同鄉親友者夫九卿㑹議㑹推理宜虛公持論豈可一二人專擅以行且設立科道本欲其凡事從實建言有執拗䕶庇者即為指㕘也其擅專執拗䕶庇之人何未見糾劾耶衆議之時亦有一同具議後因其事不當復云彼時我原如此説者如果原議時衆論與伊意不合即宜將己見明白敷陳另立一議既不另立一議同列職名又稱我曾如此説是斷斷不可者朕於康熙十八年亦因此等事曾經有㫖申飭可查前㫖一并復行𫝊諭凡事㑹議不必詢問本省大臣官員若毎加詢問或致不肖之人益在地方生事横行本省督撫地方官無不畏懼且將凡屬㑹議之事無不囑託本省大臣官員矣政務何由得平今㑹議山西巡撫穆爾賽因係滿洲恐致敗露意欲從平易歸結耳若是何不於事前豫為勸戒令其公亷乃不為豫戒徒於事發之後欲如此結案可乎爾等齊集滿漢九卿大臣𫝊諭申飭之十月庚戌上諭大學士等曰近見工部凡於交送物件皆耽延時日抑勒不収弊端滋多此後其嚴禁之可傳諭工部康熙二十五年丙寅正月甲戌雲南貴州總督蔡毓榮題逆苗王騰龍等聚衆刼掠應行征𠞰上諭大學士等曰苗蠻賦性樸實不敢生事祇以地方該管官不克平情撫恤反需索馬匹金銀誅求無已不能供應遂生釁端耳前逆賊吳三桂亦因需索水西不遂貪欲揑奏水西反叛竟自發兵𠞰滅盡取其利以為已有今苗蠻之事恐亦𩔖此勅該部知之二月癸巳上諭直隷各省朝覲官員等曰國家三載考績原以崇奨亷善擯斥貪殘必吏治澄清庻民生安樂今當大計已嚴飭所司重懲貪酷餘俱如例降革其有衆論不孚是非失實者特黜一二以警積玩外姑准爾等仍服原官爾等平日官評賢否公論昭然若值㑹推輒鑽營奔競以圖僥倖居心先已不肖何以率屬莅民且凡朝覲之期毎因仍陋習借端科派大小相循私通交際是察吏本以安民而反以擾民甚非朕激揚清濁至意嗣後務須洗滌肺腸勉圖自新毋貌承心違蹈常襲故國憲具存決不爾貸戊申上諭吏部兵部我國家掃除逆孽平定遐荒即負山阻箐之苗民咸輸誠供賦封疆大吏自宜宣布徳意動其畏懐俾習俗漸馴無相侵害庻治化孚於逺邇近見雲南貴州廣西四川湖廣等處督撫提鎮各官不惟不善撫綏更恣苛虐利其土産珍竒貲藏饒裕輒圖入已悉索未遂因之起釁職為厲階蠢爾有苗激成抗拒即擅殺一二謊稱累百盈千始黷貨以生端既邀功以逞志藐玩因循殊負委任朕思土司苗蠻授官輸賦悉歸王化有何杌隉互相格鬬無有寧居嗣後作何立法務令該地方督撫提鎮等官洗心易慮痛改前轍推示誠信化導安輯各循土俗樂業遂生亦令苗民恪遵約束不致侵擾内地居民以副朕撫馭遐方至意三月乙卯朔上諭直𨽻巡撫于成龍曰直𨽻旂下各荘人户不守法度爾須執法嚴治不得瞻徇顧忌朕留心民瘼外事無不周知即如工部所用車輛係發價現僱今俱𣲖取州縣如此積弊不止一端爾到任逐一查明奏聞爾固宜正已率屬亷潔愛民亦冝寛以濟猛勿過刻也且居官不善縱或漏網亦将禍及子孫爾須有始有終實心任事從國計民生起見盡力為之閏四月乙亥吏部等衙門遵㫖㑹推廣西按察使員缺吏部侍郎胡簡敬保舉江南淮揚道髙成美擬正湖廣下荆南道沈志禮擬陪具奏上諭曰凡職任𦂳要官員奉㫖㑹推原期從公保舉務得真才有裨官守且官評賢否關係吏治民生若以本地方人推舉本省官員必致瞻徇滋弊前已經屢諭申飭甚明今胡簡敬以淮安府人推舉淮揚道髙成美殊屬不合著嚴加議處九卿等不加詳慎草率擬推亦屬不合著通行申飭康熈二十六年丁卯三月辛丑上諭大學士等曰近來不雨政事恐有未當令九卿議奏越二日癸卯大學士等覆奏國家政事實無可更改釐定者上曰堯舜之世方可稱無闕失然猶兢兢業業不敢謂已治已安漢文帝亦古之賢主賈誼猶指陳得失直言切諫今但云主聖臣賢政事無闕豈國家果無一事可言耶况求言原屬要事無論智愚皆當各陳己見以備採擇始於政務有所裨益大小臣工各宜盡心職業視國事如家事方副委任之意今毎部滿漢堂官各有六員其間任事者但一二人餘則隨衆署名而已即如各部啟奏本章毎日不過數件其中情節如漢侍郎等未必了徹設朕問之諒有不能對者漢官公事之餘或持齋誦經滿官公事之餘或崇尚僧道不以國事為念朕觀今世之人專務逢迎謟媚鮮有直道而行者且已不勤而毎誚人為惰已無能而毎嗤人為劣此不過徒工浮議耳何益之有七月辛卯刑部題浙江民張遴叩閽請發與該撫審理上諭大學士等曰此案若交與該撫審理豈肯将實情明白審出著刑部擇選賢能司官往審近見河南司官審事竟不明晰此皆瞻徇各部院堂官不敢結怨耳大凡督撫無不與部院堂官營求結納分樹門戸若司官與督撫相悖即結怨於堂官尚能保其職乎部院堂官各援引親戚朋黨營求凡員缺未出之先其人預定及㑹推時惟賛揚援引而從公推擬者甚少又有為司官筆帖式時所行貪婪至於大位偽稱清亷者若此居心深可鄙恥今部院官員亦稍知更改若循此而行固善倘仍蹈前轍貪汙不悛是自棄其身也雖或儌倖茍免於刑鬼神豈肯宥耶已亥上遣刑部郎中阿西潭等往浙江察審張遴一案諭之曰向來奉差官員徃往騷擾驛逓貽累小民朕深悉之故數年以來槩不差遣昨見張遴所告似有寃抑因遣爾等往理務須詳審公平慎毋顛倒是非奸民叩閽亦有巧為飾説者地方官員亦有善於夤緣者爾等不可偏私拘執專徇一面之詞必得兩造實情若是非不明輿論不服則大負朕懐矣康熙二十七年戊辰正月丁酉上諭江西巡撫王隲廣東巡撫朱𢎞祚曰巡撫為地方大吏以操守為要大法則小亷百姓俱䝉福矣身為大臣尋常日用豈能一無所費若必分毫取給於家勢亦有所不能但操守亷潔念念從爱百姓起見便為良吏為督撫者在朕前皆能言之及至地方與所言往往不符人貴始終如一朕特簡爾等當砥礪清操毋負朕擢用之意朕事事以百姓為念爾等到地方一切利弊有關百姓者不妨事事奏聞為大吏者亦須安靜安靜則為地方之福凡貪汙屬吏先當訓誡之若始終不悛再行叅劾可也二月壬子上諭大學士等曰國家設官分職必須大法小亷實心任事庻不負朕㧞擢簡用之意朕親政已久於大小官員行事無不深悉為臣子者既荷爵禄顯榮便當知足無致隕越前已屢頒諭㫖又再三面加訓誨今在廷諸臣自大學士以下全不敬勤供職但知偷安自便互相交結貪賄營私種種情状不堪枚舉九卿詹事科道皆朕委任之員凡遇㑹議理宜各出己見公同商酌乃一二人倡率持議於前衆遂附和於後又其甚者雖在㑹議之班茫無知識隨衆畫題更有於集議時緘黙自容及至僨事巧行推卸此等情狀朕所痛惡至於用人關係重大恐賢否難以周知故遇𦂳要員缺特令㑹推原期為國得人亦欲令被舉之人警心易慮惟恐溺職累及舉者因而自加勉勵乃厯來所舉官員如張汧章欽文之流貪黷敗𩔖徃徃發覺此皆瞻徇情面植黨納賄所致前者班布爾善阿思哈等身為大臣所行悖亂致干重辟然朕尚耿於懐是以比來大小官員徇私納賄朕雖洞見而不即指發兾其省改庻可終始保全豈意積習深錮漫無悛悔如審擬蔡毓榮一案瞻徇黨𩔖百計營救因朕具悉其奸私謀莫遂近差色冷額徃審張汧被叅情由朕曽諄諄面諭及色冷額回時奏稱此案若有失實甘治死罪朕覽其奏案則又庇䕶保舉張汧之人内閣擬票亦未議及又靳輔下河工程屯田之案朕早已察其情弊及遣佛倫等前徃勘議甚屬偏私且凡㑹議之時科爾坤佛倫等務執己見苟非懐挟私情何以力排衆議屢經誡諭未見畏悔物議沸騰輿情憤激以致言官列款叅奏雖言官亦非先期舉發直待朕諭飭之後方行論糾然爾等果能持公爭論何致敗事且爾等行私朕皆洞曉因不忍加刑于大臣又用兵之時有著勞績者故免其彰顯厥罪嗣後大小臣工各宜痛改陋習勉盡職掌以副朕寛大矜全之意五月壬申朔上諭大學士等曰凡㑹議政事必詳察合理不可怠忽輕易朕毎遇事之大者即與内閣大臣商酌而後定凡授大僚無不如此至吏部陞補官員俱有一定之例或有不肖之徒賄求不已此皆習俗不良今當痛改前轍凡事俱各抒己見一意秉公不可碌碌徇人且徇人何益孰優孰劣豈有不知者乎康熈二十八年己巳三月丙申上諭大學士等曰凡地方文武官員務須各盡職掌實心任事黽勉効力方為稱職今見直𨽻各省文武各官多有虛糜廩禄怠玩因循事務廢弛行伍虛冒船隻任其朽壊器械全不整理且有無多寡茫然不知總因任内職業視為具文漫不經心殊屬不合著各該督撫提鎮通行所屬官員嚴加申飭令其痛改積習力圖振刷恪勤守職如仍前玩忽定行從重治罪康熙二十九年庚午正月己酉上諭九卿等曰朕自臨御以來夙夜兢兢勤求治理念切民依兾登安阜去歳畿輔旱荒雖經蠲租發帑賑濟窮黎朕猶軫念未巳卿等各冝恪體朕衷持亷秉公實心盡職毋得營私結黨師生親友互相徇庇聴受囑託遇事推諉自圖便安務期於國計民生實有裨益康熈三十年辛未十一月己未上諭吏部從來致治之道在正人心人心偏私則詐偽日生而習俗滋弊人心公直則囂競自息而庻績允釐朕早夜孜孜崇尚徳教蠲滌煩苛期與中外臣民共適於寛大和平之治凡大小諸臣素經㧞擢咸思恩禮下逮曲全始終即或因事放歸或罹咎罷斥仍令各安田里樂業遂生惟爾諸臣亦宜奉職恪共絶偏私而襄國事近見内外各官間有彼此傾軋伐異黨同私怨交尋牽連報復或已所銜恨而反囑人糾叅隂為主使或意所欲言而不直指其事巧䧟術中雖業已觧職投間仍復吹求不止株連逮於子弟顛覆及於身家甚且市井奸民亦得借端凌侮蔑紀傷化不可勝言凡若所行雖迹甚詭秘朕總攬機務已三十年此等情態知之甚悉倘因仍陋習益致蔓延殊非朝廷所以體恤臣工保全愛惜之意夫讒譖媢嫉之害厯代皆有而明末為甚公家之事置若罔聞而分樹黨援飛誣排陷迄無虛日以致釀禍既乆上延國家朕厯觀前史於此等背公悮國之人深切痛恨自今以往内外大小諸臣應仰體朕懐各端心術盡蠲私忿共矢公忠豈獨國事有禆即爾諸臣亦獲身名俱泰倘仍執迷不悮復踵前非朕将窮極株悉坐以交結朋黨之罪爾部可即𫝊示中外使咸知朕意大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷四十四
