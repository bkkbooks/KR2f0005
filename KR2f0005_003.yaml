body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷三聖德二康熙二十四年乙丑四月辛丑上諭太醫院朕研究經史之餘披閲諸子百家至黃帝素問內經諸篇觀其義藴實有惻隱之心民生疾苦無不洞矚其後歷代醫家雖多著述各執已見若難經及痘症諸書未能精思極論文義亦未貫通朕甚惜之當茲海宇升平正宜懷保吾民躋春臺而登夀域爾等可取醫林載籍酌古準今博採羣言折衷定論勒成一書以垂永久副朕軫恤元元至意十月庚戍上諭掌膳等官曰天下之物力有限當為天下惜之今酥油乳酒供給有餘爾等會同慶豐司酌量收取足用則已不可過多蒙古甚窮乏取者減少則彼貧人日用可以恆足矣十一月乙酉大學士等奉命撰擬蠲免河南湖北及直隸山東被水州縣錢糧諭旨進呈中有海宇升平等語上曰今四方雖定民生未盡悅安朕宵旰不遑勤求閭閻疾苦思得一利民生之事惟恐行之稍遲致民失所孜孜不已庶幾漸見太平且古帝王已治益求其治已安益求其安朕深自省惕常慮始勤終怠不克底於化成若遽謂升平而泰然自足非朕勤求上理之初意也自後諭旨中凡此矜張盈滿之言勿復擬入康熙二十五年丙寅二月己酉以文華殿告成經筵前一日例應祭先聖先師於傳心殿具奏上諭大學士等曰先聖先師道法相傳昭垂統緒炳若日星朕遠承心學稽古敏求效法不已漸近自然然後施之政教庶不與聖賢相悖其躬詣行禮以彰景仰之意康熙二十六年丁卯正月戊子上諭黑龍江將軍薩布素等曰自雅克薩城解圍以來聞軍士中有患疾者此皆屬滿洲精兵朕甚憫焉今特遣醫二人齎藥治之至羅剎雖與我對壘但我兵攻雅克薩城從未誅戮其人如城中有患疾之羅剎亦聽其就醫使還彼國傳布德意丙申喀爾喀兩翼汗及七旗濟農台吉等疏請上尊號上諭曰喀爾喀諸汗貝勒等戴朕向來仁恩恪恭敬順請上尊號具悉悃忱但諸汗貝勒等宜仰體朕一視同仁無分中外至意謹識朕諭和之旨自茲以後無相侵擾親睦雍和永享安樂更勝於上朕尊號也況前者內外諸王貝勒大臣等請上尊號未經允行此所奏請亦不準行著理藩院行文曉諭五月庚辰上因天旱詔諭天下曰朕統御天下念切民生夙夜圖治罔敢少懈邇來歲每不登民食寡乏今茲仲夏久旱多風農事堪慮此由敷政不均寬嚴過當或土木工興或民瘼不逹事機之失上干天和隂陽不調災孰大焉朕用是夙夜靡寧減膳撤樂清理刑獄求言省過齋居默禱雖雨澤薄降尚未霑足皆因朕之涼德不能上感天心之仁愛茲當布德行仁赦過宥罪特從寬大用廣好生應天以實誕施眚災肆赦之恩敷政在寬聿昭嘉與維新之化布告天下咸使聞知癸巳上諭九卿等曰京師為天下根本之地殊屬緊要乃數月不雨雖秋成尚逺而目前旱乾朕甚憂之今欲親行祈禱爾等大小臣工亦宜盡誠齋戒夫求雨乃以為民朕之焦勞豈為一身之計祇念窮簷一嵗不登即至失所不但朕心不忍爾等皆國家大臣亦何忍坐視應各矢至誠毋循故事康熙二十七年戊辰二月壬子上諭宗人府自古帝王展親睦族列爵錫封原欲選賢建能旌别淑慝俾咸知勸勉慶流奕世此國家之常經奬勸之至意也朕篤念親親恩禮罔替年至十五即行受封但誼屬本支必皆飭躬砥行端良醇謹益自刻勵動不踰則始無忝於宗潢今親王以下奉恩將軍以上年至十五不問賢否概豫封爵以致視為故典罔知激勸嗣後親王以下奉恩將軍以上子孫應俟其年至何嵗作何辨其賢否定其品級等第始應授封著議政王貝勒大臣及親王以下奉恩將軍以上會同確議具奏七月癸巳上以楚省裁兵夏逢龍叛亂敕諭巡撫丁思孔曰楚省督標裁兵煽亂無知兵民或被迫脅或為招誘一時入其夥黨官兵一到若不分别加誅朕心深為不忍應速行開示此等原係食糧營卒各有室家均屬朝廷赤子乃為一二姦徒煽惑自新無路情屬可憫今特開一面以廣好生如有悔罪投歸即行免罪仍準安插務令得所果能將賊首擒獻或殺賊來歸者仍與論功敘録毋得心懷疑畏爾奉敕諭即通行曉諭務令翻然悔悟爭先投首早平鼓譟夥黨奠安民生副朕寬大矜全至意康熙二十八年己巳四月己卯先是上以雨澤愆期問九卿等政事得失令詳議陳明至是九卿等奏皇上仁恩浩蕩蠲免錢糧慎重刑獄諸事盡善臣等實無可言上諭曰自去秋以來雨雪不能霑足聞直隸山西山東以至江南浙江皆旱心甚憂之屢諭九卿或有未當及應行之事令其陳奏曽不得一朕思政事失於下則災患應於上如影響然尚書洪範曰僣恆暘若蒙恆風若去嵗將舊任諸臣罷斥甚多擇其有品有守者用之至於在外督撫司道等官近亦頗有令聞似應風雨以時以此觀之所關必在於上非由他故諸臣肯直言乎至祈雨一事朕非不留意前此屢率諸臣禱於天壇幸皆遇雨此天愛蒼生於朕毫無與焉目今諸臣誠心祈禱與朕無異若能切直言事是即所以召甘霖也朕一身之識見精力不敢自恃惟爾諸臣之勤慎是賴明示朕懷與諸臣共悉之五月庚戍大學士九卿等奏曰近聞山東河南大雨霑足直隸大名諸府皆有雨京城昨晚亦已得雨皇上於宮中日日虔禱憂勞過甚請稍舒睿懷頤養聖躬上曰朕可與他人比耶先人而憂後人而樂理固宜然近因久旱無雨憂勞過甚以致癯弱人或可欺天亦可欺耶日前祈雨朕雖未躬往而每次祈禱朕皆竭誠齋戒荷天之眷得降雨澤此後雨澤霑足朕庶解焦勞也又命禮部侍郎張英傳諭諸臣曰朕從來覽觀載籍備悉古帝王遇災修省之道所以深加警懼遇有災變即小心兢業朕之憂慮恆在衆人之先今畿輔地方亢旱日久念係根本之地故朕心甚憂惕寢食靡寧耳可傳諭諸臣知之九月壬子大學士伊桑阿等進纂輯政治典訓四册上曰朕御極三十年來惟兢兢祗畏常存始勤終怠之虞孜孜不已每思滿損謙益之戒今閲此書增愧於懷况比年不登民生未遂正當君臣上下協心同慮撫綏萬邦夙夜黽勉尚且不暇豈容自矜自伐以重已過違道取譽以務虛名欲將此書停止編摩卿等議之十二月乙酉上諭禮部今嵗直隸地方亢旱小民粒食艱難已經蠲免錢糧兼發帑金倉粟及準輸助米穀賑濟但三冬雨雪鮮少朕心仍切焦勞即進膳饈亦為損減無非軫念民生自竭誠悃明年正月祈穀祝文著該衙門更換將朕肫懇恤民之意切實撰寫進覽康熙二十九年庚午二月甲戍上諭大學士九卿詹事科道曰爾等諸臣稱雨澤霑足固當歡悅但去年大旱民困未蘇昔漢文帝為三代以下令主賈誼猶以處厝火積薪之上而謂無危為喻以今較之可無慮乎且今雖得雨不知夏秋若何其當逺慮深思愈加軫恤何得稱慶康熙三十一年壬申十月庚子上諭大學士等曰近日光祿寺奏停薦新芽茶凡有類於此者俱宜停止其各省慶賀表箋每次遣官齎送不惟驛遞煩擾而齎送官員亦屬勞苦朕思凡物解京均於地方百姓有纍省一件如去一病今將表箋停其每次遣官齎送或應照朝鮮國一年一次彚送凡事皆由督撫具題或著督撫彚收一次齎送爾等會同該部議奏康熙三十二年癸酉二月甲申上諭大學士等曰宗族之始皆一祖所生當力敦親睦共相愛恤扶持以為生也今見諸王以下略無親睦之誼或者同為宗室以他祖父之名名其子若孫者有之朕意此後入八分公以上諸吉凶事會集之禮仍照舊行其未入八分公以下至於間散宗室吉凶之事亦宜定會集儀式止令本翼會集若皆令八旗會集則不勝其煩矣如遇喪事則一旗之中為之服别旗惟去其纓又間散宗室中有極貧者一有吉凶之事諸王以下間散宗室以上各以其意量為資助在與者既不以為難而受者亦良有所益其會集時視其身之品級以下者一體會集間散宗室無品級者則視其父之品級會集凡會集不至者有司察參如此則皆相識而相親矣又宗室中見在名字有相犯者宗人府悉行察改自茲以往每嵗所送宗室人名亦即詳察其有犯者駁之令改爾等將朕此旨同滿洲尚書侍郎宣示諸王及聞散宗室令其定議以聞康熙三十三年甲戍二月庚午兵部以佐領佛倫等分擬正陪帶領引見補授順承郡王屬下散騎郎員缺上曰王年幼左右宜用老成此散騎郎擬正之人與今日引見補授護衛之人皆童稚耳少年相聚何以導王為善都統希佛歷時甚久且係所屬大臣可召來切責之康熙三十四年乙亥四月丙辰上諭大學士等曰平陽府地震朕心深為警惕或政事有應行應革者可傳集九卿問之其平陽府屬見任京官之人欲歸視家室者不必開缺著給假往視六月庚子上諭大學士伊桑阿阿蘭泰曰數日間雨水過多若連綿不止民田恐致被損朕聽政事無日不念切民生今雨水如此或人事有所未盡著傳集九卿詹事掌印不掌印科道將應行應革事宜各抒所見以聞是日上諭禮部尚書張英曰數日來雨水過多慮傷田禾四月內又有平陽府地震之災或者隂盛所致朕思天時與人事恆相感召未可謂災沴為天時適然之數全不關於人事也堯舜之時猶有都俞吁咈蓋古之聖人已治而益求其治已安而益求其安故兢兢業業始終如一朕朝夕以此警惕於衷三十餘年以來未嘗一日稍自寬假亦有請間日理事者朕不以為然惟存恆久之心時時乾惕耳朕思地方間有荒歉正可動人警戒之念古人所謂遇災而懼也朕於宮中費用從來力崇儉約期以有餘沛恩百姓若非撙節於平時安能常行蠲賑之事耶七月壬午上諭吏部兵部各省督撫提鎮官員間令來京陛見原欲以地方情形及兵民生計面加咨詢具有深意近見來京各官輒以進川馬等物為辭多所置辦雖經却還但恐其在任購買致貽地方官員兵民之纍朕本欲詢兵民生計召令前來若反致纍兵民殊失朕之初意且川馬如果需用朕自頒特旨令出産地方辦解何須進獻著通行嚴禁十二月辛丑上諭大學士九卿等曰朕撫御宇內無日不念切國計民生比年直隸各省時遇旱潦又平陽府有地震之災朕屢發帑金倉粟賑濟蠲免錢糧百姓雖未至於流離恐未盡安生業各省緑旗官兵防禦勞苦深宜體恤至奏讞罪人雖罹法網亦可憫惻朕夙夜孜孜軫念於中者久矣今欲特頒詔旨廣沛恩施思嶽瀆諸神皆所以福佑斯民宜遣官虔行致祭嚴飭地方大小官吏務期潔已奉公撫綏百姓緑旗官兵糧餉多有虛冒尅扣應行稽核各省積年逋欠及帶徴錢糧概與豁免除貪官汚吏行間犯罪與十惡等死罪外一切罪犯咸加赦宥令其自新爾等會議具奏乙巳詔諭天下曰朕君臨寰宇子育元元惟以薄海升平人安物阜為念或身處宮禁之中或巡歷郊圻之內勤求民隱宵旰弗遑故歷嵗以來減賦蠲租省刑宥過凡有關於治理務實見於敷施顧邇者畿輔郡縣災傷疊告而山西平陽府屬復有地震之異雖賴所在倉廩素有積貯及時周賑幸免仳離而朕心祗惕不敢以水旱災沴視為氣數適然謂必政事之失宜方致隂陽之有忒反躬循省深警豫辜夫圖治之道莫先於養民逮下之仁莫重於寬恤兹特誕沛恩膏肆𢎞赦宥茂迎庥祉丕愜輿情安民則惠覃敷益下之恩御衆以寬式廣好生之德布告天下咸使聞知丁未戶部題烏喇解送貂鼠缺額應將該管官議罪上曰數年來因捕貂者衆故不足額以此議處是無辜獲罪若不得佳者朕但少御一裘何關緊要且貂價甚貴而又非必用之物朕亦不甚需之康熙三十五年丙子十一月己卯上諭議政大臣等曰天下當以仁感不可徒以威服今朕原無征噶爾丹之意皆噶爾丹所自取且噶爾丹凶暴朕惟待以寬仁噶爾丹姦狡朕惟示以誠信嘗覽經史云惟仁者無敵今噶爾丹窮迫已極遣格壘沽英前來乞憐朕意仍欲撫之諸臣奏曰此真天地好生之心實從古所未有也上曰古之將帥雖善用兵多戮已降或其身不得善終或子孫不昌此皆好殺之明戒也又古之人主或窮兵黷武好大喜功朕意不然惟願宇宙雍熙四海升平家給人足各得其生而已噶爾丹使人格壘沽英可仍遣回十二月甲申上諭大將軍費揚古曰噶爾丹被我軍擊敗後散者散降者降故朕復親臨塞外欲相機而行今觀陸續降人及格壘沽英之言噶爾丹窮蹙是實朕不忍悉加屠戮不如撫而活之故於爾未至之前朕即降旨招降也康熙三十六年丁丑正月甲戍上諭戶部理藩院屢年以來察哈爾八旗官兵從征效力甚苦伊等向無俸糧自今察哈爾官員著比照京官俸量減給與爾等作速定議具奏即於二月支俸時給之五月癸卯大學士等以蕩平噶爾丹奏請上尊號上曰朕覽史書帝王事業貴始終如一不以尊號為貴上世無論矣即明代亦無受尊號者後人並不非之朕自御極以來不曽念及一已只為天下生民計夙夜焦勞惟恐一時怠慢不克有終况噶爾丹之滅由於上天之篤祐祖宗之福佑衆將士之勤勞也朕何有焉皇太后崇加徽號允宜朕之尊號不必加亦不必再奏六月庚戌諸王貝勒貝子公文武滿漢官員及逺近士民赴暢春園請上尊號上諭曰朕御極四十年雖自始至終孜孜不倦而吏治尚未澄清民生尚未豐裕士卒尚未休息風俗尚未淳朴且旱潦災異亦復相仍方今外寇既靖正宜休息生養徒加尊號何益於治朕蕩平噶爾丹機宜未嘗有失茍天下共能知之朕願足矣崇上尊號不必行毋復再奏十一月丁酉上諭大學士九卿等曰兹因地震示警朕深切悚惕念致治之道無如愛民生重民命朕總理幾務於一切閭閻生計及人命事情罔不殫精研究在外直隸各省親民之官務訪求民間疾苦實心愛養其關係人命案件必詳審實情俾無寃抑在內大小官員咸宜勤慎奉職力改前愆以共副朕實圖修省弭災之至意康熙三十七年戊寅十二月庚戌上諭宗人府近日朕傳集諸王及間散宗室於景山校射者將以勸懲賢否也及試以射善射者頗多朕心甚悅其有品秩之宗室俱為王府護衛官職有遷轉之階惟間散宗室雖有幹濟之才亦無路上進兆姓中凡有才者尚選擇録用而朕宗室中之才幹者不獲登用良可惜也爾衙門將宗室中材力壯健長於騎射者詳查奏聞朕將授為闕廷侍衛職官視其效力若材力果優勤於供職即授以參領副都統職任安於庸劣者方罷斥之家貧無力者一併查奏朕將籌其生計焉康熙三十八年己卯十月丙戌大學士等以朝審情實各犯八十三人請旨上諭曰人命至重今當勾決命在須臾尤不可不詳慎爾等於此情實各案既已閲訖各有所見皆當盡言又諭曰此等雖皆當死然朕猶於當死之中曲求可生之路不忍輕斃一人念淮揚百姓頻被水災朕惄焉傷之河患不除夙夜不能暫釋於懷且百姓既被水災存者必至流離轉徙田多不耕賦安從出來年錢糧當於今年預為蠲免庶災黎於水退時可以各歸故鄉安其生業康熙三十九年庚辰三月丁未上諭宗人府總領府事和碩簡親王雅布曰宗室覺羅等之女有願與朕養者朕養而嫁之有女年長父母不能遣嫁者朕亦代為嫁之著查明奏聞大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷三
