body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷三十七賞賚康熙九年庚戌三月辛未上諭戶部十庫所有舊物與其虛置於此何如分賜旗下貧丁爾部即偕工部察有當給豫者集議以聞尋户部工部議覆上命發庫內木棉絲布茶鹽衣服弓矢等物令都統等酌給各佐領下護軍撥什庫及甲兵之貧者康熙十五年丙辰二月癸酉上諭大學士索額圖曰近發內帑銀十萬與提督趙良棟賞給兵民今在平涼大兵及緑旗兵俱勤勞報效大將軍圖海前往亦可酌議發帑給賞川中撤回之兵前攻取朝天七盤等處後又圖取秦州效力甚多凡失事皆在主將非關軍士可寫諭㫖二道與大將軍圖海令申飭諸將其總督巡撫亦有失事之責宜嚴行曉諭乙亥上諭平凉諸軍士曰爾等年來各處征勦為國效力之處朕悉聞知今圍攻平涼屢次衝鋒陷陳奮勇殺賊嚴冬掘壕逺道樵採備歷艱苦朕心深為憫惻兹命撫逺大將軍都統大學士圖海統率禁旅往討逆賊雖目前國用殷繁念爾等戮力行間勤勞已久特發帑金五萬齎至軍前普加恩賜以昭朕優恤之意爾等同心協力益勵忠義速剪賊寇朕且更加優賞爾等勉之康煕十八年己未六月戊辰雲南提督桑額疏言新任湖廣提督暫駐彝陵請以彝陵官兵隸其標下湖廣提督官兵屬臣統領前往雲南上諭曰提督桑額隨大兵進取雲貴其湖廣提標官兵准入雲南提督標下俟底定之日仍回楚中彝陵鎮標官兵准為湖廣提標至於隨桑額前往官兵方事勦賊收疆標下官員可各加銜一等兵卒可動正項錢糧賞賚以示鼓勵九月乙未上諭理藩院䝉古兵隨大兵征勦雖未有竒功顯績然勤勞數年宜加恩賚其將領賜以鞍馬餘衆各給以羊今將至京師遣䝉古內大臣二人前往勞之康熙二十年辛酉七月壬申上召大學士以下各部員外郎以上賜宴於瀛臺諭曰內大臣侍衛在朕左右時加賞賚惟內閣及部院諸臣比年以來辦事勤勞未沾恩賜故特召集爾等以盡一日之歡竝非大宴因朕方駐瀛臺即以太液池中魚藕等物賜諸臣共食又特賜表裏為衣亦非大賞賚可比今日宴集諸臣本當在朕前但因人衆恐恩澤未能周遍故不親蒞諸臣可暢飲極歡毋拘談笑以副朕意康熙二十二年癸亥正月乙卯上召大學士九卿詹事科道等賜上元節宴於乾清宫宴畢諭曰從來君臣之分雖甚尊嚴上下之情貴相浹洽觀古昔盛時惟堂廉不隔用成交泰之美今卿等朝夕勤勞出入奏對朕心時切嘉念特將內廄馬匹擇其馴良易於控御者頒賜卿等加以內紵卿等其各承受示朕優眷之懷康熙二十三年甲子六月甲寅上諭副都統巴圖一等侍衛阿南逹等曰邊外八旗䝉古與在內八旗一體朕未嘗分别內外今朕巡行之次見其衣食窮乏朕心深為惻然可通行曉諭所過地方䝉古人等有鰥寡孤獨老病不得其所者令其來見加恩賞賚且因其來見朕亦可悉其生計嗣是每日諸䝉古人等各扶老攜幼至行宫前叩首上詳問年齒生理頒賜酒食并令酌量給與銀兩布匹康熙二十四年乙丑三月戊子上諭大學士等曰凡軍功議叙恤賞俱關緊要如遲延日期往返咨查恐奸宄之徒舞丈作巧易生弊端朕思此等貧兵早給一日恤賞便得早受一日實惠此後著一槩速行議敘康熙二十七年戊辰九月丁亥上諭大學士等曰佐領伊庫等所送黑龍江官莊壯丁若至其地已過耕種之時則無所得食矣可遣戶部司官一員往察之果逾耕種之期無食者量與之粟以資贍養康熙二十八年己巳九月辛酉上諭戶部今歲畿內亢暘田畝鮮穫朕所深悉被災人民已加恩蠲賑八旗田莊俱在畿輔近地固屬災傷滿洲䝉古漢軍甲兵皆須養馬原資禾稼以供飼秣今榖既不登芻豆必至騰貴雖給有月餉銀米可以贍育家口貧乏兵丁經營草料恐滋困纍朕殊用軫念著詳察實係窮兵無力養馬者開列名數送部自本年十月起至來年秋成時止其馬匹所需錢糧應加給賜以昭朕一體愛恤兵民之意康熙三十年辛未十月丙申理藩院議覆運送賞給米穀上曰此賞給米穀調䝉古駱駝馬匹運送時值寒冬輸挽甚難況來領米穀之人不能運到必致沿邊糶賣則貧人不能皆沾實惠今應量折銀給之庶到彼甚易而貧人得沾實惠也又諭曰投誠喀爾喀已給地居住今定例之初應將喀爾喀並議凡一應差役維均則人不偏勞差往扎賴特等處人役俱由喜峯口行走則喀喇沁等旗甚為偏纍若出山海關由盛京地方法庫口行走道路甚便不勞可至喀喇沁等旗亦免偏纍古北口喜峯口外見各有五十家一村設為驛站自此至科爾沁等處其間亦須照此例於各旗內察出貧窮之人給與牛羊等物使為産業設立驛站則貧者咸得生理而各處亦免苦纍其傳問朝正諸王貝勒台吉等具奏康熙三十二年癸酉十二月戊子上諭兵部本朝滿洲官兵從來精鋭驍勇遇寇必克所向無敵前厄魯特噶爾丹之役官兵不能悉體朕意即行勦滅致失機會罔奏膚功朕心為之不懌故比年以來簡閲官兵歲凡兩舉朕躬臨指示訓誨頃閲武時見諸士卒行列整齊隊伍明晰進退嫻熟嚴肅無譁所有軍令無不遵守該管官員號令約束既嚴且善此皆官兵協志同心各加奮勵所致朕心深為嘉悅八旗前鋒護軍撥什庫驍騎兵等各賞給一月錢糧無職掌官照護軍給一月錢糧火器驍騎兵亦照護軍賞給有管轄職掌官員悉賞給內庫縀匹其賞賜緞匹戶部會同內務府議奏此番閲武時官員內有降級罰俸者俱准開復以示朕體恤將士申明賞罰之至意至八旗步軍官兵有捕緝盜賊巡查道路等役甚為勞苦步軍亦各賞給一月錢糧管步軍官亦各賞給緞匹奬勤恤勞用稱朕意康熙三十五年丙子正月乙酉上諭中路督運都察院左都御史于成龍等曰大軍討寇全賴兵力內外滿洲漢軍緑旗諸路從征兵丁俱已各加恩賚其外省調集步兵挽運軍糧載塗況瘁尤可軫念所有每月應支銀米本營照常支給俾贍養家口仍各給與行糧以為道路之資所運米石如悉依期挽至克濟軍需不致虧缺遲誤俟大兵凱旋准補入馬兵營伍用彰奬勸有效力勤敏才堪拔擢者爾等可記名彚奏以俟酌用兵丁勞苦飢寒凡督運大臣官員宜時加拊循慰勉庶人爭自效踴躍赴功西路挽運兵丁亦照此例行爾等可移文各該巡撫通行傳諭示朕體恤軍士至意九月戊寅上賜宣化府騎兵張家口步兵白金諭曰此銀爾等可留家中日用俟到張家口再給米糧爾等安營可附近行宫屯扎以便不時賞給十月甲申朔上駐蹕鄂羅音布拉克諭隨駕戶部尚書馬齊曰大將軍費揚古所領軍士甚為勞苦食用必致缺乏欲將朕所用牲口發去道路遙逺必致疲瘠且到日必遲可遣人往尚書班第處取殺虎口大同等處見存銀五千兩遣官送至大將軍費揚古軍酌買皮裘牛羊等物給與從征軍士戊申上駐蹕衣赫圖爾根郭爾之南右衛兵自軍前至上親視賜食傳諭曰戎行效力我朝之常朕欲𠞰滅噶爾丹親統大軍進討噶爾丹望風逃竄遇爾西路之兵遂大敗之爾等乏糧步行而能奮勇敗敵殊為可嘉是以朕親臨賜食盡免爾等所借官庫銀加恩於陳亡及被創病故之人衆官兵叩首謝恩歡聲動地康熙三十六年丁丒閏三月辛丑上諭內大臣明珠曰鄂爾多斯貝勒松阿喇布等各率其兵隨駕勞苦爾其率學士黃茂齎銀前去同左都御史于成龍賞鄂爾多斯見到之兵務使均沾實惠康熙四十二年癸未三月辛酉上諭大學士等曰朕御極以來無時不以民生為念雖纖微之事亦不肯稍有怠忽勤勞已四十餘年矣今四海奠安民生富庶而河工適又告成朕欲頒詔天下大沛恩賚故星夜回鑾詔內欵項爾等可會同詳閲十一月甲寅上召兵部侍郎布雅努近前諭曰朕巡厯諸省觀緑旗兵丁無如提督潘育龍之兵者射既熟嫻人復矯健此皆統率將領之訓練有方也自提督以下官員可俱加一級康煕四十六年丁亥十一月甲戌上諭戶部尚書希福納等曰今時屆嚴寒步軍每夜巡邏殊可憐憫著賞撥什庫銀各五兩布各二匹步軍銀各四兩布各二匹若家下人則諭令伊主以所賞銀布與之勿得扣取是日上諭領侍衛內大臣前鋒統領八旗護軍統領等今屆歲暮朕欲恩賞兵丁爾等將所統兵丁細查曾出兵從獵十次者為一等七次者為一等或中傷有功牌者亦入在十次一等之內其餘者另作一等共分為三等此內有不曾出兵從獵一次者亦開明具奏爾等務行嚴查若少有徇庇其該管官員必斥退之康熙五十二年癸巳三月甲午上諭大學士等曰今歲天下老人為朕六旬大慶皆從數千里而來應賜伊等筵宴然後遣回著查八旗滿洲䝉漢軍漢人大學士以下民以上年逾六十五歲者奏聞老人內有艱於動履不能前來者聽之其能來者俱令之來即不能來者朕亦另行頒賜今天時漸熱賜宴後即令回籍耕種其家奴勿入所查數內又八旗滿洲䝉古漢軍以至包衣佐領下不論官員閒散人等年七十以上老婦亦著查奏俟老人賜宴後再定一日送詣皇太后宫賜宴有艱於動履不能前來者聽之其能來者俱令之來若有貧乏不能來者著各屬協助車馬使之前來俱開確實年歲不可揑報再傳諭宗人府諸王以下宗室子孫內二十歲以下十歲以上選擇其聰明堪供任使者六七十人令於耆老前執爵即朕子孫亦令之出宗室外不用他人也壬寅宴直隸各省見任致仕給還原品文武漢大臣官員士庶等年九十以上者三十三人八十以上者五百三十八人七十以上者一千八百二十三人六十五以上者一千八百四十六人於暢春園正門前傳諭衆老人曰今日之宴朕遣子孫宗室執爵授飲分頒食品爾等與宴時勿得起立以示朕優待老人至意康熙五十六年丁酉十一月甲戌上諭戶部朕統御寰區撫綏萬國無分中外凡兵民生計未嘗一日不為勤求也自𠞰滅三逆以後為八旗甲兵詳加籌畫曾頒發帑金數百萬兩代清積逋又資其匱絀復賞銀數百萬兩凡隨圍出征雖給行月錢糧官駝馬匹猶恐用度不繼設立八旗官庫以濟官兵康熙四十五年復施恩將官庫未經扣完銀三百九十五萬六千六百餘兩盡與除免嗣後官庫事務漸至擾亂故停止八旗之庫設立總庫自兹以來官兵有益庫內案件亦甚清楚但每月扣取錢糧朕甚為廑念曽有無恥積惡撥什庫侵欺兵餉朕故交與戶部將兩月錢糧一次支放俱令給與本人近聞領取銀兩兵丁甫出部門即被人持去公庫既行扣除又復償還私債兵丁所剩甚少以此養贍室家奉行差務斷然不足朕每懷及此深切軫惻兹特大沛恩施式𢎞撫育停止公庫將見今未行扣完銀一百九十六萬八千兩有竒通行豁免自康熙五十七年正月為始著給與兵丁全分銀兩爾部即傳諭八旗都統等出示通曉俾咸知朕優恤禁旅至意大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷三十七
