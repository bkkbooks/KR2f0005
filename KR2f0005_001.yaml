body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷一聖孝康熙元年壬寅八月庚午上諭禮部朕惟君國之道必崇夫孝理化民之務首重乎尊親欽惟我聖祖母昭聖慈夀恭簡安懿章慶皇太后仁承天德順協坤儀佐皇祖太宗文皇帝肇建丕基啓皇考世祖章皇帝宅中定鼎朕纘荷鴻圖恭承懿訓仰惟恩德愛戴彌毁母后皇后懋昭淑範克嗣徽音表正六宫母儀四海母后溫恭慈惠誕育藐躬聖善之德並隆尊顯之儀宜備粵稽古制詢于僉謀恭上聖祖母皇太后徽號曰昭聖慈夀恭簡安懿章慶敦惠太皇太后母后皇后徽號曰仁憲皇太后母后徽號曰慈和皇太后爾部即擇吉以聞康熙四年乙丑九月己酉以大婚禮成加上太皇太后皇太后徽號詔諭天下曰朕惟帝王撫有四海必首隆孝治以端教化之源是以子孫相承而慶流奕葉也欽惟我聖祖母昭聖慈夀恭簡安懿章慶敦惠太皇太后佐皇祖太宗文皇帝肇興大業啓皇考世祖章皇帝式廓洪圖聖母仁憲皇太后克嗣徽音母儀茂著朕纘膺丕緒夙夜兢兢仰荷慈幃並𢎞訓育兹者遴選賢淑作配朕躬屬當嘉禮之成宜進尊稱之典謹告天地宗廟社稷於康熙四年九月二十五日率諸王貝勒文武羣臣恭奉冊寶加上聖祖母昭聖慈夀恭簡安懿章慶敦惠太皇太后徽號曰昭聖慈夀恭簡安懿章慶敦惠溫莊太皇太后聖母仁憲皇太后徽號曰仁憲恪順皇太后崇兩宫之顯號洽萬國之歡心祉貽孫子宏昭式榖之源禮備尊親大錫覃恩之典康熙六年丁未十一月戊午詔諭天下曰朕惟自古帝王建極綏猷保民圖治莫不以懋昭先德祗盡孝忱為務朕纘承丕基躬親庶政恭惟世祖章皇帝功德兼隆當崇配享暨聖祖母太皇太后聖母皇太后恩勤備至宜盡顯揚是用上稽前典下協輿情謹告天地宗廟社稷率諸王貝勒文武羣臣於康熙六年十一月朔有七日冬至恭祀上帝十六日如夏至儀恭祀皇地祗並奉世祖章皇帝配享十七日恭奉冊寶加上聖祖母昭聖慈壽恭簡安懿章慶敦惠溫莊太皇太后徽號曰昭聖慈夀恭簡安懿章慶敦惠溫莊康和太皇太后加上聖母仁憲恪順皇太后徽號曰仁憲恪順誠惠皇太后慶禮兼行鴻恩廣逮率由舊章覲揚前烈之髙厚永膺純嘏覃敷怙冒之恩慈彰孝道于千秋孚德心于六合布告天下咸使聞知康熙九年庚戌閏二月庚戌上諭禮部慈和皇太后誕育朕躬未遂孝養思慕之忱每切于懷雖已上尊諡今應升祔太廟配享皇考典禮關係重大其應進諡號著議政王貝勒大臣九卿科道㑹同詳議以聞丁巳上諭禮部皇考升遐倐厯十載罔極之思時恫于懷山陵在望未一展祭尤切悽愴朕擬于今嵗八月恭行謁陵禮又奉太皇太后旨思念情殷亦欲詣陵朕敬遵慈命躬侍以行應行典禮爾部詳議以聞五月丙辰朔慈和皇太后升祔太廟禮成詔諭天下曰朕惟自古帝王以孝治天下莫不顯揚母德追崇配享以為紹先啓後之本朕纘承丕緒九載于兹恭惟我皇妣孝康慈和莊懿恭惠崇天育聖皇后光贊皇考成締造之豐功誕育藐躬啓昌隆之景運徽音逺播厚德𢎞施廟祀未崇朕懷罔極是用上稽前典下協輿情祗告天地宗廟社稷于康熙九年五月初一日率諸王貝勒文武羣臣恭奉冊寶加上皇妣尊諡曰孝康慈和莊懿恭惠崇天育聖章皇后升祔太廟鴻儀既舉恩赦宜施隆侑饗于千秋廣孝思于萬國布告中外咸使聞知九月丙辰上諭禮部太祖髙皇帝創建鴻圖肇興景運太宗文皇帝丕基式廓大業克𢎞逮世祖章皇帝誕昭功德統一寰區即欲躬詣太祖太宗山陵以天下一統致告用展孝思因盜賊未靖師旅繁興暫停往謁朕以藐躬纘承鴻緒上託祖宗隆庥天下底定盜賊戢寧兵戈偃息每念皇考未竟之志朝夕寢食不遑寧處本欲先詣太祖太宗山陵再詣世祖山陵因奉太皇太后慈命以世祖升遐十年未得一詣陵寢于本年八月前往朕是以躬侍太皇太后先詣孝陵展謁禮成言還今欲仰體皇考前志躬詣太祖太宗山陵以告成功展朕孝思著議政王貝勒大臣內院九卿科道掌印不掌印各官㑹議具奏康熙十年辛亥正月甲子上諭禮部朕仰體世祖章皇帝遺志欲躬詣太祖太宗山陵展祭以告成功前命議政王貝勒大臣等㑹議議政王等以去年各處多有水旱災荒且為時甚迫應用之物預備不及請暫行停止今思太祖太宗創業垂統功德隆盛山陵在望刻不能忘去年恭謁孝陵禮成今已數月若再久延孝思莫殫朕懷靡寧兹當海內升平欲乘此恭謁福陵昭陵以告成功用展孝思事關大典著議政王貝勒大臣內閣九卿科道各官㑹議具奏爾部即遵諭行九月辛未上往盛京謁陵禮成文武各官宴賚有差召八十以上耆民賜飲諭侍臣等曰朕展謁山陵惓惓在念今得至發祥重地拜謁陵寢用展孝思祭禮已成朕懷大慰又諭守陵總管副總管等曰爾等職司祀典凡一應祭品必親加䖍視務盡誠敬副朕孝思康熙十一年壬子正月庚午上詣太皇太后宫問安太皇太后曰我因偶患微疾欲往赤城湯泉汝若同往恐誤國事可不必往上奏曰太皇太后駕幸湯泉臣若不隨往侍奉于心何安至國家政事已諭內閣著間一日馳奏一次不致有誤十二月丁巳上諭學士傅達禮曰朕昨詣太皇太后宮問安太皇太后諭云豫雖在宫壼太宗行政亦略知之彼時開創甚重騎射方今天下太平四方寧謐然安不忘危閒時仍宜訓練武備至于在朝諸臣奏事豈無忠誠入告者然不肖之類假公行私附己者則為引進忤己者即加排擠亦㦯有之為人君者務虛公裁斷一凖于理則事無差失矣朕繹慈訓人君之道誠莫要于虛公裁斷之一言也康熙十二年癸丑二月己未上諭學士傅達禮曰爾衙門所進翻譯大學衍義一書朕恭呈太皇太后御覽奉慈諭云人主居四海臣民之上所關甚巨然代天理物端在躬行致治興化必先修已此書法戒畢陳誠為切要爾特加意是編命儒臣翻譯刊刻更令頒賜諸臣豫心欣恱特發內帑白金千兩可即賚豫在事諸臣朕仰遵慈旨頒賜爾等其欽承之五月乙亥上諭學士傅達禮曰朕因太皇太后聖體少有違和不時省問昨躬奉湯藥幸已大愈朕心方慰頃又進滋補之劑矣七月壬午上諭大學士圖海等曰太宗文皇帝實録巨典攸關今命卿等董率各官重加纂輯務期敬慎將事速竣大典以副朕繼述先猷顯揚祖德之意康熙十三年甲寅二月乙未朔上諭講官喇沙里等曰朕從前賞賜出征官兵奉太皇太后慈諭特出宫中撙節銀兩為賞賜之用見在調遣禁旅啓行期迫恐伊等措辦艱難賞賜本無定例亦宜格外加恩今又䝉太皇太后諭令將宫中緞匹銀兩賞給官兵此誠太皇太后至德𢎞恩爾等職司記注故諭知之康熙十五年丙辰正月乙未詔諭天下曰朕惟帝王綏理萬方首崇孝治尊親之典因事加隆至建立元儲懋敦國本尤必推原懿德上晋徽稱此厯代不易之盛軌也欽惟我聖祖母昭聖慈夀恭簡安懿章慶敦惠溫莊康和太皇太后佐皇祖太宗文皇帝肇造丕基啓皇考世祖章皇帝恢𢎞大業聖母仁憲恪順誠惠皇太后母儀茂著克嗣徽音朕奉事慈闈並承訓育紹基圖治宵旰靡寧兹者祗遵懿命冊立皇太子禮成仰惟垂裕之仁式舉顯揚之典謹告天地宗廟社稷於康熙十五年正月十一日率諸王貝勒文武羣臣恭奉冊寶加上聖祖母昭聖慈夀恭簡安懿章慶敦惠溫莊康和太皇太后徽號曰昭聖慈夀恭簡安懿章慶敦惠溫莊康和仁宣太皇太后聖母仁憲恪順誠惠皇太后徽號曰仁憲恪順誠惠純淑皇太后慶禮告成恩綸宜沛崇儀顯號昭令範于千秋錫類推恩洽歡心于四海布告中外咸使聞知康熙二十年辛酉十二月丁酉上諭禮部獻嵗太皇太后夀届七袠洊臻景福諸王大臣應行慶賀禮儀各視官爵為差其慶賀日期爾部擇吉以聞庚子上諭禮部朕惟戡定本啓佑之恩顯揚備尊親之禮成功既告盛德宜彰所以展孝忱昭慶典也逆賊吳三桂背恩反叛數年以來朕仰承聖祖母昭聖慈夀恭簡安懿章慶敦惠溫莊康和仁宣太皇太后暨聖母仁憲恪順誠惠純淑皇太后慈訓𠞰除叛亂克奏敉寧思上答乎𢎞仁應進崇夫顯號謹加上太皇太后徽號曰昭聖慈夀恭簡安懿章慶敦惠溫莊康和仁宣𢎞靖太皇太后皇太后徽號曰仁憲恪順誠惠純淑端禧皇太后播徽音于四海介景福於萬年爾部擇吉具儀以聞康熙二十二年癸亥四月丙子工部題修孝陵五空橋甬道估計工價銀兩上曰陵寢關係重大前監修各官草率修理因致損壞今若以莭省之故估價短少錢糧不敷將舊存磚石充用恐不堅固寧使價值寬餘務令永逺堅固著重修陵寢堂司官詳勘議奏康熙二十四年乙丑正月癸酉上以孟春詣太廟致祭畢諭內閣學士席爾達太常寺卿葛思忒等曰往見贊禮郎宣讀祝版至朕名聲輒不揚父前子名禮經所載朕對越之次惟懼誠敬稍有未至無以昭格神靈為子孫者通名于祖父豈可涉于慢易嗣後俱髙聲朗誦無庸顧忌九月乙亥先是上駐蹕博洛和屯聞太皇太后聖體違和星夜回鑾親奉湯藥夜半尚未就寢逮太皇太后聖體康寧奉慈諭幸白塔寺將行大雨近侍奏曰道路泥濘請俟少霽行上曰近因聖祖母偶爾違和朕心深切憂慮今已痊愈甚為慶幸何憚此一往不以仰慰慈衷乎遂冒雨行康熙二十六年丁卯十一月壬寅上諭刑部朕奉太皇太后朝夕承歡祗遵慈訓竭誠奉養今者聖躬偶爾違豫朕夙夜滋懼寢食靡寧仰冀上天眷顧俯垂默佑惟思好生以迓天庥寬大以延遐夀所有內外問刑衙門見監重辟人犯除十惡死罪及貪官光棍不赦外其餘監候死罪重犯槩行減等發落以昭朕祈天永佑至意甲辰上諭大學士等曰自太皇太后聖體違和以來多方醫治病勢漸增朕夙夜憂懼兹欲躬禱郊壇保護慈躬康寧大學士隨同九卿等奏曰皇上聖孝之誠必當感格穹蒼臣等愚見似不必詣壇致祭天心自為默佑上復諭曰自太皇太后違和以來朕在宫中無日不竭誠默禱今太皇太后病勢漸增朕心益加恐懼惟有竭抒忱悃叩祈上天之眷佑耳可即將此旨傳諭諸臣十二月乙巳朔上率諸王貝勒貝子公等及文武官員自乾清宫步詣天壇致祭祝文曰臣仰承天佑奉事祖母太皇太后髙年荷庇藉得安康今者疹患驟作一旬以內漸覺沉篤臣夙夜靡寧寢食捐廢虔治藥餌遍問方醫罔克奏效五內憂灼莫知所措竊思天心仁愛覆幬無方矧臣藐躬夙䝉慈養憶自弱齡早失怙恃趨承祖母膝下三十餘年鞠養教誨以至有成設無祖母太皇太后斷不能致有今日成立罔極之恩畢生難報值兹危殆方寸潰迷用敢潔蠲擇日呼籲皇穹伏懇憫念篤誠立垂昭鑒俾沉疴迅起遐算長延若大數或窮願減臣齡冀增太皇太后之夀讀祝版時上涕淚交頤陪祀諸王貝勒貝子公等及文武官員無不感泣祭畢上即詣慈寧宫侍疾甲寅內閣及部院衙門官員公同具疏請皇上少節勞瘁上曰朕自太皇太后違豫以來心懷憂慮日侍左右檢方調藥親視飲饌太皇太后寧憩之時朕惟隔幔靜俟席地危坐一聞太皇太后聲息即趨至榻前凡有所需手奉以進因此晝夜不能少離太皇太后屢有慈旨命朕回宫少宜自愛朕念幼䝉太皇太后撫養教訓三十餘年罔極深恩難以報答今見病體未痊五內焦灼莫知所措朕躬寢處何暇顧計當此時不竭盡心力少抒報答之忱異日雖欲依戀慈闈豈易得耶己巳子時太皇太后崩于慈寧宫上劈踊哀號呼天搶地哭無停聲飲食不入口王以下文武羣臣公疏奏請節哀上不允隨諭曰朕覽自古帝王居喪持服以二十七月易為二十七日惟魏孝文帝欲行三年之喪朕平日讀史至此常羡慕之今非欲邁古賢君祗念朕甫八嵗世祖章皇帝即賓天十一嵗慈和皇太后又崩逝藐兹沖齡音容未盡記憶未獲盡孝至今抱憾仰賴聖祖母太皇太后鞠養教誨以至成立今遽遭大故五內潰迷回思早喪怙恃益增痛傷哀疚靡盡今持服二十七月少慰罔極之痛朕獨持服宫中于政事毫無曠廢不令臣民持服一切俱不禁止如此可以遂朕本懷朕哀慟即可少止諸王大臣等奏曰皇上至德純孝亘古莫比但古者以日易月為不易之典誠以帝王之孝與臣民不同願皇上仰遵遺詔博稽古制上思天地祖宗付畀之重下慰羣臣百姓仰賴之忱以禮節哀易月之典守而勿更上諭曰朕事太皇太后三十餘年竭盡衷誠無稍違拂近者聖體違豫三十餘日衣不解帶必誠必敬朕之此志期在必遂否則貴為天子富有四海亦奚以為爾等其詳議之諸王大臣等聞諭皆感悚嗚咽又奏曰皇上一身為郊壇宗廟社稷所寄托每當祭享伏見鑾輿親蒞竭誠盡敬古者祭為吉禮必于除服後舉行皇上以太皇太后之故若使郊廟神靈少有弗歆即太皇太后在天之靈亦必不安且君臣兆姓本屬一體若皇上持服宫中臣民安然即吉甚非一體之義况皇上奉事太皇太后三十餘年晨昏孝養即違豫以來晝夜憂勤罔非孝思今乃于慈闈遺命反不曲遵恐有虛太皇太后惓惓之意臣等不揣愚賤敢以固請上諭曰朕意已定不必更奏是日上諭禮部朕孝服用布舊制國有大喪自宗室公以上服素帛今孝服俱改用布宫內年幼皇子公主一體持服康熙二十七年戊辰正月辛巳上諭禮部大行太皇太后聖德母儀昭示萬國昔奉我皇祖太宗文皇帝贊宣內政誕育我皇考世祖章皇帝顧復劬勞受無疆休大一統業暨朕踐阼方在沖齡仰荷我聖祖母訓誨恩勤以至成立晨昏依戀三十餘年方期洊享遐齡茂膺繁祉詎意適遭違豫奄忽上賓朕哀疚之深五中摧絶昊天罔極報德實難緬維厚澤深仁信足炳傳簡冊非薦隆號莫展哀誠宜恪遵彞憲恭上尊諡垂示無窮以慰朕尊親之意著內閣翰林院詹事府㑹同擬奏其應行典禮爾部詳議以聞戊子上諭九卿詹事科道等曰朕遭太皇太后崩逝欲持服二十七月立志甚堅諸王大臣及百官士民再三陳奏情辭懇切不得已勉從所請中心歉仄因幕居乾清門外以盡哀誠今乃又請回宫不過以朕躬為念身為天子豈不自愛但人孰無祖父母父母為子孫皆當盡孝何分貴賤朕孝治天下思以表率臣民垂則後祀今距釋服之期為時甚近若從所言以致異日稍留遺憾恐非諸臣愛君之意諸王大臣激切奏懇已有諭旨不允卿等其仰體朕心勿復言庚寅先是諸王大臣及士民等奏請以日易月之疏未奉俞旨至是上諭曰朕以薄祜幼失怙恃幸依聖祖母膝下如見皇考妣音容今遭遐棄痛念慈恩悲哀並集欲持服二十七月仰答聖祖母鞠育深仁兼報皇考妣劬勞大德諸王大臣及各官等援引厯代成例堅請再三並稱郊廟祀典不宜久輟升祔大禮及時舉行且士民伏闕披瀝衆情謂國恤淹久有妨民業朕反覆思維不得已以禮抑情勉從所請戊戌上諭大學士明珠內務府總管班第等曰自太皇太后違豫皇太后盡孝侍奉甚為勞瘁太皇太后賓天復哀痛太過慈顔清減昨者朕詣皇太后宫問安見癯瘦更甚積勞成疾服藥調理朕心深為憂慮明日太皇太后一月之祭爾等可奏請不必前往三月庚子上諭從前詣兩宫請安皆于起居注記檔今詣寧夀宫請安朕因不忍過慈寧宫故從啓祥門行走但此係宫禁之地外官無由得知後每次請安著令太監傳諭敦住仍令起居注記載其不忍由隆宗門行走之故亦令諭侍郎庫勒納知之康熙三十八年己卯三月乙酉上駐蹕蘇州府江南江西總督張鵬翮等率蘇州府官員士庶進表慶賀萬夀節上諭曰朕往歲萬夀節猶照常行禮太皇太后賓天以後遂不復受賀此日但齊戒獨處觀書寫字而已且朕平居原不喜宴樂在京時諸王大臣每遇萬夀節輒請如前行禮朕皆不允今巡幸至此若受慶賀則非朕初意矣衆意諄切朕已知之不必再請康熙四十一年壬午七月庚戌朔上駐蹕熱河聞和碩溫憲公主薨日晡未進膳扈從諸大臣奏曰皇上聞公主訃過哀此時尚未進膳恐聖躬太為勞瘁奏入上傳諭曰公主係已嫁之女朕尚可寬釋但皇太后自幼撫養忽值此變皇太后傷悼弗勝膳尚未進朕亦何心進食乎康熙四十九年庚寅正月壬午先是上諭禮部蟒式舞者乃滿洲筵宴大禮至隆重歡慶之盛典向來皆諸王大臣行之今歲皇太后七旬大慶朕亦五十有七欲親舞稱觴是日於皇太后宫進宴皇太后升座樂作上近前起舞進爵康熙五十六年丁酉十一月癸丑上駐蹕湯泉諭大學士等曰湯山至德勝門四十餘里德勝門至大內將及十里此間設立腰站二處各派部院賢能司官一員筆帖式一員如此則朕遣人請皇太后安竝皇太后差人至朕處俱不致遲悮矣十二月甲申諸皇子傳諭曰皇太后病勢漸增朕承歡奉養歷數十年不幸值此朕躬雖抱病此心未能梢釋頃親往請安朕體甚覺委頓皇太后倘有不諱朕自當竭力以盡禮節耳乙酉諸皇子傳諭曰昨日朕足背浮腫不能轉移因皇太后病勢大增用手帕纒足乘軟輿詣寧夀宫朕捧皇太后手奏云母后臣在此皇太后張目畏明以手障光視朕執朕手朕心悲痛欲在寧夀宫守視因病體萬不能支而出朕若居于素所寢處之地心甚不安因于蒼震門內設立帷幄以居衣不解帶朕數日來遍身沈重中心煩燥不能成寐三鼓時稍寢即醒醒時頭暈隨又起坐至五鼓始寢半刻朕欲竭力盡禮似此形勢甚恐不能支持益滋不安耳丙戌大臣等奏聖體違和仰祈節勞保攝奏入上曰皇太后倘有不虞朕當力疾盡禮爾等各有父母勿過為勸阻朕益傷悼益增疾矣是日酉刻皇太后崩于寧夀宫上拊膺哀號即行割辮孝服用布哭泣弗輟諸皇子屢次叩請始回蒼震門內丙午諸王大臣等公奏明日大行皇太后殯宫行大祭禮聖躬近日方稍愈請今晚不必親詣梓宫前哭奠上諭曰二十一日二十二日朕本欲親詣致祭因二十七日欲親往釋服是以未去自二十三二十四日以後朕躬比前較愈儘可往矣諸皇子大臣屢次勸止倘朕今可以去而不去他日回想豈非遺憾乎今朕必親去將此諭衆知之康熙五十七年戊戌三月壬戌諸王大臣合詞具奏皇太后大事將滿百日諸禮俱畢請照禮部所請于十四日剃髮上諭曰方皇太后大事梓宫未出之前朕立意欲曲盡乃心不幸身病不能支持難以勉强諸事未盡朕心抱恨無窮又思當此之時止有孝敬朕之人竝無愛恤朕之人尊長輩已無存者此等處每以無可與言為傷茲距四月初七日為日無幾著過四月初七日剃髮康熙五十九年庚子十二月甲辰諸王貝勒貝子公滿漢文武大臣謹奏皇上御極六十年普天大慶恭請行慶賀典禮上諭大學士等曰朕素性不喜行慶賀禮是以元旦惟照例行禮停止筵宴雖萬夀日亦久不行慶賀禮今王大臣等為朕御極六十年奏請慶賀行禮欽惟世祖章皇帝因朕幼年時未經出痘令保母護視于紫禁城外父母膝下未得一日承歡此朕六十年來抱歉之處正月初七日世祖章皇帝忌辰二月十一日孝康章皇后忌辰朕何敢于正月初七二月十一日以前行慶賀禮此所奏不准行庚申上諭大學士等曰諸王大臣為朕在位六十年奏請慶賀而于典禮之大者並未議及朕在位六十年皆祖宗積德隂祐所致幸而六十年來一無所失應先往盛京三陵行大祭禮但朕今年近七旬不能親謁三陵應遣皇子等恭代告祭俟上元節後朕親往孝陵恭行大祭典禮爾滿漢大臣㑹議具奏其祭陵撰文即將朕旨纂入
