body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功德大成仁皇帝聖訓卷四十七訓將士一康熙十年辛亥十月壬辰上諭寧古塔將軍巴海曰朕向聞爾賢能今侍朕左右朕益知爾矣飛牙喀赫哲雖已降服然其性暴戾當善為防之必湏廣布教化多方訓迪以副朕懷遠至意羅刹雖云投誠亦當加意防禦操練士馬整備器械毋墮狡計至於地方應行大事毋得疑畏即行陳奏康熙十二年癸丒十二月癸亥上諭兵部遣發大兵原為剿除叛逆以安百姓凡兵丁厮役於所在地方恐有恃强掠民財物拆人廬舍壞人器具汚人婦女擾害生民及損壞運河閘板樁木統兵主帥各宜體朕為民除叛用兵之意申明紀律嚴加鈐束倘有違禁妄行從重治罪著即速行曉示康熙十三年甲寅正月乙亥上諭寕南靖寇大將軍多羅順承郡王勒爾錦安西將軍都統赫業曰行軍之道惟得民心為要今勒爾錦帥師之湖廣赫業帥師之四川所過地方宜厚加撫恤嚴禁侵掠誠能無犯秋毫則百姓安矣至官兵暴露良苦亦宜拊循其進止處所謹設斥堠善自周防勿懈也南方卑溼念我軍士逺役或不習水土猝有疾病可擇醫藥調治之其有勞績者即向所司支給賞賚勿致踰時五月戊辰上諭駐防兖州喀喇沁土黙特塔布囊等曰昔太祖太宗取有天下爾等祖父常同心効力朕仰體祖宗撫恤爾等祖父之意恩典頻加念爾等生長朔方粤西一帶係炎蒸之地故不遣往特命鎭守兖州爾等至彼湏節愼飲食凡有調遣當聞命星馳遣爾出師所以為百姓也當加意撫恤沿途不得擾害至於設巡哨謹備禦凡軍旅事宜敬愼毋忽八月癸巳上諭科爾沁公圖納黑曰我太祖太宗以來爾祖父同心効力佐定天下爾國賦税聽爾自取朕念爾國窮苦加意撫養今聞調至爾所屬兵卒有掠取民物者在京尚如此况離此逺去豈不益肆搶奪爾久歴行間宜嚴禁兵卒毋得恣行强横如有亂法者即會同貝勒議行懲治且中夏炎熱爾衆早晚飲食各宜自愼以副朕軫恤軍士之意十一月己巳上諭安逺靖寇大將軍多羅貝勒尚善等曰覽呉亶所齎爾等奏疏朕心深為嘉悦兩貝勒皆朕懿親運籌決䇿破賊立功在指顧間爾等請調荆州緑旗甲兵備用宜深加撫恤至臨陣時明諭賊人有觧甲來歸者即與保全恩養安插朕未親歴行間但披覽輿圖據臆懸㫁所期爾諸將等恩威公普無間親疎嚴飭哨探申明法紀速成破賊之功永表旂常之績爾等所有籌畫即行密奏兩貝勒及大臣等兵士無恙幷疏以聞康熙十四年乙夘七月甲辰上諭定西大將軍多羅貝勒董額等曰國家仰荷天眷秦州鞏昌蘭州等處以次恢復朕甚嘉悦此係保寧旋斾之兵間關䟦渉戮力効命所致湏不時軫念恤其勞苦且爾等將兵在外事情經練湏協和持平方克有濟朕亦知爾等㫁不徇一己之利但意慮所及不得不為告誡將軍張勇勞績甚多愼勿狎侮致滋嫌怨爾等務期殚心為國運籌制勝一德同心早奏蕩平以慰朕望八月己巳上諭出征鎭安將軍都統噶爾漢曰爾所率蒙古兵丁馬匹雖不甚肥健今野多青草師行必不致悮聞前往䝉古兵卒沿途頗行擾掠此行務加意嚴禁勿得侵奪民物凡行軍駐營俱令與滿洲兵相近勿得逺離康熙十五年丙辰二月乙亥上諭陜西諸將士曰我國家自創業以來克敵攻城必主帥奮勇先登軍士効死戮力方能速建膚功今聞爾等凡與敵遇率皆乘間伺隙觀望不前但令士卒前驅衝突督撫等亦多坐失事機故致勞師匱餉因命都統大學士圗海為撫逺大將軍前往平涼總統諸軍爾等痛改前愆殫心圗効若仍蹈前轍一經大將軍指名劾奏必置重典至兵士行間勞苦朕已悉聞爾等衆兵宜體朕豢養之恩益奮勇効力果建功勲不吝爵賞爾等勉之三月庚寅上諭大將軍貝勒尚善曰爾等統率大兵閒坐日久未進寸歩朕指授軍機惟以雨雪為辭仍退縮不前各執全軀保身之意今安親王已復萍鄉醴陵二縣進取長沙湖南逆賊豈盡棄他處而獨固守岳州耶揆此則不實心用力顯然矣爾等宜痛改前非奮發効力乘湖南逆賊騷動之時仍遵前㫖速行進兵毋得坐失機會四月丙辰上諭大將軍康親王傑書寧海將軍貝子傅喇塔曰王貝子皆朕懿親受任討賊師克在和近覽王貝子屢次章奏似不相輯睦嗣後務同心一志合謀幷力以奏膚功毋各執己見貽悮封疆負朕委任之意七月辛巳朔上諭大將軍簡親王喇布等曰江西雖去京四千里朕知之甚悉王以宗室懿親不乃心國家料理軍務恢復地方惟坐守省會日事騎射以圗安逸殊負委任之意今逆賊髙大傑竊踞吉安朕㫖到日即宜剋期攻取副將軍希爾根不思報國日駐省城安逸自便性尤偏執軍中每分兩翼獨庇其右翼嗣後宜痛改前非力圗報効哈爾哈齊額楚亦宜遵朕命速取吉安勿得推諉坐失機宜且覺羅舒恕莽依圗穆成格現駐贛州南安王等宜協力攻取吉安進兵兩粤凡行兵之道愛民為先若百姓富足糧餉充裕則徴調師徒庻不致有困乏自今大兵所至務禁戢擾掠以稱朕撫輯兆民至意丁未河南土寇張成武侵擾永寧縣境駐劄河南府參領胡世巴等移會巡撫進兵報至上切責胡世巴等曰大兵駐防河南府本為撲滅盗賊今永寧有警胡世巴等距賊百八十里不率兵星赴乃稱移會巡撫遷延時日殊為不合著胡世巴等即率官兵進剿該撫鎭亦即遣兵會剿無使滋蔓仍禁戢軍士勿擾地方八月戊午上諭議政王大臣等曰大將軍簡親王喇布副將軍希爾根等俱有保全江西剿滅賊寇重任豈得各分疆界互相推諉今將軍舒恕等兵至南康贛州為日已久馬匹資仗乏絶如聽其因地取給必致擾害生民吉安雖未恢復豈無間道可通贛州王及將軍總督等宜多撥官兵由間道解送資糧器械接濟士卒吉安即係南康贛州孔道大將軍王等率兵速取之仍酌留官兵同總督董衞國鎭守南昌其速行文諭伊等知之己未上諭大將軍安親王岳樂等曰朕聞王恢復萍鄉大創逆賊直抵長沙甚為嘉悦今日之事利在神速若稍遲緩俾賊得以固守則攻取不易今秦省全定自蜀中前来逆賊十餘萬盡已殲滅大兵即不下四川賊亦不敢復出若分發現在陜西之兵前赴湖廣庶或有濟王其善撫百姓倘民困已極即得地方亦復何益至叛逆之人皆係脅從情非得已且原皆朕之臣子王其時加招徠即呉三桂果有悔罪輸誠之心亦何不可容受王膺此重任自有成算特以朕意示知十一月丁亥上諭湖廣大將軍王貝勒參贊大臣及官兵等曰我朝創業以來戰勝攻取動合兵機將帥皆身先士卒無不立奏膚功逆賊呉三桂背恩反叛朕念爾等宗室大臣簡閲官兵委以南征削平僭亂拯救生民今出師三年未獲尺寸坐失機會使疆圉日逼賊勢鴟張糜餉困民悞國孰甚罪在王貝勒將軍大臣於衆官兵無與今陜西福建江西浙江雖漸次底定然賊渠呉三桂不誅於事何濟日者穆占在川陜時勞績茂著兹特簡為征南將軍命以討賊爾等亦當同心戮力殲寇拓疆以副朕靖亂安民之意愼勿妄分疆界各顧部伍互相推諉仍蹈前失也衆官兵自遣發後為國効力暑雨蒸溼浚濠築壘晝夜枕戈披堅冐刃分防偵探備極勞苦朕悉知之每念及此深用惻然爾衆官兵其念朕恤養之恩益加用命倘樹立功勲朕不吝優加爵賞其各勉之壬寅上諭兵部將軍哈爾哈齊額楚等已抵吉安數月不能𠞰除逆賊攻克城池故逆賊乗間陷醴陵窺萍鄉恣意肆行覬斷安親王大兵後路及提督趙賴等領兵赴援又不併力𠞰賊徒擁重兵愒時玩日且屢檄簡親王喇布副將軍希爾根令其親統大兵速赴吉安乃藉口南昌重地逗留不前遲久始𤼵又不多備彈丸火藥等物即此觀之貽悞軍機匪小是日大將軍簡親王喇布等疏稱江西撫州等處汛兵單弱江西總督董衛國又請𤼵援師并調鄰省之兵防守上諭曰各路調集江西兵為數不少簡親王喇布等不速取吉安徒爾勞師糜餉吉安一郡尚不能取湖南逆賊何日得平前理藩院郎中胡世巴所領䝉古兵已遣發江西董衛國又身在省城鄰省之兵無庸調遣至恢復長沙平定湖南全賴吉安大兵接應簡親王喇布等若仍前遷延觀望安親王大兵脱有疎虞喇布等當以失機例従重治罪不貸康熙十六年丁巳三月丙午上諭兵部大兵需馬甚殷非尋常比貝勒尚善等去賊甚近必審知萬無一失方行遣送今長沙岳州之間路未甚通若逆賊阻截䕶兵力單難保無虞宜預約安親王遣兵相迎度兵且來然後發往且將軍鄂内率兵赴岳尚善所知或俟此兵到後多添兵力俾無他慮然後遣行今但以千兵䕶送如許馬匹殊為輕忽倘事出意外於我不利且為賊資則是尚善明悞進𠞰大事尚善其速偵送馬消息以聞四月辛未上諭兵部簡親王喇布等統領重兵圍吉安一城日久不下虛糜國帑徒勞士馬被圍之賊不能撲滅故使逸出逸賊率皆歩行復不能追擊聽賊渠脱逃情罪重大宜即處分念見在進兵俟事平旋師之日嚴加治罪又王啓元奏稱吉安雖復而賊皆逃出與土寇合勢江西未為全定前因總督董衞國疏稱吉安已復逸出之賊見在圍𠞰故令酌量分遣大兵赴袁州南昌今江西既未全定可令參贊大臣到日相視地方輕重緩急如不能如前㫖分遣則聽其便宜調度至螺子山拒賊一案與縦賊逸出官兵其嚴察罪狀以聞又傳諭喇布及諸將軍等曰諸路大兵俱各殫力殺賊惟江西一路屢廑朕憂爾等圍困吉安既已逾年乃縦賊盡令逸出又不恤人民肆行侵掠夫國賦出於民有一民斯有一民之賦若不撫輯招徠地方何由底定又屢稱江西兵士戰馬羸瘦多斃爾等頓兵江西未出四五百里外戰馬何由羸斃況康親王兵由浙江定福建入廣東彼馬何獨能進豈非爾等憚入楚粤預為託故嗣今宜竭力剿賊平定疆土勉建功績用贖前愆六月己未上命翰林院侍講學士顧八代赴將軍莽依圖軍前傳諭莽依圖曰用兵利在神速毋稽遲貽悞或不得已擇便而行者有之凡此機宜爾自熟悉近以逗留悞事如長沙荆州諸處其明騐也九月丙子上諭康親王傑書尚書介山侍郎吳努春等曰今當勦滅吳逆招攜撫順之時不宜遽調耿精忠還㑹城以疑衆心王及大臣等不將此事預行請㫖即撤耿精忠殊為失計嗣今凡此等重有關係之事務熟籌請㫖毋得徑行十一月壬午先是揚威大將軍和碩簡親王喇布奏據報韓大任等欲渡河濳遁楚賊來迎應乗其未合預行剿滅但䕶軍統領哈克山等部兵甚少若剿逸賊則無兵以遏楚逆若禦楚逆則追剿逸賊又復無兵今吉安無可調之卒臣等議分將軍穆占兵之半暫守永新安福令其半赴泰和萬安諸處遏禦賊冦上曰簡親王喇布自到江西並未建尺寸之功宴坐會城虛糜糧餉迨赴吉安以重兵圍城逆賊韓大任奔逸不能擊滅致韓大任竊踞寧都雖遣副都統布舒庫等率兵前往究未大創賊衆今韓大任等自寧都竄突延及萬安泰和諸處不能撲剿又以兵少具奏計喇布所轄滿漢官兵為數不少一韓大任未能剿除任其出入宜即嚴加處分念現在與賊相持姑俟事平日議罪其令將軍穆占率兵急赴梁口務速剪滅勿使蔓延至是穆占奏稱聞吳三桂遣偽帥三人由永新犯吉安臣身在地方洞悉情形偽帥來犯非迎擊不可臣是以率兵前進於本月初三日已抵永新俟後軍一至即𠞰除永新百里外所屯賊冦進取茶陵其逆賊韓大任應令大將軍簡親王喇布或和碩額駙華善率兵堵禦上諭曰簡親王速調副都統布舒庫提督趙賴等所轄兵亟滅韓逆將軍穆占身臨賊境必悉情形或先赴梁口協剿逸冦或已進取茶陵遏禦楚賊即乗機平定湖南其詳悉籌度無失事機十二月癸丑上諭䕶軍統領哈克山副都統布舒庫席山雅秦提督趙賴等曰爾等所統官兵頗多現今將軍穆占擊敗楚賊收復茶陵攸縣逆賊韓大任已無外援宜乘此時即行蕩掃乃稱山路險狹騎兵難用欲調兵守隘延引時日使賊復得閒固守殊誤機宜簡親王量調附近官兵并嚴檄哈克山等乘賊勢蹙急行剿滅辛未上諭兵部大將軍圗海身在陜西其沿邊流番或令提督等率兵往逐或嚴飭邊汛官兵各固守汛地選幹練人員至頭目處開誠曉諭令彼退回著大將軍圗海酌量指授而行毋致生釁康熙十七年戊午二月乙巳上諭將軍穆占曰爾所宻奏事宜朕已悉知前議政王大臣所議因無接濟之兵令爾前進今賊韓大任窮蹙來歸諸處俱已克復江西全省將士皆有餘暇故著簡親王與爾㑹同酌議想移文尚未至是以爾先為陳奏今在廷所議乃合諸路情形統籌全局覽爾將軍等所奏各執己見者甚衆此皆無濟於事嗣後湏當同心勉力無負委任至意三月丙戍上諭議政王大臣等曰自逆賊呉三桂叛變以來大兵諸路征𠞰方平南王尚之信歸正之時將軍廵撫傅宏烈思念國恩密約反正所領官兵從未支領俸餉輙奮勇入粤西收復梧潯諸處殲戮渠帥屢奏捷功嗣以進取平桂規定滇黔奏乞迅發大兵以相助援因遣將軍莽依圗等協力恢復平桂本期莽依圖等與傅宏烈并力平定廣西克濟大事不意莽依圗等兵抵平樂寸歩不前藉口緑旗營壘失陷遽奔還中山鎭仍復畏縮退至賀縣又託言糧餉不繼徑回梧州徳慶以傅宏烈恢復如許城池盡棄與賊今若梧州乏糧必將退回肇慶肇慶乏糧必將退至廣州茍廣州乏糧當復棄廣州而還耶如此怯懦多端推諉不惟悞西征之事即粤東恐亦可虞頃有㫖令莽依圗駐鎭梧州兼顧髙州諸處嗣今宜痛改前轍鼔舞軍士勉圗後効相機剿賊底定封疆爾等其嚴行申飭閏三月庚申上諭兵部據大將軍圗海疏報噶爾丹興兵往攻青海厄魯特如逺從逹布素圗瀚海而去則無庸置議若來至近邉欲經大草灘前往則將軍侯張勇提督孫思克等務湏令其堅立信誓不許騷擾人民仍整飭我軍嚴加防䕶一面放噶爾丹過一面奏聞倘或肆横强欲入邉將軍提督等固守地方一面堅拒奏報爾部速即傳諭六月庚午朔上諭議政王大臣等曰康親王傑書用兵甚為選愞自至浙江安居無事之地及屢降嚴㫖督趣始破衢州之賊進定福建福建既平不事預防固守俾海賊登岸遂困海澄我國家軍法嚴明無敢輕忽浙江福建失機將士傑書未嘗察取供詞紏劾有負委任其㑹議以聞己卯上諭將軍莽依圗等曰向因規定廣西調遣滿漢官兵甚多今進征田州泗城若俟他路諸軍齊集必稽時日若孤軍獨進恐難有濟平粤事宜所係甚重將軍莽依圗額楚傅宏烈及參贊諸臣與總督金光祖等俟克復潯州俱赴梧州面議何路進兵先取何地務期和衷為國勿各圖自便丁亥上諭兵部將軍穆占大將軍簡親王總統師旅受將帥之任宜求濟大事彼此和衷若爾各懷嫌隙恐誤疆場嗣今務相輯睦爾部即行傳諭己丑上諭議政王大臣等曰簡親王喇布自抵江西未能剿除逆賊克復疆土而於失機將士復不嚴責軍狀及遣守茶陵攸縣諸處已收復地方又不能鎭防屢以力單奏請益兵凡所題奏率過其實此皆喇布庸劣不能効力之故俟事平旋師之日嚴加議處大將軍安親王兵現駐長沙無論䕶軍甲兵每佐領選一二人遣赴簡親王軍前且大軍既鎭守茶陵攸縣安仁諸處則吉安已為内地吉安署副都統尼滿等之兵亦聽簡親王隨宜調用是日上諭兵部長沙茶陵郴州地勢及逆賊情形久未知悉大將軍安親王將軍穆占大將軍簡親王各遣熟識情形具諳始末奏事傳㫖不致遺誤者一人馳驛赴京安親王仍遣䕶衞雅圖偕來七月庚子上諭征南將軍都統穆占曰爾前此欲將簡親王兵與爾相繼前進止留將軍額駙華善副都統希福鎭守陳請前來朕未之允盖以江西地方所關甚鉅且無接續之兵此將軍所悉知倘如所請遣簡親王繼爾進兵今此賊衆又將何兵禦之滿兵之勢貴聚聚則處處攻戰始克有利若無用空城使滿兵分駐以寡力而遇賊輕戰有志氣者盡殁行陣無頼之徒俱行敗北如此則實為可惜滿兵關係極為重大利戰則戰利守則守宜合全力以破賊衆若徒分守恢復之空城似乎不可今福建廣東情形亦不甚妥爾等益當同心協力保固地方特此宻諭九月辛酉上諭兵部簡親王喇布方剿撫逆寇之際穆占盡撤其屬兵茶陵攸縣安仁諸處所存兵每佐領不足七人大將軍安親王每佐領兵二人復遣還長沙致簡親王兵力單弱遇有調遣穆占又相去甚遠誠難應時即至今簡親王赴安仁相機進剿其所部兵當聽隨宜調遣簡親王所發官兵穆占竝未商酌任意留之甚屬不合其内府佐領兵三百人仍令發囘至永興地方本令穆占簡親王協同鎭守今若止令簡親王駐守倘簡親王相機前進或逆賊來犯恐兵力單弱關係匪輕其令穆占簡親王協議各酌遣官兵共守永興今逆賊呉三桂已死急宜𠞰撫之會穆占簡親王其凛遵諭㫖同心合力以圖濟事康熙十八年己未六月丁亥巡察潮惠等處海口吏部主事塞楞額等疏言粤東馬􅝱鷗汀背諸處宜嚴加防閑請調撥官兵分駐各口上諭曰巡視海疆嚴禁奸民貿易潛資寇糧乃平海機宜所關馬􅝱鷗汀背石井寨諸處俱沿海要地其令廣東總督巡撫提督等速撥官兵防禦海寇杜絶奸民私逼糧糗塞楞額等乃特遣嚴察海疆之員何地緊要宜添兵防守即移文該督撫提鎭調兵駐防如汛守官員不加嚴緝或私縱奸民通賊貿易接濟糧米等物塞楞額等即指名㕘奏九月辛丑上諭䕶軍統領呉丹曰近者廣西南寧賊將呉世琮被誅湖南武岡州呉國柱亦已授首廣西湖南俱經投誠賊意懈弛賊兵潰散天下之人咸知賊勢必敗罔不引領望諸將軍早靖逆氛爾等陜西將士駐扎善地馬無傷斃人無疾病不思速滅賊寇支吾推諉進取無期又有何人代為爾等破賊耶爾在朕左右稔知朕意應勇果任事參贊大將軍機宜以立功勲頃大將軍稱言來京陛見面奏軍國大事比至陳奏竝無成算有失衆望此固軍前將士所悉知也若失此機會可乘之時萬一賊據四川貴州雲南以為巢六致歲月相持彼時悔無及矣宜速行籌畫十月辛未上遣内閣學士禧佛郎中呉赫齎敕往陜西諭將軍張勇王進寳提督趙良棟孫思克曰自逆賊呉三桂背恩反叛遣發大兵各路征𠞰平定疆圉撲滅賊寇湖南廣西福建諸處以次恢復餘賊逃潰盤踞水陸險隘冀圗抗拒此等殘寇雖無煩速𠞰不久自當殄滅但朕軫念民生急於拯救令其得所故欲掃除諸孽以靖土宇今賊既敗遁負險無容專恃馬兵若用緑旗歩兵之力於滅賊殊為有濟况我緑旗兵較之賊兵甚强爾等素受國家厚恩戮力行間樹績邊疆甚多殫矢忠貞圗報恩眷朕所悉知爾等當各率所屬緑旗兵平定漢中興安恢復四川宜分幾道進兵作何調度始能恢復其詳議具奏如爾等盡力報効恢復漢中四川朕必不拘成例優加恩賞爾等官兵前進則滿洲大兵亦即相繼進剿接運糧餉不致匱乏兹事所係甚為重大速詳加酌定以聞又令禧佛等傳諭張勇等曰自古漢人逆亂亦惟以漢兵𠞰平彼時豈有滿兵助戰哉今逆賊大敗乘此逃散之際理宜速定四川天下緑旗兵無如陜西强壯而其數較各省倍衆在陜西大臣官員又皆具有才能將滅之寇何難𠞰除爾等不即平定四川豈縁爾等名位事權輕歟倘謂地屬險隘自古以來險隘之地若不攻取豈有自定之理作何調度官兵㡬路進𠞰事宜一併確議以聞大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷四十七
