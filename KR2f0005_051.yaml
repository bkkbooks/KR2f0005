body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷五十一卹舊勞康熙元年壬寅正月庚寅上諭吏部原任大學士希福范文程甯完我額色黒皆自太宗文皇帝時厯任内院贊理機務効力最久勤勞素著其子宜加擢用以示鼓勵范文程子范承謨額色黑子塞思赫已補内院學士希福甯完我各一子亦著以學士用康熙二年癸卯五月甲戌上諭禮部滿漢官員卹典已有定例其一品官員與諡者宜加優異以示酬庸以後一品官員曾經與諡者除造墳外仍著予立碑八月庚子上諭兵部綠旗官員任滿三年病故有加贈等第滿洲官員病故者無加贈等第今滿漢俱應一體爾部議奏康熙八年己酉五月己亥内祕書院學士禪布奏伊祖達海巴克式䝉賜諡文成請立石碑以光永久上曰達海巴克式通滿漢文字於滿書加添圈㸃俾得分明又照漢字増造字様於今賴之念其効力年久著有勞績著追立石碑六月壬申上諭吏部兵部蘇克薩哈奉皇考遺詔輔政雖係有罪罪止本身不至誅滅子孫後嗣此皆鰲拜等與蘇克薩哈不和挾讐滅其子孫後嗣深為可憫其白爾黒圖等竝無罪犯因係族人連坐誅戮殊屬寃枉其蘇克薩哈原官及白爾黒圖等官職俱應給還爾二部將此案所革官員俱行查明議奏七月壬寅上諭吏部朕閲處分原任戸部尚書蘇納海等原案竝無大罪鰲拜等但以為撥地遲延遽行拏問多端文致誣陷不按律文任意將無辜處死原任總督朱昌祚廵撫王登聨於撥換地畝時見民間旗下困苦因有地方之責具疏奏聞輒以為非其職掌越行干預亦不按律文寃枉處死伊等皆國家大臣竝無大罪寃死殊為可憫理應昭雪以示仁恩作何恩卹予諡及廕子入監讀書爾部詳議以聞康熙九年庚戌二月丁丒先是内國史院大學士衛周祚引疾乞歸上念其勤勞有年給祿如故俟病痊起用至是衛周祚以在籍支俸三年受恩過當具疏辭俸上曰卿在任著有勞績回籍調理特給祿以資頤養可仍遵前命祗受勿辭乙酉上諭吏部兵部向來包衣佐領下官員子弟不准為廕監生其筆帖式亦無品級今思内外官員効力相同加恩豈宜有異嗣後包衣佐領下官員子弟應否為廕監生及筆帖式應否授品級爾部定議以聞康熙十一年壬子六月辛丒先是兵部尚書王𢎞祚引年乞休上念其舊勞命乘傳歸籍仍令滇省藩司給俸至是王𢎞祚疏辭上曰卿在官著有功績引年乞休特給俸祿以資頤養其仍遵㫖祗受不必控辭康熙十二年癸丒二月辛酉上諭致仕耆舊大臣等曰國有耆舊大臣規模甚覺可觀其大臣等有疾若必俟奏明請醫恐致遲滯嗣後有疾者於藥房諸醫中惟其所擇延往調治不必奏聞朕亦即傳諭諸醫知之康熙十三年甲寅六月甲午朔上諭兵部耿精忠之祖耿仲明於太宗文皇帝時航海歸誠優錫王爵効力行間勞績茂著及其身故睿親王不令承襲世祖章皇帝追念舊勲特允其子耿繼茂仍襲王爵令兩鎮巖疆為國藩屏爰及朕躬惓懷勲裔恩寵有加後覽其病終遺疏有地方兵民凋敝賊寇未滅死不瞑目等語忠義肫篤深切軫念且因耿繼茂之子耿精忠自幼曾為近侍予襲王爵仍鎮閩省朕以耿精忠必能紹祖父遺訓殫竭忠猷無忝先烈乃不意近為逆賊吳三桂誘惑煽亂地方棄累世之忠貞搆一旦之狂悖既干國法復墜家聲朕猶念其祖父前功耿精忠係一時無知墮人狡計與吳三桂不同故將吳三桂子孫正法耿精忠在京諸弟照舊寛容所屬官兵竝未加罪今遣寧南靖寇大將軍多羅順承郡王勒爾錦由湖南進兵鎮南將軍尼雅翰由廣西進兵安西將軍赫業及西安將軍瓦爾喀等已克七盤朝天等闗直抵保寧尅期恢復全蜀三路攻取雲南吳逆指日授首定南將軍希爾根由江西進兵平南將軍賴塔由浙江進兵平寇將軍根特巴圖魯由廣東進兵三路攻取福建又遣揚威將軍阿密達鎮西將軍席卜臣安南將軍華善鎮東將軍喇哈達等各領大兵駐扎江南京口等處調度征𠞰耿精忠殲滅亦在旦夕但念耿精忠祖父宣力累朝今及其身遽至覆亡宗祀斬絶朕心深為不忍且吳三桂乃本身投誠之人背恩反叛自取誅戮耿精忠自祖父以來受恩三世四十餘年非素蓄逆謀首倡叛亂者比爾部即傳諭耿精忠果能追念累朝恩徳及伊父忠藎遺言革心悔禍投誠來歸將侵犯内地海賊速𠞰圖功即赦前罪視之如初朕以至誠待天下誥諭昭如星日俾其善自審度勿負朕保全勲舊之意爾部即遵諭速行七月辛卯上諭兵部耿精忠身雖背叛念其祖父投誠効力累世舊勲朕豈肯以耿精忠之罪及其先人大兵平定閩省之日其祖父骸骨仍許收𦵏十一月庚辰上諭兵部平南王尚可喜孫女嫁為耿精忠子婦年未二旬忽遭事變王係勲舊大臣為國勤勞忠藎茂著其孫女理宜保全我兵𠞰平閩省之日大將軍王等務留心察救給王團聚又諭曰平南王尚可喜疏奏續順公沈瑞眷屬尚多淪陷閩中念沈瑞亦係勲舊眷屬宜與保全其令大將軍王等一體留心察訪勿致失所康熙十五年丙辰二月癸丒朔上諭平南王尚可喜曰王累世勲舊竒猷重望久鎮巖疆勞績懋著自逆賊變亂以來王篤守忠誠殫抒籌畧訓練士卒保障地方𠞰禦賊寇朕所倚毗今覽王奏稱年老漸衰身嬰疴疾請遣大臣經理廣東事務具見王實心為國計慮周詳朕與王情同父子誼若手足覽疏未竟朕心惻然但王屬官兵駐鎮日久地方寧謐措置咸宜軍民依賴若别遣大臣前往恐該省之事一時未能周知所關匪細王可於諸子中擇才畧素優者遣赴潮州整理軍務大將軍平南王尚之孝回省城侍王左右扞衛封守王其加意調䕶期於平復以慰朕憂慮眷念至意七月壬辰上諭兵部吳逆背叛以來潛布偽書煽惑人心原任提督陳福妻子雖在四川毫無瞻顧篤志忠貞𠞰禦賊寇恢復城池功績茂著及率兵進𠞰固原中途為叅將熊虎等所害前因變出倉猝不能救之兵弁俱釋不問今既察明熊虎等四人實係首惡斷難寛恕即行正法以懲姦宄其餘兵弁各守汛地毋得牽連嗣後再有首告者即以其罪罪之其徧諭寧夏提標官兵知悉八月丙子上諭吏部兵部撫逺大將軍都統大學士圖海器識老成才猷練達贊襄機務宣力累朝以文武之長才兼忠愛之至性勞績懋著倚毗良殷前察哈爾布爾尼背恩反叛命圖海為副將軍率兵征𠞰運籌决勝克振軍威未及一月捷功立奏逆賊纖滅疆圉敉寧近以平涼阻兵日久屢命𠞰撫罔有成效特簡圖海為大將軍統率大軍節制各路果爾謀畧淵深調度得宜軍鋒所至一戰克捷更能體朕好生之心宣布恩威開誠招撫遂使平涼慶陽固原等處文武官員兵民傾心向化悔罪歸誠生靈免於塗炭邉境賴以保安數日之間闗隴悉定皆因籌畫周詳布置神速勦撫竝用克建膚功圖海以心膂大臣膺秉鉞重寄實心為國克副倚任朕心深為嘉悦於軍功議敘外應從優加恩封三等公以示朕眷注忠勤酬答勲庸至意又諭兵部自逆賊煽亂以來姦徒附和侵擾地方闗隴以西疆域遼闊大兵一時未集人心不無動摇靖逆將軍侯張勇提督王進寳總兵官孫思克一聞蘭州之變即率兵星馳渡河𠞰禦收復城邑條奏機宜舉發偽劄緝獲姦諜綏定邊陲厥功甚大及大兵攻取平涼專任靖逆將軍侯張勇等鎮守秦鞏復殫心籌畫調度合宜𠞰禦川賊屢奏捷音紓朕西顧之憂功尤茂著伊等皆宿將重臣矢志報國同心協力展布謀猷兼以訓練士卒忠義素孚故能身先行陣所向克捷其所屬將卒亦皆効力共建功績朕甚嘉之於軍功議敘之外應從優加恩以示朕奬勵忠貞酬答勲勞至意張勇著為一等侯襲十次王進寳加一等阿思哈尼哈番襲八次授為奮勇將軍仍兼管平涼等處提督事務孫思克著授為一等阿達哈哈番提督涼州軍務康熙十七年戊午四月丙申上諭兵部提督九門歩軍統領費揚古自任事以來夙夜勤勞殫心料理緝獲盗賊搜捕姦宄使里巷寧謐輦轂肅清向來効力有年今尤克稱厥職應行議敘以示鼓勵著議奏十二月甲戌上諭大學士等曰滿大臣有䘮特遣大臣往賜茶酒滿漢大臣俱係一體嗣後漢大臣有䘮亦應遣大臣攜茶酒往賜康熙十八年己未十一月乙未上諭議政王大臣等曰鄂爾多斯多羅郡王古魯當榆林總兵官遣使請兵不及候㫖即調兵應援及聞神木變叛又即遣其子統兵先行嗣復力疾親往為國効力撫降神木縣古魯可封和碩親王康熙二十年辛酉四月丁酉上駐蹕和爾和地方諭喀喇沁杜楞郡王扎錫等曰喀喇沁故塔布囊和濟吉爾出征時最著勤勞今朕至此地遣散秩大臣鄂齊兒等攜茶酒往奠康熙二十一年壬戌二月壬辰上諭學士張英曰爾素性醇樸侍從有年朝夕講筵恪共盡職兹以爾父未葬具疏請假朕念人子至情忠孝皆出一理准假南旋賜白金五百兩表裏二十疋既旌爾勤勞兼資墓田之用爾其欽悉朕惓惓至意八月乙未原任拖沙喇哈番祁塔特叩閽稱自㓜從征得官與子都爾壽承襲緣事革職今年踰七十乞一養贍地部議不允上曰祁塔特効力戎伍得官與子承襲今其子革職襲次已完而祁塔特乃身得世職者竟無資生之計朕心憫之以後此等革去承襲之官其襲次已完者原得世職人員應給與半俸辛丑上諭講官牛鈕陳廷敬曰大學士馮溥効力有年請老歸里今特賜詩一章篆章一方墨刻一冊爾等往宣朕㫖朕聞山東之仕於朝者大小固結互相援引凡有渉於已私之事不顧國家往往造為議論彼倡此和務使濟其私心而後已又聞居於鄉者多擾害地方朕皆稔知其弊馮溥久在禁宻之地歸里後可教訓子孫務為安靜故大學士衛周祚居鄉謹厚在閭里中若未嘗任顯秩者必如此人方副朕優禮之意九月乙巳朔上諭大學士等曰王進寳趙良棟當逆賊竊據漢中四川時悉力固守在外領兵諸將咸以恢復為難因特遣學士禧佛馳往傳諭從來漢人地方猝有變亂即用漢兵戡定竝無藉力滿兵之事爾等皆封疆大臣久厯戎行應各率所隸部曲將士相機進取時趙良棟即首先倡議恢復隨允所議令刻期進𠞰於是二人協力克取漢中至蘭州失陷時王進寳遂率兵乗筏渡河恢復蘭州鞏昌等處𠞰禦賊寇所向奏功及同取漢中之後二人意見不合嫌隙漸生遂分路進兵趙良棟直取成都王進寳恢復保寧若成都不下則雖攻保寧未易即拔若保寧未克則雖下成都難以固守勢必至於復退是二人功績俱著封疆使能公爾忘私和衷共濟即統士卒乗勝長驅則滇黔賊寇可以計日殄滅何復遷延嵗月遲至一二年之久耶且二人既克成都保寧賊衆畏懼遂悉其精鋭入川抗拒雖彼中路空虛大兵得乗機進取沅州鎮逺貴陽等處而川中賊勢復張已恢復之疆土幾至再陷此皆由不能和衷之所致也二人賦性鹵莽不諳大體各懷私忿互相攻訐交圖陷害朕當二人訐奏之初即已洞悉情事念二人功績並茂惟欲保全絶無究察之意且一切投誠人員有免其前罪者有仍加錄用者况此建立功績之人耶今二人俱在京師如欲治罪何難逮問重處但朕意終以保全為念將二人互訐章奏俱行發還概不究問其遲於救援失䧟地方闗係軍機等事仍照例察議此非為二人調解盖深惟國家大體務欲保䕶勞臣用全終始故行申飭自今以往二人須洗心滌慮各改前愆消釋私嫌共矢忠藎以副朕優待功臣至意十二月癸未九卿議覆雲南貴州總督蔡毓榮題土司承襲事上曰所言承襲事似亦近理昔吳三桂未叛時征討水西曽滅土司安坤其妻率所屬奔於烏䝉生子安世宗今尚㓜穉朕觀平逺黔西威寧大定四府土司本屬苖蠻與民不同仍以土司專轄甚便且大兵進取雲南此土司曽來接應著有勤勞爾等可傳出征大將軍貝子章泰都統賴塔等詢明情形奏聞康熙二十三年甲子二月庚戌上諭福建提督靖海將軍侯施珢曰進𠞰臺灣官兵衝冒險阻逺渉波濤効力甚久今海逆方平即行裁去殊屬可憫應行文展界尚書杜臻學士席柱并料理錢糧侍郎蘇拜等公同㑹議將閩省陸路官兵内裁汰老弱者即以征𠞰臺灣官兵補額務令得所九月甲戌上諭大學士等曰纂修太祖高皇帝實錄朕已敬覽畢滿漢文義俱符不失本意其實錄内勲舊及諸臣後裔可察明另列一單進呈如無後者亦註明備覽康熙二十四年乙丑五月甲申上諭户部原任廣西廵撫郝浴前差兩淮廵鹽潔已奉公恤商裕課後經簡任廣西廵撫清廉愛民克稱厥職其所動錢糧非係入已從寛悉免追取以昭朕優恤廉吏至意爾部即遵諭行康熙二十七年戊辰七月乙酉上諭福建提督靖海將軍侯施琅曰爾前為内大臣朕特加擢用爾果能竭力盡心不負任使舉六十年難靖之寇殄滅無餘誠爾之功也邇來或有言爾恃功驕傲者今爾來京又有言當留爾勿遣者朕思寇亂之際尚用爾勿疑况天下已平反疑爾勿遣耶今命爾復任自此宜益加敬慎以保功名從來功高者不克保全終始皆由未能敬慎之故爾其勉之更須和輯兵民使地方安靜以副朕愛兵恤民并保全功臣至意康熙三十年卒未七月壬子上諭大學士等曰杜立徳在世祖時著有賢聲禀性厚重行事正大非若他人徒務虛名如遇事得其情理不但不茍隨同列即於朕亦不曲從曩議政王大臣將尚之信議以正法朕以尚之信向受封爵一旦正法誠屬不忍欲令伊自裁杜立徳奏曰尚之信乃背國叛逆若不加之顯戮以正國法非臣所能知也執奏甚力其他事類此者多誠可謂賢臣矣康熙三十二年癸酉十二月癸未上諭大學士等曰兵弁被創殘廢者雖已給身價之半而不食錢糧則貧者無以為生此等皆奮力行間至於殘廢良可憫惻兹後若此殘廢中尚可支持者充南苑門兵倉庫諸地老人缺給以錢糧前為䕶軍校驍騎校今猶可支持者諸館之正副首領缺出用之康熙三十三年甲戍九月甲申上諭兵部凡地方防守官兵擒賊之時受傷身故者著給與身價銀兩著為令康熙三十六年丁丑三月戊午上駐蹕高家堡南昭武將軍馬思喀疏報原任勇畧將軍趙良棟病故上召隨駕總兵官白斌等諭曰趙良棟偉男子也行間著有勞績但性躁心窄每與人不合有時奏事朕前亦言語粗率朕保全功臣始終容之後有疾朕嘗遣賜藥食彼所奏無不准行此特欲有疾者喜悦而速愈耳今聞奄逝朕殊為惻然聞趙良棟存日與總兵官王化行不相能朕至寧夏務為其妻子區處使之安生斷不使受害於其仇也丙子上自横城渡黄河駐蹕河崖諭大學士伊桑阿曰趙良棟乃為國立功之人今已身故明日過其門著遣皇長子允禔部院諸大臣弔之賜祭一次陳福亦為國効力之人現經此地亦賜祭一次丁丒上駐蹕寧夏諭大學士伊桑阿曰朕臨此地著查寧夏官兵去年在昭莫多翁金地方陣亡者兵丁賜之卹銀官員著遣官致奠康熙三十七年戊寅四月甲寅上諭大學士等曰右衛西安陣亡撥什庫及披甲人等其子著給與應得品級若令來京則貧者有移居之累著停其前來仍留原處供職六月丁卯兵部議奏原任歩軍校雅母泰等因有功牌應給半俸上曰該部但以殘廢之人議給半俸其陣傷告退何以竝未議及若輩於行間被創不能供職深為可憫宜加特恩十月戊午上駐蹕盛京諭内大臣等曰開國佐運勲臣楊古利費英東額亦都三人効力甚可嘉尚此三人墓朕祭昭陵之日親臨奠酒其餘諸臣効力亦屬可嘉康熙二十一年曽經祭奠者照前舉行頴親王薩哈廉克勤郡王岳托等墓各遣大臣致祭尋楊古利費英東額亦都之子孫公福善等奏曰皇上欲親臨臣等之祖墓奠酒臣不勝惶懼伏祈皇上停止上諭之曰太祖太宗開國定鼎爾祖輔佐勲勞爾等未必詳悉朕比年來觀閲實錄知爾等之祖於開創時功績懋著深屬可嘉朕既親來竭陵必當臨爾祖墓奠酒爾等母庸再奏康熙三十八年己卯九月戊午上諭大學士等曰大學士阿蘭泰効力年久品行清純辦事敬謹朕聞其病篤先遣皇長子允禔往視朕尚欲親臨及皇長子允禔回奏業已昏迷隨聞其溘逝朕深用震悼即遣皇長子允禔等臨其䘮賜鞍馬四匹白金千金大臣病故雖無輟朝之例朕心不忍特停辦事一日康熙三十九年庚辰八月己卯上諭兵部將軍孫思克謀勇素裕居官甚優効力行間克奏膚功久鎮巖疆勤勞茂著允稱良將其從前所革世職著給還以示優眷康熙四十年辛巳十月壬申上諭大學士等曰前曽諭襲職之人如有殘疾將其職另襲他人但殘疾不准承襲無以養贍其先立功之人亦屬可憫嗣後應襲之人雖有殘疾仍令襲職但不與食俸止給每月錢糧俟其子孫應襲之年再令承襲若無子孫俟其本身故後始准另襲則公差無悞其先立功之人亦得沾恩該部詳議康熙四十一年壬午二月己巳上駐蹕真定府諭大學士等曰此城十餘里外有原任大學士梁清標墓凡朕廵幸所及遇已故大臣墓俱遣大臣致奠爾等其徃奠之四月甲戌上諭予告大學士王熙曰卿耆年舊徳厯官最久自去嵗告病在家朕無日不注念老臣也近日九卿皆求匾額字對想卿身雖在告心未嘗一時不在朝中故特書匾對各一并臨米芾書一幅賜卿卿其勉强餐食輔以醫藥慰朕不忘舊臣之至意十二月壬午上諭大學士等曰原任吏部侍郎額星額因詿誤革職非有大過今年已衰老朕比來廵厯所至凡以詿誤罷職年老官員在籍者皆給與原官職銜以示朕優遇老臣之意額星額著以原銜給之康熙四十二年癸未四月戊戌兵部議覆土司田舜年疏請以伊職令其嫡子田昞如承襲其次子田旻如願入京備使令所給敕命免繳部俱無庸議上諭曰逆賊吳三桂作亂之時田舜年一心効力頗有勞績著依所請令伊長子田昞如襲職原領敕命亦著免繳部其次子田旻如著來京効力是日上諭大學士等曰頃朕徃察河工原任侍郎任克溥於山東途次迎駕見其年將九十現在諸臣未有如其久者朕深為眷念著加刑部尚書銜以示優遇老臣至意可諭吏部知之五月戊申上諭兵部直𨽻各省所有世職官員皆因彼祖父有功故給以世職著召來引見如有馬歩射俱優人才堪用者及其年少補用十一月戊申上諭山西廵撫噶禮曰朕年少時衛周祚曾任大學士朕今經過其地已令大臣徃奠其墓爾可傳諭地方官將伊孫照看俾讀書成立丁巳上駐蹕西安府閲駐防官兵射皆精練上甚嘉悦因命記其善射之尤者諭大學士等曰朕為西土兵民生計不辭地方遥逺冒渉嚴寒躬行廵狩見西安右翼舊兵効力行間著有勞績防戍頻仍不計其數人多帶傷其父與伯叔兄弟親戚亦有陣亡者朕心深切軫念且皆循循奉法騎射熟嫺軍容整肅朕甚嘉之較之各省之兵尤為超出應大沛恩澤以示朕不忘勞勩人員之意隨賞賚銀兩有差己未上閲西安府兵召原任將軍佛尼勒之子額倫特賜酒諭之曰爾父効力行間爾亦由兵丁効力以至協領因此親賜飲表異於衆又以鑲藍旗協領辛泰由歩軍効力以至恊領竝副將康泰韓忠俱人材矯健皆召至階上令侍衛等飲之康熙四十三年甲申十一月辛亥四川陜西總督博霽疏㕘凉州總兵官魏勲年老上諭大學士等曰魏勲於軍前甚有勞績兵民亦皆愛戴此等人材今西陲亦復有幾如果年邁令具呈請休可也何必題㕘原本發回又諭曰魏勲及師帝賓麥良璽俱係舊臣詎可輕言叅劾前者佛倫任總督時亦欲叅師帝賓曽面奏朕前朕不之許如此等人若皆劾而罷之恐其餘寒心設有任用之處若等俱非易得者也提督潘育龍亦好武臣中一介不取操行俱全者實難得之但不犯法不貪冒即已矣且本朝邊疆武臣在地方不生一事與文臣同心効力兵民協和誠為自古所少今經厯軍陣之大臣已漸零落至於海戰又不得比於江湖前從福建海島來降者皆知海戰之法今亦少矣此可不留意乎康熙四十四年乙酉二月辛巳上諭大學士等曰原任刑部右侍郎勵杜訥向在南書房効力二十餘年為人敬慎積有勤勞竝無過譴其品級雖不及予諡之例曩者原任侍郎沈荃曽經予諡今勵杜訥亦著賜諡爾等㑹同禮部議奏三月壬戌上諭大學士等曰原任禮部侍郎高士竒在南書房効力年久頗著勤勞其品級不至予諡朕軫念舊臣原任刑部侍郎勵杜訥已照侍郎沈荃例予諡今高士竒亦應予諡以示特恩爾等㑹同禮部議奏四月己丒上諭江南江西總督阿山等曰朕昨徃雨花臺曽見原任總督傅拉塔祠堂傅拉塔居官甚好其叅劾之人雖多總無怨者大有氣節實心効力朕因是特書匾額賜之爾等刋畢可親懸其祠堂此匾額之字宜善加封裹給與其子康熙四十五年丙戌六月丁亥朔上諭修國史諸臣曰開國功臣作傳當因其事蹟先後以定次第若視功績分次第或有本人功績少而子孫功績多者反置子孫於前列可乎今應分别太祖太宗世祖三朝功臣以何人居首請㫖再定至逮事三朝功臣各於本人傳内通行開載事蹟其子孫有立功者附載於下俟作傳畢可錄出分給其子孫各一通令藏於家七月丁巳兵部議覆原任雲南貴州總督巴什請將進征紅苖陣亡被傷官兵加恩一疏應俟該督分别議奏到日再議上諭大學士等曰進征紅苖陣亡被傷官兵席爾達所奏極明何俟督撫具題遲延日月彼時之督撫俱已更換若俟伊等分别議奏其事必致遲久官兵不得沾實恵矣康熙四十六年丁亥五月戊寅上諭吏部朕廑念河防屢行親閲凡自昔河道之源流及厯來治河之得失按圖考蹟靡不周知粵從明末寇氛决黄灌汴而洪流横溢歲久不治迄於本朝在河諸臣皆未能殫心修築以致康熙十四五年間黄淮交敝海口漸淤朕乃特命靳輔為河道總督靳輔自受事以後斟酌時宜相度形勢興建隄壩廣疏引河排衆議而不撓竭精勤以自効於是淮黄故道次第修復而漕運大通其一切經理之法具在雖嗣後河臣互有損益而規模措置不能易也至於創開中河以避黄河一百八十里波濤之險因而漕輓安流商民利濟其有功於運道民生至逺且大朕每莅河干徧加諮訪沿淮一路軍民感靳輔治績者衆口如一久而不衰夫人臣有大建樹於國家者奬勲酬庸宜從優渥雖賜卹易名已循彞典尚應特予褒敘賁以殊恩靳輔著加太子太保仍給世職拜他喇布勒哈番用彰朝廷追美勞臣之典為矢忠宣力者勸是日上諭兵部國家綏輯兵民乂安海嶠必資威望素重之臣以畀干城之寄有能久鎮巖疆實彰勞績者則錫命酬庸宜加顯秩福建水師提督吳英當王師初定八閩即親履行陣厯四十餘年比任提督以來益殫壯謀克修軍紀目前諸將中明習水性訓練舟師者罕與嫓倫是用特賁殊恩俾膺異數著授為威畧將軍仍管水師提督事務以示朕優眷勞臣至意康熙四十八年己丑八月乙巳上諭兵部國家慎簡武臣專膺閫寄惟是敉寧疆圉和輯軍民斯於地方大有裨益而酬庸奬勲之典宜加優渥陜西提督潘育龍久履戎行蔚有勞績厯試重鎮克殫謀猷自擢任西秦以來御兵飭伍有勇知方邊境肅清閭閻安堵既威望之茂著亦年齒之日増兹特晉加顯秩用彰異數著授為鎮綏將軍仍管陜西提督事務以示朕隆眷老臣至意十一月己夘上諭吏部漕運總督職任至為重要桑額自簡任治漕以來老成持重謹厚寛平殫力轉輸悉心經畫每嵗身親儹運俾漕艘依期抵通十餘年間從無稽遲貽誤之事且馭衆有法恤下有恩所屬運官旗丁無不感頌愛戴不愧為地方大吏今年齒已長而精力未衰久任勤勞良可嘉尚著特授兵部尚書兼都察院右都御史仍加太子太保以示朝廷崇奬老臣酬庸褒勲至意康熙四十九年庚寅三月乙亥吏部以提督四譯館太常寺少卿員缺請補上諭大學士等曰今觀漢大臣俱已年邁繼此可用者難得其人至於直𨽻現為大臣者無一人矣昔如魏裔介李霨杜立徳王熙梁清標等俱優任大學士始終恪慎懋著勤勞今李霨嫡孫工部主事李敏啟著越格陞補提督四譯館太常寺少卿以示朕崇奬舊臣優錄後嗣至意十二月辛巳上諭吏部朕每因朝列舊臣漸次衰謝時切軫懷特命内閣查順治年閒進士罷職在籍者已無多人其王士正江臯周敏政葉矯然徐淑嘉宋慶逺皆以公事詿誤屏廢里居今年臻耄耋深可憫念著復還原職以示朕格外加恩至意康熙五十年辛夘五月丁未上諭大學士等曰朕自㓜讀書見大臣多不能保其初終故立志待大臣如手足不論滿漢䝉古非大姦大惡法不可容者皆務保全之五十年來如大學士蔣赫徳衛周祚李霨杜立徳馮溥黄機吳正治王熙李之芳宋徳宜梁清標李天馥張英熊賜履吳琠陳廷敬皆以年老告辭林下怡養保全名節朕亦未嘗少忘常使人存問始終如此凡在朝諸大臣朕待之甚厚伊等亦矢忠盡力厯數十年之久與朕同鬚髮皤然矣康熙五十二年癸巳三月壬寅上諭大學士等曰年老諸大臣内曽於世祖章皇帝時居官者惟宋犖田種玉而已今以年齒老邁閒居林下宋犖現有尚書品級在身田種玉著給與工部尚書銜俱准給誥封宋犖田種玉著酌加宫保以示朕不忘耆舊之至意康熙五十八年己亥正月辛丑上諭議政大臣等曰有本人立功授職後因年老或染病解任襲與兄弟子姪承襲之人若經病故即不准承襲立功之人現在而遽謂承襲世次已完不准襲職殊屬可矜嗣後立功授職之人本身若在理宜再准承襲一次爾等㑹議具奏康熙五十九年庚子四月戊午戸部尚書趙申喬以衰疾乞休上諭大學士等曰覽趙申喬奏疏朕深憐之念其操守清廉始終一轍性雖暴躁而為人樸直年近八旬病勢料難全愈倘一時不保亦未可定趙申喬乃革職留任之官可復還原職仍令在任調理其應賠之銀亦著從寛免追爾等將此㫖速行發去使病人早知一日五内安寧便於調攝頤養也大清聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝聖訓卷五十一
