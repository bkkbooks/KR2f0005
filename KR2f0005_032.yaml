body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷三十二省方康熙八年己酉十月甲子上諭户部朕巡厯所至凡御用器物皆係所司由京城供辦毫不取於地方除內廄之馬不用飼秣即部撥馬匹所需芻豆亦屬無多向聞地方官指稱御用私派民間預為儲備既不銷算又不還民貪汚官吏侵肥入已苦纍小民重違法紀嗣後務加嚴禁倘有仍前借端科派者所司官嚴察參奏重懲如匿不上聞事發一并治罪康熙二十三年甲子九月乙亥上東巡諭户部工部光祿寺朕凡巡幸一切需用之物皆從節儉今巡幸之處需用草豆木炭食物概勿令地方官派取民間擾害百姓爾等衙門各委員前往按每程所用照時價採買供給倘有擾民者著該督撫指名題參癸未上諭户部朕軫念蒼生勤求治理邇年以來於畿輔郡縣時行厯覽補助兼施今俯允廷議諏吉東巡正欲體察民情周知吏治一應沿途供用皆令在京所司儲備毫不取之民間猶恐地方官役不能悉體朕懷借端支應妄行濫取今特加申飭如有悖旨私徵一經發覺定行從重治罪更念此番巡厯原以撫恤編氓問俗觀風於閭閻休戚務期洞曉凡經過地方百姓須各安生業照常寧處毋得遷移逺避反滋擾纍爾部即行令該地方官於府州縣城市村莊窮鄉僻壤大張告示遍行曉諭務令通知以副朕惠愛元元至意丁亥上以東巡特頒恩赦詔諭天下曰帝王誕膺景命統御萬邦道重觀民政先求莫是以虞廷肆覲肇舉省方周室懷柔式歌時邁詩書具在典制丕昭朕仰荷天庥纘承祖烈撫兹兆庶期底時雍夙夜孜孜懋求治理以富以教靡敢怠遑猶慮蔀屋艱難罔由上逹故於直隸郡縣周覽巡行勤施補助更念山左等處土宜俗尚不加循省曷克周知矧厯逢甲子世際升平聿圖泰運之恆新在措藝生於豫大乘時命駕咨彼民依但樂利祗慰夫一方而德澤未敷於九有朕心歉焉用是特昭公普以𢎞仁庶奏諴和之盛治時臻熙皥彌隆寬恤之恩户樂清寧丕篤綿長之慶布告天下咸使聞知康熙二十四年乙丑二月庚戌上諭大學士等曰朕夙興夜寐勤求治理無非欲使小民遂其生計故每次巡幸必帶科道官或有不肖之人強行買賣擾害百姓者令其稽察此番因在近畿未經帶來著爾衙門學士不時嚴行稽察參奏三月丙寅上諭大學士等曰朕巡省南服見經過地方城垣圯壞者所在多有夫城垣者生民之保障所以衛吾人者也亟宜修築之其令地方官作何葺治著工部詳議以聞康熙二十八年己巳正月庚午上諭吏部等衙門朕統涖寰宇二十八年於兹早作夜思勤求治理務恤黎庶永圖乂安如黃運兩河運道民生攸係朕日切心勞比年工役雖漸就緒而應修應塞議論紛紜曩歲巡幸曽允淮揚士民所請疏濬下河前已興工尚稽底績屢經廷議請朕親行閲視今特諏吉南巡躬厯河道兼欲觀覽民情周知吏治所至沿途供億皆令在京所司儲偫一切不取之民間即有日用應需該衙門於所在地方照市估平買不許錙銖抑勒小民猶恐地方官吏不能悉體朕懷借名科派供應今特頒諭嚴敕如有悖旨借端私徵者察實即以軍法從事地方文武大小官員不許與扈從官員指稱交戚輒通饋遺違者餽送收受人員並以軍法從事其扈從大小官員及隨往僕役如有橫行生事擾民者一并從重治罪朕兹巡省原以軫恤編氓咨諏風俗凡經過地方百姓各安生業務令㕓無廢市隴不輟耕毋得倉皇驚避輒滋煩擾其軍民人等懷姦挾詐希逞私憤擅於駐蹕處所瀆行告訐者一概嚴禁倘有妄控除所告事不與準理外仍嚴加治罪爾部即傳諭扈從大小官員人等並各該督撫於府州城市村莊窮鄉僻壤遍懸告示備行曉諭務令通知以副朕惠愛元元至意壬午上諭山東巡撫錢珏曰朕軫恤民隱載舉時巡懋宣德化勤求疾苦比至山東所經城邑百姓扶老攜幼夾道歡迎朕問知連歲順成民生稍得安業第思百姓足則國家充裕若期比屋豐盈必以蠲租減賦除其雜派為先邇年以來各省地丁錢糧已經節次豁免山東地丁正賦意欲來嵗蠲免今因巡幸至此特先諭該撫速行曉示日傳三百里遐村僻壤咸使聞知以副朕省耕問俗之意癸巳御舟泊山陽縣京河諭江南江西總督傅拉塔江蘇巡撫洪之傑安徽巡撫江有良曰朕南巡以來軫念民依勤求治理頃至江南境上所經宿遷諸處民生風景較前次南巡稍加富庶朕念江南財賦甲於他省素切留心因尚有厯年帶徵錢糧恐為民纍出京時曽詢户部知全省積欠約有二百二十餘萬今親觀厯兹土訪知民隱無異所聞除江南正項錢糧已與直隸各省節次蠲免外再將江南全省積年民欠一應地丁錢糧屯糧蘆課米麥豆雜稅概與蠲除自此民免催徵官無參罰爾督撫務須切實奉行俾均沾實惠副朕愛恤民生至意如有以完作欠侵收肥已等弊一經發覺定行從重治罪夫民為邦本足民即以足國朕平日躬行節儉一絲一粟未嘗輕費所以如此簡約者無非愛養物力為優恤元元之地在民間惟正之供軍國所需豈易驟言蠲免邇年國用稍裕故能頻沛恩施總期藏富於民使家給人足則禮讓益敦庶漸臻雍穆之治著速行傳諭咸知朕意丙申上諭江南江西總督傅拉塔福建浙江總督王隲江蘇巡撫洪之傑浙江巡撫金鋐曰朕因省察黎庶疾苦兼閲河工巡幸江南便道至浙江觀風問俗簡約儀衛鹵簿不設扈從者僅三百餘人頃經淮揚民間結綵歡迎盈衢溢巷雖出自恭敬愛戴之誠恐至糜費物力甚為惜之朕視宇內編氓皆吾赤子惟使比户豐饒即不張結綵幔朕心亦所嘉悅前途經厯諸郡邑宜體朕意悉為停止又見百姓老幼男婦奔走雜遝瞻望恐後未免喧譁擁塞念此行原以為民不嚴警蹕但人衆多高岸水次或有傾跌之虞一夫不獲其所足軫朕懷此後止於夾道跪迎毋得紊亂追趨致有諸患著即詳加曉諭使知朕愛民切實之意咸為遵行二月己酉上諭扈從部院諸大臣曰朕稽古省方咨求治理閲視河道期底平成凡有利於民生必令羣沾實惠兹行次浙省禹陵在望念大禹功德隆盛萬世永賴應行親詣以展企慕之忱其致祭典禮所司即察例舉行政治所先在崇文教江南浙江為人文萃集之地入學額數應酌量加增永昭𢎞奬江寧鎮江杭州駐防滿洲漢軍兵丁鎮守要地久厯歲時深用軫念應加恩賚以彰優恤又諭曰朕南巡以來所經過地方官員除八法處分及列款糾劾外凡因公詿誤降級留任者俱準開復降級調用者帶所降之級留任其經過地方見在監禁人犯除十惡及詔款所不赦等罪并官員犯贓者不宥外其餘自康熙二十八年二月十一日以前死罪及軍流徒罪以下已結未結俱準寬釋以示朕赦罪宥過之意備辦船隻地方各官效力勤勞著該督撫會同奉差官員確查具題各加一級縴夫供役勞苦亦著該督撫查明人數量給恩賞朕廑念民依特蠲租賦總期潤澤蒼生近見民間有建立碑亭稱頌德意者雖出羣黎愛戴之誠但恐各郡皆然未免致損民力誠使閭閻殷阜則裨益良多碑亭何與焉嗣後亦宜停止江浙錢糧既經蠲豁猶慮有不肖有司借端詞訟朘削民生著該督撫嚴行禁飭至各處𣙜關原有則例朕舟行所至咨訪過關商民每不難於輸納額稅而以稽留關次不能速過為苦𣙜關官員理宜遵奉屢頒諭旨恤商惠民豈可反貽之纍自今應力除積弊凡商民抵關交納正稅即與放行毋得稽留苛勒以致苦纍違者定行從重處分朕早夜孳孳惟冀官吏軍民士農商賈無一人不獲其所故於民生吏治圖維區畫務極周詳爾等可即傳諭俾一體奉行稱朕意焉癸亥上駐蹕江寧府城諭刑部尚書圖納等曰朕巡行所過見兵民相安地方寧靖村居稠密然猶恐比屋不登小民有不得其所者且兵民雖享太平之福尚慮無知或抵觸法禁用是大沛恩澤蠲免錢糧赦宥罪犯以至官兵商民咸加恩恤至於舟楫不通之所令營馬預備以應一時之需并緑旗兵丁護從隨行此皆伊等分內專責但兵丁備馬勞苦馬亦稍疲宜示軫恤一體加恩爾等將緑旗兵丁備馬來者察明人數奏聞酌量給賞朕以緑旗兵止官馬一匹恐隨行備用日久疲乏已令各回泛地駐防滿洲兵所有馬匹業已足用揚州所備者亦著停止爾等即傳諭通知康熙三十六年丁丑二月戊戌上駐蹕大同諭大學士伊桑阿曰自古人君巡狩凡所過地方前代帝王陵寢先賢墳墓及名山大川無不致祭朕此行沿途所經古帝王陵寢先賢墳墓及名山大川著查明具奏應祭者遣官致祭三月戊寅上駐蹕寧夏諭四川陜西總督吳赫曰朕巡幸沿邊地方詢察閭井生聚及土田沃瘠之狀自晉及秦經行二千餘里直抵寧夏所以勤求民隱至殷且切朔方資大河之灌溉疏渠溉田宜於稼穡當兹春氣暢遂正三農盡力南畝之時誠恐有司官員不體朕懷因車駕經臨調遣師旅借辭供億擾纍小民東作有妨西成奚望今一切軍需芻糗俱儲偫足用至扈從簡約馬悉放牧並不以供辦草豆動煩民力爾可傳飭有司勿借端科派違者治罪務使地方百姓各安本業㕓無廢市隴不輟耕以副朕親厯邊圉軫恤民依之至意康熙三十八年己卯正月辛卯上諭吏部等衙門朕撫馭寰區乂安中外孜孜圖治宵旰勤民期於天下咸遂生成物無不得其所今邊烽永靖四方無事獨是黃淮為患衝決時聞下河地方田廬漂沒朕軫念民艱曩曽屢遣大臣督修不惜數百萬帑金務期早綏黎庶乃厯年已久迄無成功今水勢仍復橫溢浸漫城閭沉沒隴畝以致民多失業董其役者未有上䇿可以宜民時廑朕懷未嘗少釋在內諸臣咸請親臨指示為一勞永逸之圖方今春時雨水減少正宜講求疏濬以遂安瀾爰諏吉南巡親加勘閲更以吳地襟帶江湖乃東南重地勵俗省耕兼行臨視凡一切往返供億皆備辦於京師即途次日用所需亦令各衙門照本地時值採買總於民間一無所纍仍恐沿途官吏藉名科派致纍閭閻故特頒諭嚴行申飭如有悖旨假托派索者察實即以軍法從事該地方大小文武官員不許與扈從官員藉稱親舊擅相餽遺違者與受人員並以軍法從事其扈從大小官員隨行僕從人等如有橫行生事者一并從重治罪凡經過地方百姓各安生業皆如常時務令㕓無廢市隴不輟耕毋得惶遽引避其軍民人等懷挾私怨受人指使擅於駐蹕處所輒行告訐者一概嚴禁不準仍照衝突儀仗例嚴加治罪爾部即傳諭扈從大小官員人等并行各該督撫於各府州縣城市鄉村遍張告示務令億兆通知以副朕體恤惠愛至意二月丁未上駐蹕楊柳青地方諭領侍衛內大臣等曰朕念切民依往閲河工凡隨駕官兵執事人員量供使用減少攜帶酌其人數分給官船仍恐沿途或有紛擾爾等再詳議裁減以副朕愛民至意三月壬午上諭吏部朕以勤求民隱閲視河工特行巡省一切供御之費皆自內廷儲偫不煩有司而經過山東江南地方各官備辦夫船等項效力殊屬勤勞此等官員有因公詿誤罰俸住俸降俸降級革職留任者著察明悉從寬免戊子上駐蹕蘇州府諭吏部等衙門朕以黃淮衝決為患兼欲周知東南民生風俗特行巡省比親厯隄堰詳加相度以疏導修築之法指授河臣刻期興作隨南涉江表遍察民依頃至蘇州府駐蹕有浙江文武官吏及在籍官員迎謁於行在言浙民望幸之心至殷且切合詞諄懇不啻再三朕勉徇輿情揚旌前發以三月十九日啓行自出京師以來一切供御之需皆出儲備其沿途日用令該衙門照各地方時價採辦一無所纍於民如有官吏借名科派致擾閭閻者察實以軍法從事地方大小文武官員與扈從官員私相餽遺及扈從大小官員隨從人等有橫行生事者並以軍法從事凡經過地方百姓各安生業皆如常時務令㕓無廢市隴不輟耕毋得惶遽引避方今正屆農時所過田畝勿令踐踏其軍民人等懷挾私怨受人指使擅於駐蹕處所輒行告訐者一概嚴禁不準仍照衝突儀仗例嚴加治罪爾部即傳諭扈從大小官員人等并行該督撫於各府州縣城市鄉村遍張告示悉行曉諭務令億兆通知以副朕體恤惠愛至意四月辛丑上諭户部禮部朕子育黎元勤求治理日孜孜以施德澤厚民生為急務而江浙二省尤東南要地朕時切軫念比歲以來蠲豁田賦賑濟凶荒有請必行無災不恤雖漕項錢糧向未蠲免者亦曽特旨蠲免愛養之道備極周詳庶幾民生日益康阜用是乘輿時邁於視河事竣巡厯江浙咨訪民間情形見淮揚一路既困潦災而他所過州縣察其耕穫之盈虛市㕓之贏絀視十年以前實為不及此皆由地方有司奉行不善不能使實惠及民所以小民雖懷愛戴之誠而朝廷恩澤卒未下究朕目擊厪懷亟思拯恤截留漕糧寬免積欠另有諭旨惟各鹽差關差向因軍需繁費於正額外令在差官員以所私得贏餘交納充用今思各官孰肯自捐私槖必仍行苛取商瘠民困職此之由著將加增銀兩一概停罷以紓商民之纍其兩淮鹽課康熙十六年曽加增四十萬兩今恐商人辦課維艱有漸至匱乏者著減去二十萬兩此外有應行應革事宜朕還都以後仍加商確次第舉行該督撫藩臬皆地方大吏亦著悉心體訪凡有可為民興利除害者作速勘實陳奏嚴革雜派禁止刁訟俾胥吏不能作姦良民得以安業倘官吏有悖旨妄行者許商民首告該督撫察出即行參奏朕視民如傷惟恐一夫不獲其所兹值海宇升平兵革不事正當與民休息之時故特渙沛德音減徵寬稅以為閭閻留有餘之力至於江南浙江人文稱盛入學名數前已酌定增額今著於府學大學中學小學各增五名舉行一次以示奬勵人才至意爾部即遵諭行五月丙戌上諭大學士等曰朕兹南巡見地方官員誠心為民者甚寡一切務虛名而無實效甚無取焉朕觀河工亦非難事任事者果皆竭誠效力加意奉公何難告厥成功耶若刷河底極深徑趨入海諸水仍出清口歸海則高郵等處不告水災而下河亦可無虞矣又見沿途鈔關已極頺敝皆由關差監督未經簡選但較俸差往其中貧窮卑猥者或將親戚家僕或傭雇人役挈之而往任此輩恣意妄行自有害於商賈且盤詰關津亦有害於百姓嗣後關差俱令本衙門堂官保舉始行差遣康熙四十一年壬午九月甲子上諭吏部等衙門朕念黃淮兩河為運道民生所係屢次南巡親臨閲視以疏濬修築之法指授河臣閉六壩以束淮敵黃通海口以引黃歸海比歲以來工程次第告竣修防漸有成效昨年冬月河臣張鵬翮曽以河工善後之䇿及應修之處請朕親閲指示兹當農事之隙減約從員輕裝南下自徐州一路循視隄堰沿途皆設營幄不御屋廬日用所需悉已儲偫經過地方一切供帳宜通行禁止倘有官吏藉名科派纍及小民或指稱預辦擅動庫帑察出定嚴加治罪地方大小文武官員與扈從官員託言親舊私相餽遺及隨從人等有妄行生事者俱以軍法從事閭閻百姓各事本業不須引避有懷挾私怨於駐蹕處所告訐者一概不準仍照律治罪該部即傳諭扈從人員并行各該督撫於所屬府州縣遍張告示務令通知以副朕體恤民生至意康熙四十二年癸未二月丁酉上駐蹕蘇州府諭大學士等曰觀近日南方風景較之昔日似覺稍寒江北之竹盡皆黃色即此可知蘇杭潮濕較前亦大減康熙三十八年南巡時潮濕即少差今更減矣民間生殖亦較前豐裕大約任地方督撫者安靜而不生事即於民生有益倘徒事才幹不體下情以此爭先出衆民必受其殃矣所以朕於扈從人等恐其生事時厪於懷諸事惟務謹慎不時嚴禁倘朕欲將州縣官員日加驅使未為不可所以不忍為者亦因體恤微員耳今總督巡撫能如此體恤者甚少也十月丁丑上諭吏部等衙門朕統御寰區勤求治理鑾輿時邁省方觀民春月閲視河工自畿輔山東以及江浙地方皆經巡幸兹兩河漸已底績所至之地民生風俗亦因以周知念陜西省為巖疆重地當出師塞外時曽經厯其邊境而西安一路未及親蒞頃陜西督撫諸臣言秦民望幸之心至殷至切合詞陳奏河南山西巡撫等亦諄切具請乘此冬令農隙之際觀覽民風詢察吏治簡閲禁旅整飭軍營實為要務用是輕裝簡從諏吉西巡沿途一切供御皆由內廷儲備纖毫不取辦於地方即偶有市易之物亦敕所司依時價給值不許錙銖抑勒所過大小官吏宜體朕愛民德意勿借詞供億私派閭閻如有悖旨科斂者察出即以軍法從事地方官不許與扈從人員指稱交戚私相餽遺違者並以軍法從事其扈從人員宜約束僕役勿使妄行如不遵法紀生事擾民一并從重治罪朕視民如子凡乘輿所至市㕓隴畝宜各安生理米豆薪芻等物民間照常貿易不必禁止惟懷私挾詐衝突告訐者所告事不準理仍嚴加治罪爾等即傳諭扈從官員人等并行各督撫令於經過府州縣城市村莊遍示曉諭俾咸悉朕懷戊戌上駐蹕太原府城內諭山西巡撫噶禮曰朕君臨天下四十餘載無一刻不以蒼生為念近因西省望幸甚切故於冬時農隙減從輕騎由晉以及秦入境以來觀風問俗見民生略有起色閭閻之間俗朴尚儉朕心少慰朕自弱齡讀書往往以不知窮簷僻壤之疾苦為歎息所以留心於官方凡有往來者必先咨詢民情豐歉偶有失時定加蠲賑且思晉省不通水運歲或不登即難籌畫雖有州縣存貯之米穀未必實數具在今歲山西收成頗佳爾等仰體朕愛民如子之至意曉諭民間若豐歲用奢則荒年必致匱乏教之以禮義導之以守法重農務本藏富於民則朕無西顧之憂矣凡朕所經之處必大沛恩澤因今歲東省災甚已蠲四十三年地丁錢糧又免雲貴廣西四川地丁錢糧所以不能施惠但將四十二年以前山西所屬州縣未完銀兩米草盡行蠲免以示朕加惠黎元之意十二月丁丑上駐蹕衛輝府城內諭河南巡撫徐潮曰朕念西土兵民生計乘冬令農隙之時特事西巡返轡京師道由豫省自入潼關見閿鄉以及河南府民生甚艱而懷慶少裕至衛輝府則又艱苦賴薄有秋成尚能糊口倘遇歉歲必至流亡此皆大小官吏互相容隱雖有衰老病廢懶惰退諉之員仍使在任以致貽誤地方河南百姓質朴愚魯輸賦從未稽遲而今歲所欠甚多顯係州縣官聞朕蠲除秦晉積欠錢糧希冀恩免於中漁利見今民欠俱免催徵著將河南通省俸工銀兩補足所欠之數如有不完停其升轉俟完日開復庚寅上西巡回京諭大學士等曰前南巡多由舟行官民羣集兩岸迎駕頃西巡皆由陸路凡臨幸郡邑官民無不扶老攜幼歡騰道左每清問及之又令在乘輿左右備咨地方利弊彼皆輸誠披瀝暢所欲言是以風俗民情靡不洞悉朕巡幸七省畿輔秦晉民俗豐裕江浙則較三十八年時更勝山東近因水旱大異疇昔河南百姓生計甚艱此二省之民深厪朕懷又聞各省火耗俱是加一錢糧最少者惟有甘肅通計正額共二十八萬有竒加耗亦止二萬八千州縣官錢糧既少加耗無幾不敷用者宜或有之其餘賦額皆多如一州縣正額有二三萬加耗即至二三千宜敷用矣而州縣官仍有以艱難告者其故安在朕隨地咨訪督撫雖有不受餽遺者然餽藩臬者若干餽道府者若干豈可盡云亷吏乎康熙四十三年甲申十一月戊午上諭大學士等曰凡車駕巡幸之處一切需用從不取辦於民而各省不肖官員指稱修理行宫供備器物並建造御書碑亭等項名色輒行動用正項錢糧借詞捐還究無償補及至虧空數多復加倍私派科斂肥已以致重貽小民之纍種種弊端不可勝指嗣後凡建造碑亭等事宜嚴行禁止康熙四十四年乙酉正月戊午上諭吏部等衙門朕厪念民生加意河道屢行親閲一切疏濬修築事宜悉經周詳指畫獲告成功前黃河之水往往倒灌清口者皆由仲莊閘與清口相對駱馬湖水勢湍急遂逼黃流灌入青口朕視河時躬臨相度命河臣移仲莊閘改建於楊家莊之下工竣之後河臣報稱黃水暢流入海絶無倒灌清口之患朕尚未經親閲今欲特蒞其地察驗形勢用籌善後之規其中河黃河運河有應加修防者亦隨宜指示以圖經久至於山東洊飢之民賴兩年極力賑贍繼以有秋幸皆得所其民間生聚果否殷阜並於沿途親行周覽焉乘兹仲春解凍減從輕裝循河南下往返皆用舟楫不御室廬經過地方不得更指稱繕治行宫妄行科斂其日用所需俱自內廷供御從無纖毫取辦於民前此屢次南巡閭閻皆所深悉倘有不肖官吏借名預備擅動官帑並圖日後加派補償以為巧取侵漁之地者事覺嚴行治罪決不寬宥所在官吏私餽扈從人員及隨行人役生事擾民者俱如前旨以軍法從事姦民挾私控訐者從重坐罪爾各部即通行傳飭仍令各該督撫張示遍諭俾小民咸知朕意二月庚寅上諭大學士等曰朕不意山東之民遽能如此前者南巡見閭閻失所不堪屬目今乃大異往時皆由承平日久國帑富饒故能蠲數年錢糧遣官贍飬賑濟耳凡罹災荒倘預行奏報無不可賑救者止因山東各官匿災不報故大致飢饉向日陜西飢荒亦由於匿不報聞朕曽以地方官匿災不報之故詢之於民據云民一罹災朝廷即蠲歲賦則火耗無徵故地方官隱而不報也自古弊端匿災為甚誠預為奏報即設法賑濟矣民豈遽至飢饉耶三月壬子上南巡駐蹕蘇州府城內蘇州府屬萬民以恭逢萬壽節奏進諸品食物上諭曰朕因閲視河工巡訪風俗而來非為誕辰也且朕來時一切應用之物俱備自內府所過地方秋毫無犯今爾兆民中心篤摯朕已知之即如朕受之矣爾等可攜去康熙四十六年丁亥正月丁卯上諭吏部等衙門朕念淮黃兩河工程為東南要務屢次躬臨河上相度指示一切修防疏濬業已次第奏功昨歲河漕督撫諸臣詳勘地形請於溜淮套别開河道直逹張福口以分淮勢此係創建之事合詞請朕親閲九卿等集議再三陳請以諸臣之言奏聞皇太后祗遵慈命擇於本年正月二十二日啓行閲河舟楫往返不御室廬日用所需取辦內府經過府州縣毋得更以預備行宫供設御用冒侵庫帑科斂閭閻倘有不遵事覺定嚴加治罪其文武官員私自餽贈隨從人役生事擾民及姦惡挾私告訐者俱重處不宥爾部即轉行各該督撫通飭所屬張示遍諭俾咸知悉大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷三十二
