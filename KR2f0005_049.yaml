body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷四十九訓將士三附恤兵康熙五年丙午七月甲辰上諭户部防守地方撲滅盜賊皆需乎兵兵惟錢糧是賴支給解送錢糧何可遲誤今見各省因協餉不至以數月未給兵餉具奏者甚多或係爾部不撥實在錢糧將雜項抵撥以致請報往返徒費時日或係地方官借稱協解未齊以致遲延俱未可知嗣後撥餉時務撥實在欵項嚴定限期解送或因别故將别項錢糧協解該督撫速行題報其違限及借端推諉者作何處分爾部詳確議奏康熙十九年庚申三月壬寅上諭議政王大臣等曰前遣往廣西大兵勞苦日久宜令更番休息可撥京師每佐領護軍二人驍騎三人漢軍一千人令都統麻齊趙璉副都統洪世祿祖植椿等率往更替閏八月乙未上諭兵部今四方悉就蕩平惟滇黔餘孽尚爾稽誅前經會議各路官兵俱於八月內進𠞰兹師期已屆士馬飽騰正宜分路並進奮勇長驅掃除殘寇以靖邊圉爾部其速傳諭湖南四川廣西諸大將軍將軍督撫提鎮等整頓兵馬速行進𠞰勿得借端推諉延緩時日有逗留不前者即加重處又聞各路統領緑旗將帥不恤軍士令為滿洲大兵蓋房秣馬及私行役使恣意虐害以致兵卒苦纍如桑額標兵逃亡千餘皆由於此不思為將者與士卒甘苦相同加意愛養方可責其用命罔惜卒伍惟便私圖貽誤軍機深為可惡爾部即通行嚴飭嗣後有仍蹈前轍者指名參奏從重治罪康熙二十一年壬戌五月乙丑上諭寧古塔將軍巴海副都統薩布素瓦禮祜等曰朕幸吉林地方訪詢民隱見兵丁役重差繁勞苦至極若不將各種無益差徭顯與革除兵丁人等終無禆益且不得沾實惠矣即如鷹鸇窩雛於三月尋覓四月內捕取最妨農事况所得鷹鸇不諳呼飼難至京師徒勞人力應行停止又自八月放鷹原欲令其調習以便齎送數年來並無名鷹貢至京師而烏喇地方兵丁輒於冬寒之時尋覓山雞人馬勞頓應行停止又圍獵以講武事必不可廢亦不可無時冬月行大圍臘底行年圍春夏則視馬之肥瘠酌量行圍令貧人採取禽獸皮肉須預先傳示日期以便遵行所獲禽獸均行分給其圍獵不整肅者照例懲治不可時加責罰苛求瑣屑遇有猛獸須小心防禦以人為重勿致誤有所傷又如打鱏鰉等魚既有專管西特庫等烏喇兵丁應停差役其搬移新滿洲採取造房并船隻桅木等項及偵探巡邏等差俱係軍務乃駐防官兵專責不可寬假應照常行此外偶爾差遣大臣侍衛督看採取東珠砍伐木植尋覓鷹鸇不涉每歲定例所行之事似無過勞此後將軍以下撥什庫以上應念兵丁逺居邊境衝冒嚴寒往採山木妻子汲水操作備極艱辛時加憐憫吉林烏喇田地米糧甚為緊要農事有誤關係匪細宜勸勉之使勤耕種朕軫念滿洲人民生理欲遣人專往以驛遞疲敝故因筆帖式來奏特諭知之七月甲戌上諭兵部近因逆賊蕩平四方底定將經制之外增設緑旗兵丁議令裁汰於二年內陸續報完原以寬恤民力敉寧地方今思各處兵丁多有隨征進勦效力行間綿厯歲時備嘗艱苦事平回汛若漫無分别一槩裁汰深為可憫可令該督撫提鎮等官於裁汰之時詳加察閲不得混留私人反將曾經效力兵丁輒行裁退至於已裁兵丁及投誠歸農人等恐有無籍可歸艱於生計者令各省所司官設法安插善加撫輯務俾有以資生毋致流離失所擾纍平民爾部即通行申飭文武大小各官實心奉行殫力料理以副朕恤兵愛民至意康熙二十九年庚午九月戊子朔上諭大學士等曰盛京兵丁全賴田畝耕穫及月給糧餉以為資生之計昨歲盛京禾稼不登貧困兵丁難以粒食曾以也糧頒發賑救頃值軍興遣一等侍衛齊蘭布往調盛京兵丁隨發諭旨令無馬匹者給與官厰馬匹無行糧者給以莊屯糧米官兵踴躍遄征倉卒之際置辦一切軍裝遂領明年二月分應給俸餉又預支五個月錢糧尅期進發比厄魯特噶爾丹敗遁盛京官兵雖未接戰而奮勇敵愾深可嘉悅今若將預支俸餉復行扣抵則窮乏兵丁必至生計艱窘朕心殊切憫惻所預給明年二月分應支俸餉及增給五個月錢糧免其扣抵仍令照常支給以示朕愛養將士軫恤疾苦至意康熙三十四年乙亥正月乙酉上諭兵部朕巡視京畿見緑旗兵沿途奔走無頃刻之暇甚屬勞苦深為可憫問之則云兵部內私用印信文移護送家口等事甚多除已往之事不復察究自後爾部移文各處總兵官將派出兵丁護送大臣官員事件數目年終詳明造册送爾部察奏五月丙寅上諭大學士等曰爾等傳諭八旗滿洲蒙古都統各將前鋒護軍披甲兵丁之實無房舍者身自確查於此月初十日保奏凡官員子弟及有房舍與家僕披甲者不必查辛未上諭大學士等曰覽八旗都統所查無房舍者七千有餘人未為甚多京師內城之地大臣庶官富家每造房舍輒兼數十貧人之産是以地漸狹隘若復斂取房舍以給無者譬如剜肉補瘡其何益之有貧乏兵丁僦屋以居節省所食糧以償房租度日必至艱難今可於城外按各旗方位每旗各造屋二千間無屋兵丁每名給以二間於生計良有禆益此屋令無得擅鬻兵丁亡退者則收入官大略計之約費三十餘萬金譬之國家建一大宫室耳敕下欽天監相視汝等及八旗都統身往驗看宜建造之處奏聞九月丁丑盛京將軍公綽克託等疏言開原等處馬甲月給米二倉斛步甲月給米一倉斛今倉米不敷俟明年海運之米補給上諭大學士等曰此奏甚屬踈忽馬甲之中亦有人口少者步甲之中亦有人口多者一例按甲支給可乎來年海道運米未可預必其全到即盛京田榖亦難預必其全收凡事須曲盡籌畫豈可拘執定議此本發回令察明人口給米庚辰上諭大學士等曰開原等處給散兵丁米榖若令行查必稽時日兵丁或至重困著朱都納嵩祝前往將不能度日人口數目查明一面散給一面具題康熙四十一年壬午閏六月癸未户部議覆山西巡撫噶禮疏言右衛駐防官兵浮給康熙三十六年分草束折色銀兩請交各該旗追還上曰此浮給官兵草束折色銀兩復行追賠殊為可憫若向誤給官吏追補必致派纍小民其槩免之康熙四十二年癸未四月乙亥上諭八旗都統前鋒統領護軍統領副都統參領佐領等曰朕為官兵生計不時廑念前已屢施大澤今年詔欵內復特沛鴻恩不惜數百萬帑金遍行賞賜嗣後兵丁人等應人人務立生計清償夙逋豐裕度日倘有不肖之輩不思撙節儉約惟知縱酒酣飲鮮衣肥馬過於費用則不數日間仍如未沛恩澤時也爾等俱有督率之責不當徒以督率為名亦當誘之向善使人人以孝弟為本各知自守愛惜産業則不特風俗可至淳朴而朕愛人之心亦不致徒勞矣可將此旨刋刻遍示軍卒人等受朕重恩如此倘仍行賭博行止不端朕斷不輕貸必將為首者立正典刑朕念切兵民生計是以親書諭旨十一月辛酉上巡行陜西駐蹕西安府諭將軍博霽曰朕巡厯江南浙江盛京烏喇等處未有能及爾西安兵丁者爾處官兵俱嫺禮節重和睦尚亷恥且人材壯健騎射精練深可嘉尚愼勿令其變易康熙四十五年丙戌十一月癸酉上諭户部朕念八旗禁旅為國家根本所繫每加恩愛養用俾生計充盈或動支公帑數百萬代清積逋或於各旗設立官庫資濟匱絀所以為衆甲兵籌畫者甚切康熙四十二年又曾頒發帑金貸給八旗兵丁共六百五十五萬兩有奇至康熙四十五年冬除陸續扣完外尚未完銀三百九十五萬六千六百兩有竒若仍行按月扣取恐各兵丁營辦器用贍養家室必有不敷之慮朕深切軫惻兹特大沛恩施式𢎞撫育將未經扣取銀兩通行豁免爾部即傳八旗都統等出示遍諭俾咸知朕優恤禁旅至意康熙四十六年丁亥三月壬戌上南巡諭江寧將軍朱滿曰朕前至江寧賜此地兵丁一月錢糧京城馬匹甚多入秋令解來給江寧兵丁此時兵丁有馬倒斃者且勿買補十月壬辰上諭內務府據河屯營守備楊宏德奏稱駐防河屯兵丁二百名已給錢糧請將原給地畝交回朕思兵丁內升轉病故者伊等妻子既無地畝又無錢糧何以養贍著將地畝仍令伊等耕種康熙四十九年庚寅正月乙未上諭八旗都統等曰八旗兵丁一人所得四十斛之米人口多者適足養贍人口少者食之不盡必至售賣與其自倉運出費腳價而復行轉賣不若計口支放餘者照時價給銀於兵丁有益爾等即傳諭户部四月辛酉右衛將軍宗室費揚固疏請右衛空間官房交該撫照時值變價上諭大學士等曰滿洲户口滋息甚繁兵丁內無屋可居者有之右衛現有所造空房若增駐兵丁極是善䇿爾等可會同領侍衛內大臣八旗都統副都統滿九卿議奏康熙五十五年丙申十月癸巳上諭兵部國家綏靖邊圉剪除賊寇必須士馬飽騰方克立奏膚功恤兵之道宜急講也朕御極五十餘年無時不以愛養士卒為念內而八旗禁旅外而各省緑旗兵丁視同一體或代還私債或遣官犒賞或嚴禁尅減所以體恤之者惟恐不至近䇿妄阿喇布坦狂逞跳梁侵我哈密故特徴兵預備既已轉輸糗糧又復頒給馬駝籌畫倍周加惠尤渥而山陜緑旗兵丁首奉調遣逺途跋涉資用惟艱因而預借公帑朕念從軍兵丁披堅執鋭戮力戎行又責以還帑深可憫惻緑旗兵丁所借帑金四萬八千八百餘兩咸與蠲除並嚴飭統轄將領實心奉行倘有仍行私扣者該督撫據實指參從重治罪以仰副朕軫恤邊兵至意康熙五十六年丁酉九月丁巳靖逆將軍尚書富寧安奏稱官兵整理軍器等物支借俸祿銀糧共計銀二十五萬六千兩有餘俟事定之日扣除上曰此次官兵雖未臨陳克取地方然同心效力甚屬可嘉將朕內庫銀兩發出二十六萬令其整理馬匹器械如恐路逺不能即逹將附近地方所有錢糧著户部速行料理成功時此項銀兩不必扣除若無效力之處空回各本汛者仍行扣除現將內庫銀兩照數交與户部此項錢糧係朕特恩其另造檔案務令清楚癸酉四川陜西總督鄂海疏言西寧鎮標官兵因前往噶斯駐防借領六個月俸餉若照數扣除各兵無以自給請將已換班回西寧官兵每季扣除一月仍留兩月糧餉給兵養贍再現令駐防噶斯官兵亦每季將兩月糧餉解送軍前給散本兵留一月糧餉贍養伊等家口俟換班回西寧之日陸續扣還上曰噶斯換班回來並現往駐防官兵所借糧餉著暫停扣除俟功成事竣作為朕所賞賜如不成功照該督所題扣除其行月糧餉送至軍前併存留贍養家口之處著照該督所題給放康熙五十七年戊戌正月戊寅上諭議政大臣等曰兩路軍兵駐扎邊塞二三年矣勞苦殊甚衣服亦將損敝朕深加軫念特令製衣二萬襲現今所有一萬襲派侍衛一員由內地驛站送至將軍富寧安軍前賞給軍兵再一萬襲俟製完日送至將軍傅爾丹軍前著爾等大臣查驗裝載牢固發往如尚有不敷計算軍兵數目照此衣服將庫貯布匹賞給令其自行製造八月癸未上命內閣學士渣克旦副都統薩爾禪等前往索倫賑恤諭之曰索倫人等效力圍場甚屬年久亦有現在出兵之人今被水災朕甚惻然令爾等前往散賑爾等會同將軍副都統將被災之人逐一查明無房屋者即給房屋無衣服者即給衣服務令均沾實惠以副朕軫恤至意十二月己酉上諭大學士等曰福建廣東地方潮濕馬匹難存所倒馬匹若屢令償賠必致苦纍兵丁業已給過草料銀兩者免其追賠著照緑旗兵丁例半為馬兵半為步兵馬兵人各養馬二匹爾等會同議政大臣九卿議奏康熙五十九年庚子十月庚戌上諭兵部朕惟國家綏乂地方愛養兵民實係緊要朕自臨御以來夙興夜寐無時不以兵民生計為念比年䇿妄阿喇布坦蠢動跋扈侵我哈密殱及拉藏占取藏地騷擾土伯特唐古特人民再吐魯番之人近四川雲南一帶邊境居住準噶爾人等若將吐魯番侵取又將土伯特唐古特人民鼓惑侵犯青海不但難於應援亦且難於取藏是以調四川雲南滿漢官兵由拉里進藏官兵俱感朕豢養之恩遵朕指授各加奮勵直抵險逺絶域克取藏地殊堪軫念應大沛恩澤四川雲南滿漢官兵從前所領俸餉俱著免其扣取仍遣堂官將取藏之四川雲南官兵每人賞銀十兩即給本人妻子以示朕軫恤官兵勞苦之至意爾部即遵諭行大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷四十九
