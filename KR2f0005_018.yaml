body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷十八武功六康熙三十六年丁丑二月丙戌山西道御史周士星疏言噶爾丹計日就戮請御駕不必再臨沙漠上諭大學士等曰覽周士皇條奏雖臣子之情當然但周士皇未知其中之故耳噶爾丹凶惡一日不可姑留前在烏䦨布通地方猖狂肆逆朕已遣兵敗之猶不悔過復竊伏我克魯倫地方朕親統大軍𠞰除略盡今窮困已極故乘此機會親臨塞外酌量調度前三逆反叛吳三桂煽惑人心遂致滋蔓竟至榆林等處朕日夜綢繆調遣大兵幾費心力方得撲滅今蕩平年久人遂視為易事且窮兵黷武好大喜功朕所深戒朕亦曽作詩發明此意著諭明周士皇伊所奏雖不當朕亦不罪也壬辰上諭撫逺大將軍伯費揚古曰朕二月初六日出行十一日至宣化府觀此際情形噶爾丹窮困已極雖欲降何易得至此地寧夏地方去噶爾丹所在薩克薩特呼里克之南格格特哈朗古特地方甚近故遣參領車克楚近御侍衛僧圖等授以西安寧夏兵一百探視至於伊克敖拉伊等報二月初三日已起程矣為此諭知朕意以為將軍孫思克博濟等率兵三千出嘉峪關或進哈密或進巴爾庫爾之路俟車克楚歸如可行則一路三千兵出寧夏進新勘之路如不可行則以兩路為一路擇地而進殆可成功矣朕欲往寧夏視軍中糧餉及諸情形爾之意何如為此諭爾商之主事保柱使於第巴報文併發爾知之癸已上諭議政大臣等曰前既陳斬噶爾丹之妻阿奴喀屯今又生擒其子賊之本根已斬噶爾丹雖各處偷生其年老邁能延幾何其子為我所獲是乃天之所賜也凡用兵之道要在乘機噶爾丹窮迫已極宜乘此際速行𠞰滅斷不可緩朕今親臨寧夏相度機宜調遣軍士賊聞之必魂魄俱喪其部屬亦必張皇而别部䝉古聞朕親臨寧夏各欲見功扼噶爾丹而圖之彼若不自盡亦必為人擒獻克成大事正在此舉矣又諭曰朕親歷行間塞外情形知之甚悉自古以來所謂難以用兵者是也其地不毛間或無水至瀚海等砂磧地方運糧尤苦而雨水之際樵㸑頗難區畫不周豈可妄動朕今親臨寧夏凡有可用兵之地必詳察行道水草全備馬駝糧糗等物然後起程稍有可疑雖諸臣勸行朕亦不允也庚子上諭撫逺大將軍伯費揚古曰朕於十七日抵大同分析兵馬十九日由邉內起行赴寧夏今噶爾丹如此窮蹙斷不至於用兵萬一有噶爾丹前來聲息須星速報聞朕當從寧夏進襲其後如噶爾丹屬下人來降或遣使來當訊明速奏三月丁已上諭議政大臣等曰朕至寧夏後方調甘肅兵前行似乎稍遲此時噶爾丹窮極之際西安滿兵二千甘肅緑旗兵一千俱久在甘肅馬亦肥矣機會不可失宜速進薩克薩特呼里克之地搜𠞰噶爾丹此滿漢兵各帶百日糧嘉峪關至薩克薩特呼里克地方甚近不必運糧如噶爾丹已遁此軍計糧而歸各賞銀十兩此外另有當行當奏之事孫思克博濟阿南逹等公議具奏其哈密擒獻之俄摩克圖哈什哈遣至伊等軍中倘有可行之機即行進𠞰如噶爾丹已逺遁則差俄摩克圖哈什哈往諭之言我軍非來征討實來招撫爾可速降至遣寧夏兵駐郭多里巴兒哈孫地方備禦之事當檄將軍孫思克知之壬戌上諭議政大臣等曰凡調遣外藩兵馬之事俱已交大將軍費揚古如皆請㫖而行則有倉卒軍機必致遲悮嗣後俱聽大將軍便宜調遣癸酉振武將軍孫思克疏言奉㫖令臣等乘噶爾丹窮困之時帶百日糧速往薩克薩特呼里克一帶地方進𠞰但馬匹未能齊備祈敕兵部不論何項馬匹速解甘州上諭曰機會不可失孫思克博濟等兵著即取伊附近緑旗兵之馬如可不悮即令啓行一面奏聞如不能得則扣糧減兵即取所減兵之馬䭾糧而行自寧夏進𠞰之兵朕意不過二千或二千五百伊等如謂減兵則寡而難行著一處駐扎止令寧夏之兵進𠞰閏三月辛卯上諭議政大臣等曰朕曽以轉運糧餉及隨軍安站之事與鄂爾多斯貝勒松阿喇布議之彼奏言當此有青草之候以臣等帶來兵三千足供運糧安站之用應將白塔以外運糧安站事交松阿喇布同于成龍等商議而行白塔以內運糧安站事交總督吳赫管理其西安副都統阿蘭台兵三百亦交與于成龍又馬思喀帶來之兵若祗自齎口糧一月則其餘三月之糧及隨軍所運之糧為數甚多船運一次未必能完勢必再運一次大兵豈能空坐久待應令馬思喀兵各齎兩月口糧外所餘之米船裝以運船裝不盡者令大小官員均派帶往若復有餘令于成龍竭力運至白塔隨軍遞運之米應至何處應止何地著大將軍費揚古議政大臣與于成龍等會同詳議具奏壬辰上諭內大臣等曰大兵起行之前當遣人招撫噶爾丹丹濟拉此差不必遣本朝之人前與塞卜騰巴兒珠爾同擒者有噶爾丹乳母之子丹濟扎卜再撥願往之厄魯特人齎敕而往一面遣使一面進兵達賴喇嘛身故已十有六年矣第巴指達賴喇嘛之語以誑噶爾丹彼信其誑自言為達賴喇嘛之教而恣肆橫行以此等事明開敕內照樣刋刻多印付丹濟扎卜等遍行𫝊示併遣使諭策妄阿喇布坦令乘此機會亦興兵𠞰滅之敕諭噶爾丹曰去冬命爾早降則豫以富貴給以資産眷顧煦育之即爾所屬厄魯特之衆亦各得見其妻子遂其生業故遣使偕格壘沽英往宣敕㫖今使者喇木扎卜至覽爾所奏謂未明朕㫖觀爾辭意一無真實而請給還來奔之厄魯特豈惟厄魯特之衆雖爾子塞卜騰巴兒珠爾及爾乳母俱已被獲今皆恩養與徽特和碩齊同居爾若來歸即令爾子與爾相聚否則爾有何功遂還爾厄魯特之衆爾欲歸降應及早來若不歸順徒遷延時日何益况達賴喇嘛已故朕亦知之曽嚴敕第巴第巴又遣尼麻唐胡土克圖上表來賀捷且奏稱逹賴喇嘛已沒十六年其再生後身年已十五嵗則爾之指稱達賴喇嘛以為護法欺誑衆人者已顯露矣爾所逃匿之地厄魯特來降者多朕已悉知即使遁入洪郭羅險固之地諸路皆可進𠞰爾困迫若此尚何力拒守即今已無歸所矣今嵗即不擒汝來嵗當即發兵追討必不中輟汝其詳審之敕諭丹濟拉曰朕為天下元后善善惡惡乃至理也去嵗遣格壘沽英等歸敇內開載爾名復使格壘沽英𫝊諭今格壘沽英等來爾之辭意皆已備陳爾今能致噶爾丹來降必當封為貝勒畀以殊榮如不能致爾一身歸順亦能不失富貴况爾以下之人先降者皆釋其罪顯榮優養爾當悉聞已往之過槩不介意爾曽密奏若宥臣罪臣請投降故特専賜敕㫖盡宥前罪敕到其速降朕為大君豈改成命特諭敕諭厄魯特之台吉寨桑哈什哈并其衆人曰朕無分中外皆欲其各安生理樂育升平至於誅戮征伐原非本懷爾厄魯特等附從噶爾丹所在侵掠雖有所得於人而已之祖父戰死妻孥被掠者亦云衆矣今所餘之人不被創受傷者甚鮮死亡之餘其存幾何因從噶爾丹之故以至窮迫無歸困苦已極屢頒諭㫖命噶爾丹前來歸順則凡爾厄魯特之衆朕必俱加養育使之各得其所乃噶爾丹怙惡不悛並不以爾衆為念不思歸順他日兵臨則爾衆難免俘戮故特諭厄魯特之衆爾若能各攜族屬妻子來降者朕皆養育使得其所前所降者已加豢養爾衆亦當聞之矣特諭命工部侍郎常綬等齎敕諭策妄阿喇布坦曰爾厯來請安納貢克恭克順朕亦加眷顧恩施頻及噶爾丹奸詭性成雖彼至戚靡不嫉害即將厄魯特之四部喀爾喀之七旗致令破亡分裂又以追襲澤卜尊丹巴土謝圖汗等為名侵我邉境屢擾不已朕因於去嵗數道遣兵親行征𠞰直抵克魯倫土喇地方大破噶爾丹陳斬甚衆其妻被誅戮冬間復遣兵西出哈密地方獲其子塞卜騰巴兒珠爾等今窮迫已極所屬大小寨桑哈什哈等相繼來降者不絶其餘附從之人及寨桑等流離逃散俱欲投順密報前來今噶爾丹僅餘孑身率領數人隨處飄遁爾當亦聞之矣爾前奏稱噶爾丹若近逼我土必竭力擒𠞰又言隨聖上指示效力盡瘁等語噶爾丹凶惡已極有如魑魅斷不可留今數道遣發大兵搜討夫噶爾丹與爾素有深仇乘其困迫應起兵復仇進𠞰且達賴喇嘛久故第巴詐飾其尚在之狀故嚴敕第巴而第巴大懼遣尼麻唐胡土克圖來言達賴喇嘛亡故已十六年其再生後身已十五嵗據實陳奏則噶爾丹所稱護達賴喇嘛之法者其為欺誑衆人也明矣欲爾明悉故遣工部侍郎常綬內閣侍讀學士伊道侍衛克什圖等齎敕諭爾特諭四月庚戌朔上諭議政大臣等曰此地至兩狼山一百二十里無水應於于成龍等未到之先集軍中駱駝送米過此無水之地令內大臣明珠都統噶爾馬王永譽押去到後著噶爾馬王永譽留彼守米著明珠帶回駱駝舊嵗中路進兵各驛備米供給兵厮商販故人不至飢此次進兵所關甚要凡事不得不周詳籌畫朕已遣往寧夏取米五百石矣俟到後留貯於此隨運兵丁亦酌量留之著一大臣駐此管轄將此米從驛站陸續緩運每驛量留米俟回師之兵厮商販乏糧者給之上駟院趕來馬一千四百餘匹亦留於此擇水草善地牧放肥壯俟回師之兵有乏馬者給之鄂克濟哈仍駐寧夏凡馳報之事由新設邉外驛站遞送則路近而無悮總督吳赫船站照常安設船站以外令設䝉古驛站馳報軍機甲寅上諭議政大臣等曰今諸事俱畢惟噶爾丹僅存各處逃竄大兵前進搜𠞰不久旋師路必由此當逐站置米師回乏糧者以米給之來降之厄魯特青海來朝之台吉等俱由此來米糧馬匹已留于此則駐此而理事者尤為緊要朕本欲駐此親理其事但天下事大是以回鑾著留領侍衛內大臣索額圖并都統阿錫坦噶爾馬王永譽護軍統領蘇赫副都統巴賽等於此甲戌厄魯特降人諾爾布寨桑等以𠞰滅噶爾丹奏請行慶賀禮上諭曰往者噶爾丹以追逐喀爾喀為名直入我扎薩克烏䦨布通地方故朕命裕親王及皇長子率師往𠞰之噶爾丹大敗使濟隆胡土克圖往復陳說自今以往不敢再犯邉陲噶爾丹頭頂威靈佛以誓此爾衆所共聞者也嗣後無故過土喇潛處巴顔烏䦨地方掠我臣服之納木扎爾陀音故朕親率六師聲罪致討然猶不忍遂加誅滅再四遣使諭以和好而噶爾丹怙惡朕故整師進𠞰噶爾丹不能當我軍威驚潰奔逃遇我西路大兵奮擊大敗之此皆噶爾丹違天背盟以致禍患及身國隨以亡朕但思掃除殘暴拯救羣生誠悃懇懇求符天理故大軍所向無水之方靈泉觱沸不毛之地瑞草蕃滋山川效靈百神顯佑聞噶爾丹所至之處必有烈風暴雨災異頻逄驚聞我軍之來寢食俱廢反復思維無計能逃窮急仰藥而亡由此觀之天可違乎其助順惡逆亦顯然矣夫與朕為敵者惟噶爾丹而已與衆何涉不惟噶爾丹在日爾等降者必加恩撫恤即今噶爾丹已死凡有降者朕亦如爾輩恩育豈忍異視耶然噶爾丹之滅朕之大小官員當奏請慶賀爾輩素皆受恩於噶爾丹之人不當奏請五月丙申上諭大學士九卿等曰塞外情形不可臆度必身歷其境乃有確見昔朕欲親征噶爾丹衆皆不欲惟費揚古與朕欲討之後兩次出師衆愈不欲若非朕親統大軍追襲噶爾丹使之少留餘息彼必復聚難以遽滅矣明時為恢復河套議論紛紜致大臣夏言曽銑受戮自朕觀之此地無甚關係若控馭䝉古有道則河套雖為所據安能為患控馭無道則何地不可為亂䝉古游行之地防之不可勝防専言收復河套亦何益乎至行師之道調軍轉餉必一人兼綜其成事乃易濟前西路進兵時將軍博濟孫思克等専管軍務不與挽運専責地方巡撫等官轉餉逮後糧餉稽遲兵丁困餒致有道殣頃朕自白塔至船站猶見有遺骸皆遣鄉導沿途掩埋朕統大兵由中路進時多方籌畫催督運餉比及旋師無一人受餒且支給西路之兵俱獲全還又令沿途各站多貯米糧雖隨營貿易之人皆不乏食此役寧夏之行料理糧餉悉有次第然後進兵所以直至回軍供應皆足無或稍悮以此觀之兵食兩事斷宜一手區畫此後倘遇行師當永以為法朕又觀塞外運糧最難昔唐宋及明嘉靖時皆用兵西陲不知當日作何轉運之法朕此次寧夏之行不用車輛所需駝馬騾驢悉自京城發往恐有不敷復給公帑採買預備一切什物皆由官運略不纍民癸卯禮部題請平定噶爾丹武功告成典禮上諭曰喀爾喀厄魯特原皆納貢之國因其交相不睦屢諭和好乃仍搆釁致起兵爭噶爾丹曽破回子中之薩馬爾漢布哈爾哈薩克布魯特葉爾勤哈思哈爾賽拉木吐魯番哈密諸國其所攻取降服者一千二百餘城乃習於戰鬭之國也喀爾喀焉能抵敵是以七旗數十萬衆一嵗之中喪亡略盡喀爾喀之汗諾顔台吉等知朕豢養蒙古夙有厚恩悉皆款塞來歸其時若不允其內附恩養得所必皆淪入於厄魯特則爾時噶爾丹之勢力不言可知矣允其內附而恩養之噶爾丹必假此釁端與我朝搆難凡此情事皆經熟籌受納喀爾喀非漫然而為之也噶爾丹假索取喀爾喀為名遂犯我汛界尚書阿喇尼率䝉古兵逆戰於烏爾會之地我師大北噶爾丹乘勢遂直抵烏䦨布通距京師未及七百里斯時諸大臣及國家諳悉軍務之人不在行間者少矣適朕躬以違和還京左翼軍雖能勝敵而右翼軍不能制勝大臣而下以至軍士陳亡被創者甚衆噶爾丹亦自知其無濟歸路遭罹瘟疫得還科卜多者不過數千人耳當是時即豫知其勢雖大損必復稱兵犯境六年以來烏䦨布通之役時廑朕懷因是訓練軍旅咨訪形勢正經理武備之時噶爾丹果復舉兵寇掠喀爾喀之納木扎爾陀音於克魯倫之地朕思此賊不可以尋常寇盜視之詔武臣三品以上咸陳滅賊方略會同詳議舉朝皆以為難其言賊當討滅者不過四人朕以為此賊斷當亟圖遂宣昭大義祭告於天地宗廟社稷之靈克成厥勳倘事或未成則受喀爾喀之內附致厄魯特之兵爭糜中國之脂膏事朔荒之邊塞窮兵黷武其名恐未能免矣今我師所至上天佑助無水之地而靈泉湧出不毛之土而庶草蕃蕪事悉稱意者此皆國家之福將士之勞所致也今西北永遠寧謐其不致蒙咎者即幸矣自今以往務益殫勵精始終如一治安之日愈求治安其祭告諸典禮俱依議行徽號不必上六月甲戌上諭大學士等曰四川總兵官馬子雲欲率回子襲噶爾丹之後回子生性無義曾三擒其主以獻噶爾丹其兵豈可用乎本朝之兵所向無敵若有事時已不可勝用矣安用外國之兵古來用外國兵鮮有善者宋用金兵滅遼復用元兵滅金金既滅元遂滅宋此其明驗也初噶爾丹並吞吐魯番葉爾勤薩馬爾漢哈薩克等千餘部落本朝並不之問當厄魯特與喀爾喀戰時本朝若助厄魯特今如何能破噶爾丹乎噶爾丹既克喀爾喀直侵內地朕始領兵𠞰滅前定海總兵官藍理曾請率所屬藤牌兵進𠞰沙漠地寒冰凍與南方迥别藤牌兵雖强夏尚可用自八月以至三月豈但交戰即藤牌亦不能執此皆人地不相宜所謂紙上談兵者也馬子雲粗鄙不識大義可曉示之七月丁酉上御太和殿王以下文武各官以平定朔漠並太和殿告成上表行慶賀禮詔諭天下曰朕君臨天下早夜孳孳勤求治理惟恐一夫不獲其所初未嘗有岐視中外輕事兵戎逺伐異域之事厄魯特噶爾丹向與七旗喀爾喀同奉職貢嗣因兩國交郤搆兵喀爾喀汗等為所敗衄叩關內附噶爾丹乃借辭追擊䦨入我邉境恣行狂逞朕屢頒敕諭令其悔悟自新而狡寇不知省悟益肆鴟張其逆謀不測實有逼處近塞窺伺內地之漸朕思此寇包藏禍心倘不即行撲滅則異日必緣邊設防重滋民困何如及時聲討立靖根株於是昭告天地宗廟社稷躬統禁旅不憚勤勞三出塞外去年夏賊於克魯倫地方自度力不能抗倉皇宵遁朕親追至土喇河適西路大兵遮截其後擊敗之於昭莫多賊勢大挫冬月復駐蹕鄂爾多斯收撫其降衆遏絶其外援而賊益困蹙機會所在刻不可失遂以今年春西巡邊境從寧夏出塞遣發大兵兩路進𠞰而青海烏思藏人等皆先後輸忱自效哈密國人又俘獻噶爾丹之子於行在噶爾丹窮迫已極一聞大軍壓境計無復之隨於阿察阿穆塔台地方飲藥自盡揆之料敵成謀適相符合自此寇氛盡滌邉圉永安而朕為民除害不得已而用兵之意亦可曉然共喻於天下臣民矣武功告成之會正太和殿鼎建工竣巍煥方新臨御伊始協氣集於九重觀瞻肅於萬國是用覃敷慶澤以上答郊廟社稷之靈下協中外人心之望懋武功而敷文德聿臻熙皥之風建宸極而鞏皇圖永慶平成之治誕告中外咸使聞知十月乙卯理藩院題厄魯特丹津俄木布使彭楚克車陳白克阿兒逹爾俄木布來言丹津俄木布與策妄阿喇布坦不合今已無所歸矣應遣人招之使來上遣羅卜臧丹巴齎敕前往敕曰朕前聞爾與噶爾丹分析游行故差黑色馬尼圖捧敕諭以來降必使富貴優加恩養爾如同阿喇布坦往歸策妄阿喇布坦朕亦不究著明白覆奏如兩無所歸欲於額黑阿喇兒洪郭羅等處據險竄伏朕斷不容必刻期破之爾使人諾顔格隆臧布額爾克俄木布阿旺達什等來奏云倘噶爾丹至我近地必擒而殺之歸降聖朝又以敕書使諾顔格隆臧布齎去諭爾雖不能擒殺噶爾丹而身率屬下來降亦必使之富貴而優養之毋疑毋阻今爾竟不往歸策妄阿喇布坦仍另自游行豈因爾向與策妄阿喇布坦不睦有歸噶爾丹之事故不便復歸䇿妄阿喇布坦乎今噶爾丹身死國亡生擒其子塞卜騰巴兒珠爾又擒伊拉古克三胡土克圖今爾不速來漸至日久則爾生計亦漸迫若爾率屬下星速來降朕必加以厚恩優待愛養目下丹濟拉車陵等來降俱使得所而愛養之爾亦當聞之詳矣今軫念爾無所歸生計窘迫欲使得所之意爾當籌之速來歸降毋貽後悔為此特遣爾幼時服役識認之人羅卜臧丹巴齎敕往諭十二月甲寅上諭大學士等曰朕屢次出兵看來為將誠難一應軍務惟在相機而行固不可急亦不可緩如阿喇尼紀爾他布過於急而為賊所敗馬思喀等又過於緩而致伊拉古克三胡土克圖逃脫去年中路出兵時雖以衆論俟大將軍費揚古然以此為至論亦屬不可彼時費揚古於五月十三日若不到昭莫多則噶爾丹豈不脫逃乎故為將者必相機調遣方能濟事其餘庸流則多有失䇿矣大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷十八
