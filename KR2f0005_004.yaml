body:
  text: 欽定四庫全書大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷四聖德三康熙四十一年壬午十二月壬辰諸王貝勒貝子公滿漢文武大臣官員及直隸各省士民以皇上五十萬夀請上尊號上諭曰朕即位四十餘年無刻不以民生休戚為念逺邇安寧為本雖慶雲景星嘉禾瑞草天書麟鳯之竒總無關於黔黎亦無係於朕心侈言祥瑞貽譏史冊何裨治理朕以實心為民天視天聽視乎民生後人自有公論若誇耀功德取一時虛名大非朕意不必數陳康熙四十二年癸未十二月乙酉山東巡撫王國昌疏言東省水災䝉皇上截漕發帑差官賑濟萬姓歡呼籲請代題謝恩上曰王國昌疏稱小民感戴祝頌等語朕自御極以迄於今但以民生為念未嘗一刻不廑諸懷民無災傷各得其所小民雖不行祝頌朕心自懌聞今山東直隸河南榖價騰貴朕方切軫念此所奏已知之康熙四十三年甲申八月庚午上諭大學士及講官等曰臣下如有欺䝉朕斷不姑宥此外若為朕躬服食諸事從未笞責一人昨往釣魚處膳房所備止有肉肴竟忘攜帶飯食諸皇子及近御侍從俱欲笞之朕止之曰彼無心偶忘攜帶耳此乃小事可寬宥之十一月壬戌上諭大學士等曰朕嘗閲書史自古大臣得始終善全者少朕今御極四十餘年大學士衛周祚馮溥杜立德李霨宋德宜王熙等俱得全功名而考終命者皆朕竭力保全所致也朕從不多生一事但穆然清靜處之以和平故諸臣皆得享其福也康熙四十五年丙戌二月丁巳上諭大學士等曰今嵗山東河南山西等省雨水均調已經奏報惟近京一帶去嵗三冬少雪今春復無雨澤頃二十七日地又微震一切政事或有當更改處爾等與九卿㑹同酌議具奏爾諸臣行事若有缺失亦當各自反已力加省改三月丙寅上諭大學士等曰朕觀前史漢因災異而重處宰相此大謬也夫宰相者佐君理事之人倘有失誤君臣共之竟諉之宰相可乎或有為君者凡事俱付託宰相此乃其君之過不得獨咎宰相也十月乙巳上諭户部國家錢糧理當節省否則一遇災荒蠲免其軍餉河工等項經費必致不敷前光祿寺一年用銀一百萬兩工部一年用銀二百萬兩因朕力崇節儉今光祿寺一年止用銀十萬兩工部一年止用銀二三十萬兩矣康熙四十六年丁亥十月乙酉䝉古諸王貝勒貝子公台吉等各率所部進獻馬駝上命却之諭曰朕今教養爾等人皆富庶物盡蕃滋爾等竭誠進獻朕心嘉悅即與收納無異嗣後爾等其益勤生計圖維滋息始副朕愛養至意康熙四十七年戊子八月辛未上命侍衛伍什常夀等傳諭諸大臣曰近日聞諸阿哥常撻辱大臣侍衛又每尋釁端加苦毒於諸王貝勒等諸阿哥現今俱未受封爵即受封後除伊屬下人外凡有罪過亦當奏聞候朕處分何得恣意妄行乎朕為天下元后凡事但遵大義而行無罪之人未嘗枉法處治八議內三品以上官員雖犯死罪不遽擬絞而必奏聞者所以敦國體非但恤臣下也伊等不遵國憲橫作威勢至令臣僕無以自存是欲分朕威柄以恣其行事豈知大權所在何得分毫假人如裕親王恭親王皆朕兄弟也於朕之大臣侍衛中曽敢笞責何人耶臣僕有獲罪者朕並不輕宥然從未有輕聽人言橫加僇辱之事且太祖太宗曽降訓㫖戒勿濫行捶楚荼毒無辜煌煌實録紀載甚明嗣後諸阿哥如仍不改前轍許被撻之人面詰其被撻之故稍有寃抑等情即赴朕前叩告朕且欣然聽理斷不罪其人也至於爾等有所聞見亦應據實上陳若一切隱而不奏即爾等之罪矣十月甲辰上親書諭㫖示諸皇子大臣等曰昨日諸大臣侍衛等奏請調養朕躬朕念君臣一體有懷宜即盡言故特舉朕素念及不遂朕意之處一一明諭朕每思自古帝王撫世承平歷年久逺未有如朕者朕無日不向皇太子允礽言治理天下愛育黎庶維繫人心之事慕宋孝宗之孝養高宗語允礽曰將以政事付汝朕當擇處水土佳處時聞汝之令名以優游養性逮後見其所行不善難託重器遂絶此望古來為君甚難兢兢業業猶有錯誤今朕年已老幸際衆心胥戴萬國咸寧之時愈加畏懼宗廟社稷天下黎元皆繫朕躬朕寧敢不慎重𢎞業置諸磐石之安乎逮至彼時衆自知有所倚賴也此意極深即朕亦不自喻豈可遍喻衆人乎爾諸臣知朕精誠無私深加體念各勤職業不妄生事則朕易於圖治而天下庶績亦咸理矣所謂各勤職業者即文臣盡忠不愛錢武臣為國不惜死之類爾諸臣誠能如是則朕懷自暢朕體自安矣若不敬慎所行而欲朕懷寬慰此非忠愛之實心也特諭康熙四十九年庚寅四月辛酉九卿等議覆僉都御史屠沂條陳節儉一疏上諭大學士等曰禁止奢僭而崇尚節儉極當於理朕近查宫中人數皇太后宫及朕所居正宫不過數百人較之明代宫人則減省多矣先是光祿寺供應宫中用度每年用銀七十萬兩有餘朕漸次節省不使濫溢一年止需七萬兩矣理藩院向來每年賞賜供應外藩賔客用銀八十萬兩今裁減浮費一年止需八萬兩矣户工兩部前此每年所用錢糧其數過多今十日一次奏聞用過數目所需錢糧已極少矣朕用錢糧節省如是因臣民僭用妄費從前屢有禁約今若又行禁約徒有法令滋繁而已究無補於事也蓋法令非不詳盡皆由臣下奉行不善而然步軍統領順天府府尹地方該管官員果實心遵行何至如此乎十月癸未上諭大學士九卿等曰江南虧空錢糧兩次命張鵬翮察審朕意地方雖有不肖之官侵蝕錢糧未必多至數十萬兩前朕南巡時曽有諭㫖凡沿途所用之物悉出內帑預備未嘗絲毫取諸官民督撫等官不遵朕㫖肆意那用以致虧空朕若不言內外諸臣誰敢言者但彼任事之人離任者已多若將因公那用責之新任官賠補朕心實不忍也至俸工銀兩有限即逐年扣補亦難清理且官無俸祿役無工食必致私派以纍民朕為天下生民計蠲免各省錢糧已逾萬萬免此四五十萬之銀何足惜乎朕總理機務垂五十年事無大小凡臣下情隱無不灼知洞鍳朕屢次南巡地方官員預備縴夫修理橋梁開濬河道想皆借用帑銀原冀陸續補足而朕三次南巡為期相隔不逺且值蠲免災荒所徵錢糧為數又少填補不及遂至虧空如此之多爾等皆知之而不敢言也即如縴夫一項雖取用於田畝而所用既多伺候日久勢必給與口糧工價安得無費至於修造行宫亦必借用帑銀前者朕巡視溜淮套工程至彼處見有舍宇三間雖云俸工銀兩所造然必先借用庫項後方抵補爾等豈肯明言其故乎至欲將三年俸工抵補虧空夫三年之內地方官員或升遷或調用或革退或亡故以從前各官那用之虧空而將後來者之俸扣補於理不順朕心實為不忍至於胥吏賤役若不給與工食此輩何所資生必至纍民今部中每遇一事輒議令地方官設法料理皆掩飾美名實則加派於地方耳朕非但為百姓亦為大小諸臣保全身家性命朕南巡時聞龍潭地方建造行宫恐致纍民曽諭總督阿山令其拆毁至他處建造行宫朕皆未之知也總之此不欲纍民之念可以自信亦可見信於天下後世朕歷年蠲免天下錢糧至數萬萬有餘今此項虧空若令補墊亦不為多然豈忍以此纍地方乎至於查明欵項亦非難事錢糧冊籍皆有可考地方官借因公那用之名盈千纍百餽送於人若加嚴察隱情豈不畢露朕意槩從寬典不更深求今海宇升平國用充足朕躬行節儉宫中用度甚為省約計明朝一日之用足供朕一月之需今即因數次巡幸用錢糧四五十萬亦不為過明後年天下錢糧以次盡行蠲免若留此虧空之項以為官民之纍甚非朕寬仁愛養嘉與維新之至意也康熙五十年辛卯三月辛卯諸王貝勒貝子公滿漢文武大臣官員及直隸各省士民以上御極五十年請上尊號上曰朕自幼讀書歷觀經史持身務以誠敬為本治天下務以寬仁為尚此心此念恪守五十年夙夜無間即纎悉細務不敢稍有怠忽嘗觀古昔帝王君臨天下之久能持終者蓋鮮朕今春秋漸髙血氣漸衰而朝乾夕惕實與日俱增正當恪慎保終孜孜為萬姓圖治安之時也蓋朕之御極年久皆祖宗厚德景福積纍貽留之所致至於請上尊號特虛文耳於朕躬毫無裨益史書所載加上尊號等事徒為先儒所譏有何善處而欲行之也康熙五十一年壬辰七月丁酉户部題原任西安正藍旗驍騎校巴布叩閽言伊兄薩爾布善曽撫養和碩安親王之子塞稜額田産家人等俱為塞稜額占踞入在包衣佐領下審問皆虛應將巴布枷責以年老折贖上諭大學士溫達曰此事所議不明世祖皇帝時將裕親王恭親王付與殷實官員撫養及至分封將撫養官員産業給與二王具題朕未允行大阿哥曽付與內務府總管噶魯三阿哥曽付與內大臣綽爾濟撫養分封時擬將伊等産業給與具題朕俱不准行蓋主上子孫付與屬下人員撫養者特欲令其成人長大並非欲占其産業也撫養之人將主上子孫兢兢業業侍奉撫養能成人長大即其功也及長大成人之後又占其産業籍其人口不但於理不合即受彼撫養之人亦於心不安五旗多有此事此風斷不可長凡事當以理斷之不可圖小利圖小利則與大體有礙設令將朕子與爾撫養之及長成分封時將爾産業給與將爾人口給為奴僕爾心服乎前下嫁與阿祿科爾沁巴特麻之縣君曽啓奏獻伊三佐領朕諭云朕乃天下之主在彼在此俱為朕之臣庶若取至京師反損壞其旗分故不准行䝉古王等聞之無不感激流涕土默特有七佐領該扎薩克無後至今朕豢養閒居彼處前曽奏請編在察哈爾旗下朕未允行後又奏請陪送公主朕亦未行此皆朕至公無私之意今薩爾布善將宗室塞稜額撫養成人反將其産業占踞人口入在包衣佐領下為奴可乎原本著發還十月己巳禮部題康熙五十二年恭遇我皇上六旬大慶中外臣民莫不欲竭尊親之戴上無疆之頌其應行典禮臣等謹㑹同大學士九卿詹事科道詳議具題上曰朕御極以來惟欲萬國乂安上則敬天法祖下則垂令名於後世歷盡憂勤蕩平險阻自古帝王在位不久論者往往歸於别故不知帝王一日萬幾實不堪其勞憂懼所迫以致享年不永也昔帝堯固辭華封之祝朕在位五十餘年夀屆六十今憂勞倍增血氣漸憊惟恐愈久而力不支願不遂惟日兢兢惕勵而已並無祈天永命之意也覽禮部所奏悉屬虛文朕惟願臣清子孝兄友弟恭人人皆讀正書勉盡職業國安民治盜賊寧息各以至誠實意為朕六袠慶祝朕心甚喜此外儀文朕無所好所奏不准行康熙五十二年癸巳二月庚戍上諭領侍衛內大臣大學士九卿等曰趙申喬陳奏皇太子為國本應行冊立朕自幼讀書凡事留意纎悉無遺况建儲大事朕豈忘懷但關係甚重有未可輕立者昔立允礽為皇太子時索額圖懷私倡議凡皇太子服御諸物俱用黃色所定一切儀注幾與朕相似驕縱之漸職是之故索額圗誠本朝第一罪人也宋仁宗三十年未立太子我太祖皇帝並未預立皇太子太宗皇帝亦未預立皇太子漢唐以來太子幼沖尚保無事太子年長其左右羣小結黨營私鮮有能無事者人非聖人誰能無過安得有克盡子道如武王者今衆皇子學問見識不後於人但年俱長成已經分封其所屬人員未有不各庇護其主者使即立之能保將來無事乎且為君難為臣不易古來人君窮兵黷武者有之崇尚佛老者有之任用名法者有之朕御極五十餘年朝乾夕惕上念祖宗遺緒之重下念臣民仰望之殷乾綱獨斷柔逺能邇體恤臣庶毫無私心當吳三桂叛亂時已失八省勢幾危矣朕灼知滿漢䝉古之心各加任用勵精圖治轉危為安是以數十年來海宇寧靖今欲立皇太子必能以朕心為心者方可立之豈宜輕舉即臣僚為國為民念兹在兹先憂後樂者實不易得太子之為國本朕豈不知立非其人關係匪輕朕將允礽從幼教訓逮後長成變為暴虐無所不為不知忠孝不識亷恥行事乖戾有不可言者推其故皆由風狂成疾迷惑所致此疾有二十餘載矣如人醉後傷人醒時知悔今以長醉不醒所為過惡身不自知伊之儀表及學問才技俱有可觀今一至於此非風狂而何自廢而復立以來朕尤加意教訓心血耗盡因伊狂疾終不痊愈故又行廢斥孟子云父子之間不責善責善則離離則不祥莫大焉大學云人莫知其子之惡蓋父之於子嚴不可寬亦不可誠為難事如朕方能處置得宜耳爾諸大臣俱各有子凡人幼時猶可教訓及至長成一誘於黨類便各有所為不復能拘制矣立皇太子事亦未可輕定特召集爾衆大臣明示朕意趙申喬所奏著發還三月戊寅朔上諭諸王貝勒貝子公大學士九卿詹事科道等曰朕昨回宫見京城內外為朕六十夀誕慶賀保安祈福者不計其數朕實涼德自覺愧汗若先知之必諭令停止今雖難違衆志而因此夜思達旦朕為天下萬國蒼生之主萬姓安即朕之安天下福即朕之福若雨暘時若家給人足則朕安寢飽食可以却病延年此朕所求之福也爾等傳諭凡有祝延萬夀者必以雨暘時若萬邦咸寧為先朕雖年老然夙夜匪懈履薄臨深之念與日俱增豈敢稍自滿假乎乙酉上諭大學士等曰朕聞各省民人祝萬夀來京者甚衆其中老人更多當春時寒暖不均又人非土著或不服水土亦未可定爾等可傳諭漢官等老人中倘有一二有恙者即請撥太醫調治以稱朕愛養耆老至意十二月甲午兵部題臺灣換班官兵遭風壞船及溺沉兵器應令地方官速行賠補上曰海洋寬廣遭風壞船非人力所能為也若遇賊時船被燒奪理應賠補若此等遭風損壞亦令賠補太為寃抑嗣後有遇賊不能擒殺船壞被奪揑報遭風者除辨兵議罪外照例賠補若果被風損壞沉溺之船應免其賠補其沉溺兵丁等因公身死即幸而登岸者亦死中幸脫之人殊可憫惻著地方大臣酌量加恩以示鼓勵康熙五十三年甲午六月癸未上諭刑部朕避暑塞外駐蹕山莊素稱清涼之地尚覺煩熱想京師自然更甚朕時以民生疾苦為念今天下承平農商樂業惟有罪之人拘繫囹圄身被枷鎖當兹盛暑恐致疾疫軫念及此不勝惻然應將在京監禁罪囚少加寬恤獄中多置氷水以解鬱暑其九門鎖禁人犯亦著減其鎖條至枷號人犯限期未滿者暫行釋放候過暑時照限補滿爾部即遵諭速行以副朕法外施仁至意十二月戊子上諭大學士等曰直𨽻各省州縣官或革職或被參解任或身故者妻子尚能回籍其縣丞主簿典史驛丞等微員革職解任身故者無力回籍羈留異鄉不免凍餒以致纍及妻子即使犯罪至死亦與妻子無涉殊屬可憫且如各地方鰥寡孤獨不能度日尚設立養濟院以育養之此等微員理應撫恤嗣後將伊等作何令回原籍爾等與九卿㑹議以聞康熙五十五年丙申五月壬戌上諭署理內務府總管事務散秩大臣關保曰去年直隸所屬地方水潦未得豐收目今京師又旱朕心深為憂慮自明日為始朕於宫中每日進膳一次先人而憂後人而樂庶可感召天和也甲子大學士嵩祝摺報京師下雨日期上曰宋儒有言求雨得雨旱豈無因此意甚深今雖下雨但雨勢未必逺及有何可喜之處求雨斷不可止必處處霑足方可停止也康熙五十九年庚子正月己卯諸王大臣等奏皇上御極六十年請行慶賀典禮上諭曰朕在位五十九年皆由上蒼眷佑列聖福德之所致也見在西陲用兵軍民勞苦去嵗正月朔日食海洋颶風飄沒官兵船隻山左東三府黎民饑饉人心風俗未盡淳官針政事未盡理此正君臣孜孜求治之時慶賀之事著停止康熙六十一年壬寅十月戊寅大學士九卿詹事科道等以來年恭遇萬夀七旬大慶詳議慶賀典禮合詞具疏奏請上諭大學士等曰覽所奏皆過於實事朕以沖齡即位賴世祖章皇帝定鼎以來深仁厚澤建不拔之業至今八十年四海升平有自來矣朕自幼讀書每覽前代帝王忿懥憂患纍其內機務紛紜勞其外年嵗不久景祚不長者未嘗不拊髀長歎朕涼德亦不過如此幸得厯逾花甲年登古稀鬚眉皓白總理萬幾當此之際翼翼小心惟恐善後之策不能預料保泰圗安夙夜氷兢況今西陲用兵士卒暴露轉運罷敝民生乏食物價騰貴正宜君臣同寅協恭乂安萬姓永致太平自古慶賀多者後人不取況實無益乎朕御極六十餘年元旦之外未嘗受賀惟六十夀時三月十八日進表行禮今卿等所請無庸多議大清聖祖合天𢎞運文武睿哲恭儉寬裕孝敬誠信中和功德大成仁皇帝聖訓卷四
